body:
  text: 禮記述注卷十三安溪李光坡撰玉藻第十三疏曰鄭目録云以其記天子服冕之事也冕之旒以藻紃為之貫玉為飾因以名篇天子玉藻十有二旒前後邃延龍卷以祭集説曰玉冕前後垂旒之玉也玉五采從上而下初以朱次白次蒼次黃次玄既貫遍周而復始其三采者先朱次白次蒼二色者先朱後緑藻雜采絲繩之貫玉者也以藻穿玉以玉飾藻故曰玉藻邃深也延冕上覆也玄表而纁裏前後邃延者言前後各有十二旒垂而深邃延在其上也龍衮畫龍於衮衣也祭祭宗廟也餘見禮器玄端而朝日於東門之外聽朔於南門之外注曰端當為冕字之誤也玄衣而冕冕服之下朝日春分之時也東門南門皆謂國門也疏曰鄭知端當為冕者皮辨尊次則諸侯之朝服又其次玄端諸侯皮辨聽朔朝服視朝是視朝之服卑於聽朔今天子皮辨視朝若玄端聽朔則是聽朔之服卑於視朝且聽朔大視朝小故知端為冕謂玄冕也是冕服之下者閏月則闔門左扉立于其中注曰天子廟及路寢皆如明堂制明堂在國之陽每月就其時之堂而聽朔焉卒事反宿路寢亦如之閏月非常月也聽其朔於明堂門中還處路寢門終月疏曰反宿路寢謂視朔之一日也亦如之者亦如明堂每月異所其餘日即在燕寢視朝則恆在路門外也樂太史云終月謂終竟一月所聽之事於一月中耳尋常則居燕寢也皇氏云明堂有四門即路寢亦有四門閏月各居其時當方之門義或然也皮辨以日視朝遂以食日中而餕奏而食日少牢朔月太牢五飲上水漿酒醴酏疏曰餕尚奏樂即朝食奏樂可知集説曰既著皮辨視朝遂以皮辨而朝食所以敬養身體至日中之時還著皮辨而餕朝之餘食奏作樂也日常日也朔月月朔也上水以水為上也下四者説見內則卒食玄端而居動則左史書之言則右史書之御瞽幾聲之上下年不順成則天子素服乘素車食無樂疏曰居燕居春秋是動作事故注以春秋當左史所書左陽陽主動故記動尚書記言語之事故以尚書當右史所書右是隂隂主靜故也周禮五史無左史右史案左傳太史書崔杼弒君是記動作之事則太史為左史也王命內史叔興父䇿命晉侯是言誥之事則內史為右史御侍也瞽樂人以瞽侍側幾猶察也瞽人審音政和則樂聲樂政酷則樂聲哀察其哀樂防君之失陳氏曰玄端即朝服之衣易其裳耳此以上皆天子之禮諸侯玄端以祭裨冕以朝皮辨以聽朔於太廟朝服以日視朝於內朝注曰祭祭先君也端亦當為冕字之誤也朝朝天子也裨冕公衮侯伯鷩子男毳也朝服冠玄端素裳也此內朝路寢門外之正朝集説曰天子六服大裘為上其餘為裨玄衣以素為裳則是朝服若上士玄裳中士黃裳下士雜裳天子諸侯朱裳則皆名玄端不得名朝服凡在朝君臣上下同服方氏曰天子聽朔于南門示受之于天諸侯聽朔于太廟示受之于祖原其所自也天子諸侯皆三朝外朝在庫門之外治朝在路門之外內朝在路門之內亦曰燕朝也朝辨色始入君日出而視之退適路寢聽政使人視大夫大夫退然後適小寢釋服集説曰臣入常先君出常後尊卑之禮然也視朝而見羣臣所以通上下之情聽政而適路寢所以決可否之計小寢燕寢也釋服服玄端又朝服以食特牲三俎祭肺夕深衣祭牢肉朔月少牢五俎四簋子卯稷食菜羮夫人與君同庖疏曰天子言日中諸侯亦當有日中諸侯言夕則天子亦有夕天子言餕則諸侯亦餕諸侯祭牢肉則天子亦祭牢肉夫人與君同庖則后亦與王同庖互相挾集説曰三俎特豕魚臘也周人祭肺夕夕食也牢肉即特牲之餘也五俎加羊與其腸胃也簋盛黍稷之器常食二簋月朔則四簋也子卯説見檀弓夫人不特殺故云與君同庖也君無故不殺牛大夫無故不殺羊士無故不殺犬豕君子逺庖厨凡有血氣之類弗身踐也至于八月不雨君不舉集説曰天子膳用六牲則無故亦殺牛此言國君也天子之大夫有故得殺牛此無故不殺羊謂諸侯之大夫也故謂祭祀及賔客饗食之禮也祭禮有射牲之文此言弗身踐亦謂尋常也八月今之六月殺牲盛饌曰舉年不順成君衣布搢本關梁不租山澤列而不賦土功不興大夫不得造車馬集説曰衣布身著布衣也士以竹為笏而以象飾其本搢插也去珽荼插士笏也關謂門關梁謂澤梁不租不收租稅也列當作迾遮遏之義凶年雖不收山澤之賦猶必遮迾其非時采取者造新有製作也此皆為嵗之凶故上之人節損以寬貸其下也卜人定龜史定墨君定體疏曰尊者視大卑者視小集説曰周禮龜人所掌天龜靈地龜繹東曰果西曰雷南曰獵北曰若各以方色與體辨之定之者其所當用卜祭天用靈祭地用繹春用果秋用雷之屬也史定墨者凡卜必以墨畫龜以求吉兆乃鑽之以觀其所坼從墨而坼大謂之兆廣其旁岐細出則謂之璺坼亦謂之兆璺韻書璺音問器破而未離之名也體者兆象之形體定謂決定其吉凶也君羔幦虎犆大夫齊車鹿幦豹犆朝車士齊車鹿幦豹犆集説曰幦者覆軾之皮犆緣也君之齊車以羔皮覆軾而緣以虎皮朝車亦謂大夫之朝車以下文兩言齊車故知上為君齊車也君子之居恆當户寢恆當首若有疾風迅雷甚雨則必變雖夜必興衣服冠而坐集説曰向明而居順生氣而卧敬天威而變凡知禮者皆當如是不但有位者也故以君子言曰五盥沭稷而靧粱櫛用樿櫛髮晞用象櫛進禨進羞工乃升歌集説曰盥洗手也沭稷以淅稷之水洗髮也靧粱以淅粱之水洗面也樿櫛白木梳也晞乾也象櫛象齒梳也髮濕則滑故用木梳乾則澀故用象櫛也沭而飲酒曰禨羞則籩豆之實也工乃升堂以琴瑟而歌焉既充之以和平之味又感之以和平之音皆為新沐氣虛致其養也浴用二巾上絺下綌出杆履蒯席連用湯履蒲席衣布晞身乃屨進飲集説曰杅浴盤也履踐也蒯席蒯草之席也湅洗也履蒯席之上而以湯洗其足垢然後立于蒲席而以布乾潔其體乃著屨而進飲也將適公所宿齊戒居外寢沐浴史進象笏書思對命集説曰大夫之有史蓋掌文史之事耳非史官之比也思謂意所思念欲告君之事對謂君若有問則臣對答之辭命謂君所命令當奉行者此三者皆書之於笏故曰書思對命皆謂敬謹之至恐或遺忘也既服習容觀玉聲乃出揖私朝輝如也登車則有光矣集説曰既服著朝服畢也容觀容貌儀觀也玉聲佩玉之聲也揖私朝與其家臣揖而往朝于君也輝與光皆言德容發越之盛光則又盛于輝矣天子搢珽方正於天下也集説曰搢插也珽亦笏也即玉人所謂大圭長三尺者是也以其挺然無所詘故謂之珽蓋以端方正直之道示天下也諸侯荼前詘後直讓於天子也集説曰荼者舒遲之義前有所畏則其進舒遲諸侯之笏前詘者圎殺其首也後直者下角正方也以其讓于天子故殺其上也大夫前詘後詘無所不讓也集説曰大夫上有天子下有己君故笏之下角亦殺而圜示無所不讓也侍坐則必退席不退則必引而去君之黨集説曰臣侍君之坐若側旁有别席則退就别席或旁無别席可退或有席而君不命之退則常引而却離坐于君親黨之下也一説黨屬于鄉而小故以為旁側之喻登席不由前為躐席疏曰失節而踐為躐席應從下升若由前升是躐席也鄉飲酒禮賔席于户西以西頭為下主人席于阼階介席于西階皆北頭為下賔升席自西方注云升由下也又記云主人介凡升席自北方降自南方注云席南上升由下降由上主人受獻自席前適阼階是降自北方者以受獻正禮須席末啐酒因從北方降也故注云由便也若尋常無事則升由下而降由上若賔則升降皆由下也徒坐不盡席尺疏曰徒空也非飲食及講問之坐為徒坐不盡席之前畔一尺示無所求於前不忘謙也讀書食則齊豆去席尺疏曰讀書聲當聞尊者食為汚席坐則近前與席畔齊豆去席尺者解席所以近前之意以設豆去席一尺不得不前坐就豆若賜之食而君客之則命之祭然後祭先飯辨嘗羞飲而俟集説曰客之以客禮待之也然必命之祭然後祭者不敢以客禮自居也先食而遍嘗諸味亦示臣為君嘗食之禮也飲而俟者禮食未飱以前啜飲以利滑喉中不令澀噎今君猶未飱故臣亦不敢飱而先嘗羞畢而啜飲以俟君飱臣乃敢飱也若有嘗羞者則俟君之食然後食飯飲而俟君命之羞羞近者命之品嘗之然後唯所欲凡嘗逺食必順近食集説曰此謂君但賜之食而非客之者則膳宰自嘗羞故云若有嘗羞者此臣既不祭不嘗則俟君食乃食也飯飲者飲之也雖不嘗羞亦先飲飲以利喉而俟君也雖君已食己乃後食猶未敢食羞必須君命羞近者先食近其前者一種而止也品猶遍也既未敢越次多食故君又命遍嘗己乃遍嘗之後則隨己所欲不復次第也凡嘗逺食必自近者始客與不客皆然故云凡也君未覆手不敢飱君既食又飯飱飯飱者三飯也君既徹執飯與醬乃出授從者集説曰君未覆手不敢飱者侍食者悉然也覆手者謂食畢而覆手以循口之兩旁恐有殽粒汚著之也飱以飲澆飯也禮食竟更作三飱以助飽實故君未覆手則臣不敢飱明不敢先君而飽也既猶畢也君畢食則臣更飯飱也三飯並是飱謂三度飱也故曰飯飱者三飯也君食竟既徹饌臣乃自徹己饌以授從者飯醬是食之主故自執之此食己所當得故也此非客禮故得如此若君與己禮食則但親徹不敢授己之從者故公食大夫禮賔取粱與醬降奠于階西不以出也若非君臣但是降等者則徹之以授主人之相者故曲禮云徹飯齊以授相者也凡侑食不盡食食於人不飽唯水漿不祭若祭為己偞卑疏曰此明凡人相敵為食之禮集説曰侑食侑己食也食而勸侑禮之勤也食之不盡與不飽禮之謙也公食大夫禮賔祭觶漿臣敬君之禮此言水漿不祭禮各有所施也水漿非盛饌之比若祭之則為大泄卑矣己大也偞厭也謂大厭降卑微如有所畏迫也君若賜之爵則越席再拜稽首受登席祭之飲卒爵而俟君卒爵然後授虛爵君子之飲酒也受一爵而色灑如也二爵而言言斯禮已三爵而油油以退退則坐取屨隱辟而后屨坐左納右坐右納左集説曰此謂朝夕侍者始得爵也若其大禮則君先飲而臣後飲燕禮公卒爵而後飲是也此據侍飲得爵故再拜而後受若燕禮據大飲法則先受爵而後奠爵再拜灑如禮度明肅之貌言言與誾誾同意氣和悅之貌已止也油油謹重自得之貌坐取屨跪而取屨也隱辟而后屨俯逡巡而退著屨也跪左足而納右足之屨跪右足而納左足之屨此納屨之儀也凡尊必尚玄酒唯君面尊唯饗野人皆酒大夫側尊用棜士側尊用禁疏曰若一尊亦曰側尊故士冠禮云側尊一甒醴在服北注云無偶曰側與此側别集説曰尊尚玄酒不忘古也面向也君燕臣子専其恩惠故尊鼻向君也饗野人如蠟祭之飲是也禮不下庶人唯使之足于味而已故一用酒也側旁側也謂設尊在賔主兩楹之間旁側夾之故云側尊異于君也棜禁見禮器始冠緇布冠自諸侯下達冠而敝之可也集説曰冠禮初加緇布冠諸侯以下通用存古故用之非時王之制也故既用即敝棄之可矣玄冠朱組纓天子之冠也緇布冠繢緌諸侯之冠也玄冠丹組纓諸侯之齊冠也玄冠綦組纓士之齊冠也集説曰天子始冠之冠則玄冠而以朱組為纓諸侯雖緇布冠郤用雜采之繢為纓緌為尊者飾耳其緌也孔子曰吾未之聞謂大夫士也但諸侯繢緌雖異其頍項青組纓等皆與士同齊冠齊戒時所服者諸侯與士皆玄冠但其纓則有丹組綦組之異朱色紅而明丹赤色也綦帛之蒼白如艾色者一説文也縞冠玄武子姓之冠也縞冠素紕既祥之冠也集説曰縞生絹也武冠卷也以縞為冠凶服也武則玄色吉也所以吉凶相半者蓋綦而小祥孫為祖服除矣而父之服未除不敢純吉也姓生也孫是子之所生故謂之子姓素熟絹也紕冠兩邊及卷下畔之緣也縞冠素紕謂冠與卷身皆用縞但以素緣之耳素重於縞也縞是生絹而近吉既祥之冠者祥祭後所服也垂緌五寸惰遊之士也集説曰此言縞冠素紕而緌之垂者長五寸垂長緌明非既祥蓋以其為惰遊失業之士使之服此以恥之耳玄冠縞武不齒之服也集説曰不齒即王制所謂不帥教而屏棄之者使之玄冠縞武亦以恥辱之居冠屬武自天子下達有事然後緌集説曰禮服之冠則臨著乃合其武有儀飾故也若燕居之冠則冠與武相連以非行禮之時故率略少威儀也此冠無分貴賤皆著之故云自天子下達凡緌所以致其飾故有事乃緌無事則否也五十不散送親沒不髦疏曰二者不關冠之義紀者雜厠其間集説曰喪禮始死三日之前要絰散垂葬畢乃絞此言五十始衰不能備禮故不能垂髦象幼時剪髮為鬌之形父母在則用之故親沒則去此飾詳見內則大帛不緌玄冠紫緌自魯桓公始也方氏曰大帛冠之白者凶服去飾故不緌也玄冠之緌不宜用紫色為其非正色也後世用之則自魯桓公始朝玄端夕深衣集説曰前章言夕深衣祭牢肉者國君之禮也此言朝玄端夕深衣者謂大夫士在私朝及家朝夕所服也深衣三袪縫齊倍要衽當旁袂可以回肘集説曰袪袖口也尺二寸圍之為二尺四寸要之廣三其二尺四寸則七尺二寸也故云三袪齊者裳之下畔要為裳之上畔縫齊倍要者謂縫下畔之廣一丈四尺四寸是倍要之七尺二寸也衽裳交接之處也在身之兩旁故云衽當旁袂袖之連衣者也上下之廣二尺二寸肘長尺二寸故可以回肘也長中繼掩尺夾二寸袪尺二寸緣廣寸半集説曰長中者長衣中衣也與深衣制同而名異者著於內則曰中衣蓋著在朝服或祭服之內也著於外則曰長衣以素為純緣者也雜記云練冠長衣以筮注云深衣之純以素者也若凶服之純以布者則謂之麻衣繼掩尺者幅廣二尺二寸以半幅繼續袂口掩餘一尺若今袖矣若長衣掩必用素中衣掩或布或素隨其衣而然夾曲領也其廣則二寸緣謂深衣邊以緣飾之廣寸半也以帛裏布非禮也注曰中外宜相稱也冕服絲衣也中衣用素皮辨服朝服玄端麻衣也中衣用布疏曰麻即十五升布故中衣并用布士不衣織無君者不二采疏曰大夫士去國三月之內服素衣素裳三月之後服玄端玄裳是有采色但不二耳采色玄最貴也集説曰染絲而織之為織功多色重故士賤不得衣之也無君去位之臣也不二采謂衣裳與冠同色衣正色裳間色非列采不入公門振絺綌不入公門表裘不入公門襲裘不入公門集説曰正色者青赤黃白黑五方之正色也木青克土黃故緑色青黃為東方之間色火赤克金白故紅色赤白為南方之間色金白克木青故碧色青白為西方之間色水黑克火赤故紫色赤黑為北方之間色土黃克水黑故駵黃之色黃黑為中央之間色也列采謂正服之色各有尊卑品列也非此則是褻服振讀為袗襌也襌則見體裘上必有裼衣表裘是無裼衣而裘在外也則簡而不恭襲裘謂掩其襲衣而不露裼衣也則質而不文皆為不敬故君子謹之纊為繭緼為袍襌為絅帛為褶集説曰纊新綿也緼舊絮也衣之有著者用新綿則謂之繭用舊絮則謂之袍有表而無裏者謂之絅有表裏而無著者謂之褶朝服之以縞也自季康子始也集説曰朝服之布十五升先王之制也季康子始用生絹後人因之故記者原其所自凡古禮之亡皆由於變孔子曰朝服而朝卒朔然後服之注曰謂諸侯與羣臣也集説曰聽朔重於視朝諸侯之朝服玄端素裳而聽朔則皮辨故卒聽朔之禮然後服朝服而視朝也曰國家未道則不充其服焉注曰謂若衛文公者集説曰曰字承上文亦孔子之言也禮樂刑政未合于先王之道則不宜充盛其衣服示儉以修省也唯君有黼裘以誓省大裘非古也注曰經云唯君則知時臣亦為之集説曰君國君也黼裘以黑羊皮雜狐白為黼文以作裘舊讀省為獮方氏釋為省耕省斂之義今從之大裘黑羔裘也天子郊服謂國君固可衣黼裘以誓軍旅省耕斂今而僭服大裘則不可也但言非古則僭禮之失自見君衣狐白裘錦衣以裼之注曰君衣狐白毛之裘則以素錦為衣覆之使可裼也袒而有衣曰裼必覆之者裘褻也詩云衣錦絅衣裳錦絅裳然則錦衣復有上衣明矣天子狐白之上衣皮辨服與凡裼衣象裘色也君之右虎裘厥左狼裘注曰衛尊者宜武猛士不衣狐白注曰辟君也狐之白者少以少為貴也疏曰士不衣狐白則卿大夫得衣也其裼則不用錦衣當用素衣君子狐青裘豹褎玄綃衣以裼之集説曰君子謂大夫士也狐青裘狐之青毛皮為裘也豹褎豹皮為袖玄綃衣玄色之綃為衣也麛裘青犴褎絞衣以裼之集説曰麛鹿子也犴胡地野犬絞蒼黃之色羔裘豹飾緇衣以裼之狐裘黃衣以裼之錦衣狐裘諸侯之服也注曰非諸侯則不用錦衣為裼集説曰飾猶袖也論語緇衣羔裘黃衣狐裘犬羊之裘不裼不文飾也不裼集説曰犬羊之裘庶人所服裘與人俱賤故不裼以為飾也裘之裼也見美也弔則襲不盡飾也君在則裼盡飾也集説曰此言裼襲之異宜見美謂裼衣上雖加他服猶必開露以見示裼衣之美弔喪襲裘惟小斂後則然盡飾者盡其文飾之道以為敬弔主於哀故敬不在美君在則當以盡飾為敬也服之襲也充美也是故尸襲執玉龜襲無事則裼弗敢充也疏曰凡敬有二體以質為敬者子於父母之所不敢袒裼以文為敬者臣于君所則裼若平敵以下則亦襲以質略故也所襲雖同其意異也集説曰充美猶云掩塞其華美也尸尊無所示敬故襲執玉之禮以圭璋聘則襲以璧琮享則裼執龜為享禮庭實則裼以卜則襲此特主襲而言耳非謂執玉龜無裼之禮也無事謂執玉執龜之禮已竟也無事則裼亦謂在君之所非君所則否弗敢充者以見美為敬也笏天子以球玉諸侯以象大夫以魚須文竹士竹本象可也注曰球美玉也文飾也大夫士飾竹以為笏不敢與君並用純物也疏曰庾氏云以鮫魚須飾竹以成文士以竹為本質以象牙飾其邊緣飾之可也見於天子與射無説笏入太廟説笏非禮也小功不説笏當事免則説之既搢必盥雖有執於朝弗有盥矣陳氏曰笏之初用蓋諸侯之朝天子則執命圭而搢荼大夫之聘則執聘圭而搢笏及其合瑞而授圭則執其所搢而己所謂見於天子無説笏者此也射以觀德則禮固在所隆小功則禮可以勝情故亦不説當事而免則事可以勝禮故説之方氏曰大廟之內惟君當事則説笏所以逸尊者也後世臣或説之則僭矣小功之喪悲哀殺矣事不可不記也故不説笏及當事而免之時則不可以不説搢笏必盥者謂有執事於朝預須潔淨故既搢笏於帶必盥洗其手於後雖有執事更不須盥以其初盥已畢凡有指畫於君前用笏造受命於君前則書于笏笏畢用也因飾焉集説曰因事而有所指畫用手則失容故用笏也造受命詣君所而受命也畢用者每事皆用之也因飾焉謂因而文飾之以為上下之等級也笏度二尺有六寸其中博三寸其殺六分而去一集説曰中廣三寸天子諸侯大夫士之笏皆然天子諸侯則從中以上稍稍漸殺至上首止廣二寸半是六分三寸而去其一也其大夫士又從中殺至下亦廣二寸半故惟中間廣三寸也玉人言大圭長三尺是兼終葵首言之天子素帶朱裏終辟集説曰謂大帶也素熟絹也用朱為裏終竟也終辟終竟此帶盡緣之也此二句本在赤韍蔥衡之下而素帶終辟注曰而素帶終辟謂諸侯也諸侯不朱裏合素為之如今衣帶為之下天子也大夫亦如之大夫素帶辟垂集説曰大夫之素帶則惟緣其兩耳及垂下之紳腰後不緣士練帶率下辟注曰率繂也士以下皆襌不合而繂積辟讀如裨冕之裨裨謂以繒采飾其側人君充之大夫裨其紐及末士裨其末而已集説曰練繒也士以練為帶單用之而緶緝其兩邊故謂之率腰及兩耳皆不緣惟緣其紳故云下辟居士錦帶弟子縞帶注曰居士道藝處士也集説曰以錦為帶示文也弟子用絹示質也并紐約用組三寸長齊于帶紳長制士三尺有司二尺有五寸子遊曰參分帶下紳居二焉紳韠結三齊疏曰并並也謂天子下至弟子其所紐約之物並用組為之方氏曰紐謂帶之交結之處以屬其紐約者謂以物穿紐約束其帶三寸者紐約之組濶三寸也長齊于帶者言組之垂適與紳齊也紳謂帶之垂者士三尺者自要而下為稱也士如此亦舉卑以見尊也有司欲便於趨走故特去五寸引子遊之言言人長八尺自要而下四尺五寸分為三分而紳居二故長三尺也韠蔽膝也結即組也紳韠結三者皆長三尺故曰三齊自三寸至三齊本在搖狄之下君命之上大夫大帶四寸雜帶君朱緑大夫玄華士緇辟二寸再繚四寸集説曰四寸廣之度也雜帶謂以雜色為辟緣也朱緑者上以朱下以緑玄華者外以玄內以華華黃色也士帶之辟則內外皆緇是謂緇帶大夫以上帶皆廣四寸士練帶惟廣二寸而再繞要一匝則亦是四寸矣自大夫大帶至針功本在二寸之下一命之上凡帶有率無針功疏曰凡帶謂有司之帶有率謂其帶既襌亦以針緶緝其側但繂褶之而已無别裨飾之針功也知士以下皆襌者以繂是縫褶之名以縫旁邊故知襌也肆束及帶勤者有事則收之走則擁之集説曰肆讀為肄餘也詩伐其條肄謂約束帶之餘組及紳之垂者遇有勤勞之事則收斂而持於手若事迫而不容不走者則擁抱之於懷也此三句本在皆朱錦也之下又重出於有憂者之下而無肆束及帶四字韠君朱大夫素士爵韋注曰此玄端服之韠也韠之言蔽也凡韠以韋為之必象裳色則天子諸侯玄端朱裳大夫素裳唯士玄裳黃裳雜裳也皮辨服皆素韠疏曰士冠禮玄端爵韠此云士爵韋故知是玄端之韠也知此朱韠非祭服韠者祭服玄衣纁裳君與大夫士無别同是赤色圜殺直天子直諸侯前後方注曰圜殺直目韠制也天子四角直無圜殺前後方殺四角使之方變於天子也所殺者去上下各五寸疏曰前後方是殺四角也上下各去五寸所去之處以物補飾之使方變於天子也去五寸者案雜記韠會去上五寸是上去五寸又云紕以爵韋六寸不至下五寸是去下五寸大夫前方後挫角士前後正注曰圜其上角變於君也韠以下為前上為後士賤與君同不嫌也韠下廣二尺上廣一尺長三尺其頸五寸肩革帶博二寸注曰頸五寸亦謂廣也頸中央肩兩角皆上接革帶以繫之肩與革帶廣同凡佩繫於革帶詩疏曰古者佃漁而食因衣其皮先知蔽前後知蔽後後王易之以布帛而猶存其蔽前者重古道不忘本也士服爵辨以韎韐配之則服冕者以芾配之故知冕服謂之芾芾韠皆是蔽膝其制同但以尊祭服故異其名耳一命緼韍幽衡再命赤韍幽衡三命赤韍蔥衡注曰此玄冕爵辨服之韠尊祭服異其名耳韍之言亦蔽也緼赤黃之間色所謂韎也衡佩五之衡也幽讀為黝黑謂之黝青謂之蔥周禮公侯伯之卿三命其大夫再命其士一命子男之卿再命其大夫一命其士不命王后褘衣夫人揄狄君命屈狄注曰褘讀如翬揄讀如搖翬搖皆翟雉名也刻繒而畫之著於衣以為飾因以為名也夫人三夫人亦侯伯夫人也王者之後夫人亦褘衣君女君也屈周禮作闕謂刻繒為翟不畫也此子男之夫人禮天子諸侯命其臣后夫人亦命其妻以衣服所謂夫尊於朝妻榮於室也疏曰女君謂后也命子男妻故云君命六服皆袍制連衣裳不異其色再命褘衣一命袒衣士褖衣注曰此子男卿大夫士之妻命服也褘當為鞠字之誤也子男之卿再命而妻鞠衣則鞠衣袒衣褖衣者諸侯之臣皆分為三等其妻以次受此服也公之臣孤為上卿大夫次之士次之侯伯子男之臣卿為上大夫次之士次之疏曰闕翟赤搖翟青褘衣玄鞠衣黃展衣白褖衣黑唯世婦命於奠繭其他則皆從男子疏曰世婦天子二十七世婦也奠獻也凡獻物必先奠於地獻繭謂世婦及命婦人助蠶畢獻繭也世婦及卿大夫之妻並卑雖已被命猶不得即服必經入助蠶蠶畢獻繭繭多功大君命之著服乃得服耳其他謂后夫人九嬪及五等侯妻也夫在其位則妻得服其服矣不須奠繭之命凡侍於君紳垂足如履齊頤霤垂拱視下而聽上視帶以及夾聽鄉任左集説曰立而磬折則紳必垂身折則裳下之緝委地故足如踐之也頤頷也霤屋簷也身俯故頭臨前而頷之垂如屋霤然垂拱亦謂身俯則手之拱者下垂也視雖在下而必側面向上以聽尊者之言故云視下而聽上也夾交領也視君之法下不過帶髙不過夾凡立者尊右坐者尊左侍而君坐則臣在君之右是以聽向皆任左以向君凡君召以三節二節以走一節以趨在官不俟屨在外不俟車疏曰節以玉為之所以明信輔於君命者也君使使召臣有二節時有一節時故合云三節也隨事緩急急則二節故走緩則一節故趨官謂朝廷治事處也外謂其室及官府也在官近故云屨在外逺故云車士於大夫不敢拜迎而拜送士於尊者先拜進面答之拜則走集説曰士於大夫尊卑有間若大夫詣士士不敢拜而迎之恐其答拜也去則拜送者禮賔出門主人再拜送之賔不答拜禮有終止故也士若見於大夫則先拜於門外然後進而見面若大夫出迎而答其拜則走避之士於君所言大夫沒矣則稱諡若字名士與大夫言名士字大夫疏曰士在君前與君言論及於大夫君前臣名若彼大夫生則呼其名若沒則稱彼諡無諡則稱字士雖已死猶呼名也若士與大夫言論及他生大夫士士呼之名大夫呼之字若大夫士卒則字士諡大夫於大夫所有公諱無私諱凡祭不諱廟中不諱教學臨文不諱集説曰公諱本國先君之諱也私諱私家之諱也凡祭祭羣神也餘見曲禮古之君子必佩玉右徵角左宫羽集説曰徴角宫羽以玉聲所中言也徴為事角為民事則須作而成民則供上役使故在右右為動作之方也宫為君羽為物君道宜靜物道宜積故在左左乃無事之方也趨以采齊行以肆夏周還中規折還中矩進則揖之退則揚之然後玉鏘鳴也故君子在車則聞鸞和之聲行則鳴佩玉是以非辟之心無自入也集説曰路寢門外至應門謂之趨於此趨時歌采齊之詩以為節路寢門內至堂謂之行於行之時則歌肆夏之詩以為節周旋注云反行也假令從北向南曲折而東向也進而前則其身略俯如揖然退而後則其身微仰故曰揚之進退俯仰皆得其節故佩玉之鳴鏘然可聽也鸞和鈴也常所乘之車鸞在衡和在軾若田獵之車則和在軾鸞在馬鑣也君在不佩玉左結佩右設佩居則設佩朝則結佩注曰謂世子也出所處而君在焉則去德佩而設事佩辟德而示即事也結其左者若於事有未能也結者結其綬不使鳴焉居謂所處而君不在朝朝於君疏曰臣之朝君備儀盡飾當佩玉今云君在不佩玉故知非臣下云世子佩瑜玉是以知世子也去德佩者謂結玉佩不使鳴非謂全去也事佩大觿木燧之屬也自居則設佩及結佩亦皆謂世子齊則綪結佩而爵韠疏曰此謂凡應佩玉之人非唯世子綪結佩綪屈也謂結其綬而又屈上之也爵韠謂士玄端齊皇氏熊氏謂諸侯以下皆以玄端齊而以爵韋為韠同士禮以其齊故不用朱韠素韠義或然也凡帶必有佩玉唯喪否佩玉有衝牙君子無故玉不去身君子於玉比德焉注曰喪主於哀去飾也凡謂天子以至士故謂喪與災眚疏曰凡佩玉必上繫於衡下垂三道穿以蠙珠下端前後以懸璜中央下端懸以衝牙動則衝牙前後觸璜而為聲所觸之玉其形似牙故曰衝牙天子佩白玉而玄組綬公侯佩山玄玉而朱組綬大夫佩水蒼玉而純組綬世子佩瑜玉而綦組綬士佩瓀玫而緼組綬注曰玉有山玄水蒼者視之文色所似也綬者所以貫佩玉相承受也純當為緇古文緇字或作絲旁才綦文雜色也緼赤黃疏曰尊者玉色純公侯以下玉色漸雜世子及士唯論玉質不明玉色則不定也世子承上天子諸侯則天子諸侯之子也然諸侯世子雖佩瑜玉亦應降殺王世子綦青黑色瓀玫石次玉者孔子佩象環五寸而綦組綬集説曰象環象牙之環也其廣五寸孔子謙不佩玉故燕居佩之非謂禮服之正佩也童子之節也緇布衣錦緣錦紳并紐錦束髮皆朱錦也集説曰節禮節也錦緣以錦為緇布衣之緣也紳紐見前束髮者以錦為總而束髮也皆朱錦者言所用之錦皆朱色也童子不裘不帛不屨絇無緦服聽事不麻無事則立主人之北南面見先生從人而入集説曰不屨絇未習行戒也無緦服謂父在時己雖有緦親之喪不為之著緦服但往聽主人使令之事不麻謂免而深衣不加絰也主人喪主也問喪云童子不緦唯當室緦當室為父後者也童子未能習禮且緦輕故父在不緦父沒則本服不可違矣從人而見先生不敢以卑小煩長者為禮也侍食於先生異爵者後祭先飯客祭主人辭曰不足祭也客飱主人辭以疏主人自置其醬則客自徹之集説曰此言成人之禮先生齒尊於己者異爵爵貴於己者後祭示饌不為己也先飯示為尊貴者嘗之也盛主人之饌故祭而主人辭之謙也既食而飱以為美也而主人辭以粗疏亦謙也醬者食味之主故主人自設客亦自徹禮尚施報也一室之人非賔客一人徹一食之人一人徹凡燕食婦人不徹集説曰一室之人同居共事者也一猶聚也一食之人為同事而相聚以食者也若賔客則各徹其饌二者皆為無賔主之分故但推少者一人徹之而已坡謂特牲少牢皆有婦人徹之禮此不徹者惟燕食耳注云婦人質不備禮是也非不勝事之謂食棗桃李弗致于核瓜祭上環食中棄所操集説曰致謂委棄之也曲禮曰其有核者懷其核環橫切之圓如環也上環是疐間下環是脫華處凡食果食者後君子火孰者先君子集説曰古人嘗藥嘗食蓋恐其不善或為尊者害耳果食生成之味當使尊者先食火孰者先君子嘗食之禮也有慶非君賜不賀集説曰君賜如爵命土田車服之類皆是也言卿大夫士之家設有喜慶之事若是君命所賜則當賀非君賜則不賀蓋以君賜為榮也有憂者集説曰此下缺文孔子食於季氏不辭不食肉而飱集説曰為客之禮將食必興辭食則先胾次殽至肩乃飽而飱孔子既不辭又不食肉乃獨澆飯而為飱之禮蓋以季氏之饋失禮故也君賜車馬乘以拜賜衣服服以拜賜集説曰君賜及門既拜受矣明日又乘服詣君所而拜謝其賜所謂再拜敬之至也二賜字句絶本朱子説君未有命弗敢即乘服也集説曰此謂諸侯之卿大夫為使臣而受天子之賜歸而獻諸其君君命之乘服乃得乘服故君未有命不敢即乘服也左傳杜泄將以路葬南遺謂季孫曰叔孫未乘路葬焉用之季孫使杜泄舍路不可曰夫子受命於朝而聘于王王思舊勳而賜之路復命而致之君君不敢逆王命而復賜之君賜稽首據掌致諸地集説曰據按也郤右手而覆左手以按于右手之上致至也頭及手俱至地也酒肉之賜弗再拜集説曰己拜受于家而明日又往拜謂之再拜酒肉之賜輕故惟拜受於家而已凡賜君子與小人不同日集説曰君子小人以位言君子曰賜小人曰與貴賤殊故不可同日也凡獻於君大夫使宰士親皆再拜稽首送之膳於君有葷桃茢於大夫去茢於士去葷皆造於膳宰集説曰大夫不親往而使宰者恐勤君之降禮而受獻也士賤故得自往皆再拜稽首送之者言大夫初遣宰時已拜送矣及至君門以授小臣則或宰或士亦皆再拜而送之也膳美食也葷薑及辛菜也茢菼帚也膳宰主飲食者方氏曰膳必用葷桃茢者防不祥之物或干之也桃以其性葷以其氣茢以其形形不如氣氣不如性故貴賤多少之數去其一者茢去其二者葷惟桃不可去焉皆造膳宰者以不敢専達必待主膳之人達之也大夫不親拜為君之答已也集説曰釋所以不親獻之義大夫拜賜而退士待諾而退又拜弗答拜集説曰大夫往君門而拜君昨日所賜及門即告小臣小臣入白大夫即拜拜竟即退不待小臣出報恐君召進而答拜也君不答士之拜故士拜竟則待小臣傳君之諾報而後退也又拜者小臣傳諾報而出士又拜君之諾也弗答拜謂君終不答士之拜也大夫親賜士士拜受又拜於其室衣服弗服以拜敵者不在拜於其室集説曰其室大夫之家也衣服弗服以拜下於君賜也敵者尊卑相等也其室獻者之家也若當時主人在家而拜受則不復往彼家拜謝今主人不在不得拜受還家必往而拜之也若朋友則非祭肉不拜凡於尊者有獻而弗敢以聞集説曰此謂獻辭也不敢以聞者不敢直言獻於尊者如云致馬資於有司及贈從者之類也士於大夫不承賀下大夫於上大夫承賀集説曰士於大夫尊卑逺若有慶事不敢受大夫之親賀下夫夫於上大夫尊卑近故可承受其親賀也親在行禮於人稱父人或賜之則稱父拜之方氏曰不敢私交不敢私受故也禮不盛服不充故大裘不裼注曰禮盛者服充大事不崇曲敬疏曰充猶襲也大裘不裼者證禮盛服充時也郊禮大裘無别衣裼之是不見美也乘路車不式疏曰路車謂玉路郊天車也不式謂乘車從門閭過不式父命呼唯而不諾手執業則投之食在口則吐之走而不趨集説曰應辭唯速而恭諾緩而慢親老出不易方復不過時親癠色容不盛此孝子之疏也集説曰易方則恐召己而莫知所在過時則恐失期而貽親之憂癠病也不盛憂形于色也疏節謂常行疏略之禮而已非大節也父沒而不能讀父之書手澤存焉爾母沒而杯圈不能飲焉口澤之氣存焉爾集説曰不能猶不忍也手之所持猶存其潤澤之迹杯圈盛酒漿之器屈木為之若巵匜之屬也口澤之氣亦謂常用以飲故口所潤澤猶有餘氣此所以不忍讀不忍飲也君入門介拂闑大夫中棖與闑之間士介拂棖集説曰此言兩君相見之時入門入大門也介副也闑門中央所豎短木也棖者門之兩旁長木所謂楔也君入當棖闑之中主君在闑東賔在闑西主君上擯在君後稍近西而拂闑賔之上介在賔後稍近東而拂闑大夫之為擯為介者各當君後而在棖闑二者之中士之為擯為介者則各拂東西之棖也賔入不中門不履閾公事自闑西私事自闑東集説曰此賔謂鄰國來聘之卿大夫也入不中門謂不當闑西棖闑之中而稍東近闑也閾門限也聘享是奉君命而行謂之公事入自闑西用賔禮也若私覿私面謂之私事以其非君命故也入自闑東從臣禮也君與尸行接武大夫繼武士中武徐趨皆用是疏曰君謂天子諸侯也接武謂二足相躡每蹈於半不得各自成迹也若大夫與其尸行則兩足迹相接續漸卑故與尸行步稍廣速也中猶間也士與其尸行每徙足間容一足地乃躡之士極卑故與尸行步極廣也徐趨遲行也皆皆於君大夫士也言皆用此與尸行步之節疾趨則欲發而手足毋移集説曰此言若以他事行禮而當疾趨者其屨頭欲發起不以接武繼武為拘然而手容必恭足容必重不可或低或斜而變其常度移猶變也圈豚行不舉足齊如流席上亦然集説曰此釋上徐趨之形圈轉也豚之言循讀為上聲謂徐趨之法當曳轉其足循地而行不舉足者謂足不離地齊裳下緝也足既不舉身又俯折則裳下委于地而曳足則齊如水之流席上亦然言未坐之時行於席上亦當如此也端行頤霤如矢辨行剡剡起屨集説曰此覆上疾趨之節端直也直身而行身亦小折故頭直臨前而頤如屋霤之垂其步之進則如矢之直也辨急也剡剡身起之貌急行則欲速而身屨恆起也執龜玉舉前曳踵蹜蹜如也集説曰此論徐趨之事踵足後跟也舉足之前而曳其後跟則行不離地如有所循也蹜蹜促狹之貌龜玉皆重器故敬謹如此凡行容惕惕集説曰惕惕直而且疾也謂行於道路則然蓋回枉則失容舒緩則近惰也廟中齊齊朝廷濟濟翔翔集説曰齊齊收持嚴正之貌以對神不敢舒散也濟濟威儀詳整也翔翔張拱安舒也君子之容舒遲見所尊者齊遫集説曰舒遲間雅之貌齊如夔夔齊栗之齊遫者謹而不放之謂見所尊者故加敬足容重手容恭注曰重舉欲遲也恭髙且正也目容端口容止注曰無睇視不妄動聲容靜頭容直集説曰無或噦咳欲其靜也無或傾顧欲其直也氣容肅注曰似不息者立容德集説曰德應氏謂中立不倚儼然有德之氣象也色容莊坐如尸集説曰莊矜持之貌也坐如尸見曲禮燕居告溫溫集説曰詩言溫溫恭人燕居之時於告語於人之際則皆欲其溫和所謂居不容寬柔以教也凡祭容貌顔色如見所祭者集説曰論語曰祭如在祭神如神在喪容纍纍色容顛顛視容瞿瞿梅梅言容繭繭集説曰此皆居喪之容纍纍羸憊失意之貌顛顛憂思不舒之貌瞿瞿驚遽之貌梅梅猶昧昧瞻視不審故瞿瞿梅梅然也繭繭猶綿綿聲氣低微之貌也戎容暨暨言容詻詻色容厲肅視容清明集説曰此皆軍旅之容暨暨果毅之貌詻詻教令嚴飭之貌顔色欲其嚴厲而莊肅視瞻欲其瑩徹而明審立容辨卑毋讇集説曰立之容貶卑者不為矜髙之態也雖貴貶損卑降而必貴於正若傾側其容柔媚其色則流於諂矣故戒以毋諂焉頭頸必中集説曰頭容欲直山立集説曰如山之嶷然不搖動也時行集説曰當行則行盛氣顛實揚休集説曰顛讀為填塞之填實滿也揚讀為陽休與煦同氣體之充也言人當養氣使充盛填實于內故息之出也若陽氣之煦物其來無窮也玉色集説曰玉無變色故以為顔色無變動之喻石梁王氏曰立容以下不屬戎容凡自稱天子曰豫一人集説曰一者無對之稱伯曰天子之力臣集説曰天子三公一相處內二伯分主畿外諸侯蓋股肱之臣宣力四方者也故曰力臣此伯自稱于諸侯也諸侯之於天子曰某土之守臣某集説曰某土猶云東土西土之類其在邊邑曰某屏之臣某集説曰邊邑逺謂之屏者藩屏之義所以蔽內而捍外也其於敵以下曰寡人小國之君曰孤擯者亦曰孤集説曰此章與曲禮小異者此據自稱為辭彼則擯者之辭也上大夫曰下臣擯者曰寡君之老下大夫自名擯者曰寡大夫世子自名擯者曰寡君之適坡謂自此至外私其上句皆是自稱於己國之君有擯者曰則對他國之辭於大夫亦謂自稱於大夫也公子曰臣孽疏曰稱臣謂對己君也若對他國當云外臣集説曰適而傳世者謂之世子餘則但稱公子而已讀孽為枿者蓋比之木生之餘也故以臣孽自稱士曰傳遽之臣於大夫曰外私集説曰驛傳之車馬所以供急遽之令士賤而給車馬之役使故自稱傳遽之臣也家臣稱私此大夫非己所臣事者故對之言則自稱外私也大夫私事使私人擯則稱名集説曰私事謂非行聘禮而以他事奉君命往使若晉侯使韓穿來言汶陽之田歸齊之類隨行之人當謂之介曰擯者擯是主人之副今以在賔館而主國致禮則己為主人故稱擯也私人己之屬臣也私事使而私人擯則無問上大夫下大夫皆降而稱名以非正聘故也公士擯則曰寡大夫寡君之老集説曰公士公家之士也若正行聘禮以公士為擯其下大夫往行小聘之禮則擯辭稱寡大夫其上大夫往行大聘之禮則擯辭稱寡君之老大夫有所往必與公士為賓也集説曰賔讀為擯介也謂大夫有正聘之往必使公士作介也禮記述注卷十三
