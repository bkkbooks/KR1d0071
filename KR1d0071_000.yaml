body:
  text: 禮記述注禮類三禮記之屬提要臣等謹案禮記述注二十八卷國朝李光坡撰光坡有周禮述注已著録是編成於康熙戊子前有自序云始讀陳氏集說疑其未盡及讀注疏又疑其未誠如序內稱鄭氏祖䜟孔氏惟鄭之從不載他說以為可恨鄭氏祖䜟莫過於郊特牲之郊祀祭法之禘祖宗而孔氏正義皆取王鄭二說各為臚列其他自五禮大者至零文單字備載衆詁在諸經注疏中最為詳核何妄詆歟又禮器篇斥後代封禪為鄭祖䜟啓之秦皇漢武前鄭數百年亦鄭注啓之乎又多約注疏而成鮮有新意而指注疏為舊說凡此之類抵冒前人即欺負後生何以示誠乎抑譏漢唐儒者說理如夢此程朱進人以知本吾儕非其分也今於禮運則輕其出於老氏樂記則少其言理而不及數其他多指為漢儒之附㑹逐節不往復其文義通章不鈎貫其脈絡而訓禮運之本仁以聚亦曰萬殊一本一本萬殊仲尼燕居之仁鬼神仁昭穆亦曰克去己私以全心德欲以方軼前人恐未能其退舍也云云其論可謂持是非之公心掃門户之私見雖義取簡明不及鄭孔之賅博至其精要亦略備於斯終勝陳澔之弇陋也乾隆四十六年三月恭校上總纂官臣紀臣昀陸錫熊臣孫士毅總校官臣陸費墀禮記述注序諸經注疏共最禮記朱子教學者看注看疏自好然文字浩汗班史謂說五字之文至二三萬言者蓋漢唐講師之體爾也又與諸經連部合梓價重匹士家不能皆有即有而讀之亦何得於制舉故是書不講殆千年矣宋末有陳氏集說學者喜其便祧注疏而崇焉明初為之大全裒然列於太學坡始受之竊病其未盡及讀注疏又疑其未誠如序內稱鄭氏祖䜟孔氏惟鄭之從不載他說以為可恨夫祖䜟莫過於郊特牲之郊祀祭法之禘郊祖宗而孔氏正義皆取王鄭二說各為縷列不特此也考之全經自五禮大者至零文單字備載衆詁在諸經注疏中最為詳核何妄詆與又禮器篇斥後代封禪為鄭祖緯啓之秦皇漢武前鄭數百年亦鄭預啓之乎又多約注疏而成鮮有新解時而指注疏為舊說舊說似矣時而著鄭氏曰疏曰至著鄭曰疏曰盎有德色若不遺葑菲者凡此之類抵冒前人即欺負後生何以示誠乎抑譏漢唐儒者說理如夢此程朱進人以知本吾儕非其分也今於禮運則輕其出於老氏樂記則少其言理而不及數其他整篇完文多指為漢儒之傳會逐節不往復其文義通章不鈎貫其脈絡而訓禮運之本仁以聚亦曰萬殊一本一本萬殊燕居之仁鬼神仁昭穆亦曰克去己私以全心德欲以方軼前人恐未得其退舍也許魯齊曰宋文章近理者多然得實理者亦少世所謂彌近理而大亂真學者須著眼目知要之言可以發矇矣至大全所集尤為狼藉未論其它彼陳氏方恨孔惟鄭從不載它說而其首例云一以集說為宗不合者不取何自悖也今也不量其力本述注疏朱子之教也陳氏雜合注疏諸儒為文或仍之或以注疏增其未備損其枝辭標集說曰從其實也凡諸篇皆妄次第為之條理童而習白首而修尊所得於遺經者以施於子弟切磋究之為就正之資而非敢曰有得也若夫侈口經緯廣張質文何異以丹青之陳色繪日月之生氣栁州所謂非愚則惑不敢犯也康熙戊子清溪李光坡謹序孔子六世祖嘉被宋督難後曽孫防叔奔魯必以殷禮來如王子朝以成周之典籍奔楚是也故學孔氏之門多是殷禮孟子言周班爵祿與周官異與王制同言井田不能詳周法反推殷助引周詩以證可見矣此經皆原本師門則注疏言是夏殷禮者當推尋究竟未可遽斥臆說也王府圖書學士大夫不輕得見坡論詳郊特牲程朱出經中大學中庸為孔門傳心至矣然禮運樂記或云非洙泗微文私心則疑不惟此也凡此經及史子之拾遺掇逸謂是子言意皆有自來但至者有淺深故所録有完闕耳吾儕誦之隨分盡心至有厚薄醇醨之異則存所疑以質師友公然妄罵竊恐未能信人徒先失已也解經惟當求意義之合如此經首篇曲禮首節毋不敬三言劉氏必取曽子動容貌三事當之如此比校初何補於用力之實徒使學者胸次滯底不圓朱子所云方觀大學一句便說向中庸上彼此迷暗互相連纍是也每詈漢儒臆說然解說中若此之類雖有左證且從臆說也經文不解指為傳㑹注疏曲折指為支離然傳㑹者世近於古支離者學多於吾不顧理之是非而漫為指斥則將何所承受取信也太極圖二程子不肯輕易示世數百年中見後生不禮前人然後知程子之慮民也深
