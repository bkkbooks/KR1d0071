body:
  text: 禮記述注卷十六安溪李光坡撰樂記第十九疏曰鄭云名曰樂記者以其記樂之義蓋十一篇合為一篇謂有樂本有樂論有樂施有樂言有樂禮有樂情有樂化有樂象有賓牟賈有師乙有魏文侯今則合焉次則奏樂第十二樂器十三樂作十四意始十五樂穆十六説律十七季札十八樂道十九樂義二十昭本二十一昭誦二十二竇公二十三此劉向校書得樂記二十三篇著於别録者武帝時河間獻王好博古與諸生共採周官及諸子云樂事者以作樂記其內史丞王度傳之以授常山王禹禹成帝時為謁者獻二十四篇樂記與向録不同凡音之起由人心生也人心之動物使之然也感於物而動故形於聲聲相應故生變變成方謂之音比音而樂之及干戚羽旄謂之樂注曰雜比曰音單出曰聲干盾也戚斧也武舞所執也羽翟羽也旄旄牛尾也文舞所執疏曰人心既感外物而動口以宣心其心形見于聲既有聲自然一髙一下或清或濁而相應不同故云生變變謂不恆一聲變動清濁也聲既變轉和合次序成就文章謂之音也音則今之歌曲也次比音之歌曲而樂器播之并及干戚羽旄鼓而舞之乃謂之樂也樂者音之所由生也其本在人心之感於物也是故其哀心感者其聲噍以殺其樂心感者其聲嘽以緩其喜心感者其聲發以散其怒心感者其聲粗以厲其敬心感者其聲直以廉其愛心感者其聲和以柔六者非性也感於物而后動疏曰此一節復明上文感物而動之意合音乃成樂是樂由此音而生故曰音之所由生也方氏曰人之情得所欲則樂喪所欲則哀順其心則喜逆其心則怒於所畏則敬於所悅則愛熊氏曰哀則氣鬱故噍氣歉故殺樂則辭氣發揚故嘽辭氣雍容故緩喜則冀其方來故發鳴其得意故散怒則氣不平故粗氣不和故厲敬則言語徑遂不阿故直言語剖析不混故廉愛則與物無競故和不拂人情故柔六者感物而動乃情也非喜怒哀樂未發之性也是故先王慎所以感之者故禮以道其志樂以和其聲政以一其行刑以防其姦禮樂刑政其極一也所以同民心而出治道也劉氏曰慎其政之所以感人心者故以禮而道其志之所以行使必中節以樂而和其聲之所言使無乖戾政以教不能而一其行刑以罰不率而防其姦禮樂刑政四者之事雖殊而其致則一歸於慎其所以感之者所以同民心而出治道也坡謂方慎感其心使形于聲音以為作樂之本安得遽有樂可以和其聲董子曰王者未作樂之時乃用先王之樂宜于世者而以深入教化于民意此樂是歟凡音者生人心者也情動于中故形于聲聲成文謂之音是故治世之音安以樂其政和亂世之音怨以怒其政乖亡國之音哀以思其民困聲音之道與政通矣集説曰此言音生于人心之感而人心哀樂之感由于政治之得失此所以慎其所以感之者也治世政事和諧故形于聲音者安以樂亂世政事乖戾故形于聲音者怨以怒將亡之國其民困苦故形于聲音者哀以思此聲音所以與政通也宫為君商為臣角為民徵為事羽為物五者不亂則無怗懘之音矣注曰五者君臣民事物也凡聲濁者尊清者卑怗懘敝敗不和貌疏曰按樂緯動聲儀云宫為君君者當寬大容衆故聲宏以舒其和情以桑動脾也商為臣臣者當以發明君之號令其聲散以明其和溫以斷動肺也角為民民者當約儉不奢僣差故其聲防以約其和清以靜動肝也徴為事事者君子之功既當急就之其事當久流亡故其聲貶以疾其和平以功動心也羽為物物者不有委聚故其聲散以虛其和斷以散動腎也又云宫倡而商和是謂善太平之樂注云君臣相和角從宫是為哀衰國之樂注云象人有怨訴羽從宫往而不反是為悲亡國之樂注云悲傷於財竭又云音相生者和注云彈羽角應彈宫徴應是其和樂以此言之相生應即為和不以相生應則為亂也爾雅曰宫為重商為敏角為經徴為迭羽為栁管子曰凡聽徴如負豬豕覺而駭凡聽羽如鳴馬在樹朱子云馬疑當作鳥凡聽宫如牛鳴窖中凡聽商如離羣羊凡聽角如雉登木以鳴音疾以清坡謂疏所載樂緯有事可紀有聲可别合之宗伯大師聽軍聲之注爾雅之字訓管子所形容三代之遺音猶可參訂也若徒求聲氣於器數分毫之末僅以清濁盡五聲之别恐未免附會而更成畫餅也宫亂則荒其君驕商亂則陂其官壞角亂則憂其民怨徴亂則哀其事勤羽亂則危其財匱五者皆亂迭相陵謂之慢如此則國之滅亡無日矣注曰君臣民事物其道亂則其音應而亂荒猶散也陂傾也坡謂宫為君節以申明政和則音安樂也此節以申明政乖民困則音哀怨也鄭衛之音亂世之音也比於慢矣桑間濮上之音亡國之音也其政散其民流誣上行私而不可止也集説曰此慢字承上文謂之慢而言比近也桑間濮上衛地濮水之上地有桑間者在濮陽南史記言衛靈公適晉舍濮上夜聞琴聲召師涓聽而寫之至晉命涓為平公奏之師曠曰此師延靡靡之樂武王伐紂師延投濮水死故聞此聲必於濮水之上也政散故民罔其上民流故行其淫蕩之私也坡謂上言聲之荒陂之等君臣驕壞之故不可言傳故舉鄭衛使學者考其事玩其辭審其意而自有以得其實也凡音者生於人心者也樂者通倫理者也是故知聲而不知音者禽獸是也知音而不知樂者衆庶是也唯君子為能知樂是故審聲以知音審音以知樂審樂以知政而治道備矣是故不知聲者不可與言音不知音者不可與言樂知樂則幾於禮矣禮樂皆得謂之有德德者得也注曰幾近也聽樂而知政之得失則能正君臣民事物之禮也疏曰倫類也理分也樂得則隂陽和樂失則羣物亂是樂能經通倫理也隂陽萬物各有倫類分理者也審樂知政者樂由聲音相生聲感善惡而起若能審樂則知善惡之理行善不行惡習是不習非知為政化民而治道備矣者政善樂和音聲皆善人事皆無僻則治道備具矣方氏曰凡耳有所聞者皆能知聲心有所識者則能知音道有所通者乃能知樂若瓠巴鼓瑟流魚出聽伯牙鼓琴六馬仰秣此禽獸之知聲者也魏文侯好鄭衛之音齊宣王好世俗之樂此衆庶之知音者也若孔子在齊之所聞季札聘魯之所觀此君子之知樂者也應氏曰倫理之中皆禮之所寓知樂則通于禮矣不曰通而曰幾者辨析精微之極也坡謂上言政和政乖而形于音之哀樂君子得禮樂於心則審樂之哀樂可知政之和平矣是故樂之隆非極音也食饗之禮非致味也清廟之瑟朱絃而疏越一倡而三歎有遺音者矣大饗之禮尚玄酒而俎腥魚大羮不和有遺味者矣是故先王之制禮樂也非以極口腹耳目之欲也將以教民平好惡而反人道之正也集説曰樂之隆盛不是為極聲音之美食饗禘祫之重禮不是為極滋味之美蓋樂主于移風易俗而祭主于報本反始也鼓清廟之詩之瑟練朱絲以為絃絲不練則聲清練之則音濁疏通也越瑟底之孔也疏而通之使其聲遲緩瑟聲濁而遲是質素之聲非要妙之音也此聲初發一倡之時僅有三人從而和之言和者少也以其非極聲音之美故好者少然而其中則有不盡之餘音存焉故曰有遺音者矣尊以玄酒為尚俎以生魚為薦大羮無滋味之調和是質素之食非人所嗜恱之味也然而其中則有不盡之餘味存焉故曰有遺味者矣由此觀之是非以極口腹耳目之欲也教民平好惡謂不欲其好惡之偏私也人道不正必自好惡不平始好惡得其平則可以復乎人道之正而風移俗易矣坡謂此申樂通于倫理之大非徒如聲音之娛心志恱耳目僅足于衆庶禽獸之聞也先王是君子而在位者故有得于禮樂而制之以教民也人生而靜天之性也感于物而動性之欲也物至知知朱子曰上知字是體下知字是用然後好惡形焉好惡無節于內知誘于外不能反躬天理滅矣夫物之感人無窮而人之好惡無節則是物至而人化物也人化物也者滅天理而窮人欲者也于是有悖逆詐偽之心有淫泆作亂之事是故強者脅弱衆者暴寡知者詐愚勇者苦怯疾病不養老幼孤獨不得其所此大亂之道也劉氏曰人生而靜者喜怒哀樂未發之中天命之性也惑于物而動則性發而為情也人心虛靈知覺事至物來則必知之而好惡形焉好善惡惡則道心之知覺原于義理者也好妍惡醜則人心之知覺發于形氣者也好惡無節于內而知誘于外則是道心昧而不能為主宰人心危而物交物則引之矣不能反躬以思其理之是非則人欲熾而天理滅矣況以無節之好惡而接乎無窮之物感則心為物役而違禽獸不逺矣違禽獸不逺則爪剛者決力強者奪此所以為大亂之道也熊氏曰此原好惡之所自始而推好惡無節之害也大亂之道由不能平好惡不能反道之正也是故先王之制禮樂人為之節衰麻哭泣所以節喪紀也鍾鼓干戚所以和安樂也昏姻冠笄所以别男女也射鄉食饗所以正交接也禮節民心樂和民聲政以行之刑以防之禮樂刑政四達而不悖則王道備矣劉氏曰先王之制禮樂因人情而為之節文因其哀死而喪期無數故為衰麻哭泣之數以節之因其好逸樂而不能和順于義理故為鍾鼓干戚之樂以和之因其有男女之欲而不知其别故為昏姻冠笄之禮以别之因其有交接之事而或失其正故為射鄉食饗之禮以正之節其心所以使之行而無過不及和其聲所以使之言而無所乖戾為之政以率其怠倦而使禮樂之教無不行為之刑以防其恣肆而使禮樂之道無敢廢禮樂刑政四者通行于天下而民無悖違之者則王者之治道備矣坡謂上言好惡無節故先王為之節節則不極矣窮人欲者極也以申上文先王之制禮樂非以極口腹耳目之欲之意樂者為同禮者為異同則相親異則相敬樂勝則流禮勝則離合情飾貌者禮樂之事也禮義立則貴賤等矣樂文同則上下和矣好惡著則賢不肖别矣刑禁暴爵舉賢則政均矣仁以愛之義以正之如此則民治行矣集説曰和以統同序以辨異樂勝則流過于同也禮勝則離過于異也合情者樂之和于內所以救其離之失飾貌者禮之檢于外所以救其流之失此禮樂所以相資為用者也仁以愛之則相敬而不至于離義以正之則相親而不至于流此又見禮樂為仁育義正之大者也故謂上文禮節樂和節者異和者同而因言其相資也樂文也好也爵也皆仁以愛之也禮義也惡也刑也皆義以正之也既等既和既别既均則行民治而民治行矣樂由中出禮自外作樂由中出故靜禮自外作故文大樂必易大禮必簡樂至則無怨禮至則不爭揖讓而治天下者禮樂之謂也暴民不作諸侯賓服兵革不試五刑不用百姓無患天子不怒如此則樂達矣合父子之親明長幼之序以敬四海之內天子如此則禮行矣劉氏曰欣喜歡愛之和出于中進退周旋之序著于外和則情意安舒故靜序則威儀交錯故文大樂與天地同和如乾以易知而不勞大禮與天地同節如坤以簡能而不煩樂至則人皆得其所而無怨禮至則人各安其分而不爭如帝世揖讓而天下治者禮樂之至也達者徹于彼之謂行者出于此之謂行者達之本達者行之效天子自能合其父子之親明其長幼之序則家齊族睦矣又能親吾親以及人之親長吾長以及人之長是謂以敬四海之內則禮之本立而用行矣禮之用行而後樂之效達故于樂但言天子無可怒者而于禮則言天子如此是樂之達乃天子行禮之效也周子曰萬物各得其理而後和故禮先而樂後是也坡謂合情故自中出飾貌故自外作相親相敬根于人心之自然故易簡相親故無怨相敬故不爭無怨則樂達不爭則禮行自樂者為同至此二節以申上文教民平好惡而反人道之正之意大樂與天地同和大禮與天地同節和故百物不失節故祀天祭地明則有禮樂幽則有鬼神如此則四海之內合敬同愛矣禮者殊事合敬者也樂者異文合愛者者也禮樂之情同故明王以相沿也故事與時並名與功偕注曰沿猶因述也事與時並為事在其時也禮器曰堯授舜舜授禹湯放桀武王伐紂時也名與功偕為名在其功也偕猶俱也堯作大章舜作大韶禹作大夏湯作大濩武王作大武名因其得天下之功疏曰天地氣和而生萬物大樂之體順隂陽律吕生養萬物是同和也天地之形各有高下大小為限節大禮辨尊卑貴賤與天地相似是同節也同和能生成百物故不失其性也同節有尊卑上下報生成之功故祀天祭地朱子曰禮主減樂主盈鬼神亦止是屈伸之義禮樂鬼神一理又曰在聖人制作處便是禮樂在造化功用處便是鬼神禮有經禮曲禮之事殊而敬一樂有五聲六律之文異而愛一所以能使四海之內合敬同愛者皆大樂大禮之所感化也熊氏曰惟禮樂之情同一愛敬故明主迭興以此情相沿而不變制禮但因時異事而敬之情不異也作樂但因功異名而愛之情不異也坡謂祀天祭地不失其節則凡天地之中高下萬有皆無有失節者矣亦上百物不失之意此一節言禮樂之情見非聖不知也故鐘鼓管磬羽籥干戚樂之器也屈伸俯仰綴兆舒疾樂之文也簠簋俎豆制度文章禮之器也升降上下周還裼襲禮之文也集説曰綴舞者行位相連綴也兆位外之營兆也裼襲説見曲禮坡謂此節言禮樂之文見非明不能識也故知禮樂之情者能作識禮樂之文者能述作者之謂聖述者之謂明明聖者述作之謂也熊氏曰情即上文愛敬之情也情者禮樂之原惟能洞見之則因情立文創前人所未有而能作文即上文器文之文也文者禮樂之成章惟能通曉之則考文修墜衍既往于無窮而能述作者生知安行聖人也述者多學多識明者也樂者天地之和也禮者天地之序也和故百物皆化序故羣物皆别樂由天作禮以地制過制則亂過作則暴明于天地然後能興禮樂也朱子曰樂由天作屬陽故有運動底意禮以地制如由地出不可移易劉氏曰過制則失其序如隂過而肅則物之成者復壞矣故亂過作則失其和如陽過而亢則物之生者反傷矣故暴熊氏曰此言樂不但同和實則天地之和禮不但同節實則天地之序天地惟和故百物皆化生惟序故羣物皆有别然和主氣氣行于天而樂則法之以作序主質質具于地而禮則法之以制倘過制而不法地則亂而無序過作而不法天則暴而不和必洞達乎天地之和序然後能制禮作樂也坡謂明于天地所謂知禮樂之情也自此以下至殷周之樂盡矣皆言作樂事所謂作者之聖也論倫無患樂之情也欣喜歡愛樂之官也中正無邪禮之質也莊敬恭順禮之制也若夫禮樂之施于金石越于聲音用于宗廟社稷事乎山川鬼神則此所與民同也疏曰施于金石二句此明樂也用于宗廟二句此明禮也若通而言之則禮樂相將矣劉氏曰論者雅頌之辭倫者律吕之音惟其辭足論而音有倫故極其和而無患害此樂之本情也而在人者則以欣喜歡愛為作樂之官主焉中者行之無過不及正者立之不偏不倚惟其立之正而行之中故得其序而無邪僻此禮之本質也而在人者則以莊敬恭順為行禮之節制焉斯義也聖人之所獨知也若夫施之氣而播之聲以事乎鬼神者則禮樂之數衆人之所共知者也坡謂論倫八句明禮樂為天地和序之意王者功成作樂治定制禮其功大者其樂備其治辨者其禮具干戚之舞非備樂也孰亨而祀非達禮也五帝殊時不相沿樂三王異世不相襲禮樂極則憂禮粗則偏矣及夫敦樂而無憂禮備而不偏者其唯大聖乎注曰功成治定同時耳功主于王業治主于教民辨遍也樂以文德為備若咸池者孔子曰韶盡美矣又盡善也謂武盡美矣未盡善也達具也郊特牲曰郊血大饗腥三獻爓一獻孰至敬不饗味而貴氣臭也不相沿襲言其有損益也疏曰此論禮樂之迹損益有殊云不相襲也若論禮樂之情則聖王同用故前文云禮樂之情同故明王以相沿也樂人之所好好而不止放蕩奢佚故害在淫誇若朋淫于家俾晝作夜物極則反樂去憂來又煩手淫聲慆堙心耳則哀痛生也禮粗則偏者言人不能勤行于禮好生懈倦則致粗略偏謂不周備也敦厚也厚重于樂知足則止而無至于憂也行禮安靜委曲備具不至勤苦倦略能如此者其唯大聖乎坡謂樂極者過作也崇不效天則暴而不和故憂禮粗者過制也卑不法地則亂而無序故偏惟聖人建中和之極故能敦厚于樂全備其禮也所謂作者之謂聖也天高地下萬物散殊而禮制行矣流而不息合同而化而樂興焉春作夏長仁也秋斂冬藏義也仁近于樂義近于禮樂者敦和率神而從天禮者别宜居鬼而從地故聖人作樂以應天制禮以配地禮樂明備天地官矣熊氏曰申明禮樂本于造化而言聖人制作之功也天上地下萬物各正性命而散殊其間是自然之序而禮行于此矣天地之氣周流不息萬物合同以化生是自然之和而樂興于此矣物作于春長于夏乃天地生物之仁也物斂于秋藏于冬乃天地成物之義也仁則藹然而和近于樂義則截然而序近于禮是以樂能敦厚其和率循其神之陽氣而從天以生物禮能辨别其宜安定其鬼之隂氣而從地以成物故聖人在上作樂以應天之和制禮以合地之宜至禮樂明備則以和序贊和序天地亦賴其助而生成萬物不失其職矣天尊地卑君臣定矣卑高以陳貴賤位矣動靜有常小大殊矣方以類聚物以羣分則性命不同矣在天成象在地成形如此則禮者天地之别也集説曰定君臣之禮者取于天地尊卑之勢列貴賤之位者取于山澤卑髙之勢也動者陽之常靜者隂之常小大即禮器有大有小之小大也小者不可益大者不可損故云小大殊矣大者外心揚詡故動而屬陽小者內心精微故靜而屬隂方猶道也聚猶處也君臣父子夫婦長幼朋友各有其道則各以其類而處之所謂方以類聚也物事也行禮之事即昏姻冠笄所以别男女之類設之不止一端分之必各從其黨所謂物以羣分也所以然者以天所賦之命人所受之性自然有此三網五常之倫其間尊卑厚薄之等不容混而一之也故曰性命不同矣象者日月星辰之屬在天成象禮則合于天時形者山川動植之屬在地成形禮則設于地財由此言之禮之有别非天地自然之理乎應氏曰此即所謂天高地下萬物散殊而禮制行矣地氣上齊天氣下降隂陽相摩天地相蕩鼓之以雷霆奮之以風雨動之以四時暖之以日月而百化興焉如此則樂者天地之和也注曰齊讀為躋躋升也摩猶迫也蕩猶動也奮迅也也百化百物化生也疏曰摩謂切迫隂陽二氣相相切迫蕩動也天地之氣相感動雖以氣生而物未發故用雷霆以鼓動之萬物得風雨奮迅而出生長隨四時而動又須日月暖煦之皆相蕩之事細别言之耳應氏曰此即所謂流而不息合同而樂而化興焉化不時則不生男女無辨則亂升天地之情也注曰辨别也升成也樂失則害物禮失則亂人坡謂化音之相生也不時相陵亂也則不能敦和率神而物不生此言禮樂關于天地以反明禮樂明備則天地官意及夫禮樂之極乎天而蟠乎地行乎隂陽而通乎鬼神窮高極逺而測深厚樂著大始而禮居成物著不息者天也著不動者地也一動一靜者天地之間也故聖人曰禮樂云注曰極至也蟠猶委也高逺三辰也深厚山川也言禮樂之道上至于天下委于地則其間無所不之疏曰此盛論禮樂之大原雖取象于天地功德又能遍滿于天地之間天高故言至地下故言委日月嵗時無易百穀用成是行乎隂陽也作樂一變以至六變百神俱至是通乎鬼神也坡謂此言禮樂之成合天地所謂明備而天地官者語皆深切解之費辭以下文比之自見此言極天蟠地彼則奮至德之光此言行隂陽而通鬼神彼則動四氣之和此言窮高測深彼則著萬物之理此言樂著大始彼則清明象天此言禮居成物彼則廣大象地此言著不息者天彼則終始象四時周旋象風雨此言著不動者地彼則五色成文而不亂八風從律而不姦百度得數而有常此言一動一靜天地之間彼則小大相成終始相生倡和清濁迭相為經其成效一也但此言聖作故禮樂同天地彼言明述故禮樂贊天地亦未可差殊觀也故聖人曰禮樂云猶言道在是矣之意昔者舜作五絃之琴以歌南風夔始制樂以賞諸侯故天子之為樂也以賞諸侯之有德者也德盛而教尊五穀時熟然後賞之以樂故其治民勞者其舞行綴逺其治民逸者其舞行綴短故觀其舞知其德聞其諡知其行也應氏曰勤于治民則德盛而樂隆故舞列逺而長怠于治民則德薄而樂殺故舞列近而短坡謂古者王朝樂官惟歌王功夔推此意于侯邦但有治行為作歌舞以為賞典如魯僖公能遵伯禽之訓周天子命史克作為駉駜泮閟之詩使聲于其廟之類三代行之而原其始實自后夔耳非夔制樂専為賞諸侯也石梁王氏不注不疏但接一句即作傲語似上下文理不暇卒讀何其遽也無禮哉大章章之也咸池備矣韶繼也夏大也殷周之樂盡矣疏曰堯樂謂之大章者言堯德章明于天下也咸皆也池施也黃帝樂名咸池言德皆施被于天下無不周遍是為備具矣韶繼也者言舜之道德繼紹于堯也夏大也禹樂名夏者言能光大堯舜之德也殷周之樂謂湯之大濩武王之大武也盡矣言于人事盡極矣天地之道寒暑不時則疾風雨不節則飢教者民之寒暑也教不時則傷世事者民之風雨也事不節則無功然則先王之為樂也以法治也善則行象德矣注曰教謂樂也以法治以樂為治之法行象德民之行順君之德也坡謂此言王者法禮樂以善治也天地寒暑之分劑不時如愆陽伏隂則民感之而多疾風雨之氣候不節如凄風苦雨則五穀不熟而民飢教為民之寒暑者如春誦夏絃或藏修或息遊必有其時一寒暑之發斂也作者過作則暴述以為教而不時亦過作矣故暴而傷世事謂禮也事為民之風雨者如邠風七月或作之或息之皆有其節一風雨之應候也作者過制則亂述以為事而不節亦過制矣故亂而無功先王之為樂凡單言樂者皆含禮也自此節至生民之道樂為大焉皆是法禮樂以為教所謂述者之明也夫豢豕為酒非以為禍也而獄訟益繁則酒之流生禍也是故先王因為酒禮一獻之禮賓主百拜終日飲酒而不得醉焉此先王之所以備酒禍也故酒食者所以合歡也樂者所以象德也禮者所以綴淫也是故先王有大事必有禮以哀之有大福必有禮以樂之哀樂之分皆以禮終樂也者聖人之所樂也而可以善民心其感人深其移風易俗故先王著其教焉注曰以榖食犬豕曰豢為作也言豢豕作酒本以饗祀養賢而小人飲之善酗以致獄訟一獻士飲酒之禮百拜以喻多綴猶止也大事謂死喪也著猶立也疏曰案今鄉飲酒之禮是一獻無百拜此云百拜喻多也坡謂樂以象德以上下文考之是象其人之德如子貢言聲歌各有宜者是也此節言禮樂之用所謂教之時也事之節也夫民有血氣心知之性而無哀樂喜怒之常應感起物而動然後心術形焉疏曰樂聲善惡初則從民心而興後乃合成為樂樂又下感于人善樂感人則人化之為善惡樂感人則人隨之為惡是樂出于人而還感人猶如雨出于山而還雨山火出于木而還燔木故此篇之首論人能興樂此章之意論樂能感人也人由血氣而有心知故連言之其性雖一所感不恆故云無常也內心應感起于外物謂物來感已心遂應之念慮興動故云應感起物而動術所由也心術見者即下文是也熊氏曰此心術乃隨教化世風轉移者是故志微噍殺之音作而民思憂劉氏曰志疑當作急急促微細噍枯殺減也其哀心感者其聲噍以殺故作樂而有急微噍殺之音則民心感之而哀思憂愁矣嘽諧慢易繁文簡節之音作而民康樂集説曰嘽寬諧和慢緩易平也繁文簡節多文理而略節奏也其樂心感者其聲嘽以緩故此等音作則民心感之而安樂矣粗厲猛起奮末廣賁之音作而民剛毅集説曰粗厲粗疏嚴厲也猛威盛貌奮振迅貌起初末終也猛起奮末者猛盛于初起而奮振于終末也廣大賁憤也廣賁言衆音皆怒也其怒心感者其聲粗以厲故此等音作則民感之而剛毅廉直徑正莊誠之音作而民肅敬集説曰亷有稜隅也徑堅強也其敬心感者其聲直以亷故此等音作則民感之而肅敬寬裕肉好順成和動之音作而民慈愛集説曰考工記注云好璧孔也肉倍好曰璧好倍肉曰瑗肉好均曰環如此則肉乃璧之肉地也此言肉好則以璧喻樂音之圓瑩通滑耳其愛心感者其聲和以柔故此等音作則民感之而慈愛流辟邪散狄成滌濫之音作而民淫亂集説曰狄與逖同逺也成者樂之一終狄成言其一終甚長淫泆之意也滌洗也濫侵僣也言其音之泛濫侵僣如以水洗物而浸漬侵濫無分際也此是其喜心感者而其聲發以散聞此音之作則民感之而淫亂矣坡謂自民有血氣至此申明上文其感人深其移風易俗之意是故先王本之情性稽之度數制之禮義合生氣之和道五常之行使之陽而不散隂而不密剛氣不怒柔氣不懾四暢交于中而發作于外皆安其位而不相奪也然後立之學等廣其節奏省其文采以繩德厚律小大之稱比終始之序以象事行使親疏貴賤長幼男女之理皆形見于樂故曰樂觀其深矣集説曰度數十二律上生下生損益之數也禮義貴賤隆殺清濁高下各有其義也生氣之和造化發育之妙也五常之行仁義禮智信之德也使其陽之動而不至于散隂之靜而不至于密剛者之氣不至于怒柔者之氣不至于懾由是三才和氣與樂相湊泊四者和暢交錯于聲容中而精神氣象露于聲音之外凡樂之宫君商臣之等皆安其位而不相奪倫也立之學若樂師掌國學之政大胥掌學士之版是也立之等若十三舞勺成童舞象之類是也廣其節奏增益學者之所習也省其文采省察其音曲之辭使五聲之相和相應若五色之雜以成文采也厚如書惟民生厚之厚德厚五常之存諸身者繩謂檢約人固有之善而使之成德也律以法度整齊之也比以次序聨合之也宫音至大羽音至小律之使各得其稱始于黃鐘之初九終于仲吕之上六比之使各得其序事行五常之行諸事者象示之法也民之事行非有所視法則無以為觀感也人倫之理其得失皆可于樂而見之是樂之所觀其義深奧矣此古有是言記者引以為證坡謂情性先王之情性也本之情性樂之本也稽度數以合生氣之和制禮義以道五常之行自使之陽而不散至不相奪也申合生氣之和自立之學等至皆形見于樂申道五常之行廣其節奏使多有可習而廣不容姦省減也省其文采使習于朴質而狹不思欲小大而律其稱不犯節也終始而比其序不忘本也此一節申明上文先王著其教之意土敝則草木不長水煩則魚龞不大氣衰則生物不遂世亂則禮慝而樂淫是故其聲哀而不莊樂而不安慢易以犯節流湎以忘本廣則容姦狹則思欲感條暢之氣而滅平和之德是以君子賤之也疏曰土之勞敝故草木不長水之煩擾故魚龞不大隂陽之氣衰亂故生物不得遂成上三事皆喻世道衰亂上下無序故禮慝男女不節故樂淫也男女相愛涕泗滂沱是其哀也男女相説歌舞于市井是不莊也俾晝作夜是其樂也終至滅亡是不安也廣謂節間疏緩言聲音寬緩多有姦淫之聲也狹謂節間迫促樂聲急則動發人心思其情欲而切急條逺也言淫聲感動于人損長逺舒暢之善氣而毁滅和平之善德也坡謂此反先王之教而亂者哀而不莊則隂柔之氣不和樂而不安則陽剛之氣不和慢易犯節則不能律小大之稱流湎忘本則不能比終始之序廣則容姦耳非多節奏也狹則思欲耳非省文采也感傷條暢之氣則不能四暢而發作毁滅和平之德則親疏等之理不能形見矣凡姦聲感人而逆氣應之逆氣成象而淫樂興焉正聲感人而順氣應之順氣成象而和樂興焉倡和有應回邪曲直各歸其分而萬物之理各以類相動也疏曰姦聲謂姦邪之聲逆氣謂違逆之氣即姦邪之氣也既聞姦聲又感逆氣二者相合而成象則淫樂興紂作靡靡之樂是也和樂興若周室太平頌聲作也倡和有應者姦聲正聲感人是倡也而逆氣順氣應之是和也回謂乖違邪謂邪僻言乖違邪僻及曲之與直各歸其善惡之分限善歸善分惡歸惡分而萬物之情理亦各以善惡之類自相感動也坡謂此承上文先王正樂亂世姦聲其感于人也有順逆之異以起君子反情比類之事以極移風易俗之理是故君子反情以和其志比類以成其行姦聲亂色不留聰明淫樂慝禮不接心術惰慢邪辟之氣不設于身體使耳目鼻口心知百體皆由順正以行其義集説曰反情復其情性之正也情不失其正則志無不和比類分次善惡之類也不入于惡類則行無不成曰不留不接不設如論語四勿之謂皆反情比類之事坡謂此見必先有禮樂之德乃能述禮樂之文明與聖一也反情以和志合生氣之和也比類以成行道五常之行也姦聲四句和志之事也惰慢二句成行之事也和志則順成行則正以行其義者行先王所本情性之宜也然後發以聲音而文以琴瑟動以干戚飾以羽旄從以簫管奮至德之光動四氣之和以著萬物之理是故清明象天廣大象地終始象四時周還象風雨五色成文而不亂八風從律而不姦百度得數而有常小大相成終始相生倡和清濁迭相為經故樂行而倫清耳目聰明血氣和平移風易俗天下皆寧注曰清明謂人聲也周還謂舞者五色五行也清謂蕤賓至應鐘濁謂黃鐘至中吕倫謂人道也疏曰歌奏之清潔顯明以象于天也寬廣壯大以象于地也終于羽始于宫象四時之變化終而復始也舞者周匝迥還象風雨之迥復也五色者五行之音各依其行色謂宫商角徴羽之聲和合成文不亂也八風八方之風也律十二月之律也白虎通云距冬至四十五日條風至條者生也四十五日明庶風至明庶者迎衆也四十五日清明風至清明者芒也四十五日景風至景者大也言陽氣長養也四十五日涼風至涼寒也隂氣行也四十五日閶闔風至閶闔者咸收藏也四十五日不周風至不周者不交也言隂氣未合化矣四十五日廣莫風至廣莫者大莫也開陽氣也小大相成者十二月律互為宫羽而相成也終始相生者五行官商迭相用為終始倡和者十二律先發聲者為倡應者為和長者濁短者清迭相為經者更相為常即還相為宫是樂之常也熊氏曰言君子志和行成樂本立矣然後以行義而發之詩歌之聲文飾聲音以琴瑟振動形體以干戚裝飾樂具以羽旄隨從諸樂以管簫用奮君子至德之光輝動蕩四時和暢之氣以昭著人之倫理物之生理百度者五音十二律上生下生損益之度樂之百度得一定之數而有常也樂教既通人道之倫無曖昧紛亂在一人則惰慢不設耳目聰明而血氣和平在一世則移風俗而天下皆寧坡謂此述者之明所以善民心移風易俗之成效也與作者之禮樂明備而天地官同故曰樂者樂也君子樂得其道小人樂得其欲以道制欲則樂而不亂以欲忘道則惑而不樂疏曰以道制欲則意得歡樂而不有昏亂也以欲忘道則志意迷惑而不得歡樂也坡謂自此節至樂為大焉皆反覆推明和志成行之意見有德方能述而治己治人乃無不可非徒識禮樂之文偽為于外也是故君子反情以和其志廣樂以成其教樂行而民鄉方可以觀德矣集説曰承上文而言所以君子復情和志以修其身廣樂成教以治乎民及樂之教行而民知向道則可以觀君子之德矣坡謂反情和志制己之欲也廣樂成教去人之惑也德者性之端也樂者德之華也金石絲竹樂之器也詩言其志也歌詠其聲也舞動其容也三者本于心然後樂器從之是故情深而文明氣盛而化神和順積中而英華發外惟樂不可以為偽疏曰三者為志也聲也容也容從聲生聲從志起志從心發三者相因元本從心而來故云本于心聲須合于宫商舞須應于節奏乃成于樂故云樂器從之也坡謂此詳反情以和其志也志聲容皆由心生所謂性之端也詩言之歌詠之舞動之三者皆本于心德所謂德之華也反情以和其志則實情深四暢交于中而發作于外故文明比類以成其行則正氣盛以繩德厚象事行故化神深盛故和順積中文明則英華發于聲容之表化神則英華發于天地之間然則樂之為樂豈可無德徒美于聲容而假偽造作乎樂者心之動也聲者樂之象也文采節奏聲之飾也君子動其本樂其象然後治其飾是故先鼓以警戒三步以見方再始以著往復亂以飭歸奮疾而不拔極幽而不隱獨樂其志不厭其道備舉其道不私其欲是故情見而義立樂終而德尊君子以好善小人以聽過故曰生民之道樂為大焉集説曰樂之將作必先擊鼓以聳動衆聽故曰先鼓以警戒舞之將作必先三舉足以示其舞之方法故曰三步以見方再始謂一節終而再作也往進也亂終也如云關雎之亂歸舞畢而退就位也再始以著往者再擊鼓以明其進也復亂以飭歸者復擊鐃以謹其退也此兩句言舞者周旋進退之事拔如拔來赴往之拔言舞之容雖若奮迅疾速而不過于疾也歌者坐歌不動雖極幽靜而聲發起是不隱也是故君子以之為已則和而平故獨樂其志不厭其道以之為人則愛而公故備舉其道不私其欲情見于樂之初而見其義之立化成于樂之終而知其德之尊君子聽之而好善感發其良心也小人聽之而知過蕩滌其邪穢也故曰以下亦引古語結之熊氏曰樂者心之感物而動也心之動為志心動而發于詩歌之聲則樂之規模已具矣若樂中舞之文采音之節奏則從聲而飾者故君子作樂先動其本而反情和志樂其象而調停音節又飾文采以聲而被之器及干戚羽旄也治其飾即先鼓以下之事坡謂此詳廣樂以成其教也樂也者施也禮也者報也樂樂其所自生而禮反其所自始樂章德禮報情反始也注曰言樂出而不反而禮有往來也馬氏曰舜生于紹堯而施及于天下故作大韶武王生于武功而施及于天下故作大武此樂其所自生也萬物本乎天故先王以郊明天之道人本乎祖故王者禘其祖之所自出此反其所自始也熊氏曰生之所自即德樂樂其所自生則有以章著在內之德始之所自即情禮反其所自始則有以報答其先施之情而反始矣此所以樂為施而禮為報也坡謂自此至可以有制于天下也皆從有禮樂之後推説其理以至天地萬物各得其所之妙以盡上文未發之藴以終聖作明述能事之全所謂大輅者天子之車也龍旗九旒天子之旌也青黑緣者天子之寶龜也從之以牛羊之羣則所以贈諸侯也集説曰天子賜車則上公及同姓侯伯金輅異姓則象輅四衛則革輅蕃國則木輅受于天子則總謂之大輅也龍旗九旒亦上公侯伯則七旒子男則五旒也寶龜則以青黑為之緣飾牛羊非一故稱羣此明報禮之事樂也者情之不可變者也禮也者理之不可易者也樂統同禮辨異禮樂之説管乎人情矣坡謂樂樂其所自生此情自不可變禮反其所自始此理自不可易情不可變則雖更迭抑揚而不離其生故曰統同理不可易則雖厚薄等殺而皆有自始故曰辨異禮樂既為情理之極則所以管攝乎人情而不可斯須去之矣窮本知變樂之情也著誠去偽禮之經也禮樂偩天地之情達神明之德降興上下之神而凝是精粗之體領父子君臣之節注曰偩猶依象也降下也興猶出也凝成也領猶理治也坡謂所自生者本也于不可變之中而有變如哀樂心感其聲各異也窮而知之則樂之情所謂不可以偽為也反其自始者誠也于不可易之中而有易則偽矣著而去之則禮之經如上文所謂不留不接由順正以行義是也偩天地之情同和同節也達神明之德明之禮樂即幽之鬼神也降興上下之神自一變以至九變皆有所致也精禮樂之情也粗禮樂之文也凝其體者禮樂之體也領其節者禮樂之用也是故大人舉禮樂則天地將為昭焉天地欣合隂陽相得煦嫗覆育萬物然後草木茂區萌達羽翼奮角觡生蟄蟲昭蘇羽者嫗伏毛者孕鬻胎生者不殰而卵生者不殈則樂之道歸焉耳注曰言天地將為之昭焉明也欣謂為熹熹猶蒸也氣曰煦體曰嫗屈生曰區無䚡曰觡昭曉也蟄蟲以發出為曉更息曰蘇孕任也鬻生也內敗曰殰殈裂也疏曰天地為昭則下文欣合以下是也天地言體隂陽言氣天地蒸動則是隂陽相得也天以氣煦之地以形嫗之是天煦覆而地嫗育故言煦嫗覆育萬物也䚡謂角外皮滑澤者蟄蟲埋藏近于死今復得活似暗而遇曉死而更生也樂之道歸焉者歸功于樂也樂之根本由人心而生人心調和則樂音純善協律吕之體調隂陽之氣二氣既調故萬物得所也坡謂此大人兼指聖與明者聖者則舉而作之明者則舉而述之皆舉也樂者非謂黃鐘大吕絃歌干揚也樂之末節也故童者舞之鋪筵席陳尊俎列籩豆以升降為禮者禮之末節也故有司掌之樂師辨乎聲詩故北面而絃宗祝辨乎宗廟之禮故後尸商祝辨乎喪禮故後主人是故德成而上藝成而下行成而先事成而後是故先王有上有下有先有後然後可以有制于天下也熊氏曰言禮樂有本末之序以明本之當重也樂德主和故黃鐘等不過樂之末節而樂人舞于下禮德主序故鋪筵席等不過禮之末節而有司掌于下人君不親此也故樂師辨乎律吕之聲雅頌之詩但北面而鼓弦宗祝辨灌獻饋食之禮故後尸贊之商祝辨衰麻哭泣之禮故後主人若夫和敬德也君之德成故位堂上而南面干揚等藝也童者有司樂師之藝成故位堂下而北面尸與主人成孝敬之行故序而前宗祝商祝成喪祭之事故序于後此皆見重本輕末之意然則制禮樂豈専在于末乎是故先王德與藝行與事無不全有然後本立而末具制禮樂于天下無難矣不然一祝史之流耳坡謂此即禮樂之情文而列其上下先後以勉君子務本之意此下宜承以君子曰禮樂不可斯須去身數節魏文侯賓牟賈二章似自與子貢章為類魏文侯問于子夏曰吾端冕而聽古樂則唯恐卧聽鄭衛之音則不知倦敢問古樂之如彼何也新樂之如此何也子夏對曰今夫古樂進旅退旅和正以廣弦匏笙簧會守拊鼓始奏以文復亂以武治亂以相訊疾以雅君子于是語于是道古修身及家平均天下此古樂之發也集説曰厭之故唯恐卧好之故不知倦如彼外之也如此內之也旅衆也或進或退衆皆齊一無參差也和正以廣無姦聲也弦匏笙簧之器雖多必會合相守待擊拊鼓然後作也文謂鼓也武謂金鐃也樂之始奏先擊鼓故云始奏以文亂者卒章之節欲退之時擊金鐃而終故云復亂以武相即拊也所以輔相于樂治亂而使之理故云治亂以相也訊亦治也雅亦樂器也過而失節謂之疾奏此雅器以治舞者之疾故云訊疾以雅也于此而語樂是道古樂之正也知古樂而明修身之道則家齊國治而天下平矣方氏曰鼓聲為陽故謂之文鐃聲為隂故謂之武平言無上下之偏均言無逺近之異今夫新樂進俯退俯姦聲以濫溺而不止及優侏儒獶雜子女不知父子樂終不可以語不可以道古此新樂之發也集説曰進俯退俯謂俯僂曲折行列雜亂也姦聲以濫者言姦邪之聲濫竊不正不能和正以廣也溺而不止者聲既淫泆人所貪溺不可禁止不能始奏以文復亂以武也樂作之時及有徘優雜戲侏儒短小之人如獼猴之狀間雜于男子婦人之中不復知有父子尊卑之等作樂雖終無可言者況可與之言古道乎獶與猱同坡謂如獼猴之雜亂捷疾而不能治之訊之也今君之所問者樂也所好者音也夫樂者與音相近而不同注曰言文侯好音而不知樂也鏗鏘之類皆為音應律乃為樂文侯曰敢問何如子夏對曰夫古者天地順而四時當民有德而五穀昌疾疢不作而無妖祥此之謂大當然後聖人作為父子君臣以為紀綱紀綱既正天下大定天下大定然後正六律和五聲弦歌詩頌此之謂德音德音之謂樂詩云莫其德音其德克明克明克類克長克君王此大邦克順克俾俾于文王其德靡悔既受帝祉施于孫子此之謂也集説曰四時當謂不失其序也妖祥祥亦妖也書言亳有祥大當大化之均調也作為父子君臣以為紀綱是一句讀言聖人立父子君臣之禮為三綱六紀之目也綱維網大繩紀附綱小繩綱目則附于紀也禮緯含文嘉云三綱謂君為臣綱父為子綱夫為妻綱也六紀謂諸父有善諸舅有義族人有敘昆弟有親師長有尊朋友有舊也先序之以禮乃可和之以樂故然後有正六律以下之事周子曰古者聖王制禮法修教化三綱正九疇敘百姓大和萬物咸若乃作樂以宣八風之氣以平天下之情意蓋本此詩大雅皇矣之篇莫靜也德音名譽也俾當依詩作比子夏引詩以證德音之説嚴氏曰王季雖無心于干譽然其德明而類長而君順而比自不可掩類者明之充君者長之推比者順之積克明謂知此理克類謂觸類而通一理渾融徹上徹下也君又尊于長學記言能為長然後能為君是也以之君臨大邦則克順而能和其民克比而能親其民順言不擾比則歡然相愛矣比及文王其德無有可悔從容中道無毫髮之慊也言王季之德傳于文王而益盛故能受天之福而延于子孫也今君之所好者其溺音乎文侯曰敢問溺音何從出也子夏對曰鄭音好濫淫志宋音燕女溺志衛音趨數煩志齊音敖辟喬志此四者皆淫于色而害于德是以祭祀弗用也疏曰溺音是淫溺之音濫竊也非已儔匹别相淫竊燕女謂己之妻妾燕安而己所安唯女子所以使人意志煩勞也齊音敖狠辟越所以使人意志驕逸也坡謂衛音淫之趨數不敢強解若齊音淫之敖辟如襄公淫于妹春秋纍書會齊侯享齊侯如齊師可謂淫而敖辟無忌憚極矣好濫四者皆淫于色能使人志意蕩佚則害于德矣詩云肅雍和鳴先祖是聽夫肅肅敬也雍雍和也夫敬以和何事不行注曰言古樂敬且和故無事而不用溺音無所施疏曰言樂音敬和而鳴先祖之神聽而從之若能敬和設施于政教何事不行也集説曰因上文言溺音害德祭祀弗用故引之為人君者謹其所好惡而已矣君好之則臣為之上行之則民從之詩云誘民孔易此之謂也集説曰德音之正溺音之邪皆易以感人故人君不可不謹所好惡也詩大雅板之篇誘詩作牖然後聖人作為鞉鼓椌楬塤箎此六者德音之音也然後鐘磬竽瑟以和之干戚旄狄以舞之此所以祭先王之廟也所以獻酬酳酢也所以官序貴賤各得其宜也所以示後世有尊卑長幼之序也注曰六者為本以其聲質也椌柷也楬敔也官序貴賤謂尊卑樂器列數有差次疏曰上經言人君謹慎所好惡以誘人故此一節論聖人作為樂器道德之音以示後世也六者是德音以尚質故也然後用此鐘磬竽瑟華美之音以贊和之使文質相雜又用干戚旄狄以舞動之干楯也戚斧也狄羽也祭先王之廟者前云鄭音四者祭祀不用故此六器之音四器之和文武之舞並可用于宗廟之中奏之若樂九變而鬼神格也又用于宗廟中接納賓客也又用樂體别尊卑于朝廷使各得其宜天子八佾諸侯六佾是也聞樂知德及施于孫子是示後世又宗族長幼同聽之莫不和順閨門之內父子兄弟同聽之莫不和親是長幼之序也鐘聲鏗鏗以立號號以立橫橫以立武君子聽鐘聲則思武臣集説曰鏗然有聲號令之象也號令欲其威嚴橫則盛氣之充滿也令嚴氣壯立武之道故君子聽之而思武臣石聲磬磬以立辨辨以致死君子聽磬聲則思死封疆之臣集説曰注磬讀為罄謂其聲音罄罄然所以為辨别之意死生之際非明辨于義而剛介如石者不能決封疆之臣致守于彼此之限而能致死于患難之中故君子聞聲而知所思也絲聲哀哀以立廉廉以立志君子聽琴瑟之聲則思志義之臣熊氏曰琴瑟之聲哀切如人峭厲斂肅之象乃廉也人廉則志必髙明人臣而志于義亦峭直而不苟於利害也坡謂此恂栗之所以為瑟僴也哀以立廉似之竹聲濫濫以立會會以聚衆君子聽竽笙簫管之聲則思畜聚之臣注曰濫之意猶攬聚也會猶聚也疏曰笙以匏為體插竹於匏匏竹兼有故笙文在竹也集説曰畜聚之臣謂節用愛人容民畜衆者非謂聚斂之臣也鼓鼙之聲歡歡以立動動以進衆君子聽鼓鼙之聲則思將帥之臣君子之聽音非聽其鏗鏘而已也彼亦有所合之也集説曰歡謂歡囂也其聲喧雜使人心意動作故能進發其衆前言武臣泛言之也此專指將帥而言蓋師以鼓進而進之權在主將也彼謂樂聲也合之契合於心也坡謂八音舉五而不及匏土木者匏笙在竹音中而椌楬與塤在德音之內矣又疏云五器而有五事其匏與土木無此五器之象故記者不言斯解雅而不鑿賓牟賈侍坐於孔子孔子與之言及樂曰夫武之備戒之已久何也對曰病不得其衆也集説曰賓牟姓賈名孔子問大武之樂先擊鼓備戒已久乃始作舞何也賈答言武王伐紂之時憂病不得士衆之心故先鳴鼓以戒衆久乃出戰今欲象此故令舞者久而後出也咏歎之淫液之何也對曰恐不逮事也集説曰咏歎長聲而歎也淫液聲音之連延流液不絶之貌逮及也言武王恐諸侯後至者不及戰事故長歌以致其望慕之情也發揚蹈厲之已蚤何也對曰及時事也集説曰問初舞時即手足發揚蹈地而猛厲何其大蚤乎賈言象武王及時伐紂之事故不可緩然下文孔子言是太公之志則此答非也武坐致右憲左何也對曰非武坐也集説曰坐跪也致至也軒起也問舞武樂之人何忽有時而跪以右膝至地而左足仰之何也憲讀為軒輊之軒賈言非武人坐舞法無坐也然下文孔子言武亂皆坐是周召之治則武舞有坐此答亦非也聲淫及商何也對曰非武音也子曰若非武音則何音也對曰有司失其傳也若非有司失其傳則武王之志荒矣子曰唯丘之聞諸萇𢎞亦若吾子之言是也集説曰淫貪欲之意也武樂之中有貪商之聲則是武王貪欲紂之天下故取之也賈言非武樂之聲也孔子又問既非武樂之聲則是何樂聲乎賈又言此典樂之官失其相傳之説也若非失其所傳之真而謂武王實有心於取商則是武王之志有荒謬矣豈精明神武應天順人之志哉孔子於是然其言而謂其言與萇𢎞相似也一説商聲為殺伐之聲淫謂商聲之長也若是武樂之音則是武王有嗜殺之心矣故云志荒也賓牟賈起免席而請曰夫武之備戒之已久則既聞命矣敢問遲之遲而又久何也子曰居吾語女夫樂者象成者也總干而山立武王之事也發揚蹈厲大公之志也武亂皆坐周召之治也集説曰免席避席也備戒已久所謂遲也久立於綴是遲而又久也孔子言作樂者倣象其成功故將舞之時舞人總持干盾如山之立嶷然不動此象武王持盾以待諸侯之至故曰武王之事也所以發揚蹈厲象太公威武鷹揚之志也亂樂之卒章也上章言復亂以武言武舞將終而坐象周公召公文德之治蓋以文而止武也且夫武始而北出再成而滅商三成而南四成而南國是疆五成而分周公左召公右六成復綴以崇天子集説曰成者曲之一終孔子又言武之舞也初自南第一位而北至第二位故云始而北出也此是一成再成則舞者從第二位至第三位象滅商也三成則舞者從第三位至第四位極於北而反乎南象克殷而南還也四成則舞者從北頭第一位郤至第二位象伐紂之後疆理南方之國也五成則舞者從第二位至第三位乃分為左右象周公居左召公居右也綴謂南頭之初位也六成則舞者從第三位而復于南之初位樂至六成而復初位象武功成而歸鎬京四海皆崇武王為天子矣坡謂此申樂者象成之意夾振之而駟伐盛威於中國也集説曰二人夾舞者而振鐸以為節則舞者以戈矛四次擊刺象伐紂也駟讀為四伐如泰誓四伐五伐之伐此象武王之兵所以盛威於中國也分夾而進事蚤濟也集説曰分部分也舞者各有部分而振鐸者夾之而進也濟猶成也此於武王之事謂早成也坡謂自夾振至此申發揚蹈厲太公之志意詳大明詩則夾舞者而振鐸象太公之涼武王也駟伐當如詩作肆伐事蚤濟正解發揚蹈厲之已蚤也久立於綴以待諸侯之至也集説曰舞者久立於行綴之位象武王待諸侯之集也坡謂此申總干山立武王之事意未事立綴待諸侯之致伐于商既事復綴待庶邦受命于周皆待也上與太公對言則武王事宜先此以其事之貫乎始終則宜在此也且女獨未聞牧野之語乎武王克殷反商未及下車而封黃帝之後於薊封帝堯之後於祝封帝舜之後於陳下車而封夏后氏之後於杞投殷之後於宋封王子比干之墓釋箕子之囚使之行商容而復其位庶民弛政庶士倍祿陸曰薊今涿郡薊縣是也即燕國之都孔安國司馬遷及鄭皆云燕國郡邵公與周同姓案黃帝姓姬君奭蓋其後也或黃帝之後封薊者滅絶而更封燕郡乎疑不能明也而皇甫謐以召公為文王庶子記傳更無所出又左傳富辰之言亦無燕也集説曰反商當為及字之誤也言牧野克殷師之後即至紂都也殷後不曰封而曰投者舉而徙置之辭也然封微子於宋在成王時此特厯敘黃帝堯舜禹湯之次而言之耳其曰未及下車而封與下車而封先後之辭也行商容即書所謂式商容閭也弛政解散紂之虐政也一説謂罷其征役倍祿祿薄者倍增之也濟河而西馬散之華山之陽而弗復乘牛散之桃林之野而弗復服車甲釁而藏之府庫而弗復用倒載干戈包之以虎皮將帥之士使為諸侯名之曰建櫜然後天下知武王之不復用兵也注曰桃林在華山旁甲鎧也釁釁字也包干戈以虎皮明能以武服兵也建讀為鍵字之誤也兵甲之衣曰櫜建櫜言閉藏兵甲也疏曰熊氏云凡載兵之法皆刃向外今倒載者刃向國不與常同故云倒載也散軍而郊射左射貍首右射騶虞而貫革之射息也裨冕搢笏而虎賁之士説劒也祀乎明堂而民知孝朝覲然後諸侯知所以臣耕籍然後諸侯知所以敬五者天下之大教也集説曰散軍放散軍伍也郊射習射於郊學之中也左東學也在東郊東學之射歌貍首之詩以為莭右西學也在西郊西學之射則歌騶虞之詩以為莭也貫穿也革甲鎧也軍中不習禮其射但主于穿札今既行禮射則此射止而不為矣禆冕衣禆衣而冠冕也天子六服大裘為上其餘為禆搢插也説劒解去其佩劒也食三老五更於大學天子袒而割牲執醬而饋執爵而酳冕而總干所以教諸侯之弟也注曰三老五更互言之耳皆老人更知三德五事者也冕而總干親在舞位也周名大學曰東膠熊氏曰以上皆牧野之語坡謂自牧野之語至此申武亂皆坐周召之治意然自封黃帝至虎賁説劒一時行之可也祀明堂在秋耕籍在春朝覲食老更或春或秋非可一時並舉蓋使周召制此為教使諸侯知之耳文自明白若此則周道四達禮樂交通則夫武之遲久不亦宜乎熊氏曰由是語觀之可見武王必若此委曲詳細然後周道達於四國而禮樂交相通行是武王不惟征伐之時無急得天下之心即功成之後又緩以待天下之化則夫武樂之遲久不亦宜乎君子曰禮樂不可斯須去身致樂以治心則易直子諒之心油然生矣易直子諒之心生則樂樂則安安則久久則天天則神天則不言而信神則不怒而威致樂以治心者也注曰致猶深審也油然新生好貌也善心生則寡於利欲寡於利欲則樂矣樂由中出故治心疏曰天則不言而信者謂四時不失神則不怒而威者言宗廟社稷之中而民自敬是不怒而威也聖人既能用樂和心故不言而信似天也不怒而威似神也朱子曰韓詩外傳子諒作慈良致禮以治躬則莊敬莊敬則嚴威注曰躬身也禮自外作故治身疏曰若能莊嚴而恭敬則嚴肅威重也心中斯須不和不樂而鄙詐之心入之矣外貌斯須不莊不敬而易慢之心入之矣疏曰由貪欲多故鄙詐起也故樂也者動於內者也禮也者動於外者也樂極和禮極順內和而外順則民瞻其顔色而弗與爭也望其容貌而民不生易慢焉故德輝動於內而民莫不承聽理發諸外而民莫不承順故曰致禮樂之道舉而錯之天下無難矣集説曰動於內則能治心矣動於外則能治躬矣極和極順則無斯須之不和不順矣所以感人動物其效如此德以輝言乃英華發外之驗理發諸外是動容周旋之中禮君子極致禮樂之道其於治天下乎何有坡謂不爭不慢是民之感其和順也至承聽承順則民亦化於和順矣樂也者動於內者也禮也者動於外者也故禮主其減樂主其盈禮減而進以進為文樂盈而反以反為文禮減而不進則銷樂盈而不反則放故禮有報而樂有反禮得其報則樂樂得其反則安禮之報樂之反其義一也注曰進謂自勉強也反謂自抑止也報讀曰褒猶進也疏曰禮得其報則樂者言禮能曉其義而自進則和樂不至困苦故樂也樂得其反則安言樂能知吉凶之歸而得其反則安靜而不流放也義中和之義也言俱得其中故云一也劉氏曰禮之儀動於外必謙卑退讓以自牧故主於減殺樂之德動于中必和順充積而後形故主於盈盛蓋樂由陽來故盈禮自隂作故減也然禮之體雖主於退讓而其用則貴乎行之以和故以進為文也樂之體雖主於充盛而其用則貴乎抑之以莭故以反為文也禮若過於退讓而不進則威儀銷沮必有禮勝則離之失樂過於盛滿而不反則意氣放肆必有樂勝則流之弊故禮必有和以為減之報報者相濟之意也樂必有莭以為盈之反反者知止之謂也禮減而得其和以相濟則從容欣愛而樂矣此樂以和禮也樂盈而得其節以知止則優柔平中而安矣此禮以莭樂也禮樂相須並用而一歸於無過無不及之中而合其事理之宜故曰禮之報樂之反其義一也坡謂禮得其報則樂惟樂則極順矣樂得其反則安惟安則極和矣此一莭發明上文樂極和禮極順之旨夫樂者樂也人情之所不能免也樂必發於聲音形於動靜人之道也聲音動靜性術之變盡於此矣故人不耐無樂樂不耐無形形而不為道不耐無亂先王恥其亂故制雅頌之聲以道之使其聲足樂而不流使其文足論而不息使其曲直繁瘠廉肉節奏足以感動人之善心而已矣不使放心邪氣得接焉是先王立樂之方也劉氏曰人情有所樂而發於詠歌詠歌之不足而不知手舞足蹈則性情之變盡於此矣故人情不能無樂樂於中者不能不形於外而為歌舞形於歌舞而不依於理道則必流於荒亂矣先王恥其然故制為雅頌之聲詩以道迪之使其聲音足以為娛樂而不至於流放使其文理足以為講明而不至於怠息使其樂律之清濁髙下或宛轉而曲或徑出而直或豐而繁或殺而瘠或稜隅而廉或圓滑而肉或止而節或作而奏皆足以感發人之善心而不使放肆之心邪僻之氣得接於吾身焉是乃先王立樂之方法也坡謂上言滅天理則大亂此言不為道不能無亂則道即天理也使其聲至不息二句是先王以道正人之聲音而使之無放心也使其曲直至善心而已二句是先王以道正人之動靜而使之無邪氣也曲直六字雖以音言而實舞者以為進退作止之莭奏也是故樂在宗廟之中君臣上下同聽之則莫不和敬在族長鄉里之中長幼同聽之則莫不和順在閨門之內父子兄弟同聽之則莫不和親故樂者審一以定和比物以飾莭莭奏合以成文所以合和父子君臣附親萬民也是先王立樂之方也疏曰審一以定和者人聲雖一其感有殊或有哀樂之感或有喜怒之感當須詳審其聲以定調和之曲坡謂物謂樂器舞器也比物以飾莭即首章比音而樂之及干戚羽旄之意莭奏始終條理也成文注云克諧相應和也上莭先王立樂之方是先王緣人性而制樂慎所以感之也此言立樂之方是樂成之後奏樂以宣暢其和心也故聽其雅頌之聲志意得廣焉執其干戚習其俯仰詘伸容貌得莊焉行其綴兆要其節奏行列得正焉進退得齊焉故樂者天地之命中和之紀人情之所不能免也注曰綴表也所以表行列也兆域也舞者進退所至也要猶會也命教也紀總要之名也疏曰雅以施正道頌以贊成功聽其聲則淫邪不入故志意得廣焉莭謂曲莭奏為動作依其綴兆故行列得正隨其莭奏故進退得齊熊氏曰天地賦人以身心之理未嘗有命令以教人自有樂而身體日端心禮日寬是樂正天地之教令矣坡謂此承上同聽而推説盡之聽雅頌而志意廣則發於聲音者正矣容貌莊行列正進退齊則形乎動靜者正矣自樂者樂也至此三莭推言禮樂之本於道命於天所以不可斯須去身之意蓋情之所不能免所以不可斯須去禮樂也去之則縱情而亂矣夫樂者先王之所以飾喜也軍旅鈇鉞者先王之所以飾怒也故先王之喜怒皆得其儕焉喜則天下和之怒則暴亂者畏之先王之道禮樂可謂盛矣注曰天子之於天下喜怒莭之以禮樂則兆民和從而敬畏之集説曰皆得其儕言各從其類喜非私喜怒非私怒也坡謂此因章首禮樂刑政其極一也而申結之又見先王治天下之道雖非一端而其要則在於禮樂故曰先王之道禮樂可謂盛矣子贛見師乙而問焉曰賜聞聲歌各有宜也如賜者宜何歌也注曰師樂官也乙名聲歌各有宜氣順性也師乙曰乙賤工也何足以問所宜請誦其所聞而吾子自執焉寬而靜柔而正者宜歌頌廣大而靜疏達而信者宜歌大雅恭儉而好禮者宜歌小雅正直而靜廉而謙者宜歌風肆直而慈愛者宜歌商溫良而能斷者宜歌齊夫歌者直已而陳德也動已而天地應焉四時和焉星辰理焉萬物育焉注曰樂人稱工執猶處也疏曰寬謂德量寬大靜安靜柔和柔正正直也廣大謂志意宏大疏達而信謂疏朗通達而誠信恭以禮自持儉以約自處好禮而動不越法也熊氏曰正直無私又能安靜廉介自守又能謙退也直情徑行而又慈愛以為心則剛得中也和厚淳良而又果斷以為志是柔得中也夫歌者必先正直己身實有寬靜等德乃取雅頌等以敷陳之用保全於不壞也動己者己之性情德行與造化相流通既養之極其中和歌以動之則造化應矣天地四句歌之效如此坡案自愛者宜歌商至五帝之遺聲也舊在寬而靜上疏云今依鄭之所注次而解之所次依史記樂書也故商者五帝之遺聲也商人識之故謂之商齊者三代之遺聲也齊人識之故謂之齊明乎商之音者臨事而屢斷明乎齊之音者見利而讓臨事而屢斷勇也見利而讓義也有勇有義非歌孰能保此注曰屢數也數斷事以其肆直也見利而讓以其溫良能斷也熊氏曰夫商齊之音似非風雅頌之比而亦宜歌者何蓋商者五帝之遺聲也宋乃商之後故宋人傳而記之而謂之商齊者三王之遺聲也齊人傳而記之而謂之齊商音本剛中故明其音者遇事每能決斷剛中之發也齊音本柔中故明其音者見利能讓於人柔中之發也斷勇德也讓義德也有勇有義非歌商齊之音孰能保此集説曰保猶安也言安於勇安於義而不移也坡案舊有商之遺聲也五字在商人識之之上鄭注云衍字也故歌者上如抗下如隊曲如折止如稿木倨中矩句中鉤纍纍乎端如貫珠故歌之為言也長言之也説之故言之言之不足故長言之長言之不足故嗟歎之嗟歎之不足故不知手之舞之足之蹈之也子貢問樂集説曰上如抗下如隊言歌聲之髙者如抗舉其下者如墜墮也稿木枯木也倨微曲也句甚曲也端正也長言之所謂歌永言也熊氏曰此言凡歌之法坡謂子貢問樂恐舊是此一篇之名疑古者名篇皆在後如詩三百篇可見而韓文公原鬼篇後方曰作原鬼是也禮記述注卷十六
