body:
  text: 禮記述注卷五安溪李光坡撰王制第五疏曰王制之作蓋在秦漢之際知者按下文云有正聽之鄭云漢有正平承秦所置又有古者以周尺今以周尺之言則知是周亡後也盧植云漢女帝令博士諸生作此書坡謂此篇明是殷制蓋所言九州方域既與唐虞之五服五千異而周制六服七千又逈然相縣坡伯兄云自食貨至賓師確與洪範八政符非殷而何鄭解為殷自知無易而未有左證惟據六十養於國七十養於學曰此殷制明矣先正終身於是一言半解求得於己不欺於人讀之永嘆朱子謂漢儒制度不合者多推從殷禮此或偶指一端或傳録之誤後學安可據此為定不精不詳曰緯書曰臆説曰無明證挂一漏萬行詐張皇以陷於無忌憚乎古書之存者希矣安得事求其證苟推説整齊令後世可變而通且緯書惟神示名號不見於經為可疑至制度經曲所存甚多注疏雖間有淺深然彼時逸禮猶存緯書可採師承授受尚有淵源如此篇陳注所引劉氏選士進士之解悠誕不稽自宋末元明諸儒以大本生心議禮皆類此也而欲詐學者以非臆説有明證舍注疏而崇之得乎六經皆然三禮尤甚哉敢竊附一言後不復一一也王者之制祿爵疏曰鄭云祿之言榖白虎通云祿者録也爵白虎通云爵者盡也所以盡人才也公侯伯子男凡五等疏曰公之言平侯者候也伯之言白明白於德也子者奉恩宣德男者任功立業此五等為虞夏及周殷則三等公侯伯也諸侯之上大夫卿下大夫上士中士下士凡五等疏曰卿之言嚮為人所歸嚮大夫者達人謂扶達於人士者事也熊氏曰上節制爵通於天下此節施於一國天子之田方千里公侯田方百里伯七十里子男五十里不能五十里者不合於天子附於諸侯曰附庸集説曰此言天子諸侯田里之廣狹不能猶不足也不合謂不朝會也附庸者以國事附於大國未能以其名通也天子以下皆言田而不言地者以地有山林川澤原隰險夷之不同若限以地里而不計田里則井地不均榖祿不平矣里數有二分田之里以方計如方里而井是也分服之里以袤計如二十五家為里是也後章言方千里者為田九萬億畝此以方計者也自恆山至于南河千里而近此以袤計者也分服則計道里逺近以為朝貢之節分田則計田畝多寡以為賦祿之制此所以為均平也熊氏曰以下皆制祿之法天子之三公之田視公侯天子之卿視伯天子之大夫視子男天子之元士視附庸集説曰此言王朝有位者之田方氏曰三公而下食來邑於畿內祿之多少以外諸侯為差元士上士也與元子元侯稱元同不言中士下士則視附庸惟上士也制農田百畝百畝之分上農夫食九人其次食八人其次食七人其次食六人下農夫食五人庶人在官者其祿以是為差也集説曰此言庶人之田井田之制一夫百畝分分限也肥饒者為上農墝瘠者為下農故所養有多寡也府史胥徒之屬皆庶人之在官者其祿以農之上下為差多者不得過食九人之祿寡者不得下食五人之祿隨其高下為五等之多寡也坡按周禮賈疏云王制言下士視上農夫食九人則府食八人史食七人胥食六人徒食五人其官並亞士故號庶人在官諸侯之下士視上農夫祿足以代其耕也中士倍下士上士倍中士下大夫倍上士卿四大夫祿君十卿祿疏曰自下士至小國之卿倍大夫祿皆據無采地者言之故鄭答臨碩云王畿方千里者凡九百萬夫之地三分去一定受田者三百萬夫出都家之田以其餘地之稅祿無田者下士食九人中士食十八人上士三十六人下大夫七十二人中大夫百四十四人卿二百八十八一云下士祿足代耕則庶人在官者雖食八人以下不得代耕故載師有官田謂庶人在官之田也次國之卿三大夫祿君十卿祿小國之卿倍大夫祿君十卿祿坡聞之兄曰諸侯之卿不命於天子者其祿與大夫等命於天子者不論大小國皆當四大夫但大國三卿皆命於天子故視大夫四倍次國三卿二卿命於天子其一與大夫同祿則以三卿與三大夫總較惟三倍耳小國三卿一卿命於天子其二與大夫同祿則以三卿與三大夫相較惟二倍耳故曰次國上卿位當大國之中中當其下下當其上大夫小國上卿當大國之下中當其上大夫下當其下大夫當大夫者皆非命卿也秩既相當祿亦相等明矣次國之上卿位當大國之中中當其下下當其上大夫小國之上卿位當大國之下卿中當其上大夫下當其下大夫集説曰此言三等之國其卿大夫俯聘並會之時尊卑之序如此鄭云爵位同則小國在下謂二人同是卿則小國卿在大國卿之下爵異固在上者謂若大國是大夫小國是卿則位於大國大夫之上知者以卿執羔大夫執雁卿絺冕大夫元冕故知不得在大夫下也其有中士下士者數各居其上之三分注曰謂其為介若特行而並會也居猶當也此據大國而言大國之士為上次國之士為中小國之士為下士之數國皆二十七人各三分之上九中九下九疏曰中士謂次國之士下士謂小國之士今大國之士既定在朝會若其有中國之士小國之士者其行位之數各居其上國三分之二謂次國以大國為上而次國上九當大國中九次國中九當大國下九是各當其大國三分之二小國以次國為上小國上九當次國中中九小國中九當次國下九亦是居上三分之二也是各居上之三分凡四海之內九州州方千里州建百里之國三十七十里之國六十五十里之國百有二十凡二百一十國名山大澤不以封其餘以為附庸間田八州州二百一十國集説曰九州并王畿而言此但言每一州所可容者如此凡八州餘以例推皆言畿外之制下文始言天子畿內之制也坡謂虞夏五服則中國方五千里周六服則七千里此大界方三千里三三而九非夏非周注以為殷制信矣山澤不以封者注謂與民同財史記謂秉其厄塞地利者兼此二義其餘地若封人附於大國謂之附庸若未封人謂之間田天子之縣內方百里之國九七十里之國二十有一五十里之國六十有三凡九十三國名山大澤不以盼其餘以祿士以為間田注曰畿內九大國者三為三公之田又三為三公致仕者之田餘三待封王之子弟也次國二十一者祿為六卿之田又六為六卿致仕者之田又三為三孤之田餘六亦待封王子弟也小國六十三者二十七大夫之田并大夫致仕之田共五十四餘九亦待封王子弟也三孤無職雖致仕猶可即而謀故不副疏曰畿外諸侯有封建之義故云不以封畿內之臣不世位有朌賜之義故云不以朌祿士謂無地之士給之以地而當其祿不得為采邑耳間田則周禮之公邑也注云副者公卿大夫皆有正職之田又有致仕之田則副也坡謂注疏謂唐虞稱服殷周稱畿故以縣為夏時天子所居州界名然周天子稱畿而大司馬九服亦稱畿且趙簡子有上大夫受縣之語則周固有縣也記者偶筆似不必泥凡九州千七百七十三國天子之元士諸侯之附庸不與集説曰九州而千七百七十三國者內一州為王圻容九十三國外八州容一千六百八十國并畿內為千七百七十三國也元士附庸不與者以上文之所算止五十里而元士附庸皆不能五十里故不與也天子百里之內以共官千里之內以為御集説曰共官謂共給王朝百官府文書之具泛用之需御謂凡天子之服用蓋皆取之租稅也方氏曰以百里所出之少資百官之所共疑若不足然卑者所稱不為不足以千里所出之多為一人之御疑若有餘然尊者所稱不為有餘且以其近者與人則欲其易給而無勞以其逺者奉己則欲其難致而有節百里之內非不以為御也要之以共官為主耳千里之內非不共官也要之以為御為主耳千里之外設方伯五國以為屬屬有長十國以為連連有帥三十國以為卒卒有正二百一十國以為州州有伯注曰屬連卒州猶聚也伯帥正亦長也凡長皆賢侯為之殷之州長曰伯虞夏及周皆曰牧八州八伯五十六正百六十八帥三百三十六長八伯各以其屬屬於天子之老二人分天下以為左右曰二伯注曰老謂上公周禮曰九命作伯春秋傳曰自陜以東周公主之自陜以西召公主之千里之內曰甸千里之外曰采曰流方氏曰甸服四面五百里則為方千里矣王畿千里之外莫近於侯服而采又侯服之最近者莫逺於荒服而流又荒服之最逺者舉其最逺最近則綏要之服在其中矣天子三公九卿二十七大夫八十一元士大國三卿皆命於天子下大夫五人上士二十七人次國三卿二卿命於天子一卿命於其君下大夫五人上士二十七人小國二卿皆命於其君下大夫五人上士二十七人注曰命於天子者天子選用之如今詔書除吏是矣小國亦三卿一卿命於天子二卿命於其君此文似誤脫耳疏曰三卿命於天子則大夫以下皆其君自命之也五人者司徒之下置小卿二一是小宰一是小司徒司空之下亦置二小卿一是小司寇一是小司空司馬之下惟置一小卿小司馬也馬氏曰獨言下夫夫者對卿而言也其實大夫有上中下之辨前云次國之下卿位當大國之上大夫是也獨言上士者對府史而言也其實士又有上中下之異天子使其大夫為三監監於方伯之國國三人注曰使佐方伯領諸侯疏曰一州三人三八二十四人天子於州牧之國别置三大夫以輔之其尊卑之差見下文天子之縣內諸侯祿也外諸侯嗣也疏曰言諸侯祿者得采國為祿而不繼世故云祿也畿內公卿大夫之子父死之後故國采邑恆得食之有罪乃奪之此父死子祿者不在九十三國之數父死視元士若有賢德乃復父位集説曰畿內之地王朝百官食祿之邑在焉畿外乃以建封使其子孫嗣守然內亦謂之諸侯者三公之田視公侯卿視伯大夫視子男元士視附庸也制三公一命卷若有加則賜也不過九命集説曰制者言三公命服之制也命數止於九天子之三公八命著鷩冕若加一命則為上公與王者之後同而著衮冕故云一命衮若為三公而有加衮者是出於特恩之賜非例當然故云若有加則賜也人臣無過九命者大宗伯再命受服與此不同馬氏曰三公衮服有降龍無升龍次國之君不過七命小國之君不過五命大國之卿不過三命下卿再命小國之卿與下大夫一命疏曰周禮公國之孤四命與餘卿不同則知此大國之卿三命亦謂孤也下卿再命者謂除孤以外之卿就再命之中分為中卿下卿也故前文云次國之上卿位當大國之中是也次國之卿再命亦謂執政者下卿一命亦分為中下二等故前文云中當其下下當其上大夫是也小國之卿雖同一命亦分為三等故前文云小國之上卿當大國之下卿中當其上大夫下當其下大夫其大國次國小國大夫雖同一命當皆分為上下二等凡官民材必先論之論辨然後使之任事然後爵之位定然後祿之爵人於朝與士共之刑人於市與衆棄之疏曰爵人於朝殷法也周則天子假祖廟而拜授之刑人於市亦殷法謂貴賤皆刑於市周則有爵者刑于甸師氏也集説曰論謂考評其行藝之詳也論辨則材之優劣審矣任事則能勝其任矣於是爵之以一命之位而養之以祿焉坡謂上言制爵祿之事詳矣此言所以得賢而爵祿之道也是故公家不畜刑人大夫弗養士遇之塗弗與言也屏之四方唯其所之不及以政示弗故生也集説曰公家不畜刑人注以為商制以周官墨者守門劓者守關宫者守內則者守囿髠者守積也唯其所之者量其罪之所當往適之地而居之如虞書五流有宅五宅三居是也不及以政賦役不與也示弗故生不授之田不賙其乏示不故欲其生也諸侯之於天子也比年一小聘三年一大聘五年一朝注曰比年每歲也小聘使大夫大聘使卿朝則君親行然此晉文伯時所制也虞夏之制諸侯歲朝周之制侯甸男采衛要服六者各以其服數來朝坡謂自此至以尊於天子言朝聘之事洪範之七曰賓也天子五年一巡守注曰天子以海內為家時一巡省之五年者虞夏之制也周則十二歲一巡狩歲二月東巡守至于岱宗柴而望祀山川覲諸侯問百年者就見之集説曰歲二月當巡狩之年二月也岱泰山也宗尊也東方之山莫高於此故祀以為東嶽而稱岱宗也柴本作祡今通用燔燎以祭天而告至也東方山川之當祭者皆於此望而祀之遂接見東方之諸侯問有百歲之人則即其家而見之以其年高故不召見也命大師陳詩以觀民風命市納賈以觀民之所好惡志淫好辟集説曰大師樂官之長詩以言志采録而觀覽之則風俗之美惡可見政令之得失可知矣市典市者賈謂物價價之貴賤係於人之好惡好質則用物貴好奢則侈物貴志流于奢淫則所好皆邪僻矣命典禮考時月定日同律禮樂制度衣服正之集説曰典禮掌禮之官也考時月定日即舜典所云協時月正日也考校四時及月之大小時有節氣早晚月有弦望晦朔日有甲乙先後考之使各當其節律法也制度宫室車旗之等五者皆王者所定天下一君不容有異異則非正矣故因巡狩所至而正其不同者使皆同也山川神祗有不舉者為不敬不敬者君削以地集説曰凡祭有其舉之莫敢廢也故不舉者為不敬山川地之望也故削地焉宗廟有不順者為不孝不孝者君絀以爵集説曰宗廟不順如紊昭穆之次失祭祀之時皆不孝也爵者祖宗所傳故絀爵焉變禮易樂者為不從不從者君流革制度衣服者為畔畔者君討集説曰不從違戾也流者竄之逺方討聲罪致戮孟子曰天子討而不伐此章四君字皆謂國君有功德於民者加地進律疏曰律法也即大行人上公九命繅藉九寸冕服九章建常九斿之等是也五月南巡守至于南嶽如東巡守之禮八月西巡守至于西嶽如南巡守之禮十有一月北巡守至于北嶽如西巡守之禮歸假于祖禰用特注曰假至也特特牛也祖下及禰皆一牛疏曰爾雅釋山云泰山為東嶽華山為西嶽霍山為南嶽恆山為北嶽嵩山為中嶽霍山即衡山也天子將出類乎上帝宜乎社造乎禰疏曰類者依其正禮而為之冝者令誅伐得宜亦隨其冝而告也造至也出告天地及廟還惟告廟者白虎通云天道無外內故不復告也集説曰類冝造皆祭名後章言天子將出征則此出為巡守也諸侯則朝覲會同之出歟天子無事與諸侯相見曰朝考禮正刑一德以尊于天子集説曰無事無死喪寇戎之事也考禮者稽考而是正之使無違僭也正刑者行以公平使無干枉也一德無二心也三者皆尊天子之事天子賜諸侯樂則以柷將之賜伯子男樂則以鼗將之疏曰柷節一曲之始其事寬故以將諸侯之命鼗節一唱之終其事狹故以將伯子男之命集説曰柷形如漆桶方二尺四寸深一尺八寸中有椎柄連底撞之令左右擊所以合樂之始鼗如鼓而小有柄持而搖之則旁耳自擊所以節樂之終將之謂使者執此以將命也坡謂自此至不覆巢皆師田之事洪範之八曰師也賓師二事洪範以為終者自內及外也此以為始者大一統也諸侯賜弓矢然後征賜鈇鉞然後殺疏曰賜弓矢謂八命作牧者得征伐當州之內賜鈇鉞謂上公九命然後鄰國臣弒君子殺父者得專討之集説曰鈇莝斫刀也鉞斧也賜圭瓚然後為鬯未賜圭瓚則資鬯於天子疏曰未賜圭瓚者則用璋瓚不得鬯則用薰故王度記云天子以鬯諸侯以薰集説曰圭瓚鬯爵以大圭為瓚之柄者曰圭瓚釀秬黍為酒芬香條鬯於上下故曰鬯祭酒灌地降神必用鬯未賜圭瓚則求鬯於天子得其器乃敢為其事天子命之教然後為學小學在公宫南之左大學在郊天子曰辟雍諸侯曰頖宫疏曰百里之國國城居中面有五十里二十里置郊郊外仍有三十里七十里之國國城居中面有三十五里九里置郊郊外仍有二十六里五十里之國國城居中面有二十五里三里置郊郊外仍有二十二里此是殷制若周制則畿內千里百里為郊諸侯之郊公五十里侯伯三十里子男十里近郊各半之此小學大學殷制周則大學在國小學在西郊辟明也雍和也君則尊明雍和於此學中習道藝使天下之人皆明達諧和也頖之言班所以班政教也又詩注云王雍水之外圜如璧頖之言半以南通水北無也天子將出征類乎上帝冝乎社造乎禰禡於所征之地受命於祖受成於學疏曰受命於祖在造乎禰之前但前文類冝禡總説出行之時然後郤本初時受命受成之事所以文倒也集説曰禡行師之祭也受命於祖卜於廟也受成於學定兵謀也出征執有罪反釋奠于學以訊馘告集説曰獲罪人而反則釋奠於先聖先師而告訊馘焉訊謂其魁首當訊問者馘所截彼人之左耳告者告其多寡之數也天子諸侯無事則歲三田一為乾豆二為賓客三為充君之庖疏曰無事謂無征伐出行喪凶之事也范寧云上殺中心死速乾為豆實次殺射髀骼差遲故為賓客下殺中腸汚泡最遲故充庖厨又毛傳云自左膘而射達於右腢為上殺射右耳本次之射左髀達於右䯚為下殺先宗廟次賓客者尊神敬賓之義也坡謂三者之用則一田之中巳有此三品周歲有四田此歲三田或夏或殷然耳陳説非也無事而不田曰不敬田不以禮曰暴天物天子不合圍諸侯不掩羣疏曰自天子不合圍以下至不覆巢皆是以禮田者集説曰不敬謂簡祭祀略賓客不以禮殺傷過多故曰暴天物合圍四面圍之也掩羣者掩襲而舉羣取之也天子殺則下大綏諸侯殺則下小綏大夫殺則止佐車佐車止則百姓田獵集説曰殺獲也獲所驅之禽獸也綏旌旗無旒者下偃仆之也初殺時則抗之已殺獵止之時則下之佐車即周禮驅逆之車驅者逐獸使趨於田之地逆者要逆其走而不使之散亡也此言田獵之禮天子殺然後諸侯殺諸侯殺然後大夫殺大夫殺則百姓田獵尊卑貴賤之次序獺祭魚然後虞人入澤梁豺祭獸然後田獵鳩化為鷹然後設罻羅草木零落然後入山林昆蟲未蟄不以火田不麛不卵不殺胎不夭天不覆巢集説曰梁水堰也堰水為關空以笱承其空獺一歲再祭魚此謂千月時豺祭獸月令九月夏小正十月則九末十初也鳩化為鷹則八月時罻小網也草木零落謂十月時昆明也明蟲者得陽而生得隂而藏蟄在十月麛獸子之通稱夭斷殺之也天禽獸之稚者此十者皆田之禮順時序廣仁意也坡謂此下脫後章大史典禮至成歲事制國用一百有八字詳見本文冡宰制國用必於歲之杪五榖皆入然後制國用注曰國用今度支經用杪末也用地小大視年之豐耗疏曰用多少必計地大小必視年之豐耗以三十年之通制國用量入以為出集説曰以三十年之通者通計三十年所入之數使有十年之餘也蓋每歲所入均析為四而用其三每年餘一則三年而餘三又足一歲之用矣此所以三十年而有十年之餘也注以九年言之蓋積三十年內閏月當一歲也一説二十七年則有九年之餘言三十者舉成數耳坡謂自此至日舉以樂洪範之一曰食二曰貨也祭用數之仂集説曰注以仂為十一疏以為分散之名大槩是總計一歲經用之數而用其十分之一以行常祭之禮也喪三年不祭唯祭天地社稷為越紼而行事喪用三年之仂疏曰天地社稷之祭豫卜時日今忽有喪故既殯越紼行事若遭喪之後當郊社常祭之日其啓殯至於反哭則避此郊社祭日而為之集説曰喪凶事祭吉禮吉凶異道不得相干故三年不祭唯既殯以後若有天地社稷之祭則行之不敢以卑廢尊也未葬以前常屬紼於輴車以偹火災喪在內而行祭於外是踰越喪紼而往也喪三年而除中間禮事繁難故總計三歲經用之數而用其十之一也喪祭用不足日暴有餘曰浩祭豐年不奢凶年不儉集説曰暴者殘敗之義言不齊整也浩者泛濫之義所謂以美沒禮也惟其制用有一定之則是以歲有豐凶而禮無奢儉此記者之言雜記云凶年祀以下牲孔子之言也國無九年之蓄曰不足無六年之蓄曰急無三年之蓄曰國非其國也三年耕必有一年之食九年耕必有三年之食以三十年之通雖有凶旱水溢民無菜色然後天子食日舉以樂集説曰飢而食菜則色病故云菜色殺牲盛饌日舉周禮王日一舉鼎有十二物皆有爼以樂侑食又云大荒則不舉者蓋偶值凶年雖有備亦當貶損耳天子七日而殯七月而葬諸侯五日而殯五月而葬大夫士庶人三日而殯三月而葬三年之喪自天子達注曰尊者舒卑者速春秋傳曰天子七月而葬同軌畢至諸侯五月同盟至大夫三月同位至士踰月外姻至疏曰左傳言然此總云大夫士者記者許以降二為差故總云三月左傳細言其别坡謂自此至不造燕器洪範之三日祀也然則夏殷冡宰之職可見矣庶人縣封葬不為雨止不封不樹喪不二事集説曰此言庶人之禮庶人無碑繂縣繩下棺故云縣窆也封謂聚土為墳周禮曰以爵等為邱封之度與其樹數則士以上乃皆封樹大夫士既葬公政入於家庶人則終喪無二事不使從政也自天子達於庶人喪從死者祭從生者注曰從死者謂衣衾棺椁從生者謂祭奠之牲器支子不祭説見曲禮天子七廟三昭三穆與大祖之廟而七諸侯五廟二昭二穆與大祖之廟而五大夫三廟一昭一穆與大祖之廟而三士一廟庶人祭於寢注曰此周制七者大祖及文王武王之祧與親廟四大祖后稷諸侯大祖始封之君王者之後不為始封之君廟大夫大祖别子始爵者大傳曰别子為祖謂此雖非别子始爵者亦然士謂諸侯之中士下士名曰官師者上士二廟寢適寢也疏曰王肅以為天子七廟謂高祖之父及高祖之祖為二祧并始祖及親廟四為七周之文武受命之王不遷之廟權禮所施非常廟之數殷之三宗宗其德而存其廟亦不以為數又自上及下隆殺以兩令使天子諸侯立廟並四親而止則君臣同制尊卑不别又儒者難鄭云先公遷主藏於社稷先王遷主藏文武廟便有三祧何得祭法云有二祧鄭必為七廟惟周者馬昭按喪服小記云王者立四廟禮器云周旅酬六尸一人發爵則周七尸七廟明矣今使文武不在七數既不同祭又不享嘗豈禮也哉故盧植云二祧謂文武張融按守祧云奄八人自大祖與文武及親廟四用七人薑嫄用一人適盡曽子問孔子言周事而云七廟無虛主若王肅數主當有九何云七乎故當以周禮孔子之言為本注言大夫大祖皆殷制若其周制别子始爵其後得立别子為大祖若非别子之後雖為大夫但立父祖曽祖三廟而已隨時而遷不得立始爵者為大祖天子諸侯宗廟之祭春曰礿夏曰禘秋曰嘗冬曰蒸注曰此蓋夏殷之制名周則春曰祠夏曰礿以禘為殷祭疏曰礿薄也春物未成祭品鮮薄也禘者次第也夏時物雖未成宜依時次第而祭之嘗者新榖熟而嘗也蒸者衆也冬時物成者衆也鄭疑為夏殷祭名者以其與周不同其夏殷之祭又無文故稱蓋以疑之天子祭天地諸侯祭社稷大夫祭五祀注曰五祀謂司命也中霤也門也行也厲也此祭謂大夫有地者其無地祭三耳疏曰曲禮天子諸侯大夫皆祭五祀更無等差故以月令五祀當之疑為殷禮此文天子至大夫既别為尊卑之差故以周法解之坡謂五祀二説左傳獻子問社稷五祀史墨以重該等神答之故宗伯地示祭社稷五祀鄭即引傳文為釋以皆與社稷連文也月令户灶等神士喪禮行禱五祀士安得祀重該貴神故引月令為釋望文生義理各有當至此文自天子等下重該五祀乃上公非大夫所冝祭而户灶五者從無與天地社稷為等差且士亦祀之何以見惟大夫故鄭以祭法諸侯五祀當之其端的不可知然亦仿有倫類也今陳氏斥為臆説彼又無確辨則後生且從先儒安能崇無稽之浮言乎自宋末元明來三尺童子稍涉性理空拳枵腹即欲以大極斷事此魏華父不肯輕刋朱子語類恐長學者入耳出口之病卓矣天子祭天下名山大川五嶽視三公四瀆視諸侯諸侯祭名山大川之在其地者天子諸侯祭因國之在其地而無主後者集説曰視三公視諸侯謂視其饔餼牢禮之多寡以為牲器之數也其餘山川視伯小者視子男祭山川之在其地者魯人祭泰山晉人祭河是也因國謂所建國之地因先代所都之故墟也今無主祭之子孫則在王畿者天子祭之在侯邦者諸侯祭之以其昔嘗有功德於民不宜絶其祀也坡謂天子諸侯祭無主後則祭法泰厲公厲七祀之言亦未可全不信也天子犆礿祫禘祫嘗祫蒸集説曰祫合也其禮有二時祭之祫則羣廟之主皆升而合食於大祖之廟而毁廟之主不與三年大祫則毁廟之主亦與焉天子之禮春礿則特祭者各於其廟也禘嘗蒸皆合食石梁王氏曰特礿者春物全未成止一時祭而已於此時不祫也夏物稍成可於此時而祫秋物大成冬物畢成皆可祫故曰祫禘祫嘗祫蒸而礿則特也諸侯礿則不禘禘則不嘗嘗則不蒸蒸則不礿集説曰南方諸侯春祭畢則夏來朝故闕禘祭西方諸侯夏祭畢而秋來朝故闕嘗祭四方皆然石梁王氏曰諸侯歲朝為廢一時之祭王事重也諸侯礿犆禘一犆一祫嘗祫蒸祫集説曰犆礿礿犆非有異也變文而已祫嘗祫蒸與嘗祫蒸祫亦然諸侯所以降於天子者禘一犆一祫而已言夏祭之禘今歲犆則來歲祫祫之明年又犆不如天子每歲三時皆祫也此章先儒以為夏殷之制然禘王者之大禘也今以為四時常祭之名何歟豈周更時祭之名而後禘專為大祭歟又周官制度云先王制禮必象天道故月祭象月時享象時三年之祫五年之禘象閏又云王制之言祫非三年之制也天子社稷皆大牢諸侯社稷皆少牢大夫士宗廟之祭有田則祭無田則薦庶人春薦韭夏薦麥秋薦黍冬薦稻韭以卵麥以魚黍以豚稻以鴈注曰有田者既祭又薦新祭以首時薦以仲月士薦牲用特豚大夫以上用羔庶人無常牲取與新物相宜而已疏曰晏子春秋云天子以下至士皆祭以首時服虔注桓五年傳云魯祭天以孟月祭廟以仲月又注昭元年傳人君用孟月人臣用仲月皆非鄭義南師解云首時者大夫士也若得祭天者祭天以孟月祭廟以仲月其餘諸侯不得祭天者祭皆用孟月既無明據未知孰是義得兩通故並存焉坡謂首時祭惟見晏子春秋而四仲祭明見於周禮安得棄經而任傳乎坡辨詳大司馬此不具祭天地之牛角繭栗宗廟之牛角握賔客之牛角尺集説曰如繭如栗犢也握謂長不出膚側手為膚四指也賓客之用則取其肥大而已諸侯無故不殺牛大夫無故不殺羊士無故不殺犬豕庶人無故不食珍注曰故謂祭饗集説曰烹牛羊豕必為鼎實鼎非常用之器有禮事則設所以無故不殺也珍之名物見內則庶人無故亦以非冠昏之禮歟庶羞不踰牲燕衣不踰祭服寢不踰廟集説曰羞不踰牲者如牲是羊則不以牛肉為庶羞也此三者皆言薄於奉已厚於事神也大夫祭器不假祭器未成不造燕器集説曰此一節舊在庶人耆老不徒食之後今考其序當移在此大夫有田祿則不假借祭田於人無田祿者不設祭器則假之可也凡家造祭器為先養器為後古者公田藉而不稅集説曰孟子曰殷人七十而助助者藉也但借民力以助耕公田而不取其私田之稅坡謂先言治地用民之力以起司空之職自此至然後與學洪範之四曰司空也市㕓而不稅集説曰㕓市宅也賦其市地之㕓而不征其貨也關譏而不征集説曰關之設但主於譏察異服異言之人而不征其往來貨物之稅也林麓川澤以時入而不禁集説曰山澤採取之物其入也雖有時然與民共其利即孟子所謂澤梁無禁也夫圭田無征集説曰圭田者祿外之田所以供祭祀不稅所以厚賢也曰圭者潔白之義也周官制度云圭田自卿至士皆五十畝此專主祭祀故無征然王制言大夫士宗廟之祭有田則祭無田則薦孟子亦曰惟士無田則亦不祭既云皆有田何故又云無田則薦以此知賜圭田亦似有功德則賜圭瓚耳用民之力歲不過三日集説曰用民力如治城郭塗巷溝渠宫廟之類周禮豐年三日中年二日無年則一日而已若師旅之事則不拘此制田里不粥墓地不請疏曰田地里邑既受之於公民不得粥賣冡墓之地公家所給故葬有常不得輒請其餘處司空執度度地居民山川沮澤時四時量地逺近興事任力集説曰執度度地蓋定邑井城郭廬舍之區域也方氏曰小而水所止曰沮大而水所鍾曰澤坡謂觀山川高下之冝沮澤浸潤之處而時其四時之早晚則使民興事可以無愆矣量地逺近則任民之力可以有節矣凡使民任老者之事食壯者之食集説曰老者食少而功亦少壯者功多而食亦多今之使民雖少壯但責以老者之功程雖老者亦食以少者之飲食寬厚之至也凡居民材必因天地寒暖燥濕廣谷大川異制民生其間者異俗剛柔輕重遲速異齊五味異和器械異制衣服異宜修其教不易其俗齊其政不易其冝集説曰居謂居處亦謂居積材謂材質亦謂材用居處者因其材質疏引盧植云能寒者使居寒能暑者使居暑是也居積者因其所冝而為之偹如氊裘可以偹寒絺綌可以偹暑車以行陸舟以行水此皆因天地所冝也廣谷大川自天地初分其形氣已不同矣民生異俗理有固然其性情之緩急亦氣之所稟殊也飲食器械衣服之有異聖王亦豈必強之使同哉惟修其三綱五典之教齊其禮樂刑政之用而已所謂財成輔相者左右民也中國戎夷五方之民皆有性也不可推移馮氏曰五方之民以氣稟之不齊兼習俗之異尚是以其性各隨氣稟之昏明習俗之薄厚而不可推移焉若論其本然之性則一而已矣注亦曰地氣使之然東方曰夷被髮文身有不火食者矣南方曰蠻雕題交趾有不火食者矣西方曰戎被髮衣服有不粒食者矣北方曰狄衣羽毛穴居有不粒食者矣疏曰東方人好生萬物抵觸地而出夷者抵也有九種一玄莬二樂浪三高驪四蒲飾五鳬臾六索家七東室八倭人九天鄙蠻者慢也君臣同川而浴極為簡慢有八一天竺二咳首三僬僥四跂踵五穿胸六儋耳七狗軹八旁舂戎者凶也斬殺不得其中有六一僥夷二戎夷三老白四耆羌五鼻息六天剛狄者辟也其行邪辟有五一月支二穢貊三胸奴四單于五白屋集説曰雕刻也題額也刻其額以丹青涅之交趾言蠻卧時頭向外足在內而相交東南地氣暖故有不火食者西北地寒少五榖故有不粒食者中國夷蠻戎狄皆有安居和味冝服利用偹器疏曰言中國與四夷雖異各有所安之居所和之味所冝之服所利之用所偹之器其事各自充足五方之民言語不通嗜欲不同達其志通其欲東方曰寄南方曰象西方曰狄鞮北方曰譯疏曰寄言傳寄外內言語象者言放象外內之言鞮知也謂通傳夷狄之語與中國相知譯陳也謂陳説外內之言方氏曰以言語之不通也則必達其志以嗜欲之不同也則必通其欲必欲達其志通其欲非寄象鞮譯則不可故先王設官以掌之凡居民量地以制邑度地以居民地邑民居必參相得也熊氏曰計量土地廣狹制四井為邑每邑居三十二家有如是地畫如是田居如是民三者相得無有餘不足之弊矣無曠土無遊民食節事時民咸安其居樂事勸功尊君親上然後興學熊氏曰無曠土田皆井授也無遊民人皆受田也饔飱有節耕耘有時則民有飬而安居矣樂事勸功兼私家公室而言尊君服其教親上懷其德然後可得興學也司徒修六禮以節民性明七教以興民德齊八政以防淫一道德以同俗養耆老以致孝恤孤獨以逮不足上賢以崇德簡不肖以絀惡坡謂自此至不與士齒洪範之五曰司徒曰此一節統言鄉學國學教民取士之法非專言鄉也六禮七教八政見篇末一道德者國不異政教不殊俗也龜䇿傳所云化分為百室道散而無垠則不一矣命鄉簡不帥教者以告耆老皆朝于庠元日習射上功習鄉上齒大司徒帥國之俊士與執事焉集説曰以下方詳鄉教此言簡不肖以絀惡之事鄉在逺郊之內庠鄉學也耆老致仕及鄉中老賢者元日所擇之善日也期日定則耆老皆來會聚於是行射禮與鄉飲酒之禮射以中為上故曰上功鄉飲則序年之高下故曰上齒大司徒率其俊秀者與執禮事蓋欲使不帥教之人觀其上功自勵為功觀其上齒則知尊敬長老使俊士與之以為榮則惡者慕之而自勵也不變命國之名鄉簡不帥教者移之左命國之左鄉簡不帥教者移之右如初禮集説曰左右對移以易其藏修逰息之所新其師友講切之方庶幾其變也不變移之郊如初禮不變移之遂如初禮不變屏之逺方終身不齒疏曰按學記比年入學中年考校自一年入學至七年小成至九年大成此簡不帥教者謂初入學一年之終移左移右者謂間一年而考校之時移郊謂五年時移遂謂七年時屏之逺方謂九年之時集説曰四郊去國百里在鄉界之外遂又在逺郊之外蓋示之以漸逺之意也而猶不悛焉則其人終不可與入德矣於是乃屏棄之命鄉論秀士升之司徒曰選士司徒論選士之秀者而升之學曰俊士集説曰此言上賢崇德之事坡謂自鄉論秀士以至進士即如韓公送張童子言明經始自縣而州府以至禮部節節皆考試加察詳之法耳陳注引劉説何本曽謂不臆説者亦若此乎升於司徒者不征於鄉升於學者不征於司徒曰造士集説曰既升於司徒則免鄉之徭役而猶給徭役於司徒也及升國學則并免司徒之役矣造者成也言成就其才德也樂正崇四術立四教順先王詩書禮樂以造士春秋教以禮樂冬夏教以詩書集説曰此以下言國學教國子民俊及取賢才之法樂正掌其教司馬則掌選法也術者道路之名言詩書禮樂四者之教乃入德之路故言術也王大子王子羣后之大子卿大夫元士之適子國之俊選皆造焉凡入學以齒集説曰皆造皆來受教於學正也惟次長幼之序不分貴賤之等將出學小胥大胥小樂正簡不帥教者以告于大樂正大樂正以告于王注曰出學謂九年大成學止也小胥大胥皆樂官屬疏曰知學止者以上鄉中年考校恐此亦中年故明之知九年者以下再不變無移左右及郊遂之事故知是九年學止也王命三公九卿大夫元士皆入學不變王親視學注曰亦謂使習禮以化之不變王又親為之臨視重棄賢者子孫此習禮皆于大學也疏曰周立當代大學在公宫左即東膠也立小學於西郊即有虞氏之庠其習書於虞氏之學文王世子云書在上庠習禮樂於殷學故又云禮在瞽宗習舞于夏后氏學故云春夏學干戈秋冬學羽籥皆于東序不變王三日不舉屏之逺方西方曰棘東方曰寄終身不齒集説曰注以棘為𤏡又以𤏡訓逼𤏡本西戎地名愚謂讀如本字急也欲其遷善之速也寄者寓也暫寓而終歸之意蓋雖屏之終身不齒然猶為此名以示不忍終棄之意大樂正論造士之秀者以告于王而升諸司馬曰進士注曰移名於司馬司馬夏官卿掌邦政者進士可進受爵祿也疏曰此文承王大子等下似專據王子等其實鄉人入學為造士者亦同於此其鄉人不在學者及邦國所貢士所貢於王亦當升諸司馬司馬辨論官材論進士之賢者以告于王而定其論論定然後官之任官然後爵之位定然後祿之疏曰大樂正論秀以告王王必以所論狀授與司馬司馬得此狀乃更論辨之觀其材能知其堪任何官故云官材也辨論之後不堪者屏退論量賢者以告于王而正定其論各署其所長然後試以所能之官如長於禮者官之禮長於樂者官之樂堪任此官然後爵命之既受爵然後與之以祿大夫廢其事終身不仕死以士禮葬之集説曰廢其事如戰陳無勇而敗國殄民或荒淫失行而悖常亂俗生則擯棄死則貶降坡謂此簡不肖之類也有發則命大司徒教士以車甲注曰有發謂有軍師發卒疏曰教此士卒以乘兵車及衣甲之儀容必司徒者以司徒主衆又主教故與司馬相參也凡執技論力適四方裸股肱決射御疏曰執技既無道藝惟論力以事上故適往四方境界之外則使之擐露臂脛角材力決射御勝負見勇武凡執技以事上者祝史射御醫卜及百工凡執技以事上者不二事不移官出鄉不與士齒仕於家者出鄉不與士齒集説曰不二事則所業彌至於精不移官恐他職非其所長以技名者賤為大夫之臣亦賤故不得與為士者齒列然必出鄉乃爾者於其本鄉有族人親戚之為士者或不忍卑之故也坡謂祝史等七者之技用以事上此上賢之推也司寇正刑明辟以聼獄訟必三刺有旨無簡不聼附從輕赦從重集説曰正刑正定刑書明辟明斷罪法周禮以三刺斷庶民獄訟之中一曰訊羣臣二曰訊羣吏三曰訊萬民刺周禮此節疏云所刺不必是殺餘四刑亦當刺則刺即訊也若有發露之旨意而無簡核之實迹則難於聼斷矣於是有附有赦焉附而入之則施行從輕赦而出之則宥罪從重所謂與其殺不辜寧失不經也坡謂自此至識異言洪範之六曰司寇也凡制五刑必即天論郵罰麗於事注曰制斷也即就也必即天論言與天意合即或為則論或為倫疏曰制刑時必就天意論議輕重天意好生又有時以生有時以殺論刑時亦當好生又就天道使生殺得中郵過也言斷人罪過及責罰其身皆依附於所犯之事不可離其本事假他别事而為喜怒也凡聼五刑之訟必原父子之親立君臣之義以權之疏曰權平也凡犯罪之人或子為父隱臣為國諱雖獨刑禁而非其本惡故必本其宿情立其恩義為平量之意論輕重之序慎測淺深之量以别之注曰淺深謂俱有罪本心有善惡疏曰盡意思念論量罪之輕重次序不有越濫也悉其聰明致其忠愛以盡之疏曰盡已聰明尋其事之根本又致其忠恕仁愛不使嚴酷枉濫以盡罪情不有抑屈疑獄汜與衆共之衆疑赦之必察小大之比以成之集説曰汜猶廣也其或在所可疑則泛然而廣詢之衆見焉衆人共謂可疑則宥之矣比例也已行故事曰比小者有小罪之比大者有大罪之比言雖疑而赦之不可直爾而放當必察按舊例以成於事成獄辭史以獄成告於正正聼之正以獄成告於大司寇大司寇聼之棘木之下大司寇以獄之成告於王王命三公參聼之三公以獄之成告於王王三又然後制刑集説曰成獄辭者謂治獄者責核罪人之辭已成定也史司寇吏也正士師之屬聼察也棘木外朝之卿位也又當作宥周禮一宥曰不識再宥曰過失三宥曰遺忘謂行刑之時天子猶欲以此三者免其罪也自下而上咸無異説而天子猶必三宥而後有司行刑者在君為愛下之仁在臣有守法之義也凡作刑罰輕無赦馮氏曰此言立法制刑之意雖輕無赦所以使人難犯也惟其當刑必刑輕且不赦而况於重者乎故君子不容不盡心焉刑者侀也侀者成也一成而不可變故君子盡心焉疏曰侀是侀禮馬氏曰刑之所以為刑者猶人之有侀也一辭不具不足以為刑一體不傋不足以為成人辭之所成則罪定而不可變故君子盡心焉君子無所不盡其心至子用刑則尤慎焉者也析言破律亂名改作執左道以亂政殺集説曰剖析言辭破壞法律所謂舞文弄法者也變亂名物更改制度或挾異端邪道以罔惑於人皆足以亂政故在所當殺作淫聲異服竒技竒器以疑衆殺行偽而堅言偽而辨學非而博順非而澤以疑衆殺假於鬼神時日卜筮以疑衆殺此四誅者不以聼集説曰淫聲非先王之樂也異服非先王之服也竒技竒器如般請機封之類所行雖偽而堅不可破所言雖偽而辨不可屈如白馬非馬之類所學雖非正道而涉獵甚廣則亦難於窮詰順非文過也所行雖非而善於文飾其言滑澤無滯衆皆疑其為是也至於假托鬼神之禍福時日之吉凶卜筮之休咎注云今時持喪葬築蓋嫁取卜數文書使民悖禮違制故亂政者一疑衆者三皆決然殺之不復審聼為其害大而辭不可習也凡執禁以齊衆不赦過坡謂有刑有禁刑者罪其已然禁者防其將然此所執之禁蓋指下文市事而言曰過者未麗於法也市刑小刑憲罰中刑徇罰大刑撲罰有圭璧金璋不粥於市命服命車不粥於市宗廟之器不粥於市犧牲不粥於市戎器不粥於市方氏曰此所以禁民之不敬金璋以金飾之考工記大璋中璋黃金勺青金外者是矣用器不中度不粥於市兵車不中度不粥於市布帛精粗不中數幅廣狹不中量不粥於市姦色亂正色不粥於市集説曰此所以禁民之不法用器弓矢耒耜飲食器也數升縷多寡之數也布幅廣二尺二寸帛廣二尺四寸錦文珠玉成器不粥於市衣服飲食不粥於市集説曰此所以禁民之不儉坡謂衣服粥於市則縫絍不事飲食粥於市則男饞女惰好衣食而白遊則殺越取貨訟獄滋豐坡行天下見有此俗矣五榖不時果實未熟不粥於市木不中伐不粥於市禽獸魚龞不中殺不粥於市集説曰此所以禁民之不仁凡十有四事皆所以齊其衆而使風俗之同也關執禁以譏禁異服識異言劉氏曰凡上文所當禁戒之事雖有司刑司市之屬以治之然不有以譏察之則犯者衆而獲者寡矣故令司關者執禁戒之令以譏察之見異服則禁之聞異言則識之衣服易見故直曰禁言語難知故必曰識關境上門舉關則郊門城門亦在其中矣大史典禮執簡記奉諱惡天子齊戒受諫注曰簡記䇿書也諱先王名惡忌日若子卯坡謂自此至成歲事制國用在此上下全無所屬按周禮大史職會同朝覲以書協禮事大師抱天時與大師同車則此一經當在不覆巢之下冢宰制國用之上蓋文承巡守師田之後言大史秉禮從王正與周禮合下文則因王受教諫而及百官互正當否之事以起下文冡宰制國用之端也又按禮運云天子適諸侯舍其祖廟以禮籍入注云禮籍謂大史典禮執簡記奉諱惡也適諸侯正巡守征伐之事又其證也司會以歲之成質於天子冡宰齊戒受質集説曰司會冡宰之屬掌治法之財用會計及王與冡宰廢置等事故歲之將終也質平其一歲之計要於天子而先之冡宰冡宰重其事而齊戒以受其質質平也謂奏上文簿聼天子平量之大樂正大司寇市三官以其成從質於天子大司徒大司馬大司空齊戒受質集説曰市司市也周官司市下大夫二人司會所質冡宰既受之矣此三官各以其計要之成從司會而質於天子則司徒司馬司空亦齊戒而受之百官各以其成質於三官大司徒大司馬大司空以百官之成質於天子百官齊戒受質然後休老勞農成歲事制國用疏曰司會總主羣官簿書則司徒司馬司空簿書亦司會掌之質於天子若今時先申帳目樂正司寇司市當司事少即徑從司會以質於王其司徒司馬司空總主萬氏其事既大雖司會進其治要仍須各受質屬官親自質於天子天子平斷畢當須報於下故在下百官齊戒受天子所平之要坡謂疏解三官則司徒司馬司空非上樂正等之三官也一説百官位卑不敢專逹故但質於三官三官達於司徒司馬司空而為之質於天子凡養老集説曰養老之禮其目有四養三老五更一也子孫死於國事則養其父祖二也養致仕之老三也養庶人之老四也一歲之間凡七行之飲養陽氣則用春夏食養飲氣則用秋冬四時各一也凡大合樂必遂養老謂春入學舍菜合舞秋頒學合聲則通前為六又季春大合樂天子視學亦養老凡七也坡謂自此期不從政所謂養耆老以致孝也繼於司寇文後秋養耆老故也有虞氏以燕禮集説曰燕禮者一獻之禮既畢皆坐而飲酒以至於醉其牲用狗其禮亦有二一是燕同姓二是燕異姓也夏后氏以饗禮集説曰饗禮者體薦而不食爵盈而不飲立而不坐依尊卑為獻數畢而止然亦有四馬諸侯來朝一也王親戚及諸侯之臣來聘二也戎狄之君使來三也享宿衛及者老孤子四也惟宿衛及耆老孤子則以酒醉為度酒正云殷人以食禮集説曰食禮者有飯有殽雖設酒而不飲其禮以飯為主故曰食也然亦有二焉大行人云食禮九舉及公食大夫之類謂之禮食士大夫自與賔客旦夕共食則謂之燕食也饗食禮之正故行之於廟燕以示慈惠故行之於寢也周人修而兼用之注曰兼用之偹隂陽也凡飲養陽氣凡食養隂氣陽用春夏隂用秋冬疏曰春夏養老則用虞之燕夏之饗秋冬則用殷之食周尚文故兼用三代之禮也五十養於鄉六十養於國七十養於學達於諸侯注曰天子諸侯養老同也國國中小學在王宫之左學大學也在郊小學在國中大學在郊此殷制明矣疏曰此謂子孫為國死難而王養其父祖也八十拜君命一坐再至瞽亦如之九十使人受疏曰上言七十養於學也至於八十年漸衰弱不堪來學受養君使人就家致之集説曰君命人臣拜受禮也惟八十之老與無目之人為難偹禮故其拜也足一跪而首再至地以偹再拜之數九十則又不必親拜特使人代受此言君致享食之禮於其家而受之之禮如此然他命則亦必然矣五十異粻六十宿肉七十二膳八十常珍九十飲食不離寢膳飲從於遊可也集説曰粻糧也異者精粗與少者殊也宿肉謂恆隔日偹之不使求而不得也膳食之善者每有副二不使闕乏也常珍常食皆珍味也不離寢言寢處之所恆有庋閣之飲食也美善之膳水漿之飲隨其常逰之處而為之偹具可也六十歲制七十時制八十月制九十日修唯絞襟衾冒死而後制集説曰此言漸老則漸近死期當豫為送終之偹也歲制謂棺也不易可成故歲制衣物之難得者須三月可辨故云時制衣物之易得者則一月可就故云月制至九十則棺衣皆具無事於制作但每日修理之恐或有不完整也絞所以修束衣服為堅急者也襟單被也絞與襟皆用十五升布為之凡衾皆五幅士小斂緇衾頳裏大斂則二衾冒所以韜尸制如直囊上曰質下曰殺其用之先以殺韜足而上次以質韜首而下齊於手士緇質頳殺象生時玄衣纁裳也此四物須死乃制以其易成故也五十始衰六十非肉不飽七十非帛不暖八十非人不暖九十雖得人不暖矣五十杖於家六十杖於鄉七十杖於國八十杖於朝九十者天子欲有問焉則就其室以珍從集説曰杖所以扶衰巡守而就見百年者泛言衆庶之老也此就見九十者専指有爵者也祭義又言八十君問則就之者亦異禮也珍與常珍之珍同七十不俟朝八十月告存九十日有秩集説曰此謂大夫士聼致事者則七十杖於國朝君之時入至朝位君出揖即退不待朝事畢也若不聼致事則祭義云七十杖於朝八十不俟朝告猶問也君每月使人致膳告問存否也秩常也日使人以常膳致之也五十不從力政六十不與服戎七十不與賔客之事八十齊喪之事弗及也注曰力政城道之役也八十不齊則不祭也子代之祭疏曰上文歲制及杖於家之屬兼含大夫士及士庶人之老此節惟據庶人之事蓋大夫士六十未致仕若為軍將當與服戎故知此據庶人也方氏曰從謂行其事也與則與共而已及則旁有所加之謂以其老甚非特不能從與於事而事固不當及之矣五十而爵六十不親學七十致政唯衰麻為喪疏曰此謂凡常人有德故五十始為大夫若其有德不必五十則喪服小功章云大夫為昆弟之長殤是幼為大夫為兄之長殤集説曰不親學以其不能偹弟子之禮也致政還君事有死喪之事惟偹衰麻之服而已其他禮節皆在所不責也有虞氏養國老於上庠養庶老於下庠疏曰虞殷尚質貴取有成故大學在西小學在東夏周貴文取積漸長養故大學在東小學在西集説曰行養老之禮必於學以其為講明孝弟禮義之所也國老有爵有德之老庶老庶人及死事者之父祖也國老尊故於大學庶老卑故於小學上庠大學在西郊下庠小學在國中王宫之東夏后氏養國老於東序養庶老於西序集説曰東序大學在國中王宫之東西序小學在西郊殷人養國老於右學養庶老於左學集説曰右學大學在西郊左學小學在國中王宫之東周人養國老於東膠養庶老於虞庠虞庠在國之西郊集説曰東膠大學在國中王宫之東虞庠小學在西郊膠之言紏也庠之言養也有虞氏皇而祭深衣而養老夏后氏收而祭燕衣而養老殷人冔而祭縞衣而養老周人冕而祭玄衣而養老注曰皇冕屬凡養老之服皆其時與羣臣燕之服有虞氏質深衣而已夏而改之尚黑而黑衣裳殷尚白而縞衣裳周則兼用之玄衣素裳其冠則牟追章甫委貌也諸侯以天子之燕服為朝服燕禮曰燕朝服服是服也疏曰深衣謂白布衣皇氏以養老首還服皇崔氏以為與夏周同未知然否郊特牲云大古冠布齊則緇之大古則虞氏或用白布冠也凡三王養老皆引年集説曰待養國老庶老之禮畢即行引户校年之令當行復除也老人衆多非賢者不可皆養八十者一子不從政九十者其家不從政廢疾非人不養者一人不從政父母之喪三年不從政齊衰大功之喪三月不從政將徙於諸侯三月不從政自諸侯來徙家期不從政集説曰從政謂給公家之力役也方氏曰將徙欲去者來徙己來者夫人莫衰於老莫苦於疾莫憂於喪莫勞於徙此王政之所冝恤者故皆不使之從政焉熊氏曰將徙者舊業未去始來者生業未定此三月與期之别少而無父者謂之孤老而無子者謂之獨老而無妻者謂之矜老而無夫者謂之寡此四者天民之窮而無告者也皆有常餼疏曰孤顧也顧望無所瞻見也獨鹿也鹿鹿無所依也矜本又作鰥愁悒不能寐目恆鰥鰥然其字從魚魚目恆不閉寡倮也倮然單獨也餼廩也坡謂自此以其器食之所謂恤孤獨以逮不足也瘖聾跛躃斷者侏儒百工各以其器食之集説曰瘖者不能言聾者不能聽跛者一足廢躃者兩足俱廢斷者支足解絶侏儒身體短少者也百工衆雜技藝也器猶能也此六類者因其各有技藝之能足以供官之役使故遂因其能而以廩給食養之熊氏曰先王時瘖者實土聾者司火刖者守囿侏儒者扶廬刖跂躃之類道路男子由右婦人由左車從中央注曰道中三途逺别也坡謂自此至不徒食則禮讓成孝弟申王道四達此一道德以同俗之成效極致也父之齒隨行兄之齒鴈行朋友不相踰注曰廣敬也謂於塗中集説曰父之齒兄之齒謂其人年與父等或與兄等也隨行隨其後也鴈行並行而稍後也朋友年相若則彼此不可相踰越而有先後言並行而齊也輕任并重任分班白者不提挈疏曰父齒者也任謂有擔負者老少並輕則併與少者擔之也老少並重不可併與少者則分為輕重重與少者輕與老者君子耆老不徒行庶人耆老不徒食方氏曰徒行謂無乘而行也徒食謂無羞而食也應氏曰非人皆好德而士不失職安能使在路無徒行之賢非人各有養而俗尚孝敬安能使在家無徒食之老方一里者為田九百畝疏曰步百為畝是長一百步濶一步畝百為夫是一頃也長濶一百步夫三為屋是三頃也濶三百步長一百步屋三為井則九百畝也長濶一里方十里者為方一里者百為田九萬畝方百里者為方十里者百為田九十億畝疏曰一箇十里之方既為田九萬畝則十箇十里之方為田九十萬畝一百箇十里之方為田九百萬畝今云九十億畝是一億有十萬十億有一百萬九十億乃九百萬畝也方千里者為方百里者百為田九萬億畝疏曰計千里之方為方百里者百一箇百里之方既為九十億畝則十箇百里之方為九百億畝百箇百里之方為九千億畝今乃云九萬億畝與數不同者若以億言之當云九千億畝若以萬言之當云九萬萬畝經文誤也應氏曰自此至篇末皆覆解首及中間井田封建地里之界自恆山至於南河千里而近注曰冀州域自南河至於江千里而近注曰豫州域自江至於衡山千里而遙注曰荆州域自東河至於東海千里而遙注曰徐州域自東河至於西河千里而近注曰亦冀州域自西河至於流沙千里而遙注曰雍州域西不盡流沙南不盡衡山東不盡東海北不盡恆山疏曰以千里言之自恆山至南河其地稍近言不滿千里自江至衡山其地稍逺言不啻千里熊氏以為近者謂過千里遙者謂不滿千里其義似非餘放此應氏曰此獨言東海者東海在中國封疆之內而西南北則夷徼之外也南以江與衡山為限百越未盡開也河舉東西南北者河流縈帶周逺雖流沙分際亦與河接也自秦而上西北袤而東南蹙秦而下東南展而西北縮先王盛時四方各有不盡之地不勞中國以事外也禹貢東漸西被朔南咸暨特聲教所及非貢賦所限也凡四海之內斷長補短方三千里為田八十萬億一萬億畝方百里者為田九十億畝山陵林麓川澤溝瀆城郭宫室塗巷三分去一其餘六十億畝疏曰為田八十萬億一萬億畝者以一州方千里九州方三千里三三為九為方千里者九一箇千里有九萬億畝九箇千里九九八十一故有八十一萬億畝於八十整數之下云萬億是八十箇萬億又云一萬億言是詳也以前文誤為萬億此則因前文之誤更以萬億言之古者以周尺八尺為步今以周尺六尺四寸為步古者百畝當今東田百四十六畝三十步古者百里當今百二十一里六十步四尺二寸二分注曰周尺之數未詳聞也按禮制周猶以十寸為尺蓋六國時多變亂法度或言周尺八寸則步更為八八六十四寸以此計之古者百畝當今百五十六畝二十五步古者百里當今百二十五里嚴氏説南東其畝云或南其畝或東其畝順地勢及水之所趨也坡謂此數如疏所解儒者皆謂亦誤坡從子鑑通西算令為細推曰周尺八寸八尺為步則一步六尺四寸自乘得四千又九十六寸為一步之積今以六尺四寸為步則一步五尺一寸二分自乘得二千六百二十一寸四十四分為一步之積二積相較古步多一千四百七十四寸五十六分百畝共多一千四百七十四萬五千六百寸置所多之數為實以今步積二千六百二十一寸四十四分為法除之得五十六畝二十五步是古者百畝當今東田百五十六畝二十五步也求里者以百里長三萬步以古步長今步一尺二寸八分乘之得三萬八千四百尺為古百里多於今百里之長置今里三百步以今步長五尺一寸二分乘之得一千五百三十六尺為今里之長古百里所多之長為實今里長為法除之得二十五里是古者百里當今百二十五里也此解與注合可為定數矣方千里者為方百里者百集説曰天下九州王畿居中外八州每州各方千里是一百箇百里以開方之法推之合萬里也封方百里者三十國其餘方百里者七十集説曰公侯皆方百里封三十箇百里剩七十箇百里又封方七十里者六十為方百里者二十九方十里者四十集説曰伯七十里封六十箇七十里是占二十九箇百里四十箇十里於三十箇百里內剩六十箇十里其餘方百里者四十方十里者六十又封方五十里者百二十為方百里者三十其餘方百里者十方十里者六十集説曰除上封二等國共占六十箇百里外止剩四十箇百里及六十箇十里於此地內封子男五十里之國者百二十箇每一百里封四箇實占三十箇百里通三等封止剩十箇百里六十箇十里伯國方七十里七七四十九是四十九箇十里子男方五十里五五二十五是二十五箇十里名山大澤不以封其餘以為附庸間田諸侯之有功者取於間田以録之其有削地者歸之間田集説曰除名山大澤之外皆為附庸之國及間田天子之縣內方千里者為方百里者百封方百里者九其餘方百里者九十一又封方七十里者二十一為方百里者十方十里者二十九其餘方百里者八十方十里者七十一又封方五十里者六十三為方百里者十五方十里者七十五其餘方百里者六十四方十里者九十六集説曰此倣上章畿外之法推之可見畿外封國多而餘地少廣封建之制於天下也畿內封國少而餘地多偹采邑之分於王朝也諸侯之下士祿食九人中士食十八人上士食三十六人下大夫食七十二人卿食二百八十八人君食二千八百八十人集説曰此言大國之數次國之卿食二百一十六人君食二千一百六十人集説曰次國大夫亦食七十二人卿三大夫祿故食二百一十六人小國之卿食百四十四人君食千四百四十人集説曰小國大夫亦食七十二人卿倍大夫祿故食百四十四人次國之卿命於其君者如小國之卿集説曰降於天子所命也天子之大夫為三監監於諸侯之國者其祿視諸侯之卿其爵視次國之君其祿取之於方伯之地集説曰祿視諸侯之卿可食二百八十八人者也方伯為朝天子皆有湯沐之邑於天子之縣內視元士集説曰謂之湯沐者言入至畿內即暫止頓於此齊潔而往也春秋傳謂之朝宿之邑惟方伯有之其餘否許慎云周千八百諸侯若皆有之則盡京師地亦不能容諸侯世子世國大夫不世爵使以德爵以功未賜爵視天子之元士以君其國諸侯之大夫不世爵祿集説曰世子世國畿外之制也天子大夫不世爵而世祿先王使人爵人必取其有德有功者列國之君薨其子未得爵賜則其衣服禮數視天子之元士賜爵而後得如先君之舊也諸侯之大夫不世爵祿而有大功德者亦世之左傳言官有世功則有官族六禮冠昏喪祭鄉相見集説曰今所存者士冠士昏士喪特牲少牢饋食鄉飲酒鄉射士相見七教父子兄弟夫婦君臣長幼朋友賓客八政飲食衣服事為異别度量數制集説曰飲食為上衣服次之事為謂百工技藝也異别五方用器不同也度丈尺也量斗斛也數百十也制布帛幅廣狹也禮記述注卷五
