body:
  text: 禮記述註卷二十四安溪李光坡撰緇衣第三十三疏曰鄭云善其好賢者之厚故述其所稱之詩以為其名也緇衣鄭詩美武公也劉獻云公孫尼子所作也子言之曰為上易事也為下易知也則刑不煩矣註曰言君不苛虐臣無姦心則刑可以措疏曰此篇凡二十四章唯此云子言之曰餘二十三章皆云子曰以篇首異宜故也此篇題緇衣而入文不先云緇衣者欲見君明臣賢如此後乃可服緇衣也子曰好賢如緇衣惡惡如巷伯則爵不瀆而民作愿刑不試而民咸服大雅曰儀刑文王萬邦作孚集說曰緇衣鄭國風首篇美鄭武公之詩小雅巷伯寺人刺幽王之詩大雅文王之篇國詩作邦吕氏曰好賢必如緇衣之篤則人知上之誠好賢矣不必爵命之數勸而民自起愿心以敬上故曰爵不瀆而民作愿惡惡必如巷伯之深則民知上之誠惡惡矣不必刑罰之施而民自畏服故曰刑不試而民咸服文王好惡得其正而一出乎誠心故為天下之所儀刑徳之所以孚乎下也子曰夫民教之以徳齊之以禮則民有格心教之以政齊之以刑則民有遯心故君民者子以愛之則民親之信以結之則民不倍恭以涖之則民有孫心甫刑曰苖民匪用命制以刑惟作五虐之刑曰法是以民有惡徳而遂絶其世也註曰遯逃也孫順也甫刑尚書篇名命謂政令也髙辛氏之末諸侯有三苖者作亂其治民不用政令專制御之以嚴刑乃作五虐蚩尤之刑以是為法於是民皆為惡起倍畔也三苖由此見滅無後世由不任徳葉氏曰子以愛之信以結之所謂教之以徳也恭以涖之所謂齊之以禮也子曰下之事上也不從其所令從其所行上好是物下必有甚者矣故上之所好惡不可不慎也是民之表也註曰言民化行不拘於言甚者甚於君也民之表者言民之從君如影逐表子曰禹立三年百姓以仁遂焉豈必盡仁詩云赫赫師尹民具爾瞻甫刑曰一人有慶兆民賴之大雅曰成王之孚下土之式註曰百姓傚禹為仁非本性能仁遂猶達也集說曰詩小雅節南山之篇赫赫威盛貌師尹周太師尹氏具俱也大雅下武之篇言武王能成王者之徳孚信於民而天下皆法式之子曰上好仁則下之為仁爭先人故長民者章志貞教尊仁以子愛百姓民致行已以說其上矣詩云有梏徳行四國順之註曰民致行已者民之行皆盡已心集說曰章志者明吾好惡之所在也貞教者身率以正也所志所教莫非尊仁之事以此為愛民之道是以民感其子愛之心致力於行已之善而悦其上如子從父母之命也詩大雅抑之篇梏當依詩作覺言有能覺悟人以徳行者則四國服從之也子曰王言如絲其出如綸王言如綸其出如綍故大人不倡游言可言也不可行君子弗言也可行也不可言君子弗行也則民言不危行而行不危言矣詩云淑慎爾止不諐于儀集說曰綸綬也疏云如宛轉繩綍引棺索也危髙也詩大雅抑之篇止容止諐過也吕氏曰大人王公之謂也游言無根不定之言也易曰誣善之人其辭游為人上者倡之以誠慤篤實之言天下猶有欺詐以罔上者苟以游言倡之則天下蕩然虛浮之風作矣可不慎乎可言而不可行過言也可行而不可言過行也君子弗言弗行則言行不越乎中民將效之言不敢髙於行而言之必可行也行不敢髙於言而必為繼之道也子曰君子道人以言而禁人以行故言必慮其所終而行必稽其所敝則民謹於言而慎於行詩云慎爾出話敬爾威儀大雅曰穆穆文王於緝熙敬止集說曰道化誨之也道人以言而必慮其所終恐其行之不能至則為虚誕也禁謹飭之也禁人以行而必稽其所敝慮其末流之或偏也如是則民皆謹言而慎行矣詩大雅抑之篇大雅文王之篇穆穆深逺之意於歎美辭緝繼續也熙光明也两引詩皆以為謹言之證吕氏曰進取於善者夷考其行而不掩猶不免於狂况不在於善者乎故曰言必慮其所終夷惠之清和其末猶為隘與不恭故曰行必稽其所敝文王之徳亦不越敬其容止而已子曰長民者衣服不貳從容有常以齊其民則民徳壹詩云彼都人士狐裘黄黄其容不改出言有章行歸于周萬民所望集說曰詩小雅都人士之篇周忠信也馬氏曰狐裘黄黄服其服也其容不改文以君子之容也出言有章遂以君子之辭也行歸於周實以君子之徳也子曰為上可望而知也為下可述而志也則君不疑於其臣而臣不惑於其君矣尹吉曰惟尹躬及湯咸有壹徳詩云淑人君子其儀不忒集說曰君之待臣表裏如一故曰可望而知臣之事君一由忠誠其職業可稱述而記志此所以上下之間不疑不忒也尹吉伊尹告太甲之書今咸有一徳篇文詩曹風鳲鳩之篇引書以證君臣相得又引詩以證壹徳之義子曰有國家者章義􅓠惡以示民厚則民情不貳詩云靖共爾位好是正直陸氏曰章義如字尚書作善皇云義善也吕氏曰章明也􅓠病也明之斯好之矣病之斯惡之矣善居其厚惡居其薄此所以示民厚也好善惡惡之分定民情所以不貳也詩小雅小明之篇引之以明章善之義子曰上人疑則百姓惑下難知則君長勞故君民者章好以示民俗慎惡以御民之淫則民不惑矣臣儀行不重辭不援其所不及不煩其所不知則君不勞矣詩云上帝板板下民卒􅓠小雅曰匪其止共維王之卭註曰難知有姦心也重猶尚也援猶引也言君所不及謂必使其君所行如堯舜也不煩以其所不知謂必使其知慮如聖人也凡告諭人當隨其才以誘之上帝喻君也板板辟也卒盡也􅓠病也此君使民惑之詩卭勞也言臣不止於恭敬其職惟使王之勞此臣使君勞之詩也方氏曰上人疑猶豫不明也臣有可儀之行而所重者不在乎辭則凡有所行者無偽行矣苟有所言者無虚辭矣子曰政之不行也教之不成也爵禄不足勸也刑罰不足恥也故上不可以䙝刑而輕爵康誥曰敬明乃罰甫刑曰播刑之不廸註曰播猶施也不衍字耳廸道也言施刑之道疏曰皇氏云言政令所以不行教化所以不成者秪由君上爵加於小人不足勸人為善也由刑罰加於無罪之人不足恥其為惡由賞罰失所故致政之不行教之不成也故君上不可輕䙝之子曰大臣不親百姓不寧則忠敬不足而富貴已過也大臣不治而邇臣比矣故大臣不可不敬也是民之表也邇臣不可不慎也是民之道也君毋以小謀大毋以逺言近毋以内圖外則大臣不怨邇臣不疾而逺臣不蔽矣葉公之顧命曰毋以小謀敗大作毋以嬖御人疾莊后毋以嬖御士疾莊士大夫卿士集說曰大臣不見親信則民不服從其令故不寧也此盖由臣之忠不足於君君之敬不足於臣君與臣富貴已過極也由是邇臣之黨相比以奪大臣之柄而使之不得治其事故大臣所以不可不敬者以其為民所瞻望之儀表也邇臣所以不可不慎者以君之好惡係焉乃民之所從以為道者也人君不使小臣謀大臣則大臣不至於怨乎不以不使逺臣間近臣則近臣不至於疾其君不使内之寵臣圖四方宣力之士則逺臣之賢無所壅蔽而得見知於上矣葉公楚葉縣尹沈諸梁字子髙僭稱公顧命臨死囘顧之言也毋以小謀敗大作謂不可用小臣之謀而敗大臣所作之事也疾毁惡之也莊猶正也敬也君所取正而加敬之謂也子曰大人不親其所賢而信其所賤民是以親失而教是以煩詩云彼求我則如不我得執我仇仇亦不我力君陳曰未見聖若已弗克見既見聖亦不克由聖註曰親失失其所當親也教煩由信賤也賤者無一徳也集說曰詩小雅正月之篇言彼小人初用事求我以為法則惟恐不得既而不合則空執留之視如仇讎然不用力於我矣仇仇者言不一仇之無往而不忤其意也君陳周書兼引之皆為不親賢之證子曰小人溺於水君子溺於口大人溺於民皆在其所䙝也夫水近於人而溺人徳易狎而難親也易以溺人口費而煩易出難悔易以溺人夫民閉於人而有鄙心可敬不可慢易以溺人故君子不可以不慎也註曰言水人所沭浴自潔清者至於深淵洪波所當畏慎也由近人之故或泳之游之䙝慢而無戒心以取溺焉難親親之當肅敬如臨深淵費而煩多言且煩數也過言一出駟馬不能及不可得悔也口舌所覆亦如溺矣言民不通於人道而心鄙詐難卒告諭人君敬慎以臨之則可若陵虐而慢之分崩怨畔君無所尊亦如溺矣不可不慎者慎所可䙝乃不溺矣熊氏曰水近於人謂日用之需也然何故溺人以徳雖柔弱而深險之勢難親也太甲曰毋越厥命以自覆也若虞機張往省括于厥度則釋兌命曰惟口起羞惟甲胄起兵惟衣裳在笥惟干戈省厥躬太甲曰天作孼可違也自作孼不可以逭尹吉曰惟尹躬天見于西邑夏自周有終相亦惟終註曰越之言蹷也厥其也覆敗也虞主田獵之地者也機弩牙也度謂所擬射也虞人之射禽弩已張從機間視括與所射參相得乃後釋弦發矢為政亦當以己心參於羣臣及萬民可乃後施也兌當為說衣裳朝祭之服也惟口起羞當慎言語也惟甲胄起兵當慎軍旅之事也惟衣裳在笥當服以為禮也惟干戈省厥躬當恕已不尚害人也違猶辟也逭逃也尹吉尹誥也天當為先字之誤忠信為周相助也伊尹言夏之先君臣皆忠信以自終今天絶桀者以其自作孽夏之邑在亳西坡謂括箭受弦處也此引太甲明慎之機要也次引兌命明四者之必慎所以當省而無越厥命也三引太甲申自覆意四引尹吉見覆自覆則有終亦在自矣故曰自周子曰民以君為心君以民為體心莊則體舒心肅則容敬心好之身必安之君好之民必欲之心以體全亦以體傷君以民存亦以民亡詩云昔吾有先正其言明且清國家以寧都邑以成庶民以生誰能秉國成不自為正卒勞百姓君雅曰夏日暑雨小民惟曰怨資冬祈寒小民亦惟曰怨集說曰此承上文大人溺於民之意而言昔吾有先正以下五句逸詩也下三句今見小雅節南山之篇言今日誰人秉持國家之成法乎師尹實秉持之乃不自為政而信任羣小終勞苦百姓也君牙周書資書作咨祈大也下復缺一咨字方氏曰民以君為心者言好惡從於君也君以民為體者言休戚同於民也體雖致用於外然由於心之所使故曰心好之身必安之心雖為主於内然資乎體之所保故曰心以體全亦以體傷子曰下之事上也身不正言不信則義不壹行無類也子曰言有物而行有格也是以生則不可奪志死則不可奪名故君子多聞質而守之多志質而親之精知畧而行之君陳曰出入自爾師虞庶言同詩云淑人君子其儀一也集說曰義不壹或從或違由身不正也行無類或善或否由言不信也君陳書言謀政事者當出入反覆與衆人共虞度其可否而觀庶言之同異也詩曹風鳲鳩之篇引以證義壹行類吕氏曰有物則非失實之言有格則無踰矩之行歸於一而不可變生乎由是死乎由是故志也名也不可得而奪也熊氏曰然其初必本於學焉故君子多聞善言質正於人守之而服膺勿失多見善行而志之且親之而學問不厭雖由多聞多志而得之又當精思以其至約而行之畧者約也此皆義壹行類之道也引君陳以証多聞見而質之見其用功也引曹風以証義壹行類見其成功也子曰唯君子能好其正小人毒其正故君子之朋友有鄉其惡有方是故邇者不惑而逺者不疑也詩云君子好仇集說曰小人視君子如仇讎常有禍之之心此所謂毒其正也君子所好不可以非其人故曰朋友有鄉所惡不可以及善人故曰其惡有方前章言章善癉惡以示民厚則民情不貳今好惡既明民情歸一故邇者逺者不惑不疑也詩周南闗雎之篇言君子有良善之仇匹引以證同道之朋子曰輕絶貧賤而重絶富貴則好賢不堅而惡惡不著也人雖曰不利吾不信也詩云朋友攸攝攝以威儀集說曰詩大雅既醉之篇言朋友所以相檢攝者在威儀以喻不在貧賤富貴也馬氏曰賢者宜富貴而富貴者未必皆賢惡者宜貧賤而貪賤者未必皆惡於其貧賤而輕有以絶之則是好賢不堅也於其富貴而重有以絶之則是惡惡不著也是志在於利而不在於道人雖曰不利者吾不信也子曰私惠不歸徳君子不自留焉詩云人之好我示我周行集說曰上文言好惡皆當循公道故此言人有私惠於我而不合於徳義之公君子决不留之於已也詩小雅鹿鳴之篇周行大道也言人之好愛我者示我以大道而已引以明不留私惠之義子曰苟有車必見其軾苟有衣必見其敝人苟或言之必聞其聲苟或行之必見其成葛覃曰服之無射熊氏曰此喻誠之不可揜見人之當謹言行也有車必見其乗而慿軾有衣必見其服之而至於敝况人之言行豈可揜乎無論善惡但宣之口則聲聞於人措之身則迹見於外自然之理也引葛覃之詩以明服之久而無厭射則必見其敝矣子曰言從而行之則言不可飾也行從而言之則行不可飾也故君子寡言而行以成其信則民不得大其美而小其惡詩云白圭之玷尚可磨也斯言之玷不可為也小雅曰允也君子展也大成君奭曰在昔上帝周田觀文王之徳其集大命于厥躬集說曰從順也謂順於理也言順於理而行之則言為可用而非文飾之言矣行順於理而言之則行為可稱而非文飾之行矣言之不怍則為之也難寡言而行即訥於言而敏於行之意以成其信謂言行皆不妄也大其美者所以要譽小其惡者所以飾非皆言之所為也君子寡言以示教故民不得如此詩大雅抑之篇玷缺也小雅車攻之篇允信也展誠也君奭周書言昔者上帝降割罰于殷而申重奬勸文王之徳集大命於其身使有天下熊氏曰抑詩以明君子當寡言而行也小雅以証君子能成其信也君奭以証君子以信而得民也子曰南人有言曰人而無恒不可以為卜筮古之遺言與龜筮猶不能知也而况於人乎詩云我龜既厭不我告猶兌命曰爵無及惡徳民立而正事純而祭祀是為不敬事煩則亂事神則難易曰不恒其徳或承之羞恒其徳偵婦人吉夫子凶集說曰論語言不可以作巫醫是為巫為醫此言為卜筮乃是求占於卜筮龜筮猶不能知言無常之人雖先知如龜筮亦不能定其吉凶况於人乎詩小雅小旻之篇猶謀也言卜筮煩數龜亦厭之不復告以所謀之吉凶也易恒卦九三爻辭承進也婦人之徳從一而終故吉夫子制義故從婦則凶也熊氏曰兌命與今書文異姑取事神則難一句及小旻詩皆以明龜筮不能知之意引易取或承之羞以明人不能知也奔䘮第三十四註曰此於别録屬䘮服之禮實逸曲禮之正篇也漢興後得古文而禮家又貪其說因合於禮記耳疏曰漢興於魯淹中得古禮五十七篇其十七篇與今儀禮正同其餘四十篇藏在秘府謂之逸禮此奔䘮禮在十七篇外既謂之逸何以下文註又引逸奔䘮禮似此奔䘮禮外更有逸禮者但此奔䘮禮對十七篇為逸内録入於記其不入於記者又比此為逸也故二逸不同其實秪是一篇也奔䘮之禮始聞親䘮以哭答使者盡哀問故又哭盡哀疏曰此一節論初聞之節五服皆然知者以下文别云唯父母則知以前兼五服也遂行日行百里不以夜行註曰雖有哀戚猶辟害也晝夜之分别於昏明哭則遂行者不為位唯父母之䘮見星而行見星而舍若未得行則成服而后行疏曰未得行奉君命而使使事未了也凡聞䘮若聞父母之䘮其哭之不離聞䘮之處不得為位即奔之也若有君命未得奔䘮者雖父母之䘮既聞䘮而哭又為位更哭也過國至竟哭盡哀而止哭辟市朝望其國竟哭註曰哭辟市朝為驚衆也望國竟哭斬衰者也自是哭且遂行疏曰過國至竟他國竟上也望國竟哭雖云斬衰其實母之齊衰亦然也至於家入門左升自西階殯東西面坐哭盡哀括髪袒降堂東即位西鄉哭成踊襲絰于序東絞帶反位拜賓成踊送賓反位集說曰此言奔父䘮之禮為人子者升降不由阼階今父新死未忍異於生故入自門左升自西階也括髪袒者去飾也未成服者素委貌深衣已成服者固自䘮服矣在家而親死則笄纚小斂畢乃括髪此自外而至故即括髪而袒衣也鄭云已殯者位在下此奔䘮在殯後故自西階降而即其堂下東之位也襲絰者掩其袒而加要絰也序東者在堂下而當堂上序牆之東也在家小斂當奔之禮又哭既小斂著絰則合又哭乃絰不於又哭乃絰者發䘮已踰日即於是可也不散帶者不見尸柩此絞帶即襲絰之絰非象革帶之絞帶也絰重象革帶之絞帶輕反位復先所即之位也凡拜賓皆就賓之位而拜之拜竟則反已之位而哭踊也成踊說見前有賓後至者則拜之成踊送賓皆如初衆主人兄弟皆出門出門哭止闔門相者告就次於又哭括髪袒成踊於三哭猶括髪袒成踊三日成服拜賓送賓皆如初註曰次倚廬也又哭至明日朝也三哭又其明日朝也皆升堂括髪袒如始至必又哭三哭者象小歛大歛時也雜記曰士三踊其夕哭從朝夕哭不括髪不袒不踊不以為數三日三哭之明日也既哭成其服䘮服杖於序東疏曰括髪袒皆在堂上殯東西面成踊則在堂下之東西面位也奔䘮者非主人則主人為之拜賓送賓坡謂以上適子奔䘮禮此似言衆子奔䘮之禮也盖主人唯為之拜賓送賓其它則皆如主人也註疏無明解似以此為奔齊衰以下之冒語恐非奔䘮者自齊衰以下入門左中庭北面哭盡哀免麻于序東即位袒與主人哭成踊於又哭三哭皆免袒有賓則主人拜賓送賓丈夫婦人之待之也皆如朝夕哭位無變也註曰不升堂哭者非父母之䘮統於主人也麻亦絰帶也於此言麻者明所奔䘮雖有輕者不至䘮所無改服也凡袒者於位襲於序東袒襲不相因位此麻乃袒變於為父母也又哭三哭亦入門左中庭北面如始至時也待奔䘮者無變嫌賓客之也於賓客以哀變為敬此骨肉哀則自哀矣於此乃言待之明奔䘮者至三哭猶不以序入也疏曰以主人待奔之人俱在東階下故奔䘮者在中庭北面繼統於主人也主人惟饋奠有事之時乃升堂若㝷常無事恒在堂下也即位袒是袒在於位也免麻於序東麻即襲也序東在位北隱暎於序是袒襲不相因位也平常五屬入哭則與主人為次重者前輕者後今奔䘮者急哀但獨入哭不俟主人為次序非唯初至如此至又哭三哭皆然奔母之䘮西面哭盡哀括髪袒降堂東即位西鄉哭成踊襲免絰于序東拜賓送賓皆如奔父之禮於又哭不括髪註曰為母於又哭而免輕於父也其他則同疏曰此謂適子故云拜賓送賓皆如奔父之禮也婦人奔䘮升自東階殯東西面坐哭盡哀東髽即位與主人拾踊註曰婦人謂姑姊妹女子子也東階東面階也婦人入者由闈門東髽髽於東序不髽於房變於在室者也去纚大紒曰髽拾更也主人與之更踊賓客之疏曰闈門謂東邉之門男子免在東序故知婦人亦髽於東序就掩映之處在堂上男子則堂下也東面之階雜記云側階也熊氏云未殯之前婦人髽於室若既殯之後室中是神之所處婦人在堂當髽於東房今此婦人始來奔䘮故髽於東序耳奔䘮者不及殯先之墓北面坐哭盡哀主人之待之也即位於墓左婦人墓右成踊盡哀括髪東即主人位絰絞帶哭成踊拜賓反位成踊相者告事畢集說曰不及殯葬後乃至也尸柩既不在家則當先哭墓此奔䘮者是適子故其衆主人之待之者與婦人皆往墓所就墓所分左右之位奔者括髪而於東偏即其主人之位禮畢則相者以畢事告遂冠歸入門左北面哭盡哀括髪袒成踊東即位拜賓成踊賓出主人拜送有賓後至者則拜之成踊送賓如初衆主人兄弟皆出門出門哭止相者告就次於又哭括髪成踊於三哭猶括髮成踊三日成服於五哭相者告事畢註曰又哭三哭不袒者哀戚已久殺之也逸奔䘮禮說不及殯日於又哭猶括髪即位不袒告事畢者五哭而不復哭也成服之朝為四哭此謂既期乃後歸至者也其未期猶朝夕哭不止於五哭集說曰遂冠而歸者不可以括髪行於道路也冠謂素委貌入門出門皆謂殯宫門也五哭者初至象始死為一哭明日象小斂為二哭又明日象大斂為三哭又明日成服之日為四哭又明日為五哭皆數朝哭不數夕哭為母所以異於父者壹括髪其餘免以終事他如奔父之禮註曰壹括髪謂歸入門哭時也於此乃言為母異於父者明及殯不及殯其異者同疏曰鄭恐壹括髪是墓所入門則不括髪故明之其異者同謂及殯壹括髪不及殯亦壹括髪是異於父者其事同也齊衰以下不及殯先之墓西面哭盡哀免麻于東方即位與主人哭成踊襲有賓則主人拜賓送賓賓有後至者拜之如初相者告事畢遂冠歸入門左北面哭盡哀免袒成踊東即位拜賓成踊賓出主人拜送於又哭免袒成踊於三哭猶免袒成踊三日成服於五哭相者告事畢註曰不言袒言襲者容齊衰親者或袒可為父於又哭括髪而不袒此又哭三哭皆言袒袒衍字也疏曰齊衰以下有大功小功緦麻月日多少不同若奔在葬後而三月之外大功以上則有免麻東方三日成服若小功緦麻則不得有三日成服小功以下不稅無追服之理若葬後通葬前未滿五月小功則亦三日成服其緦麻者止臨䘮節而來亦得三日成服也東即位拜賓成踊者東即位謂奔䘮者於東方就哭位拜賓則是主人代之拜此奔䘮者當主人代拜賓時已則成踊也又曰經直言免麻於東方即位不稱袒而下云成踊襲襲則有袒理經若言袒恐齊衰以下皆袒故不得總言袒而稱襲者容有齊衰重為之得襲也聞䘮不得奔䘮哭盡哀問故又哭盡哀乃為位括髪袒成踊襲絰絞帶即位拜賓反位成踊賓出主人拜送于門外反位若有賓後至者拜之成踊送賓如初於又哭括髪袒成踊於三哭猶括髪袒成踊三日成服於五哭拜賓送賓如初註曰聞父母䘮而不得奔謂以君命有事不然者不得為位位有酇列之處如於家朝夕哭位矣不於又哭乃絰者䘮至此踰日節於是可也不言就次者當從其事不可以䘮服廢公職也其在官亦告就次言五哭者以廹公事五日哀殺亦可以止疏曰在官謂在官府館舍館舍是賓之所專有由館舍之中而作廬故知禮亦告就次經云五哭不云哀止知可以止者若成服之後恒常有哭何須特云五哭明五哭之後不復朝夕有哭也若除䘮而後歸則之墓哭成踊東括髪袒絰拜賓成踊送賓反位又哭盡哀遂於家不哭主人之待之也無變於服與之哭不踊註曰東東即主人位如不及殯者也遂除除於墓而歸無變於服自若時服也亦即位於墓左婦人墓右疏曰亦謂主人適子初在墓南北面哭成踊乃來就主人之位括髮袒也不踊者其服已除哀情已殺也自齊衰以下所以異者免麻集說曰齊衰大功小功緦之服其奔䘮在除䘮之後者唯首免要麻絰於墓所哭罷即除無括髪等禮也故云所以異者免麻凡為位非親䘮齊衰以下皆即位哭盡哀而東免絰即位袒成踊襲拜賓反位哭成踊送賓反位相者告就次三日五哭卒主人出送賓衆主人兄弟皆出門哭止相者告事畢成服拜賓若所為位家逺則成服而往註曰謂無君事又無故可得奔䘮而以已私未奔者也父母之䘮則不為位其哭之不離聞䘮之處齊衰以下更為位而哭皆可行乃行卒猶止也三日五哭者始聞䘮訖夕為位乃出就次一哭也與明日又明日之朝夕而五哭不五朝哭而數朝夕備五哭而止亦為急奔䘮已私事當畢亦明日乃成服凡云五哭者其後有賓亦與之哭而拜之集說曰主人出送賓者謂既奔䘮至家則喪家之主人為之出送賓也所謂奔喪者非主人則主人為之出送賓是也衆主人兄弟亦謂在喪家者成服拜賓者謂三日五哭卒之明日為成服其後有賓亦與之哭而拜之也前四處有五哭之文上两處五哭下無拜送賓之事下两處五哭雖有拜送賓恐與上有異故鄭總明之云凡五哭後皆有也若所為位者之家道逺則成服而后往亦可盖外喪緩可容辦集而行也齊衰望鄉而哭大功望門而哭小功至門而哭緦麻即位而哭集說曰雜記云大功望鄉而哭者謂本是齊衰降而服大功也故與此不同哭父之黨於廟母妻之黨於寢師於廟門外朋友於寢門外所識於野張帷凡為位不奠註曰黨謂族類無服者也逸奔喪禮曰哭父族與母黨於廟妻之黨於寢朋友於寢門外壹哭而已不踊言壹哭而已則不為位矣不奠以其精神不在於是疏曰此一節明無服之親聞喪所哭之處案檀弓云師吾哭諸寢與此異此哭父黨於廟而檀弓云有殯聞逺兄弟之䘮哭於側室若無殯則在寢與此不同者異代禮也哭天子九諸七卿大夫五士三大夫哭諸侯不敢拜賓諸臣在他國為位而哭不敢拜賓與諸侯為兄弟亦為位而哭凡為位者壹袒註曰此臣聞君喪而未奔為位而哭尊卑日數之差也士亦有屬吏賤不得君臣之名集說曰大夫哭諸侯哭其舊君也不敢拜賓避為主也在他國為使而出也與諸侯為兄弟亦謂在異國者壹袒謂為位之日也明以往不袒矣若父母之喪則必三袒所識者弔先哭于家而後之墓皆為之成踊從主人北面而踊集說曰已所知識之人死而往弔之時已在葬後矣必先哭于其家者情雖由於死者而禮則施於生者故也主人墓左西向賓北面向墓而踊固賓主拾之然必主人先而賓從之故曰從主人也言皆者必于家于墓皆踊也凡喪父在父為主父沒兄弟同居各主其喪親同長者主之不同親者主之集說曰此言父在而子有妻子之喪則父主之統於尊也父沒之後兄弟雖同居各主妻子之喪矣同宫猶然則異宫從可知也親同長者主之謂父母之喪長子為主其同父母之兄弟死亦推長者為主也不同親者主之謂從父兄弟之喪則彼親者為之主也聞逺兄弟之喪既除喪而後聞喪免袒成踊拜賓則尚左手註曰小功緦麻不稅者也雖不服猶免袒尚左手吉拜也逸奔喪禮曰凡拜吉喪皆尚左手疏曰雖不稅而初聞之亦必免袒而成其踊者以本是五服之親為之變也無服而為位者唯嫂叔及婦人降而無服者麻註曰雖無服猶弔服加麻袒免為位哭也正言嫂叔尊嫂也兄公於弟之妻則不能也婦人降而無服族姑姊妹嫁者也逸奔喪禮曰無服袒免為位者唯嫂與叔凡為其男子服其婦人降而無服者麻疏曰哭嫂與叔為位族姑姊妹元是緦麻出嫁於人降而無服亦當為位哭之加弔服之麻麻謂緦之絰也不為之袒免其族姑姊為族伯叔兄弟亦無服而加麻註云兄公於弟妻則不能者卑逺之也然則弟婦於夫兄亦不能也尊絶之也凡奔喪有大夫至袒拜之成踊而后襲於士襲而后拜之疏曰主人是士初來奔喪括髪袒於堂上乃降堂而哭於此時大夫至因拜之於東階下不敢成已踊及襲絰帶之事待拜後始成踊襲絰帶也若士來弔則降堂先成已禮踊襲絰帶之後乃拜之若大夫與大夫相敵亦襲後乃拜之禮記述註卷二十四
