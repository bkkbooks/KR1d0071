body:
  text: 禮記述注卷六安溪李光坡撰月令第六疏曰鄭目録云月令本呂氏春秋十二月紀之首章也案呂不韋集諸儒所著為十二月紀合十餘萬言名為呂氏春秋篇首皆有目令與此文同孟春之月日在營室昏參中旦尾中注曰日月之行一歲十二㑹聖人因其㑹而分之以為大數焉觀斗所建命其四時此云孟春者日月㑹於娵訾而斗建寅之辰也疏曰用夏時者以夏數得天也凡十二月日之所在或舉月初或舉月末皆據其大略不細與歷數齊同其昏時中星亦皆如此但一月之內有中者即得載之二十八宿星體有廣狹相去有逺近或月節月中之日昏明之時前星已過於午後星未至正南又星有明暗見有早晚所以昏明之星不可正依歷法但舉大略耳其日甲乙注曰乙之言軋也時萬物皆解孚甲自抽軋而出因以為日名焉其帝大皥其神句芒注曰此蒼精之君木官之臣自古以來著德立功者也太皥伏羲氏句芒少皥之子曰重為木官疏曰自孟春之月訖其日甲乙明於天道其事略竟從此以下至鴻雁來明聖人奉天時及萬物節候也故蔡雍云法象莫大乎天地變通莫大乎四時懸象著明莫大乎日月故先建春以奉天奉天然後立帝立帝然後言佐言佐然後列昆蟲之列物有形可見然後音聲可聞故陳音有音然後清濁可聽故言鍾律音聲可以彰故陳酸羶之屬也羣品以著五行為用於人然後宗而祀之故陳五祀東風以下者效初氣之序也二者既立然後人君承天時行庶政其蟲鱗其音角律中大蔟其數八其味酸其臭羶注曰鱗龍之屬角樂器之聲也三分羽益一以生角角數六十四屬木者以其清濁中民象也律候氣之管以銅為之中猶應也大蔟者林鍾之所生三分益一長八寸凡律空圍九分木生數三成數八但言八舉其成數疏曰單出曰聲雜比曰音音則樂曲也凡律空圍九分者黃鍾為諸律之首諸律雖長短有差其圍皆以九分為限孟康云林鍾長六寸圍六分則圍之大小遂管長短然則分寸之數不可定也故鄭皆為圍九分也通於鼻者謂之臭在口者謂之味臭則氣也木味酸凡草木所生其氣羶也其祀户祭先脾注曰春陽氣出祀之於户內陽也凡祭五祀於廟用特牲有主有尸皆先設席於奧祀户之禮南面設主於户外之西乃制脾及腎為爼奠於主北又設盛於爼西祭忝稷祭肉祭醴皆三祭肉脾一腎再既祭徹之更陳鼎爼設饌於筵前迎尸略如祭宗廟之儀疏曰注凡祭五祀以下皆中霤禮文户中霤在於廟室中先設席於廟室之奧竈門行皆在廟門外先設席於廟門之奧雖廟室廟門有别總而言之皆謂之廟祭户先設席於奧乃更設席於廟户西夾北向置主北面祭忝肉户西就户處也其餘五祀所祭設主皆就其處也既祭後徹去爼盛更陳列鼎爼設其饌食於初設奧之筵前其時主已移於筵上主人出户迎尸尸入即筵坐所以先設席及設饌迎尸皆在奧者就尊之處也集說曰木盛剋土脾將受傷故先祭脾東風解凍蟄蟲始振魚上冰獺祭魚鴻雁來注曰振動也夏小正正月啓蟄魚陟負冰此時魚肥美獺將食之先以祭也鴈自南方來將北反其居天子居青陽左個集說曰青陽左個注云太寢東堂北偏也疏云是明堂北偏而云太寢者明堂與太廟太寢制同北偏者近北也四面旁室謂之個朱子曰論明堂之制者非一竊意當有九室如井田之制東之中為青陽太廟東之南為青陽右個東之北為青陽左個南之中為明堂太廟南之東即東之南為明堂左個南之西即西之南為明堂右個西之中為總章太廟西之南即南之西為總章左個西之北即北之西為總章右個北之中為𤣥堂太廟北之東即東之北為𤣥堂右個北之西即西之北為𤣥堂左個中為太廟太室凡四方之太廟異方所其左右個則青陽左個即𤣥堂之右個青陽右個即明堂之左個明堂右個即總章之左個總章之右個乃𤣥堂之左個也但隨其時之方位開門耳太廟太室則每季十八日天子居正歟古人制事多用井田遺意此恐然也乘鸞路駕倉龍載青旗衣青衣服倉玉食麥與羊其器疏以達注曰鸞路有虞氏之車有鸞和之節而飾之以青取其名耳春言鸞冬夏言色互文馬八尺以上為龍凡所服玉謂冠飾及所佩者之衡璜也麥實有孚甲屬木羊火畜也時尚寒食之以安性也凡此車馬衣服非周制也周禮朝祀戎獵車服各以其事不以四時為異疏曰疏以達者春物將貫土而出故器之刻鏤者使文理粗疏直而通達也坡謂司徒奉牛宗伯奉雞司馬奉羊司寇奉犬鄭云司空其奉豕與然則疏引五行傳尚合於經餘外徒煩且亦非大義所係今仍注解是月也以立春先立春三日太史謁之天子曰某日立春盛德在木天子乃齊立春之日天子親帥三公九卿諸侯大夫以迎春於東郊疏曰節氣有早晚是月者謂是月之氣不謂是月之日也集說曰謁告也春為生天地生育之盛德在於木位也迎春東郊祀蒼精之帝而大皥配之後倣此還反賞公卿大夫於朝坡按監本賞公卿諸侯大夫於朝俗本無諸侯二字冝校入命相布德和令行慶施惠下及兆民慶賜遂行毋有不當注曰相謂三公相王之事也德謂善教也令謂時禁也慶謂休其善也惠謂恤其不足也遂猶達也言使當得者皆得得者無非其人乃命大史守典奉法司天日月星辰之行宿離不貸毋失經紀以初為常注曰典六典也法八法集說曰宿猶止也離猶行也言占候躔次不可差貸貸與忒同經紀天文進退遲速之度數也初者歷家推步之舊法以此為占候之常也是月也天子乃以元日祈榖于上帝乃擇元辰天子親載耒耜措之於參保介之御間帥三公九卿諸侯大夫躬耕帝籍天子三推三公五推卿諸侯九推反執爵於大寢三公九卿諸侯大夫皆御命曰勞酒集說曰元日上辛也郊祭天而配以后稷為祈榖也元辰郊後吉日也日以干言辰以支言互文也參參乘之人也保猶衣也介甲也以勇士為車右而衣甲御者御車之人也車右及御人皆是參乘天子在左御者居中車右在右以三人故曰參也置此耕器於參乘保介及御者之間天子籍田千畝收其榖為祭祀之粢盛故曰帝籍九推之後庶人終之御侍也反而行燕禮羣臣皆侍士賤不與耕故亦不與勞酒之賜也是月也天氣下降地氣上騰天地和同草木萌動注曰此陽氣蒸達可耕之侯也農書曰土長冒橛陳根可扳耕者急發王命布農事命田舍東郊皆修封疆審端徑術善相邱陵阪險原隰土地所冝五榖所殖以教道民必躬親之田事既飭先定凖直農乃不惑集說曰田田畯也舍居也天子命田畯居東郊以督耕者皆使修理其封疆謂井田之限域也步道曰徑術與遂同田之溝洫也審而端之使無迂壅封疆有界限經術有濶狹土地有高下五種有冝否皆須田畯躬親巡行之使田事皆飭正如凖平繩直則農民無所疑惑也夏小正曰農率均田是月也命學政入學習舞集說曰為仲春將釋菜教學者以習舞之事熊氏曰舞兼文武而言蓋陽氣發動使蕩蕩血脉也乃修祭典注曰重祭禮歲始省録命祀山林川澤犧牲毋用牝注曰為傷妊生之類禁止伐木注曰盛德所在毋覆巢毋殺孩蟲胎夭飛鳥毋麛毋卵毋聚大衆毋置城郭掩骼埋胔集說曰孩蟲蟲之稚者胎未生者夭方生者飛鳥初學飛之鳥麛獸子之通稱掩骼埋胔謂死氣逆生也骨枯曰骼肉腐曰胔是月也不可以稱兵稱兵必天殃兵戎不起不可從我始毋變天之道毋絶地之理毋亂人之紀集說曰天地大德曰生春者生德之盛時也兵凶器戰危事不得已而禦寇猶可也兵自我起以殺戮之心逆生育之氣是變易天之生道斷絶地之生理而紊亂生人之紀叙矣其殃也冝哉孟春行夏令則雨水不時草木蚤落國時有恐注曰不時已之氣乘之也蚤落生日促有恐以火訛相驚疏曰不時雨少不應時也已月純陽來乘故雨少已火寅為漢津火雖欲來而畏水但訛言相恐動也孟月失令則三時孟月之氣乘之仲月失令則仲月之氣乘之季月失令則季月之氣乘之所以然者以同為孟仲季氣情相通如其不和則迭相乘入有三才俱應者則此雨水不時天也草木蚤落地也國時有恐人也十二月節內俱應者多就俱應之中或先言天或先言地或先言人者為害重者則在先言之為害輕者後言之又或有天有人無地或有地有人無天隨應則書不為義例也行令失之於前氣則應之於後春夏秋有失應惟在當年若其冬時有失則應在於後年行秋令則其民大疫猋風暴雨總至藜莠蓬蒿並興注曰大疫申之氣乘之也七月始殺正月宿直尾箕箕好風其氣逆也回風為猋藜莠蒿並興者生氣亂惡物茂行冬令則水潦為敗雪霜大摰首種不入集說曰亥之氣乘之也摰傷折也與摰獸鷙蟲之義同百榖惟稷先種故云首種仲春之月日在奎昏弧中旦建星中注曰仲春者日月㑹於降婁而斗建卯之辰也疏曰餘月昏旦中星皆舉二十八宿此云弧與建星者以弧星近井建星近斗井斗度多星體廣不可的指故舉弧建以定昏旦之中其日甲乙其帝大皥其神句芒其蟲鱗其音角律中夾鍾其數八其味酸其臭羶其祀户祭先脾集說曰夾鍾者夷則之所生三分益一律長七寸二千一百八十七分寸之千七十五始雨水桃始華倉庚鳴鷹化為鳩集說曰此記卯月之候倉庚鸝黃也鳩布榖也王制言鳩化為鷹秋時也此言鷹化為鳩以生育氣盛故鷙鳥感之而變耳孔氏云化者反歸舊形之謂故鷹化為鳩鳩復化為鷹如田鼠化為鴽則鴽又化為田鼠若腐草為螢雉為蜃爵為蛤皆不言化是不再復本形者也天子居青陽太廟乘鸞路駕倉龍載青旗衣青衣服倉玉食麥與羊其器疏以達注曰青陽太廟東堂當太室是月也安萌芽養幼少存諸孤集說曰生氣之可見者莫先於草木故首言之安謂無所推折之也存亦安也擇元日命民社集說曰令民祭社也郊特牲言祭社用甲日甲干之首故曰元召誥社用戊日命有司省囹圄去桎梏毋肆掠止獄訟疏曰省减也囹牢也圄止也周曰圍土殷曰羑里夏曰鈞臺囹圄秦獄名也漢曰若盧魏曰司空桎梏今械也在手曰梏在足曰桎肆陳尸也掠捶治也是月也𤣥鳥至至之日以大牢祠於高禖注曰𤣥鳥燕也燕以施生時來巢人堂宇而孚乳媒氏之官以為候高辛氏之世𤣥鳥遺卵娀簡吞之而生契後王以為媒官嘉祥而立其祠也變媒言禖神之也疏曰先契之時必自有媒氏祓除之祀位在南郊蓋以𤣥鳥至之日祀之矣然其禋祀乃於上帝也以先禖配之故謂之郊禖至高辛世有簡狄之異後王以為禖官嘉祥即以高辛立為禖神以配天其古昔先禖則廢之矣高辛配之後謂之高禖天子親往后妃帥九嬪御乃禮天子所御帶以弓韣授以弓矢於高禖之前注曰御謂從往侍祠天子所御謂今有娠者於祠太祝酌酒飲於高禖之庭以神惠顯之也帶以弓韣授以弓矢求男之祥也王居明堂禮曰帶以弓韣禮之禖下其子必得天材疏曰王居明堂禮者逸禮篇名是月也日夜分集說曰晝夜各五十刻雷乃發聲始電蟄蟲咸動啓户始出先雷三日集說曰以節氣言在春分前三日奮木鐸以令兆民曰雷將發聲有不戒其容止者生子不傋必有凶災集說曰容止猶言動靜不戒容止謂房室之事䙝瀆天威也生子不傋謂支節性情有損缺凶災謂父母日夜分則同度量鈞衡石角斗甬正權概集說曰丈尺曰度斗斛曰量稱上曰衡百二十斤為石甬斛也權稱錘也概執以平量器者同則齊其長短小大之制鈞則平其輕重之差角則較其同異正則矯其欺枉是月也耕者少舍乃修闔扇寢廟畢傋毋作大事以妨農之事集說曰少舍暫息也因蟄蟲啓户耕事少閒而治門户也門户之蔽以木曰闔以竹葦曰扇凡廟前曰廟後曰寢寢是衣冠所藏之處大事兵役之屬是月也毋竭川澤毋漉陂池毋焚山林集說曰漉亦竭也畜水曰陂穿地通水曰池三者之禁皆謂傷生意天子乃鮮羔開冰先薦寢廟注曰鮮當為獻聲之誤也獻羔謂祭司寒也祭司寒而出冰薦於宗廟乃後賦之春秋傳曰古者日在北陸而藏冰西陸朝覿而出之上丁命樂正習舞釋菜天子乃帥三公九卿諸侯大夫親往視之注曰命習舞者順萬物始出地鼓舞也將舞必釋萊於先師以禮之夏小正曰丁亥萬舞入學疏曰此仲春習舞則大胥春入學舍萊合舞一也孟春習之至仲春習而合之仲丁又命樂正入學習樂注曰為季春將習合樂也習樂者習歌與八音是月也祀不用犧牲用圭璧更皮幣集說曰不用牲謂祈禱小祀耳如太牢祀高禖乃大典禮不在此限稍重者用圭璧稍輕者則以皮幣更易之也仲春行秋令則其國大水寒氣總至寇戎來征注曰酉之氣乘之也八月宿直昴畢畢好雨冦戎來征金氣動也畢又為邊兵行冬令則陽氣不勝麥乃不熟民多相掠注曰子之氣乘之也行夏令則國乃大旱暖氣早來蟲螟為害集說曰午之氣乘之也螟食苗心者季春之月日在胃昏七星中旦牽牛中注曰季春者日月㑹於大梁而斗建辰之辰其日甲乙其帝大皥其神句芒其蟲鱗其音角律中姑洗其數八其味酸其臭羶其祀户祭先脾集說曰姑洗者南呂之所生三分益一律長七寸九分寸之一桐始華田鼠化為鴽虹始見萍始生疏曰鴽䳺也虹是陰陽交㑹之氣純陰純陽則虹不見若雲薄漏日日照雨滴則虹生萍蓱也其大者曰蘋天子居青陽右個乘鸞路駕倉龍載青旗衣青衣服倉玉食麥與羊其器疏以達注曰青陽右個東堂南偏是月也天子乃薦鞠衣于先帝集說曰鞠衣衣色如鞠花之黃也注云黃桑之服者色如鞠塵象桑葉始生之色也先帝先代始蠶之君薦此衣於神坐以祈蠶事命舟牧覆舟五覆五反乃告舟傋具子天子焉天子始乘舟薦鮪于寢廟乃為麥祈實集說曰舟牧主乘舟之官五覆五反所以詳視其罅漏傾側之處也鮪似鱣長鼻口在領下體無鱗甲祈實於含秀求其成也不言所祈承寢廟可知是月也生氣方盛陽氣發泄句者畢出萌者盡達不可以內集說曰句屈生者萌直生者不可以內言當施散恩惠以順生道之宣泄不冝吝嗇閉藏也天子布德行惠命有司發倉廪賜貧窮振乏絶開府庫出幣帛周天下勉諸侯聘名士禮賢者疏曰榖藏曰倉米藏曰廪無財曰貧無親曰窮暫無曰乏不續曰絶皇氏云長無謂之貧窮暫無謂之乏絶振猶救也周謂給不足也名士者德行貞絶道術通明王者不得臣而隱居不在位者也賢者名壬之次亦隱者也集說曰在內則命有外則勉諸侯皆天子之德惠也是月也命司空曰時雨將降下水上騰循行國邑周視原野修利隄防道達溝瀆開通道路毋有障塞注曰廣平曰原國也邑也平野也溝瀆與道路皆不得相通所以除水潦便民事也古者溝上有路坡謂下水上騰者恐時雨過多下流之水將上泛濫田獵置罘羅網畢翳餧獸之藥毋出九門疏曰毋出九門若路門內有者不得出路門應門內有者不得出應門舉此可知集說曰置罘皆捕獸之罟羅網皆捕鳥之罟小網長柄謂之畢以其似畢星之形故名用以掩兔也翳射者用以自隱也餧啖之也藥毒藥也七物皆不得施用於外以其逆生道也路門應門雉門庫門臯門城門近郊門逺郊門關門凡九門也是月也命野虞毋伐桑柘鳴鳩拂其羽戴勝降于桑具曲植籧筐集說曰野虞主田及山林之官鳩鶌鳩也似山鵲而小青黑色短尾多聲拂羽飛而翼拍身也戴勝一名鴟鳩纎紝之鳥頭有文似勝故名戴勝此時恆在桑言降者重之若自天而下也曲薄也植縣蠶薄柱也所以架曲與籧筐者籧圓而筐方后妃齊戒親東鄉躬桑禁婦女毋觀省婦使以勸蠶事集說曰東鄉迎時氣也躬桑親自采桑也禁婦女毋觀者禁止婦女使不得為容觀之飾也省婦使者减省其針線縫製之事也夏小正曰妾子始蠶執養宫事蠶事既登分繭稱絲效功以共郊廟之服毋有敢惰注曰登成也敕往蠶者蠶畢將課功以勸戒之坡謂分其繭之多寡稱其絲之重輕所以效其功之上下是月也命工師令百工審五庫之量金鐵皮革筋角齒羽箭幹脂膠丹漆毋或不良集說曰工師司空之屬官也五庫者金鐵為一庫皮革筋為一庫角齒為一庫羽箭幹為一庫脂膠丹漆為一庫視諸物之善惡皆有舊法謂之量一說多寡之數也審而察之故云審五庫之量也幹者諸器所用之木材也百工咸理監工日號毋悖于時毋或作為淫巧以蕩上心集說曰此時百工皆各理治其造作之事工師監臨之每日號令必以二事為戒一是造作器物不得悖逆時序使不牢固如為弓必春液角夏治筋秋合三材寒定體之類是也二是不得為淫過竒巧之器以搖動君心使生奢侈也是月之末擇吉日大合樂天子乃帥三公九卿諸侯大夫親往視之注曰其禮亡是月也乃合纍牛騰馬遊牝于牧集說曰春陽既盛物皆産育故合其纍繫之牛騰躍之馬而逰縱之使牡者就牝者子芻牧之地欲其孳生之蕃也犧牲駒犢舉書其數疏曰既遊牝于牧之後畜皆在野所有犧牲及小馬之駒小牛之犢皆書其先在之數傋秋畜産入時知其舊數不缺以否又舊數之外知其生息多少命國難九門磔攘以畢春氣注曰此難難隂氣也隂寒至此不止害將及人所以及人者隂氣右行此月之中日行歷昴昴有大陵積尸之氣氣佚則厲鬼隨而出行命方相氏率百𨽻索室驅疫以逐之又磔牲以攘於四方之神所以畢止其災也王居明堂禮曰季春出疫于郊以攘春氣季春行冬令則寒氣時發草木皆肅國有大恐集說曰丑之氣乘之也肅者枝葉减縮而急栗也大恐訛言相驚動也疏說孟春有恐是火訛以其行夏令也此行冬令當致水訛漢王商嘗止之矣行夏令則民多疾疫時雨不降山陵不收注曰未之氣乘之也六月宿直鬼鬼為天尸時又有暑也山陵不收高者暵於熱也行秋令則天多沈隂淫雨蚤降兵革並起注曰戌之氣乘之也九月多陰兵革並起陰氣勝也孟夏之月日在畢昏翼中旦婺女中注曰孟夏者日月㑹於實沈而斗建已之辰其日丙丁疏曰律歷志云明炳於丙則丙炳也大成於丁則丁成也其帝炎帝注曰炎帝大庭氏即神農也赤精之君其神祝融注曰顓頊氏之子名黎為火官其蟲羽其音徵律中中呂其數七其味苦其臭焦其祀竈祭先肺注曰竈在廟門外之東祀竈之禮先席於門西室之奧東面設主於竈陘乃制肺及心肝為爼奠於主西又設盛於爼南亦祭黍三祭肺心肝各一祭醴二亦既祭徹之更陳鼎爼設饌于筵前迎尸如祀户之禮集說曰皆逸中霤禮文集說曰羽蟲飛鳥之屬三分宫去一以生徵徵數五十四屬火仲呂者無射之所生三分益一律長六寸萬九千六百八十三分寸之萬二千九百七十四地二生火天七成之七者火之成數也苦焦皆火屬夏祭竈火之養人者也祭先肺火克金也螻蟈鳴蚯蚓出王瓜生苦菜秀集說曰此記已月之候螻蟈蛙也王瓜注云草挈本草作菝葜音同謂之瓜者以根之似也亦可釀酒朱氏曰王瓜色赤感火之色而生苦菜味苦感火之味而成天子居明堂左個注曰大寢南堂東偏乘朱路駕赤駵載赤旗衣朱衣服赤玉食菽與雞其器高以粗注曰菽實孚甲堅合屬水雞木畜時熱食之亦以安性也粗大也器高大者象物盛長是月也以立夏先立夏三日大史謁之天子曰某日立夏盛德在火天子乃齊立夏之日天子親帥三公九卿大夫以迎夏于南郊集說曰迎夏南郊祀赤精之帝而炎帝配之還反行賞封諸侯慶賜遂行無不欣說注曰不言帥諸侯而云封諸侯諸侯時或無在京師者空其文也祭統曰古者於禘也發爵賜服順陽義也於嘗也出田邑發秋政順隂義也今此行賞可也封諸侯出土地之事於時未可似失之乃命樂師習合禮樂注曰為將飲酎命太尉贊桀俊遂賢良舉長大行爵出祿必當其位注曰三王之官有司馬無太尉秦官則有太尉今俗人皆云周公作月令未通於古集說曰桀俊以才言贊則引而升之之謂賢良以德言遂謂使之得行其志也長大以力言王制言執技論力舉謂選而用之也當其位者爵必當有德之位祿必當有功之位也是月也繼長增高毋有壞墮毋起土功毋發大衆毋伐大樹集說曰長者繼之而使益長高者增之而使益高壞墮則傷已成之氣起土功發大衆皆妨蠶農之事故禁止之伐樹則傷條達之氣故亦在所禁一說伐大木謂營宫室是月也天子始絺集說曰絺葛布之細者命野虞出行田原為天子勞農勸民毋或失時命司徒循行縣鄙命農勉作毋休于都集說曰勉其興作於田野之內禁其休息於都邑之間皆恐其失農時也王居明堂禮曰無宿於國是月也驅獸毋害五榖毋大田獵集說曰夏獵曰苗正為驅獸之害禾苖者耳與三時之大獵自不同農乃登麥天子乃以彘嘗麥先薦寢廟注曰登進也麥之新氣尤盛以彘食之散其熱也彘水畜是月也聚畜百藥靡草死麥秋至集說曰聚藥為供醫事也靡草草之枝葉靡細者隂類陽盛則死秋者百榖成熟之期此於時雖夏於麥則秋故云麥秋也斷薄刑决小罪出輕繫注曰祭統曰草艾則墨謂立秋後也刑無輕於墨者今以純陽之月斷刑决罪與毋有壞墮自相違似非蠶事畢后妃獻繭乃收繭稅以桑為均貴賤長幼如一以給郊廟之服集說曰后妃獻繭謂后妃受內命婦之獻繭也收繭稅者外命婦養蠶亦用國北近郊之公桑近郊之稅十一故亦稅其繭十之一其餘入已而為其夫造祭服一說再命受服服者公家所給故稅其十一者為給其夫祭服也受桑多則稅繭多少則稅亦少皆以桑為均齊也貴謂卿大夫之妻賤謂士妻長幼婦之老少也如一皆稅十一也郊廟之服天子祭服也是月也天子飲酎用禮樂注曰酎之言醇也謂重釀之酒也春酒至此始成與羣臣以禮樂飲之於朝正尊畢也疏曰以用禮樂故知飲於朝孟夏行秋令則苦雨數來五榖不滋四鄙入保注曰申之氣乘之也苦雨白露之類四鄙入保金氣為害也鄙界上邑小城曰保行冬令則草木蚤枯後乃大水敗其城郭注曰亥之氣乘之也行春令則蝗蟲為災暴風來格秀草不實注曰寅之氣乘之也蝗蟲為災者寅有啓蟄之氣行於初暑則當蟄者大出矣格至也秀草不實氣更生之不得成也仲夏之月日在東井昏亢中旦危中注曰仲夏者日月㑹於鶉首而斗建午之辰也其日丙丁其帝炎帝其神祝融其蟲羽其音徵律中蕤賓其數七其味苦其臭焦其祀竈祭先肺集說曰蕤賓者應鍾之所生三分益一律長六寸八十一分寸之二十六小暑至螳螂生鵙始鳴反舌無聲集說曰此記午月之候小暑暑氣未盛也螳螂一名蚚父一名天馬言其飛捷如馬也鵙博勞也反舌百舌鳥春始鳴至五月稍止其聲數轉故名反舌疏云一說蝦蟇也其舌本前著口側而末向內故謂之反舌天子居明堂大廟乘朱路駕赤駵載赤旗衣朱衣服赤玉食菽與雞其器高以粗注曰明堂太廟南堂當太室也養壯佼集說曰壯謂容體碩大者佼謂形容佼好者擇此類而養之亦順長養之令是月也命樂師修鞀鞞鼓均琴瑟管簫執干戚戈羽調竽笙竾簧飭鍾磬柷敔集說曰凡十九物皆樂器也鞀鞞鼓三者皆革音鞀即鼗也鞞所以禆助鼓節琴瑟皆絲音管簫皆竹音管如笛而小併兩而吹之簫編二十二管長尺四寸干戚戈羽皆舞器干盾戚斧也竽笙竾皆竹音竽三十六簧笙十三簧竾即箎也長尺四寸簧笙之舌蓋管中之金薄鍱也竽笙竾三者皆有簧也鐘金音磬石音祝敔皆木音柷如漆桶敔狀如伏虎柷以合樂之始敔以節樂之終修者理其弊均者平其聲執者操持習學調者調和音曲飭者整治之也以將用盛樂雩祀故謹傋之命有司為民祈祀山川百源大雩帝用盛樂注曰陽氣盛而常旱山川百源能興雲雨者也衆水始所出為百源必先祭其本乃雩雩吁嗟求雨之祭也雩帝謂為壇南郊之旁雩五精之帝配以先帝也自鞀鞞至柷敔皆作曰盛樂凡他雩用歌舞而已坡謂沂在魯城南浴乎沂而風乎舞雩則雩在南郊信矣乃命百縣雩祀百辟卿士有益於民者以祈榖實注曰百辟卿士古者上公若句龍后稷之類也天子雩上帝諸侯以下雩上公疏曰百縣謂諸侯農乃登黍是月也天子乃以雛嘗黍羞以含桃先薦寢廟注曰黍火榖氣之主也含桃櫻桃也疏曰蔡氏以為此時黍新熟今蟬鳴黍是也令民毋艾藍以染集說曰藍之色青青者赤之毋刈之亦是傷時氣夏小正曰五月啓灌藍蓼毋燒灰集說曰火之滅者為灰禁之亦為傷火氣也毋暴布集說曰暴暴之於日也布者隂功所成不可以小功干盛陽也門閭毋閉集說曰一則順時氣之宣通一則使暑氣之宣散關市毋索集說曰索者搜索商旅匿稅之物蓋當時氣盛大之際人君亦當體之而行寬大之政也挺重囚益其食集說曰挺者拔出之義重囚禁繫嚴密故特加寬假益其食者加其養也遊牝别羣則縶騰駒班馬政集說曰季春遊牝于牧至此妊孕已遂故不使同羣拘縶騰躍之駒者止其踶嚙也班布也馬政養馬之政教廋人職曰掌十有二間之政教以阜馬佚特教駣攻駒此之謂也是月也日長至隂陽爭死生分集說曰至猶極也爭者陽方盛隂欲起也死生分者物之感陽氣而方長者生感隂氣而已成者死此死生分别之際也君子齊戒處必掩身毋躁止聲色毋或進薄滋味毋致和節耆欲定心氣集說曰齊戒以定其心掩蔽以防其身毋或輕躁於舉動毋或御進於聲色薄其調和之滋味節其諸事之愛欲凡以定心氣而傋隂疾也百官靜事無刑以定晏陰之所成集說曰刑隂事也舉隂事則是助隂抑陽故百官府刑罰之事皆止靜而不行也凡天地之氣順則和競則逆故能致災咎此隂陽相爭之時故須如此謹傋晏安也隂道靜故云晏隂及其定而至於成則循序而往不為災矣是以未定之前諸事皆不可忽也鹿角解蟬始鳴半夏生本堇榮集說曰此又言午月之候解脫也半夏藥草居夏之半而生故名木堇王蒸也其花朝生暮落是月也毋用火南方集說曰南方火位又因其位而盛其用則為微隂之害故戒之可以居高明可以逺眺望可以升山陵可以處臺榭注曰順陽在上也高明謂樓觀也闍者謂之臺有木者謂之榭仲夏行冬令則雹凍傷榖道路不通暴兵來至注曰子之氣乘之也陽為雨隂起脅之凝為雹盜賊攻劫亦雹之類行春令則五榖晚熟百螣時起其國乃饑注曰卯之氣乘之也晚熟生日長螣蝗之屬言百者明衆類並為害行秋令則草木零落果實早成民殃于疫注曰酉之氣乘之也八月宿直昴畢為天獄主殺早成生日短民殃于疫大陵之氣來為害也季夏之月日在柳昏火中旦奎中注曰季夏者日月㑹於鶉火而斗建未之辰也其日丙丁其帝炎帝其神祝融其蟲羽其音徵律中林鐘其數七其味苦其臭焦其祀竈祭先肺集說曰林鐘者黃鐘之所生三分去一律長六寸溫風始至蟋蟀居壁鷹學習腐草為螢集說曰此記末月之候至極也蟋蟀生於土中此時羽翼猶未能逺飛但居其穴之壁至七月則能逺飛而在野矣學習謂攫摶也夏小正曰六月鷹始摯腐草得暑濕之氣故變而為螢朱氏曰溫風溫厚之極凉風嚴凝之始腐草為螢離明之極故幽類化為明類也天子居明堂右個乘朱路駕赤駵載赤旗衣朱衣服赤玉食菽與雞其器高以粗注曰明堂右個南堂西偏也命漁師伐蛟取黻登龜取黿注曰四者甲類秋乃堅成周禮曰秋獻龜魚又曰凡取龜用秋時是夏之秋也作月令者以為此秋據周之時也周之八月夏之六月因書於此似誤也蛟言伐者以其有兵衛也龜言登者尊之也鼉黿言取羞物賤也鼉皮又可以冒鼓疏曰此與仲夏養壯佼之等皆是煩細之事或非止一月所為故不言是月也命澤人納材葦注曰蒲葦之屬此時柔刃可取作器物也是月也命四監大合百縣之秩芻以養犧牲令民無不咸出其力以共皇天上帝名山大川四方之神以祠宗廟社稷之靈以為民祈福注曰四監主山林川澤之官百縣鄉遂之屬地有山林川澤者也秩常也百縣給國養犧牲之芻多少有常民皆當出力為艾之為民祈福明不虛取也疏曰仲夏乃命百縣兼內外諸侯也此知非諸侯者以其取芻不可太逺故知是畿內鄉遂是月也命婦官染采黼黻文章必以法故無或差貸黑黃倉赤莫不質良毋敢詐僞以給郊廟祭祀之服以為旗章以别貴賤等給之度集說曰婦官染人也白與黑謂之黼黑與青謂之黻青與赤謂之文赤與白謂之章染造必用舊法故事毋得有參差貸變皆欲質正良善也或云黼黻文章或云黑黃倉赤者互相傋也旗旌旗也章者畫其象以别名位也詳見春官司常石梁王氏曰給當為級是月也樹木方盛乃命虞人入山行木毋有斬伐注曰為其未堅刃也不可以興土功不可以合諸侯不可以起兵動衆注曰土將用事氣欲靜毋舉大事以搖養氣集說曰大事即興土功合諸侯起兵動衆之事搖養氣謂動散長養之氣也毋發令而待以妨神農之事也注曰發令而待謂出徭役之令以豫驚民也民驚則心動是害土神之氣土神稱曰神農者以其主於稼穡水潦盛昌神農將持功舉大事則有天殃注曰言土以受天雨澤安靜養物為功動之則致害也孝經說曰地順受澤謙虛開張含泉任萌滋物歸中疏曰六月主末未值東井東井是水故六月而水潦盛冒也是月也土潤溽暑大雨時行燒剃行水利以殺草如以熱湯可以糞田疇可以美土疆集說曰溽濕也土之氣潤故蒸鬱而為濕暑大雨亦以之而時行除草之法先芟剃之俟乾則燒之燒剃者燒所剃之草也大雨既行於所燒之地仍壅畜之以漬燒剃故云行水即草根爛死不復生矣故云利以殺草時暑日烈其水之熱如湯草之燒爛者可以為田疇之糞榖田曰田麻田曰疇可以使土疆之美疆者疆㯺磊磈難耕之地季夏行春令則榖實鮮落疏曰謂鮮少墮落由風多故也國多風咳注曰辰之氣乘之也末屬㢲辰又在㢲位二氣相亂為害集說曰風咳因風而致咳疾也民乃遷徙注曰象風轉移物也行秋令則邱隰水潦禾稼不熟乃多女災注曰戌之氣乘之也九月宿直奎奎為溝瀆溝瀆與此月大雨并而高下皆水不熟傷於水也女災亦為水傷含妊行冬令則風寒不時鷹隼蚤鷙四鄙入保注曰丑之氣乘之也蚤鷙得疾厲之氣也中央土注曰火休而盛德在土也疏曰土每時輒寄一十八日雖每分寄而位本未冝處于季夏之末金火之間故在此陳之也其日戊巳注曰戊之言茂也已之言起也至此萬物皆枝葉茂盛其含秀者抑屈而起故因以為日名焉其帝黃帝集說曰黃精之君軒轅氏也其神后土集說曰土官之臣顓頊氏之子黎也句龍初為后土後祀以為社后土官闕黎雖火官實兼后土也注說如此其蟲倮集說曰人為倮蟲之長注以為虎豹之屬其音宫律中黃鐘之宫朱子曰律中黃鐘之宫詹卿以為陽生於子至午而盡到未又生出一黃鐘某思量得不是恁地如京房律凖十三絃中一絃為黃鍾不動十二絃便拄起應十二月又曰京房律凖乃是先做下一箇母子調得正了後來只依此為凖國語謂之均梁武帝謂之通其制十三弦一弦是全律底黃鍾只是散聲又自黃鍾起至應鍾有十二弦要取甚聲用柱子來逐弦分寸上柱定取聲其數五注曰土生數五成數十但言五者土以生為本其味甘其臭香注曰土之臭味也凡甘香皆屬之其祀中霤祭先心注曰祀中霤之禮設主於牖下乃制心及肺肝為爼其祭肉心肺肝各一他皆如祀户之禮疏曰古者窟居隨地而造若平地則不鑿但纍土為之謂之復言於地上重復為之也若高地則鑿為坎謂之穴其形皆如陶竈復穴皆開其上取明故雨霤之因名室為中霤五祀皆先席於室奧已傋祀户注此設主當廟室牖內之下而北向亦祭竟徹之更陳鼎爼迎尸如祀户禮集說曰祭先心心居中君之象又火生土也天子居大廟大室注曰大室中央之室也乘大路駕黃駵載黃旗衣黃衣服黃玉食稷與牛其器圜以閎注曰大路殷路也車如殷路之制而飾之以黃稷五榖之長牛土畜也器圜者象土周布於四時閎謂中寬象土舍物孟秋之月日在翼昏建星中旦畢中注曰孟秋者日月㑹於鶉尾而斗建申之辰其日庚辛注曰庚之言更也辛之言新也萬物皆肅然改更秀實新成又因以為日名焉其帝少皥其神蓐收注曰此白精之君少皥金天氏蓐收少皥之子曰該為金官其蟲毛其音商律中夷則其數九其味辛其臭腥其祀門祭先肝注曰祀門之禮北面設主於門左樞乃制肝及肺心為爼奠於主南又設盛於爼東其他皆如祭竈之禮疏曰主南向門左樞者謂廟門外左樞其他如祭竈者謂祭心肺肝各一及祭醴三并設席於奧迎尸之屬也集說曰毛狐貉之屬三分徵益一以生商商數七十二夷則大呂之所生三分去一律長五寸七百二十九分寸之四百五十一九金之成數也辛腥皆屬金秋隂氣出故祠門祭先肝金克木也凉風至白露降寒蟬鳴鷹乃祭鳥用始行戮集說曰此記申月之候寒蟬似蟬而小青赤鷹欲食鳥之時先殺鳥而不食似人之食而祭先代為食之人也既祭之後不必盡食若人君刑戮之而已天子居總章左個注曰大寢西堂南偏乘戎路注曰兵車也駕白駱注曰白馬黑鬛曰駱載白旗衣白衣服白玉食麻與犬其器亷以深集說曰麻實有文理屬金犬金畜也亷稜角也亦矩之義深則收藏之意是月也以立秋先立秋三日大史謁之天子曰某日立秋盛德在金天子乃齊立秋之日天子親帥三公九卿諸侯大夫以迎秋於西郊還反賞軍帥武人於朝天子乃命將帥選士厲兵簡練桀俊專任有功以征不義誥誅暴慢以明好惡順彼逺方集說曰迎秋西郊祀白精之帝而少皥配之簡練簡擇而練習之也專任有功謂大將有已試之功乃使之專主其事也詰者問其罪誅者戮其人殘下謂之暴慢上謂之慢順服也好惡明則逺方順服是月也命有司修法制繕囹圄具桎梏禁止姦慎罪邪務搏執集說曰繕治也姦在人心故當有以禁止之邪見於行故慎以罪之務事也摶戮也執拘也命理瞻傷察創視折審斷决獄訟必端平戮有罪嚴斷刑集說曰理治獄官有虞曰士夏曰大理周曰大司寇傷者損皮膚創者損血肉折者損筋骨也斷者骨肉皆絶瞻察視審皆欽恤之意嚴者謹重之意非峻急之謂也天地始肅不可以贏朱氏曰陽道常饒隂道常乏故贊化者不可過舉隂事以助之使隂氣之贏也是月也農乃登榖天子嘗新先薦寢廟注曰黍稷之屬至是始熟疏曰仲秋云以犬嘗麻今不云牲記文略也命百官始收斂完隄坊謹壅塞以傋水潦修宫室壞垣牆補城郭集說曰所以為水潦之傋者以月建在酉酉中有畢星好雨也是月也毋以封諸侯立大官集說曰說者但知賞以春夏刑以秋冬之義不知古者嘗祭之時則有出田邑之制故注謂禁封諸侯及割地為失其義也毋以割地行大使出大幣疏曰鄭唯以禁封諸侯及割地為失義則毋立大官三者為得禮孟秋行冬令則隂氣大勝介蟲敗榖戎兵乃來注曰亥之氣乘之也介甲也甲蟲屬冬敗榖者稻蟹之屬戎兵十月宿直營室營室之氣為害也營室主武事疏曰元命包云營室主軍之糧是主武事也行春令則其國乃旱集說曰寅中箕星好風能散雲雨故致旱陽氣復還五榖無實注曰陽氣能生而不能成行夏令則國多火災寒熱不節民多瘧疾注曰已之氣乘之也仲秋之月日在角昏牽牛中旦觜觽中注曰仲秋者日月㑹於夀星而斗建酉之辰也其日庚辛其帝少皥其神蓐收其蟲毛其音商律中南呂其數九其味辛其臭腥其祀門祭先肝集說曰南呂太蔟之所生三分去一律長五寸三分之一肓風至鴻鴈來𤣥鳥歸羣鳥養羞注曰皆記時候也肓風疾風也𤣥鳥燕也歸謂去蟄也凡鳥隨隂陽者不以中國為居羞謂所食也夏小正曰丹鳥羞白鳥二者文異羣鳥丹鳥未聞孰是集說曰孟春言鴻鴈來自南而來北也此言來自北而來南也養羞者藏之以傋冬月之養也天子居總章大廟乘戎路駕白駱載白旗衣白衣服白玉食麻與犬其器亷以深注曰總章太廟西堂當太室也是月也養衰老授几杖行麋粥飲食集說曰月至四隂隂已盛矣時以陽衰陰盛為秋人以陽衰隂盛為老養衰老順時令也几杖所以安其身飲食所以養其體行猶賜也麋即粥也乃命司服具飭衣裳文繡有恆制有小大度有長短衣服有量必循其故冠帶有常集說曰司服官名具飭條具而飭正之也上曰衣下曰裳衣繪而裳繡祭服之制也有恆有定制也小大小則𤣥冕之一章大則衮冕之九章也長短謂衣長而裳短也衣服謂朝服燕服及他服之當為寒傋者也各有劑量必率循故法不得更為新異也冠與帶亦各有常制因造衣并作之乃命有司申嚴百刑斬殺必當毋或枉橈枉橈不當反受其殃集說曰刑罰之令前月已行此月又申戒之也枉橈皆屈曲之義謂不申正理而違法斷之以逆理故必反受殃禍也是月也乃命宰祝循行犧牲視全具案芻豢瞻肥瘠察物色必比類量小大視長短皆中度五者備上帝其饗集說曰宰祝太宰太祝主祭祀之官也全謂色不雜具謂醴無損也養牛羊曰芻養犬彖曰豢得其養則肥失其養則瘠物色或騂或黝陽祀用騂牲隂祀用黝牲比類者比附隂陽之類而用之也小大以體言長短以角言皆欲中法度也所視所案所瞻所察所量五者悉備而當於事上帝且歆饗之矣况羣神乎天子乃難以達秋氣以犬嘗麻先薦寢廟注曰此難難陽氣也陽暑至此不衰害亦將及人所以及人者陽氣左行此月宿直昴畢昴畢亦得大陵積尸之氣氣佚則厲鬼亦隨而出行於是亦命方相氏帥百𨽻而難之王居明堂禮曰仲秋九門磔攘以發陳氣禦止疾疫疏曰此唯天子得難以其難陽氣陽是君象則諸侯以下不得難是月也可以築城郭建都邑穿竇窖修囷倉注曰為民將入物當藏也入地隋曰竇方曰窖王居明堂禮曰仲秋農隙民畢入于室曰時殺將至毋罹其災疏曰引王居禮證此月築城郭建都邑之意乃命有司趣民收斂務畜菜多積聚集說曰孟秋已有收斂之命矣此又趣之以時不可緩故也菜所以助榖之不足故蓄之為備多積聚者凡可為歲備者無不貯儲也乃勸種麥毋或失時其有失時行罪無疑集說曰麥所以續舊榖之盡而及新榖之登尤利於民故特勸種而罰其隋者是月也日夜分雷始收聲蟄蟲壞户殺氣浸盛陽氣日衰水始涸注曰涸竭也此甫八月中雨氣未止而云水竭非也周語曰辰角見而雨畢天根見而水涸又曰雨畢而除道水涸而成梁辰角見九月本也天根見九月末也王居明堂禮曰季秋除道致梁以利農也疏曰壞益也户謂穴也增益穴之四畔使通明處稍少以時氣尚溫猶須出入十月寒甚乃閉之也鄭引王居禮者證雨畢水涸在季秋也日夜分則同度量平權衡正鈞石角斗甬此與仲春同是月也易關市來商旅納貨賄以便民事四方來集逺鄉皆至則財不匱上無乏用百事乃遂朱氏曰關者貨之所入市者貨之所聚易謂無重征以致其難也易關市所以來商旅貨謂化之以謂利賄謂有之以為利來商旅所以納貨賄也凡此皆以便民用也四方散而不一故言來集逺鄉邈而在外故言皆至財所以待用財不匱則無乏用也用所以作事無乏用則事皆遂也凡舉大事毋逆大數必順其時慎因其類集說曰大事如土功徭役合諸侯舉兵衆之事皆不可悖陰陽之大數因猶依也如慶賞者乃發生之類刑罰者乃肅殺之類必順時令而謹依其類以行之也仲秋行春令則秋雨不降草木生榮國乃有恐集說曰卯之氣乘之也卯中有房心心為大火故不雨且有火訛之驚恐也行夏令則其國乃旱蟄蟲不藏五榖復生注曰午之氣乘之也行冬令則風災數起收雷先行草木蚤死集說曰子之氣乘之也收雷收聲之雷也先行先期而動也季秋之月日在房昏虛中旦柳中注曰季秋者日月㑹於大火而斗建戌之辰其日庚辛其帝少皡其神蓐收其蟲毛其音商律中無射其數九其味辛其臭腥其祀門祭先肝集說曰無射者夾鍾之所生三分去一律長四寸六千五百六十一分寸之六千五百六十四鴻鴈來賓爵入大水為蛤鞠有黃華豺乃祭獸戮禽集說曰此記戌月之候鴈以仲秋先至者為主季秋後至者為賓也大水海也國語曰雀入于海為蛤鞠色不一而專言黃者秋令在金金自有五色而黃為貴故鞠色以黃為正也豺腳似狗長尾白頰色黃祭獸者祭之於天戮禽者殺之以食亦互文也禽獸初得皆殺而祭之後得者殺而不祭禽者鳥獸之總名說見曲禮天子居總章右個乘戎路駕白駱載白旗衣白衣服白玉食麻與犬其器亷以深注曰總章右個西堂北偏也是月也申嚴號令命百官貴賤無不務內以㑹天地之藏無有宣出集說曰務內謂專務收斂諸物於內㑹合也合天地閉藏之令也宣出則悖時令乃命冡宰農事備收舉五榖之要藏帝籍之收於神倉祗敬必飭集說曰農事備收百榖皆斂也要者租賦所入之數籍田所收歸之神倉將以供粢盛也祗謂謹其事敬謂一其心飭謂致其力也是月也霜始降則百工休注曰寒而膠漆之作不堅好也乃命有司曰寒氣總至民力不堪其皆入室集說曰總至凝聚而至也上丁命樂正入學習吹注曰為將饗帝也春夏重舞秋冬重吹是月也大饗帝集說曰仲夏大雩祈也此月大饗報也嘗犧牲告備于天子注曰嘗者謂嘗羣神也使有司祭于羣神禮畢而告焉疏曰以四月大雩雩帝之後云雩祀百辟卿士是雩帝之外别雩羣祀九月大饗以報功明饗帝之外亦饗羣神故知此嘗是嘗羣神合諸侯制百縣為來歲受朔日與諸侯所稅於民輕重之法貢職之數以逺近土地所冝為度以給郊廟之事無有所私注曰秦以建亥之月為歲首於是歲終使諸侯受此法焉劉氏曰合諸侯者總命諸侯之國也制猶敕也百縣諸侯所統之縣也天子總命諸侯各敕百縣為來歲受朔日與稅法貢數各以道路逺近土地所冝為度以給上之事而不可有私也言郊廟者舉其重也蓋朔日與歲貢等事皆天子總命之諸侯而諸侯頒之百縣使奉行也是月也天子乃教於田獵以習五戎班馬政注曰教於田獵因田獵之禮教民以戰法也五戎謂五兵弓矢殳矛戈㦸也馬政謂齊其色度其力使同乘也校人職曰凡軍事毛馬而頒之命僕及七騶咸駕載旌旐授軍以級整設于屏外司徒搢撲北面誓之集說曰僕戎僕及御夫也天子馬有六種各一騶主之并總主六騶者為七騶也皆以馬駕車又載析羽之旌龜蛇之旐既畢而授車于乘者以尊卑為等級整正列也各使正其行列向背而設于軍門之屏外屏所田之地門外之蔽於是司徒插撲于帶于陳前北面誓戒之此時六軍皆向南而陳也撲即夏楚二物也天子乃厲飾執弓挾矢以獵命主祠祭禽于四方集說曰天子戎服而嚴厲其威武之飾親用弓矢以殺禽獸蓋奉祭祀之物當親殺也獵竟則命典祀之官取獵地所獲之獸祭於郊以報四方之神禽者獸之通名也是月也草木黃落乃伐薪為炭蟄蟲咸俯在內皆墐其户集說曰俯垂頭也內穴之深處也墐塞也乃趣獄刑毋留有罪集說曰刑於罪相得即决之留而不决亦悖時令也收祿秩之不當供養之不冝者集說曰收如漢法收印綬之收謂索之使還各依本等祿秩不當謂不應得而恩命濫賜之者也供養膳服之具也貴賤各有冝用不冝謂侈僣踰制者此亦順秋令之嚴肅也是月也天子乃以犬嘗稻先薦寢廟坡謂內則以稻與秫對言則秫是糯稻是粳粳同粳秫之不黏者九月始熟季秋行夏令則其國大水注曰六月宿直東井氣多暑雨冬藏殃敗集說曰竇窖之藏為水所侵民多鼽嚔集說曰未之氣乘之也鼽者氣窒於鼻嚔者聲發於口皆肺疾以夏火克金故病此也行冬令則國多盜賊邊境不寧土地分裂注曰丑之氣乘之也極隂為外邊竟之象也大寒之時地隆坼也行春令則暖風來至民氣解惰師興不居注曰辰之氣乘之也㢲為風師興辰宿直角角主兵不居象風行不休止也孟冬之月日在尾昏危中旦七星中注曰孟冬者日月㑹於析木之津而斗建亥之辰也其日壬癸注曰壬之言任也癸之言揆也時萬物懷任於下揆然萌牙又因以為日明焉其帝顓頊其神𤣥冥注曰此黑精之君顓頊高陽氏也𤣥冥少皡之子曰修曰熙為水官其蟲介其音羽律中應鍾其數六其味鹹其臭朽其祀行祭先腎注曰行在廟門外之西為軷壤厚二寸東西五尺南北四尺祀行之禮北面又主于軷上乃制腎及脾為爼奠于主南又設盛于爼東祭肉腎一脾再其他皆如祀門之禮疏曰主須南向故人北面設之其主則注大馭云蓋以菩芻棘柏為神主也集說曰介甲也介蟲龜鱉之屬三分商去一以生羽羽數四十八應鍾姑洗之所生三分去一律長四寸二十七分寸之二十水成數六鹹朽皆水屬水受惡穢故有朽腐之氣也行者道路往來之處冬隂往而陽來故祀行也春夏秋皆祭先所勝冬當先心以中央祭心故但祭所屬又以冬主靜不尚克制故也水始冰地始凍雉入大水為蜃虹藏不見集說曰此記亥月之候蜃注云大蛤一說蛟屬似蛇而大紅鬛要以下鱗盡逆又曰狀似螭龍有耳有角陸佃曰蛇交龜則生龜交雉則生蜃天官書海旁蜃氣象樓臺此乃雉入水所化蓋蛟屬之蜃非蛤蚌之蜃也蜃分二種舊失考正大水淮也晉語云雉入於淮為蜃隂陽氣交而為虹此時隂陽極乎辨故虹伏虹非有質而曰藏亦言其氣之下伏耳天子居𤣥堂左個注曰北堂西偏也乘𤣥路駕鐵驪集說曰鐵色之馬載𤣥旗衣黑衣集說曰黑深而𤣥淺如朱深而赤淺也服𤣥玉食黍與彘其器閎以奄注曰黍秀舒散屬火寒時食之亦以安性也彘水畜集說曰閎者中寬奄者上窄是月也以立冬先立冬三日大史謁之天子曰某日立冬盛德在水天子乃齊立冬之日天子親帥三公九卿大夫以迎冬於北郊還反賞死事恤孤寡疏曰迎冬北郊祭黑精之帝而顓頊配之不言諸侯亦如夏空其文死事謂臣人有為國事死者孤寡即死事者妻子也是月也命大史釁龜策占兆審卦吉凶馮氏曰釁龜策者殺牲取血而塗龜與蓍策也古者器成而釁以血神之也占兆者玩龜書之繇文審易書之休咎皆所以豫明其理而待用也釁龜而占兆釁策而審卦吉凶太史之職也是察阿黨則罪無有掩蔽集說曰獄吏治獄寧無阿私必是正而省察之庶幾犯罪者不至掩蔽其曲直也是月也天子始裘集說曰周禮季秋獻功裘至此月乃衣之也命有司曰天氣上騰地氣下降天地不通閉塞而成冬集說曰不交則不通不通則閉塞命百官謹蓋藏命有司循行積聚無有不斂注曰蓋藏謂府庫囷倉有財物積聚謂芻禾薪蒸之屬壞城郭戒門閭修鍵閉慎管籥集說曰壞補其缺薄處也城郭欲其厚實故言壞門閭備禦非常故言戒鍵鎖須也閉鎖筒也管籥鎖匙也鍵閉或有破壞故云修管籥不可妄開故云慎固封疆備邊竟完要塞謹關梁塞徯徑集說曰固封疆謂使有司循其溝樹及其衆庶之守法也要塞邊城要害處也關境上門梁橋也徯徑野獸往來之路也飭喪紀辨衣裳審棺槨之厚薄塋邱壟之大小高卑厚薄之度貴賤之等級集說曰飭喪紀者飭正喪事之紀律也即辨衣裳以下諸事是已上衰下裳以布之精粗為親踈故曰辨亦謂襲斂之衣數多寡也棺槨厚薄有貴賤之等瑩有大小邱壟有高卑皆不可踰越厚薄之度主禮而言貴賤之等級主人而言故總曰審朱氏曰喪者人之終冬者歲之終故於此時而飭喪紀焉是月也命工師效功陳祭器按度程毋或作為淫巧以蕩上心必功致為上物勒工名以考其誠功有不當必行其罪以窮其情集說曰工師百工之長效呈也諸器皆成獨主祭器祭器尊也度法也程式也淫巧指諸器而言致讀為緻謂功力密緻也一讀如字亦通勒刻也刻名於器以考工人之誠僞也行猶治也窮其情者究詰其作僞之情也是月也大飲蒸注曰十月農功畢天子諸侯與其羣臣飲酒于大學以正齒位謂之大飲别之於他其禮亡蒸謂有牲體為爼也黨正飲酒于序亦謂此時也詩云十月滌場朋酒斯饗是頌大飲之詩疏曰蒸升也升此牲體於爼之上坡謂不著祠禴而言嘗蒸且九月嘗十月蒸於祭月又不合如注之解未有可以破除之也學者詳之天子乃祈來年于天宗大割祠于公社及門閭臘先祖五祀勞農以休息之注曰此周禮所謂蠟祭也天宗謂日月星辰也大割大殺羣牲割之也臘謂以田獵所得禽祭也五祀門户中霤竈行也或言祈年或言大割或言臘互文勞農黨正屬民飲酒是也疏曰社以上公配祭故云公社此等之祭總謂之蠟若細别之天宗公社門閭謂之蠟其祭則皮辨素服葛帶榛杖其臘先祖五祀謂之息民之祭其服則黃衣黃冠蔡雍云夏曰清祀殷曰嘉平周曰蠟秦曰臘按左傳云虞不臘是周亦有臘名矣天子乃命將帥講武習射御角力注曰為仲冬當大閲講習之亦因營室主武士也凡田之禮惟狩最備夏小正十一月王狩是月也乃命水虞漁師收水泉池澤之賦毋或敢侵削衆庶兆民以為天子取怨于下其有若此者行罪無赦集說曰水虞澤虞也漁師漁人也見周禮水冬涸故以冬時收賦孟冬行春令則凍閉不密地氣上泄民多流亡注曰寅之氣乘之也流亡象蟄蟲動行夏令則國多暴風方冬不寒蟄蟲復出注曰已之氣乘之也立夏㢲用事㢲為風行秋令則雪霜不時小兵時起土地侵削注曰申之氣乘之也申隂氣尚微申宿直參伐參伐為兵仲冬之月日在斗昏東辟中旦軫中注曰仲冬者日月㑹於星紀而斗建子之辰也其日壬癸其帝顓頊其神𤣥冥其蟲介其音羽律中黃鍾其數六其味鹹其臭朽其祀行祭先腎集說曰黃鍾律之始長九寸冰益壯地始坼鶡旦不鳴虎始交集說曰此記子月之候鶡旦夜鳴求旦之鳥也似小雞四足有肉翅不能逺飛天子居𤣥堂大廟乘𤣥路駕鐵驪載𤣥旗衣黑衣服𤣥玉食黍與彘其器閎以奄注曰𤣥堂太廟北堂當太室也飭死事集說曰誓戒六軍之士以戰陳當厲必死之志也命有司曰土事毋作慎毋發蓋毋發室屋及起大衆以固而閉熊氏曰作土事則民不得休息發蓋則物不得其藏發屋室則人不得其處起大衆則衆不得靜故皆禁之而猶其也地氣沮泄是謂發天地之房諸蟄則死民必疾疫又隨以喪命之曰暢月集說曰沮者壞敗之義承上文若閉不固則地氣因敗而宣泄故云沮泄也天地之閉固氣類猶房室之安藏人也若發散天地之所藏則諸蟄皆死是干犯隂陽之令疾疫必為民災喪禍隨之而見一說喪讀去聲謂民因避疾疫而逃亡也暢月暢充也言所以不可發泄者以此月萬物皆充實於內故也是月也命奄尹申宮令審門閭謹房室必重閉省婦事毋得淫雖有貴戚近習毋有不禁集說曰奄尹羣奄之長也以其精氣奄閉故名奄人宫令宫中之政令也逺者謂之門閭近者謂之房室皆有內外門户必重叠閉之减省婦人之事務順隂靜也淫謂女功之過巧者貴戚天子之族姻近習其嬖幸者乃命大酋秫稻必齊麴蘖必時湛熾必潔水泉必香陶器必良火齊必得兼用六物大酋監之毋有差貸集說曰酒熟曰酋大酋酒官之長也秫稻酒材也必齊多寡中度也必時制造及時也湛漬而滌之也熾蒸炊也必潔無所汙也必香無穢惡之氣也必良無罅漏之失也必得適生熟之冝也物事也六物謂必齊以下六事差貸不中法式也天子命有司祈祀四海大川名源淵澤井泉集說曰冬令方中水德至盛故為民祈而祀之也是月也農有不收藏積聚者馬牛畜獸有放逸者取之不詰注曰此收斂尤急之時人有取者不罪所以警懼其主也王居明堂禮曰孟冬之月命農畢積聚繫收牛馬山林藪澤有能取蔬食田獵禽獸者野虞教道之其有相侵奪者罪之不赦注曰務收斂野物也大澤曰藪草木之實為蔬食是月也日短至隂陽爭諸生蕩集說曰短至短之極也爭者隂方盛陽欲起也諸生者萬物之生機也蕩者動也君子齊戒處必掩身身欲寧去聲色禁耆欲安形性事欲靜以待隂陽之所定集說曰此皆與夏至同而有謹之至者彼言止聲色而此言去彼言節耆欲而此言禁蓋仲夏之隂猶微而此時之隂猶盛隂微則盛陽未至於甚傷隂甚則微陽當在於善保故也藝始生荔挺出蚯蚓結麋角解水泉動集說曰此又言子月之候藝香草也似苜蓿一名藝蒿荔挺馬䪥也似蒲而小根可為刷結猶屈也解脫也水者天一之陽所生陽生而動言枯涸者漸滋發也十二月惟子午之月皆再記其候者詳於隂陽之萌也日短至則伐木取竹箭集說曰隂盛則材成故伐而取之大曰竹小曰箭是月也可以罷官之無事去器之無用者集說曰官以權冝而設器以權宜而造皆暫焉之事此閉藏之息之時故可罷去塗闕廷門閭築囹圄此以助天地之閉藏也仲冬行夏令則其國乃旱集說曰火氣乘之應於來年氛霧冥冥集說曰亦火氣所蒸雷乃發聲集說曰隂不能固陽也午火之氣所充也行秋令則天時雨汁瓜瓠不成國有大兵注曰酉之氣乘之也酉宿直昴畢畢好雨雨汁者水雪雜下也子宿直虛危虛危內有瓜瓠疏曰仲冬非瓜瓠不成之時又非蝗蟲為敗之日是據來年行春令則蝗蟲為敗注曰當蟄者出卯之氣乘之也水泉咸竭注曰大火為旱民多疥癘注曰疥癘之病孚甲之象季冬之月日在婺女昏婁中旦氐中注曰季冬者日月會於𤣥枵而斗建丑之辰也其日壬癸其帝顓頊其神𤣥冥其蟲介其音羽律中大吕其數六其味鹹其臭朽其祀行祭先腎集說曰大吕者蕤賓之所生三分益一律長八寸二百四十三分寸之百四鴈北鄉鵲始巢雉雊雞乳疏曰鴈早者則此月北向晚者二月鵲始巢此晚者若早則十一月雊雉鳴也天子居𤣥堂右個乘𤣥路駕鐵驪載𤣥旗衣黑衣服𤣥玉食黍與彘其器閎以奄注曰𤣥堂右個北堂東偏也命有司大難旁磔出土牛以送寒氣集說曰季春惟國家之難仲秋惟天子之難此則下及庶人又以隂氣極盛故云大難也旁磔謂四方之門皆披磔其牲以攘除隂氣不但如季春之九門磔攘而已此月之中日經虛危司命二星在虛北司祿二星在司命北司危二星在司祿北司中二星在司危北此四司者鬼官之長又墳四星在危東南墳墓四司之氣能為厲鬼將來或為災厲故難磔以攘除之出猶作也月建丑丑為牛土能制水故特作土牛以畢送寒氣也征鳥厲疾注曰征鳥題肩也齊人謂之擊征或名曰鷹疏曰殺氣盛極故鷹隼之屬取鳥捷疾嚴猛也乃畢山川之祀及帝之大臣天之神祗注曰帝之大臣句芒之屬天之神祗司中司命風雨雨師坡謂此三祀考周禮各有其方因方而祀各有其時此言季冬乃畢祀則秦禮也畢偏舉也是月也命漁師始漁天子親往乃嘗魚先薦寢廟集說曰獵而親殺為奉祭也則漁而親往亦為薦先冰方盛水澤腹堅命取冰冰以入注曰此月日在北陸冰堅厚之時也北陸謂虛也集說曰冰之初凝惟水而已至此則徹上下皆凝故云腹猶內也藏冰正在此時故命取冰冰入則隂事之終也令告民出五種命農計耦耕事修耒耜具田器集說曰冰入之後大寒將退令典農之官告民出其所藏五穀之種計度耦耕之事耦謂二人相耦也楺木為耒斫木為耜今之耜以鐵為之田器鎡基之屬凡治田所用者也此皆豫備東作之事陽事之始也命樂師大合吹而罷注曰歲將終與族人大飲作樂於太寢以綴恩也王居明堂禮季冬命國為酒以合三族疏曰此用禮樂與族人最盛後年季冬乃復如此作樂以一年頓停故云罷乃命四監收秩薪柴以共郊廟及百祀之薪燎集說曰四監說見季夏秩常也謂有常數也大而可析者謂之薪小而束者謂之柴薪施炊釁柴以給燎是月也日窮于次月窮于紀星回于天數將幾終歲且更始集說曰日窮于次者去年季冬次𤣥枵至此窮盡還次𤣥枵也紀㑹也去年季冬月與日相㑹於𤣥枵至此窮盡還復㑹於𤣥枵也二十八宿隨天而行每日雖周天一匝而早晚不同至此月而復其故處與去年季冬早晚相似故云回于天也幾近也以去年季冬至今年季冬三百五十四日未滿三百六十五十不為終終故云幾於終也歲且更始者所謂終則有始也專而農民毋有所使集說曰而汝也在上者當專一汝農之事毋得徭役使之也天子乃與公卿大夫共飭國典論時令以待來歲之冝朱氏曰國典有常飭之以應來歲之變時令有序論之以防來歲之差歲次更始故事亦有異冝者熊氏曰典禮樂刑政之類時令春夏宣泄秋冬閉藏之類乃令大史次諸侯之列賦之犧牲以共皇天上帝社稷之饗疏曰來歲方祭祀須犧牲諸侯同王南面專王之土故命太史書列之使之出牲以與王共事天地也乃命同姓之邦共寢廟之芻豢集說曰人本乎祖故祖廟之牲使同姓諸侯共之命宰歷卿大夫至于庶民土田之數而賦犧牲以共山林名川之祀疏曰宰小宰也歷亦次也卿大夫謂畿內有采地者庶民鄉遂公邑之民受田者凡在天下九州之民者無不咸獻其力以共皇天上帝社稷寢廟山林名川之祀注曰民非神之福不生雖有其邦國采地此賦要由民出疏曰不云諸侯卿大夫獨云民故鄭云此也季冬行秋令則白露蚤降介蟲為妖四鄙入保注曰戌之氣乘之也九月初尚有白露月中乃為霜丑為鱉蟹疏曰按隂陽式法丑魚鱉蟹行春令則胎夭多傷注曰辰之氣乘之也天少長也多傷者生氣早至不充其性國多固疾注曰生不充性有久疾也命之曰逆集說曰以歲終而行歲始之令也行夏令則水潦敗國時雪不降冰凍消釋注曰未之氣乘之也季夏大雨時行禮記述注卷六
