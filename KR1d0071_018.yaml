body:
  text: 禮記述注卷十八安溪李光坡撰雜記下第二十一有父之喪如未沒喪而母死其除父之喪也服其除服卒事反喪服集說曰沒猶終也除也父喪在小祥後大祥前是未沒父喪也又遭母喪則既葬後當除父喪之時自服除喪之服以行大祥之禮此禮事畢即服喪母之服若母喪未葬而值父之二祥則不得服祥服者以祥祭為吉未葬為凶不忍於凶時行吉禮也雖諸父昆弟之喪如當父母之喪其除諸父昆弟之喪也皆服其除喪之服卒事反喪服注曰雖有親之大喪猶為輕服者除骨肉之恩也唯君之喪不除私服言當者朞大功之喪或終始皆在三年之中小功緦麻則不除殤長中乃除疏曰此亦謂重喪葬後之時也如三年之喪則既顈其練祥皆行集說曰前喪後喪俱是三年之服其後喪既受葛之後得為前喪行練祥之禮也既顈者既虞受服之時以葛絰易要之麻絰也顈草名無葛之鄉以顈代王父死未練祥而孫又死猶是附於王父也疏曰禮孫死祔祖今此明若祖喪雖未二祥而孫死則孫亦得用是祔禮祔於祖也然王父雖祔未練無廟孫得祔於祖其孫就王父所祔祖廟之中而祔祭王父馬有殯聞外喪哭之他室入奠卒奠出改服即位如始即位之禮集說曰有殯謂父母喪未葬也外喪兄弟之喪在逺者也哭不於殯宫而於他室明非哭殯也入奠者哭之明日之朝著已本喪之服入奠殯宫奠畢而出乃脫已本喪服著新死者未成服之服而即昨日他室所哭之位如始即位之禮者謂今日之即哭位如昨日始聞喪而即位之禮也大夫士將與祭於公既視濯而父母死則猶是與祭也次於異宫既祭釋服出公門外哭而歸其他如奔喪之禮如未視濯則使人告告者反而後哭集說曰視濯監視器用之滌濯也祭日前既視濯之後而遭父母死猶是與祭者猶是在吉禮之中不得不與祭但居次於異宫耳以吉凶不可同處也如未視濯而父母死則使人告於君俟告者反而後哭父母也如諸父昆弟姑姊妹之喪則既宿則與祭卒事出公門釋服而后歸其他如奔喪之禮如同宫則次于異宫集說曰既宿謂祭前三日將致祭之時既受宿戒必與公家之祭以期以下之喪服輕故也如同宫則次于異宫者謂此死者是已同宫之人則既宿之後出次異宫亦以吉凶不可同處也曾子問曰卿大夫將為尸於公受宿矣而有齊衰內喪則如之何孔子曰出舍乎公宫以待事禮也孔子曰尸辨冕而出卿大夫士皆下之尸必式必有前驅注曰尸重受宿則不得哭內喪同宮也疏曰之公宫以待君之祭事不在已之異宫耳父母之喪將祭而昆弟死既殯而祭如同宫則雖臣妾葬而后祭注曰將祭謂練祥也言若同宫則是昆弟異宫也古者昆弟異居同財有東宫有西宫有南宫有北宫有父母之喪當在殯宫而在異宫者疾病或歸者疏曰父母之喪兄弟悉應同在殯宫以其疾病或有歸者故得異宫而死祭主人之升降散等執事者亦散等雖虞祔亦然集說曰散栗也等階也吉祭則涉級聚足喪祭則栗階二祥之祭吉禮宜涉級聚足而栗階者以有兄弟之喪故略威儀也燕禮云栗階不過二等蓋始升猶聚足連步至二等則左右足各一發而升堂也雖虞祔亦然者謂主人至昆弟虞祔時而行父母祥祭則與執事者亦皆散等也自諸侯逹諸士小祥之祭主人之酢也嚌之衆賔兄弟則皆啐之大祥主人啐之衆賔兄弟皆飲之可也疏曰必知非受尸酢者以士虞禮主人主婦獻尸受酢皆卒爵虞祭比小祥為重尚卒爵今小祥祭主人受尸酢何得唯嚌之而已故知受賔酢也集說曰至齒為嚌入口為啐主人之酢嚌之謂正祭之後主人獻賔長賓長酢主人主人受酢則嚌之也衆賓兄弟啐之謂祭末受獻之時則啐之也凡侍祭喪者告賔祭薦而不食集說曰侍祭喪謂相喪祭禮之人也薦謂脯醢也相禮者但告賓祭此脯醢而已賓不食之也若吉祭賓祭畢則食之此亦謂練祥之祭主人獻賓賔受獻主人設薦時也虞祔無獻賔之禮子貢問喪子曰敬為上哀次之瘠為下顔色稱其情戚容稱其服集說曰問喪問居父母之喪也附於身附於棺者皆欲其必誠必慎故曰敬為上子游言喪致乎哀而止先儒謂而止二字微有過於髙逺而簡略細微之弊此言哀次之可見矣毁瘠不形不勝喪乃比於不慈不孝故曰瘠為下也齊斬之服固有重輕稱其情稱其服則中於禮矣請問兄弟之喪子曰兄弟之喪則存乎書䇿矣集說曰存乎書䇿者言依禮經所載而行之非若父母之喪哀容體狀之不可名言而經不能備言也君子不奪人之喪亦不可奪喪也疏曰不奪人喪恕也不奪已喪孝也集說曰君子不奪廢他人居喪之情而君子居喪之情亦不可為他事所奪廢要使各得盡其禮耳孔子曰少連大連善居喪三日不怠三月不解期悲哀三年憂東夷之子也集說曰少連見論語三日親始死時也不怠謂哀痛之切雖不食而能自力以致其禮也三月親喪在殯時也解與懈同倦也或讀如本字謂寢不脫絰帶也憂謂憂戚憔悴三年之喪言而不語對而不問廬堊室之中不與人坐焉在堊室之中非時見乎母也不入門注曰言言已事也為人說為語在堊室之中以時事見乎母乃後入門則居廬時不入門疏衰皆居堊室不廬廬嚴者也集說曰疏衰齊衰也齊衰有三年者有期者有三月者凡喪次斬衰居倚廬齊衰居堊室大功有帷帳小功緦麻有牀第廬嚴者謂倚廬乃哀敬嚴肅之所服輕者不得居妻視叔父母姑姊妹視兄弟長中下殤視成人注曰視猶比也所比者哀容居處也疏曰妻居廬而杖抑之視叔父母姑姊妹出適服輕進之視兄弟長中下殤服輕上從本親視其成人也親喪外除兄弟之喪內除注曰外除日月已竟而哀未忘內除日月未竟而哀己殺視君之母與君之妻比之兄弟發諸顔色者亦不飲食也集說曰君母君妻小君也服輕哀之比兄弟之喪然於酒肴之珍醇可以發見顔色者亦不飲之食之也免喪之外行於道路見似目瞿聞名心瞿弔死而問疾顔色戚容必有以異於人也如此而后可以服三年之喪其餘則直道而行之是也注曰惻隱之心能如是則其餘齊衰以下直道而行盡自得也似謂容貌似其父母也名與親同疏曰父在為母雖期年亦從上三年之內也祥主人之除也於夕為期朝服祥因其故服疏曰祥祭之時主人除服之莭於夕為期謂於祥祭前夕預告明日祭期也朝服謂主人著朝服緇衣素裳其冠則縞冠也祥因其故服者謂明旦祥祭時主人因著其前夕故朝服也案上記端衰喪車無等則祥後並禫服尊卑上下無别皆服此緇衣素裳也又曰從祥至吉凡服有六祥祭朝服縞冠一也祥訖素縞麻衣二也禫祭𤣥冠黃裳三也禫訖朝服綅冠四也踰月吉祭𤣥冠朝服五也既祭𤣥端而居六也陸氏曰綅息亷反黑經白緯曰綅集說曰祥大祥也子游曰既祥雖不當縞者必縞然後反服注曰謂有以喪事賻贈來者雖不及時猶變服服祥祭之服以受之重其禮也其於此時始弔者則衛將軍文子之為之是矣反服反素縞麻衣也疏曰若其由未來今始弔者雖禫祭除喪後有練冠而受弔則文子之子是也明此是先己來今重至故著縞冠輕於練冠也此謂禫祭之前故知反服素縞麻衣也當袒大夫至雖當踊絶踊而拜之反改成踊乃襲於士既事成踊襲而后拜之不改成踊疏曰此明士有喪大夫及士來弔之禮士有喪當袒之時而大夫來弔蓋斂竟時也雖當主人踊時必絶止其踊而出拜此大夫反還也改更也拜竟而反還先位更為踊而始成踊尊大夫之來新其事也乃襲者踊畢乃襲初袒之衣也於士既事成踊襲者既猶畢也若當主人有大小斂諸事而士來弔則主人畢事而成踊踊畢而襲襲畢乃拜之拜之而止不更為之成踊也上大夫之虞也少牢卒哭成事附皆大牢下大夫之虞也犆牲卒哭成事附皆少牢集說曰卒哭謂之成事成告事也附祔廟也祝稱卜葬虞子孫曰哀夫曰乃兄弟曰某卜葬其兄弟曰伯子某集說曰初虞即葬之日故並言葬虞子卜葬父則祝辭云哀子某卜葬其父某甫孫則云哀孫某卜葬其祖某甫夫則云乃某卜葬其妻某氏乃者助語之辭妻卑故爾若弟為兄則云某卜葬兄伯子某兄為弟則云某卜葬其弟某古者貴賤皆杖叔孫武叔朝見輪人以其杖關轂而輠輪者於是有爵而後杖也集說曰輪人作車輪之人也關穿也輠廽也謂以其衰服之杖穿於車轂中而廽轉其輪鄙褻甚矣自後無爵者不得杖此記庶人廢禮之由也鑿巾以飯公羊賈為之也集說曰飯含也大夫以上貴使賔為其親含恐尸為賔所憎穢故以巾覆尸面而當口處鑿穿之令含玉得以入口士賤不得使賔子自含無憎穢之心故不以巾覆面公羊賈士也而鑿以飯是憎穢其親矣此記士失禮之所由也冒者何也所以掩形也自襲以至小斂不設冒則形是以襲而后設冒也疏曰襲則設冒至小斂之前則以衣緦覆於冒上皇氏云大斂脫冒未之聞也集說曰冒說見王制襲沐浴後以衣衣尸也則形者言尸雖已著衣若不設冒則尸象形見為人所惡是以襲而設冒也后字衍或問於曾子曰夫既遣而包其餘猶既食而裹其餘與君子既食則裹其餘乎曾子曰吾子不見大饗乎夫大饗既饗卷三牲之爼歸于賔館父母而賔客之所以為哀也子不見大饗乎集說曰設遣奠訖即以牲體之餘包裹而置之遣車以納于壙中或人疑此禮謂如君子食於他人家食畢而又包其餘以歸豈不傷廉乎曽子告以大饗之禮畢卷爼內三牲之肉送歸賔之館中猶此意耳父母家之主今死將葬而孝子以賔客之禮待之此所以悲哀之至也重言以喻之非為人喪問與賜與集說曰此上有闕文言非為其有喪而問遺之歟賜豫之歟問敵者之禮賜尊上之命三年之喪以其喪拜非三年之喪以吉拜集說曰拜問拜賜拜賔皆拜也喪拜稽顙而后拜也吉拜拜而后稽顙也今案檀弓鄭注以拜而后稽顙為殷之喪拜稽顙而后拜為周之喪拜疏云鄭知此者以孔子所論每以二代對言故云三年之喪吾從其至者但殷之喪拜自斬衰至緦麻皆拜而后稽顙以其質故也周制則杖期以上皆先稽顙而后拜不杖期以下乃作殷之喪拜此章疏義與檀弓疏互看乃得其祥三年之喪如或遺之酒肉則受之必三辭主人衰絰而受之如君命則不敢辭受而薦之喪者不遺人人遺之雖酒肉受也從父昆弟以下既卒哭遺人可也集說曰喪大記云既葬君食之則食之大夫父之友食之則食之此云衰絰而受雖受而不食也薦之者尊君之賜喪者不遺人以哀戚中不當行禮於人也卒哭可以遺人服輕哀殺故也縣子曰三年之喪如斬期之喪如剡集說曰剡削也此言哀痛淺深之殊三年之喪雖功衰不弔自諸侯逹諸士如有服而將往哭之則服其服而往疏曰小祥後衰與大功同故曰功衰衰雖外輕而痛猶內重故不得弔人也如有五服之親喪而往哭不著已之功衰而依彼親之莭以服之也不弔與往哭二者貴賤皆同之皇氏云此文雖在功衰之下而實通初喪也假令初喪而有五屬親死則亦暫服五服之服而往彼哭也諸侯絶期不應有諸親始死服當是敵體及所不臣者謂始封君不臣諸父昆弟也期之喪十一月而練十三月而祥十五月而禫練則弔注曰此謂父在為母也為母功衰可以弔人者以父在故輕於出也然則凡齊衰十一月皆可以出矣疏曰母練父在而得出則其餘喪雖無父亦得出也母既可矣諸父灼然坡案自期之喪至而禫十八字舊在三年之喪上既葬大功弔哭而退不聼事焉集說曰既葬大功者言已有大功之喪已葬也弔哭而退謂往弔他喪則弔哭既畢即退去不得與主人襲斂等事期喪練弔即亦然也期之喪未葬弔於鄉人哭而退不聼事焉功衰弔待事不執事集說曰儀禮喪服傳姑姊妹適人無主者姪與兄弟為之齊衰不杖期此言期之喪正謂此也雖未葬亦可出弔鄉人之喪但哭而退不聼事也此喪既葬受以大功之衰謂之功衰此後弔於人可以待主人襲斂等事但不親自執其事耳小功緦執事不與於禮集說曰執事謂擯相也禮饋奠也輕服可以為人擯相擯相事輕故也饋奠之禮重故不與相趨也出宫而退相揖也哀次而退相問也既封而退相見也反哭而退朋友虞祔而退集說曰此言弔喪之禮恩義有厚薄故去留有遲速相趨者謂與孝子本不相識但相聞姓名而來㑹趨喪也以情輕故柩出廟之宫門即退去也相揖者已嘗相㑹相識故待柩至大門外之哀次而退也相問遺者是有往來恩義故待窆畢而退嘗執贄行相見之禮者情又加重故待孝子反哭於家乃退朋友疇昔情重生死同殷故待虞祭祔祭畢而后退也弔非從主人也四十者執綍鄉人五十者從反哭四十者待盈坎集說曰言弔喪者是為相助凡役非徒隨從主人而已故年四十以下者力壯皆當執綍同鄉之人五十者始衰之年故隨主人反哭而四十者待土盈壙乃去若非鄉人則無問長少皆從主人歸優饒逺者喪食雖惡必充饑饑而廢事非禮也飽而忘哀亦非禮也視不明聼不聰行不正不知哀君子病之故有疾飲酒食肉五十不致毁六十不毁七十飲酒食肉皆為疑死集說曰疑死恐其死也有服人召之食不往大功以下既葬適人人食之其黨也食之非其黨弗食也注曰往而見食則可食也為食而往則不可黨猶親也疏曰親族不多食則其食有限若非黨而輒食則無復限數必忘哀也功衰食菜果飲水漿無鹽酪不能食食鹽酪可也集說曰功衰斬衰齊衰之末服也酪說文乳漿也孔子曰身有瘍則浴首有創則沐病則飲酒食肉毁瘠為病君子弗為也毁而死君子謂之無子集說曰曲禮曰不勝喪比於不慈不孝是有子與無子同也非從柩與反哭無免於堩注曰言喪服出入非此二事皆冠也免所以代冠人於道路不可以無飾堩道路疏曰此謂葬近而反哭者若葬逺反哭在路則著冠至郊則乃反著免小記云逺葬者比反哭皆冠及郊而後免也凡喪小功以上非虞附練祥無沐浴疏曰言小功以上則至斬同然各在其服限如此耳練祥不主大功小功也集說曰潔飾所以交神故非此四祭則不沐浴也疏衰之喪既葬人請見之則見不請見人小功請見人可也大功不以執摯唯父母之喪不辟涕泣而見人疏曰此小功文承疏衰既葬之下亦謂既葬也凡言見人者謂與人尋常相見不論執摯之事集說曰疏衰齊衰也摯與贄同三年之喪祥而從政期之喪卒哭而從政九月之喪既葬而從政小功緦之喪既殯而從政注曰以王制言之此謂庶人也從政從為政者教令謂給繇役疏曰王制云齊衰大功三月不從政此庶人依士禮卒哭與既葬同三月故王制省文總云三月也若大夫士三年之喪期不從政是正禮也卒哭金革之事無辟是權禮也曽申問於曽子曰哭父母有常聲乎曰中路嬰兒失其母焉何常聲之有集說曰哀痛之極無復音莭所謂哭不偯也卒哭而諱王父母兄弟世父叔父姑姊妹子與父同諱集說曰卒哭以前猶以生禮事之故不諱卒哭後則事以鬼道故諱其名也此專言父之所諱則子亦不敢不諱故曰子與父同諱也父之祖父母伯父叔父及姑等於已小功以下本不合諱但以父之所諱己亦從而諱也若父之兄弟及姊妹於已正服朞已自當諱不假從父而諱也此父身是士故諱王父母若是庶人子不逮事父母則不諱王父母也天子諸侯諱羣祖母之諱宫中諱妻之諱不舉諸其側與從祖昆弟同名則諱集說曰母為其親諱則子於一宫之中亦為之諱妻為其親諱則夫亦不得稱其辭於妻之左右非宫中非其側則固可稱矣孝子聞名心瞿凡不言人諱者亦為其相感動也從祖昆弟同曽祖之親也若母與妻所諱者適與已從祖見弟之名同則為之諱不但宫中旁側其在餘處皆諱之以喪冠者雖三年之喪可也既冠於次入哭踊三者三乃出注曰言雖者明齊衰以下皆可以喪冠也始遭喪以其冠月則喪服因冠矣非其冠月待變除卒哭而冠次廬也疏曰次廬者據重服而言若齊衰以下加冠於次舍之處入哭踊三者三乃出者謂既冠後入於喪所哭而跳踊每哭一莭而三踊如此者三凡為九踊乃出就處所坡謂曽子問齊衰大功可因喪服而冠未及言三年之可也故記者足之古者二十而冠人夏小正二月綏多士女是冠用二月假令年二十二月當冠而遭喪則可因喪而冠疏云若正月遭則二月不得因喪冠也大功之末可以冠子可以嫁子父小功之末可以冠子可以嫁子可以取婦已雖小功既卒哭可以冠取妻下殤之小功則不可注曰下殤小功齊衰之親除喪而後可為昏禮疏曰末謂卒哭之後取婦有酒食之㑹集鄉黨僚友涉近歡樂故小功之末乃可坡謂大功兼父與已父大功之末可以冠子則已大功之末可以加冠矣然父未可以取婦則己未可以取妻也父小功之末可以冠子取婦則己小功卒哭可以冠取妻矣凡辨絰其衰侈袂注曰侈猶大也辨絰服者弔服也其衰錫也緦也疑也袂之小者二尺二寸大者半而益之則侈袂三尺三寸疏曰大夫以上侈之士則不侈父有服宫中子不與於樂母有服聲聞焉不舉樂妻有服不舉樂於其側大功將至辟琴瑟小功至不絶樂注曰宫中子與父同宫者也禮由命士以上父子異宫不與於樂謂出行見之不得觀也疏曰若異宫則得與樂崔云父有服齊哀以下之服也若重服則期後猶有子姓之冠自當不得與於樂姑姊妹其夫死而夫黨無兄弟使夫之族人主喪妻之黨雖親弗主夫若無族矣則前後家東西家無有則里尹主之或曰主之而附於夫之黨注曰此謂姑姊妹無子寡而死也夫黨無兄弟無緦之親也其主喪不使妻之親而使夫之族人婦人外成主必宜得夫之姓類里尹主之喪無無主也里尹閭胥里宰之屬王度記曰百户為里里一尹其祿如庶人在官者諸侯弔於異國之臣則其君為主里尹主之亦斯義也或曰主之妻之黨自主之非也夫之黨其祖姑也疏曰别録王度記云似齊宣王時淳于髠等所說也麻者不紳執玉不麻麻不加於采疏曰案聘禮已國君薨至於主國衰而出注云可以凶服將事蓋受主君小禮得以凶服若行聘享大事則吉服故鄭云其聘享之事自若吉也集說曰麻謂喪服之絰也紳大帶也吉凶異道居喪以絰代大帶也執玉不麻謂著衰絰者不得執玉行禮也采𤣥纁之衣也國禁哭則止朝夕之奠即位自因也集說曰國有大祭祀則喪者不敢哭然朝奠夕奠之時自即其阼階下之位而因仍禮莭之故事以行也童子哭不偯不踊不杖不菲不廬集說曰偯委曲之聲也菲草屨也廬倚廬也童子為父後者則杖孔子曰伯母叔母疏衰踊不絶地姑姊妹之大功踊絶於地如知此者由文矣哉由文矣哉注曰由用也言知此踊絶地不絶地之情者能用禮文矣能用禮文哉美之也伯母叔母義也姑姊妹骨肉也泄桞之母死相者由左泄桞死其徒由右相由右相泄桞之徒為之也集說曰悼公弔有若之喪而子游擯由左則由右相者非禮也此記失禮所自始天子飯九貝諸侯七大夫五士三集說曰飯含也貝水物古者以為貨士喪禮貝三實于笲周禮天子飯含用玉此蓋異代之制士三月而葬是月也卒哭大夫三月而葬五月而卒哭諸侯五月而葬七月而卒哭士三虞大夫五諸侯七疏曰大夫以上位尊念親哀情於時長逺士職卑位下禮數未伸諸侯使人弔其次含襚賵臨皆同日而畢事者也其次如此也集說曰諸侯薨鄰國遣使來先弔次含次襚次賵次臨四者之禮一日畢行詳見上篇卿大夫疾君問之無算士一問之君於卿大夫比葬不食肉比卒哭不舉樂為士比殯不舉樂疏曰喪大記君於大夫疾三問之此云無算謂有師保恩舊之親故問之無算或可三問者謂君自行此云無算謂遣使也升正柩諸侯執綍五百人四綍皆䘖枚司馬執鐸左八人右八人匠人執羽葆御柩大夫之喪其升正柩也執引者三百人執鐸者左右各四人御柩以茅集說曰升正柩者將葬柩朝祖廟升西階用輁軸載柩于兩楹間而正之也其時柩北首柩有四綍枚形似箸兩端有小繩䘖于口而繫于頭後則不能言所以止喧譁也五百人皆用之司馬十六人執鐸分居左右夾柩以號令於衆也葆形如蓋以羽為之御柩者在柩車之前若道塗有低昻傾虧則以所執者為抑揚左右之莭使執綍者知之也綍引同耳廟中曰綍在塗曰引互言之茅以茅為麾也孔子曰管仲鏤簋而朱紘旅樹而反坫山節而藻棁賢大夫也而難為上也集說曰鏤簋簋有雕鏤之飾也冠有笄者為紘紘在纓處兩端上屬下不結旅道也樹屏也立屏當所行之路以蔽內外也反坫反爵之坫也土為之在兩楹間山莭刻山於柱頭之斗拱也藻水草藻棁晝藻於梁上之短柱也難為上言僭上也晏平仲祀其先人豚肩不掩豆賢大夫也而難為下也君子上不僭上下不逼下集說曰大夫祭用少牢不合用豚肩在爼不在豆此但喻其極小謂併豚兩肩亦不能掩豆耳難為下言逼下也婦人非三年之喪不踰封而弔如三年之喪則君夫人歸夫人其歸也以諸侯之弔禮其待之也若待諸侯然夫人至入自闈門升自側階君在阼其他如奔喪禮然集說曰三年之喪父母之喪也女嫁者為父母期而云三年者以本親言也踰封越彊也以諸侯弔禮者謂夫人行道車服待之若待諸侯者主國致禮闈門非正門宫中往來之門也側階非正階東房之旁階也此皆異於女賔主國君在阼階上不降迎也奔喪謂哭踊髽麻之類嫌夫人之位尊恐與卿大夫之妻奔喪禮異故明之嫂不撫叔叔不撫嫂集說曰撫死而撫其尸也嫂叔宜逺嫌故皆不撫君子有三患未之聞患弗得聞也既聞之患弗得學也既學之患弗能行也君子有五耻居其位無其言君子耻之有其言無其行君子耻之既得之而又失之君子耻之地有餘而民不足君子耻之衆寡均而倍焉君子耻之集說曰三患言為學之君子五耻言為政之君子也居位而無善言之可聞是不能講明政事一耻也有言無行是言行不相顧二耻也始以有德而進今以無德而退三耻也不能撫民使之逃散四耻也國有功後已與彼衆寡相等而彼之功績倍於己是不能作興率勵其下五耻也熊氏曰聞者稽之典籍問于師友學者加講習討論之功孔子曰凶年則乘駑馬祀以下牲集說曰周禮校人六馬曰種馬戎馬齊馬道馬田馬駑馬駑馬其最下者下牲如常祭用大牢者降用少牢少牢者降用特牲特豕者降用特豚之類以年凶故貶損也王制云凡祭豐年不奢凶年不儉與此不同未詳恤由之喪哀公使孺悲之孔子學士喪禮於是乎書注曰時人轉而僭上士之喪禮已廢矣孔子以教孺悲國人乃復書而存之子貢觀於蠟孔子曰賜也樂乎對曰一國之人皆若狂賜未知其樂也子曰百日之蠟一日之澤非爾所知也集說曰蠟祭見郊特牲若狂言飲酒醉甚也未知其樂言醉無禮儀方且可惡何樂之有孔子言百日勞苦而有此蠟農民終嵗勤動今僅使之為一日飲酒之歡是乃人君之思澤非爾所知言其義大也張而不弛文武弗能也弛而不張文武弗為也一張一弛文武之道也集說曰張張弦也弛落弦也孔子以弓喻民謂弓之為器久張而不弛則力必絶久弛而不張則體必變猶民久勞苦而不休息則其力憊久休息而不勞苦則其志逸弓必有時而張有時而弛民必有時而勞有時而息文武弗能言雖文王武王亦不能為治也一於逸樂則不可故言文武弗為孟獻子曰正月日至可以有事於上帝七月日至可以有事於祖七月而禘獻子為之也集說曰獻子魯大夫仲孫蔑正月周正建子之月也日至冬至也有事上帝郊祭也七月建午之月也日至夏至也有事於祖禘祭也明堂位云季夏六月以禘禮祀周公於大廟蓋夏正建已之月郊用冬至禮之當然此言獻子變禮用七月禘祭然不言自獻子始而但言獻子為之蓋一時之事耳夫人之不命於天子自魯昭公始也疏曰天子命畿外諸侯夫人若畿內諸侯夫人及卿大夫之妻則玉藻注云天子諸侯命其臣后夫人亦命其妻也集說曰昭公娶吳為同姓不敢告天子天子亦不命之後遂以為常此記魯失禮之由外宗為君夫人猶內宗也疏曰外宗者謂君之姑姊妹之女及舅之女及從母皆是也內宗者君五屬內之女內宗為君服斬衰為夫人齊衰此云猶內宗也則齊斬皆同君夫人者是國人所稱號此外宗謂嫁在國中者若國外當云諸侯也古者大夫不外娶故君之姑姊妹嫁於國內大夫為妻是其正也諸侯不內娶故舅女及從母不得在國中凡內外宗皆據有爵者其無服而嫁於諸臣從為夫之君內外宗皆然若嫁於庶人則亦從其夫為國君服齊衰三月亦內外宗皆然也此等內外宗熊氏云雖嫁在他國皆為本國君服斬也今依用之若賀循等云在己國則得服若在他國則不得也今並存焉集說曰案儀禮喪服疏云外宗有三周禮外宗之女有爵通卿大夫之妻一也雜記注謂君之姑姊妹之女舅之女從母皆是二也若姑之子婦從母之子婦其夫是君之外親為君服斬其婦亦名外宗為君服期三也內宗有二周禮內女之有爵謂同姓之女悉是一也雜記注君之五屬之內女二也廄焚孔子拜鄉人為火來者拜之士一大夫再亦相弔之道也注曰言拜之者為其來弔已宗伯職曰以弔禮哀禍災孔子曰管仲遇盜取二人焉上以為公臣曰其所與逰辟也可人也管仲死桓公使為之服宦於大夫者之為之服也自管仲始也有君命焉爾也集說曰管仲遇羣盜簡取二人而薦進之使為公家之臣且曰為其所與交逰者是邪僻之人故相誘為盜爾此二人本是堪可之人可任用也其後管仲死桓公使此二人為管仲服宦猶仕也記者言仕於大夫更升於公而為大夫著服自此始以君命不可違也蓋於禮違大夫而之諸侯不為大夫反服桓公之意蓋不忘管仲之舉賢也過而舉君之諱則起與君之諱同則稱字集說曰過失誤也舉猶稱也起起立也失言不自安故起立示改變之意諸臣之名或與君之諱同則稱字也內亂不與焉外患弗辟也集說曰內亂謂本國禍難也言卿大夫在國若同僚中有謀作亂者力能討則討之力不能討則謹自畏避不得干與其或冦患在外如鄰國來攻則不可逃避當盡力捍禦死義可也贊大行曰圭公九寸侯伯七寸子男五寸博三寸厚半寸剡上左右各寸半玉也藻三采六等集說曰贊大行古禮書篇名也其書必皆贊說大行人之職事今記者引之故云贊大行曰子男執璧非圭也記者失之博三寸圭也厚半寸圭璧各厚半寸也剡上削殺其上也藻藉玉者以韋衣板而藻畫朱白蒼三色為六行故曰藻三采六等也哀公問子羔曰子之食奚當對曰文公之下執事也集說曰問其先人始仕食祿當何君時文公至哀公七君成廟則釁之其禮祝宗人宰夫雍人皆爵辨純衣注曰廟新成必釁之尊而神之也宗人先請於君曰請命以釁某廟君諾之乃行疏曰初受命於寢門內之時君與祝等皆著朝服緇衣素裳其祝宗人等皆入廟之時則爵辨純衣爵辨士服也純衣絲衣則𤣥衣纁裳也雍人拭羊宗人祝之宰夫北面于碑南東上注曰居上者宰夫也宰夫攝主也拭淨也疏曰拭於廟門外入雍人舉羊升屋自中中屋南面刲羊血流於前乃降門夾室皆用雞先門而後夾室其衈皆於屋下割雞門當門夾室中室注曰自由也衈謂將刲割牲以釁先滅耳旁毛薦之耳聼聲者告神欲其聼之疏曰自中者由室東西之中謂兩階之間也門廟門也夾室東西廂也門與夾室各一雞凡用三雞亦升屋而割之如上用羊法衈皆於屋下者未刲割羊與雞時先衈以薦神廟則在廟屋下門與夾室則在門夾室屋下也衈訖為釁之時門則當門屋之上中夾室則當夾室上之中故云門當門夾室中室也有司皆鄉室而立門則有司當門北面既事宗人告事畢乃皆退注曰有司宰夫祝宗人告者告宰夫反命于君曰釁某廟事畢反命于寢君南鄉于門內朝服既反命乃退注曰君朝服者不至廟也路寢成則考之而不釁釁屋者交神明之道也疏曰考之者謂盛饌以落之庾蔚云落謂與賔客燕㑹以酒食澆落之即歡樂之義也凡宗廟之器其名者成則釁之以豭豚集說曰名者有名之器若尊彜之屬也豭豚牡豚也諸侯出夫人夫人比至于其國以夫人之禮行至以夫人入使者將命曰寡君不敏不能從而事社稷宗廟使使臣某敢告於執事主人對曰寡君固前辭不教矣寡君敢不敬須以俟命有司官陳器皿主人有司亦官受之疏曰有司官陳器皿者使者使從已來有司之官陳夫人嫁時所齎器皿之屬以還主國也主人有司亦官受之者主國亦使有司官領受之也並云官者明付受悉如法也集說曰出夫人有罪而出之還本國也在道至入猶以夫人禮者棄妻致命其家乃義絶也將命者謙言寡君不敏不能從夫人以事宗廟社稷而不斥言夫人之罪答言前辭不教謂納采時固嘗以此為辭矣妻出夫使人致之曰某不敏不能從而共粢盛使某也敢告於侍者主人對曰某之子不肖不敢辟誅敢不敬須以俟命使者退主人拜送之如舅在則稱舅舅沒則稱兄無兄則稱夫主人之辭曰某之子不肖如姑姊妹亦皆稱之集說曰遣妻必命由尊者故稱舅稱兄兄謂夫之兄也此但言夫致之之辭若舅與兄致之之辭未聞也上文已有主人對辭下文因姑姊妹故重言對言某之姑不肖或某之姊不肖或某之妹不肖故云亦皆稱之也孔子曰吾食於少施氏而飽少施氏食我以禮吾祭作而辭曰疏食不足祭也吾飱作而辭曰疏食也不敢以傷吾子集說曰少施氏魯惠公子施父之後作而辭起而辭謝也疏食粗疏之食也飱以飲澆飯也禮食竟更作三飱以助飽實不敢以傷吾子者言粗疏之飯不可强食以致傷害也納幣一束束五兩兩五尋注曰納幣謂昏禮納徴也十箇為束貴成數兩兩者合其卷是謂五兩八尺曰尋兩五尋則每卷二丈也合之則四十尺今謂之匹猶匹偶之云與婦見舅姑兄弟姑姊妹皆立于堂下西面北上是見己見諸父各就其寢集說曰立于堂下則婦之入也已過其前此即是見之矣不復各特見之也諸父旁尊故明日各詣其寢而見之女雖未許嫁年二十而笄禮之婦人執其禮燕則鬈首疏曰十五許嫁而笄若未許嫁至二十而笄以成人禮言之婦人執其禮者十五許嫁而笄則主婦及女賔為笄禮主婦為之著笄女賔以醴禮之未許嫁而笄者則婦人禮之無主婦女賔不備儀也燕則鬈首者謂既笄之後尋常在家燕居則去其笄而分髮為鬐紒也此謂未許嫁故雖已笄猶為少者處之韠長三尺下廣二尺上廣一尺㑹去上五寸紕以爵韋六寸不至下五寸純以素紃以五采疏曰韠韍也下廣上狹象天地數也上緣謂之㑹緣韠之上畔其縫廣狹去上畔五寸也下紕用爵韋㑹之所用無文㑹紕同類則知㑹之所用與紕同也旁緣謂之紕兩邉紕以爵韋濶六寸倒褶之兩廂各三寸也不至下五寸者是兩旁之紕不至韠之下畔濶五寸純緣也素謂生帛紕不至之處橫純之以生帛此帛上下各濶五寸也紃絛也謂五采之絛置於諸縫之中禮記述注卷十八
