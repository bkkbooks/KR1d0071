body:
  text: 禮記述注卷十九安溪李光坡撰喪大記第二十二疏曰鄭云喪大記者以其記人君以下始死小斂大斂殯葬之事劉元云記謂之大者言其委曲詳傋繁多故云大疾病外內皆掃君大夫徹縣士去琴瑟寢東首於北牖下廢牀徹褻衣加新衣體一人男女改服屬纊以俟絶氣男子不死於婦人之手婦人不死於男子之手集説曰疾病之甚也以賔客將來候問故掃潔所居之內外若君與大夫之病則徹去樂縣士則去琴瑟東首於北牖下者東首向生氣也案儀禮宫廟圖無北牖而西北隅謂之屋漏以天光漏入而得名或者北牖指此乎古人病困則廢牀而置病者於地以始生在地庶其生氣復反而得活及死則復舉尸而置之牀上徹褻衣則所加者新朝服矣加朝服者明其終於正也手足為四體各一人持之為其不能自屈伸也男女皆改服亦擬賔客之來也貴者朝服庶人深衣纊新綿也屬之口鼻觀其動否以驗氣之有無也男子不死於婦人之手婦人不死於男子之手君子重終為其相褻君夫人卒於路寢大夫世婦卒於適寢內子未命則死於下室遷尸於寢士之妻皆死於寢集説曰諸侯與大夫皆有三寢君正者曰路寢餘二曰小寢夫人一正寢二小寢卒當於正處也大夫妻曰命婦而云世婦者世婦乃國君之次婦其尊卑與命婦等故互言之今命婦死於正寢則世婦死女君次寢之上也內子卿妻也下室其燕處也初死在下室至小斂後遷尸乃復還其正寢也士之妻皆死於寢夫妻俱然故云皆也士喪禮云死於適室此云寢寢室通名也復有林麓則虞人設階無林麓則狄人設階集説曰復始死升屋招魂也虞人掌林麓之官階梯也狄人樂吏之賤者死者封疆內若有林麓則使虞人設梯以升屋其官職卑下不合有林麓者則使狄人設之小臣復復者朝服君以卷夫人以屈狄大夫以玄赬世婦以禪衣士以爵辨士妻以稅衣皆升自東榮中屋履危北面三號卷衣投于前司服受之降自西北榮集説曰小臣君之近臣也君以衮謂上公用衮服也循其等而用之則侯伯用鷩冕之服子男用毳冕之服上公之夫人用禕衣侯伯夫人用揄狄子男夫人用屈狄此言君以衮舉上以見下也夫人以屈狄舉下以知上也赬赤色玄赬玄衣纁裳所謂卿大夫自玄冕而下之服也世婦大夫妻言世婦者大夫妻與世婦同用禪衣也禕衣而下六服説見前篇爵辨指爵辨服而言非用辨也六冕則以衣名冠四辨則以冠名衣也榮屋翼也天子諸侯屋皆四注大夫以下但前簷後簷而已翼在屋之兩頭似翼故名屋翼也中屋當屋之中也履危立于高峻之處蓋屋之脊也三號者一號於上冀魂自天而來一號於下冀魂自地而來一號於中冀魂自天地四方之間而來其辭則皋某復也皋長聲也三號畢乃捲斂此衣自前投而下司服者以篋受之復之小臣即自西北榮而下也其為賔則公館復私館不復其在野則升其乘車之左轂而復集説曰説見曽子問及雜記復衣不以衣尸不以斂婦人復不以袡凡復男子稱名婦人稱字唯哭先復復而後行死事集説曰士喪禮復衣初用以覆尸浴則去之此言不以衣尸謂不用以襲也以絳緣衣之下曰袡蓋嫁時盛服非事鬼神之衣故不用以復也始卒主人啼兄弟哭婦人哭踊集説曰啼者哀痛之甚嗚咽不能哭如嬰兒失母也兄弟情稍輕故哭有聲婦人之踊似雀之跳足不離地問喪篇云爵踊是也既正尸子坐於東方卿大夫父兄子姓立于東方有司庶士哭於堂下北面夫人坐於西方內命婦姑姊妹子姓立于西方外命婦率外宗哭于堂上北面注曰正尸者謂遷尸牖下南首也子姓謂衆子孫也姓之言生也世婦為內命婦卿大夫之妻為外命婦外宗姑姊妹之女疏曰坐于東方謂室內尸東立于東方者案士喪禮衆主人在其後又云親者在室諸侯以上位尊卿大夫等不宜與俱在室內或當在户外之東方遙繼主人之後堂下北面不云東方稍近西而當户也士喪禮云小功以下衆兄弟堂下北面此直云有司庶士則諸父兄子姓等雖小功以下皆在堂上西面也夫人坐于西方亦近尸士喪禮但言俠牀人君則當以帷鄣之也哭于堂上北面者婦人無堂下位大夫之喪主人坐於東方主婦坐於西方其有命夫命婦則坐無則皆立注曰命夫命婦來哭者同宗父兄子姓姑姊妹子姓也凡此哭者尊者坐卑者立疏曰此云尊卑謂爵位非對死者為尊卑也若其今所行之禮與古異也成服之後尊於死者則坐卑於死者則立士之喪主人父兄子姓皆坐於東方主婦姑姊妹子姓皆坐於西方注曰士賤同宗尊卑皆坐疏曰君與大夫位尊故坐者殊其貴賤士位下故坐者等其尊卑無所異也凡哭尸於室者主人二手承衾而哭集説曰承衾而哭猶若致其親近扶持之情也謂初死時君之喪未小斂為寄公國賔出大夫之喪未小斂為君命出士之喪於大夫不當斂則出集説曰寄公諸侯失國而寄託鄰國者也國賔他國來聘之卿大夫也出出迎也為君命出謂君有命及門則出也檀弓云大夫弔當事而至則辭焉辭告也故不當斂時則亦出迎雜記云大夫至絶踊而拜之者亦謂斂後也凡主人之出也徒跣扱衽拊心降自西階君拜寄公國賔於位大夫於君命迎於寢門外使者升堂致命主人拜於下士於大夫親弔則與之哭不逆於門外注曰拜寄公國賔于位者於庭向其位而拜之此時寄公位在門西國賔位在門東皆北面小斂之後寄公東面國賔門西北面士於大夫親弔謂大夫身來弔士也與之哭既拜之即位西階東面哭大夫特來則北面疏曰降自西階者不忍當主位大夫與士俱來皆東面主人即位西階在大夫北俱東面而哭大夫獨來不與士俱故北面必知北面者以凡特弔皆北面陳氏曰徒跣者未著喪屨吉屨又不可著也扱衽者扱深衣前襟於帶也拊心擊心也夫人為寄公夫人出命婦為夫人之命出士妻不當斂則為命婦出注曰出拜之於堂上也此時寄公夫人命位在堂上北面小斂之後尸西東面疏曰婦人不下堂但出房而拜于堂上也小斂主人即位於户內主婦東面乃斂卒斂主人馮之踊主婦亦如之主人袒説髦括髮以麻婦人髽帶麻於房中注曰士既殯説髦此云小斂蓋諸侯禮也士之既殯諸侯之小斂於死者俱三日也婦人之髽帶麻於房中則西房也天子諸侯有左右房疏曰士喪禮馮尸已竟而云髻髮袒此未括髮先云袒者或人君禮髦幼時剪髮為之至年長則垂著兩邊若父死脫左髦母死脫右髦親沒不髦是也婦人髽亦用麻對男子括髮也帶麻麻帶也謂婦人要絰也士喪禮主人髻髮袒衆主人免於房婦人髽于室以男子在房故婦人髽于室大夫士唯有東房故也此經兼明諸侯之禮有東西房男子既括髮于東房故知婦人髽及帶麻于西房徹帷男女奉尸夷於堂降拜集説曰小斂畢即徹去先所設帷堂之帷諸侯大夫之禮賔出乃徹帷此言士禮耳夷陳也小斂竟相者舉尸出户往陳於堂而孝子男女親屬並扶捧之也降拜適子下堂而拜賔也君拜寄公國賔大夫士拜卿大夫於位於士旁三拜夫人亦拜寄公夫人於堂上大夫內子士妻特拜命婦汜拜衆賔於堂上集説曰君謂嗣君也寄公與國賔入弔固拜之矣其於大夫士也卿大夫則拜之於位士則旁三拜而已旁謂不正向之也士有上中下三等故共三拜大夫士皆先君之臣俱當服斬今以小斂畢而出庭列位故嗣君出拜之寄公門西東面國賔門西北面大夫當在門東北面士當在門西國賔之南東面嗣君於阼階下少南向其位而拜之夫人亦拜寄公夫人於堂上矣其於卿大夫之內子士之妻則亦拜之但內子與命婦則人人各拜之衆賔則士妻也汜拜之而已亦旁拜之比也寄公夫人命婦小斂之後尸西東面夫人本位在西房當於西房之外南面拜女賔也主人即位襲帶絰踊母之喪即位而免乃奠弔者襲裘加武帶絰與主人拾踊集説曰主人拜賔後即阼階下之位先拜賔時袒今拜畢乃掩襲其衣而加要帶首絰於序東猶括髮復位乃踊士喪禮先踊乃襲絰此諸侯禮故先襲絰乃踊也母喪降於父拜賔竟即位時不復括髮以免代之免而襲絰至大斂乃成服也乃奠者謂小斂奠弔者小斂後來則掩襲裘上之裼衣加素辨於吉冠之武武冠下卷也帶絰者要帶首絰有朋友之恩則加帶與絰無朋友之恩則無帶惟絰而已拾踊更踊也君喪虞人出木角狄人出壺雍人出鼎司馬縣之乃官代哭大夫官代哭不縣壺士代哭不以官集説曰虞人主山澤之官出木為薪以供爨鼎蓋冬月恐漏水冰凍也角㪺水之斗狄人樂吏也主挈壺漏水之器故出壺雍人主烹飪故出鼎司馬夏官卿也其屬有挈壺民司馬自臨視其縣此漏器乃官代哭者未殯哭不絶聲為其不食疲倦故以漏器分時刻使官屬以次依時相代而哭聲不絶也士代哭不以官者親疏之屬與家人自相代也君堂上二燭下二燭大夫堂上一燭下二燭士堂上一燭下一燭疏曰有喪則於中庭終夜設燎至曉滅燎而日光未明故須燭以照祭饌也古者未有蠟燭呼火炬為燭也賔出徹帷集説曰小斂畢即徹帷士禮也此君與大夫之禮小斂畢下階拜賔賔出乃徹帷也哭尸於堂上主人在東方由外來者在西方諸婦南鄉集説曰由外來在西方欲見異于在家者若未小斂而奔者則在東方也婦人哭位本在西而東面今以奔喪者居尸之西故退而近北以鄉南也婦人迎客送客不下堂下堂不哭男子出寢門外見人不哭集説曰堂以內至房婦人之事堂以外至門男子之事非其事處而哭猶野哭也此言小斂後男主女主迎送弔賔之禮婦人於敵者固不下堂若君夫人來弔則主婦下堂至庭稽顙而不哭也男子於敵者之弔亦不出門若有君命而出迎亦不哭也其無女主則男主拜女賔于寢門內其無男主則女主拜男賔于阼階下子幼則以衰抱之人為之拜為後者不在則有爵者辭無爵者人為之拜在竟內則俟之在竟外則殯葬可也喪有無後無無主集説曰此以下明喪無主而使人攝者禮也女拜男賔於阼階下鄉云女有下堂明謂此也男拜女賔於門內少逺階下而猶不出門也為後者不在謂以事故在外也此事若有喪事而弔賔及門其為後者是有爵之人則辭以攝主無爵不敢拜賔若此為後者是無爵之人則攝主代之拜賔可也出而在國境之內則俟其還乃殯葬若在境外則當殯即殯殯後又不得歸而及葬期則葬之可也無後不過已自絶嗣而已無主則闕於賔禮故四鄰里尹主之是可無後不可無主也君之喪三日子夫人杖五日既殯授大夫世婦杖子大夫寢門之外杖寢門之內輯之夫人世婦在其次則杖即位則使人執之子有王命則去杖國君之命則輯杖聽卜有事於尸則去杖大夫於君所則輯杖於大夫所則杖集説曰子兼適庶及世子也寢門殯宫門也輯斂也謂舉之不以拄地也子大夫廬在寢門外得拄杖而行至寢門子與大夫并言者據禮大夫隨世子以入子杖則大夫輯子輯則大夫去杖故下文云大夫於君所則輯杖也此言大夫特來不與子相隨故云門外杖門內輯若庶子之杖則不得持入寢門也夫人世婦居次在房內有王命至則世子去杖以尊王命也有鄰國君之命則輯杖者下成君也聽卜卜葬卜日也有事於尸虞與卒哭及祔之祭也於大夫所則杖者諸大夫同在門外之位同是為君故並得以杖拄地而行也大夫之喪三日之朝既殯主人主婦室老皆杖大夫有君命則去杖大夫之命則輯杖內子為夫人之命去杖為世婦之命授人杖集説曰大夫有君命此大夫指大夫之子也而云大夫者通身實為大夫而有父母喪亦然也世婦君之世婦也士之喪二日而殯三日之朝主人杖婦人皆杖於君命夫人之命如大夫於大夫世婦之命如大夫注曰士二日而殯下大夫也士之禮死與往日生與來日此二日於死者亦得三日也婦人皆杖謂主婦容妾為君女子子在室者子皆杖不以即位大夫士哭殯則杖哭柩則輯杖棄杖者斷而棄之於隱者注曰子謂凡庶子也哭殯謂既塗也哭柩謂啓後也大夫士之子於父父也尊近哭殯可以杖天子諸侯之子於父父也君也尊逺杖不入廟門疏曰不以杖即位辟適子也容人君適子入門輯杖猶得即位庶子宜在門外之位去之故無即門內之位理也大夫士之適子則得哭殯哭柩如下所説其庶子則宜與人君之庶子同並不得以杖即位也熊氏云此文承上君大夫士之喪下則此謂君大夫士之庶子故注云子謂凡庶子杖以喪至尊雖大祥棄之必斷之不堪他用棄於隱處使不穢汚始死遷尸於牀幠用斂衾去死衣小臣楔齒用角柶綴足用燕几君大夫士一也集説曰病困時遷尸於地冀其復生死則舉而置之牀上也幠覆也斂衾擬為大斂之衾也先時徹褻衣而加新衣以死今覆以衾而去此死時之新衣及復衣以俟沐浴也楔柱也以角為柶長六寸兩頭屈曲為將含恐口閉故以柶柱齒令開而受含也尸應著屨恐足辟戾故以燕几拘綴之令直也管人汲不説繘屈之盡階不升堂授御者御者入浴小臣四人抗衾御者二人浴浴水用盆沃水用枓浴用絺巾挋用浴衣如他日小臣爪足浴餘水棄于坎其母之喪則內御者抗衾而浴集説曰管人主館舍者汲汲水以供浴事也繘汲水瓶上索也急遽不睱解脫此索但縈屈而執於手水從西階升盡等而不上堂授與御者抗衾舉衾以蔽尸也此浴水用盆盛之乃用枓酌盆水以沃尸以絺為巾蘸水以去尸之垢挋拭也浴衣生時所用以浴者用之以拭尸令乾也如他日者如生時也爪足浴竟而翦尸足之爪甲也浴之餘水棄之坎中此坎是甸人所掘於階間取土為竈之坎內御者婦人也管人汲授御者御者差沭於堂上君沭粱大夫沐稷士沐粱甸人為垼於西牆下陶人出重鬲管人受沭乃煮之甸人取所徹廟之西北厞薪用爨之管人授御者沐乃沐沐用瓦盤挋用巾如他日小臣爪手翦須濡濯棄於坎集説曰此言尸之沐差淅也謂淅粱或稷之潘汁以沐髮也君與士同用粱者士卑不嫌於僭上也士喪禮沐稻此云沐粱蓋天子之士也以差率而上之天子沐黍與垼塊竈也將沐時甸人之官取西牆下之士為塊竈陶人作瓦器之官也重鬲縣重之罌瓦瓶也受三升管人受沐汁於堂上之御者而下往西牆於垼竈鬲中煮之令溫甸人為竈畢即往取復者所徹正寢西北厞以爨竈煮沐汁謂正寢為廟神之也舊説厞是屋簷謂抽取屋西北之簷一説西北隅厞隱處之薪也用瓦盤以貯此汁也挋用巾以巾拭髮及面也爪手翦手之爪甲也濡煩撋其髮也濯不淨之汁也巾櫛浴衣亦并棄之其坎君設大盤造冰焉大夫設夷盤造冰焉士併瓦盤無冰設牀袒笫有枕含一牀襲一牀遷尸於堂又一牀皆有枕席君大夫士一也集説曰造猶納也納冰於大盤中也夷盤小於大盤夷猶尸也併並也瓦盤小故併設之無冰盛水也冰在下設牀於上袒單也去席而袒露笫簀尸在其上使寒氣得通免腐壞也禮自仲春之後造冰設牀秋涼而止含襲遷尸三節各自有牀坡案此節本在始死遷尸之上注云此事皆沐浴之後宜承濡濯棄於坎下君之喪子大夫公子衆士皆三日不食子大夫公子衆士食粥納財朝一溢米莫一溢米食之無算士疏食水飲食之無算夫人世婦諸妻皆疏食水飲食之無算注曰納財謂食榖也二十兩曰溢於粟米之法一溢為米一升二十四分升之一諸妻御妾也同言無算則是皆一溢米或粥或飯疏曰納財者言每日納用之米食之無算者言居喪困病不能頓食隨須則食大夫之喪主人室老子姓皆食粥衆士疏食水飲妻妾疏食水飲士亦如之集説曰室老家臣之長子姓孫也衆士室老之下也士亦如之謂士之喪亦子食粥妻妾疏食水飲也既葬主人疏食水飲不食菜果婦人亦如之君大夫士一也練而食菜果祥而食肉食粥於盛不盥食於纂者盥食菜以醯醬始食肉者先食乾肉始飲酒者先飲醴酒集説曰果瓜桃之屬盛杯墟之器也纂竹筥也杯墟盛粥啜之以口故不用盥手飯在纂須手取而食之故當盥手也期之喪三不食食疏食水飲不食菜果三月既葬食肉飲酒期終喪不食肉不飲酒父在為母為妻九月之喪食飲猶期之喪也食肉飲酒不與人樂之疏曰期喪三不食謂大夫士旁期之喪正服則二日不食故間傳云齊衰二日不食集説曰不與人樂之言不以酒肉與人共食為歡樂也五月三月之喪一不食再不食可也比葬食肉飲酒不與人樂之叔母世母故主宗子食肉飲酒集説曰一不食三月之喪也再不食五月之喪也并言之者容殤降之緦麻再不食義服小功一不食故主舊君也大夫本稱主不能食粥羮之以菜可也注曰謂性不能者可食飯菜羮有疾食肉飲酒可也五十不成喪七十惟衰麻在身集説曰不成喪謂不備居喪之禮節也既葬若君食之則食之大夫父之友食之則食之矣不辟梁肉若有酒醴則辭集説曰君食之食臣也大夫食之食士也父友父同志者此並是尊者食卑者故雖粱肉不避酒醴見顔色故當辭小斂於户內大斂於阼君以簟席大夫以蒲席士以葦席注曰簟席細葦席也三者下皆有莞小斂布絞縮者一橫者三君錦衾大夫縞衾士緇衾皆一衣十有九稱君陳衣於序東大夫士陳衣於房中皆西領北上絞襟不在列集説曰此明小斂之衣衾絞既斂所用以束尸使堅實者從者在橫者之上從者一幅橫者三幅每幅之末析為三片以便結束皆一者君大夫士皆一衾衣在絞之上天數終於九地數終於十故十有九稱也士喪禮小斂陳衣於房中南領西上與大夫異今此同蓋亦天子之士也襟單被也不在列不在十九稱之數也小斂未有襟因絞不在列而言襟也大斂布絞縮者三橫者五布襟二衾君大夫士一也君陳衣於庭百稱北領西上大夫陳衣於序東五十稱西領南上士陳衣於序東三十稱西領南上絞襟如朝服絞一幅為三不辟襟五幅無紞集説曰此明大斂之事縮者三謂一幅直用裂其兩頭為三片也橫者五謂以布二幅分裂作六片而用五片橫於直者之下也襟一説在絞下用以舉尸一説在絞上未知孰是二衾者小斂一衾大斂又加一衾也士喪禮云衾二者始死斂衾今又復制如朝服其布如朝服十五升也絞一幅為三不辟者一幅兩頭分為三段而中不擘裂也襟五幅用以舉尸者無紞謂被頭不用組類綴邊為識别也士喪禮大斂亦陳衣於房中南領西上與大夫異今此又同亦蓋天子之士小斂之衣祭服不倒君無禭大夫士畢主人之祭服親戚之衣受之不以即陳小斂君大夫士皆用復衣復衾大斂君大夫士祭服無算君褶衣褶衾大夫士猶小斂也集説曰小斂十九稱不悉著於身但用裹尸要取其方故有領在下者惟祭服尊故必領在上也君無禭謂悉用已衣不用他人襚送者大夫士盡用已衣然後用襚言祭服舉尊美者言之也親戚所襚之衣雖受之而不以陳列復衣復衾衣衾之有綿纊者祭服無算隨所有皆用無限數也謂衣褶衾衣衾之夾者君衣尚多故大斂用夾衣衾大夫士猶用小斂之復衾也用復據主人之衣若襚亦得用夾故士喪禮云襚以褶是也袍必有表不禪衣必有裳謂之一稱集説曰袍衣之有著者乃褻衣也必須有禮服以表其外不可襌露衣與裳亦不可偏有如此乃成稱也凡陳衣者實之篋取衣者亦以篋升降者自西階凡陳衣不詘非列采不入絺綌紵不入集説曰陳衣者實之篋中取而陳之也取衣收取襚者所委之衣也不詘舒而不卷也非列采謂間色雜色也斂尸者當暑亦用袍故絺綌與紵布皆不入也凡斂者袒遷尸者襲集説曰執小斂大斂之事者其事煩故必袒以取便遷尸入柩則其事易矣故不袒君之喪大胥是斂衆胥佐之大夫之喪大胥侍之衆胥是斂士之喪胥為侍士是斂注曰胥樂官也不掌喪事胥當為祝字之誤也侍猶臨也大祝之職大喪贊斂喪祝卿大夫之喪掌斂士喪禮商祝主斂小斂大斂祭服不倒皆左衽結絞不紐疏曰衽衣襟也生向右左手解抽帶便也死則襟向左示不復解也結絞不紐者生時帶並為屈紐使易抽解死時無復解義故絞束畢結之不為紐也斂者既斂必哭士與其執事則斂斂焉則為之一不食凡斂者六人疏曰必哭者以其與亡者或臣舊或有恩今手為執事専心則增感故哭也與執事謂平生曽與亡者共執事則不褻惡之故使斂也此句釋前士是斂義君錦冒黼殺綴旁七大夫玄冒黼殺綴旁五士緇冒頳殺綴旁三凡冒質長與手齊殺三尺自小斂以往用夷衾夷衾質殺之裁猶冒也集説曰冒者韜尸之二囊上曰質下曰殺先以殺韜足而上後以質韜首而下君質用錦殺畫黼文故云錦冒黼殺也其制縫合一頭又縫連一邊餘一邊不縫兩囊皆然綴旁七者不縫之邊上下安七帶綴以結之也上之質從頭而下其長與手齊殺則自下而上其長三尺也小斂有此冒故不用衾小斂以後則用夷衾覆之夷尸也裁猶製也夷衾亦上齊手下三尺所用繒色及長短制度如冒之質殺但不復為囊及旁綴也其夷衾至大斂時所用無文當應總入大斂衣內併斂之也君將大斂子辨絰即位於序端卿大夫即位於堂廉楹西北面東上父兄堂下北面夫人命婦尸西東面外宗房中南面小臣鋪席商祝鋪絞襟衾衣士盥於盤上士舉遷尸於斂上卒斂宰告子馮之踊夫人東面亦如之集説曰辨絰素辨上加環絰未成服故也此雖以大斂為文其小斂時子亦辨絰序謂東序端序之南頭也堂廉堂基南畔廉稜之上也楹南近堂廉者楹西東楹之西也父兄堂下北面謂諸父諸兄之不仕者以賤故在堂下外宗見雜記下房東房也小臣鋪席絞襟衾鋪於席上士商祝之屬也斂上即斂處也卒斂宰告太宰告孝子以斂畢也馮之踊者馮尸而起踊也大夫之喪將大斂既鋪絞襟衾衣君至主人迎先入門右巫止於門外君釋菜祝先入升堂君即位於序端卿大夫即位於堂廉楹西北面東上主人房外南面主婦尸西東面遷尸卒斂宰告主人降北面於堂下君撫之主人拜稽顙君降升主人馮之命主婦馮之集説曰巫止者君行必與巫巫主辟凶邪也釋菜禮門神也祝升堂升自阼階也君隨祝升即位於序端阼階上之東是適子臨斂處也君升則主人亦升立君之北東房外南面大夫之子尊得升視斂也君撫之撫尸也主人拜稽顙禮君之恩也升主人馮之君使主人升堂馮尸也命亦君命之士之喪將大斂君不在其餘禮猶大夫也注曰其餘謂卿大夫及主婦之位疏曰其餘禮猶大夫者謂鋪衣列位男女之儀事悉如大夫鋪絞襟踊鋪衾踊鋪衣踊遷尸踊斂衣踊斂衾踊斂絞襟踊集説曰此明孝子貴賤踊節也動尸舉柩哭踊無數不在此節君撫大夫撫內命婦大夫撫室老撫姪娣集説曰撫以手案之也內命婦君之世婦也大夫內命婦皆貴故君自撫之以下則不撫也室老貴臣姪娣貴妾故大夫撫之也古者諸侯一娶九女二國各以女媵之為娣姪以從大夫內子亦有姪娣姪者兄之子娣女弟也娣尊姪卑士昏禮雖無娣媵先言姪若無娣猶先媵士有娣媵則大夫有可知矣君大夫馮父母妻長子不馮庶子士馮父母妻長子庶子庶子有子則父母不馮其尸凡馮尸者父母先妻子後疏曰君大夫之庶子雖無子並不得馮集説曰父母先妻子後謂尸之父母妻子也尊者先馮卑者後馮君於臣撫之父母於子執之子於父母馮之婦於舅姑奉之舅姑於婦撫之妻於夫拘之夫於妻於昆弟執之馮尸不當君所凡馮尸興必踊集説曰撫之者當尸之心胸處撫按之也執之者執持其衣馮之者謂服膺心上奉之者捧持其衣拘之者微牽引其衣皆於心胸之處不當君所者假令君已撫心則餘人馮者必少避之不敢當君所撫之處也馮尸之際哀情切極故起必為踊以泄哀也父母之喪居倚廬不塗寢苫枕凷非喪事不言君為廬宫之大夫士袒之疏曰倚廬者於中門外東牆下倚木為廬也不塗者但以草夾障不以泥塗飾之也寢苫卧於苫也枕凷枕土凷也為廬宫之者廬外以帷障之如宫牆也袒袒也其廬袒露不以帷障之也既葬柱楣塗廬不於顯者君大夫士皆宫之集説曰柱梋者先時倚木於牆以為廬葬後哀殺稍舉起其木拄之於楣以納日光略寬容也又於內用泥以塗之而免風寒不於顯者不塗廬外顯處也皆宫之不袒也凡非適子者自未葬以於隱者為廬疏曰既非喪主故於東南角隱映處為廬經雖云未葬其實葬竟亦然也既葬與人立君言王事不言國事大夫士言公事不言家事君既葬王政入於國既卒哭而服王事大夫士既葬公政入於家既卒哭辨絰帶金革之事無辟也集説曰不言國事家事禮之經也既葬政入以下禮之權也辨絰帶謂素辨加環絰而帶則仍是要絰也大夫士辨絰則國君亦辨絰也君言服王事則此亦服國事也既練居堊室不與人居君謀國政大夫士謀家事既祥黝堊祥而外無哭者禫而內無哭者樂作矣故也集説曰堊室在中門外練後服漸輕可以謀國政謀家事也祥大祥也黝治堊室之地令黑堊塗堊室之壁令白皆稍致其飾也外中門外即堊室中也練後三日一哭於次次謂堊室至大祥則不復於外若有弔者則入即位哭是外無哭者禫則門內亦不復哭內中門內禫已縣八音於庭故門內不哭也禫而從御吉祭而復寢集説曰從御謂御婦人吉四時之常祭也禫祭後值吉祭同月則吉祭畢而復寢若禫祭不值當吉祭之月則踰月而吉祭乃復寢也案間傳既祥復寢與此不同者彼謂不復宿中門外復於殯宫之寢此吉祭後不復宿殯宫復於平常之寢文雖同義别期居廬終喪不御於內者父在為母為妻齊衰期者大功布衰九月者皆三月不御於內婦人不居廬不寢苫喪父母既練而歸期九月者既葬而歸集説曰喪父母謂婦人有父母之喪也既練而歸練後乃歸夫家也女子出嫁為祖父母及為父後之兄弟皆期服九月者謂本是期服而降在大功者此皆哀殺故葬後即歸也公之喪大夫俟練士卒哭而歸集説曰雜記曰大夫次於公館以終喪士練而歸言大夫士為國君喪之禮也此言公者家臣稱有地之大夫為公也有地大夫之喪其大夫與士治其采地者皆來奔喪大夫則俟小祥而反其所治士則待卒哭而反其所治也大夫士父母之喪既練而歸朔月忌日則歸哭於宗室諸父兄弟之喪既卒哭而歸集説曰命士以上父子皆異宫庶子為大夫士而遭父母之喪殯宫在適子家既練各歸其宫至月朔與死之日則往哭於宗子之家謂殯宫也諸父兄弟期服輕故卒哭即歸也此弟謂適弟則庶兄為之次至卒哭乃歸下云兄不次於弟謂庶弟也父不次於子兄不次於弟疏曰喪卑故尊者不居其殯宫之次也君於大夫世婦大斂焉為之賜則小斂焉於外命婦既加蓋而君至於士既殯而往為之賜大斂焉集説曰君於大夫及內命婦之喪而視其大斂常禮也若為之加恩賜則視其小斂也外命婦乃臣之妻其恩輕故君待其大斂入棺加蓋之後而後至也士雖卑亦宜有恩賜者故亦視其大斂夫人於世婦大斂焉為之賜小斂焉於諸妻為之賜大斂焉於大夫外命婦既殯而往疏曰諸妻姪娣及同姓女也同士禮故賜大斂若夫人姪娣尊同世婦當賜小斂已上言君夫人視之皆有常禮而為之賜則加禮也大夫士既殯而君往焉使人戒之主人具殷奠之禮俟於門外見馬首先入門右巫止於門外祝代之先君釋菜於門內祝先升自阼階負墉南面君即位於阼小臣二人執戈立於前二人立於後擯者進主人拜稽顙君稱言視祝而踊主人踊集説曰大夫士之喪君或以他故不及斂者則殯後亦往先使告戒主人使知之主人具盛饌之奠身自出候於門外見君車前之馬首入立於門東北面巫本在君之前今巫止不入祝乃代巫先君而入君釋菜以禮門神之時祝先由東階以升負墉南面者在房户之東背壁而向南也小臣執戈先後君君升而夾階北面立擯贊主人禮者始在門東北面君既升則進前告孝子行禮也主人拜稽顙者以君之臨喪故於庭中北面拜而稽顙也君稱言者君舉其所來之言謂弔辭也祝相君之禮稱言畢而祝踊故君視祝而踊君踊畢主人乃踊也大夫則奠可也士則出俟於門外命之反奠乃反奠卒奠主人先俟於門外君退主人送於門外拜稽顙集説曰若君所臨是大夫喪則踊畢即釋此殷奠於殯可也若是士喪則主人卑不敢留君待奠故先出俟於門謂君將去也君使人命其反而奠乃反奠奠畢主人又先俟於門外君去即拜以送也奠畢出俟大夫與士皆然君於大夫疾三間之在殯三往焉士疾一問之在殯一往焉君弔則復殯服集説曰殯後主人已成服而君始來弔主人則還著殯時未成服之服蓋苴絰免布深衣也不散帶故小記云君弔雖不當免時也主人必免不散麻一則不敢謂君之弔後時又且以君來故新其禮也夫人弔於大夫士主人出迎於門外見馬首先入門右夫人入升堂即位主婦降自西階拜稽顙於下夫人視世子而踊奠如君至之禮夫人退主婦送於門內拜稽顙主人送於大門之外不拜集説曰夫人弔則主婦為喪主故主婦之待夫人猶主人之待君也世子夫人之世子也夫人來弔則世子在前道引其禮位如祝從君故夫人視世子而踊也主人送而不拜者喪無二主主婦已拜主人不當拜也大夫君不迎於門外入即位於堂下主人北面衆主人南面婦人即位於房中若有君命命夫命婦之命四鄰賔客其君後主人而拜集説曰大夫之臣亦以大夫為君故曰大夫君也言此大夫君之弔其臣喪也主人不迎於門外此君入而即堂下之位位在阼階下西向主人在其位之南而北面也婦人位在堂其君既來故並為位于東房中也然此言婦人即位房中非止大夫之君亦總正君來禮如此也不言大夫君之妻來者當同夫人禮也又前君臨大斂云主婦尸西不言辟者大斂哀深故不辟君今既殯後哀殺故辟也亦與前互也此大夫君來弔之時若有本國之君命或有國中大夫及命婦之命或鄰國卿大夫遣使來弔者此大夫君必代主人拜命及拜賔以喪用尊者主其禮故也然此君終不敢如國君専代為主必以主人在已後待此君拜竟主人復拜也君弔見尸柩而后踊注曰塗之後雖往不踊也疏曰案前文既殯君往視祝而踊殯後有踊者皇氏云雖殯未塗則得踊故注塗之後雖往不踊大夫士若君不戒而往不具殷奠君退必奠集説曰以君之來告於死者且以為榮也君大棺八寸屬六寸椑四寸上大夫大棺八寸屬六寸下大夫大棺六寸屬四寸士棺六寸注曰大棺棺之在表者也檀弓天子之棺四重水兕革棺被之其厚三寸杝棺一梓棺二四者皆周此以內説而出也然則大棺及屬用梓椑用杝以是差之上公革棺不被三重也諸侯無革棺再重也大夫無椑一重也士無屬不重也庶人之棺四寸上大夫謂列國之卿也趙簡子云不設屬椑時僭也君裏棺用朱緑用雜金鐕大夫裏棺用玄緑用牛骨鐕士不緑疏曰裏棺謂以繒貼棺裏也朱繒貼四方緑繒貼四角鐕釘也用金釘以琢朱緑著棺也大夫四面玄四角緑士不緑者悉用玄也亦用大夫牛骨鐕君蓋用漆三衽三束大夫蓋用漆二衽二束士蓋不用漆二衽二束集説曰蓋棺之蓋板也用漆謂以漆塗其合縫用衽處也衽束並説見檀弓君大夫鬊爪實于緑中士埋之集説曰鬊亂髮也爪手足之爪甲也生時積而不棄今死為小囊盛之而實于棺內之四隅故讀緑為角四角之處也士則以物盛而埋之耳君殯用輴欑至於上畢塗屋大夫殯以幬欑至於西序塗不暨於棺士殯見衽塗上帷之疏曰凡殯之禮天子先置龍輴於客位殯處乃從阼階舉棺於輴中輴外以木菆輴之四邊木高於棺乃從上加綃黼於棺上然後以木題湊題頭也湊向也謂以木頭相湊向內也象椁上之四注以覆之如屋形以泥塗之於屋之上又加席三重於殯上其諸侯則居棺以輴不畫龍加棺以布幕不題湊象椁雖不象椁亦中央高似屋形但不為四注故亦云畢塗屋也君諸侯也集説曰大夫之殯不用輴其棺一面貼西序之壁而欑其三面上不為屋形但以棺衣覆之幬覆也故言大夫殯以幬欑至於西序也塗不暨於棺者天子諸侯之欑木廣而去棺逺大夫欑狹而去棺近所塗者僅僅不及於棺而已士殯掘肂以容棺肂即坎也棺在肂中不沒其蓋縫用衽處猶在外而可見其衽以上亦用木覆而塗之帷幛也貴賤皆有帷故惟朝夕之哭乃褰舉其帷耳所以帷者鬼神尚幽暗故也熬君四種八筐大夫三種六筐士二種四筐加魚臘焉集説曰熬以火煼榖令熟也熟則香置之棺旁使蚍蜉聞香而來食免侵尸也四種黍稷稻粱也每種二筐三種黍稷粱二種黍稷也加魚與臘筐同異未聞石梁王氏曰棺旁用熬榖加魚臘不可從飾棺君龍帷三池疏曰君諸侯也帷栁車邊障以白布為之王侯皆畫為龍故曰君龍帷也池者織竹為籠衣以青布挂於栁上荒邊爪端象宫室承霤天子四注屋四面承霤栁亦四池諸侯屋亦四注而栁降一池闕後故三池也振容疏曰振容者振動容飾也以青黃之繒長丈餘如幡畫為雉懸於池下為容飾車行則幡動故曰振容也黼荒火三列黻三列疏曰荒蒙也栁車上覆謂鱉甲也緣荒邊為白黑斧文故云黼荒於黼文之上荒中央又畫為火三行故云火三列又畫兩已相背為三行故云黻三列素錦褚加偽荒疏曰素錦白錦也褚屋也荒下用白錦為屋象宫室也加帷荒者帷是邊牆荒是上蓋褚覆竟而加帷荒於褚外也纁紐六疏曰上蓋與邊牆相離故又以纁帛為紐連之兩旁各三凡六也齊五采五貝疏曰齊者臍之義以當中而言謂鱉甲上當中形圓如車之蓋高三尺徑二尺餘以五采繒衣之列行相次五貝者又連貝為五行交絡齊上也黼翣二黻翣二畫翣二皆戴圭疏曰翣形似扇木為之在路則障車入椁則障柩二畫黼二畫黻二畫雲氣六翣之兩角皆戴圭玉也魚躍拂池疏曰以銅魚懸於池之下車行則魚跳躍上拂於池魚在振容間也君纁戴六疏曰戴猶值也用纁帛繫棺紐著栁骨棺之橫束有三每一束兩邊各屈皮為紐三束則六鈕今穿纁戴於紐以繫栁骨故有六戴也纁披六疏曰亦用絳帛為之以一頭繫所連栁纁戴之中而出一頭於帷外人牽之每戴繫之故亦有六也謂之披者若牽車登高則引前以防軒車適下則引後以防翻車欹左則引右欹右則引左使不傾覆也大夫畫帷二池不振容畫荒火三列黻三列素錦褚纁紐二玄紐二齊三采三貝黻翣二畫翣二皆戴綏魚躍拂池大夫戴前纁後玄披亦如之集説曰畫帷畫為雲氣也二池一云兩邊各一一云前後各一畫荒亦畫為雲氣也齊三采絳黃黑也皆戴綏者不用圭用五采羽作蕤綴翣之兩角也披亦如之謂色及數悉與戴同也士布帷布荒一池揄絞纁紐二緇紐二齊三采一貝畫翣二皆戴綏士戴前纁後緇二披用纁集説曰布帷布荒皆白布不畫也一池在前揄搖翟也雉類青質五色絞青黃之繒也畫翟於絞繒在池上而池下無振容戴當棺束每束各在兩邊前頭二戴用纁後二用緇二披用纁者據一邊前後各一披故云二披若通兩邊言之亦四披也君葬用輴四綍二碑御棺用羽葆大夫葬用輴二綍二碑御棺用茅士葬用國車二綍無碑比出宫御棺用功布注曰大夫廢輴此言輴非也輴皆當為載以輇車之輇聲之誤也輇字或作團是以文誤為國輇車柩車也在棺曰綍行道曰引至壙將窆又曰綍而設碑是以連言之碑桓楹也御棺居前為節度也士言比出宫用功布則出宫而止至壙無矣疏曰君葬用輴大夫葬用輴此二輴皆當為載以輇車之輇輇則蜃車也在路載柩尊卑同用蜃車故知經云輴者非也羽葆以鳥羽注於柄末如蓋士無碑者手懸下之功布大功布也凡封用綍去碑負引君封以衡大夫士以咸君命毋譁以鼓封大夫命毋哭士哭者相止也疏曰下棺時將綍一頭繫棺緘又將一頭繞碑間鹿盧所引之人在碑外背碑而立負引者漸漸應鼓聲而下故云用綍去碑負引也以衡謂下棺時别以大木為衡貫穿棺束之緘平持而下傋傾頓也以咸者以綍直繫棺束之緘而下也命毋譁戒止其喧譁也以鼓封擊鼓為負引者縱捨之節也命毋哭戒止哭聲也士則衆哭者自相止而已集説曰三封字皆讀為窆謂下棺也君松椁大夫柏椁士雜木椁集説曰天子柏椁故諸侯以松盧云以松黃腸為椁庾云黃腸松心也大夫同於天子者卑逺不嫌僭也棺椁之間君容柷大夫容壺士容甒集説曰柷樂器形如桶壺漏水之器一説壺甒皆盛酒之器此言闊狹之度古者棺外椁內皆有藏器也君裏椁虞筐大夫不裏椁士不虞筐疏曰盧氏雖有解釋鄭云未聞今不録禮記述注卷十九
