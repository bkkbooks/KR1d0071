body:
  text: 禮記述註卷二十三安溪李光坡撰坊記第三十疏曰鄭云名坊記者以其記六藝之義所以坊人之失也子言之君子之道譬則坊與坊民之所不足者也大為之坊民猶踰之故君子禮以坊徳刑以防淫命以防欲疏曰此篇凡三十九章此下三十八章悉言子云惟此章稱子言之者以是諸章之首一篇總要故重之集説曰辟讀為譬坊與防同言君子以道防民之失猶以堤防遏水之流也應氏曰性之善為徳禮以防之而養其源情之蕩為淫刑以防之而遏其流民之欲無窮聖人有命之説焉使知命出於天各有分限而人力莫施以是防之則覬覦者塞羡慕者止而欲不得肆矣坡謂註云命謂教令可兼説盖君命即天命也子云小人貧斯約富斯驕約斯盜驕斯亂禮者因人之情而為之節文以為民坊者也故聖人之制富貴也使民富不足以驕貧不至於約貴不慊於上故亂益亡註曰此節文者謂農有田里之差士有爵命之級慊恨不滿之貌也疏曰制富者居室丈尺俎豆衣服之事須有法度不足至驕也制貧者農田百畆桑麻自贍比閭相賙不令至於約也貴者制其禄秩隨功爵而施則貴臣無復恨君禄爵薄於已也熊氏曰小人無道以安貧故氣慊而約無徳以守富故氣盈而驕約則覬覦心生故盜驕則犯上心生故亂此皆人之情也禮者因人情之過不及而為之節文以為民坊也子云貧而好樂富而好禮衆而以寧者天下其幾矣詩云民之貪亂寧為荼毒故制國不過千乗都城不過百雉家富不過百乗以此坊民諸侯猶有畔者註曰寧安也大族衆家恒多作亂古者方十里其中六十四井出兵車一乗此兵賦之法也成國之賦千乗雉度名也髙一丈長三丈為雉百雉為長三百丈方五百歩子男之城方五里百雉者此謂大都三國之一熊氏曰詩大雅桑柔之篇引之以明民為荼毒則貧必不好樂富必不好禮衆必不肯自寧也坡謂民豈不知亂之能荼毒人乎然其貪亂也寧為所荼毒而不恤此形民喜亂之心最為真至解者似少失之子云夫禮者所以章疑别微以為民坊者也故貴賤有等衣服有别朝廷有位則民有所讓集說曰疑者惑而未决微者隱而不明惟禮足以章明之分别之也熊氏曰貴賤上下之等衣服隆殺之别朝廷尊卑之位其間毫髪不可僭差之際正人之易惑事之難明者子云天無二日土無二王家無二主尊無二上示民有君臣之别也春秋不稱楚越之王䘮禮君不稱天大夫不稱君恐民之惑也詩云相彼盍旦尚猶患之註曰楚越之君僭號稱王不稱其䘮謂不書葬也春秋傳曰呉楚之君不書葬辟其僭號也臣者天君稱天子為天王稱諸侯不言天公辟王也大夫有臣者稱之曰主不言君辟諸侯也此者皆為使民疑惑不知孰者尊也盍旦夜鳴求旦之鳥也求不可得也人猶惡其欲反晝夜而亂晦明况於臣之僭君求不可得之類亂上下惑衆也子云君不與同姓同車與異姓同車不同服示民不嫌也以此坊民民猶得同姓以弑其君註曰同姓者謂先王先公子孫有繼及之道者也其非此則無嫌也僕右恒朝服君則各以時事唯在軍同服于子云君子辭貴不辭賤辭富不辭貧則亂益亡故君子與其使食浮於人也寧使人浮於食註曰食謂禄也在上曰浮禄勝已則近貪已勝禄則近㢘熊氏曰貴賤謂爵之尊卑貧富謂禄之厚薄亂爭奪也子云觴酒豆肉讓而受惡民猶犯齒衽席之上讓而坐下民猶犯貴朝廷之位讓而就賤民猶犯君詩云民之無良相怨一方受爵不讓至於已斯亡集說曰詩小雅角弓之篇爵酒器也嚴氏云兄弟有因杯酒得罪而怨者此為持平之論以解之言凡人之不善者其相怨各執一偏而不能参彼已之曲直故但知怨其上而不思已過然其端甚微或止因受爵失辭遜之節而或至於忘其身亦可念矣方氏曰禮六十以上籩豆有加故酒肉以犯齒言三命不齒席於尊東故衽席以犯貴言族人不得戚君位故朝廷以犯君言子云君子貴人而賤己先人而後己則民作讓故稱人之君曰君自稱其君曰寡君熊氏曰貴人而賤己如坐下就賤之類先人而後己如受惡之類此讓道也子云利禄先死者而後生者則民不偝先亡者而後存者則民可以託詩云先君之思以畜寡人以此坊民民猶偝死而號無告疏曰財利榮禄之事假令死之與生並合俱得君上則先與死者後與生者以此化民則民皆不偝於死者亡謂身為國事而出亡在外存謂身在國内若君有利禄先與在外亡者而後與國内存者以此化民民皆仁厚可以大事相付託也偝死而號無告者言民偝棄死者其生者老弱號呼無所控告也熊氏曰詩邶風燕燕之篇畜詩作朂勉也莊姜言歸妾戴媯思念先君莊公以婦道朂勉寡人夫思先君見不偝之意既歸而猶以此朂莊姜見其可託也子云有國家者貴人而賤禄則民興讓尚技而賤車則民興藝故君子約言小人先言註曰言人君貴尚賢者能者而不吝於班禄賜車服則讓道興賢者能者人所服也技猶藝也約言先言言人尚徳不尚言也約與先互言耳君子約則小人多矣小人先則君子後矣方氏曰上之所化如此不徒事乎空言而已故繼之以君子約言小人先言子云上酌民言則下天上施上不酌民言則犯也下不天上施則亂也故君子信讓以涖百姓則民之報禮重詩云先民有言詢于芻蕘集說曰上酌民言謂人君將施政教必斟酌参挹乎輿論之可否如此則政教所加民尊戴之如天所降下者矣信則不欺於民讓則不恃乎己以此臨民民得不親其上死其長乎故曰民之報禮重也詩大雅板之篇詢于芻蕘問於取草取薪之賤者也引此以明酌民言之意方氏曰上不酌民言則事或妄行而失其所守故曰則犯也下不天上施則民或肆慢而無以相治故曰亂也子云善則稱人過則稱己則民不爭善則稱人過則稱己則怨益亡詩云爾卜爾筮履無咎言坡謂此衛風氓之篇引之以見推善引過齋戒自省如卜筮然則所稱合禮無取咎之言矣此明所以不爭不怨之故至為深切何可易議也爾卜爾筮猶易言原筮子云善則稱人過則稱己則民讓善詩云考卜惟王度是鎬京惟龜正之武王成之集說曰詩大雅文王有聲之篇言稽考龜卜者武王也謀度鎬京之居盖武王之志已先定矣及以吉凶取正於龜而龜亦協從武王遂以龜為正而成此都焉是武王不自以為功而讓之龜卜也故引以為讓善之證子云善則稱君過則稱己則民作忠君陳曰爾有嘉謀嘉猷入告爾君于内女乃順之于外曰此謀此猷惟我君之徳於乎是惟良顯哉註曰君陳盖周公之子伯禽弟也疏曰知周公子者以書序云周公既没命君陳分正東郊成周似若蔡仲之命書序云蔡叔既卒王命蔡仲踐諸侯位相似皆是父卒命子故疑周公子子云善則稱親過則稱己則民作孝大誓曰子克紂非子武惟朕文考無罪紂克予非朕文考有罪惟子小子無良子云君子弛其親之過而敬其美論語曰三年無改於父之道可謂孝矣髙宗云三年其惟不言言乃讙註曰弛猶棄忘也方氏曰子為父隱所謂弛其過也善則稱親所謂敬其美也熊氏曰引書借不言二字為諱親之過以明弛過之意子云從命不忿微諫不倦勞而不怨可謂孝矣詩云孝子不匱集說曰從命不忿謂承受父母命令之時不可有忿戾之色詩大雅既醉之篇言孝子事親無乏止之時坡謂受命不從者何足校其忿不忿惟是從者則知愛矣然或非己所欲或有不均獨賢之意雖從命而幾㣲介於顔面是忿己則與不從者亦五十百歩之間耳子云睦於父母之黨可謂孝矣故君子因睦以合族詩云此令兄弟綽綽有裕不令兄弟交相為瘉註曰睦厚也黨猶親也合族謂與族人燕與族人食令善也綽綽寛裕貌也交猶更瘉病也熊氏曰綽綽有裕能睦之証交相為瘉不能睦之証子云於父之執可以乗其車不可以衣其衣君子以廣孝也註曰父之執與父執志同者也可以乗其車車於身差逺也謂與已位等疏曰若尊卑懸絶假非執友不可傳通車服故知與已位等但是父執故不可衣其衣也子云小人皆能養其親君子不敬何以辨子云父子不同位以厚敬也書云厥辟不辟忝厥祖註曰同位尊卑等為其相䙝厥其也辟君也忝辱也為君不君與臣子相䙝則辱先祖矣君父之道宜尊嚴子云父母在不稱老言孝不言慈閨門之内戲而不歎君子以此防民民猶薄於孝而厚於慈集說曰曲禮云恒言不稱老與此意同孝所以事親慈所以畜子言孝不言慈者慮其厚於子而薄於親故也可以娯人而使之樂者戲也可以感人而使之傷者歎也閨門之内謂父母之側戲而不歎非專事於戲也謂為孺子之容止或足以娯親猶云可爾恨歎之聲則傷親故不為也子云長民者朝廷敬老則民作孝註曰長民謂天子諸侯也子云祭祀之有尸也宗廟之有主也示民有事也修宗廟敬祭事教民追孝也以此坊民民猶忘其親註曰有事有所尊事方氏曰為親之死故為尸以象其生為神之亡故為主以寓其存經曰事死如事生事亡如事存此所言示民有事也追孝與祭統言追養繼孝同義子云敬則用祭器故君子不以菲廢禮不以美没禮故食禮主人親饋則客祭主人不親饋則客不祭故君子苟無禮雖美不食焉易曰東鄰殺牛不如西鄰之禴祭實受其福詩云既醉以酒既飽以徳以此示民民猶爭利而忘義註曰祭器籩豆簋鉶之屬也有敬事於賔客則用之謂饗食也盤盂之屬謂燕器疏曰菲薄也言君子不以貧窶菲薄廢禮不行没過也不可以財物豐多華美其事没過於禮也易既濟九五爻辭詩大雅既醉之篇方氏曰食者利之所存禮則義之所出故言爭利以忘義子云七日戒三日齋承一入焉以為尸過之者趨走以教敬也醴酒在室醍酒在堂澄酒在下示民不淫也尸飲三衆賓飲一示民有上下也因其酒肉聚其宗族以教民睦也故堂上觀乎室堂下觀乎上詩云禮儀卒度笑語卒獲集說曰戒謂散齋也承奉事之也醴齊醍齊澄酒此三酒味薄者在上味厚者在下貴薄而賤厚是示民以不貪淫於味也尸飲三主人主婦賔長各一獻也然後主人獻賓是衆賓飲一也尊上者得酒多卑下者少是示民以上下之等也因其祭祀之酒肉於祭禮之末序昭穆相獻酬此以和睦之道教民也祭祀之時堂上者觀室中之禮儀堂下者又觀堂上之禮儀其容有不肅者乎詩小雅楚茨之篇卒盡也言禮儀盡合於法度笑語盡得其宜也子云賓禮每進以讓䘮禮每加以逺浴於中霤飯於牖下小歛於户内大歛於阼殯於客位祖於庭葬於墓所以示逺也殷人弔於壙周人弔於家示民不偝也子云死民之卒事也吾從周以此坊民諸侯猶有薨而不葬者註曰逺之所以崇敬也疏曰鄉飲酒禮主人迎賔至門三辭至階三讓皆主人先入先登是賓禮每進以讓也殷人即壙上而弔於送死太簡周人孝子反哭至家乃後始弔於送死殷勤是情禮備具故云吾從周子云升自客階受弔於賓位教民追孝也未沒䘮不稱君示民不爭也故魯春秋記晉䘮曰殺其君之子奚齊及其君卓以此坊民子猶有弑其父者註曰謂反哭時也既葬矣猶不由阼階不忍即父位也沒終也春秋傳曰諸侯於其封内三年稱子至其臣子踰年則謂之君矣奚齊與卓子皆獻公之子也獻公卒其年奚齊殺明年而卓子殺矣子云孝以事君弟以事長示民不貳也故君子有君不謀仕唯卜之日稱二君集說曰推事父之道以事君推事兄之道以事長皆誠實之至豈敢有副貳其上之心乎欲貳其君是與尊者相敵矣故云示民不貳也君子人君之子也有君君在也不謀仕嫌欲急於為政也世子他事皆不得稱君貳惟命龜之時或君有故而已代之則自稱曰君之貳其左傳卜貳圉正謂君之貳故鄭引之云二當為貳也䘮父三年䘮君三年示民不疑也疏曰君無骨肉之親若不為重服民則疑君不尊今與䘮父同示民不疑於君之尊也父母在不敢有其身不敢私其財示民有上下也集說曰與曲禮不許友以死不有私財意同有上下謂卑當統於尊也故天子四海之内無客禮莫敢為主焉故君適其臣升自阼階即位於堂示民不敢有其室也父母在饋獻不及車馬示民不敢専也以此坊民民猶忘其親而貳其君集說曰自此遺彼曰饋自下獻上曰獻車馬家物之至重者以上四節皆明事君事親之道故總結之曰忘其親而貳其君子云禮之先幣帛也欲民之先事而後樂也先財而後禮則民利無辭而行情則民爭故君子於有饋者弗能見則不視其饋易曰不耕穫不菑畬凶以此坊民民猶貴禄而賤行集說曰禮之先幣帛謂先行相見之禮後用幣帛以致其情也此是欲教民以先任事而後得禄之義若先用財而後行禮則民必貪於財利矣無辭無辭讓之節也行情直行已情也禮畧而利行不能無爭奪矣人有饋遺於已禮也已或以他故或以疾病不能出見其人則不視其饋視猶納也此盖不敢以無禮而當人之禮易无妄六二爻辭今文無凶字田一嵗曰菑三嵗曰畬不耕而穫不菑而畬以喻人臣無功而食君之禄引之以證不行禮而貪利也子云君子不盡利以遺民詩云彼有遺秉此有不斂穧伊寡婦之利故君子仕則不稼田則不漁食時不力珍大夫不坐羊士不坐犬詩云采葑采菲無以下體徳音莫違及爾同死以此坊民民猶忘義而爭利以忘其身疏曰此邶風谷風之篇葑蔓菁也菲草生下濕地似蕪菁花紫赤色可食記者引詩斷章為義凡有二意一則云采此葑菲但采其葉下體之根莖雖美不可并取則是不盡取其利當遺與於下二則云采其葑菲無以下體之惡并棄其葉據下體有苦惡之時作記者據其根善則無得并取其根無盡利也據其根惡則無得并棄其葉不求備也集說曰詩小雅大田之篇秉禾之束為把者穧鋪而未束者言彼處有遺餘之秉把此處有不収斂之鋪穧寡婦之不能耕者取之以為利耳伊語辭與今詩文顛倒不同仕則不稼禄足以代耕也田則不漁有禽獸不可再取魚龞也食時言人君食四時之膳也不力珍不更用力務求珍羞也坐羊坐犬殺食而坐其皮也皆言不盡利之道子云夫禮坊民所淫章民之别使民無嫌以為民紀者也故男女無媒不交無幣不相見恐男女之無别也詩云伐柯如之何匪斧不克取妻如之何匪媒不得藝麻如之何横從其畆取妻如之何必告父母以此坊民民猶有自獻其身註曰淫猶貪也章明也嫌嫌疑也重男女之㑹所以逺别之於禽獸也有幣者必有媒有媒者不必有幣仲春之月㑹男女之時不必待幣獻猶進也伐柯伐木以為柯也藝亦樹也言取妻之法必有媒如代柯之必須斧也取妻之道必告父母如樹麻當先易治其田疏曰自此以下終於篇末總坊男女奔淫之事夫婦重慎之義也所淫所貪欲之事非直淫泆也若其淫泆則當云防民淫不須云所也章民之别明民之男女令相分别也自獻其身謂女自進其身以求男者也集說曰詩齊風南山之篇以此坊民以下十一字舊本在詩云之上令以類推之當在所引詩下子云取妻不取同姓以厚别也故買妾不知其姓則卜之以此坊民魯春秋猶去夫人之姓曰呉其死曰孟子卒集說曰厚别厚其有别之禮也卜之卜其吉凶也呉泰伯之後魯同姓也昭公取呉女又見論語坡謂雜記云夫人之不命於天子自魯昭公始則孟子原非夫人昭公稱之為孟子春秋書曰孟子卒所謂我無加損焉正名而已三傳皆以諱言坡所未詳子云禮非祭男女不交爵以此坊民陽侯猶殺繆侯而竊其夫人故大饗廢夫人之禮註曰交爵謂相獻酢陽侯繆侯同姓也其國未聞大饗饗諸侯來朝者也夫人之禮使人攝疏曰特牲主婦獻尸尸酢主婦是祭時交爵也陽侯繆侯是两君之諡按王享諸侯及諸侯自相享同姓則后夫人親獻異姓則使人攝獻則繆侯所享盖同姓也以此言之陽侯以前夫人出享鄰國之君得有男女交爵此後夫人獻禮遂廢並使人攝也坡謂此節語意似古者祭與賓皆有男女交爵之事今享禮已廢惟祭尚然故子但云非祭男女不交爵其餘不交灼然可知子云寡婦之子不有見焉則弗友也君子以辟逺也故朋友之交主人不在不有大故則不入其門以此坊民民猶以色厚於徳註曰有見謂覩其才藝也同志為友大故䘮病集說曰辟逺者以避嫌故逺之也子云好徳如好色註曰此句似不足論語曰未見好徳如好色疾時人厚與色之甚而薄於徳也諸侯不下漁色故君子逺色以為民紀故男女授受不親御婦人則進左手姑姊妹女子子已嫁而反男子不與同席而坐寡婦不夜哭婦人疾問之不問其疾以此坊民民猶淫佚而亂於族註曰不漁色謂不内取於國中也内取國中為下漁色昏禮始納采謂采擇其可者也國君而内取象捕魚然中網取之是無所擇亂族犯非妃匹也集說曰荒於色則紀綱弛民之昏禮亦化之而廢故逺色者所以立民之紀使不以色而廢禮亂常也餘並見前子云昏禮婿親迎見於舅姑舅姑承子以授婿恐事之違也以此坊民婦猶有不至者集說曰舅姑女之父毋也承進也子女也論語註云送與之也儀禮父戒女曰夙夜無違命母戒女曰無違宫事皆恐事之違也末世禮壞故有男行而女不隨者亦有親迎而女不至者成氏曰婦人謂夫之父母曰舅姑男子亦謂妻之父母曰舅姑但加外字耳夫婦齊體父母互相敬也中庸第三十一疏曰鄭目録云孔子之孫子思伋作之以昭明聖祖之徳朱子章句表記第三十二疏曰鄭云名曰表記者以其記君子之徳見於儀表者也子言之歸乎君子隱而顯不矜而莊不厲而威不言而信方氏曰此篇稱子言之者八皆總其大同之畧也稱子曰者四十五皆列其小異之詳也熊氏曰夫子周流志在行道至晚知道不行故發歸乎之嘆盖君子身雖隱而道未嘗不顯著如不必矜持而容自莊不必嚴厲而色自威不必言語而信自存此皆道之彰明較著不待仕而後可見也此吾所以當歸也子曰君子不失足於人不失色於人不失口於人是故君子貌足畏也色足憚也言足信也甫刑曰敬忌而罔有擇言在躬註曰忌之言戒也言已外敬而心戒慎則無有可擇之言加於身也疏曰甫刑吕刑也甫侯為穆王說刑故稱甫刑劉氏曰君子謹獨不待矜而莊故不失足於人而貌足畏不待厲而威故不失色於人而色足憚不待言而信故不失口於人而言足信也盖其㝷常敬忌故動處無不中節如此又引書以證之而義益顯矣子曰裼襲之不相因也欲民之毋相瀆也註曰不相因者以其或以裼為敬或以襲為敬禮盛者以襲為敬執王龜之屬也禮不盛者以裼為敬受享是也應氏曰裼襲以示文質各有異宜所謂不相因者恐一時或有異事必易服從事各存其敬不以襲衣而因為裼不以裼衣而因為襲盖節文既辨而又不憚其勞則無相䙝之患子曰祭極敬不繼之以樂朝極辨不繼之以倦吕氏曰極敬者誠意至也苟至於樂則敬弛極辨者節文明也苟至於倦則入於苟簡子曰君子慎以辟禍篤以不揜恭以逺恥註曰篤厚也揜猶困廹也熊氏曰慎以處事言篤以立身言恭以待人言坡謂篤實行道險夷一致不可困廹非光輝之謂也子曰君子莊敬日强安肆日偷君子不以一日使其躬儳焉如不終日註曰儳焉可輕賤之貌也如不終日言人而無禮死無時熊氏曰莊敬則精神簡束而日進故强安肆則志意消阻而日退故偷是以君子不敢一日不敬使中心無主而紛紜雜亂若不能以終日也儳参錯不齊貌坡謂如註之解鞭廹可畏所當共省者子曰齊戒以事鬼神擇日月以見君恐民之不敬也集說曰幽明之交上下之際尤其所當敬者故並言之子曰狎侮死焉而不畏也馬氏曰狎侮至於死而不畏者蔽其所䙝也子曰無辭不相接也無禮不相見也欲民之毋相䙝也易曰初筮告再三瀆瀆則不告集說曰易蒙卦辭謂凡占者初筮則誠敬必全若以明而治蒙必其學者如初筮之誠則當告之若如再筮三筮之瀆慢則不必告之矣引此以言賓主之交際當慎始敬終如初筮之誠不可如再三筮之瀆慢也吕氏曰辭者相接之言如公與客宴曰寡人有不腆之酒以請吾子之與寡人須臾焉使某也以請之類是也禮者相見之摯如羔雁雉騖之類是也必以辭必以禮者交際不可苟也苟則䙝䙝則不敬此交所以易踈也子言之仁者天下之表也義者天下之制也報者天下之利也註曰報謂禮也禮尚往來應氏曰仁之體大而尊昭揭衆善而人心儼然知所敬故曰表義之體方而嚴裁割事物而人心凛然知所畏故曰制報之為禮以交際往來彼感此應使人有文以相接有恩以相愛其何利如之子曰以徳報徳則民有所勸以怨報怨則民有所懲詩曰無言不讎無徳不報太甲曰民非后無能胥以寧后非民無以辟四方子曰以徳報怨則寛身之仁也以怨報徳則刑戮之民也註曰讎猶答也寛猶愛也愛身以息怨非禮之正也熊氏曰民非后無能胥以寧是君有安民之徳民之事君所以報也后非民無以辟四方是民有戴君之徳君之治民所以報之也引之亦明報徳意坡謂論語子曰以直報怨以徳報徳夫以直報怨必有不徳者矣以徳報徳必有不直者矣聖人之言交互觀之委曲皆盡然渾然沖和此似少露矣子曰無欲而好仁者無畏而惡不仁者天下一人而已矣是故君子議道自己而置法以民吕氏曰安仁者天下一人而已則非聖人不足以性仁苟志於仁矣無惡也則衆人皆可以為仁以聖人所性而議道則道無不盡以衆人之可為而制法則法無不行方氏曰欲而好仁則智者利仁之事也畏而惡不仁則畏罪者强仁之事也若所好生於無欲所惡生於無畏非中心安仁者不能故曰天下一人而已子曰仁有三與仁同功而異情與仁同功其仁未可知也與仁同過然後其仁可知也仁者安仁知者利仁畏罪者强仁仁者右也道者左也仁者人也道者義也厚於仁者薄於義親而不尊厚於義者薄於仁尊而不親疏曰仁者右也道者左也此明仁義相須若手之左右吕氏曰桓公九合諸侯一匡天下雖湯武之舉不過乎是而其情則不同故其仁未可知也過者人所避有不幸而致焉周公使管叔以殷畔過於愛兄而已孔子對陳司敗以昭公知禮過於諱君而已皆出乎情而其仁可知也道非仁不立義非仁不行凡人之舉動必右先而後左隨之故曰仁右道左坡謂均之為仁所謂同功也或安之或利之或强之所謂異情也畏罪者强仁乃畏威寡罪是困勉之功非五霸之假也仁者右也以下乃教為仁者以仁必有義則或功或過皆得其情而無厚與薄之偏矣道有至義有考至道以王義道以霸考道以為無失註曰此讀當言道有至有義有考字脫一有耳應氏曰至道即仁也至道渾而無迹故得其渾全精粹以為王義道嚴而有方故得其裁割斷制以為霸盡稽考之道而事不輕舉焉亦可以無失矣坡謂王天子霸牧伯也義道以霸言牧伯奉義而行耳宋元末儒一見霸字如虎狼然何也子言之仁有數義有長短小大中心憯怛愛人之仁也率法而强之資仁者也詩云豐水有芑武王豈不仕詒厥孫謀以燕翼子武王烝哉數世之仁也國風曰我今不閲皇恤我後終身之仁也集說曰仁有數言行仁之道非止一端如下文安勉之别是也義有長短小大言義無定體在隨事而制其宜也如仕止久速各當其可之類中心憯怛此胞與為懷故為愛人之仁率循古人之成法而勉强行之此資藉古之仁道以為仁者也詩大雅文王有聲之篇言豐水之傍以潤澤生芑榖喻養成人才也武王豈不官使之乎言無遺才也聖人為後嗣計莫大於遺之以人才是欲傳其孫之謀而燕安翼輔其子耳夫子以為數世之仁盖中心憯怛所發者深故所及者逺也國風邶風谷風之篇今詩作躬閲容也言我身且不見容何暇憂後事乎此但欲以仁終其身而已耳盖勉强資仁所發者淺故所及者近也子曰仁之為器重其為道逺舉者莫能勝也行者莫能致也取數多者仁也夫勉於仁者不亦難乎是故君子以義度人則難為人以人望人則賢者可知已矣註曰取數多言計天下之道仁居其多以人望人言當以時人相比方耳熊氏曰統四端兼萬善故曰重生而即其死而後已故曰逺惟重則舉莫能勝惟逺則行者莫能致此可見仁之取數極多夫人欲勉於仁而全體不息誠難也勝重致逺義之當然也君子以義之盡者度人必欲其勝重致逺則難為人惟舉今之人以相望則一得亦可表見賢者可得而知矣子曰中心安仁者天下一人而已矣大雅曰徳輶如毛民鮮克舉之我儀圖之惟仲山甫舉之愛莫助之小雅曰髙山仰止景行行止子曰詩之好仁如此鄉道而行中道而廢忘身之老也不知年數之不足也俛焉日有孳孳斃而後已集說曰大雅烝民之篇言徳之在人其輕如毛非難能也而民少能舉之者尹吉甫於儀匹之中圖謀之求其能舉徳者乃惟仲山甫能舉之我愛其人使其或有不及我思效忠以助之而山甫全徳無可以致其助者也小雅車牽之篇言有髙山則人瞻望而仰之有景大之徳行則人視法而行之二止字皆語辭夫子引此两詩而贊之曰詩人之好仁如此哉中道而廢言力竭而止若非力竭則不止也不足少也人老則未來之嵗月少矣俛焉無他顧之意孳孶勤勉之貌斃死也應氏曰前章言仁重且逺而人不可以全責此又總敘而勸勉之子曰仁之難成久矣人人失其所好故仁者之過易辭也子曰恭近禮儉近仁信近情敬讓以行此雖有過其不甚矣夫恭寡過情可信儉易容也以此失之者不亦鮮乎詩曰温温恭人維徳之基註曰辭解說也疏曰儉近仁者以儉不費用無害於物故近仁也情可信者以情示人故可信也儉易容者儉則寡求故易容也方氏曰能好仁則得其所好矣以其反此而失其所好仁所以難成與苟好仁矣雖有過易辭也况無過乎周公孔子之過是也情誠實之理子曰仁之難成久矣唯君子能之是故君子不以其所能者病人不以人之所不能者愧人是故聖人之制行也不制以已使民有所勸勉愧恥以行其言禮以節之信以結之容貌以文之衣服以移之朋友以極之欲民之有壹也小雅曰不愧於人不畏于天註曰以中人為制則賢者勸勉不及者愧恥聖人之言乃行也壹謂專心於善不愧于人不畏于天言人有所行當慙怖於天人也熊氏曰制行立教以制民行也禮以品節其為人之行信以固結其為人之志使養其内也習容貌之度使文其身教衣服之章使稱其徳以養於外也又使交朋切磋相成以造於極至之地總之使不惑於他岐而志專一於仁也移讀為稱詩小雅何人斯之篇是故君子服其服則文以君子之容有其容則文以君子之辭遂其辭則實以君子之徳是故君子恥服其服而無其容恥有其容而無其辭恥有其辭而無其徳恥有其徳而無其行是故君子衰絰則有哀色端冕則有敬色甲胄則有不可辱之色詩云維鵜在梁不濡其翼彼記之子不稱其服集說曰此承上文容貌衣服而言欲有其徳行以實之也徳謂得之於已行謂見之於事詩曹風候人之篇鵜鵜鶘也俗名淘河鵜鶘當入水中食魚今乃在魚梁之上竊人之魚以食未嘗濡濕其翼如小人居髙位以竊禄而不稱其服也坡謂文以君子之辭信也實以君子之徳禮也哀色敬色不可辱之色雖以容言然施之各當其時則禮也出之實而不偽則信也子言之君子之所謂義者貴賤皆有事於天下天子親耕粢盛秬鬯以事上帝故諸侯勤以輔事於天子疏曰小宰註云天地大神至尊不祼此祭上帝有秬鬯者凡鬯有二若和之以鬰謂之鬱鬯祭宗廟而灌也若不和鬱謂之秬鬯謂五齊之酒以秬黍為之故得以事上帝應氏曰義者截然正方而無偏私也知賤之事貴而不知貴之率賤豈絜矩之道哉故天子竭力致敬以事乎上帝則諸侯亦服勤以輔乎天子也子曰下之事上也雖有庇民之大徳不敢有君民之心仁之厚也是故君子恭儉以求役仁信讓以求役禮不自尚其事不自尊其身儉於位而寡於欲讓於賢卑已而尊人小心而畏義求以事君得之自是不得自是以聽天命詩云莫莫葛藟施于條枚凱弟君子求福不囘其舜禹文王周公之謂與有君民之大徳有事君之小心詩云惟此文王小心翼翼昭事上帝聿懐多福厥徳不囘以受方國註曰無君民之心是思不出其位役之言為也自是以聽天命言不易道徼利禄也凱樂也弟易也言樂易之君子其求福修徳以俟之不為囘邪之行要之如葛藟之延蔓于條枚是其性也疏曰自是言不問得之與失恒行其是而不行非也詩大雅旱麓之篇詩言葛藟施于條枚猶如子孫之興亦由先祖而徳盛也引詩斷章故與詩文不同舜禹文王周公是凱弟君子有大徳而小心常能畏懼是不囘也熊氏曰又引大雅大明之篇以明文王有事君之小心也觀此則舜禹周公可知矣坡謂不自尚二句言恭也儉於位一句言儉也讓於賢三句言讓也求以事君四句言信也盖不易道信也無所為而為亦信也子曰先王諡以尊名節以壹惠恥名之浮於行也是故君子不自大其事不自尚其功以求處情過行弗率以求處厚彰人之善而美人之功以求下賢是故君子雖自卑而民敬尊之子曰后稷天下之為烈也豈一手一足哉惟欲行之浮於名也故自謂便人註曰烈業也言后稷造稼穡天下世以為業豈一手一足喻用之者多無數也自謂便人亦言其謙也辟仁聖之名云自便習於此事之人耳集說曰諡以尊名為美諡以尊顯其聲名也壹專也惠善也善行雖多但節取其大者以專其善故曰節以壹惠也以求處情謂君子所以不自大尚其事功者以求處情實不肯虚為矯飾也過行弗率以求處厚者謂若有過髙之行則不敢率循惟求以處乎篤厚之道而已本分上不可加毫末也子言之君子之所謂仁者其難乎詩云凱弟君子民之父母凱以强教之弟以說安之樂而毋荒有禮而親威莊而安孝慈而敬使民有父之尊有母之親如此而后可以為民之父母非至徳其孰能如此乎熊氏曰君子謂仁以盡君道者其難乎觀詩而知凱以强教之謂驅之以道而不徇乎情也弟以說安之謂撫之以恩而不拂乎心也使民和樂而又有節曰毋荒使民有禮而情不離曰親威莊以臨之而不過於拘檢則安孝慈以事親使衆而不流於狎玩則敬盖樂而無荒孝慈而敬是弟而濟之以凱强教也使民有父道之可尊也有禮而親威莊而安是凱而濟之以弟說安也使民有母道之可親也則民亦尊之親之可以為民父母矣君子之所謂仁者如此非至徳渾全不偏其孰能施而為仁凱弟兼全乎今父之親子也親賢而下無能母之親子也賢則親之無能則憐之母親而不尊父尊而不親水之於民也親而不尊火尊而不親土之於民也親而不尊天尊而不親命之於民也親而不尊鬼尊而不親註曰命謂四時政令所以教民勤事也鬼謂四時祭祀所以訓民事君也疏曰四時教命欲人生厚是親也附近於民使民勤事是不尊神道嚴敬是尊也人神道隔無形可見是不親也子曰夏道尊命事鬼敬神而逺之近人而忠焉先禄而後威先賞而後罰親而不尊其民之敝憃而愚喬而野樸而不文殷人尊神率民以事神先鬼而後禮先罰而後賞尊而不親其民之敝蕩而不靜勝而無恥周人尊禮尚施事鬼敬神而逺之近人而忠焉其賞罰用爵列親而不尊其民之敝利而巧文而不慙賊而蔽註曰憃而愚喬而野樸而不文以本不困於刑罰少詐諼也敝謂政教衰失之時也先鬼後禮謂内宗廟外朝廷也禮者君臣朝㑹凡以摯交接相施予蕩而不静勝而無恥以本習於鬼神虛無之事令其心放蕩無所定困於刑罰苟勝免而無恥也集説曰其賞罰以爵列之髙下為準如車服土田之賞有命數之異刑罰之施有八辟之議及命夫命婦不躬坐獄訟之類皆是也熊氏曰此言三代偏於尊親而敝於末流也尊命重命令而不輕瀆近人而忠言每事體乎人情而為忠厚之道也利而巧便利多機巧也文而不慚多文辭而無愧心也坡謂以煩文縟節相督責而昧於情理之宜賊而蔽言文之末失也切中矣子曰夏道未瀆辭不求備不大望於民民未厭其親殷人未瀆禮而求備於民周人强民未瀆神而賞爵刑罰窮矣註曰不求備不大望言其政寛貢賦輕也强民言承殷難變之敝也爵賞刑罰窮矣言其繁文備設疏曰未瀆禮言君臣上下於禮事簡略不䙝瀆也集說曰未瀆辭以其尊命也未瀆禮以其後禮也未瀆神以其敬神而逺之也不求備不大望於民即省刑罰薄稅斂之事未厭其親尊君親上之心自不能忘也言夏之民未厭其親則殷周之民不然矣强民言殷民不服而成王周公化之之難也賞爵刑罰之制至周而詳悉備具無以復加故曰窮矣窮極也子曰虞夏之道寡怨於民殷周之道不勝其敝子曰虞夏之質殷用之文至矣虞夏之文不勝其質殷周之質不勝其文集說曰前章言夏商周之事此又兼言虞氏以起下章子言之曰後世雖有作者虞帝弗可及也已矣君天下生無私死不厚其子子民如父母有憯怛之愛有忠利之教親而尊安而敬威而愛富而有禮惠而能散其君子尊仁畏義恥費輕實忠而不犯義而順文而靜寛而有辨甫刑曰徳威惟威徳明惟明非虞帝其孰能如此乎吕氏曰憯怛之愛猶慈母之愛非責報於其子也非要譽於他人也發於誠心而已忠利之教者若使契為司徒教以人倫作為衣裳至書契之等使天下利用而不倦是皆有教人以善之誠無所不利之功者也應氏曰生無私有天下而不與也死不厚其子傳諸賢而為天下得人也其君子化之皆為全徳尊仁畏義不敢犯天下之公理恥費輕實不敢徇一已之私欲恥費者儉於自奉也輕財者薄於言利也自庇民大徳而下凡三章言臣道之難於盡仁惟舜禹文王周公可以為仁之厚而后稷庶幾近之自凱弟君子而下凡四章言君道之難於盡仁惟虞帝可以為徳之至而夏商周皆未免有所偏也熊氏曰愛曰憯怛則子民如母而親教曰忠利則子民如父而尊在身則從容自適而安又敬而不至自肆嚴肅難犯而威又愛而不至寡恩及民則富之又有禮而不驕侈惠之而又能遍利於四海坡謂尊仁畏義二句以行已言忠而不犯二句以事君言文理也靜不露也燦然有理而不露圭角寛以容衆而親䟽賢否有辨此二句以處事接物言也子言之事君先資其言拜自獻其身以成其信是故君有責於其臣臣有死於其言故其受禄不誣受罪益寡應氏曰資慿藉也古之為臣其經世之學皆豫定於胸中至於事君則前定之規模先形於言以為藉然後自獻其身以成其信自獻者非屈已以求售也如書之自靖自獻致命而無所愧也畎畝幡然之數語說命對揚之三篇此伊傅先資之言也齊桓問答而為書燕昭命下而有對此管樂先資之言也言於先而信於後無一不酬者後世若登壇東向之答草廬三顧之䇿亦庶幾焉馬氏曰受禄不誣言不素餐也子曰事君大言入則望大利小言入則望小利故君子不以小言受大禄不以大言受小禄易曰不家食吉集說曰不家食吉大畜之彖辭也謂大畜之君子才徳所藴者大則當食禄於朝以有為於天下而不食於家則吉此言不以大言受小禄所謂達可行於天下而後行之者也吕氏曰大言所言者大也小言所言小也利及天下澤及萬世大利也進一介之善治一官之事小利也諫行言聽利斯從之矣不以小言受大禄不以大言受小禄者受之有義亦稱其大小而已小言而大禄則報踰其分大言而小禄則君重財而薄徳亦不可受也子曰事君不下達不尚辭非其人弗自小雅曰靖共爾位正直是與神之聽之式榖以女吕氏曰以下達之事事其君則賊其君者也非其人而自達之枉己以事君者也三者皆不正非所謂靖共正直者也集說曰下達謂趨乎汙下如曰吾君不能是也尚辭利口㨗給也自所由以進者也小雅小明之篇言人臣能安靖恭敬其職位惟正直之道是與則神明聽之將用福禄與汝矣以與也子曰事君逺而諫則讇也近而不諌則尸利也子曰邇臣守和宰正百官大臣慮四方註曰尸謂不知人事無辭讓也疏曰言親近之臣獻可替否毗輔贊助於君守其調和之事也吕氏曰陵節犯分以求自達故曰讇懷禄固寵主於為利故曰尸利也應氏曰宰以職言大臣以位言自三公以下皆是不特六卿其序則先君徳而後朝廷先朝廷而後天下也子曰事君欲諌不欲陳詩云心乎愛矣瑕不謂矣中心藏之何日忘之集說曰諫者止君之失陳者揚君之失也詩小雅隰桑之篇瑕詩作遐本謂我心愛慕此賢者思相與語以其相去遐逺故不得共語然欲發之言藏於我心何日而忘之乎此記者借以為喻言我有愛君之心欲諌其過胡不言乎縱未得進諌亦藏於心而不忘但不以語他人耳子曰事君難進而易退則位有序易進而難退則亂也故君子三揖而進一辭而退以逺亂也吕氏曰君信我可以為師非學焉而後臣之則不進也信我可以執國政雖待以季孟之間亦不進也膰肉不至而即行靈公問陳而即行君子之道正君而己枉己者未有能直人者也人之相見三揖至於階三讓以賓升而其退也一辭而出主人拜送賓去不顧若主人之敬未至而强進主人之意已懈而不辭則賓主之分亂矣可仕可已可見可辭進退之義一也坡謂難進不枉已易退不苟容也有序者不枉已則非躁進有序也不苟容則長㢘逺恥避賢者路亦有序也亂者反是子曰事君三違而不出境則利禄也人雖曰不要吾弗信也註曰違猶去也利禄言為貪禄留也臣以道去君至於三而不遂去是貪禄必以其强與君要也吕氏曰孔子去魯遲遲吾行以不忍於父母之國也孟子去齊三宿出晝冀齊王之悔悟也然卒出竟以去君子之義可見矣子曰事君慎始而敬終子曰事君可貴可賤可富可貧可生可殺而不可使為亂註曰慎始敬終者輕交易絶君子所恥馬氏曰在物者有命故可貴可賤可生可殺在已者有義不可使為亂也子曰事君軍旅不辟難朝廷不辭賤處其位而不履其事則亂也故君使其臣得志則慎慮而從之否則孰慮而從之終事而退臣之厚也易曰不事王侯髙尚其事疏曰得志謂君使臣當已才猶宜慎慮而從之必使成功也否謂所使之事非已本才也雖非已本才而幸得終竟竟即辭而退也臣之厚者得志及否並從而無違是臣行之篤厚也吕氏曰亂者辟難辭賤不履其事則事不治而亂也臣受君命雖有所合不敢以得志而自滿故慎慮而從之乃臨事而懼好謀而成者也有所不合又非所宜辭亦不敢怨於不得志故孰慮而從之卒事則致為臣而去故可以自免而不累於上故曰臣之厚也易蠱之上九事之終且無位也有似乎仕焉而已者故曰不事王侯乃可以髙尚其事而不見役於人也子曰唯天子受命於天士受命於君故君命順則臣有順命君命逆則臣有逆命詩曰鵲之姜姜鶉之賁賁人之無良我以為君集說曰詩衛風鶉之奔奔篇嚴氏曰鶉之奔奔然鬭者不亂其匹也鵲之疆疆然剛者不淫其匹也刺宣姜與公子頑非匹耦也人之不善者我乃以為小君乎吕氏曰天道無私莫非理義君所以代天而治者推天之理義以治斯人而已天秩天敘天命天討莫非天也臣之受命於君者命合乎理義為順天命不合則為逆天命順則為臣者將不令而行逆則為臣者雖令不從矣子曰君子不以辭盡人故天下有道則行有枝葉天下無道則辭有枝葉集說曰不以辭盡人謂不可以言辭而盡見其人之實盖有言者不必有徳也行有枝葉根本盛而條達者也辭有枝葉則蕪辭蔓說而已此皆世教盛衰所致故以有道無道言之是故君子於有䘮者之側不能賻焉則不問其所費於有病者之側不能饋焉則不問其所欲有客不能館則不問其所舍故君子之接如水小人之接如醴君子淡以成小人甘以壞小雅曰盜言孔甘亂是用餤集說曰承上君子不尚枝葉之辭言三者不能則不問不可以虛言待人也接交也小雅巧言之篇盜言小人讒賊之言也餤進也子曰君子不以口譽人則民作忠故君子問人之寒則衣之問人之飢則食之稱人之善則爵之國風曰心之憂矣於我歸說集說曰譽者揚人之善而過其實者也國風曹風蜉蝣之篇詩人憂昭公之無所依故曰其於我而歸說乎說讀為稅舍息也子曰口惠而實不至怨菑及其身是故君子與其有諾責也寧有已怨國風曰言笑晏晏信誓旦旦不思其反反是不思亦已焉哉集說曰國風衛風氓之篇晏晏和柔也旦旦明也始焉不思其反覆今之反覆是始者不思之過也今則無如之何也故曰亦已焉哉引此以明諾責之意吕氏曰已謂不許也有求而不許始雖咈人之意而終不害乎信故其怨小諾人而不踐始雖不咈人意而終害乎信故其責大子曰君子不以色親人情踈而貌親在小人則穿窬之盜也與子曰情欲信辭欲巧集說曰情欲信即大學意誠之謂也巧當作考即曲禮則古昔稱先王之謂也否則為無稽之言矣吕氏曰穿窬之盜欺人之不見以為不義而已色親人者巧言令色足恭無誠心以將之情踈貌親主於為利亦欺人之不見也孔子曰色厲而内荏譬諸小人其猶穿窬之盜也與孟子曰士未可以言而言是以言餂之也是皆穿窬之類也二者亦欺人之不見以為不義故所以為穿窬也子言之昔三代明王皆事天地之神明無非卜筮之用不敢以其私䙝事上帝是以不犯日月不違卜筮卜筮不相襲也註曰日月謂冬夏至正月及四時也所不違者日與牲尸也襲因也坡謂太宰神示卜日疏云雖有常時日猶須審慎仍卜日如郊天雖用冬至之月然日必卜吉不必正用日至之日也不卜豈惟曲禮言之即左傳亦曰禮不卜常祀然周禮炳然未可據傳以疑經也不犯日月是遭䘮之後當郊社常祭之日自啓至於反哭則辟此祭日而為之恐非他祭卜日之謂也卜筮相襲筮人明云大事則此不相襲者言小事也召誥丁巳郊孔傳曰告立郊位於天戊午社孔傳曰告立社稷之位非正祭也豈可以剛柔律之戊辰烝孔傳曰王以十二月戊辰到明月仲冬始於新邑烝耳事已逺矣先人說既可通且並守之不必互相連累滋學者之惑也陳註所引劉氏之疑闕之大事有時日小事無時日有筮外事用剛日内事用柔日不違龜筮子曰牲牷禮樂齊盛是以無害乎鬼神無怨乎百姓註曰大事有事於大神有常時常日也有事於小神無常時日有筮臨有事筮之疏曰既有常時日而用卜者亦不敢專也故曲禮曰日而行事則必踐之祭統云雖有明知之心必進斷其志是雖有常日猶用卜也集說曰外剛内柔見曲禮詳文理不違龜筮四字當在牲牷禮樂齊盛之下以其一聽於龜筮故神人之心皆順也子曰后稷之事易富也其辭恭其欲儉其禄及子孫詩曰后稷兆祀庶無罪悔以迄於今註曰富之言備也吕氏曰其祀也求無罪悔而已此所以其辭恭其欲儉也熊氏曰后稷之祭宗廟不貴異物多品可謂易全備矣祝神之辭則恭心之欲則儉而無希望物薄意誠而神降之福其禄遂及於子孫詩大雅生民之篇言后稷始祀時盡誠庶幾無罪悔迄於今而子孫受禄也子曰大人之器威敬天子無筮諸侯有守筮天子道以筮諸侯非其國不以筮卜宅寢室天子不卜處太廟註曰威敬言其用之尊嚴天子無筮謂征伐出師若廵守也天子至尊大事皆用卜也守筮守國之筮國有事則用之道以筮始將出卜之道有小事則用筮諸侯入他國則不筮不敢問吉凶於人之國也諸侯受封於天子因國而國唯宫室欲改易者得卜之耳不卜處大廟者卜可建國之處吉則宗廟吉可知陸氏曰諸侯適人之國雖不用筮其所宅寢室猶卜若天子適諸侯則舍其寢廟不卜也子曰君子敬則用祭器是以不廢日月不違龜筮以敬事其君長是以上不瀆於民下不䙝於上註曰用祭器謂朝聘待賓客崇敬不敢用燕器也用龜筮問所貢獻也疏曰不廢日月者總明朝聘之時依其日月君謂天子言長者兼諸侯相朝小國之於大國也熊氏曰為上則不為民所瀆敬有以化之也為下則不為上所䙝敬有以感之也禮記述註卷二十三
