body:
  text: 禮記述注卷二十七安溪李光坡撰大學第四十二坡謂此記注疏不言作者姓名朱子以為出於曽氏之門蓋以記中引語而稱曾子乃弟子之尊師然也然古作者多自稱著如公羊傳每自稱子公羊子曰司馬史記每自稱太史公曰則此記或曽子自筆未可知也又記詳說藏身之恕潔矩之道必本於忠信以得與曾子一貫忠恕之㫖語合若符則其為曾氏之宗傳無惑焉朱子章句冠義第四十三疏曰冠禮起早晚書傳無正文世本云黃帝造旃冕是冕起於黃帝也黃帝以前以羽皮為冠以後乃用布帛其冠之年天子諸侯皆十二大夫無文案喪服大夫為昆弟之長殤大夫既為昆長殤則不二十始冠也其士則二十而冠也天子之子亦早冠祭法云王下祭殤五若不早冠何因有五等之殤諸侯之子皆二十冠檀弓云君之適長殤及大夫之適長殤是也呂氏曰冠昏射鄉燕聘天下之逹禮也儀禮所載謂之禮者禮之經也禮記所載謂之義者皆舉其經之節文以述其制作之義也凡人之所以為人者禮義也禮義之始在於正容體齊顔色順辭令容體正顏色齊辭令順而後禮義備以正君臣親父子和長幼君臣正父子親長幼和而後禮義立故冠而后服備服備而后容體正顏色齊辭令順故曰冠者禮之始也是故古者聖王重冠注曰言服未備者未可求以三始也童子之服采衣紒方氏曰容體欲其可度故曰正顏色欲其可觀故曰齊辭令欲其可從故曰順古者冠禮筮日筮賓所以敬冠事敬冠事所以重禮重禮所以為國本也注曰國以禮為本呂氏曰禮重則人道立此國之所以為國也故曰為國本故冠於阼以著代也醮於客位三加彌尊加有成也已冠而字之成人之道也呂氏曰主人升立於序端西面贊者筵於東序少北西面將冠者即筵而冠是位與主人同在阼也父老則傳之子所以著其傳付之意也酌而無酬酢曰醮醮於户西南面賓位也以禮賓之禮禮其子所以為成人敬也始加緇布冠再加皮辨次加爵辨三加而服彌尊亦所以為成人敬也冠於阼醮於客位者適子也若庶子則冠於房外南面遂醮焉所以異者不著代也古者童子雖貴名之而已冠而後賓字之以成人之道故敬其名也見於母母拜之見於兄弟兄弟拜之成人而與為禮也𤣥冠𤣥端奠摯於君遂以摯見於鄉大夫鄉先生以成人見也疏曰案儀禮廟中冠子以酒脯奠廟訖子持所奠酒脯以見於母母拜其酒脯重從奠者處來故拜之非拜子也今唐禮母見子但起立不拜坡謂疏說善矣亦似未盡須詳儀禮母拜受三字蓋拜者為受脯拜非拜子也亦非重從廟來如下篇舅受婦笲棗栗答拜亦是拜婦乎凡婦人俠拜如壻見婦母亦婦母先一拜亦是拜壻乎記者讀滑不詳拜受二字不訖俠拜之節既錯經意而解者愈失之注疏不可容易讀豈不信乎成人之者將責成人禮焉也責成人禮焉者將責為人子為人弟為人臣為人少者之禮行焉將責四者之行於人其禮可不重與故孝弟忠順之行立而后可以為人可以為人而后可以治人也故聖王重禮故曰冠者禮之始也嘉事之重者也是故古者重冠重冠故行之於廟行之於廟者所以尊重事尊重事而不敢擅重事所以自卑而尊先祖也呂氏曰所謂成人者非謂四體膚革異於童稚也必知人倫之備焉親親貴貴長長不失其序之謂備此所以為人子為人弟為人臣為人少者之禮行孝弟忠順之行立也有諸己然後可以責諸人故成人然後可以治人也古者重事必行之廟中昏禮納采至親迎皆主人筵几於廟聘禮君親拜迎於大門之外而廟受爵有德祿有功君親策命於廟喪禮既啓則朝廟皆所以示有所尊而不敢專也昏義第四十四疏曰謂之昏者娶妻之禮以昏為期因名焉必以昏者取陽往隂來之義昏禮者將合二姓之好上以事宗廟而下以繼後世也故君子重之是以昏禮納采問名納吉納徵請期皆主人筵几於廟而拜迎於門外入揖讓而升聽命於廟所以敬慎重正昏禮也疏曰主人謂女父母設筵几於禰廟方氏曰納采者納鴈以為采擇之禮也問名者問女生之母名氏也納吉者得吉卜而納之也納徵者納幣以為昏姻之證也請期者請昏姻之期日也納采問名此二禮一使而兼行之納徵無鴈以有幣其餘皆用鴈父親醮子而命之迎男先於女也子承命以迎主人筵几於廟而拜迎於門外壻執鴈入揖讓升堂再拜奠鴈蓋親受之於父母也降出御婦車而壻授綏御輪三周先俟於門外婦至壻揖婦以入共牢而食合卺而酳所以合體同尊卑以親之也疏曰共牢而食者同食一牲不異牲也合卺而酳者以一瓠分為兩瓠謂之卺壻與婦各執一片以酳酳演也謂食畢飲酒演安其氣也坡謂用鴈儀禮中載朱子說以為亦攝盛之意則其餘取義略之可也此壻升堂奠鴈與誰為禮皆未解出案儀禮賓升北面奠鴈再拜稽首鄭注云此時當在房外當楣北面主人不答明主為授女耳似以此鴈為壻見女之摯而郊特牲所云執摯以相見指此節也敬慎重正而后親之禮之大體而所以成男女之别而立夫婦之義也男女有别而后夫婦有義夫婦有義而后父子有親父子有親而后君臣有正故曰昏禮者禮之本也夫禮始於冠本於昏重於喪祭尊於朝聘和於鄉射此禮之大體也注曰言子受氣性純則孝孝則忠也疏曰昏姻得所則受氣純和生子必孝事君必忠夙興婦沐浴以俟見質明贊見婦於舅姑婦執笲棗栗段修以見贊醴婦婦祭脯醢祭醴成婦禮也舅姑入室婦以特豚饋明婦順也集說曰質明昏禮之次日正明之時也贊相禮之人也笲竹器而衣者緇被纁裡士昏禮舅坐於阼階西面姑坐於房外南面婦執笲棗栗進東面拜奠於舅席又執段修北面拜奠於姑席是也贊醴婦者婦席於户牖間贊者酌醴席前北面婦於席西東面拜受贊者西階上北面拜送又拜薦脯醢婦升席左執觶右祭脯醢訖以柶祭醴三是祭脯醢祭醴者所以成其為婦之禮也舅姑入於室婦盥饋特豚合升而分載之右胖載之舅爼左胖載之姑爼無魚臘無稷舅姑並席於奧東面其饌各以南為上此明其為婦之孝順也厥明舅姑共饗婦以一獻之禮奠酬舅姑先降自西階婦降自阼階以著代也注曰降者各還其燕寢婦見及饋享於適寢昏禮不言厥明此言之者容大夫以上禮多或異日疏曰若士婦見舅姑之日即舅姑饗婦不待厥明也以鄉飲酒禮約之婦席在室外户之西舅酌酒於阼階獻婦婦西階上拜受即席祭薦祭酒畢於西階上北面卒爵婦酢舅舅於阼階上受酢飲畢乃酬婦先酌自飲畢更酌酒以酬婦婦受爵奠於薦左不舉爵正禮畢也著代著明代舅姑之事也坡謂婦席户西南向舅席在阼姑席於房外共饗婦舅降洗於南洗南洗洗在庭近南也婦不敢辭洗舅降則辟於房舅洗升婦不敢拜洗舅酌獻婦婦拜受姑薦脯醢婦飲畢酢舅更爵酌酢自薦脯醢於舅席舅飲畢姑洗於北洗北洗洗在北堂直室東隅也洗畢姑酌先自飲畢更酌以酬婦婦拜受奠於薦左所謂舅獻姑酬共成一獻是也此疏說似酬亦是舅飲酌則是舅酬非姑酬恐未然也故本儀禮之昏禮經記文而以鄉飲酒一獻之禮序其次又案昏禮記云庶婦則使人醮之婦不饋成婦禮明婦順又申之以著代所以重責婦順焉也婦順者順於舅姑和於室人而后當於夫以成絲麻布帛之事以審守委積蓋藏是故婦順備而后內和理內和理而后家可長久也故聖王重之方氏曰於舅姑言順於室人言和者蓋上下相從謂之順順則不逆可否相濟謂之和和則不同舅姑之禮至隆也故可順而不可逆室人之禮相敵也故雖和而不必同兹其别歟是以古者婦人先嫁三月祖廟未毁教於公宫祖廟既毁教於宗室教以婦德婦言婦容婦功教成祭之牲用魚芼之以蘋藻所以成婦順也注曰謂與天子諸侯同姓者也嫁女者必就尊者教成之教成之者女師也祖廟女所出之祖也公君也宗室宗子之家也婦德貞順也婦言辭令也婦容婉娩也婦功絲麻也祭之祭其所出之祖也魚蘋藻皆水物隂類也魚為爼實蘋藻為羮菜祭無牲牢告事耳非正祭也其齊盛用黍云君使有司告之宗子之家若其祖廟已毁則為壇而告焉疏曰祖廟未毁者親廟有四髙祖之廟未毁除也既毁者與君四從以外同髙祖之父以上其廟既遷也宗室注不言大宗小宗則與大宗近者於大宗教之與大宗逺者於小宗教之云祭其所出祖者此女出於君之髙祖則祭高祖出於曾祖則祭曾祖以下皆然女親行祭君使有司告之若卿大夫以下則女主之宗子掌其禮也廟毁則為壇者假令宗子為士只有父祖廟曾高無廟則為壇於宗子之家而告焉古者天子后立六宮三夫人九嬪二十七世婦八十一御妻以聽天下之內治以明章婦順故天下內和而家理天子立六官三公九卿二十七大夫八十一元士以聽天下之外治以明章天下之男教故外和而國治故曰天子聽男教后聽女順天子理陽道后治隂德天子聽外治后聽內治教順成俗外內和順國家理治此之謂盛德注曰天子六寢而六宮在後六官在前所以承嗣施內外之政也內治婦學之法也隂德謂主隂事隂令也疏曰天子六寢路寢一小寢五后之六宫在王六寢後亦大寢一小寢五方氏曰六官天地四時之官也有六卿而又有九卿者兼三公數之則謂之九卿由公至士其數三而倍之止於九者陽成於三而窮於九以其理陽道故其數如此后治隂德而其數亦如之者婦人從夫故也先言六宫而後言六官者欲治其國先齊其家之意也是故男教不修陽事不得適見於天日為之食婦順不修隂事不得適見於天月為之食是故日食則天子素服而修六官之職蕩天下之陽事月食則后素服而修六宫之職蕩天下之隂事故天子之與后猶日之與月隂之與陽相須而后成者也天子修男教父道也后修女順母道也故曰天子之與后猶父之與母也故為天王服斬衰服父之義也為后服資衰服母之義也鄭氏曰適之言責也蕩蕩滌去穢惡也資當為齊朱子曰王者修德行政用賢去姦能使陽盛足以勝隂隂衰不能侵陽則日月之行雖或當食不食也若國無政臣子背君父妾婦乘其夫小人陵君子則隂勝陽微當食必食雖曰行有常度實為非常之變矣葉氏曰日月之食理所常有也反之隂陽之事者躬自厚之道也天子以男教勉天下之為子者其道猶父也故其卒也天下為之服斬衰后以女順化天下之為婦者其道猶母也故其亡也天下為之服齊衰父母為之服者報其恩也王與后為之服者報其義也鄉飲酒義第四十五疏曰鄭云鄉飲酒義者以其記鄉大夫飲賓於庠序之禮尊賢養老之義凡有四事一則三年賓興賢能二則鄉大夫飲國中賢者三則州長習射飲酒也四則黨正蠟祭飲酒總而言之皆謂鄉飲酒此鄉飲酒之義說儀禮鄉飲酒也坡謂惟賓興賢能有賓有介鄉射則有賓無介矣推之蠟飲無介可知此篇始末言賓言介明是賓興賢能者注雖言兼有四事不過推索文義一二語及之耳即此四事皆是國禮主人皆是鄉官故得行之若鄉人私會飲酒不見於他文吕氏何以知其當行此禮也每斥注疏臆說此豈有所本乎鄉飲酒之義主人拜迎賓於庠門之外入三揖而后至階三讓而后升所以致尊讓也盥洗揚觶所以致潔也拜至拜洗拜受拜送拜既所以致敬也尊讓潔敬也者君子之所以相接也君子尊讓則不爭潔敬則不慢不慢不爭則逺於鬭辨矣不鬭辨則無暴亂之禍矣斯君子所以免於人禍也注曰庠鄉學也州黨曰序揚舉也疏曰此謂鄉大夫故迎賓於庠門外若州長黨正則於序門外也盥洗揚觶者主人將獻賓以水盥手而洗爵揚觶謂既獻之後舉觶酬賓之時亦盥洗也拜至者賓主升堂主人於阼階上北面再拜也拜洗者主人拜至訖洗爵而升賓於西階上北面再拜拜主人之洗也拜受者賓於西階上拜受爵也拜送者主人於阼階上拜送爵也拜既者既盡也賓飲酒既盡而拜也故聖人制之以道鄉人士君子尊於房戶之間賓主共之也尊有𤣥酒貴其質也羞出自東房主人共之也洗當東榮主人之所以自潔而以事賓也注曰鄉大夫士飲國中賢者亦用此禮也疏曰鄉人謂鄉大夫也士謂州長黨正也君子謂卿大夫也尊於房户之間賓主共之者設酒尊於東房之西室户之東在賓主之間酒雖主人之設而賓亦以之酢主人故云賓主共之也北面設尊𤣥酒在左是在酒尊之西也地道尊右設𤣥酒在西者貴其質素故也共之者供於賓也榮屋翼也設洗於庭當屋之翼必在東者示主人以此自潔而事賓也從冠義以來皆記者疊出儀禮經文於上而陳其義於下以釋之他皆倣此賓主象天地也介僎象隂陽也三賓象三光也贊皇浩齊曰立賓以象天所以尊之也立主以象地所以養之也介以輔賓僎以輔主人象隂陽之輔天地也三賓衆賓之長也其以輔賓猶三光之輔於天也三光星之大者有三先儒謂三大辰心為大辰伐為大辰北辰亦謂大辰讓之三也象月之三日而成魄也坡謂歷家以朔及前後二日為食限此時月切於日渾然是魄所謂三日成魄也謂之讓者朱子解月幾望為隂盛亢陽則成魄非讓乎四面之坐象四時也疏曰主東南象夏始賓西北象冬始僎東北象春始介西南象秋始天地嚴凝之氣始於西南而盛於西北此天地之尊嚴氣也此天地之義氣也天地溫厚之氣始於東北而盛於東南此天地之盛德氣也此天地之仁氣也主人者尊賓故坐賓於西北而坐介於西南以輔賓賓者接人以義者也故坐於西北主人者接人以仁以德厚者也故坐於東南而坐僎於東北以輔主人也仁義接賓主有事爼豆有數曰聖聖立而將之以敬曰禮禮以體長幼曰德德也者得於身也故曰古之學術道者將以得身也是故聖人務焉集說曰主人者厚其飲食之禮仁之道也為賓者謹其進退之節義之道也求諸天地之氣以定其主賓之位至於爼豆亦莫不有當然之數焉聖通明也謂禮義所在通貫而顯明也敬其天理之節體夫人倫之序所得者皆吾身之實理也孔子觀於鄉而知王道之易易謂其足以正身而安國也聖人務焉豈無意哉浩齊曰禮得於身之謂德由學而後得於身則與先得於人心之同然者亦無異矣故曰古之學術道者將以得身也祭薦祭酒敬禮也嚌肺嘗禮也啐酒成禮也於席末言是席之正非專為飲食也為行禮也此所以貴禮而賤財也卒觶致實於西階上言是席之上非專為飲食也此先禮而後財之義也先禮而後財則民作敬讓而不爭矣疏曰祭薦者主人獻賓賓即席祭所薦脯醢也祭酒者賓既祭薦又祭酒也此是賓敬重主人之禮也賓既祭酒之後興取爼上之肺嚌齒之所以嘗主人之禮也啐謂飲主人酒而入口所以成主人之禮也席末席西頭也案儀禮祭薦祭酒嚌肺皆在席之中惟啐酒在席末又嚌肺在前祭酒在後此先云祭酒者嚌是嘗嚌之名祭酒是未飲之稱故祭酒與祭薦相連表其敬禮之事敬主人之物故祭薦祭酒嚌肺皆在席中啐酒入於己故在席末於席上者是貴禮於席末啐酒是賤財也啐才始入口猶在席末卒觶則盡爵故遠在西階上云卒觶者論其將欲卒觶之事致實則論其盡酒之體酒為觴中之實今致盡此實也鄉飲酒之禮六十者坐五十者立侍以聽政役所以明尊長也六十者三豆七十者四豆八十者五豆九十者六豆所以明飬老也民知尊長養老而后乃能入孝弟民入孝弟出尊長養老而后成教成教而后國可安也君子之所謂孝者非家至而日見之也合諸鄉射教之鄉飲酒之禮而孝弟之行立矣注曰此說鄉飲酒謂黨正國索鬼神而祭祀則以禮屬民而飲酒於序以正齒位之禮也其鄉射則州長春秋以禮會民而射於州序之禮也謂之鄉者州黨鄉之屬也疏曰以鄉飲酒之篇無正齒位之禮故知是黨正也賓介用年老者為之其餘為衆賓內年六十以上於堂上賓席之西南面坐若不盡則於介席之北東面北上其五十者則立於西階下東面北上每十年加一豆非正禮故不得為籩豆偶也其五十者亦有豆但二豆而已則鄉飲酒衆賓立於堂下皆二豆孔子曰吾觀於鄉而知王道之易易也主人親速賓及介而衆賓自從之至於門外主人拜賓及介而衆賓自入貴賤之義别矣三揖至於階三讓以賓升拜至獻酬辭讓之節繁及介省矣至於衆賓升受坐祭立飲不酢而降隆殺之義辨矣疏曰主人既拜其來至又酌酒獻賓賓酢主人主人又酌而自飲以酬賓介酢主人則止主人不酬介是及介省矣主人獻衆賓於西階上受爵坐祭立飲不酢主人而降於賓禮隆衆賓禮殺是隆殺之義别矣工入升歌三終主人獻之笙入三終主人獻之間歌三終合樂三終工告樂備遂出一人揚觶乃立司正焉知其能和樂而不流也集說曰工入而升堂歌鹿鳴四牡皇皇者華每一篇而一終三篇終則主人酌以獻工焉吹笙者入於堂下奏南陔白華華黍亦每一篇而一終三篇終則主人亦酌以獻之也間者代也笙與歌皆畢則堂上與堂下更代而作堂上先歌魚麗則堂下笙由庚此為一終次則堂上歌南有嘉魚則堂下笙崇丘此為二終又其次堂上歌南山有臺則堂下笙由儀為三終也合樂三終者謂堂上下歌瑟及笙並作也工歌關雎則笙吹鵲巢合之工歌葛覃則笙吹采蘩合之工歌卷耳則笙吹采蘋合之如此皆竟工以樂備告樂正樂正告於賓乃降言遂出者樂正自此至去不復升堂也一人者主人之吏也此人舉觶之後主人使相禮者一人為司正恐旅酬時有懈惰失節者以董正之也如此則雖和樂而不至於流放矣坡謂一人揚觶在未歌之前立司正在既歌後記者以類相從故連言之賓酬主人主人酬介介酬衆賓少長以齒終於沃洗者焉知其能弟長而無遺矣浩齊曰前言介之無酬衆賓之無酢者蓋未歌之時也此言賓酬主人主人酬介介酬衆賓者既歌之後行旅酬之時也沃洗者滌濯之人也雖至賤旅酬之際猶以齒焉則貴可知矣自貴及賤無不序齒此所以知其能弟長而無遺矣坡謂賓酬主人主人酬介介酬衆賓此據旅酬之節酬畢後復使二人舉觶賓介主僎徹爼降說屨升坐行無算爵此少長以齒終於沃洗在無算爵節內鄉飲酒記所謂主人之贊者西面北上不與無算爵然後與是也則是二節而記一之疏云因旅酬遂連言無算爵欲見無不周遍降說屨升坐修爵無數飲酒之節朝不廢朝莫不廢夕賓出主人拜送節文終遂焉知其能安燕而不亂也浩齊曰前此皆立而行禮未徹爼故未說屨至此徹爼之後乃說屨升坐而坐燕也修舉也修爵無數無算爵是也凡治事者朝以聽政而鄉飲聽政罷方行是朝不廢朝也夕以修令而鄉飲禮畢猶可以治私事是莫不廢夕也若黨正飲酒一國若狂則無不醉矣節文終遂者終竟也遂猶申也言雖禮畢主人猶拜以送賓節文之禮終申遂而無所缺則知其安於燕樂而不至於亂矣貴賤明隆殺辨和樂而不流弟長而無遺安燕而不亂此五行者足以正身安國矣彼國安而天下安故曰吾觀於鄉而知王道之易易也集說曰總結上文五事之目鄉飲酒之義立賓以象天立主以象地設介僎以象日月立三賓以象三光古之制禮也經之以天地紀之以日月參之以三光政教之本也注曰日出於東僎所在也月生於西介所在也三光三大辰也天之政教出於大辰焉疏曰此記者更覆說其義有所法象之義前文雖備故此更詳也賓者主之所敬故以象天主供物以養賓故以象地日月即前經隂陽也隂陽據其氣日月言其體三大辰者公羊云大辰者何大火也伐為大辰北辰亦為大辰何休云大火與伐天所以示民時早晚天下取以為正故謂之大辰辰時也是天之政教出於大辰亨狗於東方祖陽氣之發於東方也洗之在阼其水在洗東祖天地之左海也注曰祖猶法也狗所以養賓陽氣主養萬物海水之委也浩齊曰亨狗以養賓陽氣以養萬物故祖而法之烹於東方焉海水之委也天地之間海居於東東則左也故洗之在阼其水在洗東有左海之義焉尊有𤣥酒教民不忘本也集說曰大古之世無酒以水行禮故後世因謂水為𤣥酒不忘本者思禮之所由起也賓必南鄉東方者春春之為言蠢也産萬物者聖也南方者夏夏之為言假也養之長之假之仁也西方者秋秋之為言愁也愁之以時察守義者也北方者冬冬之為言中也中者藏也是以天子之立也左聖鄉仁右義偝藏也注曰蠢動生之貌也聖之言生也假大也愁讀為揫揫斂也察猶察察嚴殺之貌也疏曰以生物於春如通明之聖故東方為聖也集說曰揫之以時察言揫斂之以秋時嚴肅之氣也物之藏必自外而入內故曰中者藏也介必東鄉介賓主也注曰獻酬之禮主人將西賓將南介覸其間也主人必居東方東方者春春之為言蠢也産萬物者也主人者造之産萬物者也注曰言禮之所共由主人出也月者三日則成魄三月則成時是以禮有三讓建國必立三卿三賓者政教之本禮之大參也注曰言禮者隂也大數取象法於月也疏曰樂既為陽故禮為隂月是隂精故禮之大數取法於月也禮記述注卷二十七
