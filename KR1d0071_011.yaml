body:
  text: 禮記述注卷十一安溪李光坡撰郊特牲第十一陸氏曰郊者祭天之名用一牛故曰特牲坡謂此篇雖多記祭事中如旅幣庭燎覲禮之類亦博異聞不專於祭雖以類相從亦各自成一節非如禮器上下文意一貫則冠婚二假廣記及之非關大義郊特牲而社稷大牢天子適諸侯諸侯膳用犢諸侯適天子天子賜之禮大牢貴誠之義也故天子牲孕弗食也祭帝弗用也集説曰禮有以少為貴者故此二者皆貴特牲而賤大牢也犢未有牝牡之情故云貴其誠慤朱子曰萬物本乎天人本乎祖故以所出之祖配天地周之后稷生於薑嫄以上更推不去文武之功起於后稷故配天須以后稷嚴父莫大於配天宗祀文王於明堂以配上帝上帝即天也聚天之神而言之則謂之上帝又曰古時天地定是不合祭日月山川百神亦無合共一時祭享之禮大路繁纓一就先路三就次路五就郊血大饗腥三獻爓一獻孰至敬不饗味而貴氣臭也注曰禮器言次路七就與此乖字之誤也疏曰周禮郊燔柴為始宗廟祼為始社稷血為始小祀疈辜為始此云郊血至孰者謂正祭之時薦於尸坐之前也集説曰臭亦氣也餘並見前篇諸侯為賔灌用鬱鬯灌用臭也大饗尚腵修而已矣集説曰諸侯來朝以客禮待之是為賔也在廟中行三享畢然後天子以鬱鬯之酒灌之諸侯相朝亦然明貴氣臭之義也周禮作祼字上公再祼而酢侯伯一祼而酢子男一祼不酢祼則使宗伯酌圭瓚而祼之酢則賔酢主也此大饗謂王饗諸侯也脯加薑桂曰腵修行饗之時雖設大牢之饌而必先設腵修於筵前然後設餘饌故云尚腵修也此明不享味之義大饗君三重席而酢焉三獻之介君專席而酢焉此降尊以就卑也疏曰案燕禮無賔酢公禮至説屨升坐後賓媵觚於公公受賔爵飲以賜下此云受酢蓋謂此也或可燕已臣子賔不酢公若與鄰國賔燕以介為賔賔得酢公也集説曰此大饗是諸侯相朝主君饗客之禮諸侯之席三重今兩君相敵故席三重之席而受客之酢爵也若諸侯遣鄉來聘鄉禮當三獻其上介則是大夫故謂之三獻之介主君饗燕之以介為賔賔為尊敬大夫席雖再重今為介降一等止合專席君席雖三重今徹去兩重就單席受此介之酢爵是降國君之尊以就大夫之卑也饗禘有樂而食嘗無樂隂陽之義也凡飲飬陽氣也凡食飬隂氣也故春禘而秋嘗春饗孤子秋食耆老其義一也而食當無樂飲飬陽氣也故有樂食飬隂氣也故無聲凡聲陽也注曰此禘當為禴字之誤也王制曰春禴夏禘疏曰饗謂春饗孤子禘春祭宗廟也食謂秋食耆老嘗秋祭宗廟也飲饗清虛飬陽氣食是體質養隂氣皇氏云春是生飬之時故享孤子取長飬之義秋是成孰之時故食耆老取老成之義熊氏云春享孤子亦享耆老食耆老亦食孤子此夏殷禮秋嘗無樂若周則四時祭皆有樂故祭統云內祭則大嘗禘升歌清廟下管象是嘗有樂也鼎爼竒而籩豆偶隂陽之義也籩豆之實水土之品也不敢用褻味而貴多品所以交於旦明之義也注曰旦當為神篆字之誤也疏曰鼎爼盛牲體牲動物屬陽故其數竒籩豆實兼有植物植物屬隂故其數偶集説曰自一鼎至九鼎皆竒數其十鼎者陪鼎三則正鼎亦七也十二鼎者陪鼎三則正鼎亦九也正鼎鼎列一爼故云鼎爼竒也籩豆偶者據周禮掌客及前篇所舉皆是偶數賔入大門而奏肆夏示易以敬也疏曰案燕禮賔及庭奏肆夏是己之臣子此入大門即奏肆夏者謂朝聘之賔行朝聘既畢燕享之時燕則大門是寢門享則大門是廟門也示易以敬者示主人和易嚴敬於賔也卒爵而樂闋孔子屢歎之疏曰此卒爵兼賔及主君也燕禮主人受酢不作樂若享時主君親獻賔賔親酢主君賔主俱作樂也孔子屢歎之者善其和易恭敬之義奠酬而工升歌發德也歌者在上匏竹在下貴人聲也疏曰大射禮獻鄉之後大夫媵觶於公所謂酬也公奠置此酬未舉於時工升歌也或可享時主君親酬賔賔奠酬薦東於時即工升歌也發德發明賔主之德也匏笙也竹篪笛也樂由陽來者也禮由隂作者也隂陽和而萬物得疏曰此因上有賔主禮樂之事遂説禮樂之義陽天也天氣化樂以氣為化是樂由陽來也氣化謂五聲八音也隂地也地以形生禮以形為教是禮由隂作也形教謂尊卑大小拜伏之事旅幣無方所以别土地之宜而節逺邇之期也龜為前列先知也以鐘次之以和居參之也虎豹之皮示服猛也束帛加璧往德也注曰鐘金也獻金為作器鐘其大者疏曰此一節明朝聘貨賄庭實之物旅衆也衆國貢獻非止一方故云無方宜者五方各殊所出有異期者六服有逺近所貢之屬各有期也前龜後皮帛以金參厠其中故云以和居參之也玉以比德享用束帛帛上加璧是表往歸於德也謂主君有德而往歸之庭燎之百由齊桓公始也疏曰此以下至由三桓始也總論朝聘失禮及諸侯大夫奢僭強盛之事集説曰庭燎者庭中設炬火以照來朝之臣夜入者大戴禮言天子百燎上公五十侯伯子男三十今侯國皆供百燎自桓公始之大夫之奏肆夏也由趙文子始也集説曰大射禮公升即席奏肆夏燕禮賔及庭奏肆夏是諸侯之禮今文子亦奏之僭矣此謂納賔樂也朝覲大夫之私覿非禮也大夫執圭而使所以申信也不敢私覿所以致敬也而庭實私覿何為乎諸侯之庭為人臣者無外交不敢二君也集説曰朝覲之禮國君親往而大夫從則大夫不當又以已物而私覿主君故曰非禮也若大夫執其君之命圭而專使則當行私覿之禮以申己之信故從君朝覲而不敢私覿是致敬己君也今從君以來而施設庭實以為私覿大夫何可為此於諸侯之庭乎譏其與君無别也人臣無外交不敢二心於他君所以從君而行則不敢私覿也大夫而饗君非禮也大夫強而君殺之義也由三桓始也疏曰按三桓之前齊公孫無知衛州吁宋長萬皆以強盛被殺此云由三桓始者據魯而言集説曰大夫富強而具享禮以享君以臣召君故曰非禮大夫強橫僭逆必亂國家人君殺之是斷以大義也三桓魯之三家皆桓公之後也先時成季以莊公之命鴆殺僖叔後慶父賊子般又弒閔公於是魯殺慶父故云由三桓始天子無客禮莫敢為主焉君適其臣升自阼階不敢有其室也疏曰臣不敢有其室臣既不敢為主明享君非禮結上文也覲禮天子不下堂而見諸侯下堂而見諸侯天子之失禮也由夷王以下疏曰覲禮天子負斧依南靣侯氏執玉入是不下堂見諸侯也若春朝夏宗則以客禮待諸侯以車出迎熊氏云春夏受三享之時乃有迎法義或然也夷王康王之玄孫之子諸侯之宫縣而祭以白牡擊玉磬朱干設錫冕而舞大武乘大路諸侯之僭禮也注曰言此皆天子之禮也疏曰宫縣四靣縣也諸侯惟合軒縣仐乃有宫縣祭合用時王牲仐用白牡合擊石磬仐擊玉磬又諸侯得舞大武但不得朱干設錫冕服而舞合乘時王之車今乃乘殷之大路並是諸侯僭禮也干盾也錫謂用金琢傅其盾背臺門而旅樹反坫繡黼丹朱中衣大夫之僭禮也集説曰此皆諸侯之禮兩旁起土為臺臺上架屋而門當其中故曰臺門旅道也樹屏也立屏當所行之路以蔽內外為敬天子外屏諸侯內屏大夫以簾士以帷坫者兩君相享設尊兩楹間坫在尊南以土為之獻酢飲畢則反爵於其上故曰反坫繡讀為綃繡黼者於綃上而刺黼文也丹朱染繒為赤色也繡黼為中衣之領丹朱為中衣之緣中衣者朝服祭服之裏衣也制如深衣但袖小長耳冕服是絲衣則中衣用絹素皮辨服朝服玄端是麻衣則中衣用布也故天子微諸侯僭大夫強諸侯脅於此相貴以等相覿以貨相賂以利而天下之禮亂矣諸侯不敢祖天子大夫不敢祖諸侯而公廟之設於私家非禮也由三桓始也集説曰相貴以等謂擅相封爵相覿以貨大夫私相瀆以貨賄不辟君諸侯不敢祖天子而左傳云宋祖帝乙鄭祖厲王魯襄十二年吳子壽夢卒臨於周廟禮也魯以周公之故立文王廟耳大夫不敢祖諸侯而左傳云凡邑有宗廟先君之主曰都記者以禮之正言之而又有他義者疏説謂天子之子以上德為諸侯者得祀其所出故魯以周公之故立文王廟公子得祖先君公孫不得祖諸侯故公子為大夫者亦得立宗廟於其采地故曰邑有宗廟先君之主也其王子母弟雖無功德不得出封為諸侯而食采畿內者亦得立祖王廟於采地故都宗人家宗人掌祖王之廟也由三桓始謂魯之三家立桓公廟也天子存二代之後猶尊賢也尊賢不過二代疏曰古春秋左傳説周家封夏殷二王之後以為上公封黃帝堯舜之後謂之三恪恪者敬也敬其先聖而封其後諸侯不臣寓公故古者寓公不繼世集説曰諸侯失國而寄寓他國者謂之寓公所寓之國不敢以之為臣此寓公死則臣其子矣故云寓公不繼世君之南鄉答陽之義也臣之北靣答君也注曰答對也大夫之臣不稽首非尊家臣以辟君也集説曰諸侯於天子稽首大夫於諸侯亦稽首惟家臣於大夫不稽首者非尊重家臣也以避國之正君也蓋諸侯與大夫同在一國大夫已稽首於君矣家臣若又稽首於大夫則似一國而兩君矣故云以避君大夫有獻弗親君有賜不靣拜為君之答己也集説曰有獻弗親者使人往獻不身即往也不靣拜拜受於使不親見君之靣也恐煩君答拜故也鄉人裼孔子朝服立於阼存室神也集説曰論語鄉人儺朝服而立於阼階即此事也裼是強鬼之名鄉人驅逐此鬼孔子恐驚廟室之神故衣朝服立於廟之東階以存安廟室之神使神依己而安也禮大夫朝服而祭故用朝服以依神孔子曰射之以樂也何以聼何以射集説曰何以聼謂射者何以能不失射之容節而又能聼樂之音節乎何以射謂何以能聼樂之音節而使射之容與樂之節相應乎言其難而美之也孔子曰士使之射不能則辭以疾縣弧之義也集説曰為士者當習於射以六藝之一也不敢以不能辭惟可以疾辭蓋生而設弧於門左已有射道但未能耳今辭以疾而未能則亦與初生之未能相似故云縣弧之義也孔子曰三日齊一日用之猶恐不敬二日伐鼓何居集説曰齊者不聼樂恐散其志慮也今三日之間乃二日擊鼓其義何所處乎怪之之辭孔子曰繹之於庫門內祊之於東方朝市之於西方失之矣疏曰天子諸侯謂之繹在祭之明日於廟門外西室及堂而行禮也上大夫曰儐尸與祭同日於廟堂之上行禮全無室中之事下大夫及士雖有獻尸及賔等相酬酢行禮於廟之事不謂之儐尸也集説曰繹祭之明日又祭也繹是堂上接尸祊是於室內求神皆一時之事繹之禮當於廟門外之西堂仐乃於庫門內祊當在廟門外西室今乃於廟門外東方朝市即周禮所謂朝時而市也當於市內近東仐乃於市內西方此三事皆違於禮故曰失之矣社祭土而主隂氣也君南鄉於北墉下答隂之義也日用甲用日之始也集説曰地秉隂則社乃隂氣之主社之主設於壇上北靣而君來北墻下南靣祭之蓋社不屋惟立之壇壝而環之以墻既地道主隂故其主北向而君南靣對之答對也甲為十二干之首天子大社必受霜露風雨以逹天地之氣也是故喪國之社屋之不受天陽也亳社北牖使隂明也注曰大社王為羣姓所立疏曰天子諸侯有二社為羣姓立者在庫門內之西自為立者在藉田之中其亡國之社以為廟屏戒或在廟或在庫門內之東則亳社在東也社皆有稷亡國之社亦有之社祭一嵗有三仲春命民社一也詩云以社以方謂秋祭二也孟冬大割祠於公社三也社主用石案條牒論稷壇在社壇西俱北向營並壇其門或曰在社壇北其用主無文逹通也風雨至則萬物生霜露降則萬物成故不屋以受風雨霜露霜露風雨至是天地氣通也亳社殷社殷始都亳白虎通云王者諸侯必有誡社示有存亡也明為善者得之為惡者失之周立殷社而屋之塞其三靣惟開北牖示絶陽而通隂隂明則物死也社所以神地之道也地載萬物天垂象取財於地取法於天是以尊天而親地也故教民美報焉家主中霤而國主社示本也疏曰言立社之祭是神明地道也地載萬物天垂其象取財於地者財産並在地載為人所取也取法於天者人知四時早晚皆放日月星辰以為耕作之候所取法者故尊而祭之所取財者故親而祭之地既為民所親故與庶民共祭以教民美報故也卿大夫之家主祭土神於中霤天子諸侯之國主祭土神於社示其生飬之本也唯為社事單出里集説曰社事祭社之事也二十五家為里單盡也言當祭社之時一里之人盡出而供給其事蓋每家一人也唯為社田國人畢作集説曰為祭社之事而田獵則國中之人皆行無留家者唯社丘乘共粢盛所以報本反始也疏曰皇氏云天子諸侯祭社則用藉田之穀大夫以下無藉田若祭社則邱乘之民共之集説曰祭社必有粢盛稷曰明粢在器曰盛此粢盛則使邱乘供之井田之制九夫為井四井為邑四邑為邱四邱為乘也報者酬之以禮反者追之以心季春出火為焚也然後簡其車賦而歷其卒伍而君親誓社以習軍旅左之右之坐之起之以觀其習變也而流示之禽而鹽諸利以觀其不犯命也求服其志不貪其得故以戰則克以祭則受福疏曰祭社既在仲春此出火為焚當在仲春之月記者誤也季春火出而用火者謂陶冶之火若田獵之火則昆蟲蟄後得火田以至仲春也集説曰建辰之月大火心星昏見南方故出火以焚除草萊焚後即搜田簡閲視也賦兵也歷數之也百人為卒五人為伍誓社誓衆於社也或左或右或坐或作皆是軍旅之法習變習熟其變動之節也驅逐之際禽獸流動紛紜衆皆見之故云流示之禽鹽讀為艷艷諸利謂使之歆艷於利也禽獸雖甚可欲而殺獲取舍皆有定制犯命者必罰不使之犯命者是求以遏服其貪利之志人君亦取之有制如大獸公之小禽私之不踰法而貪下之所得也以戰則克習民於變也祭則受福獲牲以禮也天子適四方先柴注曰所到必先燔柴有事於上帝也書曰嵗二月東巡守至於岱宗柴郊之祭也迎長日之至也集説曰至猶到也冬至日短極而漸舒故云迎長日之至朱子曰以始祖配天須在冬至一陽始生萬物之始宗祀九月萬物之成父者我所自生帝者生物之祖故推以為配而祀於明堂此議方正問郊祀后稷以配天宗祀文王以配上帝帝只是天天只是帝却分祭何也朱子曰為壇而祭故謂之天祭於屋下而以神祗祭之故謂之帝大報天而主日也兆於南郊就陽位也掃地而祭於其質也器用陶匏以象天地之性也集説曰郊祭者報天之大事而主於迎長日之至祭義云配以月故方氏謂天之尊無為可祀之以其道不可主之以其事故以日為之主焉天秉陽日者衆陽之宗故就陽位而立郊兆燔柴在壇正祭於地故云掃地而祭陶匏亦器之質者質乃物性之本然也於郊故謂之郊牲用騂尚赤也用犢貴誠也郊之用辛也周之始郊日以至注曰周衰禮廢儒者見周禮盡在魯因推魯禮以言周事疏曰王肅用董仲舒劉向之説以此為周郊上文云郊之祭迎長日之至謂周之郊祭於建子之月而迎此冬至長日之至也以冬至陽氣新用事故用辛始郊日以至者對建寅之月又祈穀郊祭此言始者對建寅為始也又王難鄭云鄭以祭法禘黃帝及嚳為配圜丘之祀祭法説禘無圜丘之名周官圜丘不名為禘是禘非圜丘之祭也鄭既以祭法禘嚳為圜丘又大傳王者禘其祖之所自出而鄭又施之郊祭后稷是亂禮之名實也爾雅云禘大祭也繹又祭也皆祭宗廟之名則禘是五年大祭先祖非圜丘及郊也又詩后稷配天之頌無帝嚳配圜丘之文知郊則圜丘圜丘則郊所在言之則謂之郊所祭言之則謂之圜丘於郊築泰壇象圜丘之形以丘言之本諸天地之性故祭法云燔柴於泰壇則圜丘也此云周之始郊日以至周禮云冬至祭天於圜丘知圜丘與郊是一也如王所據經傳分明坡謂詩皇皇后帝皇祖后稷享以騂犧是魯郊牲用騂與周郊牲從玉色異矣穀梁言郊期云我以十二月下辛卜正月上辛如不從則以正月下辛卜二月上辛如不從則以二月下辛卜三月上辛是魯郊日用辛與周禮言冬日至於地上之圜丘異矣成王褒周公殊以殷禮如牲用白牲是也故魯君乘大路亦用殷車與周王玉路以祀異矣魯雖侯爵得畫服如上公故魯君被衮與周王大裘異矣郊特牲所言明是魯郊而又稱王乃東魯儒生不見王府典籍意以周郊如魯遂以魯事記周禮如孟子言周室班爵祿乃是殷制可見矣蓋古者王朝典法不可輕見孔子若非孟僖子資以車財適周亦無由得禮學之戰國䇿士每言窺周室則可案圖籍以爭天下可見其難也作記者見周用冬日至魯郊用辛不得其謂故以意合之曰郊之用辛乃始郊辛日適值日至鄭知其誤故分周郊魯郊又分寅月子月又分圜丘南郊今載王氏迎長日之至為子月郊即圜丘以補鄭闕而載鄭注言此記之誤以定周魯之郊庶得其意若徒呼鄭某斥祖緯外強中乾得無往遺之禽而反為詬乎卜郊受命於祖廟作龜於禰宫尊祖親考之義也集説曰告於祖廟而行事則如受命於祖此尊祖之義作灼也灼龜以卜而於禰宫此親考之義坡謂疏曰或云祭天用冬至之日或云用冬至之月張融云祀天神率執事而卜日圜丘既卜日則不得正用冬至之日張據周官冡宰分明定解則此卜實兼日與牲尸不但牲也陳注未是卜之日王立於澤親聼誓命受教諫之義也注曰澤澤宫也所以擇賢之宫也既卜必到澤宫擇可與祭祀者因誓敕之以禮也疏曰告祖作禰是受教義也又立澤聼誓是受諫義也獻命庫門之內戒百官也大廟之命戒百姓也集説曰王自澤宫而還有司獻王所以命百官之事王乃於庫門內集百官而戒之又於大廟之內戒其族姓之臣也王自此還齊路寢之室祭之日王皮辨以聼祭報示民嚴上也喪者不哭不敢凶服汜掃反道鄉為田燭弗命而民聼上集説曰祭報報白日時早晚及牲事之備具也未郊故未服大裘而衣且服日視朝之服也汜掃灑水而後掃也反道反道路之土反之令新者在上也鄉郊內六鄉也六鄉之民各於田首設燭照路恐王行事之早也喪者不哭以下諸事皆不待上令而民自聼從蓋嵗以為常也祭之日王被衮以象天注曰象天謂有日月星辰之章也疏曰家語定公問郊祀孔子對之與此文同皆以為天子郊祀之事周禮圜丘服大裘此及家語服衮冕戴冕璪十有二旒則天數也乘素車貴其質也旗十有二旒龍章而設日月以象天也天垂象聖人則之郊所以明天道也注曰天之大數不過十二設日月畫於旗上素車殷路也魯公之郊用殷禮也疏曰龍為陽氣變化日月以光照下皆是象天也天垂象三句總結上事帝牛不吉以為稷牛帝牛必在滌三月稷牛唯具所以别事天神與人鬼也萬物本乎天人本乎祖此所以配上帝也郊之祭也大報本反始也集説曰郊祀后稷以配天故祭上帝者謂之帝牛祭后稷者謂之稷牛滌者牢中清除之所也此二牛皆在滌中為猶用也若至期卜牲不吉或有死傷即用稷牛為帝牛而别選稷牛也非在滌三月者不可為帝牛故以稷牛代之稷乃人鬼其牛但得其用足矣故云稷牛唯具物本乎天人本乎祖注云言俱本可以配疏云謝其恩謂之報歸其初謂之反此文天神尊故加大字天子大蠟八伊耆氏始為蠟蠟也者索也歲十二月合聚萬物而索饗之也疏曰萬物非所饗但饗其萬物之神集説曰蠟祭八神先嗇一司嗇二農三郵表畷四貓虎五坊六水庸七昆蟲八伊耆氏堯也索求索也歲十二月周之正數謂建亥之月也饗者祭其神也萬物有功加於民者神使為之也祭之以報焉蠟之祭也主先嗇而祭司嗇也祭百種以報嗇也注曰先嗇若神農者司嗇后稷是也疏曰以先嗇為主而司嗇從祭也百種則農及郵表畷禽獸等所以祭之者報其助嗇之功使盡享焉饗農及郵表畷禽獸仁之至義之盡也集説曰農古之田畯有功於民者郵者郵亭之舍也標表田畔相連畷處造為郵舍田畯居之以督耕者故謂之郵表畷禽獸貓虎之屬也古之君子使之必報之迎貓為其食田鼠也迎虎為其食田豕也迎而祭之也祭坊與水庸事也集説曰田鼠田豕皆能害稼故食之者為有功迎者迎其神也坊隄也以蓄水亦以障水庸溝也以受水亦以泄水皆農事之備故曰事也眉山蘇氏以為迎貓則為貓之尸迎虎則為虎之尸近於倡優所為是以子貢言一國之人皆若狂也曰土反其宅水歸其壑昆蟲毋作草木歸其澤注曰此蠟祝辭也若辭同則祭同處可知矣壑猶坑也昆蟲暑生寒死螟螽之屬為害者也疏曰土即坊也歸其宅則得不崩水即水庸歸其壑則不泛濫草苔稗木榛梗之屬歸生藪澤之中不得生於良田害嘉穀也陳辭有水土昆蟲草木者以其無知故特有辭也先嗇之屬有知故不假辭也據此祭草木有辭則草木當有神八蠟不數之者以草木遍地皆是不如坊與水庸之屬各指一物故不數皮辨素服而祭素服以送終也葛帶榛杖喪殺也蠟之祭仁之至義之盡也集説曰物之助成嵗功者至此而老老則終矣故皮辨素服葛帶榛杖以送之喪禮之殺也此為義之盡祭報其功則仁之至也周禮籥章云國祭蠟則吹豳頌擊土鼓以息老物黃衣黃冠而祭息田夫也野夫黃冠黃冠草服也注曰祭謂既蠟臘先祖五祀也於是勞農以休息之論語云黃衣狐裘言祭以息民物象其時物之色季秋而草木黃落疏曰上云蠟此云祭故知蠟畢而臘對文蠟臘有别總其俱名蠟也大羅氏天子之掌鳥獸者也諸侯貢屬焉草笠而至尊野服也注曰諸侯於蠟使使者戴草笠貢鳥獸也疏曰周禮羅氏掌羅烏鳥蠟則作羅襦羅氏致鹿與女而詔客告也以戒諸侯曰好田好女者亡其國集説曰鹿者田獵所獲女則所俘於亡國者客貢使也使者將返羅氏以鹿與女示使者以王命詔之使歸告其君而以王言戒之曰好田獵好女色者必亡其國天子樹瓜華不斂藏之種也注曰華果蓏也又詔以天子樹瓜蓏而已戒諸侯以蓄藏藴財利也集説曰天子所種者瓜華供一時之用而已不是收斂久藏之種也若可收斂久藏之物則不樹之惡與民爭利也此亦令使者歸告戒其君之事八蠟以記四方四方年不順成八蠟不通以謹民財也順成之方其蠟乃通以移民也既蠟而收民息已故既蠟君子不興功注曰移之言羡也收謂收斂積聚也息民與蠟異則黃衣黃冠而祭為臘必矣疏曰記四方者因蠟祭而記四方之國有豐凶也四方之內年穀不得和順成熟則當方八蠟之神不得與諸方通祭所以使民謹慎財物也移之言羡者以蠟祭豐饒皆醉飽酒食使民歆羡也上文雖云黃衣黃冠而祭不云臘之與蠟似為一此文先云蠟後息民是息民為臘與蠟異也是以云為臘必矣故月令臘在祈天宗之下但不知臘與蠟相去幾日惟隋禮及今禮皆蠟之後日不興功謂不興農功恆豆之菹水草之和氣也其醢陸産之物也加豆陸産也其醢水物也注曰此謂諸侯也疏曰醢人加豆謂尸食訖酳尸所加之豆則此恆豆者朝事及饋食俱為恆豆也恆豆之菹水草若昌本茆菹醢若麋臡麏臡酳尸加豆陸産若葵菹豚拍水物若螺醢魚醢是也坡謂周禮醢人鄭注云全物若䐑為菹肉菜通稱案天子恆豆加豆水陸雜錯與此文異即儀禮聘禮公食大夫八豆亦與此文不同恐記者以多言之舉其大都耳籩豆之薦水土之品也不敢用常褻味而貴多品所以交於神明之義也非食味之道也疏曰連言籩者是配豆之物所盛有麷蕡白黑則土所生也鮑魚則水物也但籩盛陸産甚多熊氏曰籩實若菱芡之類豆實若芹蒲之類水之品也籩實若棗栗之類豆實若菁韭之類土之品也先王之薦可食也而不可耆也卷冕路車可陳也而不可好也武壯而不可樂也宗廟之威而不可安也宗廟之器可用也而不可便其利也所以交於神明者不可同於所安樂之義也疏曰祭祀薦羞質而無味不可歆嗜衮冕路車尊嚴不可尋常乘服以為榮好也武是萬舞大武也以示壯勇之容不可常為娛樂宗廟嚴肅不可寢處其中以自安宗廟之器共事神明不可回便以為私利也所以交於神明二句總結上文酒醴之美玄酒明水之尚貴五味之本也黼黻文繡之美疏布之尚反女功之始也莞簟之安而蒲越稿鞂之尚明之也大羮不和貴其質也大圭不琢美其質也丹漆雕幾之美素車之乘尊其朴也貴其質而已矣所以交於神明者不可同於所安褻之甚也如是而后宜注曰尚質貴本其至如是乃得交於神明之宜也明水司恆以隂鑑所取於月之水也蒲越稿鞂藉神席也明之者神明之也琢當為篆字之誤也幾謂漆飾沂鄂也疏曰玄酒水也列尊之時明水在五齊上玄酒在三酒上是尊尚之疏布之尚者禮器云犧尊疏布冪是也雕謂刻鏤貴其質而已者此一句包上酒醴以下諸事鼎爼竒而籩豆偶隂陽之義也黃目鬱氣之上尊也黃者中也目者氣之清明者也言酌於中而清明於外也疏曰示人君慮於祭事必斟酌盡於中而外盡其清明潔淨也集説曰黃目黃彛也卣罍之類以黃金鏤其外以為目因名焉用貯鬱鬯之酒有芬芳之氣故云鬱氣中中央之色也熊氏曰目之精水也其光火也以水為體故其氣清以火為用故其氣明祭天掃地而祭焉於其質而已矣醢醢之美而煎鹽之尚貴天産也割刀之用而鸞刀之貴貴其義也聲和而後斷也疏曰餘物皆人功和合為之鹽則天産自然煎鍊治之也尚者設之於醯醢之上必用鸞刀者取其鸞鈴之聲調和而後斷割其肉也貴其義是貴聲和之義冠義始冠之緇布之冠也大古冠布齊則緇之其緌也孔子曰吾未之聞也冠而敝之可也集説曰冠義言冠禮之義也冠禮三加先加緇布冠是太古齊時之冠也唐虞以上曰太古緇布為之不用笄用頍以圍髮際而結於項中因綴之以固冠耳不聞有垂下之緌也此冠後世不復用而初冠暫用之不忘古也冠禮既畢則敝棄之可矣玉藻云緇布冠繢緌是諸侯位尊盡飾故也然亦後世之為耳適子冠於阼以著代也醮於客位加有成也三加彌尊喻其志也冠而字之敬其名也集説曰著代顯其為人主之次也酌而無酬酢曰醮客位在户牖之間加有成加禮於有成之人也三加疏云初加緇布冠欲其尚質重古次加皮辨欲其行三王之德後加爵辨欲其行敬事神明所以曉喻冠者令其志意益大也此適子之禮若庶子則冠於房户外南靣醮亦户外也夏殷之禮醮用酒每一加而一醮周則用醴三加畢乃總一醴也委貌周道也章甫殷道也母追夏后氏之道也注曰或謂委貌為玄冠委猶安也言所以安正容貌章明也言以表明文夫也甫或為父毋發聲也追猶堆也以其形名之三冠皆所常服以行道也其制之異同未之聞賈疏曰上緇布冠也諸侯以下始加之冠此委貌之等記人以經有緇布冠皮辨爵辨玄冠故還記緇布冠以下四種之冠以解經之四者此委貌即解經易服服玄端是也坡謂既曰冠而敝之如何公西華又曰端章甫以章甫配端則章甫為玄端明矣先儒熟思推鮮不可輕破除者此類是也今詳載儀禮注疏以正陳説周辨殷冔夏收集説曰周之辨殷之冔夏之收各是時王所制以為三加之冠注云辨名出於槃槃大也冔名出於幠幠覆也收所以收斂其髮也形制未聞三王共皮辨素積集説曰皮辨以白鹿皮為之其服則十五升之布也白與冠同以素為裳而辟積其要中故云皮辨素積也三代皆以此為再加之冠服無大夫冠禮而有其昏禮古者五十而後爵何大夫冠禮之有注曰言年五十乃爵為大夫也其有昏禮或改取也諸侯之有冠禮夏之末造也注曰言夏初以上諸侯雖有幼而即位者猶以士禮冠之亦五十乃爵命也至其衰末未成人者多見篡弒乃更即位則爵命之以正君臣而有諸侯之冠禮天子之元子士也天下無生而貴者也注曰儲君副主猶云士也明人有賢行著德乃得貴也繼世以立諸侯象賢也注曰賢者子孫恆能法其先父德行以官爵人德之殺也疏曰言官爵之授隨德隆殺也死而諡今也古者生無爵死無諡注曰古謂殷以前也大夫以上乃謂之爵死有諡也周制爵及命士雖及之猶不諡耳今記時死則諡之非禮也禮之所尊尊其義也失其義陳其數祝史之事也故其數可陳也其義難知也知其義而敬守之天子之所以治天下也集説曰先王制禮皆有精微之理所謂義也禮之所以為尊以其義之可尊耳玉帛爼豆各有多寡厚薄之數數之陳列者人皆可得而見義之精微者不學則不能知也祝史其能知之乎此總結前章冠義以下坡謂此因章首冠義二字而推明之蓋儀禮所列其數也此所言其義也下文言昏亦是義也故疏云記人因上起下於中説重禮之義天地合而後萬物興焉夫昏禮萬世之始也取於異姓所以附逺厚别也幣必誠辭無不腆告之以直信信事人也信婦德也一與之齊終身不改故夫死不嫁注曰齊謂共牢而食同尊卑也集説曰附逺附猶託也託於逺嫌之義也厚别重其有别之禮也幣誠辭腆是欲告戒為婦者以正直誠信之行信其能盡事人之道信其能有為婦之德也此以下言昏禮之義男子親迎男先於女剛柔之義也天先乎地君先乎臣其義一也執摯以相見敬章别也注曰言不敢相褻也摯所奠雁也疏曰先謂倡道之摯雁也章明也壻親迎入門先奠雁後乃與婦相見是先行敬以明夫婦有别不妄交親男女有别然後父子親父子親然後義生義生然後禮作禮作然後萬物安注曰言人倫有别則氣性醇也坡謂此數語至要以古言之衛宣晉獻蒸報無别雖生急子申生之賢父子能有親乎不親則顛倒錯亂能有義乎不義則殺嫡立庶能有禮乎衛為狄滅男女遺民止七百餘人晉三世亂國幾亡萬物能安乎且見士庶之家有犯及者不惟不安而已天威人禍幾無易種不可不講也無别無義禽獸之道也注曰言聚麀之亂類也壻親御授綏親之也親之也者親之也敬而親之先王之所以得天下也出乎大門而先男帥女女從男夫婦之義由此始也婦人從人者也幼從父兄嫁從夫夫死從子夫也者夫也夫也者以知帥人者也集説曰親御婦車而授之綏是親愛之義也親之乃可使之親己故曰親之也者親之也太王爰及薑女文王親迎於渭皆有敬而親之之道以至於有天下故曰先王之所以得天下也大門女家之門也先壻車在前也女從男婦車隨之也從人謂順其教令夫也者丈夫也丈夫者以才智帥人者也玄冕齊戒鬼神隂陽也將以為社稷主為先祖後而可以不致敬乎疏曰士昏用爵辨是士服之上者則天子以下皆用上服以五冕色俱玄故總稱玄冕也齊戒自整敕也隂陽謂夫婦也著祭服而齊戒親迎是敬此夫婦之道如事鬼神集説曰蓋將以主社稷之祭祀承先祖之宗廟也可不以敬社稷與先祖之禮敬之而玄冕齊戒乎共牢而食同尊卑也故婦人無爵從夫之爵坐以夫之齒器用陶匏尚禮然也三王作牢用陶匏厥明婦盥饋舅姑卒食婦餕餘私之也舅姑降自西階婦降自阼階授之室也昏禮不用樂幽隂之義也樂陽氣也昏禮不賀人之序也集説曰牢爼也尚禮然謂古來所尚之禮如此共牢之禮雖三王所作而爼之外其器但用陶匏而已重夫婦之始也厥明昏禮之明日也盥饋盥潔而饋食也私之猶言恩也人之序謂相承代之次序也有虞氏之祭也尚用氣血腥爓祭用氣也集説曰尚用氣以用氣為尚也初以血詔神於室次薦腥肉於堂爓謂沉肉於湯次腥亦薦於堂皆未熟故云用氣此以下至篇末皆言祭禮殷人尚聲臭味未成滌蕩其聲樂三闋然後出迎牲聲音之號所以詔告於天地之間也疏曰不言夏或從虞也集説曰牲未殺則未有臭味故云臭味未成滌蕩宣播之意鬼神在天地間與隂陽合散同一理而聲音之感無間顯幽故殷人之祭必先作樂三終然後出而迎牲於廟門之外此是欲以此樂之聲音號呼而詔告於兩間庶幾神明聞之而來格也周人尚臭灌用鬯臭鬱合鬯臭隂逹於淵泉灌以圭璋用玉氣也既灌然後迎牲致隂氣也集説曰周人尚氣臭而祭必先求諸隂故牲之未殺先酌鬯酒灌地以求神以鬯之有芳氣也故曰灌用鬯臭又搗鬱金香草之汁和合鬯酒使香氣滋甚故云鬱合鬯也以臭而求諸隂其臭下逹於淵泉矣灌之禮以圭璋為瓚之柄玉瓚以酌鬯玉氣潔潤亦是尚臭也周言用玉則殷不用圭瓚矣灌後乃迎牲是欲先致氣於隂以求神故云致隂氣也蕭合黍稷臭陽逹於牆屋故既奠然後焫蕭合羶薌凡祭愼諸此集説曰蕭香蒿也取此蒿及牲之脂膋合黍稷而燒之使其氣旁逹於牆屋之間是以臭而求諸陽也此是周人後求諸陽之禮既奠謂薦熟時堂上事尸禮畢延尸於户內而薦之孰祝先酌酒奠於鉶南而尸猶未入蕭脂黍稷之燒正此時也馨香即黍稷也既奠以下是明上文焫蕭之時非再焫也此是天子諸侯之禮非大夫士禮也魂氣歸於天形魄歸於地故祭求諸隂陽之義也殷人先求諸陽周人先求諸隂詔祝於室坐尸於堂疏曰詔告也祝呪也天子諸侯朝事之時坐尸於堂户西南靣坐主在西方東靣尸主之前則薦用籩豆也祝乃取牲膟膋燎於爐炭入告神於室又出墮於主前墮謂分減肝膋以祭主前也當此時主人乃親洗肝於鬱鬯而燔之以制於主前制割也謂割其肝而不相離用牲於庭升首於室注曰用牲於庭謂殺之時也制祭之後升牲首於北墉下尊首上氣也疏曰三牲之首皆升直祭祝於主索祭祝於祊不知神之所在於彼乎於此乎或諸逺人乎祭於祊尚曰求諸逺者與注曰謂薦孰時也如特牲少牢饋食之為也直正也祭以孰為正則血腥之屬盡敬心耳索求神也廟門曰祊疏曰正祭之時祝官以祝辭告於主若少牢所云薦嵗事於皇祖伯某是也祊有二種一是正祭之時既設祭於廟又求神於廟門之內詩云祝祭于祊注云祊門內平生待賔客之處與祭同日也二是明日繹祭之時設饌於廟門外西室此索祭是祭日之祊也不知神之所在為於彼室乎為於此堂乎故兩處設饌也或逺離於人不在廟乎尚庶幾也祭於祊庶幾求於逺處者與祊之為言倞也肵之為言敬也富也者福也首也者直也相饗之也嘏長也大也尸陳也毛血告幽全之物也告幽全之物者貴純之道也注曰倞猶索也富者人君嘏辭有富此訓之也相謂詔侑也詔侑尸者欲使饗此饌也尸或詁為主此尸神象當從主訓之言陳非也純謂中外皆善疏曰少牢設饌之後尸祭饌訖祝取牢心舌載於肵爼設於饌北尸每食牲體反置於肵爼是主人敬尸之爼也直正也言首為一體之正嘏尸嘏主人欲使長久廣大也用牲於庭王啓其毛而祝以血毛告於室血是告幽之物毛是告全之物幽者言牲肉𠂻美善全者外色完具血祭盛氣也祭肺肝心貴氣主也祭黍稷加肺祭齊加明水報隂也取膟膋燔燎升首報陽也明水涗齊貴新也凡涗新之也其謂之明水也由主人之潔著此水也集説曰血祭至主也此是堂上制祭後又薦血腥時也有血有氣乃為生物血由氣以滋死則氣盡而血亦枯矣故血祭者所以表其氣之盛也肺肝心皆氣之所舍故云氣主周祭肺殷祭肝夏祭心也祭黍稷加肺者謂尸隋祭之時以黍稷兼肺而祭也祭齊加明水謂尸正祭之時陳列五齊之尊又加明水之尊也祖考形魄歸地屬隂而肺於五行屬金金水隂也故加肺加明水是以隂物而報隂靈也膟膋腸間脂也朝踐時祝取膟膋燎於爐炭至薦孰時祝更取膟膋及蕭與黍稷燒之膟膋黍稷陽也牲首亦陽體魂氣歸天為陽此以陽物報陽靈也明水隂鑑所取月中之水涗猶清也泲漉五齊而使之清故云涗齊所以設明水及涗齊者貴其新潔也凡涗新之也專主涗齊而言故下文又釋明水之義潔著潔淨而明著也自月而生故謂之明周禮五齊一泛齊二醴齊三盎齊四緹齊五沈齊君再拜稽首肉袒親割敬之至也敬之至也服也拜服也稽首服之甚也肉袒服之盡也祭稱孝孫孝子以其義稱也稱曾孫某謂國家也祭祀之相主人自致其敬盡其嘉而無與讓也集説曰服者服順於親也拜服也謂再拜是服順也稽首為服順之甚肉袒為服順之盡言服順之誠在內今又肉袒則內外皆服矣故云服之盡祭主於孝士之祭稱孝孫孝子是以祭之義為稱也諸侯有國卿大夫有家不但祭祖禰更祭曾祖以上但自曾祖以上惟稱曾孫而已故云稱曾孫某謂國家也蓋大夫三廟得事曾祖也上士二廟事祖禰中下士一廟祖禰共之相詔侑於尸也相者不告尸以讓蓋是主人敬尸自致其誠敬盡其嘉善無所與讓也腥肆爓腍祭豈知神之所饗也主人自盡其敬而已矣舉斝角詔妥尸古者尸無事則立有事而后坐也尸神象也祝將命也集説曰肆剔也祭之為禮或進腥體或薦解剔或進湯沈或薦煮孰豈知神果何所享乎主人不過盡其敬心而已耳斝與角爵名也天子曰斝諸侯曰角詔告也妥安也尸始即席舉斝角之時至尊之坐未敢自安祝告主人拜尸以妥安其坐前篇言夏立尸而卒祭此言古者蓋指夏時也夏之禮尸無事則立有飲食之事然後得坐也尸所以象所祭者故曰神象為祝者先以主人之辭告神後以神之辭嘏主人故日將命縮酌用茅明酌也集説曰縮泲也酌斟酌也謂醴齊濁泲而後可斟酌故云縮酌也用茅者以茅覆藉而泲之也周禮三酒一曰事酒二曰昔酒三曰清酒事酒為事而新作者其色清明謂之明酌言欲泲醴齊則先用此明酌和之然後用茅以泲之也不云泛齊者與醴齊同盞酒涗於清汁獻涗於盞酒疏曰以事酒泲醴齊清酒泲盎齊今泲秬鬯乃用盎齊而不以三酒者五齊卑故用三酒泲之秬鬯尊故用五齊泲之也集説曰盞酒盎齊也涗泲也清謂清酒也清酒冬釀接夏而成盎齊差清先和以清酒而後泲之故云盞酒涗於清以其差清故不用茅也其醍沈泲之與盞酒同汁獻謂摩挲秬鬯及鬱金之汁也秬鬯中有煮鬱又和以盎齊摩挲而泲之出其香汁故云汁獻涗於盞酒也猶明清與盞酒於舊澤之酒也注曰猶若也澤讀為醳舊醳之酒謂昔酒也泲醴齊以明酌泲盞酒以清酒泲汁獻以盞酒天子諸侯之禮也天子諸侯禮廢時人或聞此而不審知若云今明酌清酒與盞酒以舊醳之酒泲之矣就其所知以曉之也祭有祈焉有報焉有由辟焉集説曰此泛言祭禮又有此三者之例如周禮所云祈福祥求永貞祈年於田祖詩言春夏祈穀之類是祈也報謂獲福而報之祭禮多是報本之義由用也辟讀為弭如周禮所謂弭災兵逺罪疾之類由弭者用此以消弭之也齊之玄也以隂幽思也集説曰齊而玄冠玄衣順鬼神幽黯之意且以致其隂幽之思也故君子三日齊必見其所祭者注曰齊三日思其居處思其笑語思其志意思其所樂則見之也禮記述注卷十一
