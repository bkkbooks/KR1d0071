body:
  text: 禮記述註卷七安溪李光坡撰曽子問第七注曰曽子孔子弟子曽參也以其所問多明於禮故著姓名以顯之曽子問曰君薨而世子生如之何孔子曰卿大夫士從攝主北面於西階南註曰變於朝夕哭位也攝主上卿代君聽國政疏曰士喪禮朝夕内外哭位皆在東方大祝裨冕執束帛升自西階盡等不升堂命毋哭註曰裨冕者接神則祭服也疏曰大祝裨冕明卿大夫士等皆衣衰服也裨冕者衣裨衣而冠冕鄭註覲禮云裨之言埤也天子六服大裘為上其餘為裨又云衮衣裨之上者則裨唯據衣也等級也祝聲三告曰某之子生敢告升奠幣于殯東几上哭降衆主人卿大夫士房中皆哭不踊盡一哀反位遂朝奠小宰升舉幣註曰聲噫歆警神也几筵於殯東明繼體也衆主人君之親也房中婦人反位反朝夕哭位舉舉而下理之階間疏曰殯宫几筵為朝夕之奠常在不去今明世子是繼體之貴故於常几筵之外别特設之三日衆主人卿大夫士如初位北面大宰大宗大祝皆裨冕少師奉子以衰祝先子從宰宗人從入門哭者止子升自西階殯前北面祝立于殯東南隅祝聲三曰某之子某從執事敢見子拜稽顙哭祝宰宗人衆主人卿大夫士哭踊三者三降東反位皆袒子踊房中亦踊三者三襲衰杖奠出大宰命祝史以名徧告于五祀山川疏曰諸侯五日而殯殯而成服此三日而衰者䘮已在殯異於未殯也初位告生時也奉子以衰謂以衰衣而奉之升自西階不忍從先王之階於是宰宗人及祝亦升不言從者以子為主也祝立在子之西北而面當殯之東南故云殯東南隅也宰及宗人以次立于子之東皆北面告曰夫人某氏之子某從執事宰宗人等敢見稱子某者子升堂之時大宰即位立名告殯矣告訖奉子者拜哭每踊三度為一節如此者三故云三者三也降東反位者堂上皆降自西階反東在下者皆東反朝夕哭位踊襲衰杖成子禮也奠亦謂朝奠曽子問曰如已葬而世子生則如之何孔子曰大宰大宗從大祝而告于禰三月乃名于禰以名徧告及社稷宗廟山川疏曰禰父殯宫之主也既葬殯無尸柩惟有主在故告於主不云裨冕不云執帛未葬尚然葬後可知也三月乃見因見乃名王肅云前三日名之未葬當稱子某故三日因名之此經既葬稱子不稱名故三月乃名也徧告亦命祝史前不云社稷宗廟此不云五祀相互孔子曰諸侯適天子必告于祖奠于禰註曰皆奠幣以告之互文也冕而出視朝註曰聽國事也疏曰諸侯視朝用𤣥冠緇衣素裳今服冕者為朝天子天子於廟中受其禮故諸侯豫敬之以冕服視朝也命祝史告于社稷宗廟山川註曰臨行又徧告宗廟孝敬之心也乃命國家五官而后行註曰五官五大夫典事者命者敕之以其職疏曰不云命卿者或從君行或雖在國然總主羣吏不專一事且尊之道而出疏曰道而出者祖祭道神而後出行也委土為山或伏牲其上天子用犬諸侯用羊卿大夫以酒脯既行祭軷竟乘車轢之而遂行此城外之軷祭也其五祀行神則在宫内常祀在冬其位在廟門外西方軷壇厚二寸廣五尺輪四尺以菩芻棘柏為神主其祭宫内行神之軷及城外祖祭之軷其制不殊崔氏云宫内之軷祭古之行神城外之軷祭山川與道路之神壇名山其神曰纍告者五日而徧過是非禮也疏曰猶待徧告乃行也以五日為期近者就告逺者望告所以然者為先已告廟載主若久留不去則為非禮凡告用牲幣反亦如之註曰牲當為制字之誤也制幣一丈八尺疏曰知諸侯不用牲者約下文幣帛皮圭以告故知之諸侯相見必告于禰坡謂禰上當有祖字朝服而出視朝疏曰諸侯朝服𤣥冠緇衣素裳熊氏云此朝服謂皮弁服以天子用以視朝故謂之朝服聘禮諸侯相聘皮弁服明相朝亦皮弁服此義為勝命祝史告于五廟所過山川註曰山川所不過則不告貶於適天子也亦命國家五官道而出反必親告于祖禰乃命祝史告至于前所告者而後聽朝而入註曰反必親告祖禰同出入禮曽子問曰並有䘮如之何何先何後孔子曰葬先輕而後重其奠也先重而後輕禮也自啟及葬不奠行葬不哀次反葬奠而後辭於殯遂脩葬事其虞也先重而後輕禮也集説曰曽子問同時有父母或祖父母之䘮先後之次如何孔子言葬則先母而後父奠則先父而後母自從也從啟母殯之後及至葬柩欲出之前惟設母啟殯之奠朝廟之奠及祖奠遣奠而已不於殯宫為父設奠故云自啟及葬不奠謂不奠父也次者大門外之右平生待賔客之處柩至此則孝子悲哀柩車暫停今為父䘮在殯故行葬母之時孝子不得為母伸哀於所次之處故柩車不暫停也及葬母而反即於父殯設奠殯當為賔聲之誤也辭於賔謂告將葬啟期賔出之後孝子遂脩營葬父之事也葬是奪情之事故先輕奠是奉養之事故先重也虞祭亦奠之類故亦先重虞當異日孔子曰宗子雖七十無無主婦非宗子雖無主婦可也集説曰宗子領宗男於外宗婦領宗女於内禮不可缺故雖七十之年猶必再娶然此謂大宗之無子或子㓜者若有子有婦可傳繼者則七十可不娶矣曽子問曰將冠子冠者至揖讓而入聞齊衰大功之喪如之何孔子曰内喪則廢外喪則冠而不醴徹饌而埽即位而哭如冠者未至則廢集説曰冠者賔與贊禮之人也此人已及門而與主人揖讓以入矣主人忽聞齊衰大功之喪何以處之夫子言若是大門内之喪則廢而不行以冠禮行之於廟廟在大門之内吉㓙不可同處也若是大門外之喪喪在他處可以加冠但冠禮三加之後設醴以禮新冠之人今值㓙事止三加而止不醴之也初欲迎賔之時醴及饌具皆陳設今悉徹去又埽除冠之舊位使净潔更新乃即位而哭如賔與贊者未至即廢也如將冠子而未及期日而有齊衰大功小功之服則因䘮服而冠除喪不改冠乎孔子曰天子賜諸侯大夫冕弁服於大廟歸設奠服賜服於斯乎有冠醮無冠醴父没而冠則已冠埽地而祭於禰已祭而見伯父叔父而後饗冠者疏曰吉冠是吉時成人之服喪冠是喪時成人之服謂之醮者酌而無酬酢曰醮醴重而醮輕者醴是古之酒故為重醮用酒酒是後代之法故為輕也醮之所以異於醴者醴則三加之後總一醴之醮則每一加而行一醮也集説曰未及期日在期日之前也因喪服而冠者因著喪之成服而加喪冠也此是孔子之言曽子又問他日除喪之後不更改易而行吉冠之禮乎孔子答云諸侯及大夫有㓜弱未冠總角從事至當冠之年因朝天子天子於大廟中賜冕服弁服其受賜者歸即設奠告廟服所賜之服祭告之後使人酌酒以飲已榮上之賜不酬酢也所謂有冠醮也無冠醴者受賜服而來若改而更冠應從適子之尊冠必酌醴以禮之今既不醴明不改冠也受服於天子不可更改為初冠禮則因喪而冠安得有除喪改冠之禮乎父没而冠謂除喪之後以吉禮禮冠者蓋齊衰以下可因喪服而冠斬衰不可曽子問曰祭如之何則不行旅酬之事矣孔子曰聞之小祥者主人練祭而不旅奠酬於賔賔弗舉禮也昔者魯昭公練而舉酬行旅非禮也孝公大祥奠酬弗舉亦非禮也註曰奠無尸虞不致爵小祥不旅酬大祥無無算爵彌吉孝公隠公之祖父疏曰奠是未葬之前形體尚在未忍立尸虞是已葬之後形體已去故立尸以象神按特牲云祝延尸至食九飯主人祝酳尸尸卒爵酢主人主人卒爵主人又酌獻祝及佐食此主人之獻也又云主婦獻尸尸卒爵酢主婦主婦卒爵亦酌獻祝及佐食此主婦之獻也賔獻尸爵止註曰尸止爵者欲神惠之均於室中云虞不致爵者士虞禮賔獻尸尸卒爵禮畢無致爵以下事特牲又云尸止爵後席於户内主婦致爵于主人卒爵主婦受爵自爵酢主人致爵于主婦席于房中主婦卒爵主人更爵酢所謂致爵也賔作止爵尸飲酢賔賔飯獻祝及佐食致爵于主人主婦畢主人酌西階上獻賔及衆賔訖又洗觯酬賔訖主人酌于阼階上獻長兄弟及衆兄弟内兄弟于房中畢賔乃取酬觶於阼階前酬長兄弟長兄弟受觶於西階酬衆賔衆賔酬衆兄弟所謂旅酬也云小祥不旅酬者賔不舉酬觶以行旅事也旅酬之後賔弟子兄弟弟子各舉觶於其長賔取觶酬兄弟之黨長兄弟取觶酬賔之黨所謂無算爵也云大祥無無算爵者大祥得行旅酬而不得行此也曽子問曰大功之喪可以與於饋奠之事乎孔子曰豈大功耳自斬衰以下皆可禮也曽子曰不以輕服而重相為乎孔子曰非此之謂也天子諸侯之喪斬衰者奠大夫齊衰者奠士則朋友奠不足則取於大功以下者不足則反之集説曰饋奠奠於殯也大夫朔望皆有殷奠士惟月朔曽子問已有大功之喪可與他人饋奠之事乎孔子將謂曽子問已有大功之喪得為大功者饋奠否故答云豈但大功自斬衰以下皆可禮也言身有斬衰所為者斬衰身有齊衰所為者齊衰皆可與其饋奠孔子是據所服者言之曽子又不悟此㫖將謂言他人乃曰不太輕已之服而重於相為乎孔子乃答云非此為他人之謂也謂於所為服者也凡喪奠主人以悲哀不暇執事故不親奠天子諸侯之喪諸臣皆斬衰故云斬衰者奠大夫則兄弟之服齊衰者奠屬臣服斬者不奠避正君也士不以齊衰者奠避大夫也故遣僚屬奠僚屬則朋友也朋友不足則取大功以下小功緦麻者奠又不足則反取大功以上也言不足者謂殷奠時曽子問曰小功可以與於祭乎註曰祭謂虞卒哭時疏曰知非練祥者以士練祥之祭大功之服已除不得云取於兄弟大功以下者其天子諸侯則得兼練祥也以其練祥時猶斬衰與祭也孔子曰何必小功耳自斬衰以下與祭禮也曽子曰不以輕喪而重祭乎孔子曰天子諸侯之喪祭也不斬衰者不與祭大夫齊衰者與祭士祭不足則取於兄弟大功以下者曽子問曰相識有喪服可以與於祭乎孔子曰緦不祭又何助於人疏曰熊氏云身有緦服不得為父母虞祔卒哭祭此謂同宫緦若大夫士有齊衰大功小功緦同宫則亦不祭若異宫則殯後得祭故雜記云父母之喪將祭而昆弟死既殯而祭若同宫則雖臣妾葬而後祭虞祔亦然天子諸侯臣妾死於宫中雖無服亦不得為虞祔卒哭祭也天子諸侯適子死斬衰既練乃祭為適孫適婦殯乃祭以異宫故也集説曰所知識之人有祭事而已有喪服可以助為之執事否夫子言已有緦麻之服服之輕者也尚不得自祭已之宗廟何得助他人之祭乎曽子問曰廢喪服可以與於饋奠之事乎孔子曰説衰與奠非禮也以擯相可也集説曰廢猶除也饋奠在殯之奠也不問吉祭而問喪奠曽子之意謂方除喪服决不可與吉禮疑可與饋奠也夫子言方説衰即與奠是忘哀太速故言非禮也殯相事輕亦或可耳曽子問曰昏禮既納幣有吉日女之父母死則如之何孔子曰壻使人弔如壻之父母死則女之家亦使人弔父喪稱父母喪稱母父母不在則稱伯父世母壻已葬壻之伯父致命女氏曰某之子有父母之喪不得嗣為兄弟使某致命命女氏許諾而弗敢嫁禮也壻免喪女之父母使人請壻弗取而后嫁之禮也集説曰有吉日者期日已定也彼是父喪則此稱父之名弔之彼是母喪則此稱母之名弔之父母或没或在他所則稱伯父伯母名如無伯父母則用叔父母名可知壻雖巳葬其親而喪期尚逺不欲使彼女失嘉禮之時故使人致命使之别嫁他人某之子此某字是伯父之名不得嗣為兄弟者言繼此不得為夫婦也夫婦同等有兄弟之義亦親之之辭不曰夫婦者未成昏嫌也使某致命此某字是使者之名女氏雖許諾而不敢以女嫁於他人禮也及壻祥禫之後女之父母使人請壻成昏壻終守前説而不取而後此女嫁於他族禮也女之父母死壻亦如之集説曰女之父母死女之伯父致命于男氏曰某之子有父母之喪不得嗣為兄弟使某致命男氏許諾而不敢娶女免喪壻之父母使人請女家不許壻然後别娶也曽子問曰親迎女在塗而壻之父母死如之何孔子曰女改服布深衣縞總以趨喪女在塗而女之父母死則女反集説曰嫁服士妻褖衣大夫妻展衣卿妻鞠衣改服更其嫁服也衣與裳相連而前後深邃故曰深衣縞生白絹也總束髮也長八寸布為深衣縞為總婦人治喪未成服之服也故服此以奔舅姑之喪女子在室為父三年父卒亦為母三年已嫁則期今既在塗非在室矣則止用奔喪之禮而服期改服亦布深衣縞總也如壻親迎女未至而有齊衰大功之喪則如之何孔子曰男不入改服於外次女入改服於内次然後即位而哭曽子問曰除喪則不復昏禮乎孔子曰祭過時不祭禮也又何反於初集説曰此齊衰大功之喪謂壻家也改服改其親迎之服而服深衣於門外之次也女謂婦也入門内之次而以深衣更其嫁服也註云不聞喪即改服者昏禮重於齊衰以下此特問齊衰大功之喪者以小功及緦輕不廢昏禮禮畢乃哭耳若女家有齊衰大功之喪女亦不反歸也曽子又問除喪之後豈不復更為昏禮乎孔子言祭重而昏輕重者過時尚廢輕者豈可復行乎然此亦止謂四時常祭耳若喪祭及禘祫大祭過時猶追也孔子曰嫁女之家三夜不息燭思相離也取婦之家三日不舉樂思嗣親也三月而廟見稱來婦也擇日而祭於禰成婦之義也集説曰思相離則不能寢寐故不滅燭思事親則不無感傷故不舉樂此昏禮所以不賀也成婚而舅姑存者明日婦見舅姑若舅姑已殁則成婚三月乃見於廟祝辭告神曰某氏來婦來婦言來為婦也葢選擇吉日而行此禮廟見祭禰即是一事非見廟之後更擇日而祭也成婦之義者成盥饋之禮之義也曽子問曰女未廟見而死則如之何孔子曰不遷於祖不祔於皇姑壻不杖不菲不次歸葬于女氏之黨示未成婦也集説曰不遷於祖不遷柩而朝於壻之祖廟也不祔於皇姑以未廟見故主不得祔姑之廟也壻齊衰期但不杖不草屨不别處哀次耳女之父母自降服大功坡謂歸葬於女氏之黨仍祔其女家之王母夫家不祀之也詳見雜記上女子祔於王母則不配註中甚矣鄭子之宻也曽子問曰取女有吉日而女死如之何孔子曰壻齊衰而弔既葬而除之夫死亦如之集説曰若夫死女以斬衰往弔既葬而除也坡謂此禮可謂仁至雖有義夫貞女有本服以寄其哀有數月以盡其禮則自知循禮之為是且曰既葬除之葢恩未深而禮有終則自知輕死之為過情矣曽子問曰喪有二孤廟有二主禮與孔子曰天無二日土無二王嘗禘郊社尊無二上未知其為禮也集説曰二孤二廟當時有之曽子疑其非禮故問夫子言天猶不得有二日土猶不得有二王嘗則大祖尊禘則所自出尊郊則天尊社則地尊雖衆神並在猶先尊後卑一一祭之不一時總祭喪可得有二孤廟可得有二主乎非禮明矣昔者齊桓公亟舉兵作偽主以行及反藏諸祖廟廟有二主自桓公始也註曰舉兵以遷廟主行無則主命為假主非也喪之二孤則昔者衞靈公適魯遭季桓子之喪衞君請弔哀公辭不得命公為主客入弔康子立於門右北面公揖讓升自東階西鄉客升自西階弔公拜興哭康子拜稽顙於位有司弗辨也今之二孤自季康子之過也集説曰國君弔鄰國之臣尊卑不等衞公弔而哀公為主禮也禮大夫既殯而君來弔主人門右北面哭拜稽顙今既哀公為主主則拜賔康子但當哭踊而已乃拜而稽顙於位是二孤矣當時有司不能論而正之遂至循襲為常變禮之失由於康子上章言自桓公始此不言始而言過者孔子康子同時也靈公以哀公二年夏卒桓子以三年秋卒是出公也曽子問曰古者師行必以遷廟主行乎孔子曰天子巡守以遷廟主行載于齊車言必有尊也今也取七廟之主以行則失之矣集説曰遷廟主謂新祧廟之主也齊車金路也又名曰公禰當七廟五廟無虚主虚主者唯天子崩諸侯薨與去其國與祫祭於祖為無主耳吾聞諸老聃曰天子崩國君薨則祝取羣廟之主而藏諸祖廟禮也卒哭成事而后主各反其廟註曰老聃古夀考者之號也與孔子同時疏曰卒哭主各反其廟者為明日祔時須以新死者祔祭于祖故祖主先反廟也集説曰崩薨而羣主皆聚祖廟以喪三年不祭且象生者為凶事而聚集也君去其國大宰取羣廟之主以從禮也註曰鬼神依人者也祫祭於祖則祝迎四廟之主主出廟入廟必蹕老耼云集説曰諸侯五廟祫祭則迎髙曽祖禰入太祖之廟主出入必蹕止行者若有喪及去國無蹕禮也曽子問曰古者師行無遷主則何主孔子曰主命問曰何謂也孔子曰天子諸侯將出必以幣帛皮圭告於祖禰遂奉以出載於齊車以行每舍奠焉而後就舍反必告設奠卒歛幣玉藏諸兩階之間乃出葢貴命也疏曰此一節論師出當取遷主及幣帛皮圭以行廟無虚主之事皇氏云有遷主者以幣帛告神不將以出即埋之階間無遷主者加以皮圭告于祖禰遂奉以出熊氏云每廟皆以幣玉告告畢將所告逺祖幣玉載之而行若近祖幣玉即埋之反時以此載行幣玉告於逺祖畢則埋於逺祖階間近祖以下直告祭而已不陳幣玉也子游問曰喪慈母如母禮與註曰如母謂父卒三年也子游意以為國君亦當然禮所云者乃大夫以下父所使妾養妾子疏曰父卒三年父在則期也鄭註喪服大夫妾子父在為母大功士妾子父在為母期則父在為慈母亦當與已母同必知大夫以下者天子諸侯不服庶母孔子曰非禮也古者男子外有傅内有慈母君命所使教子也何服之有註曰言無服也此指為國君之子也大夫士之子為庶母慈巳者服小功父卒乃不服疏曰國君之子尚不服庶母則國君不服可知也云父卒不服不服小功仍服緦耳坡謂此慈母乃内則擇於諸母使為子師為慈母為保母之慈母上註所云三年之慈母則是父特命使為母子者與此異也喪服傳自明昔者魯昭公少喪其母有慈母良及其死也公弗忍也欲喪之有司以聞曰古之禮慈母無服註曰據國君也良善也昭公年三十乃喪齊歸又無戚容是不少又安能不忍於慈母此非眧公明矣未知何公也疏曰按家語云孝公有慈母良今云未知何公者鄭不見家語故也今也君為之服是逆古之禮而亂國法也若終行之則有司將書之以遺後世無乃不可乎公曰古者天子練冠以燕居公弗忍也遂練冠以喪慈母喪慈母自魯昭公始也集説曰古者周以前也天子諸侯之庶子為天子諸侯者為其母緦春秋有以小君之禮服之者以子貴而伸也然必適小君没若適小君在則其母厭屈故練冠也此言練冠以燕居謂庶子之為王者為其母耳曽子問曰諸侯旅見天子入門不得終禮廢者幾孔子曰四請問之曰大廟火日食后之喪雨霑服失容則廢如諸侯皆在而日食則從天子救日各以其方色與其兵大廟火則從天子救火不以方色與兵集説曰旅衆也大廟始祖廟宗廟皆然主於始祖耳色衣之色也東方諸侯衣青南方諸侯衣赤餘倣此東方用㦸南方矛西方弩北方楯中央鼔日食是隂侵陽故正五行之方色以厭勝之救火不闗此義也曽子問曰諸侯相見揖讓入門不得終禮廢者幾孔子曰六請問之曰天子崩大廟火日食后夫人之喪雨霑服失容則廢集説曰大廟本國之大廟也夫人小君也曽子問曰天子嘗禘郊社五祀之祭簠簋既陳天子崩后之喪如之何孔子曰廢註曰既陳謂夙興陳饌牲器時也坡謂五祀或句芒等五官或户竈五者而祭法又言七祀其五與月令同惟多司命泰厲耳周則司命在神祀中而荀子曰郊則并百王於上而祭之則泰厲存焉是周惟有五祀而七祀或儒者廣記異代非可武斷也曽子問曰當祭而日食大廟火其祭也如之何孔子曰接祭而已矣如牲至未殺則廢註曰接祭而已不迎尸也疏曰迎尸有二一是祭初迎尸於奥而行灌畢而出迎牲於時迎尸於户外行朝踐禮是一也後退而合亨又迎尸入坐於奥行饋孰禮是二也此云不迎尸者直朝踐禮畢則止不更迎尸而入此謂宗廟之祭若郊社五祀祭初未迎尸之前已殺牲以其無灌故也則不迎尸乃得為祭初不迎尸也接㨗也㨗速也天子崩未殯五祀之祭不行既殯而祭其祭也尸入三飯不侑酳不酢而已矣自啟至於反哭五祀之祭不行已葬而祭祝畢獻而已註曰祝畢獻而止郊社亦然惟嘗禘宗廟俟告也疏曰趙商問自啟至反哭祭不行郊社亦然何得有越紼而行事鄭答越紼行事喪無事時謂未殯前是有事殯後未啟前是無事得行祭禮又云郊社有常日自啟至反哭自當辟之郊社尊故辟其日不使相妨五祀既卑若與啟反哭日相逄則五祀辟其日也云俟吉者王制云喪三年不祭是也其在喪祭郊社之時其喪所朝夕仍奠集説曰天子諸侯之祭禮亡先儒以大夫士祭禮推之士祭尸九飯大夫祭尸十一飯則知諸侯十三飯天子十五飯也五祀外神不可以巳私喪久廢其祭若當祭之時而天子崩則止而不行俟殯訖乃祭然其禮則殺矣侑勸也尸入迎尸而入坐也三飯不侑者尸三飯告飽則止祝更不勸侑其食使滿足當飯之數也酳食畢而以酒潄口也按特牲禮尸九飯畢主人酌酒酳尸尸飲卒爵酢主人主人受酢飲畢酌獻祝祝飲畢主人又酌獻佐食今云酳不酢者無酢主人以下等事也此是言殯後祭五祀之禮又言自啟殯往葬及葬畢反哭其間亦不祭五祀直待葬後乃祭其禮又不同葢葬後哀稍殺漸向吉故祝侑尸食至十五飯攝主酳尸尸飲卒爵而酢攝主攝主飲畢酌而獻祝祝受而飲畢則止無獻佐食以下之事故云祝畢獻而已已止也曽子問曰諸侯之祭社稷爼豆既陳聞天子崩后之喪君薨夫人之喪如之何孔子曰廢自薨比至于殯自啟至于反哭奉帥天子集説曰比及也曾子所問如此孔子曰廢又言自薨至殯自啟至反哭皆帥循天子之禮者謂諸侯既殯而祭社稷或五祀者亦如天子殯後祭五祀之禮也其葬後而祭社稷五祀者亦如夫子葬後祭五祀之禮也曽子問曰大夫之祭鼎爼既陳籩豆既設不得成禮廢者幾孔子曰九請問之曰天子崩后之喪君薨夫人之喪君之大廟火日食三年之喪齊衰大功皆廢外喪自齊衰以下行也其齊衰之祭也尸入三飯不侑酳不酢而已矣大功酢而已矣小功緦室中之事而已矣士之所以異者緦不祭所祭於死者無服則祭集説曰此言大夫宗廟之祭外喪在大門之外也三飯不侑酳不酢説見上章大功酢而已者大功服輕祭禮稍備尸三飯祝侑至十一飯之後主人酌酒酢尸尸酢主人即止也室中之事者凡尸在室之奥祝在室中北廂南面佐食在室中户西北面但主人主婦及賔獻尸及祝佐食等三人畢則止也若平常之祭十一飯畢主人酳尸尸卒爵酢主人主人獻祝及佐食畢次主婦獻尸尸酢主婦主婦又獻祝及佐食畢次賔長獻尸尸得賔長獻爵則止不舉奠其爵于薦之左待致爵之後尸乃舉爵今以喪服殺禮賔長獻尸尸飲以酢賔賔又獻祝及佐食而祭畢止士卑於大夫雖緦服亦不祭所祭於死者無服謂如妻之父母母之兄弟姊妹已雖有服而已所祭者與之無服則可祭也曽子問曰三年之喪弔乎孔子曰三年之喪練不羣立不旅行註曰為其苟語忘哀也君子禮以飾情三年之喪而弔哭不亦虚乎註曰為彼哀則不專於親也為親哀則是妄弔疏曰凡行吉凶之禮必使内外相副用外之物以飾内情故冠冕文彩以飾至敬之情麄哀以飾哀痛之情所以三年問云哀服為至痛飾也曽子問曰大夫士有私喪可以除之矣而有君服焉其除之也如之何孔子曰有君喪服於身不敢私服又何除焉於是乎有過時而弗除也君之喪服除而後殷祭禮也集説曰君重親輕以義斷恩也若君服在身忽遭親喪則不敢為親制服又何除焉者謂成服為重始除服為輕末在始重之日尚不獲伸况輕末之時而可行乎此所以雖過時而不除也殷祭盛祭也君服除乃得為親行二祥之祭以伸孝心以其禮大故曰殷也假如此月除君服即次月行小祥之祭又次月行大祥之祭若親喪小祥後方遭君喪則他時君服除後惟行大祥祭也然此皆謂適子主祭而居官者若庶子居官而行君服適子在家自依時行親喪之禮他日庶子雖除君服無追祭矣曽子問曰父母之喪弗除可乎孔子曰先王制禮過時弗舉禮也非弗能勿除也患其過於制也故君子過時不祭禮也集説曰曽子之意以為適子仕者除君服後猶得追祭二祥庶子仕者雖除君服不復追祭是終身不除父母之䘮矣可乎孔子言先王制禮各有時節過時不復追舉禮也今不追除服者不是不能除也患其踰越聖人之制禮也且如四時之祭當春祭時或以事故阻廢至夏則惟行夏時之祭不復追補春祭矣故過時不祭禮之常也惟禘祫大事則不然曽子問曰君薨既殯而臣有父母之喪則如之何孔子曰歸居於家有殷事則之君所朝夕否註曰居家者因其哀後隆於父母殷事朔月月半薦新之奠也疏曰若臣親喪既殯而後有君喪則歸君所父母有殷事則來家朝夕則恒在君處曰君既啟而臣有父母之喪則如之何孔子曰歸哭而反送君註曰言送君則既葬而歸也歸哭者服君服而歸不敢私服也疏曰以此言之父母之喪既啟而有君喪則亦往哭於君所而反送父母父母葬畢而居君所注云既葬而歸者不待君之虞祭也曰君未殯而臣有父母之喪則如之何孔子曰歸殯反於君所有殷事則歸朝夕否大夫室老行事士則子孫行事疏曰君未殯則君哀重而父母又喪是親哀亦重然君為重故主意於君恒在君所盧氏云人君五日而殯故可以歸殯父母而往殯君也若其臨君殯之日歸哭父母而來殯君則殯君訖乃還擯父母也以此言之臣有親喪未殯而有君喪去君殯日雖逺祗得待殯君訖而還殯父母以君重故也大夫内子有殷事亦之君所朝夕否註曰謂夫之君既殯而有舅姑之喪者内子大夫適妻也妻為夫之君如婦為舅姑服齊衰疏曰舉此一條婦同於夫則君既啟及君未殯而有舅姑之喪其禮悉同夫也賤不誄貴㓜不誄長禮也註曰誄累也累列生時行迹誄之以作諡諡當由尊者成疏曰若使㓜賤者為之則名欲光揚在上之美有乖實事唯天子稱天以誄之註曰以其無尊焉春秋公羊説以為讀誄制諡於南郊若云受之於天然疏曰為人臣子莫不欲褒大其君揜惡揚善故至南郊明不得欺天也諸侯相誄非禮也註曰禮當言誄於天子也天子乃使太史賜之諡曽子問曰君出疆以三年之戒以椑從君薨其入如之何孔子曰共殯服則子麻弁絰疏衰菲杖入自闕升自西階如小斂則子免而從柩入自門升自阼階君大夫士一節也集説曰曽子問國君以事出疆必為三年之戒備恐未得即反也於是以親身之棺隨行慮或死於外也若死於外則入之禮如何孔子言於時大斂之後主人從柩而歸則其國有司豫供主人殯時所著之服以待之謂布深衣苴絰散帶垂也其首服崔氏云小斂之前大夫士皆去冠小斂括髮之後士則加素冠大夫加素弁此時主人從柩在路未忍成服惟著麻弁絰疏衰而藨屨苴杖也麻弁布弁也布弁之上加環絰也柩入之時毀殯宫門西邊墻而入其處空缺故謂之闕非門闕之闕也升自西階者以柩從外來有似賔客故就客階而升也如小斂而歸則子首不麻弁身不疏衰惟首著免布身著布深衣也入自門升自阼階者以親未在棺猶以事生之禮事之也凡君與大夫及士之卒於外者其禮皆一等無異制故云一節也曽子問曰君之喪既引聞父母之喪如之何孔子曰遂既封而歸不俟子集説曰遂遂送君柩也既窆而歸下棺即歸也不俟子不待孝子返而已先返也曽子問曰父母之喪既引及塗聞君薨如之何孔子曰遂既封改服而往集説曰遂遂葬親柩也既窆之後改服而往者雜記云非從柩與反哭無免於堩此時孝子首著免乃去免而括髮徒跣布深衣扱衽而往不敢以私喪之服喪君也曽子問曰宗子為士庶子為大夫其祭也如之何孔子曰以上牲祭於宗子之家祝曰孝子某為介子某薦其常事疏曰庶子是宗子親弟與宗子同祖禰得以上牲於宗子之家而祭祖禰但大夫得祭曽祖已是庶子不合自立廟崔氏云當寄曽祖廟於宗子之家亦得以上牲宗子為祭也若已是宗子從父庶子兄弟父之適子則於其家自立禰廟其祖及曽祖亦於宗子之家寄立之亦以上牲宗子為祭若已是宗子從祖庶兄弟父祖之適則立祖禰廟於已家亦寄立曾祖廟於宗子家亦共上牲宗子為祭告時止稱宗子其時庻子身在祭位集説曰士特牲大夫少牢上牲少牢也庶子既為大夫當用上牲然必往就宗子家而祭者以廟在宗子家也孝子宗子也介子庶子也不曰庶而曰介者庶子卑賤之稱介則副貳之義亦貴貴之道也薦其常事者薦其歲之常事也坡謂伊川程子奪宗之論想未撿此疏也學者詳之若宗子有罪居於他國庶子為大夫其祭也祝曰孝子某使介子某執其常事攝主不厭祭不旅不假不綏祭不配集説曰介子非當主祭者故謂之攝主其禮畧於宗子者有五焉若以祭禮先後之次言之當云不配不綏祭不假不旅不厭祭今倒言之者皇氏云攝主非正故逆陳以見義今依次釋之不配者祭禮初行尸未入之時祝告神曰薦嵗事于皇祖伯某以某妃配某氏如姜氏子氏之類今攝主但言薦歲事于皇祖伯某不言以某妃配也綏周禮作隋减毀之名也尸與主人俱有隋祭主人减黍稷牢肉而祭之於豆間尸則取葅及黍稷肺而祭於豆間所謂隋祭也今尸自隋祭攝主則不綏尸將受福先為綏祭今辟正主不敢受福故不綏也假字當作嘏福慶之辭也尸十一飯訖主人酳尸尸酢主人畢命祝嘏于主人曰皇尸命工祝承致多福無疆于女孝孫所謂嘏也今亦以辟正主故不嘏也不旅不旅酬也不厭祭者厭是饜飫神也厭有隂有陽隂厭者迎尸之前祝酌奠訖為主人釋辭於神勉其歆享此時在室奥隂靜之處故曰隂厭也陽厭者尸謖之後佐食徹尸之薦爼設於西北隅得户明白之處故曰陽厭此言不厭祭不為陽厭攝主謙退似若神未厭飫然也以先後之次知之布奠於賔賔奠而不舉不歸肉其辭于賔曰宗兄宗弟宗子在他國使某辭集説曰主人酬賔之時賔在西廂東面主人布此奠爵於賔爼之北賔坐取此爵而奠於爼之南不舉之以酬兄弟此即不旅之事若宗子主祭則凡助祭之賔各歸之以爼肉今攝主故不歸爼肉於賔也非但祭不備禮其將祭之初告賔之辭亦異曰宗兄宗弟子在他國不得親祭故使某執其常事使某告也故云使某辭宗兄宗弟者於此攝主為兄或為弟也若尊卑不等或是祖父之列或是子孫之行則但謂之宗子矣曽子問曰宗子去在他國庶子無爵而居者可以祭乎孔子曰祭哉請問其祭如之何孔子曰望墓而為壇以時祭若宗子死告於墓而后祭於家宗子死稱名不言孝身没而已子游之徒有庶子祭者以此若義也今之祭者不首其義故誣於祭也集説曰宗子無罪而去國則廟主隨行矣若有罪去國廟雖存庶子卑賤無爵不得於廟行祭禮但當祭之時即望墓為壇以祭也若宗子死則庶子告於墓而後祭於家家庶子之家也亦不敢稱孝子某但稱子某而已又非有爵者稱介子某之比也身没而已者庶子身死其子則庶子之適子祭庶子之時可稱孝也子游之門人有庶子祭者皆用此禮是順古義也首本也今世俗庶子之祭者不能尋本古人制禮之義而率意行之祗見其誣罔而已曽子問曰祭必有尸乎若厭祭亦可乎孔子曰祭成喪者必有尸尸必以孫孫㓜則使人抱之無孫則取於同姓可也祭殤必厭葢弗成也祭成喪而無尸是殤之也集説曰曽子之意祭是祭神不祭生人立尸而祭是祭生人無益死者故問祭時必合有尸乎若厭祭亦可乎葢祭初隂厭尸猶未入祭終而陽厭在尸既起之後是厭祭無尸也孔子言成人威儀具備必有尸以象神之威儀所以祭成人之喪者必有尸也尸必以孫以昭穆之位同也取於同姓亦謂孫之等列也祭殤者不立尸而厭祭以其年㓜少未能有成人之威儀不足可象故不立尸也若祭成人而無尸是以殤待之矣孔子曰有隂厭有陽厭曽子問曰殤不祔祭何謂隂厭陽厭集説曰孔子言祭殤之禮有厭於幽隂者有厭於陽明者葢適殤則隂厭於祭之始庶殤則陽厭於祭之終非兼之也曽子不悟其㫖乃問云祭殤之禮畧而不備何以始末一祭之間有此兩厭也孔子曰宗子為殤而死庶子弗為後也註曰族人以其倫代之明不序昭穆立之廟其祭之就其祖而已代之者主其禮疏曰宗子為殤而死庶子不得代為之後宗子理不可闕明族人以其倫代之殤無為人父之道故不序昭穆不得與代之者為父也宗子存時族人凡殤者宗子主其祭祀今宗子殤明代為宗子者主其禮也此宗子是大宗族人但是宗子兄弟行無限親疎皆得代之其吉祭特牲註曰尊宗子從成人也凡殤則特豚自卒哭成事之後為吉祭疏曰殤與無後者惟祔與除服二祭則止此言吉祭者惟據祔與除服也祭殤不舉肺無肵爼無𤣥酒不告利成集説曰祭有尸則佐食舉肺脊以授尸祭而食之今無尸故不舉肺脊也凡尸食之餘歸之肵爼肵敬也主人敬尸而設此爼今無肵爼以無尸故也𤣥酒水也太古無酒之時以水行禮後王祭則設之重古道也今祭殤禮畧故無𤣥酒也不告利成者利猶養也謂共養之禮已成也常祭主人事尸禮畢出立尸外則祝東面告利成遂導尸以出今亦以無尸廢此禮是謂隂厭註曰是宗子而殤祭之於奥之禮小宗為殤其祭禮亦如之疏曰知此經指大宗者以公羊何注云小宗無子則絶大宗無子則不絶重適之本凡殤與無後者祭於宗子之家當室之白尊于東房是謂陽厭註曰凡殤謂庶子之適也或昆弟之子或從父昆弟無後者如有昆弟及諸父此二者若是宗子大功内親則於宗子家祖廟祭之無廟者為墠祭之親者共其牲物宗子皆主其禮當室之白尊于東房異於宗子之為殤當室之白謂西北隅得戸明者也明者曰陽凡祖廟在小宗之家小宗祭之亦然宗子之適亦為凡殤疏曰凡殤有二一宗子親昆弟之適子祭之當於宗子父廟二是宗子諸父之適子祭之當於宗子祖廟其無後者亦有二一是昆弟無後祭之當於宗子祖廟二是諸父無後祭之當於宗子曽祖之廟凡殤得祭者以其身是適故也無後者成人無後則祭若在殤而死則不祭以其身是庶故也若宗子是士但有二廟無曽祖廟故云無廟者為墠祭之推之大夫立三廟無大祖者其祭諸父得於曽祖廟也其立大祖廟者其祭諸父當於曽祖廟曽祖無廟亦為墠祭之曽子問曰葬引至于堩日有食之則有變乎且不乎孔子曰昔者吾從老耼助葬於巷黨及堩日有食之老耼曰丘止柩就道右止哭以聽變既明反而後行曰禮也反葬而丘問之曰夫柩不可以反者也日有食之不知其已之遲速則豈如行哉老耼曰諸侯朝天子見日而行逮日而舍奠大夫使見日而行逮日而舍夫柩不蚤出不莫宿見星而行者唯罪人與奔父母之喪者乎日有食之安知其不見星也且君子行禮不以人之親痁患吾聞之老耼云集説曰堩道也有變變常禮乎且不乎不變常禮乎柩北向而出道右則道之東也聽變聽日食之變動也明反日光復常也舍奠晚止舍而設奠於行主也不蚤出不莫宿侵晨夜則近姦㓂安知其不見星為無日而慝作豫止也痁病也不以人之親痁患謂不可使人之親病於危亡之患也曽子問曰為君使而卒於舍禮曰公館復私館不復凡所使之國有司所授舍則公館已何謂私館不復也孔子曰善乎問之也自卿大夫士之家曰私館公館與公所為曰公館公館復此之謂也集説曰復死而招魂復魄也私館謂非君命所使私相停舍者公館公家所造之館也與及也公所為謂公所命停客之處即是卿大夫之館但有公命故謂之公館也一説公所為謂君所作離宫别館也曽子問曰下殤土周葬于園遂輿機而往塗邇故也今墓逺則其葬也如之何集説曰八歲至十一為下殤土周聖周也説見檀弓成人則葬於墓此葬于園圃之中輿猶抗也機者輿尸之牀木為之狀如牀而無脚以繩横直維繫之抗舉而往堲周之所棺斂而葬之塗近故也曽子言今世禮變皆棺斂下殤於家而葬之於墓則塗逺矣其葬也如之何問既不用輿機則當用人舉棺以往乎為當用車載棺而往乎然此謂大夫之下殤及士庶人之中下殤耳若大夫之適長殤中殤有遣車者亦不輿機而葬也孔子曰吾聞諸老耼曰昔者史佚有子而死下殤也墓逺召公謂之曰何以不棺斂於宫中史佚曰吾敢乎哉召公言於周公周公曰豈不可史佚行之下殤用棺衣棺自史佚始也疏曰云自史佚始明昔非惟於宫中不棺亦不衣也集説曰史佚周初良史也墓逺不𦵏於園也言於周公言猶問也周公曰豈不可者謂何為不可也召公述周公之言告佚佚於是用棺衣而棺斂於宫中是此禮之變始於史佚也舊註以豈為句者非曾子問曰卿大夫將為尸於公受宿矣而有齊衰内喪則如之何孔子曰出舍於公館以待事禮也集説曰受宿受君命而宿齊戒也齊衰内喪大門内齊衰服之喪也待事待祭事畢然後歸哭也孔子曰尸弁冕而出卿大夫士皆下之尸必式必有前驅集説曰尸服死者之上服今為君尸而弁冕者弁士之爵弁也以君之先世或有為大夫士者故尸亦當弁或冕也出而卿大夫士遇之則下車尸式以答之必有前驅者尸出則先驅辟開行人也子夏問曰三年之喪卒哭金革之事無辟也者禮與初有司與孔子曰夏后氏三年之喪既殯而致事殷人既葬而致事記曰君子不奪人之親亦不可奪親也此之謂乎集説曰無辟謂君使則行無敢辭辟也此禮當然歟抑當初有司迫遣之歟夏之禮親喪既殯即致還其事於君殷禮則葬後乃致其事周則卒哭而致事君子指人君也臣遭父母之喪而君許其致事是不奪人喪親之心也雖君有命而不忍違離喪次是不可奪其喪親之孝也子夏曰金革之事無辟也者非與孔子曰吾聞諸老耼曰昔者魯公伯禽有為為之也今以三年之喪從其利者吾弗知也集説曰魯公卒哭而從金革之事以徐戎之難東郊不開不得已而征之是有為為之也今人居三年之喪而用兵以逐攻取之利者吾不知其為何禮也葢甚非之之辭禮記述註卷七
