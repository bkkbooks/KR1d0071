body:
  text: 禮記述注卷十七安溪李光坡撰雜記上第二十疏曰鄭云雜記者以其雜記諸侯以下至士之喪事諸侯行而死於館則其復如於其國如於道則升其乘車之左轂以其綏復注曰館主國所致舍復招魂復魄也如於其國主國館賓豫使有之得升屋招用褒衣也如於道道上廬宿也升車左轂象升屋東榮綏當為緌綏謂旌旗之旄也去其旒而用之異於主也疏曰諸侯行謂五等諸侯朝覲天子及自相朝會之屬此車以南面為正則左在東也五等之復人數各如命數今轂上狹崔氏云一人而已其輤有裧緇布裳帷素錦以為屋而行注曰帷裳用緇則輤用赤矣若未大斂其載尸而歸車飾皆如之疏曰輤謂載柩之車輤象龞甲覆於車上中央隆髙四面漸下裧象邊緣垂於輤之四邊與輤連體則亦赤也緇布裳帷者輤下棺外用緇色之布為裳帷以圍繞棺也素錦以為屋者於此裳帷之中又用素錦為小帳以覆棺既設此飾而後行此經所論謂大斂後也故下云適所殯至於廟門不毁牆遂入適所殯帷輤為説於廟門外注曰廟所殯宫牆裳帷也適所殯謂兩楹之間去輤乃入廟門以其入自有宫室也毁或為徹凡柩自外來者正棺於兩楹之間尸亦侇之於此皆因殯焉異者柩入自闕升自西階尸入自門升自阼階其殯必於兩楹之間者以其死不於室而自外來留之於中不忍逺也大夫士死於道則升其乘車之左轂以其綏復如於館死則其復如其家注曰綏亦緌也大夫復於家以玄冕士以爵辨服大夫以布為輤而行至於家而説輤載以輲車入自門至於阼階下而説車舉自阼階升適所殯注曰大夫輤言用布白布不染也言輤者達名也不言裳帷俱用布無所别也至門亦説輤乃入言載以輲車入自門明車不易也輲讀為輇或作槫説文曰有輻曰輪無輻曰輇輇崇蓋半乘車之輪諸侯言不毁牆大夫士言不易車互相明疏曰不以蒨草染之亦名輤者是襯近之義有輻謂别施木為輻無輻謂合大木為之此云升適阼階謂尸矣若柩則升自西階士輤葦席以為屋蒲席以為裳帷疏曰用葦席屈之以為輤棺之屋又以蒲席為裳帷圍繞於屋旁也大夫無以他物為屋之文則是用素錦為帳與諸侯同凡訃於其君曰君之臣某死父母妻長子曰君之臣某之某死君訃於他國之君曰寡君不祿敢告於執事夫人曰寡小君不祿大子之喪曰寡君之適子某死集説曰君與夫人訃不曰薨而曰不祿告他國謙辭也敢告於執事者凶事不敢直指君身也大夫訃於同國適者曰某不祿訃於士亦曰某不祿訃於他國之君曰君之外臣寡大夫某死訃於適者曰吾子之外私寡大夫某不祿使某實訃於士亦曰吾子之外私寡大夫某不祿使某實集説曰適者謂同國大夫位命相敵者外私在他國而私有恩好者也實讀為至言為訃而至此也士訃於同國大夫曰某死訃於士亦曰某死訃於他國之君曰君之外臣某死訃於大夫曰吾子之外私某死訃於士亦曰吾子之外私某死集説曰士卑故其辭降於大夫大夫次於公館以終喪士練而歸士次於公館大夫居廬士居堊室注曰公館公宫之舍也練而歸之士謂邑宰也練而猶處公館朝廷之士也惟大夫三年無歸也大夫居廬謂未練時也士居堊室亦謂邑宰也朝廷之士亦居廬疏曰士反其治邑若身為大夫雖位得采邑亦終喪乃歸也練後大夫居堊室今云居廬明未練也臣為君喪俱服斬衰故知未練之前朝士亦居廬也大夫為其父母兄弟之未為大夫者之喪服如士服士為其父母兄弟之為大夫者之喪服如士服大夫之適子服大夫之服疏曰孟子云諸侯之禮三年之喪齊疏之服飦粥之食自天子達於庶人三代共之又此記云端衰喪車皆無等王肅謂大夫與士異者大夫以上在喪斂時辨絰士冠素委貌鄭與張融評云士與大夫異者皆是亂世尚輕涼非王者之達禮鄭與王其義略同是周公制禮之時則上下同當喪制無等至後世以來士與大夫有異故記者載之大夫之庶子為大夫則為其父母服大夫服其位與未為大夫者齒疏曰此庶子雖為大夫其年雖長於適子猶在適子下使適子為主也士之子為大夫則其父母弗能主也使其子主之無子則為之置後大夫卜宅與葬日有司麻衣布衰布帶因喪屨緇布冠不㽔占者皮辨集説曰卜宅卜葬地也有司卜人也麻衣白布深衣也布衰者以三升半布為衰長六寸廣四寸就綴於深衣前當胸之上後又有負版長一尺六寸廣四寸布帶以布為帶也因喪屨因喪服之繩屨也蕤與緌同古者緇布冠無緌後代加蕤故此明言之也有司為卜故用半吉半凶之服占者卜龜之人也尊於有司故皮辨其服彌吉也皮辨者於天子則為視朝之服諸侯大夫士則為視朔之服也如筮則史練冠長衣以筮占者朝服注曰筮者筮宅也謂下大夫若士也筮史筮人也長衣深衣之純以素也長衣練冠純凶服也朝服純吉服也大夫士日朝服以朝也疏曰卜重故占者皮辨筮輕故占者朝服大夫之喪既薦馬薦馬者哭踊出乃包奠而讀書集説曰薦進也駕車之馬每車二匹按既夕禮柩初出至祖廟設遷祖之奠訖乃薦馬至日側祖奠之時又薦馬明日設遣奠時又薦馬此言既薦馬謂遣奠時也馬至則車將行故孝子感之而哭踊包奠者取遣奠牲之下體包裏而至於遣車以送死者馬至在包奠之前而云出乃包奠者明包奠為出之節也讀書者既夕云書賵於方方版也謂書賵奠賻贈之人名與其物於版柩將行主人之史於柩東西面而讀之此明大夫之禮與士同大夫之喪大宗人相小宗人命龜卜人作龜注曰卜葬及日也相相主人禮也命龜告以所問事也作龜謂揚火灼之以出兆疏曰大夫謂卿也大宗大宗伯也小宗小宗伯也皇氏云大小宗並是其君之職來為喪事故宗伯肆師云凡卿大夫之喪相其禮復諸侯以褒衣冕服爵辨服注曰褒衣始命為諸侯及朝覲見加賜之衣也褒猶進也疏曰冕服者上公自衮冕而下几五侯伯自鷩冕而下凡四子男自毳冕而下凡三凡服各依其命數則上公五冕之外更加爵辨服以下皮辨冠辨之等而滿九侯伯冕服之外亦加爵辨以下而滿七子男冕服之外加爵辨皮辨而滿五其褒衣君特所褒賜則宜在命數之外也夫人稅衣揄狄狄稅素沙疏曰夫人復用稅衣上至揄狄謂諸侯伯夫人也集説曰稅衣色黑而緣以纁揄與搖同揄狄色青江淮而南青質而五色皆備成章曰搖狄狄當為翟雉名也此服蓋畫搖翟之形以為文章因名也狄稅素沙言自搖翟至稅衣皆用素沙為裏即今之白絹也周禮內司服王后六服禕衣揄狄闕狄鞠衣展衣禒衣也儀禮注云王之服九而祭服六后之服六而祭服三王之服衣裳之色異后之服連衣裳而其色同以婦人之德本末純一故也王之服襌而無裏后之服裏而不襌以陽成於奇陰成於偶故也內子以鞠衣褒衣素沙下大夫以袒衣其餘如士集説曰內于卿之適妻也其服用鞠衣此衣蓋始命為內子時所褒賜者故云鞠衣褒衣也亦以素沙為裏下大夫謂下大夫之妻也袒周禮作展其餘如士者謂士妻之復用褖衣內子與下大夫之妻復亦兼用褖衣也坡案此節舊在復諸侯以褒衣節上鄭注云當在夫人狄稅素沙下復西上集説曰復西上者復之人數多寡各如其命數若上公九命則復者九人以下三命則用三人北面則西在左左為陽冀其復生故尚左也大夫不揄絞屬於池下集説曰此言大夫喪車之飾揄翟雉也絞青黃之繒也屬猶繫也池織竹為之形如籠衣以青布若諸侯以上則畫揄翟於絞而屬於池之下大夫降於人君故不揄絞屬於池下也大夫附於士士不附於大夫附於大夫之昆弟無昆弟則從其昭穆雖王父母在亦然集説曰附讀為袝祖為士孫為大夫而死可以袝祭於祖之為士者故曰大夫袝於士若祖為大夫孫為士而死不可祔祭於祖之為大夫者惟得祔祭於大夫之兄弟為士者故曰士不祔於大夫祔於大夫之昆弟若祖之兄弟無為士者則從其昭穆謂祔於髙祖之為士者若髙祖亦是大夫則祔於髙祖昆弟之為士者也雖王父母在亦然者謂孫死應合祔於祖今祖尚存無可祔亦是祔於髙祖也小記云中一以上而祔與此義同婦附於其夫之所附之妃無妃則亦從其昭穆之妃妾附於妾祖姑無妾祖姑則亦從其昭穆之妾注曰夫所附之妃於婦則祖姑疏曰祖無妃謂無祖姑則亦從其昭穆之妃謂亦間一以上祔於髙祖之妃髙祖無妃則亦祔於髙祖之祖妃若其祖有昆弟之妃班爵同者則亦袝之男子附於王父則配女子附於王母則不配集説曰男子死而祔祖者其祝辭云以某妃配某氏是併祭王母也未嫁之女及嫁未三月而死歸葬女氏之黨者其祔於祖母者惟得祭祖母不祭王父也故云祔於王母則不配配與不配祭饌如一祝辭異不言以某妃配某氏耳有事於尊者可以及卑有事於卑者不敢援尊也公子附於公子疏曰若公子之祖為君公子不敢祔之祔於祖之兄弟為公子者不敢戚君故也君薨大子號稱子待猶君也集説曰君在稱世子君薨則稱子踰年乃得稱君也僖九年傳云凡在喪王曰小童公侯曰子待猶君者謂與諸侯並列供待之禮猶如正君也有三年之練冠則以大功之麻易之惟杖屨不易注曰謂既練而遭大功之喪者也練除首絰要絰葛又不如大功之麻重也言練冠易麻互言之也惟杖屨不易言其餘皆易也疏曰三年之喪至練首絰已除故特云冠此大功是降服大功也大功無杖無可改易練與大功初喪同是繩屨故杖屨不易練首絰已除故著大功麻絰斬衰既練要絰與大功要絰粗細同斬衰是葛大功是麻故注云葛不如麻重也麻謂絰帶大功言絰帶明練亦有絰帶練云冠明大功亦有冠是大功冠與絰帶易三年冠及絰帶故云互言之云杖屨不易則知衰亦在易中故言其餘皆易謂冠也要帶也衰也悉易有父母之喪尚功衰而附兄弟之殤則練冠附於殤稱陽童某甫不名神也注曰此兄弟之殤謂大功親以下之殤也斬衰齊衰之喪練皆受以大功之衰此之謂功衰以是時而祔大功親以下之殤大功親以下之殤輕不易服冠而兄為殤謂同年者也兄十九而死明年因喪而冠陽童謂庶殤也宗子則曰陰童童未成人之稱也某甫尊神不名為之造字疏曰大功正服則變三年之練此著練冠故知大功親以下之殤若成人合服大功其長殤則小功成人小功親其長殤則緦麻皆得著此練冠為之祔祭已是祖適若祔大功兄弟長殤得在祖廟若祔小功長殤者已是曾祖之適共小功兄弟同曾祖其兄弟身及父是庶人不合立祖廟則曾祖適孫為之立壇而祔於從祖立神而祭也凡異居始聞兄弟之喪惟以哭對可也其始麻散帶絰集説曰兄弟異居而訃至唯以哭對其來訃之人以哀傷之情重不暇他言也其要之帶絰始皆散垂謂大功以上之兄弟至三日而後絞之也小功以下則糾垂不散未服麻而奔喪及主人之未成絰也疏者與主人皆成之親者終其麻帶絰之日數集説曰若聞訃未及服麻而即奔喪者以道路既近聞死即來此時主人未行小斂故未成絰小功以下謂之疏疏者值主人成服之節則與主人皆成之大功以上謂之親親者奔喪而至之時雖值主人成服已必自終竟其散麻帶絰之日數而後成服也主妾之喪則自祔至於練祥皆使其子主之其殯祭不於正室疏曰妾祔於妾祖姑若無則祔於女君庾蔚云妾祖姑無廟為壇祭之鄭云於廟者崔氏云於廟中為壇祭之此謂攝女君若凡妾則不得為王則别為壇不在祖廟中而子自主之也集説曰女君死而妾攝女君此妾死則君主其喪其祔祭亦君自主若練與大祥之祭則其子主之殯祭不於正室者雖嘗攝女君猶降於正適故殯與祭不得在正室也不攝女君之妾君則不主其喪君不撫僕妾集説曰死而君不撫其尸者略於賤也女君死則妾為女君之黨服攝女君則不為先女君之黨服集説曰女君死而妾猶服其黨是徒從之禮也妾攝女君則不服以攝位稍尊也聞兄弟之喪大功以上見喪者之鄉而哭集説曰奔喪禮云齊衰望鄉而哭大功望門而哭此言大功以上謂降服大功者也凡喪服降服重於正服適兄弟之送葬者弗及遇主人於道則遂之於墓集説曰適往也往送兄弟之葬而不及當送之時乃遇主人葬畢而反則此送者不可隨主人反哭必自至墓所而後反也凡主兄弟之喪雖疏亦虞之集説曰小功緦麻疏服之兄弟也彼無親者主之而已主其喪則當為之畢虞祔之祭也凡喪服未畢有弔者則為位而哭拜踊疏曰不以殺禮而待新弔之賔也言凡者五服悉然大夫之哭大夫辨絰大夫與殯亦辨絰集説曰大夫之喪既成服而大夫往弔則身著錫衰首加辨絰辨絰者如爵辨而素加以環絰也若與其殯事是未成服之時也首亦辨絰但身不錫衰耳不錫衰則皮辨服也若主人未小斂之前則吉服而往不辨絰也大夫有私喪之葛則於其兄弟之輕喪則辨絰集説曰私喪妻子之喪也卒哭以葛代麻於此時而遭兄弟之喪雖緦麻之輕亦用弔服辨絰而往不以私喪之末臨兄弟也大夫降旁親於緦麻兄弟無服若已成服則錫衰未成服則身素裳而首辨絰也為長子杖則其子不以杖即位集説曰其子長子之子也祖不厭孫此長子之子亦得杖但與祖同處不得以杖即位辟尊者為妻父母在不杖不稽顙集説曰此謂適子妻死而父母俱存故其禮如此然大夫主適婦之喪故其夫不杖若父沒母存母不主喪則子可以杖但不稽顙耳云母在不杖者以父母尊同因父而連言母母在不稽顙稽顙者其贈也拜集説曰贈謂人以物來贈已取喪事也母在雖不稽顙惟拜謝此贈物之人則可以稽顙故云稽顙者其贈也拜一説贈謂以物送别死者即既夕禮所云贈用制幣也違諸侯之大夫不反服違大夫之諸侯不反服集説曰違去也已本是國君之臣今去國君而在為他國大夫之臣是自尊適卑若舊君死已不反服以仕於卑臣不可反服於前之尊君也本是大夫之臣今去而仕為諸侯之臣是自卑適尊若反服卑君則為新君之恥矣故亦不反服若新君與舊君等乃為舊君服也喪冠條屬以别吉凶三年之練冠亦條屬右縫小功以下左集説曰喪冠以一條繩屈而屬於冠以為冠之武而垂下為纓故云喪冠條屬屬猶著也言著於冠也是纓與武共此一繩若吉冠則纓與武各一物玉藻云縞冠玄武之類是也吉凶之制不同故云别吉凶也三年練冠小祥之冠也其條屬亦然吉冠則褶上辟縫向左左為陽吉也凶冠則褶縫向右右為陰凶也小功緦麻之服輕故褶縫向左而同於吉緦冠繅纓大功以上散帶集説曰緦服之縷其粗細與朝服十五升之布同而縷數則半之治其縷不治其布冠與衰同是此布也但為纓之布則加以灰澡治之耳故曰緦冠繅纓繅讀為澡大功以上服重初死床帶散垂至成服乃絞小功以下初死即絞也朝服十五升去其半而緦加灰錫也集説曰朝服精細全用十五升布為之去其半則七升半布也用為緦服緦云者以其縷之細如絲也若以此布而加灰以澡治之則謂之錫所謂弔服之錫衰也錫者滑易之貌緦服不加灰治也朝服一千二百縷終幅緦之縷細與朝服同但其布終幅止六百縷而疏故儀禮云有事其縷無事其布曰緦諸侯相襚以後路與冕服先路與褒衣不以襚集説曰後路二車也二車在後故曰後路冕服上冕之後次冕也上公以鷩冕為次侯伯以毳冕為次子男以絺冕為次先路正路也褒衣説見前章相襚不可用已之正車服者以彼不用之以為正也遣車視牢具疏布輤四面有章置於四隅載粻有子曰非禮也喪奠脯醢而已疏曰既夕士禮有黍稷麥者但遣車不合載粻既夕藏筲者謂遣奠之外别有黍稷麥集説曰遣車説見檀弓視牢具者天子太牢包九箇則遣車九乘諸侯太牢包七箇則七乘大夫亦太牢包五箇則五乘天子之上士三命少牢包三箇則三乘也諸侯之士無遣車遣車之上以粗布為輤輤蓋也四面有物以鄣蔽之章與彰同四隅椁之四角也粻米糧也遣奠之饌無黍稷故有子以載粻為非禮牲體則脯醢之義也祭稱孝子孝孫喪稱哀子哀孫端衰喪車皆無等集説曰祭吉祭也卒哭以後為吉祭故祝辭稱孝子或孝孫自虞以前為凶祭故稱哀端正也端衰喪服上衣也吉時玄端服身與袂同以二尺二寸為正喪衣亦如之而綴六寸之衰於胸前故曰端衰也喪車孝子所乘惡車也此二者皆無貴賤之差等大白冠緇布之冠皆不㽔委武玄縞而後蕤集説曰大白冠太古之白布冠也緇布冠黑布冠也此二冠無飾故皆不蕤然玉藻云緇布冠繢緌是諸侯之冠則此不緌者謂大夫士也委武皆冠之下卷秦人呼卷為委齊人呼卷為武玄玄冠也縞縞冠也玄縞二冠既别有冠卷則必有蕤故云委武玄縞而后蕤也大夫冕而祭於公辨而祭於已士辨而祭於公冠而祭於已士辨而親迎然則士辨而祭於已可也集説曰冕絺冕也祭於公助君之祭也辨爵辨也祭於已自祭其廟也冠玄冠也助祭為尊自祭為卑故冠服有異也儀禮少牢上大夫自祭用玄冠此云辨而祭於已者此大夫指孤而言也記者以士之親迎用辨以為可以辨而祭於已然親迎之辨暫焉攝用耳祭有常禮不可紊也暢臼以椈杵以梧注曰所以搗鬱也椈柏也疏曰暢謂鬱鬯也梧桐也為柏香桐潔白於神為宜枇以桑長三尺或曰五尺畢用桑長三尺刋其柄與末注曰枇所以載牲體者此謂喪祭也吉祭枇用棘畢所以取主人載者刋猶削也疏曰從鑊以枇升入於鼎從鼎以枇載之於爼畢用桑以喪祭故也刋其柄與末謂畢末頭亦刋削之畢既如此枇亦當然若吉時亦用棘吉用棘見特牲記率帶諸侯大夫皆五采士二采集説曰率與繂同此謂尸襲竟而加此大帶也謂之繂者但褶帛邊而尉殺之不用針線也以五采飾之士喪禮緇帶此二采天子之士也醴者稻醴也甕甒筲衡實見間而后折入集説曰此言葬時所藏之物稻醴以稻米為醴也甕甒皆瓦器甕盛醯醢甒盛醴酒筲竹器以威黍稷衡讀為桁以木為之所以庋舉甕甒之屬也見棺衣也言此甕甒筲衡實於見之外椁之內而后折入者折形如床而無足木為之直者三橫者五實物椁內既畢而後加之壙上以承抗席也重既虞而埋之集説曰重説見檀弓虞祭畢埋於祖廟門外之東凡婦人從其夫之爵位集説曰治婦人喪事皆以夫爵位尊卑為等降無異禮也小斂大斂啓皆辨拜集説曰禮當大斂小斂及啓攢之時君來弔則輟事而出拜之若他賓客至則不輟事待事卑乃即堂下之位而偏拜之故特舉此三節言之然若士當事而大夫至則士亦為大夫出也朝夕哭不帷無柩者不帷集説曰朝夕之間孝子欲見殯故哭則褰舉殯宫之帷哭畢仍垂下之無柩謂葬後也神主袝廟之後還在室無事於堂故不復施帷君若載而后弔之則主人東面而拜門右北面而踊出待反而后奠集説曰此謂君來弔臣之喪而柩已朝廟畢下堂載在柩車君既弔位在車之東則主人在車西東面而拜門右祖廟門之西偏也自內出則右在西孝子既拜君從位而立近門內西偏北面而哭踊為禮也踊畢先出門以待拜送不敢必君之久留也君命之反還喪所而後奠者凡君來必設奠告柩知之也一説此謂在廟載柩車之時奠為反設祖奠子羔之襲也繭衣裳與稅衣纁袡為一素端一皮辨一爵辨一玄冕一曾子曰不襲婦服集説曰子羔孔子弟子髙柴也襲以衣斂尸也繭衣裳謂衣裳相連而綿為之著也稅衣黑色纁絳色帛袡裳下褖也繭衣褻故用褖衣為表合為一稱故云繭衣裳與稅衣纁袡為一素端一第二稱也賀氏云衣裳並用素為之皮辨一第三稱也皮辨之服布衣而素裳爵辨一第四稱也其服玄衣而纁裳玄冕一第五稱也其服亦玄衣纁裳衣無文而裳刺黼大夫之上服也婦服指纁袡而言曾子非之以其不合於禮也為君使而死公館復私館不復公館者公宫與公所為也私館者自卿大夫以下之家也集説曰説見曾子問公七踊大夫五踊婦人居間士三踊婦人皆居間集説曰國君五日而殯自死至大斂凡七次踊者始死一也明日襲二也襲之明日之朝三也又明日之朝四也其日晚小斂五也小斂明日之朝六也明日大斂時七也大夫三日而殯凡五次踊者始死一也明日襲之朝二也明日之朝及小斂四也小斂之明日大斂五也士二日而殯凡三次踊者始死一也小斂時二也大斂時三也凡踊男子先踊踊畢而婦人乃踊婦人踊畢賓乃踊是婦人居主人與賓之中間故云居間也然記者固云動尸舉柩哭踊無數而此乃有三五七之限者此以禮經之常節言彼以哀心之泛感言也又所謂無數者不以每踊三跳九跳為三踊之限也公襲卷衣一玄端一朝服一素積一纁裳一爵辨二玄冕一褒衣一朱緑帶申加大帶於上注曰士襲三稱子羔襲五稱今公襲九稱則尊卑襲數不同矣諸侯七稱天子十二稱與集説曰卑者以卑服親身如子羔之襲是也公貴者故上服親身褒衣最外尊顯之也玄端玄衣朱裳齊服也天子以為燕服士以為祭服大夫以為私朝之服朝服緇衣素裳公日視朝之服也素積皮辨之服公視朔之服也纁裳冕服之裳也爵辨二者玄衣纁裳二通也以其為始命所受之服故特用二通示重本也玄冕見上章褒衣者君所加賜之衣最在上榮君賜也諸侯襲尸用小帶以為結束散在於衣非是總束其身此帶則素為之而飾以朱緑之采也申重也重於革帶之上非對朱緑帶為重也重加大帶象生時大帶也此帶即上章所云率帶諸侯大夫皆五采士二采者是也小斂環絰公大夫士一也疏曰環絰一股而纒也親始死孝子去冠至小斂不可無飾士素委貌大夫以上素辨而貴賤悉得加於環絰故云公大夫士一也知士素委貌者武叔投冠括髮諸侯之大夫當天子之士也知大夫以上素爵辨者記云大夫與殯亦辨絰以大夫與他殯尚辨絰則子辨絰明矣諸侯以上尊固宜辨絰公視大斂公升商祝鋪席乃斂集説曰君臨臣喪而視其大斂商祝習知殷禮者専主斂事主人雖先已鋪席布絞襟等物聞君將至悉徹去之待君至升堂商祝乃始鋪席為斂事蓋榮君來為新之也亦示若事由君也魯人之贈也三玄二纁廣尺長終幅集説曰贈以物送别死者於槨中也既夕禮曰贈用制幣玄纁束一丈八尺為制今魯人雖用玄與纁而短狹如此則非禮矣故記者譏之幅之度二尺二寸弔者即位於門西東面其介在其東南北面西上西於門主孤西面相者受命曰孤某使某請事客曰寡君使某如何不淑相者入告出曰孤某須矣弔者入主人升堂西面弔者升自西階東面致命曰寡君聞君之喪寡君使某如何不淑子拜稽顙弔者降反位集説曰此言列國遣使弔喪之禮弔者君所遣來之使也介副也門西主國大門外西也西上者介非一人其長者在西近正使也西於門不敢當門之中也主孤西面立於阼階之下也相者受命相禮者受主人之命也如何不淑慰問之辭言何為而罹此凶禍也孤某稱其君名者君薨稱子某使人知適嗣也須矣凶禮不出迎也主人升堂由阼階而升也降反位者出反門外位無出字脫曲禮云升降不由阼階謂平常無弔賓時耳含者執璧將命曰寡君使某含相者入告出曰孤某須矣含者入升堂致命子拜稽顙含者坐委於殯東南有葦席既葬蒲席降出反位宰夫朝服即喪屨升自西階西面坐取璧降自西階以東疏曰宰謂上卿也夫衍字朝服吉服也以鄰國執玉而來執玉不麻故著朝服以仍在喪不可純吉故即喪屨也此遭喪已久故嗣子親受禮宰著朝服若始遭喪則主人不親受使大夫受於殯宫此弔者既為上客又賵者是上介則此含者襚者當是副介末介但含襚於死者為切故在先陳之集説曰此言列國致含之禮含玉之形制如璧注云分寸大小未聞坐委跪而致之也未葬之前設葦席以承之既葬則設蒲席承之鄰國有逺近故有葬後來致含者降出反位謂含者委璧訖降階而復門外之位也以東藏於內也襚者曰寡君使某襚相者入告出曰孤某須矣禭者執冕服左執領右執要入升堂致命曰寡君使某襚子拜稽顙委衣於殯東襚者降受爵辨服於門內霤將命子拜稽顙如初受皮辨服於中庭自西階受朝服自堂受玄端將命子拜稽顙皆如初襚者降出反位宰夫五人舉以東降自西階其舉亦西面疏曰席南頭為上服重者使執而入餘服則受之既受處不同則陳於璧北亦重者在南凡諸侯相襚衣數無文據此其服有五又先路褒衣不以襚以外無文集説曰此言列國致襚之禮衣服曰襚委於殯東即委璧之席上也左執領則領向南此襚者既致冕服訖復降而出取爵辨服以進子拜如初者如受冕服之禮也受訖襚者又出取皮辨服及朝服及玄端服每服進受之禮皆如初但受之之所不同耳授襚者以服者賈人其舉亦西面者亦如襚者之西面也上介賵執圭將命曰寡君使某賵相者入告反命曰孤某須矣陳乘黃大路於中庭北輈執圭將命客使自下由路西子拜稽顙坐委于殯東南隅宰舉以東疏曰此無賻賻是加厚非常故也既夕有贈者贈施於死必及葬節此未必一當葬時既夕有奠奠主於兄弟親者諸侯相與既疏故無奠集説曰此言列國致賵之禮車馬曰賵乘黃四黃馬也大路車也北輈車之輈轅北向也客使上介所役使之人也為客所使故曰客使自率也下謂馬也由在也路即大路也陳車北轅畢賵者執圭升堂致命而客之從者率馬設在車之西也車亦此從者設之子拜之後賵客即跪而致其主於殯東南隅之席上而宰舉之以東而藏於內也覲禮車在西統於賓也既夕禮車以西為上者為死者而設於鬼神之位也此賵禮車馬為助主人送葬而設統於主人故車在東也凡將命鄉殯將命子拜稽顙西面而坐委之宰舉璧與圭宰夫舉襚升自西階西面坐取之降自西階注曰宰夫宰之佐也此言宰舉璧與圭則上宰夫朝服衍夫字集説曰凡將命者總言上文弔含襚賵將命之禮也鄉殯者立於殯之西南而面東北以向殯也將命之時子拜稽顙畢將命者來就殯東西靣而坐委之其含璧與圭則宰舉之襚衣則宰夫舉之而其舉也皆自西階升而西面以跪而取之乃自西階以降也賵者出反位於門外集説曰此句當屬於前章上介賵云云宰舉以東之下上客臨曰寡君有宗廟之事不得承事使一介老某相執綍相者反命曰孤某須矣臨者入門右介者皆從之立於其左東上宗人納賓升受命於君降曰孤敢辭吾子之辱請吾子之復位客對曰寡君命某毋敢視賔客敢辭宗人反命曰孤敢固辭吾子之辱請吾子之復位客對曰寡君命某毋敢視賓客敢固辭宗人反命曰孤敢固辭吾子之辱請吾子之復位客對曰寡君命使臣某毋敢視賓客是以敢固辭固辭不獲命敢不敬從客立於門西介立於門左東上孤降自阼階拜之升哭與客拾踊三客出送於門外拜稽顙疏曰前四禮客皆在門西此臨在門東者前者四禮皆是奉君命而行如聘禮聘之與享也此臨是私禮若聘禮私覿故在門東集説曰上客主人入門而右客入門而左禮也今此客入門之右是不敢以賓禮自居也宗人掌禮之官欲納此弔賓先受納賓之命於主國嗣君然後降而請於客使之復門左之賓位也宗人以客答之辭入告於君而反命于客如是者三客乃自稱使臣而從其命於是立於門西之賓位主君自阼階降而拜之主客俱升堂哭而更踊者三所謂成踊也不迎而送喪無接賓之禮其國有君喪不敢受弔疏曰此謂國有君喪而臣又有親喪則不敢受他國賓來弔也以義斷恩哀痛主於君不私於親也外宗房中南面小臣鋪席商祝鋪絞襟衾士盥于盤北舉遷尸于斂上卒斂宰告子馮之踊夫人東面坐馮之興踊注曰此喪大記脫字重著於是喪有與天子同者三其終夜燎及乘人専道而行集説曰終夜燎謂遷柩之夜須光明達旦也乘人謂人引車不用馬也専道柩行於路人皆避之也禮記述注卷十七
