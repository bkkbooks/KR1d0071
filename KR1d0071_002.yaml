body:
  text: 禮記述註卷二安溪李光坡撰曲禮下第二凡奉者當心提者當帶疏曰物有宜奉持者有宜提挈者奉者仰手當心提者屈臂當帶帶有二處朝服之屬其帶則髙於心深衣之類其帶則下於脇此當帶深衣之帶也古人常服深衣執天子之器則上衡國君則平衡大夫則綏之士則提之疏曰上髙也衡平也平謂人之拱手正當心平故謂心為衡天子器不宜下故臣為擎奉皆髙於心諸侯降於天子故臣為奉持器與心平大夫降於諸侯故其臣奉器下於心綏下也士提之則又在綏下凡執主器執輕如不克執主器操幣圭璧則尚左手行不舉足車輪曵踵集說曰大夫稱主此則通上下貴賤言之如不克似不能勝也聘禮曰上介執玉如重尚左手謂左手在上左陽尊也踵脚後也執器而行但起其前而曵引其踵如車輪之運於地故曰車輪曵踵方氏曰左手不如右強尚左手所以為容下右手所以致力立則磬折垂佩主佩倚則臣佩垂主佩垂則臣佩委集說曰僂折如磬之背而玉佩從兩邉懸垂此立容之常然臣之於君尊卑殊等則當視其髙下之節而倍致其恭敬之容可也㣲俛則倚於身小俛則垂大俛則委於地皆於佩見其節執玉其有藉者則裼無藉者則襲註曰藉藻也裼襲文質相變耳有藻為文裼見美亦文無藻為質襲充美亦質圭璋特而襲璧琮加束帛而裼亦是也疏曰古人之衣近體有袍襗之屬其外有裘夏月則衣葛或裘或葛其上皆有裼衣裼衣之上有常著之服則皮弁服之屬是也掩而不開謂之襲若開此皮弁及中衣左袒出其裼衣謂之為裼故鄭註聘禮云裼者左袒也集説曰聘禮注云曲禮云執玉其有藉者則裼無藉者則襲所謂無藉謂圭璋特逹不加束帛當執圭璋之時其人則襲也有藉者謂璧琮加於束帛之上當執璧琮時其人則裼也曲禮所云專主圭璋特而襲璧琮加束帛而裼一條言之先儒乃以執圭而垂繅為有藉執圭而屈繅為無藉非然竊詳經文裼襲是一事垂繅屈繅又别是一事不容混合為一說國君不名卿老世婦大夫不名世臣姪娣士不名家相長妾疏曰不名不得呼其名也上卿貴故曰卿老世婦兩媵媵次於夫人而貴於諸妾也世臣父在時老臣也姪是妻之兄女娣是妻之妹從妻來為妾也大夫不世爵此有世臣者子賢襲父爵也家相助知家事者長妾妾之有子者君大夫之子不敢自稱曰余小子大夫士之子不敢自稱曰嗣子某不敢與世子同名集説曰列國之君與天子之大夫其子皆不敢自稱余小子避嗣天子之稱也列國之大夫與士之子不敢自稱嗣子某避嗣諸侯之稱也吕氏曰世子君子適子也諸臣之子不敢與之同名亦避君也若名之在世子之前則世子為君亦不避穀梁傳曰衞齊惡衞侯惡何為君臣同名也君子不奪人名不奪人親之所名君使士射不能則辭以疾言曰某有負薪之憂吕氏曰射者男子之所有事不能可以疾辭不可以不能辭也負薪賤役士之所親事者疾則不能矣故曰負薪之憂也侍於君子不顧望而對非禮也吕氏曰顧望而後對者不敢先他人而言也應氏曰有察言觀色之意君子行禮不求變俗祭祀之禮居䘮之服哭泣之位皆如其國之故謹修其法而審行之集説曰言卿大夫士有徙居他國者行禮之事猶宜重本不可變其故國之俗皆當謹修其典法而審慎以行之雖舉三事餘冠昏之屬從可知也去國三世爵禄有列於朝出入有詔於國註曰三世自祖至孫踰久可以忘故俗而猶不變者爵禄有列於朝謂君不絶其祖祀復立其族若臧紇奔邾立臧為矣詔告也謂與卿大夫吉凶徃來相赴告若兄弟宗族猶存則反告於宗後註曰謂無列無詔者反告亦謂吉凶也宗後宗子也去國三世爵禄無列於朝出入無詔於國唯興之日從新國之法註曰以故國於己無恩興謂起為卿大夫疏曰推此而言若本國猶有列詔者雖仕新國猶行故俗蓋云無列詔而従新眀有則不従也又若無列詔而不仕新者不得従新盖云唯興眀不興則不従君子已孤不更名集説曰名者始生三月之時父所命也父歿而改之孝子孝子所不忍也已孤暴貴不為父作諡集説曰文王雖為西伯不為古公公季作諡周公成文武之德亦不敢加太王王以諡也吕氏曰父為士子為子子諸侯則祭以天子諸侯其尸服以士服是可以己之禄養其親不敢以己之爵加其親也父之爵卑不當諡而以己爵當諡而作之是以己爵加其父欲尊而反卑之非所以敬其親也居䘮未𦵏讀䘮禮既𦵏讀祭禮䘮復常讀樂章居䘮不言樂祭事不言凶公庭不言婦女集説曰復常除服之後也樂章弦歌之詩也吕氏曰讀是書非肄業也當是時不知是事不以禮事其親者也吉凶之事不相干哀樂之情不可以貳故䘮凶事也不言樂祭吉事也不言凶公私之事不可相干私事不可言於公庭故公庭不言婦女振書端書於君前有誅倒筴側龜於君前有誅集説曰人臣以職分内事事君每事當謹之於素文書簿領已至君前乃始振拂其塵埃而端整之卜筮之官龜筴其所奉以周旋者於君前而有顚倒反側之狀此皆不敬其職業而慢上者故皆有罸龜筴几杖席蓋重素珍絺綌不入公門集説曰龜筴臣之龜筴也問國事自有國之守龜問私事則自於其家皆不當入也几杖所以優髙年嫌自尊也席所以坐卧蓋所以蔽日與雨絺綌所以凉體袗單也單則見體而䙝此三者宴安之具也重素衣裳皆素也以非吉服故亦不可以入公門苞屨扱衽厭冠不入公門集説曰苞讀為藨以藨蒯之草為齊衰䘮屨也扱衽以深衣前衽扱之於帶也蓋親初死時孝子以號踊履踐為妨故扱之也厭冠䘮冠也吉冠有纚有梁䘮冠無之故厭帖然也此皆凶服故不可以入公門書方衰凶器不以告不入公門集説曰方板也書方者條録送死物件於方板之上衰五服之衰也凶器若棺槨牆霎明器之屬不以告不入公門謂告則可入者蓋臣妾有死於宫中者君亦許其殯而成䘮然必先告乃得将入也公事不私議馬氏曰季孫使冉有訪田賦於仲尼仲尼不對而私於冉有何也季氏用田賦非孔子所能止其私於冉有豈得已哉君子将營宫室宗廟為先廐庫為次居室為後集説曰君子有位者也宗廟所以奉先故先營之廐以養馬庫以藏物欲其不乏用也故次之居室則安身而已故又次之凡家造祭器為先犧賦為次養器為後疏曰家造謂大夫始造家事也諸侯大夫少牢此言犧牛天子之大夫也祭祀賦歛邑民供出牲牢故曰犧賦集説曰犧賦亦以造言者如周官牛人供牛牲之互與盆簝之類鄭注互若今屠家懸肉格盆以盛血簝受肉籠也無田禄者不設祭器有田禄者先為祭服君子雖貧不粥祭器雖寒不衣祭服為宫室不斬於丘木吕氏曰祭器可假服不可假也邱木可以庇宅兆為宫室而斬之是慢其先而濟吾私也大夫士去國祭器不踰竟大夫寓祭器於大夫士寓祭器於士吕氏曰臣之所以有祭器以事其先者用君禄所作也今去位夫乃挈器以行是竊君之禄以辱其先此祭器所以不踰竟也寓寄於爵等之同者使之可用言寓冀其復還得用也大夫士去國踰竟為壇位鄉國而器素衣素裳素冠徹縁鞮屨素簚乗髦馬不蚤鬋不祭食不説人以無罪婦人不當御三月而復服集説曰此大夫士三諫而不從出在竟上大夫則待放三年聼於君命若與環則還與玦便去壇位除地而為位也鄉國向其本國也徹縁去中衣之采緣而純素也鞮屨無絢之菲也古絇以物繫之為行戒故用一一寸屈之為絇絇為拘著屨頭以容受繫穿貫也素簚素白狗皮也簚車覆䦨也既夕禮云主人乗惡車白狗幦是也髦馬不翦剔馬之髦鬛以為飾也蚤治手足爪也鬋剔治鬚髮也祭食食盛饌則祭先代為食之人也不説人以無罪者己雖遭放逐而出不説以無罪解説於人過則稱己也御待御寝宿也凡此皆為去父母之邦捐親戚去墳墓失禄位亦一家之變故也故以凶䘮之禮自處三月為一時天氣小變故必待三月而後復其吉服也大夫士見於國君君若勞之則還辟再拜稽首集説曰此言大夫士出聘他國見於主君君若問勞其道路之勤苦則旋轉退避乃再拜稽首也君若迎拜則還辟不敢答拜集説曰聘賓初至主國大門外主君迎而拜之賓則退却不敢答拜而抗賓主之禮也大夫士相見雖貴賤不敵主人敬客則先拜客客敬主人則先拜主人疏曰此謂使臣行禮受勞已竟次見彼國卿大夫也唯賢是敬不計賓主貴賤謂異國則爾同國則否凡非弔䘮非見國君無不答拜者集説曰弔䘮而不答主人之拜者以為己本來助執䘮事非行賓主之禮故主人雖拜己已不答也士䘮禮有賓則拜之賓不答拜是也士見本國之君尊卑遼絶故君不答拜此二者之外無不答拜也大夫見於國君國君拜其辱士見於大夫大夫拜其辱同國始相見主人拜其辱集説曰君拜大夫之辱大夫拜士之辱皆謂初為大夫初為士而來見也此後朝見則有常禮矣士相見禮士見國君君答拜者亦以其初為士而敬之也主人拜辱拜其先施也此謂尊卑相等者言同國則異國亦當然矣君於士不答拜也非其臣則答拜之大夫於其臣雖賤必答拜之集説曰君於士雖不答拜然不以施之他國之士者以其非己之臣也大夫答賤臣之拜避國君之體也男女相答拜也集説曰男女嫌疑之避亦多端矣然拜而相答所以為禮豈以行禮為嫌哉故記者明言之國君春田不圍澤大夫不掩羣士不取麛卵集説曰春時萬物産孕不欲多傷殺故不合圍繞取也夏亦當然羣聚故曰掩麛鹿子凡獸子亦通名之麛卵㣲故曰取君大夫士位有等降故所取各有限制此與王制文異方氏曰用大者取愈廣位卑者禁愈嚴嵗凶年糓不登君膳不祭肺馬不食糓馳道不除祭事不縣大夫不食粱士飲酒不樂集説曰膳者美食之名肺為氣主周人所重故食必先祭肺言不祭肺示不殺牲為盛饌也馳道人君驅馳車馬之路不除不掃除也祭必有鐘磬之縣今不縣言不作樂也大夫食黍稷以粱為加公食大夫禮設正饌之後乃設稻粱所謂加也自君至士各舉一事尊者舉其大者卑者舉其小者其實互相通耳君無故玉不去身大夫無故不徹縣士無故不徹琴瑟註曰故謂災患䘮病疏曰自士以上皆有玉佩上云君不去玉則知下通於士也下言士不去琴瑟亦上通於君也大夫士無樂小胥大夫判縣士特縣者娛身之樂及治人之樂故鄉飲酒有工歌之樂是也無樂者謂無祭祀之樂故特牲少牢無樂若然此云者謂娛身及治民之樂也士有獻於國君他日君問之曰安取彼再拜稽首而后對集説曰安取彼猶言何所得彼物也大夫私行出疆必請反必有獻士私行出疆必請反必告君勞之則拜問其行拜而后對疏曰大夫無外交而此有私行出界或是新來大夫姻婭猶在本國故有私行往來集説曰大夫士以私事出疆皆請為君其反也大夫有獻而士不獻不以卑者之物凟尊上也告還而已勞之者慰勞己之勞苦問行謂道中無恙及所經過先拜後答急謝見問之寵也國君去其國止之曰奈何去社稷也大夫曰奈何去宗廟也士曰奈何去墳墓也國君死社稷大夫死衆士死制疏曰國君云死社稷而大夫士不云死宗廟墳墓者以宗廟墳墓已私有之大夫士為臣事君不可為私事而死祗得死君之師衆及君政令然君言死社稷則宗廟墳墓亦死可知也但社禝受於天子故特舉言焉集説曰死社稷謂國亡與亡也死衆謂討罪禦敵也則死之也死制受命於君難毋苟免也君天下曰天子朝諸侯分職授政任功曰予一人註曰皆擯者辭也天子謂外及四海也今漢於蠻夷稱天子於王侯稱皇帝覲禮曰伯父實來余一人嘉之踐阼臨祭祀内事曰孝王某外事曰嗣王某註曰皆祝辭也集説曰踐履也阼主階也履主階而行事故曰踐阼也宗廟之事為内郊社之事為外祝辭稱孝王某者事親之辭嗣王某者事神之辭也臨諸侯畛於鬼神曰有天王某甫集説曰畛致也天子巡狩而至諸侯之國必使祝史致鬼神當祭者之祭以不親徃故祝辭稱字曰某甫甫者大夫之美稱也方氏曰望秩之禮必於野外故以畛言之畛田間道也祭於畛而謂之畛猶祭於郊而謂之郊也天子適諸侯非其常蓋有時矣故有是特言有焉崩曰天王崩復曰天子復矣告䘮曰天王登假措之廟立之主曰帝集説曰自上墜下曰崩亦壊敗之稱王者卒則史書於䇿曰天王崩復者人死則形神離古人持死者之衣升屋北面招呼死者之䰟令還復體魄冀其再生也故謂之復天子復者升屋呼招之辭臣子不可名君故呼曰天子復也疏云以例言之則王后死亦呼王后復也告䘮赴告侯國也遐逺邈之義登遐言其所升髙逺猶漢書稱大行行乃循行之行去聲以其徃而不反故曰大行也措置也立之主者疏云白虎通曰神無依據孝子以繼心也虞而作主至祔奉以祔祖事畢反之殯宫至小祥作栗主入廟乃埋桑主於祖廟門左埋重處大夫士無主以幣帛祔畢並還殯宫至小祥入廟天子未除䘮曰予小子生名之死亦名之註曰生名之曰小子王死亦曰小子王也晉有小子侯是僭號也吕氏曰春秋書王子猛卒不言小子者臣下之稱與史䇿之辭異也天子有后有夫人有世婦有嬪有妻有妾疏曰后後也言后於天子亦以廣後𦙍也夫扶也扶持於王也婦服也加以世者服事君子可廣世𦙍也嬪可賓敬也妻者齊也進御之時暫有齊同之義妾謂得接見於君子天子建天官先六大曰大宰大宗大史大祝大士大卜典司六典註曰典法也此蓋殷時制也周則大宰為天官大宗曰宗伯宗伯為春官大史以下屬焉大士以神仕者天子之五官曰司徒司馬司空司士司寇典司五衆註曰衆謂羣臣也此亦殷時制也周則司士屬司馬大宰司徒宗伯司馬司冦司空為六官天子之六府曰司土司木司水司草司器司貨典司六職註曰府主蔵六物之稅者此亦殷時制也周則皆屬司徒司土土均也司木山虞也司水川衡也司草稻人也司器角人也司貨卝人也天子之六工曰土工金工石工木工獸工草工典制六材註曰此亦殷時制也周則皆屬司空土工陶旊也金工築冶六者石工玉磬也木工輪輿七者獸工函鮑五者惟草工職亡蓋謂作萑葦之器坡謂夏受虞禪繼治道同宜仍虞官猶虞於唐然𦙍征有羲和之職其一隅也周之六官則較然矣惟此四條既異虞典亦非周官非殷而何陳氏譏註無攷以為臆説彼斷其臆説又何攷也五官致貢曰享吕氏曰嵗終則司徒以下五官各致其功獻于王故謂之享貢功也享獻也五官之長曰伯是職方其擯於天子也曰天子之吏天子同姓謂之伯父異姓謂之伯舅自稱於諸侯曰天子之老於外曰公於其國曰君集説曰五官之長者天子之三公也伯者長大之名三公無異職則六卿中三人兼之處乎内者謂之相九命而作伯則分主畿外諸侯如公羊云自陜而東者周公主之自陜而西者召公主之是也是職方者言二伯於是職主其所治之方也天子之吏擯者辭也疏云亦當言名稱之為父舅親親之辭也此伯皆有采地在王畿自稱於畿内在采地之外則曰公自稱於采地之内則曰君也九州之長入天子之國曰牧天子同姓謂之叔父異姓謂之叔舅於外曰侯於其國曰君集説曰天下九州天子於毎州之中擇諸侯之賢者一人加之一命使主一州内之列國取牧養下民之意故曰牧叔父叔舅降於伯父伯舅也自稱於所封國之外則曰侯若與國内臣民言則自稱曰君也其在東夷北狄西戎南蠻雖大曰子於内自稱曰不穀於外自稱曰王老集説曰九州之外不過子男之國天子亦選賢以為牧但以卑且逺故不以牧稱亦不稱父舅朝見之辭擯辭惟曰子雖或有功益地至侯伯之數其爵亦不過子故云雖大曰子也如楚在春秋雖大國而其爵則稱子也穀善也於内與其臣民言也外謂夷狄之境也自稱玉老言天子之老臣也庻方小侯入天子之國曰某人於外曰子自稱曰孤疏曰小侯非為牧者也於外曰子者此君在其本國外四夷之中自稱依其本爵曰子舉其尊稱耳若男亦稱男也若自與臣民言則稱孤孤者特立無德之稱也集説曰四夷之君其來荒逺故以庻方名之庻衆也某人若牟人介人之類天子當依而立諸侯北面而見天子曰覲天子當宁而立諸公東面諸侯西面曰朝註曰春朝受摯於朝受享於廟秋覲一受之於廟朝者位於内朝而序進覲者位於廟門外而序入王南立於依宁而立焉夏宗依春秋遇依秋疏曰依狀如屏風以絳為質髙八尺東西當户牖之間繡為斧文亦曰斧依天子見諸侯則依而立負之而南面以對諸侯也宁者爾雅云門屏之間謂之宁李廵云正門内兩塾間曰宁謂天子受朝於路門外之朝於門外而宁立以待諸侯之至路門外有屏者爾雅云正門謂之應門又云屏謂之樹郭云小墻當門中諸侯内屏在路門之内天子外屏在路門之外而近應門者也云朝者位於内朝而序進崔云諸侯春夏來朝各乗其命車至臯門外陳介也天子車時在大門内傳辭既訖則乗車出大門下車若升朝之時王但迎公自諸侯以下則隨之而入更不别迎也入至文王廟門天子還服朝服立於路門之外諸侯更易服朝服執贄而入應門而行禮故王當宁以待諸侯次第而進故云序進謂入應門諸公東面諸侯西面若熊氏之義則朝無迎法唯享有迎諸侯之禮云覲者位於廟門外而序入者其宿受位次在廟門外至朝之旦秋冬王不出迎其尊卑各在其次中未得相見聼上擯進之乃於位次第而入故云序入也又曰凡天子三朝一在路門内謂之燕朝大僕掌之二是路門外之朝謂之治朝司士掌之其三是臯門之内庫門之外謂之外朝朝士掌之諸侯亦有此三朝諸侯未及期相見曰遇相見於卻地曰㑹集説曰未及期在期日之前也卻地間隙之地也下言相見及期日也遇有遇禮㑹有㑹禮諸侯使大夫問於諸侯曰聘集説曰比年小聘三年大聘小聘大夫徃大聘則卿徃約信曰誓涖牲曰盟集説曰約信者以言語相約㑹為信也用誓禮涖臨也春秋所書遇㑹盟聘皆有之惟無誓耳疏云盟之為法先鑿地為方坎殺牲於坎上割牲左耳盛以珠槃又取血盛以玉敦用血為盟書成乃軟血而讀書置牲坎上加書於上而埋之謂之載書也諸侯見天子曰臣某侯某其與民言自稱曰寡人其在凶服曰適子孤集説曰臣某侯某如云臣齊侯小白臣晉侯重耳之類擯者告天子之辭也凡自稱皆曰寡人不獨與民言也此畧言之耳適子孤亦擯者告賓之辭也臨祭祀内事曰孝子某侯某外事曰曽孫某侯某死曰薨復曰某甫復矣集説曰内外事見前章曾孫猶晉平公禱河而稱曾臣彪之類天子德厚流光故外事稱嗣王某諸侯不敢言繼嗣但謙是祖父重孫故稱曽孫也薨之為言也幽晦之義本國史書之辭復稱字臣不名君也既葬見天子曰類見註曰代父受國類猶象也執皮帛象諸侯之禮見也疏曰春秋之義除䘮乃見今云既葬者謂天子廵狩至竟故得見未葬未正君臣雖天子廵狩亦不見也言諡曰類註曰使大夫行象聘問之禮也疏曰王肅云請諡於天子必以其實為諡類於平生之行也諸侯使人使於諸侯使者自稱曰寡君之老集説曰寡君之老惟上大夫可稱見玉藻天子穆穆諸侯皇皇大夫濟濟士蹌蹌庻人僬僬吕氏曰穆穆幽深和敬之意皇皇壯盛顯明之貌濟濟修飾齊一之貌蹌蹌翔舉舒揚之貌庻人見乎君不為容進退趨走僬僬雖無所考大低趨走促數不為容之貌也天子之妃曰后諸侯曰夫人大夫曰孺人士曰婦人庻人曰妻註曰妃配也后之言後也夫之言扶孺之言屬婦之言服妻之言齊公侯有夫人有世婦有妻有妾夫人自稱於天子曰老婦集説曰畿内諸侯之妻因助祭於王后或因獻繭之屬故得以見天子自稱於諸侯曰寡小君疏曰此諸侯謂他國君也古者諸侯相饗夫人亦出故得自稱也坊記云陽侯殺繆侯而竊其夫人故大饗廢夫人之禮君之妻曰小君而曰寡者亦從君為謙也自稱於其君曰小童自世婦以下自稱曰婢子集説曰小童未成人之稱婢之言卑也子於父母則自名也集説曰自稱其名言子者通男女列國之大夫入天子之國曰某士自稱曰陪臣某於外曰子於其國曰寡君之老使者自稱曰某集説曰某士擯者稱其人曰某國之士也晉韓起聘於周擯者曰晉士起蓋列國卿大夫其命數與天子之士等也陪重也諸侯為天子之臣已又為諸侯之臣也於外曰子者則擯者辭在他國則擯者稱其姓而曰子春秋閔二年齊髙子來盟髙徯是也於其國曰寡君之老謂在己國與人語則以此自稱也使者自稱曰某某名也若為使在他國與彼君語則稱名也天子不言出諸侯不生名君子不親惡諸侯失地名滅同姓名疏曰君子不親惡者謂孔子書經見天子大惡書出以絶之諸侯大惡書名以絶之君子不親此惡故書出名以絶之也為人臣之禮不顯諫三諫而不聼則逃之註曰為奪美也顯明也謂明言其君惡不幾㣲逃去也君臣有義則合無義則離子之事親也三諫而不聼則號泣而隨之註曰至親無去志在感動之疏曰檀弓云事君有犯故此論其㣲云事親無犯此論其犯相互耳君有疾飲藥臣先嘗之親有疾飲藥子先嘗之醫不三世不服其藥吕氏曰醫三世治人多用物熟矣功已試而無疑然後服之亦謹疾之道也儗人必於其倫疏曰不得以貴比賤為不敬也方氏曰禹顔顔囘時不同矣孔子俱以為賢儗之以道也夷惠伊尹迹不同矣孟子俱以為聖儗之以心也子貢以有若似孔子徒儗之以貌而已不知聖賢之德不倫也公孫丑以管仲比孟子徒儗之以位而已不知王覇之道不倫也問天子之年對曰聞之始服衣若干尺矣註曰既不敢言年又不敢斥至尊所能疏曰此謂逺方異域人來不知王年問於朝臣集説曰數始於一而成於十干字從一從十故言若干謂或如一或如十凡數之未定者皆可言顔註食貨志云干箇也謂當如此箇數意亦近之問國君之年長曰能從宗廟社稷之事矣幼曰未能從宗廟社稷之事也疏曰亦謂他人問其臣也集説曰為國以禮而禮莫重於祭宗廟社稷事無有先於此者能則知其長未能則知其幼問大夫之子長曰能御矣幼曰未能御也疏曰亦謂他人問於大夫之臣也御謂主事也官有世功子學父業故有御事之因集説曰古者四十強而仕五十命為大夫大夫士其年既定故不假問其年而問其子之長幼御謂御車也御者六藝之一幼則未能問士之子長曰能典謁矣㓜曰未能典謁也疏曰亦謂他人問士之屬史謁請也典謁者主賔客告請之事士賤無臣子自典告也問庻人之子長曰能負薪矣幼曰未能負薪也集説曰負薪者庻人力役之事長則能問國君之富數地以對山澤之所出集説曰數地舉其土地之廣狹如百里七十里五十里各言之也山澤所出如魚鹽蜃蛤金玉錫石之類也問大夫之富曰有宰食力祭器衣服不假疏曰宰邑宰也有宰明有采地食力謂食下民賦稅之力衣服祭服也問士之富以車數對集説曰上士三命得賜車馬故問士富則以車數對也問庻人之富數畜以對集説曰庻人受田有定制惟畜牧之多寡在乎人故數畜以對也天子祭天地祭四方祭三川祭五祀歲徧諸侯方祀祭山川祭五祀歳徧大夫祭五祀嵗徧士祭其先吕氏曰此章泛論祭祀之法冬日至祭天夏日至祭地四時各祭其方以迎氣又各望祭其方之山川五祀則春祭户夏祭竈季夏祭中霤秋祭門冬祭行此所謂歳徧諸侯有國國必有方祭其所居之方而已非所居之方及山川不在境内者皆不得祭故曰方祀凡祭有其廢之莫敢舉也有其舉之莫敢廢也非其所祭而祭之名曰滛祀滛祀無福吕氏曰廢之莫敢舉如已毁之宗廟變置之社稷不可復祀也舉之莫敢廢如已修之壇墠而輙毁已正之昭穆而輙變也非所祭而祭之如法不得祭與不當而祭之之者也魯立武宫立煬宫舉其廢也躋僖公廢其舉也魯之郊禘與祀文王祀爰居祭所不當祭也滛過也以過事神神弗享也故無福天子以犧牲諸侯以肥牛大夫以索牛士以羊豕註曰犧純毛也肥養於滌也索求得而用疏曰此謂天子大夫士也若諸侯大夫即用少牢士則用特牲其䘮祭則大夫亦得用牛士亦用羊豕故雜記云上大夫之虞也少牢卒哭成事祔皆大牢下大夫之虞也特牲卒哭成事祔皆少牢是也支子不祭祭必告于宗子疏曰支子庻子也祖禰廟在適子之家庻子賤不敢輙祭若宗子有疾不堪當祭則庻子代攝可也猶必告于宗子然後祭吕氏曰别子為祖繼别為宗百世不遷者大宗也繼禰繼祖繼曾祖繼髙祖五世則遷者小宗也宗子上繼祖禰族人兄弟皆宗之冠娶妻必告死必赴况於祭乎所宗乎宗子者皆支子也支子不敢祭也如諸侯不敢祖天子大夫不敢祖諸侯尊者之祭非卑者所敢尸也故宗子為士庻子為大夫以上牲祭於宗子之家祝曰孝子某為介子某薦其常事則支子雖貴可以用其禄而不敢專其事宗子去在他國則支子攝主以祭其禮有殺凡祭宗廟之禮牛曰一元大武集説曰此以下凡二十一物元頭也武足迹也牛肥則迹大豕曰剛鬛疏曰豕肥則鬛剛豚曰腯肥疏曰腯充滿貌羊曰柔毛疏曰羊肥則毛細而柔弱雞曰翰音疏曰翰長也雞肥則鳴聲長犬曰羮獻集説曰犬肥則可為羮以獻凡煮肉皆謂之羮特牲禮云羮餁穎考叔曰未嘗君之羮是也雉曰疏趾疏曰趾足也雉肥則兩足開張趾相去疏也曰明視疏曰兎肥則目開而視明脯曰尹祭集説曰尹正也脯欲旉割方正稾魚曰啇祭集説曰稾乾也啇度也啇度其燥度之宜鮮魚曰脡祭集説曰脡直也魚之鮮不餒敗則挺然而直水曰清滌集説曰水𤣥酒也水可溉濯故曰清滌酒曰清酌集説曰古之酒醴皆有清有糟未泲者為糟既泲者者為清也黍曰薌合疏曰夫穀秫者曰黍秫既軟而相合氣息又香故曰薌合粱曰薌萁集説曰粱穀之強者其莖葉亦香故曰薌萁稷曰明粢集説曰稷粟也明則足以交神祭祀之飯謂之粢盛稻曰嘉蔬註曰稻菰蔬之屬韭曰豐本集説曰其根本豐盛也鹽曰鹹鹺註曰大鹹曰鹺今河東云玉曰嘉玉集説曰無瑕之玉也幣曰量幣集説曰中廣狹長短之度也疏曰此等諸號若一祭並有則舉其大者或惟有犬雞惟有魚兎則各有其號故經備載其名天子死曰崩諸侯曰薨大夫曰卒士曰不禄庻人曰死在牀曰尸在棺曰柩羽鳥曰降四足曰漬死冦曰兵註曰自上顚壊曰崩薨顚壊之聲疏曰卒畢竟也士禄以代耕不禄不終其禄也死者澌也消盡無餘之謂尸陳也古人病困氣未絶之時下置在地氣絶之後更還牀上所以如此者凡人初生在地病将死故下復其初生冀得脫死重生也若其不生復反本床既未殯殮陳列在床故曰尸也吕氏曰柩究也三日不生歛之在棺死事究竟於此也羽鳥飛翔之物降而下則死矣獸能動之物腐則則死矣漬謂其體腐敗漸漬也兵者死於冦難之稱也祭王父曰皇祖考王母曰皇祖妣父曰皇考母曰皇妣夫曰皇辟集説曰曰皇曰王皆以君之稱尊之也考成妣嫓辟法也妻所法式也為之宗廟以鬼享之不得不異其稱謂也生曰父曰母曰妻死曰考曰妣曰嬪壽考曰卒短折曰不禄集説曰嬪者婦人之美稱嬪猶賓也夫所賓敬也短折夭横而死也此言卒與不禄與上文大夫士之稱同者疏云此並是有德未經仕而死者之稱也老而死者從大夫之稱少而死者則從士之稱天子視不上於袷不下於帶國君綏視大夫衡視士視五歩集説曰天子視謂視天子也袷朝服祭服之曲領也綏頺下之貌視國君者自不得平看於靣當視其面之下袷之上也衡平也大夫之臣視大夫平看其面也士視五歩者若視大夫以上惟直瞻上下並不得旁視士之屬吏視士亦不得髙面下帶而得旁視左右五歩之間也凡視上於面則敖下於帶則憂傾則姦吕氏曰上於面者其氣驕知其不能以下人矣下於帶者其神奪知其憂在乎心矣視流則容側必有不正之心存乎胸中矣此君子之所以愼也君命大夫與士肄在官言官在府在府在庫言庫在朝言朝集説曰人君有命令則大夫士相與肄習之其事或在官或在府或在庫或在朝隨其所在而謀議之注云官謂版圗文書之處府謂寶藏貨賄之處也庫謂車馬甲兵之處也朝謂君臣謀政事之處也朝言不及犬馬集説曰犬馬㣲賤不當言之於朝輟朝而顧不有異事必有異慮故輟朝而顧君子謂之固疏曰臣於朝矜荘儼恪視不流目若忽止朝而廻顧此若非見異事則心有異慮也固謂鄙野不逹於禮也在朝言禮問禮對以禮集説曰朝廷之上凡所當言者皆禮也一問一對必稽於禮孔子在宗廟朝廷便便言唯謹爾盡此道也大饗不問卜不饒富吕氐曰冬至祀天夏至祀地日月素定故不問卜至敬不壇掃地而祭牲用犢酌用陶匏席用藁秸視天下之物無以稱其德以少為貴焉故不饒富凡摯天子鬯諸侯圭卿羔大夫鴈士雉庻人之摯匹童子委摯而退野外軍中無摯以纓拾矢可也集説曰摯與䞇同執物以為相見之禮也鬯醸秬黍為酒曰秬鬯和以欎金之草則曰欎鬯不以欎和則直謂之鬯言其芬香條暢於上下也天子無客禮而言摯者用以禮見於神而已圭命圭也公桓圭侯信圭伯躬圭子糓璧男蒲璧此不言璧略也羔取其羣而不失類且潔素也鴈取其知時且飛有行列也雉取其性之耿介且文飾也匹讀為鶩野鴨曰鳬家鴨曰鶩不能飛騰如庻人之終守耕稼也童子不敢與成人為禮或見師友而執贄則奠委於地而自退避之也疏云童子之贄悉用束脩也纓馬之繁纓即馬鞅也拾射韝也矢箭也或野外或軍中隨所有用之也婦人之摯椇榛脯脩枣栗集説曰椇形似珊瑚味甜美一名石李榛似粟而小脯即今之脯也脩用肉煅治加薑桂乾之脯形方正脩形稍長并棗栗六物婦初見舅姑以此為贄也左傳女贄不過榛栗棗脩以告䖍也納女於天子曰備百姓於國君曰備酒漿於大夫曰備埽灑吕氏曰天子妾媵有百不敢以伉儷自期願備妾媵之數而已自卑之辭也禮記述註卷二
