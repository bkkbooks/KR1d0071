body:
  text: 禮記述注卷四安溪李光坡撰檀弓下第四君之適長殤車三乘公之庶長殤車一乘大夫之適長殤車一乘疏曰殤未成人未有爵命車馬之賜而得遣車者言其父有之得與子也自上而下降殺以兩諸侯自得七乘其適子成人五乘長殤降二故三乘也庶子若成人乃三乘長殤則一乘大夫自得五乘適子成人三乘長殤故一乘集說曰此言送殤遣車之禮君謂國君亦或有地大夫通得稱君也公専言五等諸侯也十六至十九為長殤葬此殤時柩朝廟畢將行設遣奠以奠之牲體分折包裹用此車載之以遣送死者故名遣車車制甚小以置之椁內四隅不容大為之也禮中殤從上君適長三乘則中亦三乘下則一乘也公庶長一乘則中亦一乘下則無也大夫適長一乘則中亦一乘下殤及庶殤並無也公之喪諸達官之長杖方氏曰受命於君者其名達於上故謂之達官若府史而下皆長官自辟除則不可謂之逹矣受命於君者其恩厚故公之喪惟逹官之長杖集說曰凡官皆有長二此以長言則不及二也君於大夫將葬弔於宫及出命引之三步則止如是者三君退朝亦如之哀涎亦如之集說曰弔於宫其殯宫也出柩已行也孝子攀號不忍君命引之奪其情也引者三步即止君又命引之如是者三柩車遂行君即退去君來時不必恆在殯宫或當柩朝廟之時亦如之或已出大門至平日待賓客涎舍之處孝子哀而暫停柩車則亦如之五十無車者不越疆而弔人集說曰始衰之年不可以筋力為禮也季武子寢疾蟜固不說齊衰而入見曰斯道也將亡矣士唯公門說齊衰武子曰不亦善乎君子表微及其喪也曽㸃倚其門而歌集說曰季武子魯大夫季孫夙也蟜固人姓名㸃字晳曽子父也武子寢疾之時蟜固適有齊衰之服遂衣凶服而問疾且曰大夫之門不當釋凶服唯君門乃說耳此禮將亡我之凶服以來欲以救此將亡之禮也武子善之言失禮之顯著者人皆可知若失禮之微細者惟君子乃能表明之也武子執政人所尊畏固之為此欲以易時人之觀瞻據禮而行武子雖憾不得而罪之也若倚門而歌則非禮矣其亦狂之一端歟記者蓋善蟜固之存禮而譏曽㸃之廢禮也大夫弔當事而至則辭焉弔於人是日不樂婦人不越疆而弔人行弔之日不飲酒食肉焉集說曰大夫弔弔於士也大夫雖尊然當主人有小斂大斂或殯之事而至則儐者以其事告之辭猶告也若非當事之時則孝子下堂迎之婦人無外事故不越疆而弔是日不樂不飲酒食肉皆為餘哀未忘也弔於葬者必執引若從柩及壙皆執紼注曰示助之以力疏曰引引柩車索也弔葬本為助執事故必相助引柩車凡執引用人貴賤有數數足則餘人皆散行從柩紼引棺索也至下棺窆時則不限人數皆悉執紼也引者長逺之名故在車車行逺也紼是撥舉之義故在棺棺惟撥舉不長逺也喪公弔之必有拜者雖朋友州里舍人可也弔曰寡君承事主人曰臨集說曰此謂國君弔其諸臣之喪弔後主人當親往拜謝喪家若無主後必使以涎疏親往拜若又無疏親則死者之朋友及同州同里及喪家典舍之人往拜亦可也寡君承事言來承助喪事此君語擯者傳命以入之辭主人曰臨者謝辱臨之重也君遇柩於路必使人弔之集說曰蕢尚畫宫受弔不如杞梁之妻知禮而此言弔於路何也蓋有爵者之喪當以禮弔此謂臣民之微賤者耳必使人弔者君於民臣有父母之恩也大夫之喪庶子不受弔疏曰言大夫庶子不受弔則士之庶子得受弔也集說曰大夫之喪適子為主拜賓或以他故不在則庶子不敢受弔不敢以卑賤為有爵者之喪主也妻之昆弟為父後者死哭之適室子為主袒免哭踊夫入門右使人立於門外告來者狎則入哭父在哭於妻之室非為父後者哭諸異室疏曰女子子適人者為昆弟之為父後者不降以其正故也故姊妹之夫為之哭於適室之中庭子為主者甥服舅緦故命己子為主受弔拜賓也位在東階之下西向免哭踊者冠尊不居肉袒之上必先去冠而加免故凡哭哀則踊踊必先袒袒必先免故袒免哭踊也夫入門右者謂此子之父即哭妻兄弟者入門右近南而北向亦哭踊也集說曰此聞妻兄弟之喪而未往弔時禮也來相弔者狎與亡人相習知者父在己之父也為父後妻之父也哭於妻室注云不以私喪干尊哭於異室者雖父不在亦别哭之異於嫡也案奔喪禮妻黨哭諸寢寢是大名雖適室妻室異室總皆曰寢有殯聞逺兄弟之喪哭於側室無側室哭於門內之右同國則往哭之集說曰側室者燕寢之旁室也門內大門之內也門內之右繼門而近於南也猶西面但近南耳上篇言有殯聞逺兄弟之喪雖緦必往其亦謂同國歟方氏曰哭於側室注云嫌哭殯也尋常主位當在阼階東西面于門內之右者不居主位示為之變也同國則往者以其不逺也子張死曽子有母之喪齊衰而往哭之或曰齊衰不以弔注曰以其無服非之疏曰曽子與子張無服不應往哭故或人非之也若有服者雖緦亦往也曾子曰我弔也與哉注曰於朋友哀痛甚而往哭之非若凡弔有若之喪悼公弔焉子游擯由左集說曰悼公魯君哀公之子擯贊相禮事也立者尊右子游由公之左則公在右為尊矣少儀云詔辭自右者謂傳君之詔命則詔命為尊故傳者居右時相喪禮者亦多由右故子游正之也齊榖王姬之喪魯莊公為之大功或曰由魯嫁故為之服姊妹之服或曰外祖母也故為之服注曰春秋周女由魯嫁卒則服之如內女服姊妹是也天子為之無服嫁於王者之後乃服之集說曰榖讀為告齊襄公夫人王姬卒在魯莊之二年赴告於魯其初由魯而嫁故魯君為之服出嫁姊妹大功之服禮也或人既不知此王姬乃莊公舅之妻而以為外祖母又不知外祖母服小功而以大功為外祖母之服其亦妄矣晉獻公之喪秦穆公使人弔公子重耳且曰寡人聞之亡國恆於斯得國恆於斯雖吾子儼然在憂服之中喪亦不可久也時亦不可失也孺子其圖之集說曰獻公薨時重耳避難在狄故穆公使人往弔之弔為正禮故以且曰起下辭寡人聞之者此使者傳穆公之言也恆於斯言常在此死生交代之際也儼然端靜持守之貌喪失位也喪不可久時不可失者勉其奔喪反國以謀襲位故言孺子其圖之也此時秦已有納之之志矣以告舅犯舅犯曰孺子其辭焉喪人無寶仁親以為寶父死之謂何又因以為利而天下其孰能說之孺子其辭焉集說曰舅犯重耳舅狐偃字子犯也公子既聞使者之言以告之子犯犯言當辭而不受可也失位去國之人無以為寶惟仁愛思親乃其寶也父死謂是何事正是凶禍大事豈可又因此凶禍以為反國之利而天下之人孰能解說我為無罪乎北所以不當受其相勉反國之命也公子重耳對客曰君惠弔亡臣重耳身喪父死不得與於哭泣之哀以為君憂父死之謂何或敢有他志以辱君義稽顙而不拜哭而起起而不私集說曰公子既聞子犯之言乃出而答客惠弔亡臣重耳謝其來弔也不得與哭泣之哀言出亡在外不得居喪涎也以為君憂者致君憂慮我也他志謂求位之志辱君義者辱君惠弔之義也不私不再與使者私言也子顯以致命於穆公穆公曰仁夫公子重耳夫稽顙而不拜則未為後也故不成拜哭而起則愛父也起而不私則逺利也集說曰鄭注用國語知使者為公子縶字子韅故讀顯為韅也喪禮先稽顙後拜謂之成拜為後者成拜所以謝弔禮之重今公子以未為後故不成拜也愛父猶言哀痛其父也不私與使者言是無反國之意是逺利也愛父逺利皆仁者之事故稱之曰仁夫公子重耳帷殯非古也自敬姜之哭穆伯始也注曰穆伯魯大夫季悼子之子公甫靖也敬姜穆伯姜文伯歜之母也禮朝夕哭不帷疏曰敬姜早寡晝哭以辟嫌帷殯或亦辟嫌表夫之逺色也喪禮哀戚之至也節哀順變也君子念始之者也集說曰孝子之哀發於天性之極至豈可止遏聖人制禮以節其哀蓋順以變之也言順孝子之哀情以漸變而輕減也始猶生也生我者父母也毁而滅性是不念生我者矣復盡愛之道也有禱祠之心焉望反諸幽求諸鬼神之道也北面求諸幽之義也集說曰行禱五祀而不能回其生又為之復是盡其愛親之道而禱祠之心猶未忘於復之時也望反諸幽望其自幽而反也鬼神處幽暗北乃幽陰之方故求諸鬼神之幽者必向北也拜稽顙哀戚之至隱也稽顙隱之甚也集說曰隱痛也稽顙者以頭觸地無復禮容就拜與稽顙言之皆為至痛而稽顙則尤其痛之甚者也飯用米貝弗忍虛也不以食道用美焉爾集說曰實米與貝于死者口中不忍其口之虛也此不是用飯食之道但用此美潔之物以實之焉爾銘明旌也以死者為不可别已故以其旗識之愛之斯録之矣敬之斯盡其道焉耳集說曰士喪禮銘曰某氏某之柩初置于簷下西階上及為重畢則置於重殯而卒塗始樹於肂坎之東疏云士長三尺大夫五尺諸侯七尺天子九尺若不命之士則以緇長半幅赬末長終幅廣三寸半幅一尺也終幅二尺也是總長三尺夫愛之而録其名敬之而盡其道曰愛曰敬非虛文也重主道也殷主綴重焉周主重徹焉集說曰禮注云士重木長三尺始死作重以依神雖非主而有主之道故曰主道也殷禮始殯時置重于殯廟之庭暨成虞主則綴此重而懸於新死者所殯之廟五世廟毁乃埋之周人虞而作主則徹重而埋於祖廟門外之道左也練時作栗主則虞主亦埋之於祖廟門外之道左一說埋於壁兩楹間一說埋於廟北牗下奠以素器以生者有哀素之心也唯祭祀之禮主人自盡焉爾豈知神之所饗亦以主人有齊敬之心也注曰哀素言哀痛無飾也凡物無飾曰素哀則以素敬則以飾禮由人心而已疏曰奠謂始死至葬時祭名其時無尸奠置於地故謂之奠因用素表孝子哀素遂論虞及卒哭練祥之祭皆主人自盡致孝養之道焉爾豈知神之所饗須設此祭所以設之者亦以主人有齊敬之心若親存然知非尋常吉祭者以上下所論皆是喪事辟踊哀之至也有算為之節文也疏曰撫心為辟跳躍為踊是哀痛之至極若不裁限恐傷其性故有算以為之準節每一踊三跳三踊九跳為一節士三日有三涎踊大夫四日五踊諸侯六日七踊天子八日九踊故云為之節文也袒括髮變也愠哀之變也去飾去美也袒括髮去飾之甚也有所袒有所襲哀之節也疏曰袒衣括髮形貌之變也悲哀愠恚哀情之變也去其尋常吉時之服飾是去其華美也去飾雖多端惟袒而括髮又去飾之中最甚者也孝子悲哀理應常袒何以有袒時有襲時蓋哀甚則袒哀輕則襲哀之限節也辨絰葛而葬與神交之道也有敬心焉周人辨而葬殷人冔而葬注曰接神之道不可以純凶周辨殷冔俱象祭冠而素禮同也集說曰居喪時冠服皆純凶至葬而吾親托體地中則當以禮敬之心接於山川之神也於是以絹素為辨如爵辨之制以葛為環絰在首以送葬不敢以純凶之服交神者示敬也故曰有敬心焉然葛連辨絰則要帶猶用麻也啜主人主婦室老為其病也君命食之也疏曰親喪啜粥之時主人亡者之子主婦亡者之妻無則主人之妻也室老家之長相此三者並是大夫之家貴者為其啜粥病困之故君必命之食疏飯也若士喪君不命也喪大記言主婦食疏食謂既殯之後此主婦啜者謂未殯前反哭升堂反諸其所作也主婦入于室反諸其所養也集說曰此堂與室皆謂廟中也卒窆而歸乃反哭於祖廟其二廟者則先祖後禰所作者親平生祭祀冠婚所行禮之處也所養者親所饋食供養之處也反哭之弔也哀之至也反而亡焉失之矣於是為甚疏曰此弔亦謂在廟也集說曰賓之弔者升自西階曰如之何主人拜稽顙當此之時亡矣失矣不可復見矣哀痛於是為甚也賓弔畢而出主人送於門外遂適殯宫即先時所殯正寢之堂也殷既封而弔周反哭而弔孔子曰殷已慤吾從周集說曰殷之禮窆畢賓就墓所弔主人周禮則俟主人反哭而後弔孔子謂殷禮大質慤者蓋親之在土固為可哀不若求親於平生居止之所而不得其哀為尤甚也故弔於墓者不如弔於家者之情文為兼盡故欲從周也葬於北方北首三代之逹禮也之幽之故也集說曰北方國之北也殯猶南首未忍以鬼神待其親也葬則終死事矣故葬而北首三代通用此禮也南方昭明北方幽暗之幽釋所以北首之義既封主人贈而祝宿虞尸集說曰柩行至城門公使宰夫贈𤣥纁束既窆則用此𤣥纁贈死者於墓之野此時祝先歸而肅虞祭之尸矣宿讀為肅進也虞猶安也葬畢迎精而反日中祭之於殯宫以安之也男男尸女女尸尸之為言主也不見親之形容心無所係故立尸而使之著死者之服所以使孝子之心主於此也􅎭祭以前男女異尸異几祭於廟則無女尸而兒亦同矣少牢禮云某妃配是男女共尸既反哭主人與有司視虞牲有司以几筵舍奠於墓左反日中而虞集說曰士之禮虞牲特豕几所以依神筵坐神之席也席敷陳曰筵孝子先反而視牲别令有司釋奠以禮地神為親之托體於此也舍讀為釋奠者置也釋置此祭饌也墓道向南以東為左待此有司之反即於日中時虞祭也葬日虞弗忍一日離也注曰弗忍其無所歸是日也以虞易奠卒哭曰成事集說曰始死小斂大斂朝夕朔月朝祖賵遣之類皆喪奠也此日以虞祭代去喪奠故曰以虞易奠也卒哭曰成事者虞後卒哭而祭祝辭曰哀薦成事也祭以告為成虞祭尚凶祭禮未成今既卒無時之哭唯有朝夕二哭漸就於告也是日也以吉祭易喪祭明日祔于祖父集說曰吉祭卒哭之祭也喪祭虞祭也卒哭在虞之後故云以吉祭易喪祭也祔之為言附也祔祭者告其祖父以當遷他廟而告新死者以當入此廟也禮云明日以其班祔明日者卒哭之涎日也卒哭時告于新主曰哀子某來日隮祔爾于爾皇祖某甫及時則奉新主入祖之廟而並告之曰適爾皇祖某甫以隮祔爾孫某甫孫必祔祖者昭穆之位同所謂以其班也畢事虞主復于寢三年喪畢遇四時之吉祭而後奉新主入廟也虞祭間一日而卒哭與祔則不間日其變而之吉祭也比至於祔必於是日也接不忍一日末有所歸也集說曰上文所言皆據正禮此言變者以其變易常禮也所以有變者以有他故未及葬期而即葬也喪服小記云赴葬者赴虞三月而後卒哭彼據士禮而言速葬速虞之後卒哭之前其日尚賒不可無祭之往也虞往至吉祭其禮如何曰虞後比至於祔遇剛日而連接其祭若丁日葬則己日再虞後虞改用剛日則庚日三虞也此後遇剛日則祭至祔而後止此孝子不忍使其親一日無所依歸也其依時葬及虞者後去卒哭雖逺其間不復祭殷練而祔周卒而祔孔子善殷注曰期而神之人情君臨臣喪以巫祝桃茢執戈惡之也注曰為有凶邪之氣在側君聞大夫之喪去樂卒事而往未襲也其已襲則止巫去桃茢桃鬼所惡茢萑苕可掃不祥所以異於生也喪有死之道焉先王之所難言也坡謂注解異於生句曰生人無凶邪則死有鬼氣可知故曰喪有死之道也坡嘗侍至親疾邪氣因衰而至悽愴流露實亦可惡然或情之哀切或義之當然有不可得而惡者故曰先王之所難言也惟制禮以祓其邪以安其情則生死俱順矣喪之朝也順死者之孝心也其哀離其室也故至於祖考之廟而後行殷朝而殯於祖周朝而遂葬集說曰子之事親出必告反必面今將葬而奉柩以朝祖固為順死者之孝心然求之死者之心亦必自哀其違離寢處之居而永棄泉壤之下亦欲至祖考之廟而訣别也殷尚質敬鬼神而逺之故大斂之後即奉柩朝祖而遂殯於廟周人則殯於寢及葬則朝廟也孔子謂為明器者知喪道矣備物而不可用也注曰神與人異道則不相傷哀哉死者而用生者之器也不殆於用殉乎哉集說曰此孔子非殷人用祭器從葬以人從死曰殉始幾也用其器則近於用人其曰明器神明之也塗車芻靈自古有之明器之道也孔子謂為芻靈者善謂為俑者不仁不殆於用人乎哉集說曰謂之明器者是以神明之道待之也塗車以泥為車也束草為人形以為死者之從違謂之芻靈略似人形而已亦明器之類也中古為木偶人謂之俑則有面目機發而太似人矣故孔子惡其不仁知末流必有以人殉葬者趙氏曰以木人送葬設機而能踊跳故名之曰俑穆公問於子思曰為舊君反服古與子思曰古之君子進人以禮退人以禮故有舊君反服之禮也今之君子進人若將加諸膝退人若將隊諸淵母為戎首不亦善乎又何反服之禮之有集說曰穆公魯君哀公之曽孫為舊君服見儀禮齊衰章孟子言三有禮則為之服寇讐何服之有與此章意似隊諸淵言置之死地也戎首為寇亂之首也悼公之喪季昭子問於孟敬子曰為君何食敬子曰食粥天下之逹禮也集說曰悼公魯哀公之子昭子康子之曽孫名强敬子武伯之子名捷吾三臣者之不能居公室也四方莫不聞矣勉而為瘠則吾能毋乃使人疑夫不以情居瘠者乎哉我則食食集說曰三臣仲孫叔孫季孫之三家也敬子言我三家不能居公室而以臣禮事君者四方皆知之矣勉强食粥而為毁瘠之貌我雖能之然豈不使人疑我非以哀戚之真情而處此瘠乎不若違禮而食食也應氏曰季子之問有君子補過之心而孟氏之對可謂小人之無忌憚者矣衛司徒敬子死子夏弔焉主人未小斂絰而往子游弔焉主人既小斂子游出絰反哭子夏曰聞之也與曰聞諸夫子主人未改服則不絰疏曰鄭知是朋友者凡弔者主人成服則客乃服弔絰今此隨主人始小斂未成服而已便出著絰故知有綢之恩隨主人變如五服親也雖不云帶凡單言絰則知有帶集說曰司徒以官為氏也公子許之後主人未小斂則未改服故弔者不絰子夏絰而往弔非也其時子游亦弔俟其小斂後改服乃出而加絰反哭之則中於禮矣曽子曰晏子可謂知禮也已恭敬之有焉有若曰晏子一狐裘三十年遣車一乘及墓而反集說曰晏子齊大夫曽子稱其知禮謂禮以恭敬為本也有若之言則曰狐裘貴在輕新乃三十年而不易是儉於己也遣車一乘儉其親也禮窆後有拜賓送賓等禮晏子窆訖即還儉於賓也此三者皆以其儉而失禮者也國君七個遣車七乘大夫五個遣車五乘晏子焉知禮集說曰遣車之數天子九乘諸侯七乘大夫五乘天子之士三乘諸侯之士無遣車也大夫以上皆太牢士少牢個謂所包遣奠牲體之數也凡包牲皆取下體每一牲取三體前脛折取臂臑後脛折取骼少牢二牲則六體分為三個太牢三牲則九體大夫九體分為十五段三段為一包凡五包諸侯分為二十一段凡七包天子分為二十七段凡九包每遣車一乘則載一包也蓋尊者所取三體其肉多畢者雖取三體其肉少曽子曰國無道君子恥盈禮焉國奢則示之以儉國儉則示之以禮注曰時齊方奢矯之是也國昭子之母死問於子張曰葬及墓男子婦人安位子張曰司徒敬子之喪夫子相男子西鄉婦人東鄉集說曰國昭子齊大夫葬其母以子張相禮故問之夫子孔子也主人家男子皆西向婦人皆東向而男賓在衆主人之南女賓在衆婦之南禮也曰噫毋曰我喪也斯沾爾専之賓為賓焉主為主焉婦人從男子皆西鄉集說曰昭子聞子張之言歎息而止之斯盡也沾讀曰覘言我為大夫齊之顯家今行喪禮人必盡來覘視當有所更改以示人豈宜一循舊禮爾當専主其事使賓自為賓主自為主可也於是昭子家婦人既與男子同居主位而西鄉而女賓亦與男賓同居賓位而東鄉矣徒辨賓主不别男女此記禮之變穆伯之喪敬姜晝哭文伯之喪晝夜哭孔子曰知禮矣集說曰哭夫以禮哭子以情中節矣故孔子美之文伯之喪敬姜據其牀而不哭曰昔者吾有斯子也吾將為賢人也吾未嘗以就公室今及其死也朋友諸臣未有出涕者而內人皆行哭失聲斯子也必多曠於禮矣夫注曰季氏魯之宗卿敬姜有㑹見之禮集說曰以為賢人必知禮矣故凡我平日出入公室未嘗與俱而觀其所行蓋信其賢而知禮也至死而覺其曠禮故歎恨之季康子之母死陳䙝衣敬姜曰婦人不飾不敢見舅姑將有四方之賓來䙝衣何為陳於斯命徹之注曰言四方之賓嚴於舅姑敬姜康子從祖母有子與子游立見孺子慕者有子謂子游曰豫一不知夫喪之踊也豫欲去之久矣情在於斯其是也夫集說曰有子言喪禮之有踊我常不知其何為而然一者専一之義猶常也我久欲除去之矣今見孺子之號慕若此則哀情之在於此踊亦如此孺子之慕也夫子游曰禮有微情者有以故興物者有直情而徑行者戎狄之道也禮道則不然集說曰子游言先王制禮使賢者俯而就之不肖者企而及之慮賢者之過於情也故立為哭踊之節所以殺其情故曰禮有微情者微猶殺也慮不肖者之不及情也故為之興起衰絰之物使之睹服思哀故曰有以故興物者此二者皆制禮者酌人情而為之也若直肆己情徑率行之或哀或不哀漫無制節則是戎狄之道矣中國禮義之道則不如是也人喜則斯陶陶斯咏咏斯猶猶斯舞舞斯愠愠斯戚戚斯歎歎斯辟辟斯踊矣品節斯斯之謂禮疏曰喜者外境㑹心之謂斯語助也陶謂鬱陶心初悅而未暢之意鬱陶之情暢則口歌咏之也咏歌不足漸至動搖身體乃至起舞足蹈手揚樂之極也外境違心之謂愠凡喜怒相對哀樂相生若舞無節形疲厭倦事與心違所以怒生愠怒之生由於舞極故曲禮云樂不可極也此凡九句首末各四句是哀樂相對中間舞斯愠一句是哀樂相生愠斯戚者怒來觸心憤恚之餘轉為憂戚憂戚轉深因發歎息歎恨不泄遂至撫心撫心不泄乃至跳踊奮擊亦哀之極也故夷狄無禮朝殯夕歌童兒任情倐啼歘笑今若品節此二塗使踊舞有數則能久長故云斯之謂禮品階格也節制斷也熊氏曰此一節所謂禮有微情者此也人死斯惡之矣無能也斯倍之矣是故制絞衾設蔞翣為使人勿惡也集說曰以其死而惡之以其無能而倍之恐太古無禮之時人多如此於是推原聖人所以制禮之初意止為使人勿惡勿倍而已絞衾以飾其體蔞翣以飾其棺則不見死者之可惡矣蔞周禮作栁始死脯醢之奠將行遣而行之既葬而食之未有見其饗之者也自上世以來未之有舍也為使人勿倍也故子之所刺於禮者亦非禮之訾也集說曰始死即為脯醢之奠將葬則有包裹牲體之遣既葬則有虞祭之食何嘗見死者享之乎然自上世制禮以來未聞有舍而不為者為此則報本反始之思自不能已矣豈復有倍之之意乎先王制禮其深意蓋如此今子刺喪之踊而欲去之者亦不足以為禮之疵病也熊氏曰此二節言禮之以故興物也吳侵陳斬祀殺厲師還出竟陳大宰嚭使於師夫差謂行人儀曰是夫也多言盍嘗問焉師必有名人之稱斯師也者則謂之何集說曰魯哀公元年吳師侵陳斬祀伐祠祀之木也殺厲殺疫病之人也大宰行人皆官名夫差吳子名是夫猶言此人指嚭也多言猶能言也盍何不也嘗試也師必有名者言出師伐人必得彼國之罪以顯我出師之名也今衆人稱我此師謂之何名乎大宰嚭曰古之侵伐者不斬祀不殺厲不獲二毛今斯師也殺厲與其不謂之殺厲之師與曰反爾地歸爾子則謂之何曰君王討敝邑之罪又矜而赦之師與有無名乎集說曰二毛斑白之人也子謂所獲臣民也還其侵略之地縱其俘獲之民是矜而赦之矣師豈有無善名乎與是語辭此言嚭善於辭令故能救敗亡之禍顔丁善居喪始死皇皇焉如有求而弗得及殯望望焉如有從而弗及既葬慨焉如不及其反而息集說曰顔丁魯人皇皇猶栖栖也望望往而不顧之貌慨感悵之意始死形可見也既殯柩可見也葬則無所見矣如有從而弗及似有可及之處也葬後則不復如有所從矣故但言如不及其反又云而息者息猶待也不忍決忘其親猶且行且止以待其親之反也蓋葬者往而不反然孝子於迎精而反之時猶如有所疑也子張問曰書云髙宗三年不言言乃歡有諸仲尼曰胡為其不然也古者天子崩王世子聽於冡宰三年集說曰言乃歡者命令所布人心喜悅也知悼子卒未葬平公飲酒師曠李調侍鼓鐘杜蕢自外來聞鐘聲曰安在曰在寢杜蕢入寢歷階而升酌曰曠飲斯又酌曰調飲斯又酌堂上北面坐飲之降趨而出集說曰知悼子晉大夫名盈平公晉侯彪也凡三酌既罰二子又自罰也平公呼而進之曰蕢曩者爾心或開豫是以不與爾言爾飲曠何也曰子卯不樂知悼子在堂斯其為子卯也大矣曠也大師也不以詔是以飲之也集說曰言爾之初入我意爾必有所諫教開發於我我是以不先與爾言乃三酌之後竟不言而出爾之飲曠何說也蕢言桀以乙卯日死紂以甲子日死謂之疾日故君不舉樂在堂在殯也況君於卿大夫比葬不食肉比卒哭不舉樂悼子在殯而可作樂燕飲乎桀紂異代之君悼子同體之臣故以為大於子卯也詔告也罰其不告之罪也爾飲調何也曰調也君之䙝臣也為一飲一食忘君之疾是以飲之也集說曰言調為近習之臣貪於一飲一食而忘君違禮之疾故罰之也爾飲何也曰蕢也宰夫也非刀七是共又敢與知防是以飲之也集說曰非猶不也宰夫職在刀七今乃不専供刀七之職而敢與知諫爭防間之事是侵官矣故自罰也平公曰寡人亦有過焉酌而飲寡人杜蕢洗而揚觶公謂侍者曰如我死則必母廢斯爵也至于今既畢獻斯揚觶謂之杜舉集說曰揚觶舉觶也盥洗而後舉致潔敬也平公自知其過既命蕢以酌又欲以此爵為後世戒故記者云至今晉國行燕禮之終必舉此觶謂之杜舉者言此觶乃昔者杜蕢所舉也春秋傳作杜蒯文亦不同公叔文子卒其子戌請諡於君曰日月有時將葬矣請所以易其名者集說曰文子衛大夫名拔君靈公也大夫士三月而葬有時猶言有數也死則諱其名故為之諡所以代其名也君曰昔者衛國凶饑夫子為粥與國之餓者是不亦惠乎昔者衛國有難夫子以其死衛寡人不亦貞乎夫子聽衛國之政修其班制以與四鄰交衛國之社稷不辱不亦文乎故謂夫子貞惠文子集說曰魯昭公二十年盜殺衛侯之兄縶時齊豹作亂公如死鳥此衛國之難也班者専畢之涎制者多寡之節因舊典而修舉之也據先後則惠在前論小大則貞為重故不曰惠貞而曰貞惠也此三字為諡而惟稱文子者鄭云文足以兼之石駘仲卒無適子有庶子六人卜所以為後者曰沐浴佩玉則兆五人者皆沐浴佩玉石祁子曰孰有執親之喪而沐浴佩玉者乎不沐浴佩玉石祁子兆衛人以龜為有知也集說曰駘仲衛大夫曰沐浴佩玉則兆卜人之言也方氏曰兆亦有凶卜者以求吉為主故經以兆言吉也陳子車死於衛其妻與其家大夫謀以殉葬定而后陳子亢至以告曰夫子疾莫養於下請以殉葬集說曰子車齊大夫子亢其兄弟即孔子弟子子禽也不稱死而稱疾諱之也下地下也於是欲殺人以殉葬定謂己議定所殺之人也子亢曰以殉葬非禮也雖然則彼疾當養者孰若妻與宰得已則吾欲已不得已則吾欲以二子者之為之也於是弗果用集說曰宰即家大夫也二子謂妻與宰也子亢若但言非禮未必能止之今以當養者為當殉則不期其止而自止矣子路曰傷哉貧也生無以為養死無以為禮也孔子曰啜菽飲水盡其歡斯之謂孝斂首足形還葬而無椁稱其財斯之謂禮疏曰以菽為粥以常啜之飲水更無餘物以水而已盡其歡使親盡其歡樂也集說曰世固有三牲之養而不能歡者亦有厚葬以為觀美而不知陷於僭禮之罪者知此則孝與禮可得而盡矣又何必傷其貧乎還葬說見上篇衛獻公出奔反於衛及郊將班邑於從者而后入栁莊曰如皆守社稷則孰執羈靮而從如皆從則孰守社稷君反其國而有私也毋乃不可乎弗果班集說曰獻公以魯襄十四年奔齊二十六年歸衛羈所以絡馬靮所以鞚馬莊之意謂居者行者均之為國不當獨賞從者以示私恩衛有大史曰栁莊寢疾公曰若疾革雖當祭必告公再拜稽首請於尸曰有臣栁莊也者非寡人之臣社稷之臣也聞之死請往不釋服而往遂以襚之與之邑裘氏與縣潘氏書而納諸棺曰世世萬子孫毋變也集說曰以衣服贈死者曰禭裘縣潘二邑名萬子孫謂莊之後世也莊之疾公嘗命其家若當疾亟之時我雖在祭事亦必入告及其死也果當公行事之際遂不釋祭服而往因釋以襚之又賜之二邑此雖見國君尊賢之意然棄祭事而不終以諸侯之命服而襚大夫書封邑之劵而納諸棺皆非禮矣陳乾昔寢疾屬其兄弟而命其子尊己曰如我死則必大為我棺使吾二婢子夾我陳乾昔死其子曰以殉葬非禮也況又同棺乎弗果殺集說曰屬如周禮屬民讀法之屬猶合也聚也記者善尊己守正而不從其父之亂命仲遂卒于垂壬午猶繹萬入去籥仲尼曰非禮也卿卒不繹集說曰仲遂魯莊公子東門襄仲也為魯卿垂齊地名祭宗廟之明日又設祭禮以尋繹昨日之祭謂之繹殷謂之肜言壬午則正祭辛巳日也萬舞執干以舞也籥舞吹籥以舞也萬入去籥者言此繹祭時以仲遂之卒但用無聲之干舞以入去有聲之籥舞而不用也季康子之母死公輸若方小斂般請以機封將從之公肩假曰不可夫魯有初集說曰公輸氏若名為匠師方小年尚幼也斂小棺於椁也般若之族素多技巧見若掌斂事而年幼欲代之而試用其巧技也機窆謂以機關轉動之器下棺不用碑與繂也魯有初言魯國自有故事也公室視豐碑三家視桓楹注曰視豐碑僭天子也視桓楹僭諸侯疏曰凡言視者比擬之辭豐碑斫大木為之形如石碑於椁前後及兩旁樹之穿鑿去碑中之木令使空於空間著鹿盧鹿盧兩頭各入碑木以紼之一頭縶棺緘以一頭繞鹿盧既訖而人各背碑負紼末頭聽鼓聲以漸卻行而下之天子六紼四碑前後各重鹿盧凡天子之葬掘地以為方壙漢書謂之方中又方中之內先纍椁於其方中南畔為羡道以蜃車載柩至壙說而載以龍輴從羡道而入至方中乃屬紼於棺之緘從上而下棺入於椁之中於此之時用碑紼也桓楹不似碑形如大楹耳通而言之亦曰碑說文桓郵亭表也如今之橋旁表柱也諸侯四繂二碑兩柱為一碑而施鹿盧故注云四植也大夫二繂亦二碑但柱形不得粗大士二繂無碑般爾以人之母嘗巧則豈不得以其母以嘗巧者乎則病者乎噫弗果從疏曰嘗試也以己字言爾欲以人母嘗試己之巧事誰有强逼於爾而為此乎豈不得休己者哉母無也又語之云其毋以人母嘗試己巧則於爾病者乎言不得嘗巧豈於爾有所病假言畢乃更噫而傷歎於是衆人遂止集說曰一說言爾以他人母試巧而廢其當用之禮則亦豈不得自以己母試巧而不用禮乎則於爾心亦有所病而不安乎蓋使之反求諸心以己度人而知其不可也戰于郎公叔禺人遇負杖入保者息曰使之雖病也任之雖重也君子不能為謀也士弗能死也不可我則既言矣與其鄰重汪踦往皆死焉魯人欲勿殤重汪踦問於仲尼仲尼曰能執干戈以衛社稷雖欲勿殤也不亦可乎集說曰戰于郎魯哀公十一年齊伐魯也禺人昭公子公為也遇魯人之避齊師將入保疲倦加其杖頸上兩手掖之休息者保縣邑小城禺人乃歎之曰徭役之煩雖不能堪也稅斂之數雖過於厚也若上之人協心以禦冦難猶可塞責也今卿大夫不能畫謀䇿士不能捐身以死難豈人臣事君之道哉甚不可也我既出此言矣可不思踐吾言乎於是與其鄰之童子汪踦者皆往鬭而死於敵魯人以踦有成人之行欲以成人之喪禮葬之而孔子善其權禮之當也子路去魯謂顔淵曰何以贈我曰吾聞之也去國則哭于墓而后行反其國不哭展墓而入注曰無君事主於孝哭哀去也展省視之謂子路曰何以處我子路曰吾聞之也過墓則式過祀則下疏曰墓謂他家墳祀謂神位有屋樹者居無事主於恭敬故或式或下也他墳尚式則己祖先墳墓當下也工尹商陽與陳棄疾追吳師及之陳棄疾謂工尹商陽曰王事也子手弓而可手弓子射諸射之斃一人韔弓又及謂之又斃二人每斃一人掩其目止其御曰朝不坐燕不與殺三人亦足以反命矣孔子曰殺人之中又有禮焉疏曰朝與燕皆在寢若路門外正朝則大夫以下皆立若燕朝在於路寢則大夫坐於上如孔子攝齊升堂是也升堂則坐矣燕亦在寢燕禮獻卿大夫之後西階上獻士無升堂之文是士立於下也鄭注射者在左戈盾在右御在中央謂兵車參乘之法此謂凡常戰士若是元帥則在中央鼓下御者在左戈盾亦在右若天子諸侯親將亦居鼓下若非元帥則皆在左御者在中若非兵車則尊者在左集說曰工尹楚官名追吳師事在魯昭公十二年子手弓而可為句使之執弓也手弓商陽之弓在手也韔弓衣也謂之再告之也掩目而不忍視之御而不忍驅有惻隱之心焉商陽自言位卑禮薄如此亦可以稱塞矣孔子謂其有禮以敗北之師本易窮而商陽乃能節制其縱殺之心是仁意與禮節並行非事君之禮止於是也特取其善於追敗者亦非謂臨敵未決而不忍殺人也諸侯伐秦曹桓公卒于㑹諸侯請含使之襲集說曰曹伯之卒魯成公十三年也廬諡宣言桓聲之誤也含者以朋友有相啖食之道襲賤者之事諸侯從之不知禮也襄公朝于荆康王卒荆人曰必請襲魯人曰非禮也荆人强之巫先拂柩荆人悔之疏曰荆王以二十八年十二月死至明年正月則殯已久云襲者謂加衣於殯非為尸加衣集說曰荆楚之本號魯僖公元年始稱楚魯襄公以二十八年朝楚適遭楚子昭之喪請襲欲使襄公衣之魯人知非禮而不能違於是以君臨臣喪之禮先之及其覺之而悔已無及矣此其適權變之宜足以雪恥滕成公之喪使子叔敬叔弔進書子服惠伯為介及郊為懿伯之忌不入惠伯曰政也不可以叔父之私不將公事遂入集說曰滕成公之喪在魯昭公之三年敬叔宣公弟叔肸之曽孫叔弓也惠伯慶父元孫之子名椒於世涎敬叔是桓公七世孫惠伯是六世孫敬叔稱惠伯為叔父懿伯則惠伯之叔父而敬叔之五從祖進書奉進魯君之弔書也介副也劉氏曰案左傳云及郊遇懿伯之忌此作為二字雖異而皆先言及郊而後言忌可見是及郊方遇忌也或者忌字只是忌日懿伯是敬叔從祖適及滕郊而遇此日故欲緩至涎日乃入故惠伯以禮曉之曰公事有公利無私忌乃先入而叔弓亦遂入焉此說固可通然亦未知然否闕之可也哀公使人弔蕢尚遇諸道辟於路畫宫而受弔焉集說曰哀公魯君辟於路辟讀為闢謂除闢道路以畫宫室之位而受弔也曽子曰蕢尚不如杞梁之妻之知禮也齊莊公襲莒于奪杞梁死焉其妻迎其柩於路而哭之哀集說曰魯襄公二十三年齊侯襲莒襲者以輕兵掩其不備而攻之也左傳言杞植華還載甲夜入且于之隧且于莒邑名隧狹路也鄭云或為兑故讀奪為兑梁即植以戰死故妻迎其柩莊公使人弔之對曰君之臣不免於罪則將肆諸市朝而妻妾執君之臣免於罪則有先人之敝廬在君無所辱命集說曰肆陳尸也妻妾執拘執其妻妾也左傳言齊侯弔諸室孺子䵍之喪哀公欲設撥問於有若有若曰其可也君之三臣猶設之顔栁曰天子龍輴而椁幬諸侯輴而設幬為榆沈故設撥三臣者廢輴而設撥竊禮之不中者也而君何學焉集說曰䵍哀公之少子撥可撥引輴車所謂紼三臣魯之三家也顔栁言天子之殯用輴車載柩而畫轅為龍椁幬者纍材作椁而題凑其木幬覆棺上而後塗之諸侯則以輴載柩不畫龍亦纍木為椁設木於上以幬之不為題凑直橫木覆之亦泥其上榆沈以水浸榆白皮之汁以播地取其引車不澀滯也今三家廢輴不用而猶設撥是徒有竊禮之罪而非有中用之實者也悼公之母死哀公為之齊衰有若曰為妾齊衰禮與公曰吾得已乎哉魯人以妻我注曰哀公之妾言國人皆名之為我妻重服嬖妾文過非也疏曰天子諸侯絶旁期於妾無服惟大夫為貴妾緦季子臯葬其妻犯人之禾申詳以告曰請庚之子臯曰孟氏不以是罪豫朋友不以是棄豫以吾為邑長於斯也買道而葬後難繼也劉氏曰季子臯孔子弟子髙柴也庚償也夫子嘗曰柴也愚觀家語所稱及此經所記泣血三年及成人為衰之事觀之賢可知矣此葬妻犯禾亦為成宰時事有無固不可知然曰孟氏不以是罪豫朋友不以是棄豫者以犯禾之失小而買道之害大也何也以我為邑宰尚買道而葬則後必為例而難乎為繼者矣坡謂記此者以其識大體也大都民不可逞果子臯從而庚之後有葬者不必犯禾奸民必妄指他端阻之買道且曰邑宰尚然此俗可以數世不弭所謂小不忍者是也閲世變乃知前人之逺仕而未有祿者君有饋焉曰獻使焉曰寡君違而君薨弗為服也集說曰王制云位定然後祿之此蓋初試為士未賦廩祿者有饋於君則稱獻出使他國則稱寡君此二事皆與羣臣同獨違離之後而君薨則不為舊君服此則與羣臣異所以然者以其未嘗食君之祿也方氏曰其曰違則居其國之時固服之矣虞而立尸有几筵集說曰未葬之前事以生者之禮葬則親形已藏故虞祭則立尸以象神也筵席也大斂之奠雖有席而無凡此時則設几與筵相配也卒哭而諱生事畢而鬼事始已集說曰卒哭而諱其名蓋事生之禮已畢事鬼之事始矣已語辭既卒哭宰夫執木鐸以命于宫曰舍故而諱新自寢門至于庫門集說曰周禮大喪小喪宰夫掌其戒令故卒哭後使宰夫執木鐸振之以命令于宫中又出宫從寢門至于庫門故謂髙祖之父當遷者諱多則難避故使之舍舊諱而諱新死者之名也以其親盡故可不諱寢門路門庫門是魯之外門也二名不偏諱夫子之母名徴在言在不稱徴言徴不稱在集說曰二名二字為名也此記避諱之禮軍有憂則素服哭于庫門之外赴車不載櫜韔集說曰櫜甲衣韔弓衣甲不入櫜弓不入韔兵不戢示當報也方氏曰戰勝而還謂之愷則敗為之憂宜矣素服哭以喪禮處之也必於庫門之外者以近廟也師出受命于祖無功則於祖命辱矣無車告赴於國之車凡告喪曰赴車以告敗為名與素服同義有焚其先人之室則三日哭故曰新宫火亦三日哭注曰哭者哀精神之有虧傷集說曰先人之室宗廟也魯成公三年焚宣公之廟神主初入故曰新宫春秋書二月甲子新宫災三日哭注云書其得禮此言故曰者謂春秋文也孔子過泰山側有婦人哭於墓者而哀夫子式而聽之使子路問之曰子之哭也一似重有憂者而曰然昔者吾舅死於虎吾夫又死焉今吾子又死焉夫子曰何為不去也曰無苛政夫子曰小子識之苛政猛於虎也疏曰一者決定之辭魯人有周豐也者哀公執摯請見之注曰下賢也摯禽摯也諸侯而用禽摯降尊就卑之義而曰不可注曰辭君以尊見卑士禮先王異爵者請見之則辭公曰我其己夫使人問焉曰有虞氏未施信於民而民信之夏后氏未施敬於民而民敬之何施而得斯於民也對曰墟墓之間未施哀於民而民哀社稷宗廟之中未施敬於民而民敬注曰言民見悲哀之處則悲哀見莊敬之處則莊敬非必有使之者墟毁滅無後之地殷人作誓而民始畔周人作㑹而民始疑疏曰此據身無誠信徒作誓盟民因誓因盟而始離畔非謂殷人始作誓周人始作㑹若啓作甘誓禹㑹塗山皆身有誠信於事善也苟無禮義忠信誠愨之心以涖之雖固結之民其不解乎熊氏曰禮義忠信誠慤之心虞夏以之感人者此矣苟無是心以涖之則結之雖固民亦解而散矣喪不慮居毁不危身喪不慮居為無廟也毁不危身為無後也注曰慮居謂賣舍宅以奉喪危身謂憔悴將滅性劉氏曰家廢則宗廟不能以獨存矣以死傷生則君子謂之無子矣延陵季子適齊於其反也其長子死葬於嬴博之間孔子曰延陵季子吳之習於禮者也往而觀其葬焉注曰季子名札魯昭二十七年吳公子札聘於上國是也季子護國居延陵因號焉嬴博齊地今泰山縣是也其坎深不至於泉其斂以時服既葬而封廣輪掩坎其髙可隱也既封左袒右還其封且號者三曰骨肉歸復于土命也若魂氣則無不之也無不之也而遂行孔子曰延陵季子之於禮也其合矣乎集說曰不至於泉謂得淺深之宜也時服隨死時之寒暑所衣也封築土為墳也橫曰廣直曰輪下則僅足以掩坎上則才至於可隱皆儉制也左袒以示陽之變右還以示陰之歸骨肉之歸土陰之降也魂氣之無不之陽之升也陰陽氣也命者氣之所鍾也季子以骨肉歸復于土為命者此精氣為物之有盡謂魂氣則無不之者此逰魂為變之無方也壽夭得於有生之初可以言命魂氣散於既死之後不可以言命也再言無不之也者愍傷離訣之至情而冀其魂之隨己以歸也不惟適旅葬之莭而又且通幽明之故宜夫子之善之也然為疑辭而不為決辭者蓋季子乃隨時處中之道稱其有無而不盡拘乎禮者也故夫子不直曰季子之於禮也合矣而不加其乎二字使人由辭以得意也讀者詳之邾婁考公之喪徐君使容臣來弔含曰寡君使容居坐含進侯玉其使容臣以含注曰欲親含非也含不使賤者君行則親含大夫歸含耳疏曰昭二十年吳滅徐此云徐僭稱王者滅而復興至春秋之後强大僭號君行則親含如上曹桓公諸侯請含是也大夫歸含如雜記諸侯之喪君使人弔含贈襚是也凡行含禮未斂之前士則主人親含大夫以上即使人含若斂後至殯葬有來含者親自致璧於柩及殯上者謂之親含若但致命以璧授主人主人受之謂之不親含集說曰徐君使其臣容居來弔且致含言寡君使我親坐而行含以進侯玉於邾君侯玉者徐自擬天子以邾君為己之諸侯言進侯氏以玉也其使容居以含者容居求即行含禮也有司曰諸侯之來辱敝邑者易則易于則于易于雜者未之有也集說曰邾之有司拒之言諸侯之辱來邾國者人臣來而其事簡易則行人臣簡易之禮人君來而其事廣大則行人君廣大之禮于猶迂也有廣逺之意今人臣來而欲行人君之禮是易于相雜矣我國未有此也容居對曰容居聞之事君不敢忘其君亦不敢遺其祖昔我先君駒王西討濟於河無所不用斯言也容居魯人不敢忘其祖集說曰容居又答言事君者不敢忘其君我奉命如此今不能行是忘吾君也為人子孫當守先世之訓故亦不敢遺吾祖也居蓋徐之公族耳且言昔者我之先君駒王濟河而西討無一處不用此稱王之言自言其疆土廣大久已行王者之禮也又自言我非譎詐者乃魯鈍之人是以不敢忘吾祖欲邾人之信其言也此著徐國君臣之僭且明邾有司不能終正當時之僭也子思之母死於衛赴於子思子思哭於廟門人至曰庶氏之母死何為哭於孔氏之廟乎子思曰吾過矣吾過矣遂哭於他室集說曰伯魚卒其妻嫁於衛之庶氏嫁母於廟絶族故不得哭之於廟天子崩三日祝先服五日官長服七日國中男女服三月天下服疏曰祝大祝商祝也服服杖也是喪服之數故呼杖為服祝佐含斂先服故先杖也故子亦三日而杖官長大夫士亦服杖也服在祝後故五日國中男女謂畿內民及庶人在官者服齊衰三月而除必待七日者天子七日而殯殯後嗣王成服故民得成服也無杖三月天下服者謂諸侯之大夫為王繐衰既葬而除近者亦不待三月今據逺者為言耳何以知其或杖服或衰服案喪大記及喪服四制云云然四制云七日授士杖此云五日士杖者崔氏云此據朝廷之士四制言邑宰之士也虞人致百祀之木可以為棺椁者斬之不至者廢其祀刎其人疏曰為王殯後事也百祀者王畿內諸臣采地之祀也既殯旬而布材故虞人斬百祀之木可以為周棺之椁者送之也必取祀木者賀瑒云君者德著幽顯若存則人神均其慶殁則靈祗等其哀傷也齊大饑黔敖為食於路以待餓者而食之有餓者蒙袂輯屨貿貿然來黔敖左奉食右執飲曰嗟來食揚其目而視之曰豫唯不食嗟來之食以至於斯也從而謝焉終不食而死曽子聞之曰微與其嗟也可去其謝也可食集說曰蒙袂以袂蒙面也輯屨輯斂其足言困憊而行蹇也貿貿垂頭喪氣之貌嗟來食歎閔之而使來食也從就也微與猶言細故末莭謂嗟來之言雖不敬然亦非大過故其嗟雖可去而謝焉則可食矣邾婁定公之時有弒其父者有司以告公瞿然失席曰是寡人之罪也曰寡人嘗學斷斯獄矣臣弒君凡在官者殺無赦子弒父凡在宫者殺無赦殺其人壞其室汙其宫而豬焉蓋君踰月而后舉爵疏曰在宫諸本或為在官恐與上在官相涉而誤也豬是水聚之名集說曰瞿然驚怪之貌在官者諸臣也在宫者家人也夫下之惡無大於此者是以人皆得以誅之無赦之之理惟其妻及子孫不可討之也君不舉爵以人倫大變亦教化不明所致故傷悼而自貶耳晉獻文子成室晉大夫發焉張老曰美哉輪焉美哉奐焉歌於斯哭於斯聚國族於斯文子曰武也得歌於斯哭於斯聚國族於斯是全要領以從先大夫於九京也北面再拜稽首君子謂之善頌善禱注曰晉卿大夫之墓地在九原疏曰歌謂祭時奏樂也大夫祭無樂而春秋時或有之也領頸也古者罪重腰斬罪輕頸刑先大夫文子父祖也集說曰晉獻舊說謂晉君獻之謂賀也然疑獻文二字皆趙武諡如貞惠文子之類諸大夫發禮往賀記者因述張老之言輪輪囷髙大也奐奐爛衆多也歌祭祀作樂也哭死喪哭泣也聚國族燕集國賓聚㑹宗旅也頌者美其事而祝其福禱者祈以免禍也張老之言善於頌武子所答善於禱也仲尼之畜狗死使子貢埋之曰吾聞之也敝帷不棄為埋馬也敝蓋不棄為埋狗也邱也貧無蓋於其封也亦豫之席毋使其首陷焉集說曰狗馬皆有力於人故特示恩也路馬死埋之以帷集說曰謂君之乘馬死則特以帷埋之不用敝帷也方氏曰魯昭公乘馬塹而死以帷裹之季孫之母死哀公弔焉曽子與子貢弔焉閽人為君在弗內也曽子與子貢入於其廄而修容焉子貢先入閽人曰鄉者已告矣曽子後入閽人辟之集說曰鄉者已告言先已告於主人矣涉內霤卿大夫皆辟位公降一等而揖之君子言之曰盡飾之道斯其行者逺矣集說曰內霤門屋後簷也行者逺猶言感動之大也劉氏曰此章可疑陽門之介夫死司城子罕入而哭之哀晉人之覘宋者反報於晉侯曰陽門之介夫死而子罕哭之哀而民說殆不可伐也注曰陽門宗國門名介夫甲衛士宋以武公諱司空為司城子罕戴公子樂甫術之後樂喜也覘窺視也孔子聞之曰善哉覘國乎詩云凡民有喪扶服救之雖微晉而已天下其孰能當之集說曰孔子善之以其識治體也詩弼風谷風之篇扶服致力之義微無也夫子引詩而言宋國雖以子罕得人心可無晉憂而已然天下亦孰能當之甚言人心之足恃也魯莊公之喪既葬而絰不入庫門士大夫既卒哭麻不入集說曰莊公卒子弒而慶父作亂閔公時年八嵗絰葛絰也諸侯辨絰葛而葬葬畢閔公即除凶服於庫門之外而以吉服嗣位故云絰不入庫門也絰不入衰亦不入可知士大夫則仍麻絰直俟卒哭乃不以麻絰入庫門蓋閔公既吉服不與虞與卒哭之祭故羣臣既虞不服受服至卒哭總除記禍亂恐迫禮所由廢孔子之故人曰原壤其母死夫子助之沐椁原壤登木曰久矣豫之不託於音也歌曰貍首之斑然執女手之卷然夫子為弗聞也者而過之從者曰子未可以已乎夫子曰邱聞之親者毋失其為親也故者毋失其為故也或問朱子原壤登木而歌夫子為弗聞而過之待之自好及其夷俟則以杖叩脛莫太過否曰這說却差如壤之歌乃是大惡若要理㑹不可但已只得且休至其夷俟之時不可不教誨故直責之復叩其脛自當如此若如今說則是不要管他郤非朋友之道矣劉氏曰沐治也原壤母卒夫子助之治椁壤登已治之椁木而言久矣我之不託興於咏歌之音也如貍首之斑言木文之華也卷與拳同如執女手之拳言沐椁之滑膩也壤之廢敗禮法甚矣夫子佯為不聞而過去以避之從者見其無禮疑夫子必當已絶其交故問曰子未當已絶之乎夫子言為親戚者雖有非禮未可遽失其親戚之情也為故舊者雖有非禮未可遽失其故舊之好也此聖人隱惡全交之意趙文子與叔譽觀乎九原文子曰死者如何作也吾誰與歸集說曰文子晉大夫名武叔譽叔向也言卿大夫之死而葬於此者多矣假令可以再生而起吾於衆大夫誰從乎文子蓋設此說欲與叔向共論前人賢否也叔譽曰其陽處父乎文子曰行並植於晉國不沒其身其知不足稱也集說曰處父晉襄公之傅並者兼衆事於已是専權也植者剛强自立之意所行如此故為狐射姑所殺不得善終其身是不智也其舅犯乎文子曰見利不顧其君其仁不足稱也集說曰又稱子犯可歸文子言子犯從文公十九年於外及反國危疑之時當輔之入以定其事乃及河而授璧以辭此蓋為他日髙爵厚祿之計故以此言要君求利也豈顧其君之安危哉是不仁也我則隨武子乎利其君不忘其身謀其身不遺其友晉人謂文子知人注曰武子士㑹也食邑於隨范字季疏曰凡人利君者多性行偏特不顧其身今武子既能利君又能不忘其身利其君者謂進思盡忠不忘其身者保全父母謀其身不遺其友者凡人謀身多獨善於已遺棄故舊今武子既能謀身又能不遺其朋友此二句言武子德行𢎞廣外內周備文子其中退然如不勝衣其言呐呐然如不出諸其口集說曰中身也鄉射記曰弓二寸以為侯中退然謙卑怯弱之貌呐呐聲低而語緩也如不出諸其口似不能言者所舉於晉國管庫之士七十有餘家生不交利死不屬其子焉集說曰管鍵也即今之鎖庫之藏物以管為開閉之限管庫之士賤職也知其賢而舉之即不遺友之實雖有舉用之恩於其人而生則不與之交利將死亦不以其子屬託之廉潔之至叔仲皮學子栁叔仲皮死其妻魯人也衣衰而繆絰叔仲衍以告請繐衰而環絰曰昔者吾喪姑姊妹亦如斯末吾禁也退使其妻繐衰而環絰疏曰言叔仲皮教訓其子子栁而子栁猶不知禮叔仲皮死子栁妻雖是魯鈍婦人猶知為舅著齊衰而首服繆絰衍是皮之弟子栁之叔見當時婦人好尚輕細告子栁云汝妻何以著非禮之服子栁見時皆如此亦以為然乃請於衍令其妻身著繐衰首服環絰衍又答云昔者吾喪姑姊妹亦如此繐衰環絰無人相禁止也子栁得衍此言退使其妻著繐衰而環絰樛謂兩股相交也五服之絰皆然惟弔服環絰不樛環絰者一股所謂纒絰也子栁既受學於父不肯粥庶弟之母非是下愚而不知其非禮眀當時皆著輕細故也成人有其兄死而不為衰者聞子臯將為成宰遂為衰成人曰蠶則績而蟹有匡范則冠而蟬有緌兄則死而子臯為之衰集說曰成魯邑名匡背殼以匡也范蜂也緌為蜩喙長在腹下朱氏曰絲之績者必由乎匡之所盛然蟹之有匡非為蠶之績也為背而已首之冠者必資乎緌之所飾然蟬之有緌非為范之冠也為喙而已兄死者必為之服衰然成人之服衰非為兄之死也為子臯而已蓋以上二句喻下句也樂正子春之母死五日而不食曰吾悔之自吾母而不得吾情吾惡乎用吾情集說曰子春曽子弟子矯為過制之禮而不用其實情於母則他無所用其實情矣此所以悔也嵗旱穆公召縣子而問然曰天久不雨吾欲暴尩而奚若集說曰左傳注云尩者瘠病之人其面上向暴之者冀天哀之而雨也曰天則不雨而暴人之疾子虐母乃不可與然則吾欲暴巫而奚若集說曰巫能接神冀神閔之而雨曰天則不雨而望之愚婦人於以求之毋乃已疏乎徙市則奚若曰天子崩巷市七日諸侯薨巷市三日為之徙市不亦可乎集說曰徙移也言徙市又言巷市者謂徙交易之物於巷也此庶人為國之大喪憂戚罷市而日用所須又不可缺故徙市於巷也今旱而欲徙市者行喪君之禮以自責也縣子以其求之已而不求諸人故可其說然豈不聞僖公以大旱欲焚巫尩聞臧文仲之言而止縣子不能舉其說以對穆公而謂徙市為可則亦已疏矣孔子曰衛人之祔也離之魯人之祔也合之善夫疏曰祔合葬也離之謂以一物隔二棺之間於椁中魯人則合並兩棺置椁中無别物隔之榖則異室死則同穴故善魯之合也朱子曰古者椁合衆材為之故大小隨人所為今用全木則無許大木可以為椁故合葬者只同穴而各用椁也禮記述注卷四
