body:
  text: 禮記述註卷十五安溪李光坡撰大傳第十六註曰記祖宗人親之大義禮不王不禘王者禘其祖之所自出以其祖配之方氏曰此禘也以其非四時之常祀故謂間祀以其及祖之所自出故謂追享以其比常祭特大故謂大祭以其猶事生之有享焉故謂之肆獻祼名雖不同通謂之禘諸侯及其太祖大夫士有大事省於其君干祫及其髙祖集說曰上言諸侯不得行禘此言諸侯以下有祫祭之禮二昭二穆與太祖而五者諸侯之廟也諸侯之祫固及其太祖矣而不得及太祖之所自出大事者周禮司勲六功中有事功大事即大功也省善也大夫三廟上士二廟下士一廟不敢私行祫禮若有大功善於其君君許之祫亦上及於髙祖干者自下干上之義以卑者而行尊者之禮故謂之干疏云此言支庶為大夫士耳若適亦有太祖有太祖者鬼其百世若有善而得祫則亦祫於太祖廟中徧祫太祖以下也牧之野武王之大事也既事而退柴於上帝祈於社設奠於牧室遂率天下諸侯執豆籩逡奔走追王大王亶父王季歴文王昌不以卑臨尊也集說曰既事殺紂之後也燔柴以告天陳祭以告社奠告行主於牧野之館室然後率諸侯以祭告祖廟逡疾也疾奔走言勸事也追加先公以天子之號者盖為不可以諸侯之卑號臨天子之尊也坡謂諸侯太祖而下四親廟是上及髙祖大夫士干祫及髙祖今追王亦及髙祖盖情禮之極王者不過於此而大夫士亦可以推及於此追王自周公相成王事記者連言耳則程子以服制定上下通得祀及四親先聖後聖其同符如此疏云此論武王伐紂追王上尊祖禰之事與前相接也上治祖禰尊尊也下治子孫親親也旁治昆弟合族以食序以昭繆别之以禮義人道竭矣註曰治猶正也繆讀為穆聲之誤也竭盡也疏曰上主敬故云尊尊下主恩故云親親旁治逾逺疏也合㑹族人以食之禮又序次族人以昭穆之事所謂旁治也别之以禮義二句總結上熊氏曰言此三事皆分别之使燦然有禮截然有義人倫之道竭盡無餘矣坡謂此承上文敬所尊而及愛所親以起下文治天下所因所革之意聖人南面而聴天下所且先者五民不與焉一曰治親二曰報功三曰舉賢四曰使能五曰存愛五者一得於天下民無不足無不贍者五者一物紕繆民莫得其死聖人南面而治天下必自人道始矣集說曰民不與焉謂未及治民也治親即上治下治旁治也君使臣以禮故功曰報行成而上故賢曰舉藝成而下故能曰使一得猶皆得也贍賙也物事也紕繆舛戾也民莫得其死言此五事之得失關國家之治亂也人道申言上文之意坡謂存愛者言天子存二代之後乃斯民之所遺愛也與上四者皆忠厚之道以周禮秋官八議差次之而知其然如陳註則僅有四者似非也立權度量考文章改正朔易服色殊徽號異器械别衣服此其所得與民變革者也集說曰權稱錘度丈尺量斗斛也文章典籍也正者年之始朔者月之初服之色隨所尚而變易赤白黒也徽旌旗之屬徽之號亦隨所尚而殊異如殷之大白周之大赤之類也器者禮樂之器械者軍旅之器别衣服者周吉服九章虞以十二章殷凶不厭賤周貴則降卑也時王因革不同此七者以立考改易殊異别為言是與民變革者也其不可得變革者則有矣親親也尊尊也長長也男女有别此其不可得與民變革者也集說曰此天地之常經故不可變革同姓從宗合族屬異姓主名治際㑹名著而男女有别疏曰此一節論同姓從宗異姓主名明男女有别之事集說曰同姓父族也從宗從大宗小宗也合聚其族之親屬則無離散陵犯之事異姓他姓之女來歸者也禮莫大於分分莫大於名卑者為婦尊者為母以婦與母之名治昏姻交際㑹合之事名分顯著尊卑有等然後男女有别而無淫亂賊逆之禍也其夫屬乎父道者妻皆母道也其夫屬乎子道者妻皆婦道也謂弟之妻婦者是嫂亦可謂之母乎名者人治之大者也可無慎乎集說曰屬聯也父之兄弟為伯叔父則其妻謂之伯叔母兄弟之子為從子則其妻謂之婦此於昭穆為宜弟之妻不可謂之為婦猶兄之妻不可謂之為母以紊昭穆也故云謂弟之妻婦者是嫂亦可謂之母乎言皆不可也四世而緦服之窮也五世袒免殺同姓也六世親屬竭矣其庶姓别於上而戚單於下昏姻可以通乎集說曰四世髙祖也同髙祖者服緦麻服盡於此矣故云服之窮也五世袒免謂共承髙祖之父者相為袒免而已是減殺同姓也六世則共承髙祖之祖者并袒免亦無矣故曰親屬竭也上指髙祖以上也姓為正姓氏為庶姓故魯姬姓而三家各自為氏春秋諸國皆然是庶姓别異於上世也戚親也單盡也四從兄弟恩親已盡各自為宗是戚單於下也殷人五世以後則相與通昏故記者設問云今雖周世昏姻可以通乎繫之以姓而弗别綴之以食而弗殊雖百世而昏姻不通者周道然也集說曰周禮大宗百世不遷庶姓雖别而有本姓世繫以聯繫之不可分别也又連綴族人以飲食之禮不殊異也雖百世之逺無通昏之事此周道所以為至而人始異於禽獸者也此是答上文設問之辭坡謂自其夫屬乎父道至此皆因異姓主名治際㑹而推說盡之服術有六一曰親親二曰尊尊三曰名四曰出入五曰長幼六曰從服註曰術猶道也疏曰親親者父母為首次妻子伯叔尊尊者君為首次公卿大夫名者若伯叔母及子婦弟婦兄嫂之屬出入者女在室為入適人為出及為人後者長幼者長謂成人幼謂諸殤從服者下文六等是也從服有六有屬從有徒從有從有服而無服有從無服而有服有從重而輕有從輕而重集說曰屬親屬也子從母而服母黨妻從夫而服夫黨夫從妻而服妻黨是屬從也徒空也非親屬而空從之服其黨如臣從君而服君之黨妻從夫而服夫之君妾服女君之黨庶子服君母之父母子服母之君母是徒從也如公子之妻為父母期而公子為君所厭不得服外舅外姑是妻有服而公子無服如兄有服而嫂無服是從有服而無服也公子為君所厭不得為外兄弟服而公子之妻則服之妻為夫之昆弟無服而服娣姒是從無服而有服也妻為其父母期重也夫從妻而服之三月則為輕母為其兄弟之子大功重也子從母而服之三月則為輕此從重而輕也公子為君所厭自為其母練冠輕矣而公子之妻為之服期此從輕而重也自仁率親等而上之至于祖名曰輕自義率祖順而下之至于禰名曰重一輕一重其義然也疏曰自用也仁恩也率循也親父母也等差也子孫若用恩愛依循於親節級而上至於祖逺者恩愛漸輕故名曰輕也義主斷割用義循祖順而下之至於禰其義漸輕祖則義重故名曰重也義則祖重而父母輕仁則父母重而祖輕一輕一重宜合如是故云其義然也按喪服條例衰服表恩若髙曾之服本應緦麻小功而進以齊衰豈非為尊重而然耶至親以期斷而父母三年寧不為恩深乎坡謂自服術有六至此因上言服窮昏姻之義而推明親親尊尊長長男女服術之制君有合族之道族人不得以其戚戚君位也集說曰君恩可以下施故於族人有合聚燕飲之禮而族人則皆臣也不敢以族屬父兄子弟之親而上親於君者一則君有絶宗之道二則以嚴上下之辨而杜簒代之萌也石梁王氏曰詳註下文以十一字為句然位也當自為句盖族人不敢戚君者限於位也庶子不祭明其宗也庶子不得為長子三年不繼祖也集說曰詳見前篇别子為祖繼别為宗繼禰者為小宗有百世不遷之宗有五世則遷之宗百世不遷者别子之後也宗其繼别子之所自出者百世不遷者也宗其繼髙祖者五世則遷者也尊祖故敬宗敬宗尊祖之義也集說曰宗其繼别子者百世不遷者也之所自出四字朱子曰衍文也凡大宗族人與之為絶族者五世外皆為之齊衰三月母妻亦然為小宗者則以本親之服服之餘並說見前篇有小宗而無大宗者有大宗而無小宗者有無宗亦莫之宗者公子是也集說曰君無適昆弟使庶兄弟一人為宗以領公子其禮亦如小宗此之謂有小宗而無大宗也君有適昆弟使之為宗以領公子更不得立庶昆弟為宗此之謂有大宗而無小宗也若公子止一人無他公子可為宗是無宗也則亦無他公子宗於已矣此之謂無宗亦莫之宗也前所論宗法是通言卿大夫有大宗小宗以相繼屬此則專言國君之子上不得宗君下未為後世之宗不可無人主領之義公子有宗道公子之公為其士大夫之庶者宗其士大夫之適者公子之宗道也註曰公子不得宗君君命適昆弟為之宗使之宗之是公子之宗道也所宗者適則如大宗死為之齊衰九月其母則小君也為其妻齊衰三月無適而宗庶則如小宗死為之大功九月其母妻無服公子唯已而已則無所宗亦莫之宗疏曰君尊族人不敢戚故公子不得宗君也齊衰九月者以君在厭降兄弟降一等故九月以為大宗故齊衰與君同母故云母則小君也為其妻齊衰三月同喪宗子之義也死為之大功九月者與尋常兄弟相為君在厭降一等母則庶母妻則兄弟之妻故無服也熊氏曰此節明有大宗無小宗之意以例其餘注疏廣言之絶族無移服親者屬也集說曰三從兄弟同髙祖故服緦麻至四從則族屬絶無延及之服矣移讀為施在旁而及之曰施服之相為謂有親者各以其屬而為之服故云親者屬也坡謂自君有合族至此申明同姓從宗合族屬之意自仁率親等而上之至于祖自義率祖順而下之至于禰是故人道親親也親親故尊祖尊祖故敬宗敬宗故收族收族故宗廟嚴宗廟嚴故重社稷重社稷故愛百姓愛百姓故刑罰中刑罰中故庶民安庶民安故財用足財用足故百志成百志成故禮俗刑禮俗刑然後樂詩云不顯不承無斁於人斯此之謂也集說曰親親仁也而祖亦不可疏必自仁率親等而上之至于祖尊尊義也而禰亦不可輕必自義率祖順而下之至於禰王者親不遺祖尊不遺禰如此是故人倫之道以親親為始而祖則親之所自出也故尊祖宗乃祖之所繼也故敬宗敬宗則族人統于五宗故曰收族收族則有事於宗廟子孫兄弟羣昭羣穆咸在而不失其倫故曰嚴内嚴宗廟之事故外重社稷之禮知社稷之不可輕則知百官族姓之當愛官得其人則政清故刑罰中刑不濫而民安其生安生樂業而食貨所資上下俱足有恒産者有恒心倉廩實而知禮節故志向為善之念得成就民心淳而行興故乖争陵犯不作而謙讓之俗成刑猶成也如此則協氣嘉生薰為太和矣豈不可樂乎詩周頌清廟之篇言文王之德豈不光顯乎豈不見尊奉於人乎無厭斁於人矣引此以喻人君自親親之道推之而家而國而天下至於禮俗大成其可樂者亦無有厭斁也坡謂疏云自宗廟嚴以下並立宗之功也深得此篇總結之大㫖古人立宗敬祀其要在此親親尊尊相維自近及逺自小至大孟子言人人親其親長其長而天下平三代所以乆安長治者實心行此而已少儀第十七疏曰鄭云名少儀者以其記相見及薦羞之小威儀少猶小也此一篇雜文細小威儀不復局以料叚各隨文解之朱子曰小學之支流餘裔聞始見君子者辭曰某固願聞名於將命者不得階主適者曰某固願見罕見曰聞名亟見曰朝夕瞽曰聞名集說曰記者謙言我嘗聞之於人云初見有徳有位之君子者其辭云某固願通聞己名於将命之人固如固辭之固不曰願而曰固願慮主人不即見己而假此薦請之辭也将命者通客主言語出入之人也適者賓主敵體之人也則曰某固願見於將命者罕見謂久不相見也亦曰願聞名於将命者盖疑疎濶之久未必主人肯見也亟見數見也於君子則曰某願朝夕聞名於將命者於敵者則曰某願朝夕見於将命者若瞽者來見無問貴賤惟曰某願聞名於将命者以無目故不言願見也坡謂階主註疏未明案士相見曰某也願見無由達某子以命命某見意某子即階主也盖所因縁之人為階主適有喪者曰比童子曰聽事集說曰前明吉禮相見此明凶禮相見者也適往也其辭云某願比於将命者喪不主相見來欲比方於執事之人也童子未成人其辭則云某願聴事於將命者謂來聽主人以事見使令也適公卿之喪則曰聽役於司徒集說曰前往敵喪此適貴者喪也孟獻子之喪司徒旅歸四布則公卿之喪司徒掌其事也故云某願聽役於司徒君將適他臣如致金玉貨貝於君則曰致馬資於有司敵者曰贈從者集說曰前明吉凶相見之禮此以下明吉凶相遺送之禮此明送吉也適他謂以朝㑹之事而出也馬資謂資給道路車馬之費也臣致襚於君則曰致廢衣於賈人敵者曰襚親者兄弟不以襚進集說曰此明送凶也以衣送死者謂之襚襚者遂彼生時之意也稱廢衣者不敢必用之以斂也賈人識物價貴賤而主君之衣物者也敵者則直以襚言矣凡致襚若非親者則湏擯者傳辭将進以為禮若親者兄弟之類但直将進而陳之不須執以将命故云不以襚進也士喪禮大功以上同財之親襚不將命即陳于房中小功以下及同姓等皆将命臣為君喪納貨貝於君則曰納甸於有司賵馬入廟門賻馬與其幣大白兵車不入廟門集說曰納入也甸田也臣受君之田邑此納者田野所出故云納甸也以馬送死曰賵賵副亡者之意也既送亡者故可入廟門賻馬與幣所以助主人喪事之用故不入廟門大白革路之旗周禮建大白以即戎兵車即革路也雖並為送喪之用以其本戰伐之具故亦不可入於廟門此謂國君之喪鄰國有以此為賵者亦或本國自有之也賻者既致命坐委之擯者舉之主人無親受也註曰喪者非尸柩之事則不親也舉之舉以東疏曰吉時若人饋物主人皆自拜受喪主於哀戚凡以物賻已悉不得拜受故使擯者受舉之而已受立授立不坐性之直者則有之矣集說曰受人之物而人立與以物授人之立者皆不跪此皆委曲以盡禮之當然耳然直情徑行之人亦或有跪者故曰性之直者則有之矣始入而辭曰辭矣集說曰賓始入門主人當辭讓令賓先入故擯者告主人曰辭矣謂當致辭以讓賓也至階亦然此不言者禮可知也即席曰可矣集說曰及賓主升堂各就席擯者恐賓主再辭故告之曰可矣言可即席不須再辭也排闔說屨於户内者一人而已矣有尊長在則否集說曰闔門扇也推排門扇而說屨於户内者一人而已言止許最長者一人如此餘人不可也若先有尊長在堂或在室則後入之人皆不得脫屨於户内故云有尊長在則否也問品味曰子亟食於某乎問道藝曰子習於某乎子善於某乎方氏曰人之情品味有偏嗜道藝有異尚問品味不可斥之以好惡而昭其癖故曰子亟食於某乎問道藝不可斥之以能否而暴其短故曰子習於某乎子善於某乎不疑在躬不度民械不願於大家不訾重器集說曰於卿大夫之家見彼富大不可願效之也非分而願必有亂心也訾鄙毁之也重器之傳寳之久矣乃從而毁之豈不起人之怒乎坡謂不疑在躬猶云不億不信械機械也不度民械猶云不逆詐也不疑在躬則直道而行不度民械則誠心待物汜埽曰埽埽席前曰拚拚席不以鬛執箕膺擖集說曰汜埽廣埽也拚除穢也鬛帚也席上不可用帚膺胸也擖箕舌也執箕而拚則以箕舌向己胸前不可持向尊者也不貳問問卜筮曰義與志與義則可問志則否集說曰不貳問謂謀之龜筮事雖正而兆不吉則不可以不正者再問之也見人卜筮欲問其所卜何事則曰義與志與義者事之宜為志則心之隠謀也故義者則可問其事志則不可問其事也一說卜者問求卜之人義則為卜之志則不為之卜亦通尊長於己踰等不敢問其年燕見不將命遇於道見則面不請所之喪俟事不犆弔集說曰踰等祖與父之行也不敢問年嫌若序齒也燕見不将命謂卑幼者燕私來見不使擯者傳命用賓主之禮來則若子弟然若遇尊長於道路尊者見己則面見之不見則隠避不欲煩動之也不請所之不問其所往也若於尊者之喪則待主人朝夕哭之時而往不非時特弔侍坐弗使不執琴瑟集說曰侍坐於尊者不使之執琴瑟則不得擅執而鼓之不畫地手無容不翣也寢則坐而將命集說曰無故而畫地亦為不敬手無容者不弄手也時雖暑熱不得揮扇若當尊者寢卧之時而傳命必跪而言之不可直立以臨之也侍射則約矢集說曰凡射必二人為耦楅在中庭箭倚於楅上耦前取一矢次下耦又進取一矢如是更進各得四矢若卑者侍射則不敢更迭取之但一時并取四矢故謂之約矢也待投則擁矢集說曰投壺之禮亦賓主各四矢尊者則委四矢於地一一取而投之卑者不敢委於地故悉擁抱之也勝則洗而以請客亦如之不角不擢馬集說曰射與投壺之禮勝者之子弟酌酒置于豐上豐在西階上西楹之西其不勝者跪而飲之若卑者得勝則不敢徑酌當前洗爵而請行觴也客若不勝則主人亦洗而請所以優賓也角兕觥也今飲尊者及客不敢用角但如常獻酬之爵也擢進而取之也馬者投壺之勝筭每一勝則立一馬至三馬而成勝若一朋得二馬一朋得一馬則二馬者取彼之一馬足成己之三馬今卑者雖得二馬不得取尊者之一馬以成己勝也執君之乗車則坐僕者右帶劔負良綏申之面拖諸幦以散綏升執轡然後歩方氏曰執謂執轡也凡御必立今坐者君未升車而車未行也劒在左以便右抽僕則右帶者以君在左嫌妨君也良綏正綏也散綏貳綏也正綏君所執貳綏則僕執之君由後升僕在車前向君取君綏由左腋下加左肩上繞臂入右腋下故曰負良綏申之面者言垂綏之末於前也拖諸幦者引之於車闌覆苓之上也苓亦名式以散綏升者復言僕初升時也執轡然後歩者防馬之逸也請見不請退朝廷曰退燕遊曰歸師役曰罷方氏曰請見不請退者謂卑者有請見之理去必由尊者故不敢請退朝廷人之所趨故於其還曰退退則為出故也燕遊不可以久故於其還曰歸歸有所止故也師役勞苦為甚故於其還曰罷以其疲故也陳氏曰罷當讀如欲罷不能之罷侍坐於君子君子欠伸運笏澤劍首還屨問日之蚤莫雖請退可也疏曰前言侍者不得請退今若見君子有欠伸以下諸事皆是久坐體倦欲起或欲卧息之意故侍者當此時假令請退則可也運運動也澤玩弄則生光澤也還屨謂君子自轉屨也尊者屨恒在側事君者量而后入不入而后量凡乞假於人為人從事者亦然然故上無怨而下逺罪也集說曰先度其君之可事而後事之則道可行而身不辱入而後量則有不勝其輕進之悔者矣或乞或假或任人之事亦必量其可而後行然故上無怨而下逺罪者然猶如此事君若能如此下不忤上故上無怨上不責下故下逺罪不窺密不旁狎不道舊故不戯色集說曰窺覘隠密之處論說故舊之非非重厚者所為也應氏曰旁狎非必正為玩狎旁近循習而流於狎也戯色非必見諸笑言外貌斯須不敬則色不荘矣為人臣下者有諌而無訕有亡而無疾頌而無讇諫而無驕怠則張而相之廢則埽而更之謂之社稷之役疏曰諫而無驕者謂君若從己之諫己不得恃己言行謀用而生驕慢也方氏曰君有過諫之使止可也訕之則不恭諫不從逃而去之可也疾之則太傷頌而無讇則所頌為公諌而無驕則所諫為正事弛而不力為怠事弊而無用為廢相之更之則君豈有失德國豈有廢事㢤謂之社稷之役以其有勞於社稷也毋拔來毋報往註曰報讀為赴疾之赴拔赴皆疾也人來往所之當有宿漸不可卒也朱子曰拔是急走倒從這邊來赴是又急再還倒向那邊去來往只是向背之意此兩句文義猶云其就義若熱則其去義若渴言人見有個好事火急歡喜去做這様人不耐久少間心懶意闌則速去之矣所謂其進銳者其退速也毋凟神毋循枉毋測未至集說曰神不可凟必敬而逺之言行過而邪枉當改以從直後復循襲是貳過矣君子以誠自處亦以誠待人不逆料其将然也未至而測之雖中亦偽士依於德游於藝工依於法游於說集說曰依者據以為常㳺則出入無定工之法規矩尺寸之制也說則講論變通之道焉毋訾衣服成器毋身質言語註曰質成也聞疑則傳疑若成之或有所誤也陳氏曰訾毁其不善也言語之美註曰五美字皆讀為儀然皆如本字亦通穆穆皇皇朝廷之美濟濟翔翔祭祀之美齊齊皇皇車馬之美匪匪翼翼鸞和之美肅肅雍雍方氏曰穆穆者敬以和皇皇者正而美濟濟者出入之齊翔翔者翕張之善齊齊致齊而能定也皇皇有求而不得也匪匪言行而有文翼翼言載而有輔肅肅唱者之敬雍雍應者之和此即保氏所教六儀也問國君之子長幼長則曰能從社稷之事矣幼則曰能御未能御問大夫之子長幼長則曰能從樂人之事矣幼則曰能正於樂人未能正於樂人問士之子長幼長則曰能耕矣幼則曰能負薪未能負薪集說曰社稷之事如祭祀軍旅之類皆是也御治也謂治事國君尊故以社稷言樂人之事如周禮樂德樂語樂舞之類大司樂以教國子者正者正其善否大夫下於君故以教子言士賤則以耕與負薪言熊氏曰此所謂問直問於其父也父以其子對故各從其謙耳與曲禮小異執玉執龜筴不趨堂上不趨城上不趨武車不式介者不拜集說曰說見曲禮婦人吉事雖有君賜肅拜為尸坐則不手拜肅拜為喪主則不手拜集說曰肅拜如今婦人拜也但屈膝鞠躬以為禮手拜則手至地而頭在手上如今男子拜也婦人以肅拜為正故雖君賜之重亦肅拜而受為尸虞祭為祖姑之尸也為喪主夫與長子之喪也為喪主則稽顙故不手拜若有喪而不為主則手拜矣或曰為喪主不手拜則亦肅拜也葛絰而麻帶集說曰婦人遭喪卒哭後以葛絰易首之麻絰而要之麻絰不變故云葛絰而麻帶也取俎進俎不坐集說曰取俎就俎上取肉也進俎進肉於俎也俎有足立而取進為便故不跪執虚如執盈入虚如有人熊氏曰此君子敬修之密也無物之器執之甚於持盈則無事不敬矣無人之地對之甚於有人則無所不敬矣凡祭於室中堂上無跣燕則有之集說曰凡祭通言君臣上下之祭也跣脫屨也祭禮主敬凡祭在室中者非惟室中不脫屨堂上亦不敢脫屨燕則有之者謂行燕禮則堂上可跣也又案下大夫及士隂陽二厭及燕尸皆於室中上大夫隂厭及祭在室若擯尸則於堂天子諸侯則有室有堂未嘗不食新集說曰嘗者薦新物於寢廟也未薦則孝子不忍先食一云嘗秋祭也僕於君子君子升下則授綏始乗則式君子下行然後還立乗貳車則式佐車則否集說曰君子或升或下僕者皆授之綏始乗之時君子猶未至則式以待君子之升凡僕之禮升在君子之先下在君子之後故君子下車而歩僕者乃得下而還車以立以待君子之去也貳車朝祀之副車也朝祀尚敬故式戎獵尚武故不式貳車者諸侯七乗上大夫五乗下大夫三乗有貳車者之乗馬服車不齒觀君子之衣服服劔乗馬弗賈集說曰周禮貳車公九乗侯伯七乗子男五乗又典命云卿六命大夫四命車服各如命數與此不同者註云此盖殷制也乗馬所乗之馬服車所乗之車也馬有老少車有新舊皆不可齒次其年嵗服劔所佩之劔也弗賈不可評論其所直多少之價曲禮云齒路馬有誅此皆貴貴之道以廣敬也其以乗壺酒束脩一犬賜人若獻人則陳酒執脩以將命亦曰乗壺酒束脩一犬註曰陳重者執輕者便也乗壺四壺也酒謂清也糟也不言陳犬或無脩者牽犬以致命也於卑者曰賜於尊者曰獻疏曰束脩十脡脯也無脩雖牽犬以致命但犬馬不上於堂牽之當在下耳其以鼎肉則執以将命疏曰鼎肉謂肉之已解剔而可升鼎者故可執也其禽加於一䨇則執一雙以將命委其餘集說曰加於一雙不止一雙也委其餘陳列於門外也犬則執緤守犬田犬則授擯者既受乃問犬名牛則執紖馬則執靮皆右之註曰緤紖靮皆所以繫制之者守犬田犬問名畜養者當呼之名謂若韓盧宋鵲之屬右之者執之宜由便也疏曰犬有三種曰守犬守禦宅舎者曰田犬田獵所用也曰食犬充庖廚用也守犬田犬畜養馴善無可防禦故右之若食犬則左手牽之右手防禦曲禮云效犬者左牽之是也臣則左之集說曰臣征伐所獲民虜也曲禮云獻民虜者操右袂左之以左手操其右袂而右手得以制其非常也車則說綏執以將命甲若有以前之則執以將命無以前之則袒櫜奉胄集說曰前之謂以他物先之也古人獻物必有先之者如左傳所云乗韋先牛十二之類是也袒開也櫜弢甲之衣也胄兜鍪也袒其衣出兜鍪以致命器則執盖弓則以左手屈韣執拊集說曰執盖盖輕便於執也韣弓衣拊弓把左手屈弓衣并於把而執之而右手執蕭以將命曲禮云右手執蕭左手承弣是也劔則啟櫝盖襲之加夫襓與劔焉集說曰啟開也櫝劔匣也盖者匣之盖也襲郤合也夫襓劒衣也開匣以其盖郤合於匣之底下乃加襓於匣中而以劒置襓上也笏書脩苞苴弓茵席枕几穎杖琴瑟戈有刃者櫝筴籥其執之皆尚左手刀郤刄授穎削授弣凡有刺刃者以授人則辟刃集說曰笏也書也脯脩也苞苴也苴藉而苞裹之非特魚肉他物亦可苞苴以遺人也弓也茵褥也席也枕也几也穎警枕也杖也琴也瑟也戈有刃者櫝而致之也筴蓍也籥如笛而三孔也凡十六物左手執上右手捧下隂陽之義也郤仰也穎刀鐶也削曲刀也拊刀把也辟偏也謂不以刃正向人也乗兵車出先刃入後刃軍尚左卒尚右集說曰先刃刃向前也入後刃不以刃向國也左陽生道也右隂死道也左將軍為尊其行伍皆尊尚左方欲其無覆敗也士卒之行伍尊尚右方示有必死之志也賓客主恭祭祀主敬喪事主哀㑹同主詡軍旅思險隠情以虞集說曰恭以容言敬以心言詡謂敏而有勇若子産争承者軍行舎止經由之處必思為險阻之防又當隠密已情以虞度彼情不可泄謀玩敵也燕侍食於君子則先飯而後已毋放飯毋流歠小飯而亟之數噍毋為口容客自徹辭焉則止集說曰先飯猶嘗食之禮也後已猶勸食之意也放飯流歠見曲禮小飲則無噦噎之患亟之謂速咽下偹或有見問之言也數噍毋為口容言數數嚼之不得弄口以為容也若食訖而客欲自徹食器主人辭之則止也客爵居左其飲居右介爵酢爵僎爵皆居右疏曰鄉飲酒禮主人酬賓之爵賓受奠觶於薦東是客爵居左也旅酬之時一人舉觶于賓賓奠觶于薦西至旅酬賓取薦西之觶以酬主人是其飲居右也介賓副也酢客爵還答主人也僎鄉人來觀禮副主人者也皆居右者示為飲之鄉飲禮介爵及主人受酢之爵并僎爵皆不明奠置之所故記者於此明之羞濡魚者進尾冬右腴夏右鰭祭膴集說曰擘濕魚從後起則脇肉易離故以尾向食者若乾魚則進首也腴腹下肥處鰭脊也冬時陽氣在下夏則陽在上凡陽氣所在之處肥美右之者便於食也祭膴者刳魚腹下大臠以祭也此言尋常燕食進魚者如此非祭祀及饗食正禮祭魚在俎則縮載俎既橫設魚則隨俎而從於人為横無進首進尾之理正享亦然公食大夫禮魚七縮俎是也凡齊執之以右居之於左疏曰凡齊者謂以鹽梅齊和之法執之以右者謂執此鹽梅以右手居之於左者謂居處羮食於左手之上以右手所執鹽梅調和正之於事便也贊幣自左詔辭自右集說曰此言相禮者為君受幣則由君之左傳君之辭命於人則由君之右也酌尸之僕如君之僕其在車則左執轡右受爵祭左右軌范乃飲集說曰尸之僕御尸車者軌轂末范軾前也尸僕君僕之在車以左手執轡右手執爵祭軌之左右及范乃飲之也凡羞有俎者則於俎内祭集說曰羞在豆則祭之豆間之地俎長而横於人之前不得祭之俎外及兩俎間則祭之俎内也君子不食圂腴集說曰圂與豢同謂犬豕也腴腸也犬豕亦食米穀腴有似人穢小子走而不趨舉爵則坐祭立飲集說曰趨趨翔為容也小子不敢與尊者並禮故行步舉爵皆異於成人也凡洗必盥集說曰洗洗爵也盥洗手也凡洗爵必先洗手示潔也牛羊之肺離而不提心集說曰提猶絶也心中央也牛羊之肺雖割離之而不絶中央少許使可手絶之以祭也不言豕事同可知凡羞有湆者不以齊集說曰湆大羮也大羮不和故不用鹽梅之齊也為君子擇蔥薤則絶其本末羞首者進喙祭耳集說曰本根也根不浄末萎乾也喙口也以口向尊者而尊者先取耳以祭也尊者以酌者之左為上尊集說曰尊者謂設尊之人也酌者酌酒之人也人君陳樽在東楹之西南北列之設尊者在尊西而向東以右為上酌人在尊東而向西以左為上設者之右則酌者之左二人俱以南為上也上尊在南故云以酌者之左為上尊尊壺者面其鼻集說曰尊與壺皆有面面有鼻鼻宜向尊者故云尊壺者面其鼻言設尊設壺皆面其鼻飲酒者禨者醮者有折俎不坐未步爵不嘗羞疏曰禨沐而飲酒者醮冠而飲酒者折俎謂折骨體於俎者折俎為尊禨醮小事為卑故不得坐也按鄉飲酒燕禮有折俎者皆不坐獨云禨醮者以禨者醮者無折俎之時則得坐嫌有折俎亦坐故特明之歩行也此謂無算爵之時羞庶羞行爵之後始嘗之若正羞脯醢折俎謂飲酒之前則嘗之故鄉飲射燕禮大射獻後乃薦賓皆先祭脯醢嚌肺乃飲卒爵牛與羊魚之腥聶而切之為膾麋鹿為菹野豕為軒皆聶而不切麕為辟雞兔為宛脾皆聶而切之切蔥若薤實之醯以柔之註曰聶之言䐑也先藿葉切之復報切之則成膾此軒辟雞宛脾皆菹類也其作之狀以醯與葷菜淹之殺肉及腥氣也疏曰聶而切之者謂先䐑為大臠而後報切之為膾也餘見内則其有折俎者取祭反之不坐燔亦如之尸則坐疏曰鄉射禮云賓奠爵于薦西興取肺云興則立也少牢禮云尸左執爵右兼取肝肺不云興故知尸則坐集說曰有折骨體之俎者就俎立取肺升席坐祭之及祭竟而反此所祭之物於俎皆立而為之唯祭時坐耳燔燒肉也此肉亦在俎其取祭與反亦皆不坐故云燔亦如之尸則坐者言不坐者賓客之禮耳尸尊祭反皆坐也衣服在躬而不知其名為罔集說曰衣裳之制取諸乾坤有其名則有其義服之而不審名義是無知之人矣石梁王氏曰學而不思則罔當如此罔字其未有燭而後至者則以在者告道瞽亦然凡飲酒為獻主者執燭抱燋客作而辭然後以授人執燭不讓不辭不歌集說曰獻主主人也人君則使宰夫燋未爇之炬也執燭夜時也飲酒之禮賓主有讓及更相辭謝又各歌詩以見意今以暮夜畧此三事一說執燭在手故不得兼為之洗盥執食飲者勿氣有問焉則辟咡而對集說曰奉進洗盥之水於尊長及執食飲以進之時皆不可使口氣直衝尊者若此時尊者有問則偏其口之所向而對咡口旁也為人祭曰致福為己祭而致膳於君子曰膳集說曰為人祭攝主也其歸胙将命之辭言致福謂致其祭祀之福也曰膳則善味而已祔練曰告註曰祔練言告不敢以為福膳也疏曰言以祭胙告君子使知己祔練而已故顔子之喪饋孔子祥肉是也凡膳告於君子主人展之以授使者于阼階之南南面再拜稽首送反命主人又再辭稽首其禮大牢則以牛左肩臂臑折九箇少牢則以羊左肩七箇犆豕則以豕左肩五箇集說曰膳告承上文而言反命主人又再拜亦當在阼階南南面也臂臑肩脚也九箇取肩自上斷折之至蹄為九段也周人牲體尚右右邊已祭故獻其左國家靡敝集說曰謂師旅饑饉之餘財力靡散民庶彫敝也則車不雕㡬甲不組縢食器不刻鏤君子不履絲屨馬不常秣集說曰雕刻鏤之也㡬漆飾之畿限也縢者縛約之名不用組以連甲及為紟帶也絲屨謂絇繶紃之屬不以絲飾之以穀食馬曰秣學記第十八疏曰鄭云名學記者以其記人學教之義坡謂古人論道紀事之文皆有所主大學主於脩已治人則論學之條目工夫此篇主於建學立師則論教之終始興廢使學者各作一意求之通貫之後教學者或原或委則自求之大學志學者親師取友則自求之此篇何必支離漫衍参錯迭見而初無補於用力之實也石梁王氏不數漢儒而卑視此經故未求意義之合但作批剝浮誕不忌當分别觀之盖恐未極髙明徒長虚憍也發慮憲求善良足以謏聞不足以動衆集說曰發慮憲謂致其思慮以求合乎法則也求善良親賢也謏之言小也此二者可以小致聲譽不能感動衆人就賢體逺足以動衆未足以化民集說曰就賢禮下賢德之士也體謂設以身處其地而察其心也逺疎逺之臣也此二者可以感動衆人未能化民也君子如欲化民成俗其必由學乎集說曰化民成俗必如唐虞之於變時雍乃為至耳然則舎學何以㢤此學乃大學之道明德新民之事也玉不琢不成器人不學不知道是故古之王者建國君民教學為先兌命曰念終始典于學其此之謂乎集說曰建國君民謂建立邦國以君長其民也教學為先以立教立學為先務也兌命商書典常也雖有嘉肴弗食不知其㫖也雖有至道弗學不知其善也是故學然後知不足教然後知困知不足然後能自反也知困然後能自强也故曰教學相長也兌命曰學學半其此之謂乎註曰學則睹已行之所短教則見已道之所未達自反求諸已也自強脩業不敢倦學學半言學人乃益已之學半熊氏曰學然後知不足謂師資於人方知己所未至也教然後知困謂無以應人之求則自知困辱也惟知不足然後能自反以求足惟知困然後能自強以求通自反是教有長於學自強是學有長於教資人與資於人相為長益故曰教學相長也兌命本言教人之功得學之半而此則謂教之功半以証相長之意坡謂上節言王者當以學教人此節言人當以學自益也古之教者家有塾黨有庠術有序國有學比年入學中年考校一年視離經辨志三年視敬業樂羣五年視博習親師七年視論學取友謂之小成九年知類通達强立而不反謂之大成集說曰古者二十五家為閭同在一巷巷首有門仕焉而已者歸教於閭里朝夕坐於門門側之堂謂之塾民在家者朝夕受教於塾也五百家為黨黨之學曰庠教閭塾所升之人也術當為州萬二千五百家為州州之學曰序周禮鄉大夫春秋以禮㑹民而射于州序是也序則教黨學所升之人天子所都及諸侯國中之學謂之國學以教元子衆子及卿大夫士之子與所升俊選之士焉比年每嵗也每嵗皆有入學之人中年間一年也每間一年而考校其藝疏云應入大學者自國家考校之其未入大學者鄉遂大夫考校也離經離絶經書之句讀也辨志辨别其趨向之邪正也敬業則於所習無怠忽樂羣則於朋徒無暌貳博習則不以程度為限制親師則於訓誨知嗜好論學講求學問之藴奥也取友擇取益者而友之也能如此是學之小成也至於九年則理明義精觸類而長無所不通有卓然自立之行而外物不得以奪之矣是大成也夫然後足以化民易俗近者說服而逺者懐之此大學之道也記曰蛾子時術之其此之謂乎集說曰前言成俗成其美俗也此言易俗變其汙俗也以此大成之士而官使之其功效如此是所謂大學教人之道也蛾子蟲之微者亦時時述學銜土之事而成大垤以喻學者由積學而成大道也此古記之言故引以證其說坡謂人主果能專心教學孜孜不倦使比户絃歌自然風移而俗易矣非只於官使大成之士乃有其效也自家有塾至此明立學所成就之次第也大學始教皮弁祭菜示敬道也集說曰始教學者入學之初也天子使有司衣皮弁之服祭先聖先師以蘋藻之菜示之以尊敬道藝也宵雅肄三官其始也集說曰當祭菜之時使歌小雅中鹿鳴四牡皇皇者華之三篇而肄習之此三詩皆君臣燕樂相勞苦之辭盖以居官受任之美誘諭其初志故曰官其始也朱子曰聖人教人合下便要他用便要用賢以治不賢舉能以教不能所以公卿大夫在下思各舉其職入學鼓篋孫其業也集說曰入學時大胥之官擊鼓以召學士學士至則發篋以出其書籍等物警之以鼔聲使以遜順之心進其業也書言惟學遜志夏楚二物收其威也集說曰夏榎也楚荆也榎形圓楚形方以二物為朴以警其怠忽者使之收斂威儀也未卜禘不視學㳺其志也時觀而弗語存其心也幼者聴而弗問學不躐等也石梁王氏曰此學字如字讀之此七者教之大倫也記曰凢學官先事士先志其此之謂乎疏曰時觀謂教者時時觀之而不丁寧告語所以然者欲使學者存其心也既不告語學者心憤口悱然後啟之學者則存其心也集說曰禘五年之大祭也不五年不視學所以優游學者之心志也此又非仲春仲秋視學之禮幼者未必能問問亦未必知要故但聽受師說而無所請亦長幼之等當如是不可踰躐也劉氏曰自皮弁祭菜至聴而弗問凡七事皆大學為教之大倫大倫猶言大節耳官先事士先志竊意官是已仕者士是未仕者謂已仕而為學則先其職事之所急未仕而為學則未得見諸行事故先其志之所尚也子夏曰仕而優則學是己居官而為學也王子墊問士何事孟子曰尚志是未仕而學則先尚志也然大學之道明德新民而已先志者所以明德先事者所以新民七事上句皆教者之事下句皆學者之志坡謂此明入學科條之有序也大學之教也時教必有正業退息必有居學不學操縵不能安弦不學博依不能安詩不學雜服不能安禮不與其藝不能樂學故君子之於學也藏焉脩焉息焉遊焉集說曰舊說大學之教也時句絶退息必有居句絶今讀時字連下句學字連上句謂四時之教各有正業如春秋教以禮樂冬夏教以詩書春誦夏絃之類是也退而燕息必有燕居之學如退而省其私亦足以發是也弦也詩也禮也此時教之正業也操縵博依雜服此退息之居學也凡為學之道貴於能安安則心與理融而成熟矣然未至於安則在乎為之不厭而不可有作輟也操縵調弦雜弄也初學者手與絃未相得故雖退息時亦必操弄之不廢乃能習熟而安於絃也詩人比興之辭多依託於物理而物理至博也故學詩者但講之於學校而不能於退息之際廣求物理之所依附者則無以驗其實而於詩之辭必有疑殆而不能安者矣雜服冕弁衣裳之類先王制作禮各有服極為繁雜學者但講之於學而不於退息時㳺觀行禮者之雜服則無以盡識其制而於禮之文必有彷彿而不能安者矣興者爾雅云歆喜興也藝即三者之學是也言退息時不興此三者之藝則生疎扞格於學不能安而樂之也故君子之於學也藏焉脩焉之時必有正業則所習者專而志不分息焉遊焉之際必有居學則所養者純而藝愈熟故其學易成也朱子曰古人服各有等降若理㑹得雜服則於禮思過半矣夫然故安其學而親其師樂其友而信其道是以雖離師輔而不反也兌命曰敬孫務時敏厥脩乃來其此之謂乎疏曰此則強立不反也集說曰承上文而言藏脩息遊無不在於學是以安親樂信雖離師友亦不畔於道也輔即友也時敏無時而不敏也厥脩乃來言其進脩之益如水之源源而來也今之教者呻其佔畢多其訊註曰呻吟也佔視也簡謂之畢訊猶問也言今之師自不曉經之義但吟誦其所視簡之文多其難問也坡謂訊朱子云如公穀曷為何以之類訊或時有多則支而轉昧矣言及于數註曰其發言出說不首其義動云其所法象而已坡謂言及于數猶朱子云方觀大學一句便說向中庸上彼此迷暗互相連累是也進而不顧其安註曰務其所誦多不惟其未曉使人不由其誠註曰由用也使學者誦之而為之說不用其誠疏曰使學者誦文而已為之說義心皆不曉而孟浪是不用己之忠誠也教人不盡其材註曰材道也謂師有所隠也其施之也悖其求之也佛集說曰呻其佔畢三者與藏脩異不顧其安三者與息遊異是以師之所施者常至於悖逆學者之所求毎見其拂戾也夫然故隠其學而疾其師苦其難而不知其益也坡謂隠痛也痛則不安矣苦其難苦友之責難也不知其為益友則不信其道矣雖終其業其去之必速註曰速疾也學不心解則忘之易教之不刑其此之由乎坡謂刑成也自時教必有正業至此正言入學之後教者學者用功之實而推其得失有如此者大學之法禁於未發之謂豫當其可之謂時不陵節而施之謂孫相觀而善之謂摩此四者教之所由興也集說曰豫者先事之謂時者不先不後之期也陵踰犯也節如節候之節禮有禮節樂有樂節人有長幼之節皆言分限所在不陵節而施謂不教幼者以長者之業也相觀而善如稱甲之善則乙者觀而效之乙有善可稱甲亦如之孫以順言摩以相厲而進為言也方氏曰若七年男女不同席不共食幼子常視無誑則可謂之豫矣若十年學書計十三年舞勺成童舞象可謂之時矣發然後禁則扞格而不勝時過然後學則勤苦而難成雜施而不孫則壤亂而不脩獨學而無友則孤陋而寡聞燕朋逆其師燕辟廢其學此六者教之所由廢也疏曰發謂情欲既生也扞謂拒扞也格謂堅强扞格於教教之不復入也不勝教不能勝其情欲也學時已過則心情放蕩雖追悔欲學精明已散徒勤苦四體終難成也雜施謂教雜亂無次越節則大才輕其小業小才苦其大業並是壤亂之法不可復脩治也燕朋謂燕褻朋友不相遵敬則違逆師之教道也辟喻也義理鈎深或直言難曉湏設喻然後可解而堕學之徒好褻慢笑師之辟喻是廢學之道也坡謂燕朋二句由上無友而生盖既不親益友相觀而善自然有淫朋慝友誘之以笑傲侮師但上四者之失或時有脩補未便遂廢必燕朋二者然後日浸月淫究於汙下坡盖親見有此乃知其精切也君子既知教之所由興又知教之所由廢然後可以為人師也故君子之教喻也道而弗牽強而弗抑開而弗達道而弗牽則和强而弗抑則易開而弗達則思和易以思可謂善喻矣熊氏曰引道使行而弗牽强其必進則學者有自得之趣而和強振其志意而弗阻抑之使退則學者無消沮之患而易㣲開其緒而弗達以竟其㫖則學者知沈潜玩索故思夫能使學者和易以思可謂善教矣學者有四失教者必知之人之學也或失則多或失則寡或失則易或失則止此四者心之莫同也知其心然後能救其失也集說曰或失則多者知之過或失則寡者愚之不及或失則易賢者之過或失則止不肖者之不及多與易原於用心太過寡與止原於用心不及故曰心之莫同也約我以禮所以救其失之多博我以文所以救其失之寡兼人則退之所以救其失之易退則進之所以救其失之止也教也者長善而救其失者也疏曰使學者和易以思是長善使學者無此四者之失是救失惟善教者能為之善歌者使人繼其聲善教者使人繼其志其言也約而達微而臧罕譬而喻可謂繼志矣集說曰約而達辭簡而意明也臧善也微而臧義理微妙而說之精善也罕少也罕譬而喻比方之辭少而感動之意深也繼志謂能使學者之志與師無間也君子知至學之難易而知其美惡然後能博喻能博喻然後能為師能為師然後能為長能為長然後能為君故師也者所以學為君也是故擇師不可不慎也記曰三王四代惟其師其此之謂乎熊氏曰隨材而施能廣博喻人而為師矣由是推所以教人者治人而能為長即推所以治人者治國而能為君師既有君德則弟子就師可學為君之德故前云君子如欲化民成俗其必由學乎即是學能為君也故人君擇師不可不慎也記曰三王四代所以治惟師之得人耳其此擇師之謂乎坡謂知教之興則至學易知教之廢則至學難知其美則長其善知其惡則救其失也自禁於未發至此承上教者學者用功之得失其失者不必言矣即得者教者又當當可而施學者又當及時勉學也凡學之道嚴師為難師嚴然後道尊道尊然後民知敬學是故君之所不臣於其臣者二當其為尸則弗臣也當其為師則弗臣也大學之禮雖詔於天子無北面所以尊師也註曰嚴尊敬也尊師重道焉不使處臣位也武王踐阼召師尚父而問焉曰昔黄帝顓頊之道有乎意亦忽不可得見與師尚父曰在丹書王欲聞之則齊矣王齊三日端冕師尚父亦端冕奉書而入負屏而立王下堂南面而立師尚父曰先王之道不北面王行西折而南東面而立師尚父西面道書之言善學者師逸而功倍又從而庸之不善學者師勤而功半又從而怨之善問者如攻堅木先其易者後其節目及其久也相說以解不善問者反此善待問者如撞鐘叩之以小者則小鳴叩之以大者則大鳴待其從容然後盡其聲不善答問者反此此皆進學之道也註曰庸功也功之受其道有功於己從讀如富父舂戈之舂舂容謂重撞擊也始者一聲而已學者既開其端意進而復問乃極說之如撞鐘之成聲矣疏曰從讀為舂者舂謂擊也以為聲之形容言鐘之為體必待其擊每一舂而為一容然後盡其聲善答者亦待其一問然後一答乃盡說義理也朱子曰說字人以為恱恐只是說字先其易者難處且放下少間見多了自然相證而解解物為解自解釋為解恐是相證而曉解也記問之學不足以為人師必也其聽語乎力不能問然後語之語之而不知雖舎之可也集說曰記問謂記誦古書以待學者之問也以此為學無得於心而所知有限故不足以為人師聽語聽學者所問之語也不能問則告之不知而舎之以其終不可入德也不以三隅反則不復亦此意坡謂自嚴師為難至此則專責學者尊師勸學以為受教之地也良冶之子必學為裘良弓之子必學為箕始駕馬者反之車在馬前君子察於此三者可以有志於學矣疏曰善冶之家其子弟見其父兄陶鎔金鐵使之柔合以補治破器故此子弟能學為袍裘補續獸皮片片相合以至完全也箕栁箕也善為弓之家使幹角橈屈調和成弓故其子弟亦觀其父兄世業學取栁條和軟橈之成箕也馬子始學駕車之時大馬駕在車前将馬子繫隨車後而行故云反之所以然者此駒未曽駕車若忽駕之必驚奔今以大馬牽車於前而擊駒於後使日日見車之行慣習而後駕之不復驚矣言學者亦湏先教小事操縵之屬然後乃示其業則易成也應氏曰皆自易而至於難自粗而至於精習之有漸而不可驟進學之以類而不可泛求是之謂有志矣坡謂此又申言學不可躐等教不可凌節以明上文比年入學至九年大成自易及難從容歳月先王所以成材使之趨善之專學者所以定志得以向善之一盖一篇之大指也古之學者比物醜類鼓無當於五聲五聲弗得不和水無當於五色五色弗得不章學無當於五官五官弗得不治師無當於五服五服弗得不親集說曰比物醜類謂以同類之事相比方也當猶主也鼓聲不宫不商於五聲本無所主然而五聲不得鼓則無諧和之節水無色不在五色之列而繢畫者不得水則不章明五官身口耳目心之所職即洪範之五事也學於吾身五者之官本無所當而五官不得學則不能治師於弟子不當五服之一而弟子若無師之教誨則五服之屬不相和親坡謂上言擇師言尊師矣此復反覆此類者誠以王者建國君民所先者學學之所頼者師盖此篇之要㫖也程子云古有教今無教惟其無教直壊得人質如此不美知此者則知此記之不苟也師無當於五服五服不得不親此性命之言也石梁王氏尚輕為泛論乎君子曰大德不官大道不器大信不約大時不齊察於此四者可以有志於本矣註曰本立而道生言以學為本則其德於民無不化於俗無不成疏曰大德聖人之德也官謂分職在位者大遒聖人之道也器謂物堪用者大信聖人之信也約謂期要也大時天時也齊謂一時同也天生殺不共在一時猶春夏華卉自生薺麥自死秋冬草木自死而薺麥自生故云不齊也陳氏曰凡此四者皆以本源盛大而體無不具故變通不拘而用無不周也君子察於此可以有志於學而洪其本矣三王之祭川也皆先河而後海或源也或委也此之謂務本疏曰源則河也委則海也申明先河而後海坡謂此之謂務本言祭之務本也咏嘆淫泆而務學為本其味深長矣此篇以化民成俗為末而曰其必由學乎是以學為本註疏是也若夫本末終始為學次第自在大學篇中不必於此相混禮記述註卷十五
