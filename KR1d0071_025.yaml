body:
  text: 禮記述注卷二十五安溪李光坡撰問喪第三十五親始死雞斯徒跣扱上衽交手哭惻怛之心痛疾之意傷腎乾肝焦肺水漿不入口三日不舉火故鄰里為之糜粥以飲食之夫悲哀在中故形變於外也痛疾在心故口不甘味身不安美也集說曰雞斯讀為筓纚筓骨筓也纚韜髮之繒也親始死孝子先去冠惟留笄纚也徒空也徒跣無屨而空跣也上衽深衣前襟也以號踊履踐為妨故扱之於帶也交手哭謂兩手交以拊心而哭也五藏者腎在下肺在中肝在上舉三者之焦傷而心脾在其中矣糜厚而粥薄薄者以飲之厚者以食之也三日而斂在牀曰尸在棺曰柩動尸舉柩哭踊無數惻怛無數痛疾之意悲哀志悶氣盛故袒而踊之所以動體安心下氣也集說曰哭踊本有數此言無數者又在常節之外也悶煩也婦人不宜袒故發胸擊心爵踊殷殷田田如壞牆然悲哀痛疾之至也故曰辟踊哭泣哀以送之送形而往迎精而反也集說曰發開也爵踊似爵之跳足不離地也殷殷田田擊之聲也辟拊心也哀以送之謂葬時也迎其精神而反謂反哭及日中而虞也其往送也望望然汲汲然如有追而弗及也其反哭也皇皇然若有求而弗得也故其往送也如慕其反也如疑求而無所得之也入門而弗見也上堂又弗見也入室又弗見也亡矣喪矣不可復見已矣故哭泣辟踊盡哀而止矣集說曰望望瞻望之意也汲汲促急之情也皇皇猶倣徨之意慕者以其親之在前疑者不知神之來否盡哀而止者他無所寓其情也心悵焉愴焉惚焉愾焉心絶志悲而已矣祭之宗廟以鬼享之徼幸復反也成壙而歸不敢入處室居於倚廬哀親之在外也寢苫枕塊哀親之在土也故哭泣無時服勤三年思慕之心孝子之志也人情之實也集說曰此言反哭至終喪之情也惚猶恍惚也愾猶嘆恨也勤謂憂苦也或問曰死三日而后斂者何也曰孝子親死悲哀志悶故匍匐而哭之若將復生然安可得奪而斂之也故曰三日而后斂者以俟其生也三日而不生亦不生矣孝子之心亦益衰矣家室之計衣服之具亦可以成矣親戚之逺者亦可以至矣是故聖人為之斷決以三日為之禮制也集說曰此記者設問以眀三日而斂之義匍匐猶顛蹶或作扶服或問曰冠者不肉袒何也曰冠至尊也不居肉袒之禮也故為之免以代之也然則秃者不免傴者不袒跛者不踊非不悲也身有錮疾不可以備禮也故曰喪禮惟哀為主矣女子哭泣悲哀擊胸傷心男子哭泣悲哀稽顙觸地無容哀之至也疏曰謂心既悲哀肉袒形褻故不可褻尊而冠若有吉事而內心肅敬則雖袒而著冠也故郊特牲云君袒而割牲是也集說曰免而袒袒而踊先後之次也有一疾則廢一禮女子不踊則惟擊胸男子不踊則惟稽顙觸地皆可以為哀之至也或問曰免者以何為也曰不冠者之所服也禮曰童子不緦惟當室緦緦者其免也當室則免而杖矣坡謂免者以何為也怪成人袒時須著免今非成人袒亦有著免故問之不冠者之所服謂未冠童子故著免也童子不緦不為族人著緦也惟當室緦謂童子無父兄當室主家乃為族人著緦也緦者其免言為族人緦者由為父母著免也當室則免而杖又眀童子得免所由以其孤兒當室則得免而杖乃為族人服緦也諸解語而未詳故本注疏句釋之或問曰杖者何也曰竹桐一也故為父苴杖苴杖竹也為母削杖削杖桐也或問曰杖者以何為也曰孝子喪親哭泣無數服勤三年身病體羸以杖扶病也則父在不敢杖矣尊者在故也堂上不杖辟尊者之處也堂上不趨示不遽也此孝子之志也人情之實也禮義之經也非從天降也非從地出也人情而已矣注曰父在不杖謂為母喪也尊者在不杖辟尊者之處不杖有事不趨皆為其感動使之憂戚也集說曰苴杖圎而象天削杖方以象地又以桐為同之義言哀戚同於喪父也服問第三十六傳曰有從輕而重公子之妻為其皇姑疏曰公子諸侯之妾子也皇姑即公子之母也諸侯在尊厭妾子使為母練冠諸侯沒妾子得為毋大功而妾子之妻則不論諸侯存沒為夫之母期也其夫練冠是輕也而妻為之期是重故云有從輕而重也此妾既賤若惟云姑則有嫡女君之嫌今加皇字眀非女君而此婦尊之與女君同故云皇姑也有從重而輕為妻之父母注曰妻齊衰而夫從緦麻不降一等言非服差有從無服而有服公子之妻為公子之外兄弟疏曰公子被厭不服已母之外家是無服也妻猶從公子而服公子外祖父母從母緦麻是從無服而有服也經惟云公子外兄弟而知其非公子姑之子者以喪服小記云夫之所為兄弟服妻皆降一等夫為姑之子緦麻妻則無服今公子之妻為之有服故知其為公子外祖父母從母也此等皆小功之服凡小功者謂為兄弟若同宗直稱兄弟以外族故稱外兄弟也有從有服而無服公子為其妻之父母注曰凡公子厭於君降其私親女君之子不降疏曰雖為公子之妻猶為父母期是有服也公子被厭不從妻而服之是從有服而無服也傳曰母出則為繼母之黨服母死則為其母之黨服為其母之黨服則不為繼母之黨服注曰雖外親亦無二統坡謂母出而父繼娶則出母與廟絶故為繼母之黨服若母死而父繼娶則親母為重故服其黨而不復服繼母之黨也解誤三年之喪既練矣有期之喪既葬矣則帶其故葛帶絰期之絰服其功衰疏曰謂三年之喪練祭之後又當期喪既葬之節也故葛帶謂三年喪之練葛帶也今期喪既葬男子則應著葛帶此葛帶與三年之葛帶粗細正同而以父葛為重故帶其故葛帶也絰期之絰者謂三年之喪練後首絰既除故絰期之葛絰若婦人練後麻帶除矣則絰其故葛絰帶期之麻帶以婦人不葛帶故也功即粗也功衰者父之練之功衰也父之既練母之既葬衰皆七升其齊衰仍有八升九升八升者是正服齊衰九升者是義服齊衰若母喪既練雖衰八升與正服既葬齊衰同以母服為重亦服母之齊衰也有大功之喪亦如之小功無變也疏曰三年喪練後有大功喪亦既葬亦帶其故葛帶而絰期之葛絰也故云亦如之大功既葬葛帶三寸有餘比練之葛帶四寸有餘為小故反服練帶也大功既葬之首絰四寸有餘與練之葛帶粗細相似不得為五分去一為帶之差故首絰進與期既葬之絰五寸有餘同也但謂粗細與期同其實是大功葛絰也小功無變者言先有大功以上喪服今遭小功之喪無變於前服不以輕服減纍於重也麻之有本者變三年之葛疏曰大功以上為帶者麻之根本並留之合糾為帶如此者得變三年之練葛小功以下其絰澡麻斷本不得變三年之葛也言變三年之葛舉其重者其實期之葛有本者亦得變之既練遇麻斷本者於免絰之既免去絰每可以絰必絰既絰則去之疏曰斬衰既練之後遭小功之喪雖不變服得為之加絰也於免絰之者以練無首絰於此小功喪有事於免之時則為加小功之絰也斂殯事竟既免之後則脫去其絰當斂殯之節每可以絰之時必為之加麻既絰則去之不應絰之時則去其絰自若練服也小功不易喪之練冠如免則絰其緦小功之絰因其初葛帶緦之麻不變小功之葛小功之麻不變大功之葛以有本為稅疏曰言小功以下之喪不合變易三年喪之練冠其期之練冠亦不得易也如當緦小功著免之節則首絰其緦與小功之絰所以為後喪緦絰者以前喪練冠首絰已除故也要中所著仍因其初喪練之葛帶不云故而云初者以期初喪之時變練之葛帶為麻期既葬之後反服練之故葛帶故言故也小功以下之喪不變練之葛帶故云初也輕喪之麻本服既輕雖初喪之麻不變前重喪之葛也稅謂變易也緦與小功麻絰既無本不合稅變前喪惟大功以上麻絰有本者得稅變前喪也殤長中變三年之葛終殤之月算而反三年之葛是非重麻為其無卒哭之稅下殤則否疏曰上論成人小功緦不得易前喪之葛此論殤在小功緦得易三年葛也殤長中者謂本服大功今乃降在長中殤男子則為之小功婦人為長殤小功中殤則緦麻如此者得變三年之葛著為殤服之麻終竟此殤月數如小功則五月緦則三月還反服其三年之葛也既服麻不改又變三年之葛不是重此麻也以殤服質略自初死服麻以後無卒哭時稅麻服葛之禮也下殤則否者以大功以下之殤男子婦人俱為之緦麻其情輕不得變三年之葛也案上文麻有本者得變三年之葛則齊衰下殤雖是小功亦是麻之有本者故喪服小記云下殤小功帶澡麻不絶本然齊衰下殤乃變三年之葛今大功長殤麻既無本得變三年之葛者以無虞卒哭之稅故特得變之若成人小功緦麻麻既無本故不得變也君為天子三年夫人如外宗之為君也世子不為天子服注曰世子不為天子服逺嫌也不服與畿外之民同也集說曰諸侯為天子服斬衰三年外宗見前篇諸侯外宗之婦為君期夫人為天子亦期故云夫人如外宗之為君也君所主夫人妻大子適婦集說曰夫人者君之適妻故云夫人妻大子適子也其妻為適婦三者皆正故君主其喪大夫之適子為君夫人大子如士服注曰士為國君斬小君期大子君服斬臣從服期疏曰大夫無繼世之道其子無嫌故得為君與夫人及君之大子著服如士服也君之母非夫人則羣臣無服惟近臣及僕驂乘從服惟君所服服也疏曰君母是適夫人則羣臣服期非夫人則君服緦故羣臣無服也近臣閽寺之屬僕御車者驂乘車右也唯君所服服者君緦則此等人亦緦也公為卿大夫錫衰以居出亦如之當事則辨絰大夫相為亦然為其妻往則服之出則否疏曰君為卿大夫之喪成服之後著錫衰以居也出謂以他事而出非至喪所亦著錫衰首則皮辨也當事若大斂及殯并將葬啓殯等事則首著辨絰身衣錫衰若於士則首服皮辨也大夫相為亦然者亦如君於卿大夫也若君於卿大夫之妻及卿大夫相為其妻而往臨其喪亦服錫衰但不常著之以居或以他事出則不服也其當殯斂之事亦辨絰也凡見人無免絰雖朝於君無免絰唯公門有稅齊衰傳曰君子不奪人之喪亦不可奪喪也集說曰見人往見於人也絰重故不可釋免入公門雖稅齊衰亦不脫絰也此謂不杖齊衰若杖齊衰及斬衰雖入公門亦不稅其大功非但廢衰又免絰也傳曰罪多而刑五喪多而服五上附下附列也集說曰罪重者附於上刑罪輕者附於下刑此五刑之上附下附也大功以上附於親小功以下附於疏此五服之上附下附也等列相似故云列也間傳第三十七注曰名間傳者以其記喪服之間輕重所宜斬衰何以服苴苴惡貌所以首其內而見諸外也斬衰貌若苴齊衰貌若枲大功貌若止小功緦麻容貌可也此哀之發於容體者也集說曰斬衰服苴苴絰與苴杖也麻之有子者以為苴絰竹杖亦曰苴杖惡貌者疏云苴是黎黑色又小記疏云至痛內結必形色外章所以衰裳絰杖俱備苴色也首者標表之義蓋顯示其內心之哀痛於外也枲牡麻也枯黯之色似之大功之喪雖不如齊斬之痛然容貌亦若有所拘止而不得肆者蓋亦變其常度也斬衰之哭若往而不反齊衰之哭若往而反大功之哭三曲而偯小功緦麻哀容可也此哀之發於聲音者也集說曰若如也往而不反一舉而至氣絶似不回聲也三曲一舉聲而三折也偯餘聲之委曲也小功緦麻情輕雖哀聲之從容亦可也斬衰唯而不對齊衰對而不言大功言而不議小功緦麻議而不及樂此哀之發於言語者也疏曰雜記云三年之喪對而不問為在喪稍久故對也又云齊衰之喪言而不語彼謂言已事集說曰唯應辭也不對不答人以言也不言不先發言於人也不議不泛論他也斬衰三日不食齊衰二日不食大功三不食小功緦麻再不食士與斂焉則一不食故父母之喪既殯食粥朝一溢米莫一溢米齊衰之喪疏食水飲不食菜果大功之喪不食醯醬小功緦麻不飲醴酒此哀之發於飲食者也疏曰此謂正服齊衰喪大記云三不食者當是義服此小功緦再不食喪大記一不食謂緦麻再不食謂小功熊氏云異人之說故其義别父母之喪既虞卒哭疏食水飲不食菜果期而小祥食菜果又期而大祥有醯醬中月而禫禫而飲醴酒始飲酒者先飲醴酒始食肉者先食乾肉疏曰大祥食醯醬則小祥食菜果時但用鹽酪也若不能食者小祥得用醯醬故喪大記云小祥食菜果以醯醬禫始食肉喪大記云祥而食肉亦異人之說醴酒味薄乾肉又澀孝子不忍發初御醇厚之味故飲醴酒食乾肉集說曰中月間一月也前篇中一以上亦訓為間二十五月大祥二十七月而禫也父母之喪居倚廬寢苫枕塊不說絰帶齊衰之喪居堊室苄翦不納大功之喪寢有席小功緦麻牀可也此哀之發於居處者也疏曰亦有斬衰不居廬者則雜記云士居堊室是士服斬而居堊室也亦有齊衰不居堊室者喪服小記云父不為衆子次於外注云自若居寢是也集說曰倚廬堊室見喪大記苄蒲之可為席者但翦之使齊不偏納其頭而藏於內也父母之喪既虞卒哭拄楣翦屛苄翦不納期而小祥居堊室寢有席又期而大祥居復寢中月而禫禫而牀集說曰拄楣謂舉倚廬之木拄之於楣使稍寬眀也翦屛者翦去户旁兩廂屛之餘草也自上章唯而不對以下至此有與雜記喪大記喪服小記之文不同者記者所聞之異亦或各有義歟斬衰三升齊衰四升五升六升大功七升八升九升小功十升十一升十二升緦麻十五升去其半有事其縷無事其布曰緦此哀之發於衣服者也集說曰每一升凡八十縷斬衰正服三升義服三升半齊衰降服四升正服五升義服六升大功降服七升正服八升義服九升小功降服十升正服十一升義服十二升緦麻降正義同用十五升布去其七升半之縷蓋十五升者朝服之布其幅之經一千二百縷也今緦布用其半六百縷為經是去其半也有事其縷者事謂煮治其紗縷而後織也無事其布者及織成則不洗治其布而即以製緦服也若用為錫衰則加灰以洗治之故前經云加灰錫也然則緦服是熟縷生布其小功以上皆生縷以織矣斬衰三升既虞卒哭受以成布六升冠七升為母疏衰四升受以成布七升冠八升去麻服葛葛帶三重期而小祥練冠縓緣要絰不除疏曰至小祥又以卒哭後冠受其衰而用練易其冠又以練為中衣以縓為領緣也要絰葛絰也縓緣見檀弓集說曰五服惟斬衰齊衰大功有受者葬後以冠之布升數為衰服如斬衰冠六升則葬後以六升布為衰齊衰冠七升則葬後以七升布為衰也謂之成布者三升以下之布粗疏之甚若未成然六升以下則漸精細與吉服之布相近故稱成也去麻服葛者葬後男子去要之麻帶而繫葛帶婦人去首之麻絰以著葛絰也葛帶三重謂男子也葬後以葛帶易要之麻帶五分去一差小於前四股糾之積而相重則三重也未受服之前麻帶為兩股相合此直云葛帶三重則首絰雖葛不三重猶兩股糾之男子除乎首婦人除乎帶男子何為除乎首也婦人何為除乎帶也男子重首婦人重帶除服者先重者易服者易輕者集說曰小祥男子除首絰婦人除要帶此除先重也居重喪而遭輕喪男子則易要絰婦人則易首絰此易輕者也又期而大祥素縞麻衣中月而禫禫而纎無所不佩注曰謂之麻者純用布無采飾也疏曰二十五月大祥祭此日除脫則首服素冠以縞紕之身著朝服而祭祭畢而哀情未除更反服微凶之服首著縞冠以素紕之身著十五升麻深衣未有采緣故云素縞麻衣必大祥之後更間一月而為禫祭禫祭之時𤣥冠朝服祭訖則首著纎冠身著素端黃裳以至吉祭平常所服之物無不佩也黑經白緯曰纎易服者何為易輕者也斬衰之喪既虞卒哭遭齊衰之喪輕者包重者特注曰卑可以兩施而尊者不可二疏曰斬衰受服之時而遭齊衰初喪男子所輕要者得著齊衰要帶而兼包斬衰之帶婦人輕首得著齊衰首絰而包斬衰之絰故云輕者包也男子重首特留斬衰之絰婦人重要特留斬衰之帶是重者特也愚謂特者單獨而無所兼之義非謂特留也既練遭大功之喪麻葛重疏曰斬衰既練男子惟有要帶婦人惟有首絰是單也今遭大功之喪男子首空著大功麻絰又以大功麻帶易練之葛帶婦人要空著大功麻帶又以大功麻絰易練之葛絰是重麻也至大功既虞卒哭男子帶以練之故葛帶首著期之葛絰婦人絰其練之故葛絰著期之葛帶是重葛也言期之葛絰期之葛帶者謂大功絰帶粗細與期同其實是大功葛絰葛帶也又曰檀弓云婦人不葛帶者謂斬衰齊衰服也其大功以下婦人亦葛帶喪服大功章男女並陳有即葛九月之文是大功婦人亦受葛也齊衰之喪既虞卒哭遭大功之喪麻葛兼服之疏曰以大功麻帶易齊衰之葛帶以首猶服齊衰葛帶絰是首有葛要有絰故云麻葛兼服之兼服之文據男子也婦人則首服大功之麻絰要服齊衰之麻帶上下俱麻不得云麻葛兼服斬衰之葛與齊衰之麻同齊衰之葛與大功之麻同大功之葛與小功之麻同小功之葛與緦之麻同麻同則兼服之兼服之服重者則易輕者也注曰惟大功有變三年既練之服小功以下則於上皆無易焉此言大功之葛與小功之麻同小功之葛與緦之麻同主為大功之殤長中言之服重者謂特之也則者則男子與婦人也凡下服虞卒哭男子反其故葛帶婦人反其故葛絰其上服除則固自受以下服之受矣疏曰前文兼服之但施於男子不包婦人今此易輕者男子易於要婦人易於首俱得易輕也云凡下服至故葛絰者此眀遭後服初喪男子婦人雖易前服之輕至後服既葬之後還須反服其前喪集說曰同者前喪既葛與後喪初死之麻粗細無異也兼服者服後麻兼服前葛也服重者即上章重者特之說也易輕者即易者包是也三年問第三十八三年之喪何也曰稱情而立文因以飾羣别親疏貴賤之節而弗可損益也故曰無易之道也創巨者其日久痛甚者其愈遲三年者稱情而立文所以為至痛極也斬衰苴杖居倚廬食粥寢苫枕塊所以為至痛飾也三年之喪二十五月而畢哀痛未盡思慕未忘然而服以是斷之者豈不送死有已復生有節也哉注曰羣謂親之黨也復生除喪反生者之事也疏曰飾謂章表也羣謂五服之親也因此三年之喪差降各表其親黨親謂大功以上疏謂小功以下貴謂天子諸侯絶期卿大夫降賤謂士庶人服族其節分眀集說曰弗可損益者中制不可不及亦不可遇是所謂無易之道也治親疏貴賤之節者惟喪服足以盡其詳服莫重於斬衰時莫久於三年故此篇列言五服之輕重而自重者始石梁王氏曰二十四月再期其月餘日不數為二十五月中月而禫注謂間一月則所間之月是空一月為二十六月出月禫祭為二十七月徙月則樂矣凡生天地之間者有血氣之屬必有知有知之屬莫不知愛其類今是大鳥獸則失喪其羣匹越月踰時焉則必反巡過其故鄉翔回焉鳴號焉蹢躅焉踟蹰焉然後乃能去之小者至於燕雀猶有啁噍之類焉然後乃能去之故有血氣之屬者莫知於人故人於其親也至死不窮集說曰鳥獸知愛其類而不如人之能充其類此所以天地之性人為貴也將由夫患邪淫之人與則彼朝死而夕忘之然而從之則是曽鳥獸之不若也夫焉能相與羣居而不亂乎集說曰患猶害也邪淫之害性如疾痛之害身故云患邪淫也不如鳥獸為無禮也無禮則亂矣將由夫修飾之君子與則三年之喪二十五月而畢若駟之過隙然而遂之則是無窮也故先王焉為之立中制節一使足以成文理則釋之矣集說曰遂之謂不時除也先王制禮蓋欲使遇之者俯而就之則送死有已復生有節不至者跂而及之則不至於鳥獸之不若矣一使足以成文理謂無分君子小人皆使之遵行禮節以成其文章義理文理者以三年一閏天道小成又子生三年然後免於父母之懷故服以三年成文理也釋除去其服然則何以至期也曰至親以期斷是何也曰天地則已易矣四時則已變矣其在天地之中者莫不更始焉以是象之也疏曰父母本三年何以至期是問其一期應除之義故答云至親以期斷是眀一期可除之節故期而練男子除絰婦人除帶下文云加隆故至三年然則何以三年也曰加隆焉爾也焉使倍之故再期也集說曰又問既是以期斷矣何以三年也答謂孝子加隆厚於親故如此也焉語辭猶云所以也由九月以下何也曰焉使弗及也故三年以為隆緦小功以為殺期九月以為間上取象於天下取法於地中取則於人人之所以羣居和一之理盡矣故三年之喪人道之至文者也夫是之謂至隆是百王之所同古今之所一也未有知其所由來者也孔子曰子生三年然後免於父母之懷夫三年之喪天下之達喪也集說曰弗及恩之殺也三月不及五月五月不及九月九月不及期也期與大功在隆殺之間故云期九月以為間也取象於天地者三年象閏期象一嵗九月象物之三時而成五月象五行三月象一時也取則於人者始生三月而翦髮三年而免父母之懷也和以情言謂情無不睦也一以禮言謂禮無不至也人之所以相與羣居而情和禮一者其理於喪服盡之矣未有知其所由來者言三年之喪行之自逺不知從何代而來也父母之喪無貴賤故曰天下之達喪也達論語作通禮記述注卷二十五
