body:
  text: 禮記述註卷二十安溪李光坡撰祭法第二十三祭法有虞氏禘黄帝而郊嚳祖顓頊而宗堯夏后氏亦禘黄帝而郊鯀祖顓頊而宗禹殷人禘嚳而郊冥祖契而宗湯周人禘嚳而郊稷祖文王而宗武王註曰有虞氏以上尚德禘郊祖宗配用有德者而已自夏已下稍用其姓代之先後之次有虞氏夏后氏宜郊顓頊殷人宜郊契疏曰案聖證論以此禘黄帝是宗廟五年祭之名故小記云王者禘其祖之所自出以其祖配之謂虞氏之祖出自黄帝以祖顓頊配黄帝而祭故云以其祖配之肅又以祖宗爲祖有功宗有德其廟不毁又以郊與圜丘是一郊即圜丘肅又云虞夏出黄帝殷周出帝嚳祭法四代禘此二帝上下相證之明文也詩云天命元鳥履帝武敏歆自是正義非讖緯之説鄭云先後之次云者以有虞氏先云郊嚳後云祖顓頊夏后氏先云郊鯀後云祖顓頊殷人先云郊冥後云祖契是在前者居後在後者居前故鄭正之集說曰國語曰有虞氏禘黄帝而祖顓頊郊堯而宗舜夏后氏禘黄帝而祖顓頊郊鯀而宗禹商人禘嚳而祖契郊冥而宗湯周人禘嚳而郊稷祖文王而宗武王坡謂禘郊祖宗王説正矣然鄭必以禘爲圓㐀者疏云以禘文在於郊祭之前郊前之祭惟圓㐀耳可見前人學古於一字一句之先後必求其義此考遺經於殘缺僅存之後之要法也然則此禘之解雖宜是正亦所謂觀過知仁者可以爲師矣燔柴於泰壇祭天也瘞埋於泰折祭地也用騂犢集說曰燔燎也積柴於壇上加牲玉於柴上乃燎之使氣達於天此祭天之禮也泰壇即圜丘泰者尊之之辭瘞埋牲幣祭地之禮也泰折即方丘折如磬折折旋之義喻方也周禮陽祀用騂牲陰祀用黝牲以其與天俱用犢連言之其實地陰祀宜用黑犢也埋少牢於泰昭祭時也相近於坎壇祭寒暑也王宮祭日也夜明祭月也幽宗祭星也雩宗祭水旱也四坎壇祭四方也山林川谷邱陵能出雲爲風雨見怪物皆曰神有天下者祭百神諸侯在其地則祭之亡其地則不祭註曰昭明也亦謂壇也時四時也亦謂陰陽之神也埋之者陰陽出入於地中也凡此以下皆祭用少牢寒於坎暑於壇王宮日壇王君也日稱君宮壇營域也夜明亦謂月壇也幽宗亦謂星壇也星以昏始見雩宗亦謂水旱壇也雩之言吁嗟也四方即謂山林川谷邱陵之神也祭山林邱陵於壇川谷於坎毎方各爲坎爲壇怪物雲氣非常見者也疏曰自泰昭以下及日月至山林並少牢先儒皆云不薦熟惟殺牲埋之也集說曰陸云相近王肅作祖迎寒暑一徃一來徃者祖送之來者迎迓之周禮仲春晝迎暑仲秋夜迎寒則送之亦必有其禮也大凡生於天地之間者皆曰命其萬物死皆曰折人死曰鬼此五代之所不變也七代之所更立者禘郊祖宗其餘不變也集說曰五代唐虞三代也加顓頊帝嚳爲七代方氏曰人物之生數有長短分有大小莫不受制於天地故大凡生者曰命及其死也物謂之折言其有所毁也人謂之鬼言其有所歸也不變者不改所命之名也更立者更立所祭之人也名既當於實故無事乎變人既異於世故必更而立焉名之不變止自堯而下者蓋法成於堯而已由堯以前其法未成其名容有變更也更立不及於黄帝者七代同出於黄帝而已黄帝無統於上七代更立於下故也其餘不變者謂禘郊祖宗之外不變也若天地日月之類其庸可變乎天下有王分地建國置都立邑設廟祧壇墠而祭之乃爲親疎多少之數註曰建國封諸侯也置都立邑爲卿大夫之采地及賜士有功者之地廟之言貌也宗廟者先祖之尊貌也祧之言超也超上去意也封土曰壇除地曰墠方氏曰分地建國置都立邑所以尊賢也設廟祧壇墠而祭之所以親親也親親不可以無殺故爲親疎之數焉尊賢不可以無等故爲多少之數焉有昭有穆有祖有考親疎之數也以七以五以三以二多少之數也是故王立七廟一壇一墠曰考廟曰王考廟曰皇考廟曰顯考廟曰祖考廟皆月祭之遠廟爲祧有二祧享嘗乃止去祧爲壇去壇爲墠壇墠有禱焉祭之無禱乃止去墠曰鬼集說曰七廟三昭三穆與大祖爲七也一壇一墠者七廟之外又立壇墠各一起土爲壇除地曰墠也考廟父廟也王考祖也皇考曾祖也顯考高祖也祖考始祖也始祖百世不祧而髙曾祖禰以親故此五廟則並同日月祭之也逺廟爲祧言三昭三穆之當遞遷者其主藏於二祧也古者祧主藏於太祖廟之東西夾室至周則昭之遷主皆藏文王之廟穆之遷主皆藏武王之廟也此不在月祭之例但得四時祭之耳故云享嘗乃止去祧爲壇者言世數逺不得於祧處受祭故云去祧也祭之則爲壇其又逺者亦不得於壇受祭故云去壇也祭之則爲墠祈禱禮畢則反其主於祧然此壇墠者必須有祈禱之事則行此祭無祈禱則止終不祭之也去墠則又逺矣雖有祈禱亦不及之故名之曰鬼鬼亦在祧顧逺之於無事祫乃祭之爾坡謂月祭不見於他經註疏解亦泛然疑即告朔之祭周禮司尊彜所謂間祀之朝享也諸侯立五廟一壇一墠曰考廟曰王考廟曰皇考廟皆月祭之顯考廟祖考廟享嘗乃止去祖爲壇去壇爲墠壇墠有禱焉祭之無禱乃止去墠爲鬼集說曰諸侯太祖之廟始封之君也月祭三廟下於天子也顯考祖考四時之祭而已去祖爲壇者髙祖之父雖遷主寄太祖之廟而不得於此受祭若有祈禱則去太祖之廟而受祭於壇也去壇而受祭於墠則髙祖之祖也大夫立三廟二壇曰考廟曰王考廟曰皇考廟享嘗乃止顯考祖考無廟有禱焉爲壇祭之去壇爲鬼註曰惟天子諸侯有主禘祫大夫有祖考者亦鬼其百世不禘祫無主爾大夫祖考謂别子也疏曰謂周制别子爲卿大夫後世子孫立其廟不毁謂之祖考非别子爲大夫但立父祖及曾祖三廟無祖考廟者則經中三廟是也若有祖考廟則應遷之祖以制幣招其神而藏焉故云亦鬼其百世集說曰大夫三廟有廟而無主其當遷者亦無可遷之廟故有禱則祭於壇而已然墠輕於壇今二壇而無墠者以太祖雖無廟猶重之也去壇爲鬼謂髙祖若在遷去之數則亦不得受祭於壇祈禱亦不得及也適士二廟一壇曰考廟曰王考廟享嘗乃止顯考無廟有禱焉爲壇祭之去壇爲鬼註曰適士上士也此適士云顯考無廟非也當爲皇考字之誤疏曰天子三等諸侯上士悉二廟一壇也官師一廟曰考廟王考無廟而祭之去王考爲鬼集說曰官師者諸侯之中士下士爲一官之長者得立一廟祖禰共之曾祖以上若有所禱則就廟薦之而已以其無壇也庶士庶人無廟死曰鬼集說曰庶士府史之屬死曰鬼者謂雖無廟亦得薦之於寢也王制云庶人祭於寢程子曰祭先之禮不可得而推者無可奈何其可知者無逺近多少猶當盡祭之祖又豈可不報又豈可厭多蓋根本在此雖逺豈得無報坡謂人情以傳世久逺爲期若傳至久逺即爲子孫所祧所毁則何貴久爲苟以情有所殺亦不過於世之逺近而祭有疏數牲牢有豐約斟酌盡意可耳故程子定之曰毎月朔必薦新四時祭用仲月時祭之外更有三祭冬至祭始祖立春祭先祖季秋祭禰他則不祭冬至陽之始也立春生物之始也季秋成物之始也祭始祖無主用祝以妣配於廟中正位事之祭先祖亦無主先祖者自始祖而下髙祖而上非一人也故設二位常祭止於髙祖而下至哉發周孔所未發與禘禮報本追逺之意同功然以此禮合之前論無異㫖則程子思之審矣朱子疑前論爲未經討論恐記之誤也瘞埋無理昌黎韓公曰自魏晉以降始有毁瘞之議事非經據竟不可施行皆至言也後聖有作廟制牲牢等其貴賤之差至有祖必祭如程子之論雖或廟或寢而貴賤如一庶乎其可也自祀其祖而以爲僭坡所未詳王爲羣姓立社曰大社王自爲立社曰王社諸侯爲百姓立社曰國社諸侯自爲立社曰侯社大夫以下成羣立社曰置社疏曰大社在庫門之内右王社所在書傳無文崔氏云王社在籍田王所自祭以供粢盛國社亦在公宫之右侯社在籍田置社者大夫以下謂下至庶人也大夫不得特立社與民族居百家以上則共立一社今時里社是也爲衆特置故曰置社坡謂大社即京都之社稷王社即方丘也詳在周禮大宗伯王爲羣姓立七祀曰司命曰中霤曰國門曰國行曰泰厲曰戸曰竈王自爲立七祀諸侯爲國立五祀曰司命曰中霤曰國門曰國行曰公厲諸侯自爲立五祀大夫立三祀曰族厲曰門曰行適士立二祀曰門曰行庶士立一祀或立户或立竈註曰中霤主堂室居處門戸主出入行主道路行作厲主殺罰竈主飲食之事五祀月令所祀皆著其時司命與厲其時不著今時民家或春秋祠司命行神山神門戸竈在旁是必春祠司命秋祠厲也或者合而祠之山即厲也民惡言厲巫祝以厲山爲之謬乎春秋傳曰鬼有所歸乃不爲厲疏曰七祀前是爲民所立與衆共之其自爲立者王自禱祭不知其當同是一神爲是别更立七祀也泰厲古帝王無後者此鬼無所依歸好爲民作禍故祀之公厲古諸侯無後者族厲古大夫無後者族衆也大夫衆多坡謂司命文昌宮星疏云史遷云鬼官之長似神主督察司禍福之命者註言漢時尚與門行等並祀至今時人家又以竈爲司命雖傳信傳訛而皆有司命與五祀並祭自古至今未改也俟更考王下祭殤五適子適孫適曾孫適元孫適來孫諸侯下祭三大夫下祭二適士及庶人祭子而止方氏曰元孫之子爲來者以其世數雖逺方來而未巳也以尊祭卑故曰下祭石梁王氏曰庶殤全不祭恐非夫聖王之制祭祀也法施於民則祀之以死勤事則祀之以勞定國則祀之能禦大菑則祀之能捍大患則祀之疏曰法施於民若神農及后土帝嚳堯及黄帝顓頊與契是也以死勤事若舜及鯀冥是也以勞定國若禹是也禦菑捍患若湯及文武也是故厲山氏之有天下也其子曰農能殖百穀夏之衰也周棄繼之故祀以爲稷集說曰厲山氏一云烈山氏炎帝神農也其後世子孫有名柱者能殖百榖作農官因名農見國語棄后稷名也夏末廢農祀棄故祀以爲稷者謂農及棄皆祀之以配稷之神共工氏之霸九州也其子曰后土能平九州故祀以爲社集說曰左傳言共工氏以水紀官在炎帝之前太昊之後共工後世之子孫爲后土之官后君也爲君而掌土能治九州五土之神故祀以配社帝嚳能序星辰以著衆集說曰序星辰知推步之法也著衆謂使民占星象而知休作之候也堯能賞均刑法以義終集說曰能賞當其功也均刑法當其罪也以義終禪位得人也舜勤衆事而野死集說曰巡狩而崩也鯀鄣鴻水而殛死疏曰鯀塞水而無功被堯殛死亦是有微功於人故得祀之若無微功焉能治水九載又世本云作城郭是有功也禹能修鯀之功坡謂修者或成其事或治其壞皆修也曰鯀之功則鯀分明有功矣黄帝正名百物以明民共財顓頊能修之集說曰正名百物者立定百物之名也明民使民不惑也共財供給公上之賦斂也契爲司徒而民成集說曰司徒教官之長民成化民成俗也冥勤其官而水死註曰冥契六世之孫其官元冥水官也湯以寛治民而除其虐集說曰書曰克寛克仁又言代虐以寛文王以文治武王以武功去民之菑此皆有功烈於民者也及夫日月星辰民所瞻仰也山林川谷邱陵民所取財用也非此族也不在祀典疏曰日月星辰民所瞻仰者釋上文燔柴於泰壇至祭水旱之等不言天地者舉日月則天地可知四時寒暑水旱則日月陰陽之氣故舉日月以包之也非此族也不在祀典合結上事也族類也若非自厲山以下及日月星辰之等無益於民者悉不得預於祀典祭義第二十四祭不欲數數則煩煩則不敬祭不欲疏疏則怠怠則忘是故君子合諸天道春禘秋嘗霜露旣降君子履之必有悽愴之心非其寒之謂也春雨露旣濡君子履之必有怵惕之心如將見之樂以迎來哀以送往故禘有樂而嘗無樂註曰合於天道因四時之變化孝子感時念親則以此祭之也春禘者夏殷禮也周以禘爲殷祭更名春祭曰祠非其寒之謂謂悽愴及怵惕皆爲感時念親也霜露既降禮説在秋此無秋字蓋脱爾迎來而樂樂親之將來也送去而哀哀其享否不可知也小言之則為一祭之間孝子不知鬼神之期推而廣之放其去來於陰陽䟽曰王制春曰礿此云春禘為夏殷禮者以郊特牲註禘當爲礿則此春禘亦當爲礿周禮四時之祭皆有樂殷則烝嘗之祭亦有樂故那詩云庸鼓有斁萬舞有奕下云顧予烝嘗則殷秋冬亦有樂者方氏曰霜露言非其寒則雨露爲非其溫之謂矣雨露言如將見之則霜露爲如將失之矣致齊於内散齊於外齊之日思其居處思其笑語思其志意思其所樂思其所嗜齊三日乃見其所爲齊者註曰致齊思此五者也散齊七日不御不樂不弔耳見所爲齊者思之熟也疏曰先思其粗漸思其精故居處在前樂嗜居後熊氏曰致者以百物皆備而心極靜專也此時則就齊所居於正寢之内散者以百物粗具而心尚有雜也此時不就齊所散處中門外祭之日入室僾然必有見乎其位周還出戸肅然必有聞乎其容聲出戸而聽愾然必有聞乎其歎息之聲集說曰入室入廟室也謂初入室陰厭時僾然彷彿之貌見乎其位如見親之在神位也周旋出户謂薦俎酌獻之時行步周旋之間或自戸内而出也肅然儆惕之貌容聲舉動容止之聲也出戸而聽謂無尸者薦畢閤戸則有出戸而聽之頃也愾然太息之聲也是故先王之孝也色不忘乎目聲不絶乎耳心志嗜欲不忘乎心致愛則存致慤則著著存不忘乎心夫安得不敬乎君子生則敬養死則敬享思終身弗辱也坡謂此節兼生死而言之色不忘三者養如是享亦如是極其愛則三者存於心故生則養志享則齊思極其誠則三者著於外故生則忠養享則如見内外始終如一雖不敬得乎甚言其敬也君子以下三句則言當法先王也思終身勿辱猶曾子吾知免夫之意君子有終身之喪忌日之謂也忌日不用非不祥也言夫日志有所至而不敢盡其私也集說曰忌日親之死日也不用不以此日爲他事也非不祥言非以死爲不祥而避之也夫日猶此日也志有所至者此心極於念親也不敢盡其私言不敢盡心於已之私事也坡謂此承敬享而言專舉忌日者著其最傷心也惟聖人爲能饗帝孝子爲能饗親饗者鄉也鄉之然後能饗焉是故孝子臨尸而不怍君牽牲夫人奠盎君獻尸夫人薦豆卿大夫相君命婦相夫人齊齊乎其敬也愉愉乎其忠也勿勿諸其欲其饗之也註曰饗帝饗親謂祭之能使之饗也色不和曰怍勿勿猶勉勉也慤愛之貌疏曰此一節明孝子祭祀欲親歆饗之意饗者鄉也言神之所以饗者由孝子之所歸鄉也君牽牲夫人奠盎者正祭牽牲時夫人設奠盎之尊至君親制祭夫人酌盎齊以獻尸也君獻尸夫人薦豆者繹祭先獻後薦有司徹云儐尸主人獻尸主婦自東房薦韭菹醢是齊齊整齊之貌愉愉和悦之貌忠謂忠心熊氏曰自君牽牲至勿勿諸句皆臨尸不怍之事文王之祭也事死者如事生思死者如不欲生忌日必哀稱諱如見親祀之忠也如見親之所愛如欲色然其文王與詩云明發不寐有懷二人文王之詩也祭之明日明發不寐饗而致之又從而思之祭之日樂與哀半饗之必樂已至必哀集說曰如不欲生似欲隨之死也宗廟之禮上不諱下故有稱諱之時如祭髙祖則不諱曾祖以下也如欲色然言其想像親平生所愛之物如見親有欲之之色也詩小雅小宛之篇明發自夜至光明開發之時也詩本謂宣王永懷文王武王之功烈此借以喻文王念父母之勤耳文王之詩言此詩足以咏文王也文王於祭之明日不能安寢明發而不成寐以爲昨既享而致其來今日去矣所以又從而思念之不置此與詩實相合也饗之必樂迎其來也已至而禮畢則往矣故哀也仲尼嘗奉薦而進其親也慤其行也趨趨以數已祭子贛問曰子之言祭濟濟漆漆然今子之祭無濟濟漆漆何也子曰濟濟者容也遠也漆漆者容也自反也容以遠若容以自反也夫何神明之及交夫何濟濟漆漆之有乎反饋樂成薦其薦俎序其禮樂備其百官君子致其濟濟漆漆夫何慌惚之有乎夫言豈一端而已夫各有所當也集說曰嘗秋祭也奉薦而進進於尸也親身自執事也慤專謹貌趨趨讀爲促促行步迫狹也數舉足頻也皆不事威儀之貌子貢待祭畢以夫子所嘗言者爲問蓋怪其今所行與昔所言異也夫子言濟濟者衆盛之容也逺也言非所以接親親也漆漆者專致之容也自反猶言自修整也若及也容之疏逺及容之自反者夫何能交及於神明乎我之自祭何可有濟濟漆漆乎言以誠慤爲貴也若言天子諸侯之祭尸初在室後出在堂更反入而設饋作樂既成主人薦其饋食之豆與牲體之俎進饋之前與神明而交貴其誠既進饋之後人事之盛故序禮樂備百官獻酬往復凡助祭之君子各以威儀相尚而致其濟濟漆漆之容當此之際何能有思念恍惚交神之心乎各有所當言各有所主謂濟濟漆漆乃宗廟中賓客之容非主人之容也主人之事親宜慤而趨數也坡謂文王仲尼二節舉聖人以爲饗親之法也孝子將祭慮事不可以不豫比時具物不可以不備虛中以治之宮室既修牆屋既設百物既備夫婦齊戒沐浴盛服奉承而進之洞洞乎屬屬乎如弗勝如將失之其孝敬之心至也與薦其薦俎序其禮樂備其百官奉承而進之於是諭其志意以其慌惚以與神明交庶或饗之孝子之志也註曰比時猶先時也虛中言不兼念餘事修設謂除及黝堊疏曰諭其志意使祝官啟告鬼神曉諭鬼神以志意慌惚言想見其親彷彿而來也集說曰兩言奉承而進之上謂主人下謂助祭者坡謂此該祭之始終以教孝子之祭也孝子之祭也盡其慤而慤焉盡其信而信焉盡其敬而敬焉盡其禮而不過失焉進退必敬如親聽命則或使之也坡謂盡慤者慮事而豫可謂專謹矣盡信者具物而備可謂竭誠矣洞洞屬屬可謂盡敬矣薦其薦俎三者可謂盡禮矣此因上節而申贊之以推本其孝敬之心莫或使之而若或使之蓋精誠之極也鬼神之情也孝子之祭可知也其立之也敬以詘其進之也敬以愉其薦之也敬以欲退而立如將受命已徹而退敬齊之色不絶於面孝子之祭也立而不詘固也進而不愉疏也薦而不欲不愛也退立而不如受命敖也已徹而退無敬齊之色而忘本也如是而祭失之矣註曰詘充詘形容喜貌也愉顔色和貌也固猶質陋也方氏曰孝子之祭可知者言觀其祭可以知其心也立之者方待事而立也進之者既從事而進也薦之者奉物而薦也退而立者進而復退也已徹而退者既薦而後徹也蓋退而立則少退而立已徹而退則於是乎退焉此其所以異也欲冀其享也坡謂此節承上進退必敬而極言之末云失之矣則上所云或使之者必得之矣孝子之有深愛者必有和氣有和氣者必有愉色有愉色者必有婉容孝子如執玉如奉盈洞洞屬屬然如弗勝如將失之嚴威儼恪非所以事親也成人之道也註曰成人既冠者然則孝子不失其孺子之心也疏曰非所以事親事親當和順卑柔也集說曰和氣愉色婉容皆愛心之所發如執玉如奉盈如弗勝如將失之皆敬心之所存愛敬兼至乃孝子之道故嚴威儼恪使人望而畏之是成人之道非孝子之道也坡謂此推言死之敬享由於生之敬養也程子曰交神明之意當在事生之後則可以盡孝愛而得其享可謂括此篇之精藴知鬼神之情狀矣先王之所以治天下者五貴有德貴貴貴老敬長慈幼此五者先王之所以定天下也貴有德何爲也爲其近於道也貴貴爲其近於君也貴老爲其近於親也敬長爲其近於兄也慈幼爲其近於子也是故至孝近乎王至弟近乎霸至孝近乎王雖天子必有父至弟近乎霸雖諸侯必有兄先王之教因而弗改所以領天下國家也應氏曰孝以事親而廣其愛極其至則王者以德行仁之心也弟以從兄而順其序極其至則霸者以禮明義之舉也孝弟之根本立乎一家王霸之功業周乎天下雖未能盡王霸之能事而亦近之矣天子至尊内雖致睦於兄弟而族人不敢以長幼齒之故所尊者唯父而諸侯特言有兄道渾全無迹德純實有方蓋以人行道而有得於身也故曰近之矣熊氏曰自近於子以上推先王行五者之故下文則言孝弟爲重也因而弗改因乎孝弟而弗改也子曰立愛自親始教民睦也立敬自長始教民順也教以慈睦而民貴有親教以敬長而民貴用命孝以事親順以聽命錯諸天下無所不行集說曰此言愛敬二道爲齊家治國平天下之本君自愛其親以教民睦則民皆貴於有親君自敬其長以教民順則民皆貴於用上命愛敬盡於事親事長而德教加於百姓舉而措之而已坡謂自先王之所以治至此二節推言孝弟爲治之本上無所承亦非起下疏云記者雜錄以事類相接爲次非相因之辭是也郊之祭也喪者不敢哭凶服者不敢入國門敬之至也註曰祭者吉禮不欲聞見凶人祭之日君牽牲穆答君卿大夫序從既入廟門麗于碑卿大夫袒而毛牛尚耳鸞刀以刲取膟膋乃退爓祭祭腥而退敬之至也集說曰祭之日謂祭宗廟之日也父爲昭子爲穆直言穆者文不備穆答君言君牽牲之時子姓對君共牽也卿大夫佐幣士奉芻以次序在牲之後故云序從也麗牲之碑在廟之中庭麗猶繫也謂以牽牲之紖繋於碑之孔也袒衣示有事也將殺牲則先取耳旁毛以薦神毛以告全耳以主聽欲神聽之也以耳毛爲上故云尚耳也膟血也膋腸間脂也血以供薦而膋以供炙肝及焫蕭也乃退謂薦毛血膟膋畢而暫退也祭有三節此一節竟故退爓祭祭湯中所爓之肉也祭腥祭生肉也爓腥之祭並當朝踐之節禮終而退此皆敬心之極至也郊之祭大報天而主日配以月夏后氏祭其闇殷人祭其陽周人致日以朝及闇註曰主日者以其光明天之神可見者莫著焉闇昏時也陽謂日中時也朝日出時也以朝及闇謂終日有事疏曰天無形體懸象著明不過日月故以日爲百神之主配之以月自日以下皆祭特言月者但月爲重以對日耳蓋天帝獨爲壇其日月及天神等共爲一壇故日得爲衆神之主也方氏曰祭日謂祭之日也祭日於壇祭月於坎以别幽明以制上下祭日於東祭月於西以别外内以端其位日出於東月生於西陰陽長短終始相巡以致天下之和疏曰此經據春分朝日秋分夕月方氏曰壇髙而顯坎深而隱一顯一隱所以别陰陽之幽明一髙一深所以制陰陽之上下東動而出西靜而入出則在外入則反内故東西所以別陰陽之外内東爲陽中西爲陰中中則得位故東西所以端陰陽之位别幽明之道然後能制上下之分别外内之所然後能端陰陽之位言之序如此且壇坎者人爲之形東西者天然之方出於人爲故言制出於天然也故言以端其位而已日出於東言其象出於天池之東也月生於西言其明生於輪郭之西也此又復明祭日月於東西之意也熊氏曰月秉陰而明於夜日秉陽而明於晝有時晝長夜短有時夜長晝短是隂陽互有長短也此長短終而復始巡環無端故氣行不乖以致天下百物皆化而和矣天下之禮致反始也致鬼神也致和用也致義也致讓也致反始以厚其本也致鬼神以尊上也致物用以立民紀也致義則上下不悖逆矣致讓以去爭也合此五者以治天下之禮也雖有奇邪而不治者則微矣註曰因祭之義汎説禮也疏曰和謂百姓和諧用謂財用豐足義謂㫁割得宜致物用以立民紀者民豐於物用則知榮辱禮節故可以立人紀也奇謂奇異邪謂邪惡皆據異行之人言用此五事爲治假令有異行不從治者亦當少也熊氏曰致推極也萬物本乎天人本乎祖報天尊祖是致反始之禮也有此禮則人皆知本之當厚矣齊明盛服以祭之制爲之極以尊之是致鬼神之禮也有此禮則人皆知鬼神之當尊矣宰我曰吾聞鬼神之名不知其所謂子曰氣也者神之盛也魄也者鬼之盛也合鬼與神教之至也註曰氣謂呼吸出入者也耳目之聰明爲魄疏曰自此以至先王先公敬之至也明夫子答宰我以鬼神魂魄祭祀之禮又廣明天子諸侯耕籍及公桑之事呼吸出入此氣之體無性識也但有氣則有識無氣則無識則識從氣生是生存之氣者神之盛極也人之精靈謂之神魄體也若無耳目形體不得有聰明是形魄者鬼之盛極也朱子曰鬼者陰之靈也神者陽之靈也方氏曰魂氣歸於天形魄歸於地故必合鬼與神然後足以爲教之至中庸曰使天下之人齊明盛服以承祭祀此皆教之至也衆生必死死必歸土此之謂鬼骨肉斃於下陰爲野土其氣發揚於上爲昭明焄蒿悽愴此百物之精也神之著也註曰隂讀爲依廕之廕疏曰鬼歸也此歸土之形故謂之鬼也骨肉斃於下二句覆説歸土之義也人生時形與氣合共爲生死則形與氣分其氣之精魂發揚升上爲神靈光明也朱子曰昭明乃光景之屬焄蒿氣之感觸人者悽愴如漢書所謂神君至其風肅然之意又曰焄蒿是鬼神精氣交感處因物之精制爲之極明命鬼神以爲黔首則百衆以畏萬民以服疏曰案史記秦命民曰黔首此記作在周末秦初故稱黔首此孔子言非當秦世以爲黔首錄記之人在後變改之耳集說曰因其精靈之不可揜者制爲尊極之稱而顯然命之曰鬼神以爲天下之法則故民知所畏而無敢慢知所服而無敢違聖人以是爲未足也築爲宮室設爲宗祧以别親疎遠邇教民反古復始不忘其所由生也衆之服自此故聽且速也熊氏曰明命鬼神聖人以爲未盡教之道也故築宮室設宗祧以别親疎之情逺近之世教民反古復始古猶昔也以子孫視祖考則祖考爲古昔子孫之氣魄皆祖考之所傳則祖考乃其始也凡此古始正吾身所由以生者教民如此直從身之原本提撕警覺至親至切民心悦服由此也既悦服則聽從之且甚速也二端旣立報以二禮建設朝事燔燎羶薌見以蕭光以報氣也此教衆反始也薦黍稷羞肝肺首心見間以俠甒加以鬱鬯以報魄也教民相愛上下用情禮之至也註曰二端旣立謂氣也魄也更有尊名云鬼神也二禮謂朝事與薦黍稷也朝事謂薦血腥時也薦黍稷所謂饋食也見及見間皆當爲覸字之誤也燔燎羶薌覸以蕭光取牲祭脂也光猶氣也有虞氏祭首夏后氏祭心殷祭肝周祭肺覸以俠甒謂雜之兩甒醴酒也報氣以氣報魄以實各首其類疏曰朝事謂早朝祭事燔燎謂取膟膋燎於罏炭覸謂雜也謂燔膟膋兼爇蕭蒿是雜以蕭氣羞肝肺首心者四代雖異物皆於薦黍稷之時兼此物祭也見間以俠甒者言祭黍稷之時雜以兩甒醴酒加以鬱鬯者言非但薦熟是報魄即祭初所以加鬱鬯亦是報魄也以魄在地下鬱鬯灌地雖是祭初亦是報魄不當薦熟之時故云加也教民相愛上下用情者饋熟之時皆以飲食實味徧於燕飲上恩逮下下受上賜也熊氏曰報氣以教衆反始報魄以教民相愛幽明交通非禮之至乎君子反古復始不忘其所由生也是以致其敬發其情竭力從事以報其親不敢弗盡也是故昔者天子爲籍千畝冕而朱紘躬秉耒諸侯爲藉百畝冕而青紘躬秉耒以事天地山川社稷先古以爲醴酪齊盛於是乎取之敬之至也集說曰藉藉田也紘冠冕之繋所以爲固也先古先祖也於是乎取之言皆於此藉田中取之也古者天子諸侯必有養獸之官及嵗時齊戒沐浴而躬朝之犠牷祭牲必於是取之敬之至也君召牛納而視之擇其毛而卜之吉然後養之君皮弁素積朔月月半君巡牲所以致力孝之至也集說曰色純曰犠體完曰牷牛羊豕曰牲周禮牧人掌牧六牲牛馬羊豕犬雞也然後養之謂在滌三月也方氏曰召之則未卜故曰牛巡之則卜之矣故曰牲先王父天母地則以子道自處推而及於山川社稷亦由是也故事鬼神皆稱孝焉論語曰致孝乎鬼神熊氏曰躬朝獸官躬朝也設官養之而備其用故曰敬之至也君以視朝之服而巡之所以致其力也古者天子諸侯必有公桑蠶室近川而爲之築宮仞有三尺棘牆而外閉之及大昕之朝君皮弁素積卜三宮之夫人世婦之吉者使入蠶于蠶室奉種浴于川桑于公桑風戾以食之集說曰公桑公家之桑也蠶室養蠶之室也近川便於浴種也棘牆置棘於牆上也外閉戸扇在外而閉則向内也大昕之朝季春朔之旦也三宮在天子則謂三夫人在諸侯之夫人則立三宮半后之六宮也奉種浴于川者言蠶將生之時而又浴之初於仲春已浴之至此更浴之桑采桑也戾乾也蠶惡濕故葉乾乃以食也方氏曰戾至也風至則乾矣歲旣單矣世婦卒蠶奉繭以示於君遂獻繭於夫人夫人曰此所以爲君服與遂副褘而受之因少牢以禮之古之獻繭者其率用此與集說曰單盡也副之爲言覆也婦人首飾所以覆首者褘褘衣也禮之禮待獻繭之婦人也方氏曰三月之盡非嵗單之時然蠶成之時也自去嵗蠶成之後迄今嵗蠶成之時朞歳矣故謂之嵗單若孟夏稱麥秋者亦此之意及良日夫人繅三盆手遂布于三宮夫人世婦之吉者使繅遂朱綠之元黄之以爲黼黻文章服旣成君服以祀先王先公敬之至也集說曰良日吉日也繅繹繭爲絲三盆手者置繭於盆中而以手三次淹之每淹則以手振出其緒故云三盆手也方氏曰夫人之繅止於三盆猶天子之耕止於三推君子曰禮樂不可斯須去身致樂以治心則易直子諒之心油然生矣易直子諒之心生則樂樂則安安則久久則天天則神天則不言而信神則不怒而威致樂以治心者也致禮以治躬則莊敬莊敬則嚴威心中斯須不和不樂而鄙詐之心入之矣外貌斯須不莊不敬而慢易之心入之矣故樂也者動于内者也禮也者動于外者也樂極和禮極順内和而外順則民瞻其顏色而不與爭也望其容貌而衆不生慢易焉故德煇動乎内而民莫不承聽理發乎外而衆莫不承順故曰致禮樂之道而天下塞焉舉而措之無難矣樂也者動于内者也禮也者動于外者也故禮主其減樂主其盈禮減而進以進爲文樂盈而反以反爲文禮減而不進則銷樂盈而不反則放故禮有報而樂有反禮得其報則樂樂得其反則安禮之報樂之反其義一也集說曰説見樂記曾子曰孝有三大孝尊親其次弗辱其下能養公明儀問于曾子曰夫子可以爲孝乎曾子曰是何言與是何言與君子之所謂孝者先意承志諭父母于道參直養者也安能爲孝乎註曰公明儀曾子弟子疏曰尊親嚴父配天也先意謂父母將欲發意孝子則預知其意而爲之承志謂父母已有志已當奉承而行之諭父母於道者或在父母意先或在父母意後皆曉諭父母將歸於正道也熊氏曰諭開説曉譬也此亦是以善及親而不辱其親之事故君子難之坡謂自此至樂正子春節明孝曾子曰身也者父母之遺體也行父母之遺體敢不敬乎居處不莊非孝也事君不忠非孝也涖官不敬非孝也朋友不信非孝也戰陳無勇非孝也五者不遂烖及于親敢不敬乎集說曰承上文弗辱而言此五者皆足以辱親故曰烖及於親亨孰羶薌嘗而薦之非孝也養也熊氏曰此言能養之孝也君子之所謂孝也者國人稱願然曰幸哉有子如此所謂孝也已衆之本教曰孝其行曰養養可能也敬爲難敬可能也安爲難安可能也卒爲難父母旣沒慎行其身不遺父母惡名可謂能終矣仁者仁此者也禮者履此者也義者宜此者也信者信此者也强者强此者也樂自順此生刑自反此作集說曰願猶羨也然猶而也衆之本教曰孝言孝爲教衆之本也其行曰養行猶用也言用之於奉養之間也敬即上敢不敬乎之敬也安爲難者謂非勉强矯拂之敬也卒爲難者謂不特終父母之身孝子亦自終其身也能終即說上文卒字仁者仁此者也以下凡七此字皆指孝而言也曾子曰夫孝置之而塞乎天地溥之而横乎四海施諸後世而無朝夕推而放諸東海而凖推而放諸西海而凖推而放諸南海而凖推而放諸北海而凖詩云自西自東自南自北無思不服此之謂也疏曰施諸後世而無朝夕者謂施此孝道於後世而無一朝一夕之不行也方氏曰置者直而立之溥者敷而散之施言其出無窮推言其進不已放與孟子放乎四海之放同凖言人以是爲凖熊氏曰此言孝道之大而爲天下古今所共由也曾子曰樹木以時伐焉禽獸以時殺焉夫子曰斷一樹殺一獸不以其時非孝也集說曰上言仁者仁此者也此二者亦爲惡其不仁故言非孝曽子又引夫子之言以爲證坡謂上言塞天地横四海此以謹小慎微之事言之則仁人事天孝子事親由不忍以達於所忍由不爲以達於所爲處處察識而擴充之愈密則愈塞愈斂則愈横而日用間無别用力處矣真聖賢之言也孝有三小孝用力中孝用勞大孝不匱思慈愛忘勞可謂用力矣尊仁安義可謂用勞矣博施備物可謂不匱矣父母愛之喜而弗忘父母惡之懼而無怨父母有過諫而不逆父母旣沒必求仁者之粟以祀之此之謂禮終註曰必求仁者之粟喻貧困猶不取惡人物以事亡親集說曰庶人思父母之慈愛而忘己躬耕之勞可謂用力矣此其下能養之事也諸侯卿大夫士尊重於仁安行於義功勞足以及物可謂用勞矣此其次弗辱之事也匱乏也博施謂德教加於百姓刑于四海也備物謂四海之内各以其職來助祭可謂不匱矣此即大孝尊親之事也熊氏曰自父母愛之以下自天子以至於庶人皆當如此樂正子春下堂而傷其足數月不出猶有憂色門弟子曰夫子之足瘳矣數月不出猶有憂色何也樂正子春曰善如爾之問也善如爾之問也吾聞諸曾子曾子聞諸夫子曰天之所生地之所養無人爲大父母全而生之子全而歸之可謂孝矣不虧其體不辱其身可謂全矣故君子頃步而弗敢忘孝也今予忘孝之道予是以有憂色也壹舉足而不敢忘父母壹出言而不敢忘父母壹舉足而不敢忘父母是故道而不徑舟而不㳺不敢以先父母之遺體行殆壹出言而不敢忘父母是故惡言不出於口忿言不反於身不辱其身不羞其親可謂孝矣集說曰無人爲大言無如人最爲大蓋天地之性人爲貴也道正路也徑捷出邪徑也游徒渉也惡言不出於口不以惡言加人也忿言不反於身則人自不以忿言復我也如此則不辱身不羞親矣熊氏曰不虧其體能踐形也不辱其身能盡性也頃一舉足也步再舉足也自壹舉足至遺體行殆不虧體也自壹出言至不羞其親不辱身也形性俱全所以謂孝昔者有虞氏貴德而尚齒夏后氏貴爵而尚齒殷人貴富而尚齒周人貴親而尚齒虞夏殷周天下之盛王也未有遺年者年之貴乎天下久矣次乎事親也疏曰貴德而尚齒者於德之中年髙者在前是德中尚齒餘倣此劉氏曰大舜貴以德化民有天下如不與而民化之幾於不知爵之爲貴矣故禹承之以爵爲貴而使民知貴貴之道也然貴爵之弊其終也在上者過於亢而澤不及下故湯承之以務富其民爲貴然富民之弊終也民各私其財而不知親親之道故武王承之以親親爲貴所謂周之宗盟異姓爲後是也四代之治隨時救弊所貴雖不同而尚齒則同也未有遺年齒而不尚者齒居天下之達尊久矣老吾老以及人之老故尊髙年次於事親也坡謂此節至弗敢犯也明弟是故朝廷同爵則尚齒七十杖於朝君問則席八十不俟朝君問則就之而弟達乎朝廷矣集說曰古者視朝之禮君臣皆立七十杖於朝據杖而立也君問則席謂君若有問則爲之布席於堂而使之坐也不俟朝謂見君而揖之即退不待朝事畢也就之即其家也行肩而不併不錯則隨見老者則車徒辟斑白者不以其任行乎道路而弟達乎道路矣集說曰此言少者與長者同行之禮倂並也肩而不併謂少者不可以肩齊並長者之肩當差退在後也不錯則隨謂此長者若是兄之輩則爲雁行之差錯稍偏而後之若是父之輩則直隨從其後矣車徒辟言或乘車或徒行皆當避之也任所負戴之物也不以任行道路即孟子頒白者不負戴於道路矣居鄉以齒而老窮不遺强不犯弱衆不暴寡而弟達乎州巷矣註曰一鄉者五州巷猶閭也熊氏曰老衰憊者窮鰥寡者不遺與之齒讓也弱言其力寡言其數皆謂長者不犯不暴亦尚齒意古之道五十不爲甸徒頒禽隆諸長者而弟達乎獀狩矣集說曰四井爲邑四邑爲邱四邱爲甸君田獵則起其民爲卒徒故曰甸徒五十始衰故不供此役也頒猶分也隆猶多也田畢分禽則長者受賜多於少者春獵爲獀冬獵爲狩舉此則夏秋可知軍旅什伍同爵則尚齒而弟達乎軍旅矣註曰什伍士卒部曲也疏曰五人爲伍二伍爲什士謂甲士卒謂步卒在軍旅之中時主帥部領團曲而聚故云部曲坡謂城濮之戰晉侯觀師曰少長有禮杜注云少在前長在後軍禮也此尚齒似優老之意非先後之位也孝弟發諸朝廷行乎道路至乎州巷放乎獀狩修乎軍旅衆以義死之而弗敢犯也疏曰在上諸文但云弟此兼言孝者以孝故能弟弟則孝之次也衆以義死之言行孝弟雖死不捨不敢犯此孝弟而不行也熊氏曰朝廷政之所出故言發道路人之所由故言行州巷委曲偏辟之所故言至獀狩郊野閒曠之地故言放軍旅用武文事易廢故言修祀乎明堂所以教諸侯之孝也食三老五更於大學所以教諸侯之弟也祀先賢於西學所以教諸侯之德也耕藉所以教諸侯之養也朝覲所以教諸侯之臣也五者天下之大教也註曰祀乎明堂宗祀文王西學周小學也先賢有道德王所使教國子者方氏曰先賢則樂祖是也西學則瞽宗是也樂祖有道德者故曰教諸侯之德耕藉所以祀神致養之道故曰教諸侯之養朝覲所以尊天子故曰教諸侯之臣樂記先朝覲而後耕藉者武王初有天下君臣之分辨之不可不早也坡謂殷大學曰瞽宗在西郊周立其學似仍其處亦在西郊儀禮鄉射賈疏言之爲悉此疏言瞽宗在國不與賈同案大司樂云凡有道者有德者使教焉死則以爲樂祖祭於瞽宗此註言祀有道德者而以西學爲虞庠與司樂文異方氏之解似得之然瞽宗在西郊國中二疏不同當更考故並存焉食三老五更於大學天子袒而割牲執醬而饋執爵而酳冕而總干所以教諸侯之弟也是故鄉里有齒而老窮不遺强不犯弱衆不暴寡此由大學來者也集說曰袒而割牲者袒衣而割制牲體爲俎實也饋進食也酳食畢而以酒虛口也總干總持干盾立於舞位以樂侑食也鄉里有齒人皆知長少之序也由大學來者言由大學養老之化而來故致此也天子設四學當入學而大子齒集說曰四學虞夏殷周四代之學也大子齒謂大子與同學者序長幼之位不以貴加人也坡謂上言君此又足言大子天子巡守諸侯待於竟天子先見百年者八十九十者東行西行者弗敢過西行東行者弗敢過欲言政者君就之可也熊氏曰或此老者在東必東行乃得見而天子適在西行者或此老者在西必西行乃得見而天子適在東行者不敢謂其勢不相值必謁而見之不敢徑過也坡謂上言在朝廷此又足言巡守壹命齒於鄉里再命齒於族三命不齒族有七十者弗敢先七十者不有大故不入朝若有大故而入君必與之揖讓而后及爵者熊氏曰言鄉飲之席一命之爵但與鄉里之人序齒非鄉里者不然再命之爵但與族人序齒非其族者不然三命之貴則别席於賓席之東雖族人亦不得與之序齒此貴貴之義也然而不廢長長之情如入門時族有七十者在則三命者又後之而不敢先蓋七十之人非商確大政不入朝若有大故而入朝君必與之揖而後及有爵之人待之何其隆也坡謂此七十亦指一命再命致仕在家者若庶人之老無緣有入朝之事也上言朝廷同爵則尚齒此又言爵雖不同而亦尚齒以足之天子有善讓德於天諸侯有善歸諸天子卿大夫有善薦於諸侯士庶人有善本諸父母存諸長老祿爵慶賞成諸宗廟所以示順也集說曰成諸宗廟言於宗廟中命之也詳在祭統十倫章熊氏曰長老所師者士庶人有善内則本之於父母外則存之於師也昔者聖人建陰陽天地之情立以爲易易抱龜南面天子卷冕北面雖有明知之心必進㫁其志焉示不敢專以尊天也善則稱人過則稱已教不伐以尊賢也註曰立以爲易謂作易易抱龜易官名疏曰進㫁其志者進於龜之前令㫁決已所有爲之志也劉氏曰易代天地鬼神以吉凶告天子故南面如祭祀之尸代神之尊也天子北面問卜以㫁其志蓋尊天事神之禮也坡謂南面北面是天子卜筮禮儀禮是士禮且儀禮卜筮西面而筮幽宅則北面指中封亦隨事異耳石梁王氏專好妄詆自祀乎明堂至此合明孝弟之道然細分之則自次節食三老五更至而後及爵者是申明弟自天子有善至以尊賢也是申明孝孝子將祭祀必有齊莊之心以慮事以具服物以修宮室以治百事及祭之日顏色必温行必恐如懼不及愛然其奠之也容貌必温身必詘如語焉而未之然宿者皆出其立卑靜以正如將弗見然及祭之後陶陶遂遂如將復入然是故慤善不違身耳目不違心思慮不違親結諸心形諸色而術省之孝子之志也方氏曰於其來也如懼不及愛然及既來也又如語而未之然於其徃也如將弗見然及既徃也又如將復入然則是孝子之思其親無物足以慊其心無時可以絶其念如懼不及愛然即前經所謂致愛則存是矣如語焉而未之然即所謂如親聽命是矣如將弗見然即所謂如將失之是矣如將復入然即所謂又從而思之是矣愛者愛其親也懼不及愛者懼愛親之心有所未至也語者親之語也語而未之然註云如有所以語親而未見答也宿者皆出謂所宿助祭之賓祭事已畢而出也陶陶言思親之心存乎内遂遂言思親之心達乎外祭後猶如此者以其如將復入故也熊氏曰慤善謹厚之儀不違於身耳聞目見之際專一不他故不違於心思慮念想之及不違於親蓋以愛敬結諸心故誠敬形諸色而每事循省不敢忽也此孝子愛親之志意也建國之神位右社稷而左宗廟方氏曰王氏謂右陰也地道所尊故右社稷左陽也人道之所鄉故左宗廟位宗廟於人道所鄉亦不死其親之意坡謂此二句周禮春官少宗伯之文也以此例之皆記者展轉相因采格言典法廣明其義可因其事類相接爲次不可以全篇一意相因求之禮記述註卷二十
