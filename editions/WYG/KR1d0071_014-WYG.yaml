body:
  text: 禮記述註卷十四安溪李光坡撰明堂位第十四昔者周公朝諸侯于明堂之位天子負斧依南鄉而立註曰負之言背也斧依為斧文屏風於户牖之間坡謂此天子明指成王有上句方曰周公而下句頓稱之以天子勿論此篇博雅是有識之儒即執筆學為文亦知不可也如下文雖云周公踐天子之位而上己曰成王幼弱矣註且闕之三公中階之前北面東上諸侯之位阼階之東西面北上諸伯之國西階之西東面北上諸子之國門東北面東上諸男之國門西北面東上疏曰中階者南面三階故稱中諸伯以下皆云國此云位者以三公不云位諸侯在諸國之上特舉位言之明以下皆朝位也九夷之國東門之外西面北上八蠻之國南門之外北面東上六戎之國西門之外東面南上五狄之國北門之外南面東上集説曰夷蠻戎狄各從其方之門而以右為尊獨南西東上者不然方氏以為南面疑於君故與北面者同其上也九采之國應門之外北面東上疏曰此是九州之牧謂之采者以采取當州美物而貢天子故王制云千里之外曰采明堂無重門但有應門應是當也以當朝正門故謂之應門四塞世告至此周公明堂之位也明堂也者明諸侯之尊卑也集説曰四塞九州之外夷狄也若天子新即位或其國君易世皆一來朝告至故云世告至也昔殷紂亂天下脯鬼侯以饗諸侯是以周公相武王以伐紂武王崩成王幼弱周公踐天子之位以治天下六年朝諸侯於明堂制禮作樂頒度量而天下大服七年致政於成王集説曰鬼國名易曰髙宗伐鬼方殺人以為薦羞惡之極也故伐之頒讀為班度為丈尺髙卑廣狹也量謂豆區斗斛筐筥所容受致政以王事歸授之坡謂此恐勿辨蓋詩書及孔子之言無以周公為天子者惟此篇與文王世子生梗為疑但成王幼為天子周公攝政居王前後所履者天子之位所行者天子之事則曰踐阼曰踐天子之位亦記者質筆闕之可也書稱復子明辟王莽援為口實故九峰蔡氏以復命於王為解然周公曰復子明辟下成王曰其退即辟是至此方受君位而親之明矣若謂非失無復則太甲非失政者伊尹攝耳而言復政厥辟何也禮始封之君不臣諸父昆弟封君之子不臣諸父而臣昆弟則成王於周公猶不臣也家人父子未能則代之既能則授之三古君臣誠質尚無多忌諱似不必曲為説否五帝殊時三王異世逺矣若恐如莽操輩藉以自文則六朝五季假禪代之名彼受終文祖受命神宗何解可易而塞此亂臣賊子之口也成王以周公為有勲勞於天下是以封周公於曲阜地方七百里革車千乗註曰曲阜魯地上公之封地方五百里加魯以四等之附庸方百里者二十四并五五二十五積四十九開方之得七百里革車兵車也兵車千乗成國之賦也詩魯頌曰王謂叔父建爾元子俾侯于魯大啟爾字乃命魯公俾侯于東錫之山川土田附庸又曰公車千乗命魯公世世祀周公以天子之禮樂是以魯君孟春乗大路載弧韣旂十有二旒日月之章祀帝于郊配以后稷天子之禮也註曰孟春建子之月大路殷之祭天車也弧旌旗所以張幅也其衣曰韣天子之旌旗畫日月坡謂此言孟春郊帝以雜記孟獻子曰正月日至可以有事於上帝相合則周正之改時改月信矣若夫用天子禮樂之失程子詳之封五等國斥大疆界朱子以古今酌論皆不易也已見於論語註及周禮語類不具載季夏六月以禘禮祀周公於大廟牲用白牡註曰季夏建巳之月也禘大祭也周公曰大廟魯公曰世室羣公稱宫白牡殷牲也尊用犧象山罍鬱尊用黄目集説曰尊酒器也犧犧尊也音莎者釋云刻畫鳳形娑娑然也讀如字者釋云畫為牛形又云尊為牛之形象象尊也以象骨飾尊一説尊為象之形也山罍刻畫山雲之狀於罍也鬱尊盛鬱鬯酒之尊也黃目黄彛也卣罍之類以黄金鏤其外為目因名也灌用玉瓚大圭薦用玉豆雕篹爵用玉琖仍雕加以璧散璧角爼用梡嶡集説曰灌酌鬱鬯以獻尸也以玉飾瓚故曰玉瓚以大圭為瓚柄故言玉瓚大圭也薦祭時所薦葅醢之屬也玉豆以玉飾豆也篹籩也雕飾其柄故曰雕篹爵君酌酒獻尸杯也夏世爵名琖以玉飾之仍因也因爵形而雕飾之故曰仍雕也加者尸入室饋食竟夫人亞獻於尸也名為加於時薦加豆籩也用璧角即周禮内宰所謂瑶爵也夫人獻後則賓用璧散獻尸散角皆以璧飾其口此先言散後言角便文也虞爼名梡夏爼名嶡梡形四足如按嶡則加横木於足中央為横距之形也升歌清廟下管象朱干玉戚冕而舞大武皮弁素積裼而舞大夏昧東夷之樂也任南蠻之樂也納夷蠻之樂於大廟言廣魯於天下也集説曰清廟周頌升樂工於廟之堂上而歌此詩也下堂下也管匏竹也象象舞詩也堂下以管吹象舞之詩故云下管象也朱干赤盾也玉戚玉飾斧柄也著衮冕而執此干戚以舞武王伐紂之樂又服皮弁見裼衣而舞夏后氏大夏之樂五冕皆周制故用以舞周樂皮弁三王之服故用以舞夏樂也昧任皆樂名廣魯於天下言周公勲業之盛廣及四夷故廣大其國禮樂之事以示天下也君卷冕立于阼夫人副褘立于房中君肉袒迎牲于門夫人薦豆籩卿大夫贊君命婦贊夫人各揚其職百官廢職服大刑而天下大服疏曰尸初入之時君待之於阼夫人立於東房中薦豆籩者謂朝踐及饋孰拜酳尸之時薦之集説曰副首飾也副之言覆以其覆被乎首而為名詳見周禮追師及詩副笄六珈註疏褘褘衣也本王后之服亦以尊周公而用天子禮樂故得服之也房大廟之東南室也贊助也命婦内則世婦外則卿大夫之妻也揚舉也廢不舉也天下大服謂敬服周公之徳也是故夏礿秋嘗冬烝春社秋省而遂大蜡天子之祭也註曰不言春祠魯在東方王東巡狩以春或闕之省讀為獮獮秋田名也春田祭社秋田祭祊大蜡嵗十二月索鬼神而祭之坡謂若祭在孟月則嵗二月王方巡守何必闕春祠乎是祭用仲月明矣此一節且可為大司馬春秋言社方夏冬言礿烝之証大廟天子明堂庫門天子皋門雉門天子應門集説曰魯無明堂而太廟如明堂之制天子五門路應雉庫皋由内而外路門亦曰畢門今魯庫門之制如天子皋門雉門之制如天子應門也振木鐸於朝天子之政也集説曰木鐸金口木舌發教令則振之所以驚動衆聴山節藻棁註曰山節刻欂盧為山也藻棁畫侏儒柱為藻文也疏曰此一節論魯之大廟之飾復廟重檐疏曰復廟上下重屋也重檐者謂就外檐下壁復安板簷以辟風雨之灑壁刮楹達鄉集説曰以密石摩柱使之精澤故云刮楹達通也鄉窻牖也每室四户八窻窻户相對故云達鄉反坫出尊集説曰兩君好㑹反爵之坫築土為之在兩楹間而近南葢獻酬畢則反爵于其上也出尊者尊在兩楹間坫在尊南故云出尊崇坫康圭疏屏天子之廟飾也集説曰崇高也康讀為亢亢舉也為髙坫受賓之圭舉于其上也屏即天子外屏之屏疏刻也刻之為雲氣蠱獸鸞車有虞氏之路也鈎車夏后氏之路也大路殷路也乗路周路也集説曰鸞車有鸞和之車也路與輅同鈎曲也車床謂之輿輿之前闌曲故名鈎車也大路殷之木輅也乗路周之玉輅也有虞氏之旂夏后氏之綏殷之大白周之大赤集説曰四者旌旗之屬周禮交龍為旂綏讀為緌以旄牛尾注於杠首而垂之者也大白白色旗也大赤赤色旗也註云當言有虞氏之緌夏后氏之旂謂虞質於夏惟緌而已至夏世乃有旗之制也夏后氏駱馬黑鬛殷人白馬黒首周人黃馬蕃鬛夏后氏牲尚黑殷白牡周騂剛疏曰駱白黑相間也此馬白身黑鬛殷白馬純白似凶故黑頭也頭黑而鬛白從所尚也然類三代俱以鬛為所尚也蕃赤也黄馬近赤而用赤鬛為所尚也剛壯也騂言剛則白亦剛白言牡黑亦牡也泰有虞氏之尊也山罍夏后氏之尊也著殷尊也犧象周尊也疏曰或用三代或用四代者隨其禮存者而用之耳無別義也集説曰虞氏尚陶泰瓦尊也著者無足而底著於地也餘見前章爵夏后氏以琖殷以斝周以爵集説曰夏爵名琖以玉飾之故其字從玉殷爵名斝稼也故畫為禾稼周之爵則爵之形也其曰玉爵者則飾之以玉也灌尊集説曰灌鬯酒之尊也夏后氏以雞夷殷以斝周以黄目集説曰夷讀為彛法也與餘尊為法故稱彛刻畫雞形於其上故名雞彛餘見上章其勺夏后氏以龍勺殷以疏勺周以蒲勺集説曰周禮梓人為飲器勺一升龍勺刻畫為龍頭疏謂刻鏤通刻勺頭蒲勺者合蒲為鳬頭之形其口微開如蒲草本合而末微開也三者皆謂勺之柄頭耳土鼓蕢桴葦籥伊耆氏之樂也方氏曰以土為鼓未有韗革之聲故也以凷為桴未有斵木之利故也以葦為籥未有截竹之精故也拊搏玉磬揩擊大琴大瑟中琴小瑟四代之樂器也註曰拊搏以葦為之充之以穅形如小鼓揩擊謂柷敔皆所以節樂者四代虞夏殷周也魯公之廟文世室也武公之廟武世室也註曰此二廟象周有文王武王之廟也世室者不毁之名也魯公伯禽也武公伯禽之𤣥孫也名敖米廩有虞氏之庠也序夏后氏之序也瞽宗殷學也頖宫周學也集説曰此言魯立四代之學魯所蔵粢盛米之廩卽虞氏之庠謂藏此米於學宫也亦教孝之義序者射也射以觀徳有先後之次焉樂師瞽矇之所宗故謂之瞽宗頖半也諸侯曰頖宫以其半辟雍之制也孟子言夏曰校殷曰序崇鼎貫鼎大璜封父龜天子之器也越棘大弓天子之戎器也註曰崇貫封父越皆國名文王伐崇古者伐國遷其重器以分同姓大璜夏后氏之璜春秋傳曰分魯公以夏后氏之璜棘㦸也夏后氏之鼓足殷楹鼓周縣鼓垂之和鐘叔之離磬女媧之笙簧註曰足謂四足也楹謂之柱貫中上出也縣縣之簨虡也垂堯之共工也女媧三皇承宓羲者叔未聞也笙簧笙中之簧也世本作曰垂作鐘無句作磬女媧作笙簧疏曰和鐘調和之鐘離磬編離之磬皇氏云無句叔之别名夏后氏之龍簨虡殷之崇牙周之璧翣集説曰周官梓人為簨虡横曰簨植曰虡所以縣樂器也以龍形飾之故曰龍簨虡崇牙者崇重也謂刻畫大版重疊為牙殷人於簨之上施崇牙以挂鐘磬也周人則又於簨上畫繒為翣戴之以璧下縣五采之羽而挂於簨之角焉有虞氏之兩敦夏后氏之四璉殷之六瑚周之八簋集説曰少牢禮曰執敦黍有葢又曰設四敦皆南首敦之為器有蓋有首也四者皆盛黍稷之器禮之有器時王各有制作故厯代寳而用之但時代漸逺古器之存者漸寡此魯所有之數耳爼有虞氏以梡夏后氏以嶡殷以椇周以房爼疏曰房俎如鄭言則俎頭各有兩足足下各別為跗跗足背也足間横者似堂之壁横下二跗似堂之東西頭各有房也但古制難識不可悉知今依註畧為此意未知是否集説曰梡嶡見前章椇者俎之足間横木為曲橈之形如椇枳之樹枝也夏后氏以楬豆殷玉豆周獻豆集説曰楬不飾也木質而已獻讀為莎獻尊刻畫鳳羽則此豆亦必刻畫鳯羽故名也有虞氏服韍夏后氏山殷火周龍章集説曰韍者祭服之蔽膝即韠也虞氏直以韋為之無文飾夏世則畫之以山殷人増之以火周人又加龍以為文章天子備焉諸侯火而下卿大夫山士韎韋而已有虞氏祭首夏后氏祭心殷祭肝周祭肺方氏曰三代各祭其所勝蓋夏尚黑為勝赤故祭心殷尚白為勝青故祭肝周尚赤為勝白故祭肺夏后氏尚明水殷尚醴周尚酒疏曰儀禮設尊尚𤣥酒是周亦尚明水也禮運云澄酒在下則周不尚酒故註云言尚非也方氏曰明水者取於月之水故謂之明水則淡而無味醴則漸致其味酒則味之成者有虞氏官五十夏后氏官百殷二百周三百坡謂古圗志皆在王朝侯國非賜不能有此疑乃四代設官分職之典魯備而藏之即所謂大訓與龜鼎大璜同作寳鎮耳觀孔子問官郯子可見其書之難得也有虞氏之綏夏后氏之綢練殷之崇牙周之璧翣疏曰此皆䘮葬旌旗之飾綏即前經注旄於竿首綢練謂綢杠以練又為之旒崇牙刻繒為崇牙之形飾旌旗之側璧翣翣扇也翣上戴之以璧陳之而鄣柩車凡四代之服器官魯兼用之是故魯王禮也天下傳之乆矣君臣未嘗相弑也禮樂刑法政俗未嘗相變也天下以為有道之國是故天下資禮樂焉註曰此蓋盛周公之徳耳春秋時魯三君弑又士之有誄由莊公始婦人髽而弔始於臺駘云君臣未嘗相弑政俗未嘗相變亦近誣矣喪服小記第十五朱子曰小記是解喪服傳斬衰括髪以麻為母括髪以麻免而以布集説曰斬衰主人為父之服也親始死子服布深衣去吉冠而猶有笄縰徒跣扱深衣前衽於帶將小歛乃去笄縰著素冠歛訖去素冠而以麻自項而前交於額上郤而繞於紒如著幓頭然幓頭今人名掠髮此謂括髪以麻也母死亦然故云為母括髪以麻言此禮與喪父同也免而以布專言為母也蓋父喪小歛後拜賓竟子即堂下之位猶括髪而踊襲絰帶以至大歛而成服母䘮則此時不復括髪而著布免以踊故云免而以布也其斬衰括髪齊衰免皆謂大事殯斂之時若其不當斂殯則大夫以上亦素弁士加素冠皆於括髪之上齊衰惡笄以終喪疏曰惡笄者榛木為笄婦人質笄以卷髪帶以持身於其自卷持者有除無變故要絰及笄不須更易至服竟一除男子冠而婦人笄男子免而婦人髽其義為男子則免為婦人則髽集説曰吉時男子首有吉冠婦人首有吉笄若親始死男去冠女則去笄父喪成服男以六升布為冠女則箭篠為笄若喪母男則七升布為冠女則榛木為笄故云男子冠而婦人笄也男子免而婦人髽者言今遭齊衰之喪當襲歛之節男子著免婦人則髽其首也髽有二斬衰則麻髽齊衰則布髽皆名露紒髽露紒者去纚大紒也其義為男子則免為婦人則髽者言其義不過以此免與髽分别男女而已苴杖竹也削杖桐也疏曰苴者黯也心如斬斫貎必蒼苴必用竹者以其體圎性貞四時不改明子為父禮伸痛極自然圓足有終身之痛也削者殺也桐隨時凋落為母喪外雖削殺服從時除而終身之心當與父同也祖父卒而后為祖母後者三年註曰祖父在則其服如父在為母也疏曰此一經論適孫承重之服為父母長子稽顙大夫弔之雖緦必稽顙集説曰服重者先稽顙而後拜賓服輕者先拜賓而後稽顙父母尊也長子正體也故從重大夫弔於士是以尊臨卑雖是緦服之喪亦必稽顙而後拜蓋尊大夫不敢以輕待之也婦人為夫與長子稽顙其餘則否集説曰婦人受重於他族故夫與長子之喪則稽顙其餘謂父母也降服移天其禮殺矣男主必使同姓婦主必使異姓註曰謂為無主後者為主也異姓同宗之婦也疏曰庾氏云喪有男主以接男賔女主以接女賔若父母之喪則適子為男主適婦為女主今或無正主遣他人攝主若攝男主必使喪家同姓之男若攝女主必使喪家異姓之女為父後者為出母無服註曰不敢以己私廢父所傳重之祭祀疏曰母為父遣而母子至親義不可絶父猶在子皆為出母服若父没則適子一人不為母服所以然者已係嗣烝嘗不敢以私親廢先祖之祀故無服親親以三為五以五為九上殺下殺旁殺而親畢矣疏曰己上親父下親子合云以一為三而云以三為五者父子一體無可分之義又以父上親祖以子下親孫故言五也又不言以五為七者蓋由祖以親曽髙二祖由孫而親曾孫𤣥孫為情己逺故畧其相親之㫖惟云九也上殺者服父三年祖殺至期應曽祖大功髙祖小功但其恩己疏故畧從齊衰三月曾髙一等下殺者父服子期為孫大功則曽孫宜五月但曽孫服曽祖三月故曽祖報亦一時也曽孫既三月𤣥孫理不容異畧同三月旁殺者據祖期則世叔宜九月而是父一體故加至期從世叔既疏加所不及是以五月族世叔又疏故緦麻此外無服此發父而旁殺也祖加至朞祖兄弟非己一體加亦不及便正五月族祖又疏故緦麻此外無服是發祖而旁殺也曽祖據期本應五月其兄弟為族曽祖既疏一等故宜三月此外及髙祖兄弟悉無服矣兄弟一體相為期同堂兄弟九月從祖兄弟小功族兄弟三月此外無服是發兄弟而旁殺也父為子期為兄弟子宜九月而兄弟子為世叔加期世叔旁尊無義可降故報以期且以兄弟之子不宜隔異與己子等所以至期同堂兄弟子服從伯叔無加亦正報五月族兄弟子又疏故宜緦耳此發子而旁殺也孫服祖朞祖尊為孫大功兄弟之孫服從祖五月故報之小功同堂兄弟之孫理自緦麻其外無服矣曽祖為曽孫三月為兄弟曽孫以無等降之故亦為三月始自父母終於族人故云畢矣王者禘其祖之所自出以其祖配之而立四廟庶子王亦如之集説曰四廟謂髙曽祖禰四親廟也始祖居中為五并髙祖之父祖為七或世子有廢疾不可立而庶子立為王者其禮制亦然趙氏曰禘王者之大祭也王者既立始祖之廟又追始祖所自出之帝祀之於始祖之廟而以始祖配之也别子為祖繼别為宗繼禰者為小宗有五世而遷之宗其繼髙祖者也是故祖遷於上宗易於下尊祖故敬宗敬宗所以尊祖禰也疏曰族人一身事四宗事親兄弟之適是繼禰小宗也事同堂兄弟之適是繼祖小宗也事再從兄弟之適是繼曾祖小宗也事三從兄弟之適是繼髙祖小宗也小宗凡四獨云繼禰者初皆繼禰為始據初而言之也集説曰別子有三一是諸侯適子之弟別於正嫡二是異姓公子來自他國別於本國不來者三是庶姓之起於是邦為卿大夫而別於不仕者皆稱別子也為祖者別與後世為始祖也繼别為宗者别子之後世世以適長子繼別子與族人為百世不遷之大宗也繼禰者為小宗謂別子之庶子以其長子繼己為小宗而其同父之兄弟宗之也五世者髙祖至𤣥孫之子此子於父之髙祖無服不可統其父同髙祖之兄弟故遷易而各從其近者為宗矣故曰有五世而遷之宗其繼髙祖者也四世之時尚事髙祖五世則於髙祖之父無服是祖遷於上也四世之時猶宗三從族人至五世則不復宗四從族人矣是宗易於下也宗是先祖正體惟其尊祖是以敬宗也庶子不祭祖者明其宗也疏曰此言庶子則是父庶父庶即不得祭父何假言祖故知是宗子庶子俱為適士適士得立二廟自禰及祖是適宗子得立祖廟祭之而已是祖庶雖俱為適士得自立禰廟而不得立祖廟正是推本崇適明有所宗也庶子不為長子斬不繼祖與禰故也疏曰此與父是適為長子斬互相明但記文混正不知㡬世之適得遂兹極服馬季長云五世之適父乃服斬此言不繼祖禰則不必五世庾氏云用恩則禰重用義則祖重父之與祖各有一重故至己承二重而為長子斬若不繼祖則不為長子三年也庶子不祭殤與無後者殤與無後者從祖祔食集説曰上中下殤見前篇蓋未成人而死者也無後者謂成人未昏或已娶而無子而死者也庶子所以不得祭此二者以己是父之庶子不得立父廟故不得自祭其殤子也若己是祖之庶孫不得立祖廟故無後之兄弟己亦不得祭之也祖廟在宗子之家此殤與此無後者當祭祖之時親者共其牲物宗子主其禮四時隨宗子之家而祭也義具曽子問疏庶子不祭禰者明其宗也集説曰庶子不得立禰廟故不得祭禰所以然者明主祭在宗子廟必在宗子之家也庶子雖貴止得供具牲物而宗子主其禮也上言庶子不祭祖是猶得立禰廟以其為適士也此言不祭禰以此庶子或下士或未仕故不得立廟以祭禰也親親尊尊長長男女之有别人道之大者也疏曰此論服之降殺親親謂父母也尊尊謂祖及曽祖髙祖也長長謂兄及旁親也不言卑幼舉尊長則卑幼可知也男女之有別者若為父斬為母齊衰姑姊妹在室期出嫁大功為夫斬為妻期之屬是也此四者於人之道為最大從服者所從亡則己屬從者所從雖没也服疏曰服術有六其一是徒從徒空也與彼非親屬空從此而服彼徒中有四一是妾為女君之黨二是子從母服於母之君母三是妾子為君母之黨四是臣從君而服君之黨此四徒之中惟女君雖没妾猶服女君之黨餘三徒所從既亡則止而不服已止也屬者骨血連續以為親也亦有三一是子從母服母之黨二是妻從夫服夫之黨三是夫從妻服妻之黨此三從雖没猶從之服其親也妾從女君而出則不為女君之子服集説曰妾謂女君之姪娣也其来也與女君同入故服女君之子與女君同若女君犯七出而出則此姪娣亦從之出子死母自為子猶期姪娣不服義絶故也禮不王不禘集説曰禘王者之大祭諸侯不得行之故云不王不禘石梁王氏曰此句合在王者禘其祖之所自出上錯亂在此世子不降妻之父母其為妻也與大夫之適子同註曰世子天子諸侯之適子也不降妻之父母為妻故親之也疏曰其為妻亦不降與大夫之適子為妻同也䘮服齊衰不杖章稱大夫之適子為妻父為士子為天子諸侯則祭以天子諸侯其尸服以士服註曰祭以天子諸侯養以子道也尸服士服父本無爵子不敢以己爵加之嫌於卑之父為天子諸侯子為士祭以士其尸服以士服註曰謂父以罪誅尸服以士服不成為君也天子之子當封為王者後以祀其受命之祖云為士則擇其宗之賢若微子者不必封其子為王者後及所立為諸侯祀其先君以禮卒者尸服天子諸侯之服如遂無所封立則尸也祭也皆如士不敢僣用尊者衣物婦當䘮而出則除之集説曰婦當舅姑之䘮而為夫所出則即除其服恩義絶故也為父母喪未練而出則三年既練而出則已集説曰女嫁為父母期若未小祥而為夫所出值兄弟之小祥則隨兄弟喪三年之受為與夫絶族故其情復隆於父母也若在父母小祥後被出則是已之期服己除不可更同兄弟為三年服所以然者若反本服須隨兄弟之節兄弟小祥之後無服變節於女遂止也未練而反則期既練而反則遂之集説曰若被出後遇父母之喪未及期而夫命之反則但終期服反在期後則遂終三年葢縁己隨兄弟小祥服三年之受不可中廢也再期之喪三年也期之喪二年也九月七月之喪三時也五月之喪二時也三月之喪一時也註曰言喪之節應嵗時之氣集説曰儀禮大功章有中殤七月之文即此七月也故期而祭禮也期而除喪道也祭不為除喪也註曰此謂練祭也禮正月存親親亡至今而期期則宜祭期天道一變哀惻之情益衰衰則宜除不相為也疏曰祭雖不為除喪除喪與祭同時總而言之練祭祥祭亦名除喪也三年而后葬者必再祭其祭之間不同時而除喪疏曰觀此及下文云除成喪者朝服縞冠是練祥之祭總名除喪集説曰孝子以事故不得及時治葬中間練祥時月以尸柩尚存不可除服今葬畢必舉練祥兩祭故云必再祭也間不同時者當異月也既祔明月練而祭男子除首絰婦人除要絰又明月祥而祭必異月者以葬與練祥本異嵗宜異時也而除喪者祥則除不禫大功者主人之喪有三年者則必為之再祭朋友虞祔而已集説曰大功者主人之喪謂從父兄弟来主此死者之喪也三年者謂死者有妻與子妻既不可為主而子又幼小别無近親故從父兄弟主之必為之主行練祥二祭朋友疎於大功但為之虞祔而已大功為之再祭則小功緦麻為之練祭可也士妾有子而為之緦無子則已集説曰喪服云大夫為貴妾緦雖無子猶服之士卑故妾之有子者為之緦無則已不別貴賤生不及祖父母諸父昆弟而父税喪己則否集説曰税者日月已過始聞其死追而為之服也此言生於他國而祖父母諸父昆弟皆在本國已皆不及識之今聞其死而日月已過父則追而服之己則不服也坡謂此禮大可疑以祖父母言之夫逮事父母則王父母終身諱之豈有父制重服而子不税乎又孫為祖期已終以其父之三年未畢也猶縞冠𤣥武豈有父當服而子不税乎萬一己為大夫於他國得立三廟既不税祖服而可立祖廟乎萬一已是門子父没而祖方喪當税承重乎抑否乎此禮難通為君之父母妻長子君已除喪而后聞喪則不税集説曰卿大夫為君之父母妻長子皆有服今以出使他國或以事乆留君除喪之後已始聞喪不追服也降而在緦小功者則税之集説曰此句承父税喪己則否之下誤在此降者殺其正服也如叔父及適孫正服皆不杖期死在下殤則皆降服小功如庶孫之中殤以大功降而為緦也從祖昆弟之長殤以小功降而為緦也如此者皆追服之檀弓曽子所言小功不税是正服小功非謂降也凡降服重於正服詳見儀禮坡謂儀禮降服正服明分二條昌黎韓公與李秘書論此乃混引為一又不及詳此節甚矣禮之難也近臣君服斯服矣其餘從而服不從而税集説曰近臣卑賤之臣也此言小臣有從君徃他國既返而君之親䘮已過服之月日君税之此臣亦從君而服其餘謂卿大夫之從君出為介為行人宰史者返而君服限未滿亦從君而服若在限外而君税則不從君而税也君雖未知喪臣服已集説曰此言君在他國而本國有喪君雖未知而諸臣之留國者自依禮成服不待君返也虞杖不入於室祔杖不升於堂集説曰虞祭在寢祭後不以杖入室祔祭在祖廟祭後不以杖升堂皆殺哀之節也為君母後者君母卒則不為君母之黨服疏曰為君母後者謂無適立庶為後也妾子於君母之黨悉徒從君母卒則不服今既君母没為後者嫌同於適服君母之黨故特明之謂與不為後同也絰殺五分而去一杖大如絰註曰如要絰也疏曰知如要絰者以其同在下之物也朱子曰首絰大一搤只是拇指與第二指一圍集説曰喪服傳曰苴絰大搹左本在下去五分一以為帶絰大搹者謂首絰也五分减一分則要絰之大也麻在首在要皆曰絰分言之則首曰絰要曰帶所以五分者象五服之數也搹者搤也妾為君之長子與女君同集説曰女君為長子三年妾亦同服三年以正統故重也除喪者先重者易服者易輕者集説曰男子重在首婦人重在要凡所重者有除無變故雖卒哭不受輕服直至小祥而男子除首絰婦人除要除此之謂除䘮者先重者也易服者謂先遭重喪後遭輕䘮而變易其服也輕謂男子要婦人首也此言先是斬衰虞而卒哭己變葛絰葛絰之大小如齊衰之麻絰今忽又遭齊衰之喪齊衰要首絰皆牡麻牡麻重於葛也服宜從重故男不變首女不變要以其所重也但以麻易男要女首而已故云易服者易輕者也若未虞卒哭則後䘮不能變無事不辟廟門哭皆於其次集説曰辟開也廟門殯宫之門也鬼神尚幽闇故有事則辟無事不辟也次倚廬也朝夕之哭與受弔之哭皆即門内之位若或晝或夜無時之哭則皆於倚廬也復與書銘自天子達於士其辭一也男子稱名婦人書姓與伯仲如不知姓則書氏集説曰復招魂以復魄也書銘書死者名字於明旌也檀弓疏云士喪禮為銘各以其物士長三尺大夫五尺諸侯七尺天子九尺若不命之士以緇長半幅長一尺䞓末長終幅長二尺總長三尺周禮天子之復曰皋天子復諸侯則曰皋某甫復此言天子達於士其辭一者殷以上質不諱名故臣可以名君男子稱名謂復與銘皆名之也婦人銘則書姓及伯仲此亦殷禮如周則必稱夫人也姓如魯姬齊姜也氏如孟孫三家之屬殷無世繫六世而婚故婦人有不知姓者周則不然有宗伯掌定繫世百世婚姻不通故必知姓也斬衰之葛與齊衰之麻同齊衰之葛與大功之麻同麻葛皆兼服之集説曰上章言絰殺皆是五分去一此言斬衰既虞受服之葛首絰要帶與齊衰初死之麻絰大小同齊衰變服之葛絰與大功初死之麻絰大小同麻葛皆兼服之者謂居重喪而遭輕喪服麻又服葛也上章言男子易要絰不易首絰故首仍重喪之葛要乃輕喪之麻也婦人卒哭後無變上下皆麻此言麻葛兼服者止謂男子耳報葬者報虞三月而後卒哭集説曰報讀為赴急疾之義謂家貧或以他故不得待三月死而即葬者既疾葬亦疾虞虞以安神不可後也卒哭是奪於哀痛故不忍急猶待三月也父母之喪偕先葬者不虞祔待後事其葬服斬衰集説曰父母之喪偕即曽子問並有喪言父母同時死也葬先輕而後重先葬葬母也不虞祔不為母設虞祭祔祭也葢葬母之明日即治父葬葬父畢虞祔然後為母虞祔故云待後事祭則先重而後輕也其葬母亦服斬衰者從重也以父未葬不敢變服也言其葬服斬衰則虞祔各以其服矣及練祥皆然卒事反服重大夫降其庶子其孫不降其父疏曰大夫為庶子不為大夫者服大功而䘮服條例云父之所不服子亦不敢服故大夫不服其妾而妾子為母大功也今嫌既降其子亦厭其孫故此明雖降其子不厭其孫庶子之子不降其父猶為三年也大夫不主士之喪集説曰謂士死無主後其親屬有為大夫者不得主其䘮尊故也為慈母之父母無服疏曰此慈母父雖命為母子而本非骨肉故子為其父母無服為恩所不及也夫為人後者其妻為舅姑大功註曰以不貳降疏曰賀云此謂子出時已昏故此婦還服本舅姑大功若子出時未昏至所為後家方昏者不服本舅姑以婦本是路人來又恩義不相接今案夫為本生父母期故其妻降一等服大功是從夫而服不論識前舅姑與否假令夫之伯叔在他國而死其婦雖不識豈不從夫服也熊氏云恐賀義未盡善士祔於大夫則易牲集説曰祖為大夫孫為士孫死祔祖則用大夫牲士牲卑不可祭於尊者也如妾無妾祖姑可祔則易牲而祔於女君也若有士則當祔士故雜記云士不祔於大夫謂先祖兄弟有為士者當祔於士不得祔於大夫也繼父不同居也考必嘗同居皆無主後同財而祭其祖禰為同居有主後者為異居集説曰母再嫁而子不隨往則此子與母之繼夫猶路人也故自無服矣今此子無大功之親隨母以往其人亦無大功之親故云同居皆無主後也於是以其貨財為此子同築宫廟使之祭祀其先如此則是繼父同居其服期也異居有三一是昔同今異二是今雖同居卻不同財三是繼父自有子即為異居異居者服齊衰三月而已然上既云皆無主後為同居此云有主後者為異居則此子有子亦為異居也哭朋友者於門外之右南面疏曰門外寢門外也右西邊也向南為主以對答弔賔祔葬者不筮宅集説曰宅謂塋壙也前人之葬已筮而吉故祔葬則不必再筮也士大夫不得祔於諸侯祔於諸祖父之為士大夫者其妻祔於諸祖姑妾祔於妾祖姑亡則中一以上而祔祔必以其昭穆集説曰公子公孫之為士為大夫者不得祔於先君之廟也諸祖父其祖為國君者之兄弟也諸祖姑諸祖父之妻也若祖為國君而無兄弟可祔亦祔宗族之疏不為諸侯者也上言士易牲而祔於大夫而大夫不得易牲而祔諸侯者諸侯之貴絶宗故大夫士不得親之也妄祔於妾祖姑言妾死則祔於祖之妾也亡無也中間也若祖無妾則又間曽祖一位而祔髙祖之妾故云亡則中一以上而祔也所以間曽祖者以昭穆之次不同列祔必以昭穆也諸侯不得祔於天子天子諸侯大夫可以祔於士集説曰卑孫不可祔於尊祖孫貴而不祔其祖之為士者是自尊而卑其祖不可也故可以祔於士為母之君母母卒則不服註曰母之君母外祖適母徒從也所從亡則已宗子母在為妻禫集説曰父在則適子為妻不杖不杖則不禫父没母存則杖且禫矣此宗子百世不遷者也恐疑於宗子之尊厭其妻故明言雖母在亦當為妻禫也然則非宗子其餘適庶母在為妻並不禫矣為慈母後者為庶母可也為祖庶母可也疏曰傳曰妾之無子者妾子之無母者父命為子母而子服此慈母三年此為慈母後之義也記者觸類言之言妾子亦可為庶母後也為庶母後者謂妄經有子而子死者他妾多子則父命他妾之子為無子之妾立後與為慈母後同也祖庶母者己父之妾亦經有子子死今無也己命己之妾子後之故呼父妾為祖庶母亦服之三年如己母矣必知妄經有子者若無子則不得立後故也賀瑒云雖有子道服於慈庶母三年而猶為己母不異異於後大宗而降本也為父母妻長子禫集説曰此言當禫之䘮有此四者然妻為夫亦禫又慈母之喪無父在亦禫記者畧耳慈母與妾母不世祭也集説曰不世祭者謂子祭之而孫不祭也上章言妾祔於妾祖姑者疏云妾無廟今乃云祔及髙祖當是為壇以祔之耳丈夫冠而不為殤婦人笄而不為殤註曰言成人也婦人許嫁而笄未許嫁與丈夫同坡謂此釋儀禮自年十九以下為殤也古者二十而冠故曰冠則不謂殤也婦人十五而笄然則婦人分長中下之殤當自有年數特未有考耳未許嫁則未笄故註云與丈夫同言同以十九以下為殤也為殤後者以其服服之註曰言為後者據承之也殤無為人父之道以本親之服服之疏曰為殤後者謂大宗子在殤中而死族人為後大宗而不得後此殤者為子也既不後殤而宗不可絶今来為後殤者之人而以殤者父為父而依兄弟之服服此殤也注言據承之者既不與殤為子則不應云為後今言為後是據己承其處為言也云以本親之服服之者依其班秩如本列也為人後者若子於無後之宗既為殤者父作子則應服以兄弟之服而云以本親之服服者當在未後之前不復追服不責人以非時之恩故推此時本親兄弟亡在未後之前者亦宜終其本服之日月唯為後之後如有母亡而猶在三年之内則宜接其餘服不可以吉居凶若出三年則不追服矣坡謂果已冠自是成人大宗重適之本自當立後為後者自當如子何須特著此禮且明言為殤後何以知其已冠抑萬一宗子殤死大宗理不可絶來後者於此殤宜何服則難通矣不俟二十而冠惟左傳魯襄十二嵗晉悼為之冠或是諸侯之禮陳註未可為據且依註疏乆而不葬者惟主喪者不除其餘以麻終月數者除喪則已集説曰主喪者不際謂子於父妻於夫孤孫於祖父母臣於君未葬不得除衰絰也麻終月數者期以下至緦之親以主人未葬不得變葛故服麻以至月數足而除不待主人葬後之除也然其服猶必収蔵以俟送葬也坡謂疏云前儒説主喪不除無為下流之義如父為長子三年服問曰君所主夫人妻太子適婦此皆主喪者皆不在不除之例葢無緣以卑之未葬而使尊者長服衰絰也箭笄終喪三年齊衰三月與大功同者繩屨集説曰前章言齊衰惡笄以終喪是女子為母也此言箭笄三年女子在室為父也箭篠也齊衰為尊大功為卑然三月者恩之輕九月者恩稍重故可以同用繩屨此制禮者淺深之宜也繩屨麻繩為屨也練筮日筮尸視濯皆要絰杖繩屨有司告具而後去杖筮日筮尸有司告事畢而後杖拜送賔大祥吉服而筮尸集説曰練小祥也筮日筮小祥之日也筮尸筮為尸之人也視濯視祭器之濯滌也小祥除首絰唯有要絰屨又變為繩麻將欲小祥則預著此小祥之服以臨此三事所以然者三事悉是為祭祭欲吉故預服也不言衰與冠者亦同小祥矣有司謂執事者向者變服猶杖今執事者告三事辦具將欲臨事故孝子即去杖而致敬此三事者唯筮日筮尸有賔來今執事者告筮占之事畢則孝子復執杖以拜送於賔視濯無賔故不言至大祥時則吉服行事矣吉服朝服也不言筮日視濯與小祥同可知也大祥則并去絰杖繩屨故不云庶子在父之室則為其母不禫集説曰此言不命之士父子同室者若異宫則禫之庶子不以杖即位集説曰此言適庶俱有父母之䘮者適子得執杖進阼階哭位庶子至中門外則去之矣父不主庶子之喪則孫以杖即位可也集説曰父主適子喪而有杖故適子之子不得以杖即位避祖之尊故然非厭之也今父既不主庶子之喪故庶子之子得以杖即位祖不厭孫孫得伸也父皆厭子故舅主適婦喪而適子不杖大夫不服賤妾故妾子亦以厭而降服以服其母祖雖尊貴不厭其孫故大夫降庶子而孫不降其父也父在庶子為妻以杖即位可也集説曰舅主適婦故適子不得杖舅不主庶婦故庶子為妻可以杖即位此以即位言者葢庶子厭於父母雖有杖不得持以即位故明言之也諸侯弔於異國之臣則其君為主集説曰君無弔外臣之禮若來在此國而適遇其卿大夫之䘮則弔之以主君之故耳故主君代其臣之子為主子不敢當主中庭北面哭不拜諸侯弔必皮弁錫衰所弔雖已葬主人必免主人未喪服則君亦不錫衰集説曰錫者治其布使之滑易也國君自弔其臣則素弁環絰錫衰弔異國臣則皮弁錫衰也凡免之節大功以上為重服自始死至葬卒哭後乃不復免小功以下為輕服自始死至殯殯後不復免至葬啟殯之後而免以至卒哭如始死今人君來弔雖非服免之時必為之免以尊重人君故也主人必免謂大功以上小功以下則不然也禮既殯而成服此言未喪服謂未成服也養有疾者不喪服遂以主其喪非養者入主人之喪則不易己之喪服養尊者必易服養卑者否集説曰親屬無近親而過疾者己往養之而身有䘮服則釋去其服惡其凶也故云養有疾者不喪服若此疾者遂死既無主後已既養之當遂主其䘮葢養者於死者有親也然亦不著已之喪服故云遂以主其喪非養者入主人之喪謂疾時不曾釋服來致其養今死乃入來主其喪則亦不易去己之喪服也尊謂父兄卑謂子弟妾無妾祖姑者易牲而祔於女君可也註曰女君適祖姑也易牲而祔則凡妾下女君一等疏曰下一等若女君少牢妾則特牲若女君特牲妾則特豚也集説曰妾當祔於妄祖姑上章言亡則中一以上而祔是祔髙祖之妾今又無髙祖妾則當易妾之牲而祔於適祖始婦之喪虞卒哭其夫若子主之祔則舅主之集説曰婦謂凡適婦庶婦也虞卒哭在寢祭婦也祔於廟祭舅之母也尊卑異故所主不同士不攝大夫士攝大夫唯宗子集説曰士喪無主不敢使大夫兼攝為主若士是宗子則主䘮之任可使大夫攝之以宗子尊故也一説大夫之喪無主士不敢攝而主之若士是宗子則可主人未除喪有兄弟自他國至則主人不免而為主集説曰葬後而君弔之則非時亦免以敬君故新其事也兄弟親屬也親則尚質故不免而為主也陳器之道多陳之而省納之可也省陳之而盡納之可也集説曰陳器陳列從葬之明器也凡朋友賔客所贈遺之明器皆當陳列所謂多陳之也而所納於壙者有定數故云省納之可也省减殺也若主人所作者依禮有限故云省陳之而盡納之可也奔兄弟之喪先之墓而後之家為位而哭所知之喪則哭於宫而後之墓集説曰兄弟天倫也所知人情也係於天者情急於禮由於人者禮勝於情宫故殯宫也父不為衆子次於外集説曰適長子死父為之居喪次於中門外庶子自若居寢也與諸侯為兄弟者服斬集説曰卿大夫於君自應服斬若不為卿大夫而有五屬之親者亦皆服斬衰此記者恐疑服本親兄弟之服故特明之葢謂國君之兄弟先為本國卿大夫今居他國未仕而本國君卒以有兄弟之親又是舊君必當反而服斬也不言與君為兄弟而言與諸侯為兄弟明在異國也若俱為諸侯則各依本服下殤小功帶澡麻不絶本詘而反以報之集説曰本是期服之親以死在下殤降為小功故云下殤小功也其帶以澡麻為之謂戛治其麻使之潔白也不絶本不斷去其根也報猶合也垂麻向下又屈之而反向上以合而糾之故云屈而反以報之也凡殤服之麻皆散垂此則不散首絰麻無根而要帶猶有根皆示其重也婦祔於祖姑祖姑有三人則祔於親者集説曰此言祔廟之禮三人或有二繼也親者謂舅所生母也其妻為大夫而卒而后其夫不為大夫而祔於其妻則不易牲妻卒而后夫為大夫而祔於其妻則以大夫牲疏曰此謂始來仕而無廟者若有廟則死者當祔於祖不得祔於妻也若宗子去他國以廟從則祔於祖矣集説曰妻卒時夫為大夫卒後夫黜退遂死以無祖廟故祔於妻之禮止得依夫今所得用之牲不得易用昔大夫之牲也若妻死時夫未為大夫死後夫乃為大夫而死今祔祭其妻則得用大夫牲矣為父後者為出母無服無服也者喪者不祭故也集説曰出母父所棄絶為他姓之母以死則有他姓之子服之葢居喪者不祭若喪他姓之母而廢已宗廟之祭豈禮也哉故為父後者不喪出母重宗祀也然雖不服猶以心喪自居為恩也非為後者期而不禫朱子曰出母為父後者無服此尊祖敬宗家無二主之意先王制作精微不苟葢如此婦人不為主而杖者姑在為夫杖母為長子削杖女子子在室為父母其主喪者不杖則子一人杖集説曰此明婦與女當杖之禮女子在室而為父母杖者以無男昆弟而使同姓為攝主也緦小功虞卒哭則免集説曰緦與小功服之輕者也殯之後啟之前雖有事不免及虞與卒哭則必免不以恩輕而畧於後也既葬而不報虞則雖主人皆冠及虞則皆免集説曰前章言赴葬者赴虞今言不赴虞謂以事故阻之也既未得虞故且冠以飾首及虞則主人至緦小功者皆免也為兄弟既除喪已及其葬也反服其服報虞卒哭則免如不報虞則除之註曰小功以下逺葬者比反哭者皆冠及郊而後免反哭集説曰逺葬謂葬地在四郊之外也葬訖而反主人以下皆冠道路不可無飾也及至郊乃去冠著免而反哭於廟焉君弔雖不當免時也主人必免不散麻雖異國之君免也親者皆免疏曰大斂之前著免大功以上散麻大斂之後著冠不散麻糾其垂也至啟殯之後已葬之前亦免大功以上亦散麻君弔雖不當免時必著免不散麻帶貶於大斂之前既啟之後也異國君來主人既免大功以上親者俱從免敬異國君也異國尚然已君來弔則親者皆免可知也除殤之喪者其祭也必𤣥除成喪者其祭也朝服縞冠集説曰𤣥謂𤣥冠𤣥端也殤無虞卒哭及練之變服其除服之祭用𤣥冠𤣥端黄裳此於成人為釋禫之服所以異於成人之䘮也若除成人之喪則祥祭用朝服縞冠朝服𤣥冠緇衣素裳今不用𤣥冠而用縞冠是未純吉之祭服也禫祭始從𤣥端知𤣥端黃裳者若素裳則與朝服純吉同若𤣥裳又與上士吉服𤣥端同故知此為黄裳也奔父之喪括髪於堂上袒降踊襲絰於東方奔母之喪不括髮袒於堂上降踊襲免於東方絰即位成踊出門哭止三日而五哭三袒集説曰不言笄纚者異於始死時也至即以麻括髮於殯宫之堂上袒去上衣降阼階之東而踊踊畢而升堂襲掩所袒之衣而著要絰於東方東方者東序之東也此奔父喪之禮如此若奔母䘮初時括髮至又哭以後至於成服皆不括髮其袒於堂上降踊者與父同父則括髮而加絰母則不括髮而加免此所異也著免加要絰而即位于阼階之東而更踊故云絰即位成踊也其即位成踊父母皆然出門出殯宫之門而就廬次也故哭者止初至一哭明日朝夕哭又明日朝夕哭所謂三日而五哭也三袒者初至袒明日朝袒又明日朝袒也此謂已殯而來者若未殯之前而來當與在家同不得减殺也適婦不為舅姑後者則姑為之小功註曰謂夫有廢疾他故若死而無子不受重者小功庶婦之服也凡父母於子舅姑於婦將不傳重於適及將所傳重者非適服之皆如庶子庶婦也禮記述註卷十四
