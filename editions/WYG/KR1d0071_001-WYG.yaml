body:
  text: 禮記述註卷一安溪李光坡撰疏曰禮記之作岀自孔氏之徒共撰所聞以為此記或録舊禮之義或録變禮所由或兼記體履或雜序得失故編而録之以為記中庸是子思所作緇衣公孫尼子所撰鄭康成云月令吕不韋所修盧植云王制為漢文時博士所録其餘衆篇皆如此例但未能盡知所記之人也鄭君六藝論云戴徳傳記八十五篇則大戴禮是也戴聖傳禮四十九篇則此禮記是也曲禮上第一陸曰本或作曲禮上者後人加也檀弓雜記放此曲禮者是儀禮之舊名委曲説禮之事曲禮曰疏曰云曲禮曰者是引儀禮正經今不見者或在三千散亡之中也毋不敬註曰禮主於敬儼若思註曰儼矜莊貌人之坐思貌必儼然安定辭熊氏曰安從容定堅確安民哉疏曰心能肅敬身乃矜莊口復審慎三者依於徳義則可以安民也朱子曰首章言君子修身其要在此三者而其效足以安民乃禮之本故以冠篇敖不可長欲不可從志不可滿樂不可極朱子曰此篇雜取諸書精要之語集以成篇雖大意相似而文不連屬如首章四句乃曲禮古經之言敖不可長以下四句不知何書語又自為一節皆禁戒之辭應氏曰敬之反為敖情之動為欲志滿則溢樂極則反賢者狎而敬之畏而愛之注曰狎習也近也坡謂言人之賢者雖素相近習必敬之不可䙝雖畏服之必愛其徳義不可疏此親仁之道也愛而知其惡憎而知其善注曰謂與人交不以己心之愛憎誣人之善惡坡謂此愛衆之道也積而能散安安而能遷註曰謂已今安此之安圗後有害則當能遷晉咎犯與姜氏醉重耳而行近之坡謂積蓄財也散施也上安據心下安據處安安即懐居也能遷所謂見懐思威也此自治之道也臨財毋苟得臨難毋苟免很毋求勝分毋求多註曰毋苟得為傷㢘也毋苟免為傷義也毋求勝求多為傷平也疏曰很當引過歸己不可求勝衆人之物當共分之不可貪欲望多疑事毋質直而勿有疏曰質成也已之所疑則毋得成言之故孔子戒子路云不知為不知也直正也所不疑者仍須謙退當稱師友所説以正之勿謂已有此義也坡謂如縣子譏子㳺之汰正所謂有之也疑事毋質闕疑也直而勿有慎言也若夫坐如尸立如齊疏曰尸居神位坐必矜莊坐法必當如尸之坐人之倚立多慢不恭雖不齊亦當如祭前之齊必須磬折屈身朱子曰劉原父云此乃大戴禮曽子事父母篇之辭此篇葢取彼文而若夫二字失於删去鄭氏不知其然乃為此二句為丈夫之事誤矣禮從冝使從俗註曰事不可常也吕氏曰敬者禮之常禮時為大時者禮之變體常盡變則達之天下周旋無窮應氏曰大而百王百世質文損益之時小而一事一物泛應酬酢之節又曰五方皆有性千里不同風所以入國而必問俗也夫禮者所以定親疏決嫌疑别同異明是非也疏曰五服之内大功以上服麤者為親小功以下服精者為疏若妾為女君期女君為妾若服之則太重降之則有舅姑為婦之嫌故全不服是決嫌也孔子之喪門人疑所服子貢請若喪父而無服是決疑也本同今異姑姊妹是也本異今同世母叔母及子婦是也得禮為是失禮為非若主人未小斂子㳺裼裘而弔得禮是也曽子襲裘而弔失禮非也禮不妄説人不辭費集説曰求以説人已失處心之正況妄乎不妄説人則知禮矣躁人之辭多君子之辭達意則止言者煩聽者必厭禮不踰節不侵侮不好狎集説曰踰節則招辱侵侮則忘讓好狎則忘敬三者皆叛禮之事不如是則有以持其莊敬純實之誠而逺於耻辱矣修身踐言謂之善行行修言道禮之質也註曰言道言合於道也熊氏曰人能修身踐言則慥慥篤實謂之善行既行修言道忠信立矣是禮之本也禮聞取於人不聞取人禮聞來學不聞往教朱子曰此與孟子治人治於人食人食於人語意相類取於人者為人所取法也取人者人不來而我引取之也來學往教即其事也道徳仁義非禮不成集説曰道猶路也事物當然之理人所共由故謂之道行道而有得於身故謂之徳仁者心之徳愛之理義者心之制事之冝熊氏曰非禮則無以歛心閑欲而底於純熟故不成教訓正俗非禮不備集説曰立教於上示訓於下皆所以正民俗然非齊之以禮則或有教訓所不及者故非禮不備分爭辨訟非禮不決朱子曰爭見於事而有曲直分爭則曲直不相交訟形於言而有是非辨訟則是非不相敵禮所以正曲直明是非故此二者非禮則不能決君臣上下父子兄弟非禮不定集説曰一主於義一主於恩恩義非禮則不能定宦學事師非禮不親集説曰宦仕也仕與學皆有師事師所以明道也而非禮則不相親愛班朝治軍涖官行法非禮威嚴不行熊氏曰班列朝廷之位整治軍旅之事臨涖當官布施法令威則人不敢犯嚴則人不敢違非禮則姑息無斷故威嚴不行禱祠祭祀供給鬼神非禮不誠不莊疏曰求福曰禱得求曰祠牲幣之屬以供給鬼神熊氏曰非禮則内無誠敬外不恭莊坡謂七者之序自道徳至不決三者以修已治人之道言也自君臣至不行三者以事上臨下言也末及祭祀自人以及神也先盡其道則冝於上下協於人神矣是以君子恭敬撙節退讓以明禮集説曰是以承上文而言撙裁抑也禮主其減熊氏曰恭敬以明禮之不容慢撙節以明禮之不容侈退譲以明禮之不容傲鸚鵡能言不離飛鳥猩猩能言不離禽獸今人而無禮雖能言不亦禽獸之心乎夫惟禽獸無禮故父子聚麀集説曰鸚鵡鳥之慧者隴蜀嶺南皆有之猩猩人面豕身出交趾封谿等處禽者鳥獸之總名鳥不可曰獸獸亦可曰禽故鸚鵡不曰獸而猩猩則通曰禽也聚猶共也獸之牝者曰麀是故聖人作為禮以教人使人以有禮知自别於禽獸朱子曰聖人作絶句大上貴徳其㳄務施報禮尚往來往而不來非禮也來而不往亦非禮也集説曰太上帝皇之世但貴其徳足以及人不貴其報其㳄三王之世禮至三王而備故以施報為尚人有禮則安無禮則危故曰禮者不可不學也集説曰禮者安危之所係自天子至於庶人未有無禮而安者也夫禮者自卑而尊人雖負販者必有尊也而況富貴乎註曰負販者尤輕佻志利冝若無禮焉富貴而知好禮則不驕不滛貧賤而知好禮則志不懾馬氏曰富貴之所以驕滛貧賤之所以懾怯以内無素定之分而與物為輕重也好禮則有得於内而在外者莫能奪矣人生十年曰㓜學二十曰弱冠三十曰壯有室四十曰强而仕五十曰艾服官政六十曰耆指使七十曰老而傳八十九十曰耄七年曰悼悼與耄雖有罪不加刑焉百年曰期頥朱子曰十年曰㓜為句絶學字自為一句下至百年曰期皆然吕氏曰五十曰艾髪之蒼白者如艾之色也古者四十始命之仕五十始命之服官政仕者為士以事人治官府之小事也服官政者為大夫以長人與聞邦國之大事者也才可用則使之仕徳成乃命為大夫也耆至也至老之境也不自用力指事使人故曰指使傳謂傳家事於子也耄惛忘也悼憐愛也耄者老而知已衰悼者㓜而知未及雖或有罪情不出於故故不加刑人壽以百年為期故曰期飲食居處動作無不待於養故曰頥大夫七十而致事疏曰致所掌職事還君也七十耳目不聰明是以退老去辟賢也所以長㢘逺耻若不得謝則必賜之几杖集説曰不得謝謂君不許其致仕也如辭謝代謝亦皆却而退去之義几所以馮杖所以倚賜之使自安適也行役以婦人適四方乘安車疏曰行役謂本國巡行役事婦人能養人故許自隨也古者四馬之車立乘安車者一馬小車坐乘也此養老之具在國及出皆得用之今言行役婦人四方安車則相互也自稱曰老夫於其國則稱名註曰老夫老人稱也亦明君貪賢春秋傳曰老夫耄矣疏曰於其國謂自與其君言也越國而問焉必告之以其制疏曰他國來問政冝問於老賢老賢則稱國之舊制以告之熊氏曰禮自有舊制文獻所傳是也謀於長者必操几杖以從之長者問不辭譲而對非禮也集説曰謀於長者謂往就長者而謀議所為也長者之前當執謙虚不辭譲非事長之禮應氏曰操几杖以從非謂長者所無也執弟子之役其禮然耳凡為人子之禮冬温而夏凊昏定而晨省在醜夷不爭註曰安定其牀衽也省問其安否何如醜衆也夷猶儕也疏曰貴賤相臨則有畏憚朋儕等輩喜爭勝負忘身及親故冝戒之不爭夫為人子者三賜不及車馬註曰三事三命也凡仕者一命而受爵冄命而受衣服三命而受車馬車馬而身所以尊者備矣不受不敢以成尊比踰於父疏曰言夫者貴賤悉然也命是榮美光顯祖父故受也車馬是安身身安不闗先祖故不受也不云不受而云不及者明人子非惟外迹不受抑亦心所不及於此賜也故州閭鄉黨稱其孝也兄弟親戚稱其慈也僚友稱其弟也執友稱其仁也交逰稱其信也註曰周禮二十五家為閭四閭為族五族為黨五黨為州五州為鄉僚友官同者執友志同者疏曰慈者篤愛之名弟者事長㳄第之名坡謂兄弟以慈相望僚友以㳄相序執友以仁相朂交逰以信相資人能孝則於此四者行之各當其分故隨所得而稱之州閭廣言自兄弟以下則以親疏邇逖為序見父之執不謂之進不敢進不謂之退不敢退不問不敢對此孝子之行也註曰敬父同志如事父疏曰見或故往見或路中相見也夫為人子者出必告反必面所逰必有常所習必有業集説曰出則告違反則告歸又以自外來冝知親之顔色安否故言面逰有常必有方也習有業不惰游也恒言不稱老疏曰若其稱老乃是自尊大非孝子卑退之情且自稱老父母則甚老恐感動其親故舜五十而慕是也年長以倍則父事之十年以長則兄事之五年以長則肩隨之註曰肩隨者與之並行差退疏曰此謂鄉里之中非親非友但二十以後年長倍已則以父道事之羣居五人則長者必異席疏曰古者地敷横席而容四人則推長者居席端若五人㑹應一人别席因推長者一人於異席也此羣居之法若賔主禮席皆無同坐之法為人子者居不主奥註曰室中西南隅謂之奥坐不中席疏曰共坐則席端為上獨坐則席中為尊行不中道疏曰男女各路路各有中也立不中門註曰中門謂棖闑之中央坡案註疏此四者皆謂與父同宫者也或異居禮則不然食饗不為槩集説曰食饗如奉親延客及祭祀之類皆是不為槩量順親之心而不敢自為限節也祭祀不為尸註曰尊者之處為其失子之道然則尸卜筮無父者聽於無聲視於無形疏曰雖聽而不聞父母之聲雖視而不見父母之形然常於心想像似見形聞聲謂父母將有教使已然不登髙不臨深不苟訾不苟笑疏曰相毁曰訾彼雖有是非而已苟譏毁訾笑之皆非彼所欲必反見毁辱故孝子不為也孝子不服闇不登危懼辱親也註曰服事也不於闇冥之中從事為卒有非常且嫌失禮也男女夜行以燭吕氏曰登危者行險以徼幸也父母存不許友以死不有私財集説曰不許友以死謂不為其友報仇也親在而以身許人是有忘親之心親在而以財専已是有離親之志為人子者父母存衣冠不純素疏曰冠純冠飾也衣純深衣領縁也若仕者或遇凶荒雖親存亦須素服非要在親沒故不言凡孤子當室冠衣不純采註曰早喪親雖除喪不忘哀也謂年未三十者三十壯有室有代親之端不為孤也當室適子也疏曰崔云指謂當室不當室則純采幼子常視毋誑集説曰視與示同常示之以不可欺誑所以習其誠童子不衣裘裳立必正方不傾聽疏曰童子體熱裘太温傷隂氣也又應給役若著裳則不便故並不著故童子並緇布襦袴也立必正向一方不得傾頭屬聽左右也此説其威儀常然長者與之提攜則兩手奉長者之手負劍辟咡詔之則掩口而對註曰習其扶持尊者提攜謂牽將行負謂置之於背劍謂挾之於旁辟咡詔之謂傾頭與語口旁曰咡疏曰辟傾也掩口恐氣觸長者從於先生疏曰凡言先生謂年徳俱髙又教道於物者凡云長者直以年為稱也凡為君子者皆為有徳尊之不據年之長幼不越路而與人言註曰尊不二也遭先生於道趨而進正立拱手註曰為有教使先生與之言則對不與之言則趨而退熊氏曰不與言則退承意而不敢隨行也從長者而上邱陵則必鄉長者所視登城不指城上不呼集説曰髙而有向背者為邱平而人可陵者為陵鄉長者所視恐有問則即所見以對也城人所恃以為安固者有所指則惑見者有所呼則駭聞者將適舍求毋固註曰謂行而就人舘固猶常也求主人物不可以舊常或時乏無周禮土訓辨地物原其生以詔地求其類將上堂聲必揚户外有二屨言聞則入言不聞則不入集説曰上堂升主人之堂也揚其聲者使内人知之也古人脱屨在户外客雖衆脱屨於户内者惟長者一人言有二屨則并户内一屨為三人矣三人而所言不聞於外必是宻謀故不入也將入户視必下入户奉扃視瞻毋回户開亦開户闔亦闔有後入者闔而勿遂集説曰入户入主人之户也視下不舉目也扃門闗木也入户之時兩手當心如奉扃然雖視瞻而不為迴轉嫌於千人之私也開闔皆如前不違主人之意也遂闔之盡也嫌於拒後來者故勿遂毋踐屨毋踖席摳衣趨隅必慎唯諾疏曰踐蹋也不得蹋先入者屨踖猶躐也席有上下將就坐當從下而升當已位上不發初從上從上為躐席也既不踖席當兩手提裳之前向席下角升就坐也既坐定又慎於應對大夫士出入君門由闑右不踐閾註曰闑門橛也閾門限也疏曰門以向堂為正右在東主位在門東客位在門西大夫士是臣臣統於君不敢自由賔故恒從闑東也履閾一則自髙二則不淨並為不敬凡與客入者每門譲於客客至於寢門則主人請入為席然後出迎客客固辭主人肅客而入疏曰每門者天子五門諸侯三門大夫二門譲於客欲客先入也主人嚮已正席今客至寢門方請入敷席者一則自謙示不敢逆設席以招賢也二則慎重更冝親之固如故也禮有三辭初曰禮辭再曰固辭三曰終辭客再辭不先入也肅進也謂先導之公食大夫禮云公揖入賔從是也主人入門而右客入門而左主人就東階客就西階客若降等則就主人之階主人固辭然後客復就西階集説曰入右所以趨東階入左所以趨西階降等者其等列卑於主人也主人固辭者不敢當客之尊已也主人與客譲登主人先登客從之疏曰譲必以三先登亦肅客之義不言三者畧可知也拾級聚足連步以上上於東階則先右足上於西階則先左足註曰拾當為涉聲之誤也級等也涉登聚足謂前足躡一等後足從之併連步謂足相随不相過也先右先左近於相鄉敬帷薄之外不趨註曰不見尊者行自由不為容也入則容行而張足曰趨疏曰帷幔也薄簾也禮天子外屏諸侯内屏卿大夫以簾士以帷臣來朝君至屏而加敬屏外不敬故不趨今言帷薄謂士大夫也堂上不趨註曰堂上謂其迫也堂下則趨執玉不趨疏曰執玉湏慎不論堂上下皆不趨堂上接武堂下布武室中不翔註曰武迹也迹相接謂每移足半躡之中人之迹尺二寸布武謂每移足各自成迹不相躡室中又為其迫也行而張拱曰翔並坐不横肱授立不跪授坐不立集説曰横肱則妨並坐者不跪不立皆謂不便於受者凡為長者糞之禮必加帚於箕上註曰如是得兩手奉箕恭也謂初執而往是也弟子職曰執箕膺擖厥中有帚以袂拘而退其塵不及長者註曰謂掃時也以袂擁帚之前掃而郤行之以箕自鄉而扱之註曰扱讀曰吸謂收糞時也箕去棄物以向尊者則不恭疏曰初持箕往時帚置箕上兩手舉箕當埽時一手捉帚舉一手衣袂以拘障於帚前且掃且遷故云拘而退扱斂取也以箕自向斂取糞穢不以箕向尊者奉席如橋衡集説曰如橋之髙如衡之平乃奉席之儀也請席何鄉請衽何趾疏曰席坐席也鄉面也衽卧席也趾足也坐為陽面亦陽也卧為隂足亦隂也故所請不同席南鄉北鄉以西方為上東鄉西鄉以南方為上疏曰凡坐隨於隂陽若坐在陽則貴左坐在隂則貴右南坐是陽其左在西北坐是隂其右亦在西也俱以西方為上坐在東方西鄉是在陽坐在西方東鄉是在隂俱以南方為上亦是坐陽上左坐隂上右坡謂鄉飲酒禮云主席阼階上西面介席西階上東面記謂主介凡升席自北方降由南方註云升由下降由上與此同惟賔席牖前南面以西方為下疏云東上統於主人燕禮公席阼階西北面東上統於君與此異若非飲食之客則布席席間函丈註曰謂講問之客也函猶容也講問冝相對容丈足以指畫也飲食之客布席於牖前疏曰古者飲食燕享則賔位在室外牖前列席南向不相對相對者惟講説之客席之制三尺三寸三分寸之一則兩席并中間空地共一丈也主人跪正席客跪撫席而辭客徹重席主人固辭客踐席乃坐集説曰跪而正席敬客也撫以手按止之也客不敢居重席故欲徹之主人固辭則止客踐席將坐主人乃坐也主人不問客不先舉集説曰席坐既定主人以客自外至當先有所問客乃答之客不當先舉言也將即席容毋怍兩手摳衣去齊尺衣毋撥足毋蹶劉氏曰兩手摳揭衣之兩旁使下齊離地一尺而坐以便起居免有躡躓失容也坐後更須整疊前面衣衽毋使撥開又古人以膝坐乆則膝不安而易以蹶動坐而足動亦為失容故戒以毋動也管寜坐席嵗乆惟兩膝著處穿是足不動故然耳坡謂容毋怍言將就席顔色宜莊或佯傲或急惶皆怍也先生書䇿琴瑟在前坐而遷之戒勿越疏曰坐亦跪也弟子將行若遇師諸物或當已前則跪而遷移之戒慎不當踰越虚坐盡後食坐盡前坐必安執爾顔長者不及毋儳言註曰盡後謙也盡前為汙席儳猶暫也非類雜疏曰坐必安者凡坐好自摇動故戒之必安執守也乆坐好異故必戒之冝如向者無怍顔容也長者正論事未及他事少者不得輒以它事暫然雜錯師長之説正爾容聽必恭毋勦説毋雷同必則古昔稱先王集説曰上言執爾顔謂顔色無或變異此言正爾容則正其一身之容貌也聽必恭亦謂聽長者之言也擥取他人之説以為已説謂之勦説聞人之言而附和之謂之雷同如雷之發聲而物同應之也雖不勦説雷同亦不得専輒必法則古昔稱述先王言有據依乃為善耳侍坐於先生先生問焉終則對集説曰問終而後對欲盡聞所問之㫖且不敢雜亂尊者之言也請業則起請益則起註曰尊師重道也起若今摳衣前請也業謂篇卷也益謂受説不了欲師更明説之父召無諾先生召無諾唯而起集説曰父以恩師以道故所敬同吕氏曰諾者許而未行也侍坐於所尊敬無餘席見同等不起集説曰所尊敬謂先生長者及有徳有位之人也無餘席謂已之席與尊者之席相近則坐於其端不使有空餘處近則應對審也同等之人與已無尊卑故不為之起燭至起食至起上客起集説曰燭至而起以時之變也食至而起以禮之行也上客至而起以其非同等也燭不見跋集説曰跋本也古者未有蠟燭以火炬照夜將盡則藏其所餘之殘本恐客見之以夜乆欲辭退也尊客之前不叱狗註曰主人於尊客之前不敢倦嫌若風去之疏曰卑客亦當然舉尊為甚讓食不唾集説曰嫌於似鄙惡主人之饌也侍坐於君子君子欠伸撰杖屨視日蚤莫侍坐者請出矣疏曰禮卑者賤者請進不請退退由尊者若君子志疲而欠體疲而伸君子杖在坐著屨升堂脱之在側倦則自撰持之或視庭影望日蚤晚為上諸事皆是尊者欲起之漸故侍坐者得請出矣侍坐於君子君子問更端則起而對註曰離席對敬異事也君子必令復坐侍坐於君子若有告者曰少閒願有復也則左右屏而待註曰復白也言欲須少空閒有所白也屏猶退也疏曰侍者各自屏退左右避之不得近也毋側聽毋噭應毋滛視毋怠荒集説曰上言聽必恭側耳以聽非恭也噭謂聲響髙急如呌之號呼也應答冝徐而和不得髙急也滛視流動邪眄也怠荒謂身體放縱不自拘斂也遊毋倨立毋跛坐毋箕寢毋伏集説曰遊行也倨傲慢也立當兩足整齊不可偏任一足箕謂兩展其足狀如箕舌也伏覆也斂髪毋髢疏曰髢髲也垂如髲也古人重髪以纚韜之不使垂冠毋免勞毋袒暑無褰裳集説曰免脱也冠當常著於首不可脫也有袒而露其裼衣者有袒而割牲者因勞事而袒則為䙝褰揭也涉淺而揭則可暑雖炎熱不得褰袪取涼疏曰諸事條目通誡為人之法也侍坐於長者屨不上於堂解屨不敢當階集説曰侍長者之坐於堂故不敢以屨升若長者在室則屨得上堂而不得入室户外有二屨是也解脫也屨有綦繫解而脫之不敢當階為妨後升者就屨跪而舉之屏於側疏曰此侍者或獨暫退時取屨法也就猶著也初升時解置階側今下著之先往階側跪舉取之故云就屨跪而舉之也屏於側者屏退也退不當階也鄉長者而屨跪而遷屨俯而納屨疏曰此明少者禮畢退去為長者所送則於階側跪取屨稍移之面向長者而著之遷徙也就階側跪取稍移近前也俯而納者既取因俯身向長者而納足著之不跪者跪則足向後不便故俯也雖不並跪亦坐左納右坐右納左離坐離立毋往參焉離立者不出中間疏曰離兩也若見二人併坐或併立既唯二人恐密有所論則已不得輒往參預之又若見二人併立當已行路則避之不得輒當其中間出也識與不識通如此也男女不雜坐不同椸枷不同巾櫛不親授集説曰内則註云植者曰楎横者曰椸枷與架同置衣服之具也巾以涚潔櫛以理髪此四者皆所以逺私䙝之嫌嫂叔不通問諸母不潄裳集説曰不通問無問遺之往來也諸母父妾之有子者潄浣也裳賤服不使潄裳敬父之道亦所以逺别也外言不入於梱内言不出於梱註曰内言外言男女之職也不出入者不以相問也梱門限也女子許嫁纓非有大故不入其門集説曰許嫁則繫以纓示有所繫屬也此與幼所佩香纓不同大故有災變若疾病姑姊妹女子子已嫁而反兄弟弗與同席而坐弗與同器而食集説曰女子子重言子者别於男子也専言兄弟者逺同等之嫌父子不同席集説曰尊卑之等異也男女非有行媒不相知名集説曰行媒謂媒氏之往來也名謂男女之名也非受幣不交不親註曰重别有禮乃相纒固熊氏曰非受聘禮之幣帛不得交際而相親故日月以告君疏曰婦來則書取婦之年月日時以告國君也齊戒以告鬼神註曰昏禮凡受女之禮皆於廟為神席以告鬼神謂此也為酒席以召鄉黨僚友以厚其别也註曰厚重慎也取妻不取同姓故買妾不知其姓則卜之註曰為其近禽獸也妾賤或時非媵取之於賤者世無本繫疏曰世無夲繫不知何姓之後但卜得吉者取之寡婦之子非有見焉弗與為友集説曰有見才能卓異也若非有好徳之實則難以避好色之嫌故取友者謹之賀取妻者曰某子使某聞子有客使某羞吕氏曰賀者以物遺人而有所慶也著代以為先祖後人子之所不得已故不用樂且不賀也然為酒食以召鄉黨僚友則遺問不可廢也故其辭曰聞子有客使某羞舍曰昏禮而謂之有客則所以羞者佐其供具之費而已非賀也作記者因俗之名稱賀貧者不以貨財為禮老者不以筋力為禮註曰禮許儉不非無也年五十始杖八十拜君命一坐冄至名子者不以國不以日月不以隠疾不以山川註曰此在常語之中為後難諱也春秋傳曰名終將諱之隠疾衣中之疾也謂若黒臀黒肱矣疾在外者雖不得言尚可指擿此則無時可避俗語云隠疾難為醫男女異長集説曰各為伯仲示不相干雜之義也男子二十冠而字集説曰冠而字之敬其名也父前子名君前臣名註曰對至尊無大小皆相名疏曰鄢陵之戰公陷于淖樂書欲載公鍼曰書退鍼是書子是於君前臣名其父也女子許嫁笄而字集説曰許嫁則十五而笄未許嫁則二十而笄亦成人之道也故字之凡進食之禮左殽右胾食居人之左羮居人之右膾炙處外醯醤處内蔥㳿處末酒漿處右以脯脩置者左胊右末註曰此大夫士與賔客燕食之禮其禮食則宜放公食大夫禮云疏曰脯訓始始作即成也脩亦脯脩訓治治之乃成薄析曰脯捶而施薑桂曰腶脩朐謂中屈也左朐朐置左也右末末邉際置右右手取祭擘之便也脯脩處酒左以燥為陽也集説曰肉帶骨曰殽純肉切曰胾骨剛故左肉柔故右殽在俎胾在豆飯在羮右分燥濕也膾炙異饌故在殽胾之外膾炙皆在豆醯醤食之主故在殽胾之内蔥㳿烝蔥亦菹類加豆也處醯醤之左言末者殊加也酒漿或酒或漿也處羮之右若兼設則左酒右漿客若降等執食興辭主人興辭於客然後客坐註曰辭者辭主人之臨已食若欲食於堂下然疏曰此降等謂大夫於卿故欲降而不降若臣於君則降也敵者全無降法詳在公食禮主人延客祭祭食祭所先進殽之序徧祭之集説曰古人不忘夲故得食而種出少許置於豆間之地以報先代始為飲食之人謂之祭延道之也若敵客則得自祭此卑者必主人先祭道之已乃從之祭食之禮主人所先進者則先祭之後進者後祭各以殽之㳄序而祭之徧也三飯主人延客食胾然後辯殽疏曰三飯謂三食也禮食三飱而告飽須勸乃更食三飯竟而主人乃導客食胾也公食大夫禮云賔三飯以湆醤鄭云毎飯歠湆以殽擩醤食正饌也所以至三飯後乃食胾者以胾為加故三飱前未食食胾之後乃可徧食殽也主人未辯客不虚口疏曰虚口謂食竟而飲酒蕩口使清潔及安食也用漿曰潄以清潔為義用酒曰酳酳訓演演養其氣也主人恒譲客不自先飽故客待主人辯乃得為酳也此謂卑客耳敵客以上則不待主人也侍食於長者主人親饋則拜而食主人不親饋則不拜而食疏曰饋進饌也已雖侍尊長而主人若自親饋與己己則拜謝之而後食也共食不飽共飯不澤手疏曰非禮食則有同器食法共食宜謙不輒厭飫為飽也共飯亦共器盛飯也古禮飯不用箸但用手澤謂摩挲也不澤手恐為人穢也毋摶飯毋放飯毋流歠集説曰毋摶者疏云若取飯作摶則易得多是欲争飽也朱氏曰放謂食之放肆而無節也流謂飲之流行而不知止也毋咤食毋齧骨毋反魚肉毋投與狗骨毋固獲集説曰咤食疏謂以舌口中作聲似若嫌主人之食也毋齧嫌其聲之聞也毋反魚肉不以所餘反於器註云謂已歴口人所穢也毋投與狗骨不敢賤主人之物也求之堅曰固得之難曰獲固獲謂必欲取之也毋揚飯飯黍毋以箸集説曰揚謂以手散其熱氣嫌於欲食之急也毋以箸當用匕也毋嚃羮毋絮羮毋刺齒毋歠醢客絮羮主人辭不能亨客歠醢主人辭以窶集説曰羮之有菜宜用梜不宜以口嚃取食之也絮就器中調和也口容止不宜以物刺於齒也醢宜鹹歠之以其味淡也客或有絮羮者則主人以不能烹飪為辭或有歠醢者則主人以貧窶乏味為辭濡肉齒決乾肉不齒決毋嘬炙疏曰火灼曰炙若食炙不一舉而併食併食之曰嘬是貪食也集説曰濡肉殽胾之類乾肉脯脩之類決斷也不齒決則當治之以手也卒食客自前跪徹飯齊以授相者主人興辭於客然後客坐集説曰自從也齊醤屬也飯齊皆主人所親設故客欲親徹相者主人贊饌者坡謂公食大夫賔卒食坐取粱與醤以降奠于階西大夫相食卒食徹于西序端皆親徹也疏云敵者則否恐非侍飲於長者酒進則起拜受於尊所長者辭少者反席而飲長者舉未釂少者不敢飲集説曰尊所置尊之所也飲盡爵曰釂吕氏曰古之飲酒貴賤長幼無不及鄉飲之禮堂下之賔樂工及笙無不與獻特牲饋食禮賔兄弟弟子公有司私臣無不與獻其獻也皆主人親酌授之此侍飲者亦長者親酌授之所以有拜受于尊所之節也惟燕禮以宰夫為獻主故君不親酌鄉飲射饋食禮皆尊于房户之間賔主共之也燕禮大射皆尊于東楹之西尊面向君君専之也燕禮鄉飲禮皆不云拜受於尊所以禮與侍飲異也長者賜少者賤者不敢辭集説曰辭而後受賔主平交之禮非少賤事尊貴之道賜果於君前其有核者懐其核集説曰敬君賜故不敢棄核御食於君君賜餘器之溉者不冩其餘皆冩集説曰御食於君者君食而臣為之勸侑也君以食之餘者賜之若陶器或木器可以洗滌者則即食之或其器是萑竹所織不可洗滌者則傳冩於他器而食之不欲口澤之瀆也餕餘不祭父不祭子夫不祭妻集説曰尸餕鬼神之餘臣餕君之餘賤餕貴之餘下餕上之餘皆餕也此謂助祭執事或為尸而所得餕之餘肉以歸則不可以之祭其先雖父之尊亦不以祭其子夫之尊亦不以祭其妻以食餘之物䙝也御同於長者雖貳不辭偶坐不辭集説曰御侍也貳益物也侍食者雖獲殽饌之重而不辭其多者以此饌本為長者設耳偶者配偶之義因其有賔而已亦偶配於坐亦以此席不専為己設故不辭也羮之有菜者用梜其無菜者不用梜註曰梜箸也疏曰有菜謂鉶羮是也無菜謂大羮湆也直歠之而已為天子削瓜者副之巾以絺為國君者華之巾以綌為大夫累之士疐之庶人齕之疏曰削刋也副析也絺細葛也刋其皮而析為四解又横解而以細葛巾覆之而進也華半破也綌麤葛也諸侯禮降故破而不四析亦横斷之用麤葛巾覆之而進也爾雅瓜曰華之郭璞云食啖治擇之名累倮也不巾覆猶中裂而横斷之疐謂脱花處士不半破但除疐而横斷亦不覆也庶人府史之屬齕齧也齕之不横斷也此等級不同非謂平常之日當是公庭禮㑹之時劉氏曰大夫以上皆曰為者有司為之也士庶人不曰為者自為之也父母有疾冠者不櫛行不翔言不惰琴瑟不御食肉不至變味飲酒不至變貌笑不至矧怒不至詈疾止復故集説曰此言養父母疾之禮不櫛不為飾也不翔不為容也不惰不及他事也疏謂惰訛不正之言琴瑟不御以無樂意也猶可食肉但不至厭飫而口味變耳猶可飲酒但不至醺酣而顔色變耳齒本曰矧笑而見矧是大笑也怒罵曰詈怒而至詈是甚怒也皆為忘憂故戒之復故復常也有憂者側席而坐有喪者専席而坐集説曰有憂謂親疾或他禍患側獨也獨坐一席不設待賔之席為有憂也一説側席謂偏設之變於正席也亦通専单也吉時貴賤有重席之禮若父母始䘮寢苫無席卒哭後乃有苄剪不納自齊衰而下始䘮而有席並不重水潦降不獻魚鼈集説曰水涸魚鼈易得不足貴故不獻獻鳥者佛其首畜鳥者則勿佛也集説曰佛謂捩轉其首恐其喙之害人也畜者不然畜則馴也獻車馬者執䇿綏疏曰䇿是馬杖綏是上車之繩車馬不上於堂但執䇿綏呈之則知有車馬獻甲者執胄獻杖者執末疏曰甲鎧也胄兠鍪也鎧大兠鍪小小者易舉執以呈之耳杖末拄地不浄故執以自向獻民虜者操右袂集説曰民虜征伐所俘獲之人口也持其右袂所以防異心獻粟者執右契獻米者操量鼓疏曰契者兩書一札同而别之右者先書為尊鼓量器名也東海樂浪人呼容十二斛為鼓米云量則粟亦量粟云契則米亦書但米可即食為急故言量粟可乆儲為緩故云書書比量為緩也獻孰食者操醤齊疏曰醤齊為食之主執主來則食可知如見芥醤必知獻魚膾之類獻田宅者操書致疏曰書致謂圗書於板而致之於尊者也然古者田宅悉為官所賦本不屬民今得此田宅獻者是或有重勲為君王所賜可為己有故得有獻凡遺人弓者張弓尚筋弛弓尚角右手執簫左手承弣尊卑垂帨若主人拜則客還辟辟拜集説曰弓之體角内而筋外尚使之在上也皆取其勢之順也簫稍末也疏云弓頭頭稍剡差斜似簫故名弣中央把處也帨佩巾也客主尊卑相等則授受之際皆稍磬折而見其帨之垂也此時弓尚在客手故不容答主人之拜而少逡巡遷延以避之辟猶開也謂離其所立之處主人自受由客之左接下承弣鄉與客並然後受集説曰自受者以敵客不當使人受也由從也從客左邉而受則尊客在右矣於是卻左手接客左手之下而承弣又覆右手以捉弓之下頭而受之是主客授受皆卻左手承弣覆右手執簫也此時則主客並立而俱向南也方氏曰賔主異等則授受異向此賔主敵故鄉與客並也進劔者左首疏曰進亦遺也首劒拊環也客在右主人在左劒首為尊以尊處與主人也假令對授則亦左首首尊左亦尊為宜也進戈者前其鐏後其刄疏曰戈鉤孑㦸也刄當頭而利鐏在尾而鈍不以刄授敬也進矛㦸者前其鐓疏曰矛如鋋而三㢘㦸今之㦸也鐓為矛㦸柄尾平底以平向人敬也亦應並授不云左右而云前後者互文也若相對則前後也若並授則左右也進几杖者拂之集説曰拭去塵也效馬效羊者右牽之集説曰效陳獻也以右手牽之為便效犬者左牽之集説曰以右手防其齧噬執禽者左首集説曰禽鳥也首尊主人在左故横捧而以首授主人飾羔鴈者以繢註曰繢畫也諸侯大夫以布天子大夫以畫疏曰飾覆之也畫布為雲氣以覆羔與鴈為飾以相見也受珠玉者以掬陸氏曰兩手曰掬受弓劔者以袂集説曰謂以衣袂承接之不露手也飲玉爵者弗揮集説曰謂不可振去餘瀝恐失墜凡以弓劔苞苴簞笥問人者操以受命如使之容疏曰苞者苞裹魚肉之屬苴者以草藉器而貯物也簞圜笥方皆竹器問者或自有事問人或聞彼有事而問之問之悉有物表其意使者受命之時操持諸物即習其威儀進退如至彼國之儀容也凡為君使者已受命君言不宿於家疏曰聘禮既受命遂行舍于郊是也君言至則主人出拜君言之辱使者歸則必拜送於門外註曰此謂國君問事於其臣疏曰出出門也送既出門則知迎亦出門也若使人於君所則必朝服而命之使者反則必下堂而受命註曰此臣有所告請於其君疏曰命言朝服則受亦朝服互文也去不下送反而下迎者尊君命也不出門者已使卑於君使也亦當拜之不言從上可知博聞强識而譲敦善行而不怠謂之君子集説曰博聞强識而譲所謂有若無實若虚者敦善行而不怠所謂孶孶為善者皆君子之道也君子不盡人之歡不竭人之忠以全交也吕氏曰盡人之歡竭人之忠皆責人厚者也責人厚而莫之應此交所以難全也歡謂好於我也忠謂盡心於我也好於我者望之不深盡心於我者不要其必至則不至於難繼也禮曰君子抱孫不抱子此言孫可以為王父尸子不可以為父尸為君尸者大夫士見之則下之君知所以為尸者則自下之尸必式乘必以几疏曰天子以下宗廟之祭皆用同姓之嫡為尸惟取孫列非己孫也天子祭天地社稷山川四方百物及七祀之屬皆有尸外神不問同姓異姓但卜之吉則可為尸祭勝國之社稷則士師為尸惟祭殤無尸吕氏曰抱孫不抱子舊禮語也祭必須尸尸必以孫今子孫行並皆幼弱則必抱孫為尸不得抱子為尸曽子問曰孫幼則使人抱之是也尸必以孫以招穆之同也古者致齊各於其家散齊亦猶出在路故有為尸下之禮大夫士言見君言知者葢君年或幼未能盡識有以告則下之尸不下君而式之者廟門之外尸尊未全不敢抗禮而答之故式之而已亢禮而答如在廟中主人拜無不答也古者車中立乘若平常則馮較以式為敬式車前横木也馮之以禮人首必小俛以是為敬式視馬尾俯首之節也几尊者所馮以養安也故尸之乘車用之齊者不樂不弔吕氏曰古者之有敬事必齊齊者致精明之徳也樂則散哀則動皆有害於齊也居喪之禮毁瘠不形視聽不衰升降不由阼階出入不當門隧疏曰居䘮許羸瘦不許骨露見骨為形之主故謂骨為形阼階主人之階也在喪思慕猶若父在不忍從父阼階上下若祔祭以後即得升阼階吕氏曰先王制禮毁不滅性毁瘠形視聽衰幾於滅性送死之大事且將廢而莫之行則罪莫大焉門隧門之中道不由阼階不當門隧執人子之禮而未忍廢也居喪之禮頭有創則沐身有􅅑則浴有疾則飲酒食肉疾止復初不勝喪乃比於不慈不孝疏曰不勝喪結所以沐浴酒肉之義不勝喪謂疾不酒肉創瘍不沐浴毁而滅性者也不留身繼後是不慈滅性又是違親生時之意故云不孝集説曰沐浴與飲酒食肉以權制者也故疾止則復初五十不致毁六十不毁七十唯衰麻在身飲酒食肉處於内集説曰五十始衰故不極毁六十則又衰矣故不可毁七十之年去死不逺畧其居喪之禮者所以全其易盡之期也生與來日死與往日註曰此士禮貶於大夫者大夫以上皆以來日數集説曰與猶數也成服杖生者之事也數死之明日為三日斂殯死者之事也從死日數之為三日是三日成服者乃死之第四日也知生者弔知死者傷知生而不知死弔而不傷知死而不知生傷而不弔註曰人恩各施於所知也弔傷皆謂致命辭也雜記曰諸侯使人弔辭曰寡君聞君之喪寡君使某如何不淑此施於生者傷辭未聞也説者有弔辭云皇天降災子遭羅之如何不淑此施於死者葢本傷辭辭畢退皆哭方氏曰不知生而弔之近於謟不知死而傷之近於偽弔喪弗能􅉠不問其所費問疾弗能遺不問其所欲見人弗能館不問其所舍集説曰以貨財助喪事曰􅉠此三事不能則皆不問者以徒問為可愧也賜人者不曰來取與人者不問其所欲朱子曰君子有守必將之以禮故不曰來取小人無厭必節之以禮故不問其所欲適墓不登壟助塟必執紼集説曰壟墳堆也登之為不敬紼引棺素執之致力也臨喪不笑集説曰以哀為主揖人必違其位註曰禮以變為敬望柩不歌入臨不翔當食不歎集説曰不歌與不笑義同臨哭也不翔不為容也唯食忘憂非嘆所也鄰有䘮舂不相集説曰五家為鄰相者以音聲相勸相葢舂人歌以助舂也里有殯不巷歌適墓不歌哭日不歌集説曰二十五家為里巷歌於巷也送喪不由徑送𦵏不辟塗潦臨喪則必有哀色執紼不笑集説曰不由徑不苟取其速也不避泥潦嫌於惮勞也臨樂不歎集説曰亦為非歎所也介胄則有不可犯之色註曰貌與事冝相配介甲也故君子戒慎不失色於人疏曰故君子二句并結前義上既言内外宜稱故君子接人凡所行用並使心色如一不得色違於心也集説曰此章自揖人必違其位當食不歎臨樂不歎介胄則有不可犯之色四句之外皆是凶事之禮節記者詳之如此國君撫式大夫下之大夫撫式士下之禮不下庶人註曰撫猶據也據式小俛崇敬也乘車必正立集説曰君與大夫或同途而出君過宗廟而式則大夫下車士於大夫猶大夫於君也庶人卑賤且貧富不同故經不言庶人之禮古之制禮者皆自士而始也先儒云其有事則假士禮而行之刑不上大夫集説曰大夫或有罪以八議定之議所不赦則受刑周官掌囚凡有爵者與王之同族奉而適甸師氏以待刑殺而此云不上大夫者言不制大夫之刑猶不制庶人之禮也刑人不在君側集説曰人君當近有徳者又以慮其怨恨而為變也閽弑餘祭刑人在側之禍也兵車不式武車綏旌徳車結旌疏曰兵車革路也尚武猛無推譲故不式武車亦革路也取其建戈刄即云兵車取其威猛即云武車也旌車上旗旛也尚威武故舒散若垂綏然玉金象木四路不用兵故曰徳車徳美在内不尚赫奕故纒結其旒於竿也史載筆士載言疏曰不言簡牘而曰筆者筆是書之主則餘載可知言謂盟㑹之辭舊事也必載之者或尋舊盟或用舊㑹之禮應須知之前有水則載青旌疏曰王行宜警備故前有變異則舉類示之青旌者青雀旌也青雀水鳥前有塵埃則載鳴鳶集説曰鳶鴟屬鴟鳴則風生風生則塵埃起前有車騎則載飛鴻疏曰軍前忽遥見彼人有多車騎則載此旌然古人不騎馬今言騎者當是周末禮集説曰鴻雁也雁飛有行列與車騎相似前有士師則載虎皮疏曰士師兵衆也虎威猛亦兵衆之象若見前有兵衆則舉虎皮於竿前有摯獸則載貔貅疏曰摯獸虎狼之屬貔貅是一獸豹屬亦有威猛舉此使衆知為備但不知為載其皮為畫其形耳行前朱鳥而後𤣥武左青龍而右白虎招搖在上急繕其怒集説曰行軍旅之出也朱鳥𤣥武青龍白虎四方宿名也以為旗章其旒數皆放之龍旗則九旒雀則七旒虎則六旒龜蛇則四旒也招搖北斗七星也居四方宿之中軍行法之作此舉之於上以指正四方使戎陣整肅也其怒士卒之怒也吕氏曰急迫之也繕言作而致其怒先儒改繕為勁似不必改進退有度左右有局各司其局疏曰進退有度者牧誓云不愆於六步七步乃止齊焉四伐五伐乃止齊焉一擊一刺為一伐少者四伐多者五伐又當止齊正行列也左右有局者局部分也軍之左右各有部分不相濫也各司其局者軍行須監領各有所司部分也父之讐弗與共戴天兄弟之讐不反兵交逰之讐不同國集説曰不反兵謂常以殺之之兵器自隨也吕氏曰殺人者死古今之達刑也殺之而義則無罪故令勿讐調人之職是也殺而不義則殺者當死宜告于有司而殺之士師之職是也二者皆無事乎復讐也然復讐之文雜見于經傳考其所以必其人勢盛緩則不能執故遇則殺之不暇告有司也父者子之天不能復父讐仰無以視乎皇天矣報之之意誓不與讐俱生此所以弗共戴天也四郊多壘此卿大夫之辱也地廣大荒而不治此亦士之辱也集説曰四郊者王城之外四面近郊五十里逺郊百里侯國亦各有四郊里數則各隨其地之廣狹而為逺近也壘者屯軍之壁卿大夫尊髙任當軍帥若有威徳則無敢見侵若尸禄素飱則冦戎充斥數戰郊坰故多壘土廣人稀荒穢不理此二者固皆卿大夫之責士卑不與謀國為君邑宰勸課耕稼故言亦士之辱臨祭不惰註曰為無神也祭服敝則焚之祭器敝則埋之龜筴敝則埋之牲死則埋之吕氏曰人所用則焚之焚之陽也鬼神所用則埋之埋之隂也凡祭於公者必自徹其俎疏曰此謂士助君祭也若大夫以上則君使人歸其俎若大夫以下自祭其廟則使人歸賔俎吕氏曰執臣子之敬毋敢視賔客故自徹其俎以出也卒哭乃諱禮不諱嫌名二名不偏諱集説曰𦵏而虞虞而卒哭凡卒哭之前猶用事生之禮故卒哭乃諱其名嫌名音同者不偏諱謂可單言逮事父母則諱王父母不逮事父母則不諱王父母註曰逮及也謂幼孤不及識父母恩不至於祖名孝子聞名心瞿諱之由心此謂庶人適士以上廟事祖雖不逮事猶諱祖君所無私諱註曰謂臣言於君前不避家諱大夫之所有公諱註曰避君諱也詩書不諱臨文不諱集説曰不因避諱而易詩書之文改行事之語葢恐有惑於學者有誤於承用也廟中不諱註曰為有事於髙祖則不諱曽祖以下尊無二也於下則諱上夫人之諱雖質君之前臣不諱也婦諱不出門大功小功不諱集説曰質猶對也夫人之諱婦之諱皆謂其家先世臣對君前則不諱夫人無二尊也婦人之諱如子諱母孫諱祖母門謂婦宫門婦家之諱但於婦宫中不言耳雜記母之諱宫中諱妻之諱不舉諸其側是也宫外則不諱故臣對君前不諱也大功以下恩輕服殺故亦不諱入禁而問禁入國而問俗入門而問諱馬氏曰問禁慮得罪於君也問俗慮得罪於衆也問諱慮得罪於主人也外事以剛日内事以柔日集説曰甲丙戊庚壬為剛乙丁己辛癸為柔先儒以外事為治兵然廵狩朝聘㑹盟之類皆外事也内事如宗廟之祭冠昏之禮皆是凡卜筮日旬之外曰逺某日旬之内曰近某日喪事先逺日吉事先近日疏曰今月下句筮來月上旬是旬之外日也主人告筮者云欲用逺某日此大夫禮士賤職䙝時至事暇可以祭則於旬初即筮旬内之日主人告筮者云用近某日天子諸侯有雜祭或用旬内或用旬外其辭皆與此同䘮事謂𦵏與二祥是奪哀之義非孝子所欲但不獲已故先從逺日而起示不宜急微伸孝心也吉事謂祭祀冠昏之屬少牢云若不吉則及逺日是先近日也曰為日假爾泰龜有常假爾泰筮有常卜筮不過三卜筮不相襲集説曰曰命辭也為字去聲讀為卜吉日故曰為日卜則命龜曰為日假爾泰龜有常筮則命蓍曰為日假爾泰筮有常假因也託也泰者尊上之辭有常言其吉凶常可憑信也此命蓍龜之辭不過三者一不吉至再再不吉至三終不吉則止而不行襲因也卜不吉則止不可因而更筮筮不吉則止不可因而更卜也龜為卜筴為筮卜筮者先聖王之所以使民信時日敬鬼神畏法令也所以使民決嫌疑定猶與也故曰疑而筮之則弗非也日而行事則必踐之疏曰説文猶獸名玃屬與亦獸名象屬二物皆進退多疑人之多疑惑者似之故謂之猶與踐履也王云卜得可行之日必履而行之吕氏曰凡常事卜不吉則不筮筮不吉則不卜獻公卜納驪姬不告公曰筮之此相襲也若大事則先筮而後卜洪範有龜従筮從或龜從筮逆龜筮並用也晉卜納襄王得黄帝戰阪泉之兆又筮之遇大有之暌亦龜筮並用也故知不相襲者非大事也信時日者卜筮而用之不敢改也敬鬼神者人謀非不足而猶求於鬼神知有所尊而不敢必也畏法令者人君法令有疑者決之卜筮則君且不敢専況下民乎嫌疑者物有二而相似也猶與者事有二而不決也如建都邑某地可都某地亦可都此嫌疑也如戰或曰可戰或曰不可戰此猶與也卜筮以決之定之此先聖王以神道設教也有疑而筮既筮而不信諏日而卜既卜而弗踐是為不誠不誠之人不能得之於人況可得於鬼神乎君車將駕則僕執䇿立於馬前集説曰此下言乘車之禮䇿馬杖也别有人牽馬駕車僕者執䇿立於馬前所以防奔逸也已駕僕展軨效駕集説曰已駕駕馬畢也軨車之轄頭車行由轄僕者展視軨徧即入而效白於君言車駕竟奮衣由右上取貳綏跪乘疏曰僕先出就車於車後自振其衣以去塵從右邉升上必從右者君位在左避君空位也貳副也綏登車索也有二正綏擬君之升副綏擬僕右之升僕先試車時君猶未出未敢依常而立所以跪而乘之以為敬執䇿分轡驅之五步而立疏曰轡御馬索也車一轅而四馬駕之中央兩馬夹轅者名服馬兩邉名騑馬亦曰驂馬詩云兩服上襄兩驂鴈行鴈行者言與中服相㳄序也毎一馬有兩轡四馬八轡以驂馬内轡繫於軾前其驂馬外轡并兩服馬各二轡六轡在手右手執杖以三轡置空手中以三轡置杖手中故云執䇿分轡也驅之者試驅行之也五步而立者跪而驅馬以行五步即止而僕倚立以待君出君出就車則僕并轡授綏左右攘辟疏曰君出就車則僕并六轡及䇿置右手中以左手取正綏授於君令登車於是左右侍駕陪位諸臣見車欲進行皆遷郤以避車使不妨車之行也車驅而騶至于大門君撫僕之手而顧命車右就車門閭溝渠必步疏曰車驅而騶者驅車而進則左右從者疾趨從車也撫按止也僕手執轡車行由僕君欲令駐車故抑止僕手也車上君在左僕人中央勇士在右既至大門方出履險阻恐有非常故囬命車右上車至門閭溝渠而必下車者是車右勇士之禮也一則君子不誣十室過門閭必式君式則臣當下也二則溝渠險阻恐有傾覆亦須下扶持之也僕不下者車行由僕僕下則車無御故不下也凡僕人之禮必授人綏若僕者降等則受不然則否集説曰凡為車之僕者必以正綏授人不但臣於君為然也若僕之等級卑下如士於大夫之類則授綏之時直受之而已無辭譲也非降等者則不受若僕者降等則撫僕之手不然則自下拘之集説曰降等者雖當受其綏然猶撫止其手如不欲其親授然然後受之亦謙譲之道也不降等者已雖不欲受而彼必授則郤手從僕手下而自拘取之也熊氏曰古者弟為師御幼為長御御者不必皆賤周禮諸僕皆用大夫士也客車不入大門婦人不立乘犬馬不上於堂馬氏曰客車不入大門所以敬主主人出大門迎之所以敬客故覲禮偏駕不入王門公食大夫禮賔乘車在大門外西方又覲禮云墨車龍旂以朝墨車得入大門但不得入廟門耳婦人乘安車故不立乘犬馬充庭實故不上堂以犬馬獻人則執緤靮而已以馬合幣則達珪而已奉馬而覲則授人而已皆不上堂之謂也故君子式黄髪下卿位入國不馳入里必式集説曰式黄髪敬老也下卿位敬大臣也禮君出則過卿位而登車入則未到卿位而下車入國不馳恐車馬躪轢人也十室猶有忠信二十五家之中豈無可敬之人故入里門必式所謂不誣十室也君命召雖賤人大夫士必自御之集説曰御讀為迓迎也自迎之所以敬君命介者不拜為其拜而蓌拜疏曰介甲鎧也朱子曰蓌猶言有所枝拄不利屈伸也祥車曠左乘君之乘車不敢曠左左必式疏曰祥猶吉也吉車謂生時所乘𦵏時用為魂車鬼神尚吉故𦵏魂乘吉車也車上貴左僕在右空左以擬神也王者五路玉金象木革王自乘一餘四路從行臣若乘此車不敢空左空左則似祥車凶也左必式者不敢自安故恒馮式乘車君皆在左若兵戎革路則君在中御者居左僕御婦人則進左手後右手疏曰僕在中婦人在左進左手持轡使身微相背逺嫌也御國君則進右手後左手而俯疏曰御君者禮以相向為敬故進右手既御不得常式故但俯俛而為敬國君不乘竒車車上不廣欬不妄指疏曰竒車竒邪不正之車盧氏云不如法者之車也不廣欬者似自驕矜又驚衆也不妄指者並為惑衆也立視五巂式視馬尾顧不過轂註曰立平視也疏曰巂規也車輪一周為一規乘車之輪髙六尺六寸徑一圍三得一丈九尺八寸五規為九十九尺六尺為步縂為十六步半在車上所視則前十六步半也馬引車其尾近車闌車上馮式下頭時不得逺矚但瞻視馬尾轂車轂也若轉頭不得過轂論語云車中不内顧是也國中以䇿彗䘏勿驅塵不出軌疏曰入國不馳故不用鞕䇿但取竹帶葉者為杖形如埽帚故云䇿彗微近馬體搔摩之䘏勿搔摩也軌車轍也行緩故塵埃不飛揚出軌外也朱子曰䇿彗疑謂䇿之彗若今鞕末韋帶耳國君下齊牛式宗廟大夫士下公門式路馬疏曰熊氏説此文誤當云國君下宗廟式齊牛乘路馬必朝服載鞭䇿不敢授綏左必式集説曰此言人臣習儀之節路馬君駕路車之馬也臣雖得乘之猶不敢慢既衣朝服又鞕䇿則但載之而不用皆敬也君升車則僕者授綏今臣以習儀而居左則自馭以行不敢使車右以綏授已也左必式者既在尊位當式以示敬步路馬必中道以足蹙路馬芻有誅齒路馬有誅集説曰步謂行步而調習之也必當路之中者以邉側卑䙝不敬或傾跌也蹙與蹴同芻草也齒評量年數也誅罰也馬氏曰察馬之力必以年數馬之年必以齒凡此戒其慢君物也先王制禮圖難於其易為大於其細凡以止邪於未形而已耳禮記述註卷一
