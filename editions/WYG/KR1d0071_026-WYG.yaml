body:
  text: 禮記述註卷二十六安溪李光坡撰深衣第三十九古者深衣蓋有制度以應規矩繩權衡短毋見膚長毋被土續衽鉤邊要縫半下集説曰朝服祭服喪服皆上衣下裳不相連此深衣衣裳相連被體深邃故名深衣制同而名異者有四焉純之以采曰深衣純之以素曰長衣純之以布曰麻衣著在朝服祭服之内曰中衣但大夫以上助祭用冕服自祭用爵弁服則以素為中衣士祭用朝衣則以布為中衣也皆謂天子之大夫與士也喪服亦有中衣檀弓云練衣黄裏縓緣是也但不得繼揜尺耳要縫七尺二寸比下齊之一丈四尺四寸為半之也玊藻云縫齊倍要是也楊氏曰深衣制度惟續衽鉤邊一節難考鄭註云續猶屬也衽在裳旁者也屬連之不殊裳前後也鄭意蓋言凡裳前三幅後四幅既分前後則其旁兩幅分開而不相屬惟深衣裳十二幅交列裁之皆名為衽所謂續衽者指在裳旁兩幅言之謂屬連裳旁兩幅不殊裳之前後也又衣圖云既合縫了又再覆縫方便于著以合縫者為續衽覆縫為鉤邊袼之髙下可以運肘袂之長短反詘之及肘帶下毋厭髀上毋厭脅當無骨者劉氏曰袼袖與衣接當腋下縫合處也運回轉也王藻云袂可以回肘是也肘臂中曲節袂袖也袼之髙下與衣身齊二尺二寸古者布幅亦二尺二寸而深衣裁身用布八尺八寸中屈而四疊之則正方袖本齊之而漸圓殺以至袪則廣一尺二寸故下文云袂圓應規也衣四幅而要縫七尺二寸又除負繩之縫與領旁之屈積各寸則兩腋之餘前後各三寸許續以二尺二寸幅之袖則二尺有五寸也然周尺二尺五寸不滿今舊尺二寸僅足齊手無餘可反屈也曰反屈及肘則接袖初不以一幅為拘矣凡經言短毋見膚長毋被土及袼可運肘袂反及肘皆以人身為度而不言尺寸者良以尺度布幅有古今之異而人身亦有大小長短之殊故也朱子云度用指尺中指中節為寸則各自與身相稱矣玊藻朝祭服之帶三分帶下紳居二焉而紳長制士三尺則帶下四尺五寸矣深衣之帶下不可厭髀骨上不可當脅骨惟當其間無骨之處則少近下也制十有二幅以應十有二月袂圜以應規曲袷如矩以應方負繩及踝以應直下齊如權衡以應平集説曰深衣之制衣四幅袂二幅裳六幅總十二幅也袷交領也衣領既交自有如矩之象踝足跟也衣之背縫及裳之中縫上下相接如繩之直故云負繩也下齊裳末緝處也欲其齊如衡之平故規者行舉手以為容負繩抱方者以直其政方其義也故易曰坤六二之動直以方也下齊如權衡者以安志而平心也五法已施故聖人服之故規矩取其無私繩取其直權衡取其平故先王貴之故可以為文可以為武可以擯相可以治軍旅完且弗費善衣之次也註曰心平志安行乃正或低或昂則心有異志者與疏曰所以袂圜中規者欲使行者舉手揖讓以為容儀也抱方領之方也以直其政解負繩以方其義解抱方也呂氏曰深衣之用上下不嫌同名吉凶不嫌同制男女不嫌同服諸侯朝朝服夕深衣大夫士朝元端夕深衣庶人吉服深衣而已此上下同也有虞氏深衣而養老將軍文子除喪受弔練冠深衣親迎女在途而壻之父母死深衣縞總以趨喪此吉凶男女之同也蓋簡便之服非朝祭皆可服之也方氏曰端冕必有敬色所以為文介胄則有不可辱之色所以為武端冕不可以為武介胄不可以為文兼之者惟深衣而已玉藻曰夕深衣深衣燕居之服也端冕雖所以修禮容亦有時而燕處則深衣可以為文矣介胄雖所以臨戎事亦有時而燕處則深衣可以為武矣雖可為文非若端冕可以視朝臨祭特可贊禮而為擯相而已雖可為武非若介胄可以臨衝特可運籌以治軍旅而已制有五法故曰完其質則布其色則白故曰弗費吉服以朝祭為上燕衣則居其次焉故曰善衣之次也具父母大父母衣純以繢具父母衣純以青如孤子衣純以素純袂緣純邊廣各寸半註曰尊者存以多飾為孝繢畫文也三十以下無父稱孤純謂緣之也緣袂謂其口也緣緆也縁邊衣裳之側廣各寸半則表裏共三寸矣惟袷廣二寸疏曰若父母無惟祖父母在亦當純以青廣各寸半者言純袂口及裳下之緆并純旁邊其廣各寸半投壺第四十陸曰鄭云投壺者主人與客燕飲講論才藝之禮别録屬吉禮亦實曲禮之正篇也皇云與射為類宜屬嘉禮或云宜屬賓禮也投壺之禮主人奉矢司射奉中使人執壺主人請曰某有枉矢哨壺請以樂賓賓曰子有㫖酒嘉肴某既賜矣又重以樂敢辭主人曰枉矢哨壺不足辭也敢固以請賓曰某既賜矣又重以樂敢固辭主人曰枉矢哨壺不足辭也敢固以請賓曰某固辭不得命敢不敬從註曰射人奉之者投壺射之類也其奉之西階上北面燕飲酒既脱屨升坐主人乃請投壺也否則或射所謂燕射也枉哨不正貌固之言如故也疏曰此篇投壺是大夫士禮大夫兕中士鹿中其中之形刻木為之狀如兕鹿而伏背上有圓圈以盛算主人奉矢在阼階上西面使人在司射西皆西階上北面諸侯相燕亦有投壺左傳云晉侯與齊侯燕投壺然則天子亦有之但古禮亡賓再拜受主人般還曰辟主人阼階上拜送賓般還曰辟疏曰賓於西階上北面再拜遙受矢也主人見賓拜乃般曲折還謂賓曰辟欲止賓之拜也於是賓主各來兩楹之間相就俱南面主人在東授賓矢還阼階上北面拜送矢也已拜受矢進即兩楹間退反位揖賓就筵集説曰主人拜送矢之後主人之贊者持矢授主人主人於阼階上受之而進就楹間視投壺之處所復退反阼階之位西向揖賓以就投壺之席也賓主之席皆南向間相去如射物司射進度壺間以二矢半反位設中東面執八算興疏曰司射於西階上於執壺之人處受壺乃東向來賓主筵前量度而置壺於賓主筵之南間以二矢半者投壺有三處室中堂上及庭中也日中則於室日晚則於堂太晚則於庭中各隨光明故也矢有長短亦隨地之廣狹室中狹矢長五扶堂上稍廣矢長七扶庭中太廣矢長九扶四指曰扶扶廣四寸五扶者二尺也七扶者二尺八寸也九扶者三尺六寸也矢雖有長短而度壺則皆使去賓主之席各二矢半也是室中去席五尺堂上去席七尺庭中則去席九尺也度壺畢仍還西階上之位而取中以進則設之既設中乃於中之西而東面手執八算而起亦實八算於中横委其餘於中西請賓曰順投為入比投不釋勝飲不勝者正爵既行請為勝者立馬一馬從二馬三馬既立請慶多馬請主人亦如之疏曰司射執八算起而告於賓曰投矢於壺以矢本入者乃名為入則為之釋算若以末入則不名為入亦不為之釋算也比頻也賓主要更遞而投不得以前既入而喜不待後人投之而已頻投頻投雖入亦不為之釋算也若投之勝者則酌酒以飲不勝者正爵即此勝飲不勝之爵也以其正禮故謂之正爵既行行爵竟也為勝者立馬者謂取算以為馬表其勝之數也謂算為馬者馬是威武之用投壺及射亦是習武故云馬也一馬從二馬者每一勝輒立一馬禮以三馬為成若専二馬則為一成但勝偶未必専頻得三若勝偶得二劣偶得一一既劣於二故徹取劣偶之一以足勝偶之二為三故云一馬從二馬若頻得三成或取彼足為三馬是其勝已成又酌酒以慶賀多馬之人也此告賓之辭其告主人亦此辭也故曰請主人亦如之又曰鄉射禮三耦先射賓主乃射以射禮重也此投壺不立三耦以投壺禮輕故也命弦者曰請奏貍首間若一大師曰諾註曰弦鼓瑟者也貍首詩篇名也今逸射義所云詩曰曾孫侯氏是也疏曰間若一者謂前後樂節中間疏數如一也按下有魯鼓薛鼓節亦有鼓以弦為重故特云命弦者鄉射至第三番乃用樂此發初則用樂者以禮輕主於歡樂故也左右告矢具請拾投有入者則司射坐而釋一算焉賓黨於右主黨於左集説曰主賓席皆南向則主居左賓居右司射告主賓以矢具又請更迭而投於是乃投壺也若矢入壺者則司射乃坐而釋一算於地司射東面立釋算則坐以南為右北為左也賓黨之算釋於司射之前稍南主黨之算釋於司射之前稍北已投者退各反位主黨於東賓黨於西卒投司射執算曰左右卒投請數二算為純一純以取一算為竒遂以竒算告曰某賢於某若干純竒則曰竒鈞則曰左右鈞註曰卒已也賓主之黨畢已投司射又請數其所釋左右算如數射算一純以取實於左手十純則縮而委之每委異之有餘則横諸純下一算為竒竒則縮諸純下兼斂左算實於左手一純以委十則異之其他如右獲畢則司射執竒算以告於賓與主人也若告云某賢於某者未斥主黨勝與賓黨勝與以勝為賢尚技藝也疏曰純全也二算合為一全地上取算之時一純則别而取之一算謂不滿純者竒隻也故云一算為竒以竒算告者竒餘也左右數鈞等之餘算手執之而告曰某賢於某若干純賢謂勝也勝者若有雙數則云若干純假令十算則云五純也竒則曰竒者假令九算則云九竒也鈞則曰左右鈞者鈞猶等也等則左右各執一算以告命酌曰請行觴酌者曰諾當飲者皆跪奉觴曰賜灌勝者跪曰敬養集説曰司射命酌酒者行罰爵酌者勝黨之子弟也既諾乃於西階上南面設豐洗觶升酌坐而奠於豐之上其當飲者跪取豐上之酒手捧之而言賜灌灌猶飲也謂蒙賜之飲也服善而為尊敬之辭也其勝者則跪而言敬以此觴為奉養也雖行罰爵猶為尊敬之辭以答賜灌之辭也坡謂在不勝之黨雖數中者亦飲罰爵但在勝黨雖不數中亦不飲蓋罰爵據一黨而言不計各人之中否也此大射禮賈疏云正爵既行請立馬馬各直其算一馬從二馬以慶慶禮曰三馬既備請慶多馬賓主皆曰諾正爵既行請徹馬疏曰請立馬者謂司射請辭馬各直其算一馬從二馬以慶是禮家陳事之言慶禮曰三馬既備請慶多馬者此還是司射請辭集説曰正禮罰酒之爵既行飲畢司射乃告賓主請為勝者樹立其馬直當也所立之馬各當其初釋算之前投壺與射禮皆三番而止每番勝則立一馬假令賓黨三番俱勝則立三馬或兩勝則立二馬其主黨但一勝立一馬即舉主之一馬益賓之二馬所以助勝者為樂也以慶謂以此慶賀多馬也飲慶爵者偶親酌不使子弟無豐飲正禮慶爵之後司射即請徹去其馬以投壺禮畢也禮畢則行無算爵算多少視其坐籌室中五扶堂上七扶庭中九扶算長尺二寸壺頸脩七寸腹脩五寸口徑二寸半容斗五升壺中實小豆焉為其矢之躍而出也壺去席二矢半矢以柘若棘毋去其皮集説曰算之多少視坐上之人數每人四矢亦四算也籌矢也扶與膚同室中五扶以下三句説見上疏脩長也實以小豆取其滑且堅呂氏曰棘柘之心實其材堅且重也毋去其皮質而已矣魯令弟子辭曰毋幠毋敖毋偝立毋踰言偝立踰言有常爵薛令弟子辭曰毋幠毋敖毋備立毋踰言若是者浮註曰弟子賓黨主黨年穉者也為其立堂下相䙝慢司射戒令之幠敖慢也偝立不正鄉前也踰言逺談語也常爵常所以罰人之爵也浮亦謂是也晏子春秋曰酌者奉觴而進曰君令浮晏子時以罰梁邱據疏曰幠亦敖也浮亦罰也鼓半魯鼓半薛鼓註曰此魯薛擊鼓之節也圜者擊鼙方者擊鼓古者舉事鼓各有節聞其節則知其事矣取半以下為投壺禮盡用之為射禮註曰投壺之鼓半射節者投壺射之細也射謂燕射司射庭長及冠士立者皆屬賓黨樂人及使者童子皆屬主黨註曰庭長司正也使者主人所使薦羞者樂人國子能為樂者此皆與於投壺疏曰冠士者謂外人來觀投壺成人加冠之士尊之故令屬賓黨若童子賤則屬主黨也坡謂既令則奏鼓以投是同節事至分别賓主黨是補足文後方及之古經古文如此甚多石梁王氏必欲移司射至主黨二十四字於若是者浮之下無説今仍從古本魯鼓半薛鼓半註曰此二者記兩家之異故兼别之坡謂上魯則圜十三方十薛則圜十六方十二此則魯圜十四方七薛則圜二十一方十不與上圖同故註云儒行第四十一坡謂夫子説儒凡十七條第一第二第三正言篤學立誠修已之事第四言其有養第五第六第七言其有立第八第九言其仕也第十第十一第十二言其樂善尊賢第十三言以道事君第十四言雖欲仕而不枉道第十五言雖好善而必慎交第十六則歸本於仁以見儒之百行萬善皆所以求仁也第十七則素位自得而正已不失儒行完矣魯哀公問於孔子曰夫子之服其儒服與孔子對曰丘少居魯衣逢掖之衣長居宋冠章甫之冠丘聞之也君子之學也博其服也鄉丘不知儒服註曰逢猶大也大掖之衣大袂襌衣也衣少所居之服冠長所居之冠是之謂鄉言不知儒服非哀公意不在於儒乃今問其服疏曰哀公應問儒行今乃問其服是意欲侮戲夫子故下文云不敢以儒為戲明此時意以為戲也哀公曰敢問儒行孔子對曰遽數之不能終其物悉數之乃留更僕未可終也哀公命席孔子侍曰儒有席上之珍以待聘夙夜强學以待問懐忠信以待舉力行以待取其自立有如此者集説曰卒遽而數之則不能終言其事詳悉數之非乆留不可僕臣之擯相者乆則疲倦雖更代其僕亦未可得盡言之也公於是命設席使孔子坐侍而言之吕氏曰席上之珍自貴而待賈者也儒者講學於閒燕從容乎席上而知所以自貴以待天下之用强學以待問懐忠信以待舉力行以待取皆我自立而有待也德之可貴者人必禮之學之博者人必問之忠信可任者人必舉之力行可使者人必取之故君子之用於天下有所待而不求焉儒有衣冠中動作慎其大讓如慢小讓如偽大則如威小則如愧其難進而易退也粥粥若無能也其容貌有如此者疏曰庾云讓大物不受拒於人如似傲慢讓小物之時初讓後受如似偽然有大事形貌似有所畏行小事形貌似有所慚如威如愧皆謂慎重自貶損方氏曰衣冠中者言衣之在身冠之在首皆中於禮也動作慎者言心之所動事之所作皆慎其德也大讓所以自抗故如慢而不敬小讓所以致曲故如偽而不誠三揖而後進故曰難進一辭而遂退故曰易退粥粥者柔弱之狀故若無能也是皆禮之所修道之所與也儒有居處齊難其坐起恭敬言必先信行必中正道塗不爭險易之利冬夏不爭隂陽之和愛其死以有待也養其身以有為也其備豫有如此者註曰齊難齊莊可畏難也行不爭道止不選處所以逺鬭訟劉氏曰不爭非特恕也亦以愛死養身以有待有為不爭小者近者以害大者逺者也熊氏曰儒有居處齊莊畏難而不敢忽坐起恭敬而不敢慢言必先之以忠信則無偽言行必極其中正則無邪行所謂敬以持已也不居已於易而居人於險是不爭險易之利冬不専陽夏不専隂是不爭隂陽之和所謂恕以及物也恕以懲忿則無忘身之患是謂愛惜其死欲以有待而當天下之變也敬以立德則有自修之功是謂保養其身欲以有為而任天下之重也敬恕於平日而有待有為於方來可謂備之豫矣坡謂首節言學問次節言處已此節言為人其誠一致也儒有不寳金王而忠信以為寳不祈土地立義以為土地不祈多積多文以為富難得而易禄也易禄而難畜也非時不見不亦難得乎非義不合不亦難畜乎先勞而後禄不亦易禄乎其近人有如此者疏曰非道之世則不仕是難得也先事後食是易禄也無義則去是難畜也熊氏曰忠信則德可貴故以為寳立義則所行光明正大隨所處而咸宜故以為土地多文則所學充滿積實而道義有餘故以為富坡謂不惟易禄為近人也金玊三者人之所爭儒者不然而惟汲汲於自修凡有秉彛者之所誠服也近人孰甚焉儒有委之以貨財淹之以樂好見利不虧其義刼之以衆沮之以兵見死不更其守鷙蟲攫搏不程勇者引重鼎不程其力往者不悔來者不豫過言不再流言不極不斷其威不習其謀其特立有如此者註曰淹謂浸漬之刼脅也沮謂恐怖之也鷙蟲猛鳥猛獸也程猶量也搏猛引重不量勇力堪之與否當之則往也來者不豫其所未見亦不豫備平行自若也不極不問所從出也疏曰樂好愛樂玩好也言儒者執持操行雖見貨財樂好之利不虧損己之義事苟且而愛也攫搏引鼎喻艱難之事言儒者見艱難之事遇則行之不豫度量也㫁絶也言不絶其威嚴容止常可畏也坡謂往者不悔不惟善不可退悔即有過亦改之則止故程子曰罪己責躬不可無然亦不當長留在心中為悔是也所謂無固也來者不豫無意必也不習其謀當機而言不豫習為詭隨與偏執也儒有可親而不可刼也可近而不可迫也可殺而不可辱也其居處不淫其飲食不溽其過失可微辨而不可面數也其剛毅有如此者疏曰溽之言欲也即濃厚也坡謂可親不可刼三句似重上刼之以衆三句意矣不淫不溽二句似複下一畝并日意矣微辨細核也面數明指也言其過失之小僅可細核而無可明指耳所以謂之剛毅也蓋非堅强不屈於欲則無由寡過如斯所謂自勝者强也諸解似失儒有忠信以為甲胄禮義以為干櫓戴仁而行抱義而處雖有暴政不更其所其自立有如此者註曰甲鎧胄兠鍪也干櫓小楯大楯也疏曰初言自立者謂强學力行而自修立也此自立者謂獨懐仁義忠信也呂氏曰忠信則不欺不欺者人亦莫之欺也禮者敬人敬人者人亦莫之侮也忠信禮義所以禦人之欺侮猶甲胄干櫓可以捍患也行則尊仁居則守義所以自信者篤雖暴政加之有所不變也自立之至者也坡謂委之以貨財節言不失已次節以接物言此節以處世言皆有立之事也儒有一畝之宮環堵之室蓽門圭窬蓬户甕牖易衣而出并日而食上答之不敢以疑上不答不敢以諂其仕有如此者疏曰一畝謂徑一步長百步也折而方之則東西南北各十步宫牆垣也牆方六丈環周迴也方丈為堵東西南北各一堵蓽門以荆竹織門也圭窬穿牆為之門旁小户也上鋭下方狀如圭蓬户編蓬為户也甕牖者牕牖圓如甕口也又云以敗甕口為牖易衣而出者合家共一衣出則更著之也并日而食者謂不日日得食或三日二日并得一日之食也上答之謂君應用其言不敢以疑謂竭心力不敢疑貳也言儒者仕官盡忠不敢以諂者不見使則宜靜黙不敢諂媚求進也儒有今人與居古人與稽今世行之後世以為楷適弗逄世上弗援下弗推讒諂之民有比黨而危之者身可危也而志不可奪也雖危起居竟信其志猶將不忘百姓之病也其憂思有如此者註曰稽猶合也古人與合則不合於今人也援猶引也取也推猶進也舉也危欲毁害之也起居猶舉事動作信讀如屈伸之伸疏曰楷法式也身可危而志不可奪者論語云守死善道是也坡謂雖危起居以身可危也竟信其志以志不可奪也志者何窮則獨善其身達則兼善天下之志也上節言仕之常此節言仕之變儒有博學而不窮篤行而不倦幽居而不淫上通而不困禮之以和為貴忠信之美優㳺之法慕賢而容衆毁方而瓦合其寛裕有如此者集説曰博學不窮温故知新之益也篤行不倦賢人可乆之德也幽居不淫窮不失義也上通不困達不離道也禮之體嚴而用貴於和忠信禮之質也故以忠信為美優㳺用之和也故以優㳺為法賢雖在所當慕衆亦不可不容汎愛衆而親仁亦是意也毁方而瓦合者陶瓦之事其初則圓剖而為四其形則方毁其圓以為方合其方而復圓蓋於涵容之中未嘗無分辨之意也故曰其寛裕有如此者葉氏曰自博學至不困皆所以為寛寛言其畜德也自禮之以和至瓦合皆所以為裕裕言其容德也儒有内稱不辟親外舉不辟怨程功積事推賢而進達之不望其報君得其志苟利國家不求富貴其舉賢援能有如此者疏曰君得其志謂此賢者輔助其君使君得遂其志也應氏曰程算其功積累其事不輕薦也下不求報於人上不求報於國儒有聞善以相告也見善以相示也爵位相先也患難相死也乆相待也逺相致也其任舉有如此者呂氏曰舉賢援能儒者所以待天下之士也任舉者所以待其朋友而已必同其好惡也故聞善相告見善相示必同其憂樂也故爵位相先患難相死彼雖居下不待之同升則不升彼雖䟽逺不致之同進則不進此任舉朋友加重於天下之士者義有厚薄故也坡謂博學不窮節泛言愛衆親仁次節言待天下士此節言待朋友皆好善事也儒有澡身而浴德陳言而伏靜而正之上弗知也麤而翹之又不急為也不臨深而為高不加少而為多世治不輕世亂不沮同弗與異弗非也其特立獨行有如此者熊氏曰儒者洗滌其私欲而澄湛其明德由是陳言而入告謀猷則順之於外若君過未形而潛消之是為静而正將見君日改過而不自知也麤顯也翹舉也君過已著則明諫之是謂顯而舉然亦緩而不至急遽也其行之髙不必臨深以相形而顯其為髙其文之多不必加少以相益而成其為多與其所可與不必同乎已也非其所可非不必異乎已也坡謂世治不輕者雖可有為之時不自輕喜事疏云常自重愛是也世亂不沮疏云道雖不行亦不沮壊己之本志也儒有上不臣天子下不事諸侯慎靜而尚寛强毅以與人博學以知服近文章砥厲廉隅雖分國如錙銖不臣不仕其規為有如此者集説曰慎靜者謹飭而不妄動守身之道也尚寛者寛裕以有容待人之道也强毅以與人不苟詭隨於人也知服知力行之要也博學知服即博文約禮之謂也逺於文則質勝而野近文章則亦不使文揜其質也砥厲亷隅者求切磋琢磨之益不刓方以為圓也算法十黍為絫十絫為銖二十四銖為兩八兩為錙言人君好賢雖分其國以禄賢者視之如錙銖之輕猶不臣不仕也其所謀度其所作為有如此者儒有合志同方營道同術並立則樂相下不厭乆不相見聞流言不信其行本方立義同而進不同而退其交友有如此者疏曰合志同方據所懐志意也營道同術據所習道藝也同術則同方也熊氏曰窮時合志同方營道同術其業同矣達時或並立而爵位等則彼此樂其同升而不忌或相下而爵位不等則尊與卑交而不厭棄其情契矣乆不相見易為人所離間乃聞言亦相諒而不信其心孚矣然其擇交之始本於心之方正立於義之時宜同於義則進而與之交不同於義則退而避之其交友如此温良者仁之本也敬慎者仁之地也寛裕者仁之作也孫接者仁之能也禮節者仁之貌也言談者仁之文也歌樂者仁之和也分散者仁之施也儒皆兼此而有之猶且不敢言仁也其尊讓有如此者熊氏曰仁包四德百行無所不貫和厚易直仁之初立基處故曰本處事敬慎乃仁之實地寛裕有容乃仁之作用孫以接物仁之能事也禮儀節文仁之容貌也言語仁之文采也詩歌為樂仁之和順也分散貨財仁之施與也八者皆仁之事惟儒者兼有之宜若以仁自任而猶不自居焉尊讓之至也儒有不隕穫於貧賤不充詘於富貴不慁君王不累長上不閔有司故曰儒今衆人之命儒也妄常以儒相詬病孔子至舍哀公館之聞此言也言加信行加義終没吾世不敢以儒為戲註曰隕穫困迫失志之貌充詘歡喜失節之貌慁猶辱也累猶繫也閔病也言不為天子諸侯卿大夫羣吏所困迫而違道孔子自謂也集説曰隕者如有所墜失穫者如有所割刈充者驕氣之盈詘者吝氣之歉方氏曰無儒者之行而為儒者之服無儒者之實而盜儒者之名故曰今衆人之命儒也妄以其妄故常為人所詬病既至舍矣又曰館之者具食以致其養具官以治其事也言加信則不以儒相詬行加義則不以儒相病矣坡謂哀公初發實有戲侮之意註疏云是聖賢亦有正言之時如天生德於予斯文之興喪在已曾子較仁義富貴於晉楚孟子亢不畏於大人是自夸大乎宋元末儒羣譟此篇非夫子之言乃戰國豪士偽作並不指何在謬於聖人何處同於豪士何處重複何在支蔓彼之所至果約於儒行而見此之重三複四乎果完於儒行而見此之挂一漏萬乎果純於儒行而見此之夸大英氣乎程子曰假如人言孔子為聖也須直待已實見聖處方可信諸公果實見此篇之非聖乎近不體諸切身之離合淺不次其文理之後先而大言不怍欺人哉禮記述註卷二十六
