body:
  text: 禮記述註卷十安溪李光坡撰禮器第十疏曰鄭目錄云名為禮器者以其記禮使人成器之義也禮器是故大備大備盛德也坡謂禮器即前篇禮義以為器也内可誠心外可誠身故能大備其成人之行大備則德盛矣禮釋回増美質措則正施則行熊氏曰禮有恭敬辭譲之體能消釋回邪之心増益資質之美禮有節文度數之詳而措諸身則正施諸事則達坡謂此言禮之可為器也其在人也如竹箭之有筠也如松栢之有心也二者居天下之大端矣故貫四時而不改柯易葉坡謂其在人也言禮之在人也有節文度數之詳可以固人肌膚之㑹筋骸之束堅忍於外如竹箭之有筠也箭篠也筠竹外青皮有㳟敬辭譲之體貞固於内如松栢之有心也如此則卓然自立而不為事物所揺奪亦猶松竹二者居於天下比衆物最得氣之本也故貫四時不改柯易葉端本也貫經也柯枝也故君子有禮則外諧而内無怨故物無不懐仁鬼神饗德集説曰君子之人惟其有此禮也故外人之踈逺者無不諧協内人之親近者無所怨憾人歸其仁神歆其德也坡謂此猶夫子告顔子以天下歸仁仲弓邦家無怨之意先王之立禮也有本有文忠信禮之本也義理禮之文也無本不立無文不行坡謂承上言君子有禮如竹箭有筠松栢有心者原於先王之立禮也有本有文熊氏曰本者何忠信是也實理貫徹而後制為節文也文者何義理是也隨所節文皆得理合宜而後斐然成章也使無本則真意不立無文則鄙俚難行禮也者合於天時設於地財順於鬼神合於人心理萬物者也疏曰此以下廣説義理為文之事也仰合天時即依於四時豐儉隨時也所設用物為禮各是其土地之物也坡謂理萬物者條理萬物使各當於用是故天時有生也地理有宜也人官有能也物曲有利也故天不生地不養君子不以為禮鬼神弗饗也居山以魚鼈為禮居澤以鹿豕為禮君子謂之不知禮疏曰天時有生若春韭夏麥是也地理有宜如高黍下稻是也物曲有利謂萬物委曲各有所利如麯糵利為酒醴絲竹利為琴瑟之類也天不生謂非時之物若寒瓜夏橘之屬地不養若山之魚鼈澤之鹿豕也君子不以為禮此是不合人心也鬼神弗饗此是不順鬼神也坡謂人官有能如離婁之明此目官之能也師曠之聰此耳官之能也之類物曲有利所謂理萬物者故必舉其定國之數以為禮之大經禮之大倫以地廣狹禮之厚薄與年之上下是故年雖大殺衆不匡懼則上之制禮也節矣註曰殺謂榖不熟也匡猶恐也疏曰上之制禮也節矣合結地財天時也廣狹隨地而賦豐凶逐時而斂衆之不恐並由君上制禮有節故也坡謂此所舉定國之數謂天之所生地之所有人之所能物之所利以為行禮經常之法也熊氏曰天子諸侯卿大夫地有廣狹故禮之倫類不同地廣禮備地狹禮殺此因地利也年豐禮厚年凶禮薄見順天時禮時為大順次之體次之宜次之稱次之堯授舜舜授禹湯放桀武王伐紂時也詩云匪革其猶聿追來孝集説曰時者天之所為故為大堯舜湯武之事不同者各隨其時耳聖王受命得天下必定一代之禮制或因或革各隨時宜故云時為大也順體宜稱四者下文析之詩文王有聲之篇革急也猶謀也聿惟也言文王之作豐芑初非急於成巳之謀惟欲追先人之事而致其方來之孝耳亦時也坡謂時為大者必聖人在天子之位上焉者雖善無徴下焉者雖善不尊皆非時也承上文制禮得節遂言帝王代興制禮先後之義天地之祭宗廟之事父子之道君臣之義倫也集説曰王者父事天母事地故天地宗廟父子君臣四者乃自然之序故曰倫也倫不可紊故順次之社稷山川之事鬼神之祭體也坡謂鬼神凡羣小祀及秩在祀典者皆是體猶負荷與為一體之意朱子曰天子祭天地諸侯祭山川大夫祭五祀我主得他便是他氣又總統在我身上有箇相闗處此體之謂也故曰神不歆非類以非其體也若以輕重隆殺為解此自在下文義與稱中不在此也喪祭之用賔客之交義也集説曰既於義不得不然必湏隨事合宜故曰宜次之羔豚而祭百官皆足大牢而祭不必有餘此之謂稱也諸侯以龜為寶以圭為瑞家不寶龜不藏圭不臺門言有稱也註曰此指謂助祭者耳而云百官喻衆也疏曰士用特牲大夫用少牢皆以成牲不用羔豚此羔豚則無田之大夫士薦羔豚也無田則無臣助祭故云百官喻衆也諸侯有保土之重宜湏占詳吉凶故得以龜為寶天子得天之物謂之瑞諸侯受封天子與之玉亦謂為瑞也兩邊築闍為基基上起屋曰臺門諸侯有保捍之重故為臺門熊氏曰此之謂稱是稱其事之大小也言有稱是稱其分之尊卑也禮有以多為貴者天子七廟諸侯五大夫三士一疏曰從此以下更廣明為稱之事一廟者據下士若適士則二廟也天子之豆二十有六疏曰謂天子朔食也天子庶羞百二十品籩豆各六十今云二十六者説堂上數也諸公十有六疏曰上公也更相朝時堂上之豆數諸侯十有二疏曰侯伯子男也亦相朝時堂上之豆數上大夫八下大夫六疏曰皆謂主國食使臣堂上之豆數諸侯七介七牢大夫五介五牢集説曰介副也上介一人餘為衆介牢太牢也謂諸侯朝天子時天子以太牢之禮賜之周禮公九介九牢侯伯七子男五今言七舉中以言之也大夫五介五牢者諸侯之大夫為君使而來各降其君二等此五介五牢謂侯伯之卿亦舉中言之也天子之席五重疏曰熊氏云天子祫祭席五重禘則宜四重也時祭三重司几筵職是也受神酢席亦然大朝覲大享食封國命諸侯皆然諸侯之席三重大夫再重集説曰諸侯席三重者謂相朝時賔主皆然也三重則四席皇氏云謂蒲莞筵三上加繅席一再重則三席天子崩七月而𦵏五重八翣諸侯五月而葬三重六翣大夫三月而葬再重四翣此以多為貴也註曰以此差之上公四重疏曰天子五重謂抗木與茵也致茵於椁下所以藉棺茵者用淺色緇布夾為之將茅秀及香草著其中如今有絮縟也而縮二横三毎為一重坡謂下棺之後先加折於壙上折猶屐也方鑿連木為之盖如床縮者三横者五乃加抗席三覆之乃加抗木横三縮二此為一重如是者五則為五重疏謂抗木之上乃加抗席似少失故本儀禮原本正之有以少為貴者天子無介祭天特牲集説曰介所以佐賔天子以天下為家無為賔之義故無介也特獨也天子適諸侯諸侯膳以犢諸侯相朝灌用鬱鬯無籩豆之薦大夫聘禮以脯醢集説曰天子祭天惟用一牛若廵守而過諸侯之境則諸侯奉膳亦止一牛其尊君之禮亦如君之尊天也諸侯相朝享禮畢主君酌鬱鬯之酒以獻賓不用籩豆之薦者以其主於相接以芬芳之德不在殽味也大夫出使行聘享禮畢主國禮之酌以酒而又有脯醢之薦此見少者貴而多者賤也天子一食諸侯再大夫士三食力無數疏曰特牲有九飯少牢十一飯鄭云諸侯十三飯天子十五飯此云一食再食與彼不同此據食畢更加飯告飽之數也集説曰食餐也位尊者德盛其飽以德不在於食味故毎一餐輙告飽湏御食者勸侑乃又餐故云一食也諸侯則再餐而告飽大夫士則三餐而告飽皆待勸侑則再食食力自食其力之人農工商賈庶人之屬也無德不仕無祿代耕禮不下庻人故無食數飽即自止也大路繁纓一就次路繁纓七就集説曰殷世尚質其祭天所乘之車木質而已無别雕飾謂之大路繁馬腹帶也纓鞅也在馬膺前染絲而織以為罽五色一匝曰就就猶成也繁與纓皆以此罽為之車樸素故馬亦少飾也大路之下有先路次路次路殷之第三路也供卑雜之用故就數多郊特牲云次路五就此葢誤為七就圭璋特集説曰圭璋形制見考工記諸侯朝王以圭朝后則執璋玉之貴者不以他物儷之故謂之特言獨用之也周禮小行人掌合六幣圭以馬二王後享王者璋以皮二王後享后者然皮與馬皆不升堂惟圭璋特升於堂亦特之義也琥璜爵集説曰琥為虎之形璜則半環之形也此二玉下於圭璋不可專逹故附爵乃通葢天子享諸侯及諸侯自相享至酬酒時則以幣將送酬爵又有琥璜之玉以將幣故云琥璜爵也鬼神之祭單席集説曰鬼神異於人不假多重以為温暖也諸侯視朝大夫特士旅之此以少為貴也集説曰君視朝之時於大夫則特揖之謂每人一揖也旅衆也士卑無問人數多少君一揖而已有以大為貴者宮室之量器皿之度棺椁之厚丘封之大此以大為貴也有以小為貴者宗廟之祭貴者獻以爵賤者獻以散尊者舉觶卑者舉角五獻之尊門外缶門内壺君尊瓦甒此以小為貴也註曰爵一升觚二升觶三升角四升散五升疏曰特牲云主人獻尸用角佐食洗散以獻尸是尊者小卑者大按天子諸侯及大夫皆獻尸以爵無賤者獻以散之文禮文散亡不具也特牲主人獻尸用角者下大夫也特牲少牢禮尸入舉奠觶是尊者舉觶特牲主人受尸酢受角飲者是卑者舉角此是士禮耳天子諸侯祭禮亡五獻子男之享禮也凡王享臣及其自相享行禮獻數各隨其命子男五命故知五獻是子男列尊之法門外缶者缶尊名盛酒在門外壺亦尊也盛酒在門内君尊子男之尊也子男用瓦甒為尊不云内外則陳之在堂人君靣尊而專惠也其壺缶但飲諸臣小尊近君大尊在門是以小為貴壺大一石瓦甒五斗缶又大於壺有以高為貴者天子之堂九尺諸侯七尺大夫五尺士三尺天子諸侯臺門此以高為貴也集説曰九尺以下之數皆謂堂上高於堂下也考工記堂崇三尺是殷制此周制耳臺門見前章有以下為貴者至敬不壇掃地而祭天子諸侯之尊廢禁大夫士棜禁此以下為貴也集説曰封土為壇初則燔柴於太壇燔柴訖於壇下掃地而設正祭至敬無文也禁與棜皆承酒樽之器木為之禁長四尺廣二尺四寸通局足高三寸漆赤中畫青雲氣菱苕華為飾刻其足為褰帷之形棜長四尺廣二尺四寸深五寸無足亦畫青雲氣菱苕華為飾也棜是轝名禁者因為酒戒也天子諸侯之尊廢禁者廢去其禁而不用也大夫士棜禁者謂大夫用棜士用禁也棜一名斯禁見鄉飲酒禮禮有以文為貴者天子龍衮諸侯黼大夫黻士𤣥衣纁裳天子之冕朱綠藻十有二旒諸侯九上大夫七下大夫五士三此以文為貴也疏曰諸侯雖九章七章以下其中有黼也孤絺冕而下其中有黻故特舉黼黻而言耳詩采菽云𤣥衮及黼是特言黼終南云黻衣繡裳是特言黻也集説曰龍衮畫龍於衮衣也白與黒謂之黼黼如斧形刺之於裳黒與青謂之黻其狀兩巳相背亦刺於裳也纁赤色冕祭服之冠也上𤣥下纁前後有旒前低一寸二分以其畧俛而謂之冕冕同而服異一衮冕二鷩冕三毳冕四絺冕五𤣥冕各以服之異而名之耳冕之制雖同而旒有多少朱綠藻者以朱綠二色之絲為繩也以此繩貫玉而垂於冕以為旒周用五采此言朱綠或是前代之制十有二旒者天子之冕前後各十二旒毎旒十二玉玉之色以朱白蒼黄𤣥為次自上而下徧則又從朱起衮冕十二旒鷩冕九旒毳冕七旒絺冕五旒𤣥冕三旒此數雖不同然皆每旒十二玉繅玉五采也此皆周時天子之制諸侯九上大夫七下大夫五士三此亦非周制周家旒數隨命數有以素為貴者至敬無文父黨無容大圭不琢大羮不和大路素而越席犧尊疏布鼏樿杓此以素為貴也集説曰敬之至者不以文為美如祭天而服黒羔裘亦是尚質素之意折旋揖譲之禮容所以施於外賔見父之族黨自當以質素為禮不為容也大圭天子所搢者長三尺不琢不為鐫刻文理也大羮大古之羮也肉汁無鹽梅之和後王存古禮故設之亦尚𤣥酒之意大路殷祭天之車樸素無飾以蒲越為席犧尊刻為犧牛之形讀為娑音者謂畫為鳯羽婆娑然也此尊以麤疏之布為覆鼏樿白木之有文理者杓沃盥之具也孔子曰禮不可不省也禮不同不豐不殺此之謂也葢言稱也集説曰引孔子語證上諸事也省察也不同謂或高下大小文素之異而各有當然之則豐則踰殺則不及惟稱之為善禮之以多為貴者以其外心者也德發揚詡萬物大理物博如此則得不以多為貴乎故君子樂其發也註曰詡猶普也徧也坡謂以多為貴者皆是設儀辨等備物盡文之事以其用心於物故曰外也發揚其德則所理者大普徧萬物則及物者博自天子至大夫士德厚者備禮德薄者降殺則得不以多為貴乎樂其發者德之厚薄其發也不揜故也此君子或施德者或觀德者皆是禮之以少為貴者以其内心也德産之致也精微觀天下之物無可以稱其德者如此則得不以少為貴乎是故君子愼其獨也疏曰産生也致密也言德生於萬物深密惟精惟微無所遺忘者也坡謂以少為貴者皆是事神敬上盡誠致樸之事以其用心於内故曰内也天地生物王公育民其生生之德綿密周致無所於雜而精不見其迹而微盖無一物不在所愛之中矣則天下有何物可以稱其德而報之得不以少為貴乎愼其獨者誠其意也此君子或制禮者或行禮者皆是古之聖人内之為尊外之為樂少之為貴多之為美是故先王之制禮也不可多也不可寡也惟其稱也集説曰尊如中庸尊德性之尊㳟敬奉持之意也尊其在内之誠敬故少物亦足以為貴樂其在外之儀物必多物乃可以為美宜少者不可多宜多者不可寡或稱其内或稱其外也坡謂自禮有以多為貴者至此推説高下大小文素得理合宜所當然之事與其所以然之故以盡義理為文之意而忠信為質隱然自見於言中矣是故君子大牢而祭謂之禮匹士大牢而祭謂之攘疏曰此一節説禮即湏稱中則得禮僣則盗竊君子謂大夫以上大夫常祭少牢遣奠及卒哭祔用大牢故謂之禮士常祭特豚遣奠卒哭祔用少牢若用大牢則是盗竊然不直言士而言匹士者士賤不得特使為介乃行故謂匹也管仲鏤簋朱紘山節藻棁君子以為濫矣集説曰管仲齊大夫鏤簋謂刻而飾之大夫刻為龜耳諸侯飾以象天子飾以玉紘冕之繫以組為之自頷下屈而上屬於兩旁之笄垂餘為纓天子朱諸侯青大夫士緇山節刻山於柱頭之斗拱也藻水草也藻棁畫藻於棁上之短柱也此天子廟飾註云濫亦盗竊也疏云奢而犯禮是不稱之人也晏平仲祀其先人豚肩不揜豆澣衣濯冠以朝君子以為隘矣集説曰晏平仲亦齊大夫大夫祭用少牢不合用豚周人貴肩肩在爼不在豆此但喻其極小謂併豚兩肩亦不足以揜豆故假豆言之耳上言先王制禮不豐不殺此舉管晏行禮之失以為戒管仲豐而不稱晏子殺而不稱者也是故君子之行禮也不可不愼也衆之紀也紀散而衆亂註曰言二大夫皆非也紀絲縷之數有紀孔子曰我戰則克祭則受福葢得其道矣註曰我我知禮者也疏曰此孔子述知禮之人自稱戰克祭受福之事而解之非孔子自我也得道者不多不少隨而稱當也祗為二大夫之不稱也君子曰祭祀不祈註曰祈求也祭祀不為求福也詩云自求多福福由巳耳疏曰趙商問周禮設六祈禱禳而祭無不祈敢問禮記何義也鄭答云祭祀常禮以序孝敬之心當專一其志而巳禱祈有為言之主於求福豈禮之常也坡謂註言至矣恐人因祭則受福之言必誤為福可以祭求者故以此正之下文不麾蚤五者皆是有祈而然故君子不為也不麾蚤不樂葆大不善嘉事牲不及肥大薦不美多品註曰麾之言快也祭有時不以先之為快也齊人所善曰麾不樂葆大謂器幣也葆之言褒也嘉事之祭禮宜告見於先祖耳不善之而祭疏曰嘉事冠昏也郊牛繭栗宗廟角握社稷尺各有所宜不必湏並及肥大也薦祭品味宜有其定不以多為美孔子曰臧文仲安知禮夏父弗綦逆祀而弗止也集説曰臧文仲魯大夫臧孫辰魯閔公僖公俱莊公子閔適而少僖庶而大莊死而立閔為君僖時為臣閔死乃立僖為君僖死子文公立二年八月祫祭大廟夏父弗綦為宗伯典禮以閔置僖下是臣居君上逆亂尊卑不可之大者時人以文仲為知禮孔子以其為大夫而不能止逆祀之失豈得為知禮乎燔柴於奥夫奥者老婦之祭也盛於盆尊於瓶註曰奥當為爨字之誤也或作竈集説曰此亦言臧文仲不能正失禮之事周禮以實柴祀日月星辰有大火之次故祭火神則燔柴也今弗綦為禮官謂爨神是火神遂燔柴祭之是失禮矣禮祭至尸食竟而祭爨神宗婦祭饎爨烹者祭饔爨其神則先炊也故謂之老婦惟盛食於盆盛酒於瓶卑賤若此何得燔柴祭之也坡謂見非禮祭祀而不敢據義以正之者皆有畏禍福之心故也故引夫子譏文仲二事以明不當祈之意禮也者猶體也體不備君子謂之不成人設之不當猶不備也禮有大有小有顯有微大者不可損小者不可益顯者不可揜微者不可大也故經禮三百曲禮三千其致一也未有入室而不由户者註曰猶體若人身體疏曰大謂大及多也小謂小及少也顯謂高及文也微謂素及下也不可損不可益不可揜不可大者各隨其體而設禮不得不當也朱子曰禮儀三百便是儀禮中士冠諸侯冠天子冠禮之類此是大節有三百條如始加再加三加又如坐如尸立如齊之類皆是其中小目坡謂上文言禮之為器詳矣此乃推言其大備之藴也設之當非他亦曰稱而巳其致一者要歸於當也君子之於禮也有所竭情盡愼致其敬而誠若有羙而文而誠若集説曰誠實也若語辭謂以少者小者下者素者為貴是内心之敬無不實者以多者大者高者文者為貴美而有文是外心之實也君子之於禮也有直而行也有曲而殺也有經而等也有順而討也有摲而播也有推而進也有放而文也有放而不致也有順而摭也註曰直而行謂若始死哭踊無節也曲而殺謂若父在為母期也經而等謂若天子以下至士庶人為父母三年討猶去也謂若天子以十二公以九侯伯以七子男以五為節也摲之言芟也謂芟殺有所與也若祭者貴賤皆有所得不使虚也推而進謂若王者之後得用天子之禮放而文謂若天子之服服日月以至黼黻放而不致謂若諸侯自山龍以下順而摭謂若君沐梁大夫沐稷士沐梁疏曰摲而播是芟上貴之分以布徧於下也放法也摭猶拾取也謂若君沐梁士亦用梁士卑不嫌是拾君之禮而用之也坡謂直而行三者皆君父之大所謂竭情盡愼内心之誠也順而討三者則設儀施惠及下之等故次之放而文三者則服食之差故又次之此六者皆美而文外心之誠也三代之禮一也民共由之或素或青夏造殷因註曰由用也素尚白青尚黒者也言所尚雖異禮則相因耳孔子曰殷因於夏禮所損益可知也周因於殷禮所損益可知也疏曰此一節廣明三代損益不同朱子曰三綱五常禮之大體三代相繼皆因之而不能變其所損益不過文章制度小過不及之間而已坡謂夏造殷因者言或素或青夏創造於前殷因而損益之耳疏説云周坐尸詔侑武方其禮亦然其道一也註曰言此亦周所因於殷也武當為無聲之誤也方猶常也告尸行節勸尸飲食無常若孝子之為也孝子就養無方集説曰亦然亦如殷之禮也禮同本於道之同故云其道一也夏立尸而卒祭殷坐尸集説曰夏之禮尸當飲食則暫坐若不飲食則惟立以俟祭事之終也殷坐尸者此殷因夏之有立尸而損其不坐之禮益為恒坐之法也周旅酬六尸曾子曰周禮其猶醵與註曰使之相酌也后稷之尸發爵不受旅合錢飲酒為醵旅酬相酌似之也王居明堂之禮仲秋乃命國醵疏曰殷但坐尸未有旅酬之禮周又因殷而益之也旅酬六尸謂祫祭時大祫多主惟云六尸者先儒與王肅並云毁廟無尸但有主也君子曰禮之近人情者非其至者也郊血大饗腥三獻爓一獻孰註曰近人情者褻而逺之者敬郊祭天也大饗祫祭先王也三獻祭社稷五祀一獻祭羣小祀也爓沈肉於湯也血腥爓孰逺近備古今也尊者先逺差降而下至小祀孰而巳䟽曰近者為䙝逺者為敬其事非一今此先從鬼神之事而説也坡謂輕率廹切無耐久積愼之意此人情也故禮有近此者必非其至如郊與大饗三獻正祭之時並有血腥爓孰然郊則先設血後設腥與爓孰至大享血腥同時俱薦比郊禮為慤而蹙矣三獻血腥與爓一時同薦一獻唯有薦孰無血腥爓漸次簡略近于人情矣自此至可述而多學正言君子行禮耐久積愼以致其情以反禮始以申上文竭情盡愼致其敬而誠若之意是故君子之於禮也非作而致其情也此有由始也是故七介以相見也不然則已慤三辭三譲而至不然則巳蹙疏曰非作而致其情者非是私自專輙徒起而致其巳情也集説曰上公之介九人侯伯七人子男五人此舉中言之兩君相見必有介副之人以伸賔主之情不如此則大愿慤而無禮之文矣三辭三譲者賔初至大門外交擯之時有三辭之禮及入大門主君每門一譲則賔一辭凡三辭三譲而後至廟中也不如此則大廹蹙而無禮之容矣坡謂有由始者即下反本脩古不忘其初之意始即初也故魯人將有事於上帝必先有事於頖宮晉人將有事於河必先有事於惡池齊人將有事於泰山必先有事於配林三月繫七日戒三日宿愼之至也集説曰此因上章言兩君相見之禮漸次而進故言祭祀之禮亦有漸次由卑以逹尊者魯人郊祀必先有事頖宫者魯無后稷之廟今將祭天而於頖宫告后稷也告之者將以配天惡池并州川之小者河之從祀也配林林名泰山之從祀也帝牛必在滌三月繫繫牲於牢也七日戒散齊也三日宿致齊也敬愼之至如此故以積漸為之何敢廹蹙而行之乎故禮有擯詔樂有相步温之至也疏曰禮既不可卒廹故賔主相見有擯相詔告也温謂承藉凡玉以物緼裹承藉君子亦以威儀擯相以自承藉坡謂禮有擯詔跬步必愼如樂工之有相然温藉之極也學者以子入大廟毎事問及縣子譏子游之汰並而觀之則尊節自謹而温藉之義當自省之矣禮也者反本脩古不忘其初者也故凶事不詔朝事以樂集説曰禮者反復本然之心脩舉上古渾樸之意二者皆謂之不忘其初擗踊哭泣不待詔告以其發於本心之自然也朝廷養老尊賢之事必作樂以樂之亦以愜其本心之願望也此二者是反本之事坡謂反本則愛脩古則敬愛敬之心纒綿不忘則竭情盡愼自不容巳所謂始也醴酒之用𤣥酒之尚割刀之用鸞刀之貴莞簟之安而稾鞂之設集説曰醴酒之美用矣而列尊在𤣥酒之下今世割刀之利便於用矣而宗廟中乃不用割刀而用古之鸞刀下筦上簟可以安矣而設藁鞂之粗者為郊祀之席此三者是脩古之事鸞鈴也刀環有鈴故名鸞刀割肉欲中其音節郊特牲云聲和而後斷也莞蒲之細者可為席簟竹席也稾鞂除去榖之稈也鞂與禹貢秸字同是故先王之制禮也必有主也故可述而多學也註曰主謂本與古也述而多學以本與古求之而巳君子曰無節於内者觀物弗之察矣欲察物而不由禮弗之得矣故作事不以禮弗之敬矣出言不以禮弗之信矣故曰禮也者物之致也坡謂上言上之制禮也節是禮者所以節百物也故無節於内者觀物弗之察矣何也不由禮故無節於内是以欲察物而弗得也因天因地體乎神人作之為事出之為言以禮節之則敬且信故曰禮者物理之極致也自此至天下大治正言君子節禮發揚詡物以申上文美而文而誠若之意是故昔先王之制禮也因其財物而致其義焉爾故作大事必順天時為朝夕必放於日月為高必因丘陵為下必因川澤是故天時雨澤君子逹亹亹焉坡謂此節推明合於天時設於地財也因其財物謂天所生地所養致其義謂合之設之作大事必順天時如月令一書皆是為朝夕必放日月如邠風一篇皆是此二句明合於天時也為高為下如大司徒辨五地之物生皆是此二句明設於地財也天時雨澤如月令所言時雨將降天地和同之等君子逹亹亹如命布農事命司空循行之等舉此一端以見其合則其餘所合與設於地財皆無不致其義矣是故昔先王尚有德尊有道任有能舉賢而置之聚衆而誓之是故因天事天因地事地因名山升中於天因吉土以饗帝於郊升中於天而鳯凰降龜龍假饗帝於郊而風雨節寒暑時是故聖人南靣而立而天下大治註曰名猶大也升上也中猶成也謂廵守至於方岳燔柴祭天告以諸侯之成功也吉土王者所卜而居之土也饗帝于郊以四時所兆祭於四郊者也鳯凰降龜龍假者功成而太平隂陽氣和而致象物風雨節寒暑時者五帝主五行五行之氣和而庶徴得其序也坡謂聚衆而誓如大司徒州長黨正諸官屬民讀法以攷其德以紏其惡者是因天事天地上之圜丘是因地事地澤中之方丘是此節推明順於鬼神合於人心也葢道德賢能人心之所愛也尚之尊之任之舉之則合於人心矣因天事天至寒暑時言順鬼神而鬼神順也因之所以順之也此言合人心在順鬼神前者則䟽云鬼神是有德者既合於人心故得順於鬼神得之矣天道至教聖人至德廟堂之上罍尊在阼犧尊在西廟堂之下縣鼓在西應鼓在東君在阼夫人在房大明生於東月生於西此隂陽之分夫婦之位也君西酌犧象夫人東酌罍尊禮交動乎上樂交應乎下和之至也疏曰此謂諸侯時祭所用之禮故罍尊夫人所酌也若天子之祭則罍尊在堂下集説曰天道以隂陽肇禮樂是為至教聖人以禮樂法隂陽是謂至德罍尊夏后氏之尊也犧尊周尊也縣鼓大應鼓小設禮樂之器一以西為上故犧尊縣鼓皆在西而罍尊與應鼓皆在東也君在阼人君尊東也天子諸侯皆有左右房此夫人在西房也君在東而西酌犧象象日出東方而西行也夫人在西而東酌罍尊象月出西方而東行也此禮交動乎堂上也縣鼓應鼓相應乎堂上是樂交應乎下也夫禮之㳟遜樂之肅雍和也而交動交應則和之至也坡謂自此至禮其本也數節因上天地之祭遂及宗廟之事其中父子之道君臣之義社稷山川鬼神之祭喪祭賔客之用所謂倫也體也義也一貫而迭陳之以結禮之大備以終外諧而内無怨人無不懐仁鬼神饗德之意禮也者反其所自生樂也者樂其所自成是故先王之制禮也以節事脩樂以道志故觀其禮樂而治亂可知也蘧伯玉曰君子之人逹故觀其器而知其工之巧觀其發而知其人之知故曰君子愼其所以與人者集説曰萬物本乎天人本乎祖禮主於報本反始不忘其所由生也王者功成治定然後作樂以文德定天下者樂文德之成以武功定天下者樂武功之成非泛然為之也節事為人事之儀則也道志宣其湮鬱也世治則禮序而樂和世亂則禮慝而樂滛故觀禮樂而治亂可知也蘧伯玉衞大夫名瑗言君子之心明睿洞達觀器用則知工之巧拙觀人之發動舉措則知其人之知愚豈有觀禮樂而不知治亂乎禮樂者與人交接之具君子致謹於此以其所闗者大也故曰葢古有是言而記者稱之耳坡謂此因禮樂為聖人之至德而推本言之大廟之内敬矣君親牽牲大夫贊幣而從君親制祭夫人薦盎君親割牲夫人薦酒註曰納牲於庭時也當用幣告神而殺牲親制祭謂朝事薦血膋時所制者制肝洗於鬱鬯以祭於室及主親割謂進牲孰體時疏曰侯伯子男之君朝踐君不獻故夫人薦盎薦孰時君親割牲體於時君亦不獻故夫人薦酒卿大夫從君命婦從夫人洞洞乎其敬也屬屬乎其忠也勿勿乎其欲其饗之也集説曰洞洞敬之表裏無間也屬屬誠實無偽也勿勿勉勉不巳也命婦卿大夫之妻也納牲詔於庭血毛詔於室羮定詔於堂三詔皆不同位葢道求而未之得也疏曰詔告也牲入在庭以幣告神故云納牲詔於庭殺牲取血及毛入以告神於室故云血毛詔於室羮肉汁也定孰肉也煮之既熟將迎尸入室乃先以爼盛羮及定而告神於堂此是薦熟未食之前也道言也此三詔者各有其位盖言求神而未得也設祭於堂為祊乎外故曰於彼乎於此乎集説曰設祭於堂者謂薦腥爓之時設此所薦饌在於堂祊祭之明日繹祭也廟門謂之祊設祭在廟門外之西旁故因名為祊也記者又引古語云於彼乎於此乎言不知神於彼饗之乎於此饗之乎一獻質三獻文五獻察七獻神疏曰案周禮司服職𤣥冕一章祭羣小祀故知一獻當之絺冕三章祭社稷五祀故知三獻當之毳冕五章祭四望山川故知五獻當之鷩冕七章享先公故知七獻當之集説曰祭羣小祀則一獻其禮質略祭社稷五祀三獻其神稍尊故有文飾五獻祭四望山川之禮也察者顯盛詳著之貌祭先公之廟則七獻禮重心肅洋洋乎其如在之神也大饗其王事與註曰謂祫祭先王疏曰以有三牲魚腊則非祭天以内金和庭實又非享賔享賔時無此庭實故也知非朝而貢者以朝而貢物不名大饗故知是祫也三牲魚腊四海九州之美味也籩豆之薦四時之和氣也内金示和也束帛加璧尊德也龜為前列先知也金次之見情也丹漆絲纊竹箭與衆共財也其餘無常貨各以其國之所有則致逺物也其出也肆夏而送之葢重禮也疏曰三牲魚腊此饌諸侯所獻故云九州之美味也内金先設金也以為庭實示其和柔也以金能從革故也朝而行享之時以束帛加璧於上尊德也君子於玉比德焉陳列之序龜獨在前先其有知也金次龜後以金能照物露見其情其餘謂九州之外也周禮九州之外謂之蕃國世一見各以其所貴寶為摯大司樂大饗諸侯侯出入奏肆夏此是助祭之後無算爵禮畢客醉而出宜奏陔夏故註云肆夏當為陔夏坡謂此所陳物皆言物性物材獨金示和以為示諸侯之親附然則他物誰非諸侯之親附而貢也見情為見同欲之情尤非理當觀次之是次於龜也龜列前貴其能知來物則金次之乃貴其能照物也註解明矣衆財衆人共用之財所謂用物也與衆共財示不賤用物也逺物異物也不以為常示不貴異物也祀帝於郊敬之至也宗廟之祭仁之至也喪禮忠之至也備服器仁之至也賔客之用幣義之至也故君子欲觀仁義之道禮其本也集説曰祭天之禮簡素至敬無文所以為敬之至仁之實事親是也事亡如事存所以為仁之至附於身附於棺皆必誠必信所以為忠之至斂之衣服𦵏之器具皆全備無缺莫非愛親之誠心故亦曰仁之至朝聘燕享幣有常用故幣帛篚筐將其厚意義之至也此仁與義之為道皆可於行禮之際觀之故曰禮其本也君子曰甘受和白受采忠信之人可以學禮苟無忠信之人則禮不虚道是以得其人之為貴也註曰道猶由也從也疏曰忠信之人心致忠誠言又信實質素為本不有雜行故可以學禮也坡謂章首言忠信禮之本也義理禮之文也篇内言文詳矣此乃推其本也孔子曰誦詩三百不足以一獻一獻之禮不足以大饗大饗之禮不足以大旅大旅具矣不足以饗帝毋輕議禮註曰大旅祭五帝也饗帝祭天疏曰大饗仍是去人不逺五帝天與人道隔其禮轉難大旅是有故而祭其禮簡略不如饗帝正祭之備坡謂詩以道性情性情實心也誦詩三百則深於詩矣温柔敦厚宜若有忠信然也屢言不足者葢自近及逺自人及天非仁孝之至其誠不隔不足以溯厥初生民之先非夙夜畏威庶無罪悔不足以盡上帝居歆之意是必忠信之極而無一毫人欲之私者乃能之故曰毋輕議禮子路為季氏宰季氏祭逮闇而祭日不足繼之以燭雖有強力之容肅敬之心皆倦怠矣有司跛倚以臨祭其為不敬大矣集説曰逮及也闇昧爽以前也偏任為跛依物為倚他日祭子路與室事交乎户堂事交乎階質明而始行事晏朝而退孔子聞之曰誰謂由也而不知禮乎疏曰室事謂正祭之時事尸於室也外人將饌至户内人於户受之設於尸前相交承接在乎户也正祭之後儐尸於堂故謂之堂事此時堂下之人送饌至階堂上人即階受取是交乎階也質正也夫子言其知禮者以禮從宜寧可禮略而敬不可禮煩而怠也坡謂舉子路之事以見足以一獻者禮記述註卷十
