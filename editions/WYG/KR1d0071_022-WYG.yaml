body:
  text: 禮記述註卷二十二安溪李光坡撰哀公問第二十七哀公問於孔子曰大禮何如君子之言禮何其尊也孔子曰丘也小人不足以知禮君曰否吾子言之也集說曰哀公魯君名蔣大禮謂禮之大者何其尊言稱揚之甚孔子曰丘聞之民之所由生禮為大非禮無以節事天地之神也非禮無以辨君臣上下長幼之位也非禮無以别男女父子兄弟之親昏姻䟽數之交也君子以此之為尊敬然註曰君子以此之為尊敬然言君子以此故尊禮馬氏曰節者事天地之神各以其位各以其時皆有禮以節之也然後以其所能教百姓不廢其㑹節疏曰君子既知所生由禮故尊而學之學之既能廻持此能以教百姓也熊氏曰天地君臣男女令行禮各有時則㑹不廢行禮各有儀則節不廢有成事然後治其雕鏤文章黼黻以嗣註曰上事行於民有成功乃後續以治文飾以為尊卑之差集說曰雕鏤祭器之飾文章黻黻祭服之飾也其順之然後言其喪算備其鼎俎設其豕腊修其宗廟嵗時以敬祭祀以序宗族即安其居節醜其衣服卑其宫室車不雕幾器不刻鏤食不貳味以與民同利昔之君子之行禮者如此註云言語也算數也即就也醜類也幾附纒之也言君子既尊禮民以為順乃後語以喪祭之禮就安其居處正以衣服教之節儉與之同利者上下俱足也疏曰算數也喪算喪紀節數也就安其居謂隨其風俗山川溪谷之異而安之不使山者居川渚者居中原是也節正也節醜衣服正其民衣服使得其類也衣服異宜器械異制是也卑其宫室不峻宇雕牆也幾沂鄂也謂不雕鏤使有沂鄂也與民同利者非惟教民如此而君亦不奢飾與百姓同其利潤也公曰今之君子胡莫之行也孔子曰今之君子好實無厭淫徳不倦荒怠敖慢固民是盡午其衆以伐有道求得當欲不以其所昔之用民者由前今之用民者由後今之君子莫為禮也集說曰實貨財也淫徳放蕩之行也固如固獲之固言取之力也盡謂竭其所有也午與迕同午其衆違逆衆心也求得當欲言不過求以稱其私欲而已不以其所不問其理之所在也由前由古之道由後由今之道也坡謂自貨實無厭以下皆死亡之道也反而觀之則民之由生斷可識矣孔子侍坐於哀公哀公曰敢問人道誰為大孔子愀然作色而對曰君之及此言也百姓之徳也固臣敢無辭而對人道政為大集說曰愀然悚動之貌作色變色也百姓之徳猶言百姓之幸也敢無辭猶言豈敢無辭公曰敢問何謂為政孔子對曰政者正也君為正則百姓從政矣君之所為百姓之所從也君所不為百姓何從公曰敢問為政如之何孔子對曰夫婦别父子親君臣嚴三者正則庶物從之矣集說曰夫婦父子君臣三綱也庶物衆事也公曰寡人雖無似也願聞所以行三言之道可得聞乎註曰無似猶言不肖孔子對曰古之為政愛人為大所以治愛人禮為大所以治禮敬為大敬之至矣大昏為大大昏至矣大昏既至冕而親迎親之也親之也者親之也是故君子興敬為親舍敬是遺親也弗愛不親弗敬不正愛與敬其政之本與方氏曰夫婦有内外之位故曰别父子有慈孝之恩故曰親君臣有上下之分故曰嚴易曰有夫婦然後有父子有父子然後有君臣故先後之序如此三者之正一以夫婦為之本故後言大昏為大也政在養人故古之為政愛人為大然而愛之無節則墨氏之兼愛矣安能無亂乎故曰所以治愛人禮為大禮止於敬而已故曰所以治禮敬為大禮以敬為主而大昏又為至焉故曰敬之至矣大昏為大大昏既為敬之至故雖天子諸侯之尊亦必冕而親迎也已親其人乃所以使人之親已故曰親之也者親之也冕而親迎本敬也必如是而後謂之親之可見興舉是敬則為親愛舍此敬則為遺棄親愛也弗愛則無以相合而其情疏故不親弗敬則無以相别而其情䙝故不正愛敬之道其始本於閨門之内及擴而充之其愛至於不敢惡於人其敬至於不敢慢於人而徳教加於百姓刑於四海故曰愛與敬其政之本與公曰寡人願有言然冕而親迎不已重乎孔子愀然作色而對曰合二姓之好以繼先聖之後以為天地宗廟社稷之主君何謂已重乎公曰寡人固不固焉得聞此言也寡人欲問不得其辭請少進疏曰昏禮迎婦公羊說自天子至庶人皆親迎左氏說天子至尊無敵故無親迎之禮諸侯有故若疾病則使上卿迎上公臨之集說曰寡人固自言其固陋也不固焉得聞此言者言若不固陋則不以此為問安得聞此言乎請少進者幸孔子更畧有以進教我也石梁王氏曰併言天地非止諸侯之禮也孔子曰天地不合萬物不生大昏萬世之嗣也君何謂已重焉孔子遂言曰内以治宗廟之禮足以配天地之神明出以治直言之禮足以立上下之敬物恥足以振之國恥足以興之為政先禮禮其政之本與註曰直猶正也正言謂出政教也政教有夫婦之禮焉昏義曰天子聽外治后聽内職熊氏曰祖宗者魂氣歸天形魄歸地是天地間之神明也大昏既成有夫婦以主宗廟之祭足以配享祖考之神明而消怨恫有夫婦以明男教女順足以振諸臣之肅敬而杜陵夷由是三綱既正而庶物從之事之廢墜可恥者足以振之而革故鼎新國之衰弱可恥者足以興之而威内捍外凡此皆為政之事而始於昏禮然則昏禮其政之根本與孔子遂言曰昔三代明王之政必敬其妻子也有道妻也者親之主也敢不敬與子也者親之後也敢不敬與君子無不敬也敬身為大身也者親之枝也敢不敬與不能敬其身是傷其親傷其親是傷其本枝從而亡三者百姓之象也身以及身子以及子妃以及妃君行此三者則愾乎天下矣大王之道也如此則國家順矣集說曰敬吾身以及百姓之身敬吾子以及百姓之子敬吾妻以及百姓之妻愾猶至也大王愛民之君也嘗言不以養人者害人故曰大王之道也熊氏曰無不敬言妻子皆敬也三者百姓之象言身妻子百姓皆有是吾之妻子與身乃民間妻子與身之象也坡謂公子荆之母嬖哀公不用釁夏之言卒立為夫人以荆為太子國人始惡之此事在二十四年孔子已殁矣或是子先覺其微而警之或時已嬖而子譏之皆不可考然可見其切中而哀公失國之所由聖人之因病發藥信而有徴矣公曰敢問何謂敬身孔子對曰君子過言則民作辭過動則民作則君子言不過辭動不過則百姓不命而敬恭如是則能敬其身能敬其身則能成其親矣集說曰在上者言雖過民猶以為辭辭者言之成文者也動雖過民猶以為則則者動之成法者也此所以君子之言動不敢有過俱無過則民不待命令之及而自知敬其上矣民皆敬上則君之身不為人所辱方謂之能敬身成其親者不使親名為人所毁也公曰敢問何謂成親孔子對曰君子也者人之成名也百姓歸之名謂之君子之子是使其親為君子也是為成其親之名也已孔子遂言曰古之為政愛人為大不能愛人不能有其身不能有其身不能安土不能安土不能樂天不能樂天不能成其身疏曰不能愛人人則害之故不能保有其身避其禍害流移失業是不能安土身既失業不知已過所招乃更怨天是不能樂天也不能樂天不自知其罪將謂天之濫罰罪惡之事無所不為是不能成其身坡謂此申上身以及身三句盖能敬身則能愛人之身能愛人之身則愈可以成身以見成已成物非二道也公曰敢問何謂成身孔子對曰不過乎物應氏曰物者實然之理也性分之内萬物皆備仁人孝子不過乎物者即其身之所履皆在義理之内而不過焉猶大學之止於仁止於孝也違則過之止則不過矣物有定理理有定體雖聖賢豈加毫末於此哉亦盡其當然而止耳公曰敢問君子何貴乎天道也孔子對曰貴其不已如日月東西相從而不已也是天道也不閉其久是天道也無為而物成是天道也已成而明是天道也註曰不閉其久通其政教不可以倦集說曰日月相從不已繼明照於四方也不閉其久窮則變變則通也無為而成不言而信不怒而威也已成而明為法於天下可傳於後世也熊氏曰貴謂不過也實理在我莫非天所賦子故曰天道哀公聞不過乎物之言乃知物為天道矣故又問君子何為而貴之夫子對以貴其至誠不息如日月以下皆推言不已之意公曰寡人憃愚㝠煩子志之心也註曰志讀為識識知也㝠煩者言不能明理此事子之心所知也欲其要言使易行孔子蹴然避席而對曰仁人不過乎物孝子不過乎物是故仁人之事親也如事天事天如事親是故孝子成身公曰寡人既聞此言也無如後罪何孔子對曰君之及此言也是臣之福也疏曰言仁人事親以敬如以事天相似敬親與敬天同也事天以孝愛如人事親孝愛相似愛天與愛親同也稱仁人則孝子也據其愛則稱仁人據其事親則稱孝子内則孝敬於父母外則孝敬於天地其間無所不行孝敬故云孝子成身也坡謂此聖人遺言也觀其下手工夫言行不過而已不過者不過乎物也何以能不過純其仁孝之心而已此西銘之宗祖仲尼燕居第二十八疏曰鄭云善其不倦燕居猶使三子侍言及於禮退朝而處曰燕居仲尼燕居子張子貢言游侍縱言至於禮子曰居女三人者吾語女禮使女以禮周流無不徧也子貢越席而對曰敢問何如子曰敬而不中禮謂之野恭而不中禮謂之給勇而不中禮謂之逆子曰給奪慈仁集說曰縱言汎言諸事也周流無不徧者隨遇而施無不中節也敬以心言恭以容言禮雖以敬恭為主然違於節文則有三者之弊給者足恭便佞之貌逆者悖戾爭鬭之事夫子嘗言恭而無禮則勞勇而無禮則亂給則勞逆則亂矣夫子於三者之弊獨言給之為害何也盖野與逆二者猶是直情徑行而然使中於禮則無此患矣惟足恭便給之人是曲意徇物致飾於外務以悦人貌雖類於慈仁而本心之徳則亡矣故謂之奪慈仁謂巧言令色鮮矣仁而恥乎足恭正此意也子曰師爾過而商也不及子産猶衆人之母也能食之不能教也子貢越席而對曰敢問將何以為此中者也子曰禮乎禮夫禮所以制中也註曰言子産慈仁多不矜莊又與子張相反禮乎禮惟有禮也子貢退言游進曰敢問禮也者領惡而全好者與子曰然然則何如子曰郊社之義所以仁鬼神也嘗禘之禮所以仁昭穆也饋奠之禮所以仁死喪也射鄉之禮所以仁鄉黨也食饗之禮所以仁賓客也註曰領猶治也好善也仁猶存也凡存此者所以全善之道也郊社嘗禘饋奠存死之善者也射鄉食饗存生之善者也郊有后稷社有句龍疏曰領惡全好治去惡事而留全善事也仁謂仁恩相存念也郊社五者皆是存留死生事之善者善事既全則惡事除去也坡謂註疏訓說正當胍絡分明真解經之體也如陳氏所引欲深反淺欲切反泛朱子嘗言方觀大學即說向中庸上彼此迷暗互相連累又言胡氏踢著脚趾即是仁盖當時已患此矣卷内如此多有不敢悉信因附說於此子曰明乎郊社之義嘗禘之禮治國其如指諸掌而已乎集說曰明乎郊社之義則事天如事親明乎嘗禘之禮則事親如事天仁人孝子明於此故能推民胞物與之心而天下國家有不難治者矣是故以之居處有禮故長幼辨也以之閨門之内有禮故三族和也以之朝廷有禮故官爵序也以之田獵有禮故戎事閑也以之軍旅有禮故武功成也集說曰三族父子孫也上文言郊社以下五者此又言居處以下五事皆所以明禮之無乎不在也熊氏曰戎事閑是預熟其攻伐擊刺之節軍旅有禮者進退有度左右有局是故宫室得其度量鼎得其象味得其時樂得其節車得其式鬼神得其饗喪紀得其哀辨說得其黨官得其體政事得其施加於身而措於前凡衆之動得其宜註曰凡言得者得法於禮也量豆區斗斛也味酸苦之屬也辨禮之說謂禮樂之官教學者黨類也疏曰度謂高下大小象謂法象言量鼎各得其制依禮之法象易云以制器者尚其象時謂春酸夏苦之屬節謂樂曲之節辨説得其黨言分辨論説詩書禮樂之等各得其黨類不乖事之義理加於身二句合結用禮之功也衆謂萬事也方氏曰陽而不散隂而不宻剛氣不怒柔氣不攝所謂樂得其節也車得其式者六等之數作車之式也五路之用乗車之式也鬼神得其享者若天神皆降地秪皆出人鬼皆格可得而禮是矣喪紀得其哀者或發於容體或發於聲音或發於言語飲食或發於居處衣服而各得其哀也官得其體若天官掌邦治地官掌邦教之類政事得其施若施典於邦國施則於都鄙施法於官府之類坡謂自郊社之義至此皆用禮而好是所當全者宫室得其度以下語若無序似記者之未工也子曰禮者何也即事之治也君子有其事必有其治治國而無禮譬猶瞽之無相與倀倀乎其何之譬如終夜有求於幽室之中非燭何見若無禮則手足無所措耳目無所加進退揖讓無所制是故以之居處長幼失其别閨門三族失其和朝廷官爵失其序田獵戎事失其䇿軍旅武功失其制宫室失其度量鼎失其象味失其時樂失其節車失其式鬼神失其饗喪紀失其哀辨説失其黨官失其體政事失其施加於身而錯於前凡衆之動失其宜如此則無以祖洽於衆也註曰凡言失者無禮故也䇿謀也祖始也洽合也言失禮無以為衆倡始無以合和衆熊氏曰倀倀無定向貌䇿講武教戰之謀制全師克敵之法坡謂此失禮而惡是所當領者子曰慎聽之女三人者吾語女禮猶有九焉大饗有四焉苟知此矣雖在畎畆之中事之聖人已兩君相見揖讓而入門入門而縣興揖讓而升堂升堂而樂闋下管象武夏籥序興陳其薦俎序其禮樂備其百官如此而后君子知仁焉行中䂓還中矩和鸞中采齊客出以雍徹以振羽是故君子無物而不在禮矣入門而金作示情也升歌清廟示徳也下而管象示事也是故古之君子不必親相與言也以禮樂相示而已註曰大饗謂饗諸侯來朝者也四者謂金再作升歌清廟下管象縣興金作也金再作者獻主君又作也下謂堂下也象武武舞也夏籥文舞也序更也堂下吹管舞文武之樂更起也疏曰縣興者謂鐘磬興而動作也樂闋者主賓升堂主人獻賓賓卒爵而樂闋一也賓酢主君而縣興主君飲畢而樂闋二也升歌清廟三也下管象武四也但此下管象武之上少升歌清廟之一句行中䂓至徹以振羽者是四禮之外加有此五事總為九也行中䂓者謂曲行五也還中矩者謂方行六也和鸞中采齊者謂出門迎賓之時七也客出之時歌雍詩以送之八也振羽即振鷺詩禮畢徹器之時歌之九也金性内明象人情主人獻賓而金作是示賓以恩情賓酢主人而金作是示主人以敬情示徳者清廟頌文王之徳事王業之大事也熊氏曰知仁者知主君親厚相愛之心也示徳示賓主修徳相讓也示事示賓主修明政刑而有師事也坡謂九節王氏盧氏各自為分又皆與鄭别妄意折衷則入門一也升堂二也升堂樂闋三也升歌下管四也陳其薦俎三句五也行中䂓二者六也和鸞中采齊七也客出以雍八也徹以振羽九也各以一節之條貫分之若樂闋乃賓主相獻之一節行旋乃舉歩之一節而皆分為二又不計陳其薦俎三者不能無疑故敢合三家而竊正之子曰禮也者理也樂也者節也君子無理不動無節不作不能詩於禮繆不能樂於禮素薄於徳於禮虗註曰繆誤也素猶質也歌詩所以通禮意也作樂所以同成禮文也崇徳所以實禮行也疏曰前經大饗有禮樂之事故此經申明禮樂之義詩能通達情意得則行禮審正若不能詩則情意隔絶於禮錯繆樂有音聲綴兆干戚文飾於禮若不能習樂則於禮樸素内心厚於其徳則外充實若内心淺薄於徳則於外禮空虚言徳是百行之本樂是禮中之别故明禮須詩樂及徳乃為善也集說曰樂記言樂者天地之和也禮者天地之序也此言禮者理也樂者節也盖禮得其理則有序而不亂樂得其節則雖和而不流君子無理不動防其亂也無節不作防其流也子曰制度在禮文為在禮行之其在人乎子貢越席而對曰敢問䕫其窮與子曰古之人與古之人也達於禮而不達於樂謂之素達於樂而不達於禮謂之偏夫䕫達於樂而不達於禮是以傳於此名也古之人也疏曰言䕫禮樂兼有但樂優於禮非是不能行禮但不特通達非謂全不知於禮為困窮也故虞書舜命伯夷典朕三禮伯夷讓䕫是䕫知禮也古之人與言與今人别也古之人也更重美䕫馬氏曰簠簋俎豆所謂制度也升降上下所謂文為也坡謂疏引尚書至確恐此記有所未盡子張問政子曰師乎前吾語女乎君子明於禮樂舉而錯之而已集說曰前吾語女謂昔者已嘗告汝矣舉而錯之謂舉禮樂之道而施之政事也子張復問子曰師爾以為必鋪几筵升降酌獻酬酢然後謂之禮乎爾以為必行綴兆興羽籥作鐘鼓然後謂之樂乎言而履之禮也行而樂之樂也君子力此二者以南靣而立夫是以天下太平也諸侯朝萬物服體而百官莫敢不承事矣疏曰力謂勉力也二者禮樂之事集說曰萬物服體謂萬事皆從其理坡謂言者言禮也行者行禮也此記亦似未盡盖不言何言何行而僅云言行則惡亦有言行也中庸言庸言庸行比此便别禮之所興衆之所治也禮之所廢衆之所亂也目巧之室則有奥阼席則有上下車則有左右行則有隨立則有序古之義也註曰衆之所治衆之所以治也衆之所亂衆之所以亂也目巧謂但用巧目善意作室不由法度猶有奥阼賓主之處也自目巧以下古今常事不可廢改也集說曰室之有奥所以為尊者所處堂之有阼所以為主人之位也席或以南方為上或以西方為上詳見曲禮車之尊位在左父之齒隨行貴賤長幼各有所立之位此皆古聖人制禮之義也熊氏曰承上文而言吾身之禮樂固足以致太平而禮樂之文亦不可無故以禮文興廢為治亂所從言之坡謂自目巧以下言衆之所治也室而無奥阼則亂於堂室也席而無上下則亂於席上也車而無左右則亂於車也行而無隨則亂於塗也立而無序則亂於位也坡謂此節言禮之所廢衆之所亂也昔聖帝明王諸侯辨貴賤長幼逺近男女外内莫敢相踰越皆由此塗出也三子者既得聞此言也於夫子昭然若發矇矣集說曰貴賤以爵言長幼以齒言逺近以親踈言男女以同異言外内以位序言也方氏曰發矇者若目不明為人所發而有所見也坡謂此塗即指奥阼之等盖禮無過於此者孔子閒居第二十九疏曰善其無倦而不衰退燕避人曰閒孔子閒居子夏侍子夏曰敢問詩云凱弟君子民之父母何如斯可謂民之父母矣孔子曰夫民之父母乎必達於禮樂之原以致五至而行三無以横於天下四方有敗必先知之此之謂民之父母矣集說曰詩大雅泂酌之篇凱樂也弟易也横者廣被之意言三無五至之道廣被於天下也四方將有禍之釁而必能先知者以其切於憂民是以能審治亂之幾也子夏曰民之父母既得而聞之矣敢問何謂五至孔子曰志之所至詩亦至焉詩之所至禮亦至焉禮之所至樂亦至焉樂之所至哀亦至焉哀樂相生是故正明目而視之不可得而見也傾耳而聽之不可得而聞也志氣塞乎天地此之謂五至註曰凡言至者至於民也志謂恩意也言君恩意至於民則其詩亦至也詩謂好惡之情也自此以下皆謂民之父母者善推其所有以與民共之人耳不能聞目不能見行之在胷心也熊氏曰愛人之心誠切則形於咏歌莫非慈祥極至之言故詩至焉既發於言則施之於事者必實而品節立軌物彰自可範民於有序而禮至矣禮至則政教不乖乎事理人情而至和洋溢故樂至焉樂至則樂民之深者自憂民之害無所不用其極故哀至焉然樂民之樂者民亦樂其樂哀民之哀者民亦哀其哀是上下之哀樂相生也五至之事如此然所以謂之至者何五者無形與聲惟是愛民之心存焉矣目正視則明全此時功化未形之法制雖正視不可見耳傾聽則聰審未宣之誥誡雖傾聽不可聞而志之存乎心氣之見乎詩皆形之為禮樂之具發之為哀樂之情充滿於天地周遍於有形有聲之處此之謂五至也子夏曰五至既得而聞之矣敢問何謂三無孔子曰無聲之樂無體之禮無服之喪此之謂三無子夏曰三無既得畧而聞之矣敢問何詩近之孔子曰夙夜基命宥宻無聲之樂也威儀逮逮不可選也無體之禮也凡民有喪匍匐救之無服之喪也集說曰夙早也基始也宥寛也宻寧也周頌昊天有成命篇言文王武王夙夜憂勤以肇基天命惟務行寛靜之政以安民夫政寛靜則無乖戾故以喻無聲之樂也逮逮詩作棣棣盛也選擇也邶風柏舟之篇言仁人威儀之盛自有常度不容有所選擇初不待因物以行禮而後可見故以喻無體之禮也手行為匍伏地為匐邶風谷風之篇言凡人有死喪之禍必汲汲然往救助之此非為有服屬之親特周救其急耳故以喻無服之喪也子夏曰言則大矣美矣盛矣言盡於此而已乎孔子曰何為其然也君子之服之也猶有五起焉疏曰服習也言君子習此三無猶有五種起發其義子夏曰何如孔子曰無聲之樂氣志不違無體之禮威儀遲遲無服之喪内恕孔悲無聲之樂氣志既得無體之禮威儀翼翼無服之喪施及四國無聲之樂志氣既從無體之禮上下和同無服之喪以畜萬邦無聲之樂日聞四方無體之禮日就月將無服之喪純德孔明無聲之樂氣志既起無體之禮施及四海無服之喪施于孫子熊氏曰君子行此無聲之樂始而欲平躁釋使氣志皆和而無乖違不違則此心之和常存故曰得既得則涵泳從容太和在我故曰從如此則名譽著聞故曰日聞日聞不已則氣志之在我者必將益勵其和方興未艾盖既享天下之名必思保天下之治也無體之禮而威儀舒徐而遲遲然遲恐失之怠故繼之以肅敬而翼翼惟威儀得中則事上接下皆無所乖戾故曰和同愈久愈大故曰日就月將愈大則及於四海之逺矣無服之喪始而内存仁愛非内恕孔悲乎仁者愛人故繼之以施及四國由是愈推愈廣合天下皆在容保中故畜萬邦此徳之畜萬邦者至純無間豈不孔明乎孔明者不息也息則昧矣不息則悠逺故施於孫子子夏曰三王之徳参於天地敢問何如斯可謂参於天地矣孔子曰奉三無私以勞天下子夏曰敢問何謂三無私孔子曰天無私覆地無私載日月無私照奉斯三者以勞天下此之謂三無私其在詩曰帝命不違至於湯齊湯降不遲聖敬日齊昭假遲遲上帝是祗帝命式于九圍是湯之徳也集說曰三王之徳参於天地盖古語故子夏舉以為問詩商頌長發之篇孔子引之以證湯無私之徳則禹及文武可例矣嚴氏曰商自契以來天命所向未嘗去之然至湯而後與天齊謂王業至此而成天命至此而集天人適相符合也湯之謙抑所以自降下者甚敏而不遲故聖敬之徳日以躋升也徳日新又日新是聖敬日躋之盛即文王之純亦不已也其昭格於天遲遲甚緩言湯無心於得天也無所覬倖一唯上帝之敬其誠專一然天自命之以為法於天下使為王也天有四時春秋冬夏風雨霜露無非教也地載神氣神氣風霆風霆流形庶物露生無非教也熊氏曰此言天地之無私也天以氣運於上春秋執生殺之機冬夏極隂陽之用風雨之發生霜露之肅殺無非天道至公之教也地順承天變化之神與隂陽之氣但見神氣散而為風薄而為霆風行而植物之甲者拆霆震而動物之蟄者蘓是風霆流行而成形斯庶物呈生而可見無非地道至公之教也教者因物付物而曲成之有不令而行不言而喻之化也清明在躬氣志如神耆欲將至有開必先天降時雨山川出雲其在詩曰嵩髙維嶽峻極于天維嶽降神生甫及申維申及甫為周之翰四國于蕃四方于宣此文王之德也註曰清明在躬氣志如神謂聖人也耆欲將至謂其王天下之期將至也神有以開之必先為之生賢知之輔佐若天將降時雨山川為之先出雲矣峻髙大也翰幹也言周道將興五嶽為之生賢輔佐仲山甫及申伯為周之幹臣天下之蕃衛宣徳於四方以成其王功此文武之徳也是文王武王奉天地無私之徳也此宣王詩也文武之時其徳如此而詩無以言之取類以明之程子曰清明在躬氣志如神貴熟藍田吕氏曰孟子云中天下而立定四海之民君子樂之所謂耆欲三代之王也必先其令聞詩云明明天子令聞不已三代之徳也疏曰必先其令聞者所以王天下者必父祖未王之前先有令聞也詩大雅江漢之篇記者之意謂三代之王也父祖及身令聞不休已故云三代之徳也子夏問三王孔子唯云湯與文武不稱夏者以夏承禹後為天下治水過門不入無私事明但殷周以戰爭而取天下恐其有私故特舉湯與文武也弛其文徳協此四國大王之徳也子夏蹶然而起負牆而立曰弟子敢不承乎註曰弛施也協和也大王文王之祖周道將興始有令聞承奉承不失隊也起負牆者所問竟辟後來者應氏曰嵩髙生賢本於文武徳洽四國始於大王其積累豈一日哉禮記述註卷二十二
