body:
  text: 禮記述註卷二十一安溪李光坡撰祭統第二十五註曰統猶本也凡治人之道莫急於禮禮有五經莫重於祭夫祭者非物自外至者也自中出生於心也心􅇶而奉之以禮是故惟賢者能盡祭之義集說曰五經吉凶軍賓嘉之五禮也物事也心怵即前篇怵惕之心謂心有感動也奉之以禮之禮儀物器數也言祭非事之自外而至乃自中而出發生於心者也故必心有所動於中至愛至慤而後奉之以儀文器數於外奉之以禮者見乎物盡之以義者存乎心徇其物而忘其心者衆人也發於心而形於物者君子也故曰惟賢者能盡祭之義賢者之祭也必受其福非世所謂福也福者備也備者百順之名也無所不順者之謂備言内盡於已而外順於道也忠臣以事其君孝子以事其親其本一也上則順於鬼神外則順於君長内則以孝於親如此之謂備唯賢者能備能備然後能祭是故賢者之祭也致其誠信與其忠敬奉之以物道之以禮安之以樂參之以時明薦之而已矣不求其爲此孝子之心也應氏曰不求其爲無求福之心也所謂祭祀不祈也熊氏曰此明賢者盡祭之義也其本一者事君事親雖殊而心之内盡於已者一致也忠孝旣盡則倫理無虧是以上順鬼神外順君長内以孝親所謂備也坡謂致其誠信二句内盡於已也奉之以物四句外順於道也不求其爲故曰非世所謂福也祭者所以追養繼孝也孝者畜也順於道不逆於倫是之謂畜應氏曰追其不及之養而繼其未盡之孝也熊氏曰孝者言畜聚其心而愛親於内畜養其親而事之於外也父子之道天性也中心藏之而不忘是順其所性之道父子之倫天敘也服勞就養而無方是不逆其倫序之常二者皆謂之畜是故孝子之事親也有三道焉生則養沒則喪喪畢則祭養則觀其順也喪則觀其哀也祭則觀其敬而時也盡此三道者孝子之行也集說曰生事之以禮死葬之以禮祭之以禮養以順爲主順者深愛愉色婉容也喪以哀爲主祭以敬爲主時者不疏不數也此節正申順於道不逆於倫之義坡謂自祭者至此二節申致其誠信與其忠敬之意旣内自盡又外求助昏禮是也故國君取夫人之辭曰請君之玉女與寡人共有敝邑事宗廟社稷此求助之本也夫祭也者必夫婦親之所以備外内之官也官備則具備水草之菹陸產之醢小物備矣三牲之俎八簋之實美物備矣昆蟲之異草木之實陰陽之物備矣凡天之所生地之所長苟可薦者莫不咸在示盡物也外則盡物内則盡志此祭之心也註曰具謂所供衆物水草之菹芹茆之屬陸產之醢蚳蝝之屬天子之祭八簋昆蟲謂温生寒死之蟲也内則可食之物有蜩范草木之實蔆芡榛栗之屬是故天子親耕於南郊以共齊盛王后蠶於北郊以共純服諸侯耕於東郊亦以共齊盛夫人蠶於北郊以共冕服天子諸侯非莫耕也王后夫人非莫蠶也身致其誠信誠信之謂盡盡之謂敬敬盡然後可以事神明此祭之道也疏曰天子太陽故南郊諸侯少陽故東郊然藉田並在東南故王言南諸侯言東集說曰祭服皆上元下纁天子言緇服諸侯言冕服緇服亦冕服也緇以色言冕服則顯其爲祭服耳非莫耕非莫蠶言非無可耕之人非無可蠶之人也坡謂旣内自盡至此二節申奉之以物及時將祭君子乃齊齊之爲言齊也齊不齊以致齊者也是故君子非有大事也非有恭敬也則不齊不齊則於物無防也耆欲無止也及其將齊也防其邪物訖其耆欲耳不聽樂故記曰齊者不樂言不敢散其志也心不苟慮必依於道手足不苟動必依於禮是故君子之齊也專致其精明之德也故散齊七日以定之致齊三日以齊之定之之謂齊齊者精明之至也然後可以交於神明也集説曰於物無防物猶事也不苟慮不苟動皆所謂防也是故先期旬有一日宮宰宿夫人夫人亦散齊七日致齊三日君致齊於外夫人致齊於内然後會於大廟君純冕立於阼夫人副褘立於東房君執圭瓚祼尸大宗執璋瓚亞祼及迎牲君執紖卿大夫從士執芻宗婦執盎從夫人薦涗水君執鸞刀羞嚌夫人薦豆此之謂夫婦親之註曰宿讀爲肅猶戒也大廟始祖廟也圭瓚璋瓚祼器也以圭璋爲柄酌鬱鬯曰祼大宗亞祼容夫人有故攝焉紖所以牽牲芻藁也殺牲用以藉之天子諸侯祭禮先有祼尸之事乃後迎牲疏曰宗婦執盎從者謂同宗之婦執盎齊以從夫人也夫人薦涗水者涗即盎齊以濁用清酒以涗泲之涗水是明水宗婦執盎齊從夫人而來奠盎齊於位夫人乃就盎齊之尊酌此涗齊而薦之因盎齊有明水連言水耳知盎齊有明水者郊特牲云祭齊加明水是也君執鸞刀羞嚌者嚌肝肺也嚌有二時一是朝踐之時取肝以膋貫之入室燎於爐炭而出薦之主前二是饋熟之時君以鸞刀割制所羞嚌肺横切之不使絶亦奠於俎上尸並嚌之故云羞嚌一云羞進也夫人薦豆者君羞嚌時夫人薦此饋食之豆也坡謂及時將祭至此二節申道之以禮及入舞君執干戚就舞位君爲東上冕而總干率其羣臣以樂皇尸是故天子之祭也與天下樂之諸侯之祭也與竟内樂之冕而總干率其羣臣以樂皇尸此與竟内樂之之義也集說曰東上近主位也此明祭時天子諸侯親在舞位陳氏曰人君之於廟享藉則親耕牲則親殺酒則親獻尸則親迎然則樂則親舞不爲過矣夫祭有三重焉獻之屬莫重於祼聲莫重於升歌舞莫重於武宿夜此周道也凡三道者所以假於外而以增君子之志也故與志進退志輕則亦輕志重則亦重輕其志而求外之重也雖聖人弗能得也是故君子之祭也必身自盡也所以明重也道之以禮以奉三重而薦諸皇尸此聖人之道也疏曰皇氏云武王伐紂至於商郊停止宿夜士卒皆歡樂歌舞以待旦因名焉其樂今亡熊氏云此即大武之樂也假於外者祼則假於鬱鬯歌則假於聲音舞則假於干戚也熊氏曰君子於未祭之先則親耕親齊而誠敬中存所以明志之重也及祭則將之以禮奉此三重而薦諸皇尸有本有文聖人之道何以加此坡謂自及入舞至此二節申安之以樂疑此下脱後章凡祭有四時至何以爲民父母矣四節蓋申參之以時似當在此之後而簡錯也夫祭有餕餕者祭之末也不可不知也是故古之人有言曰善終者如始餕其是已是故古之君子曰尸亦餕鬼神之餘也惠術也可以觀政矣疏曰若王侯初薦毛血燔燎是薦於鬼神至薦熟時尸乃食之是尸餕鬼神之餘若大夫士隂厭亦是先薦鬼神而後尸乃食亦尸餕鬼神餘劉氏曰祭畢而餕餘是祭之終事也必謹乎餕之禮者慎終如始也故引古人曰善終者如其始之善今餕餘之禮其是此意矣所以古之君子有言尸之飲食亦是餕鬼神之餘也此即施惠之法也夫施惠者人君之政今餕禮之中寓施惠之術豈不可以觀政乎是故尸謖君與卿四人餕君起大夫六人餕臣餕君之餘也大夫起士八人餕賤餕貴之餘也士起各執其具以出陳於堂下百官進徹之下餕上之餘也凡餕之道每變以衆所以别貴賤之等而興施惠之象也是故以四簋黍見其修於廟中也廟中者竟内之象也集說曰謖起也四人者君與三卿也侯國五大夫此云六兼有采地助祭也士上士也百官謂有事於祭者進當爲餕天子之祭八簋諸侯六簋此言四簋者留二簋爲陽厭之祭故以四簋餕也簋以盛黍稷舉黍則稷可知矣自君卿至百官每變而人益衆所以别貴賤象施惠也施惠之禮修舉於廟中則施惠之政必徧及於境内此可以觀政之謂也坡謂廟中者竟内之象即朱子云如掃室然掃得小處淨潔大處亦然若有大處開拓不去即是於小處不曾盡心凡事皆然宜三復之祭者澤之大者也是故上有大澤則惠必及下顧上先下後耳非上積重而下有凍餒之民也是故上有大澤則民夫人待於下流知惠之必將至也由餕見之矣故曰可以觀政矣註曰鬼神有祭不獨享之使人餕之恩澤之大者也國君有蓄積不獨食之亦以施惠於竟内也熊氏曰積重重積之而不施也坡謂自夫祭有餕至下故曰祭者教之本也已五節統在此之謂上下之際節下此上三節推説餕禮之詳以盡上文惠下之意此下二節申説忠臣以事其君孝子以事其親即可以立教忠教孝之本以盡百順之義以總結篇首治人莫急之意夫祭之爲物大矣其興物備矣順以備者也其教之本與是故君子之教也外則教之以尊其君長内則教之以孝於其親是故明君在上則諸臣服從崇事宗廟社稷則子孫順孝盡其道端其義而教生焉註曰爲物猶爲禮也興物謂薦百品熊氏曰然祭不唯可以觀政而亦可以立教其爲事甚大矣蓋祭而興物無不備者非徒文具實本於身心之誠敬而順以備之者也是祭中實寓教之意祭非教之本乎以教言之尊君孝親教之大綱也然必上有明君而後諸臣服從乎君上崇祀宗社而後竟内之子孫順孝乎親是必盡道端義於上而忠孝之教始生也坡謂盡其道指上奉之以物四事也端其義指十倫也故鄭註曰倫猶義也是故君子之事君也必身行之所不安於上則不以使下所惡於下則不以事上非諸人行諸已非教之道也是故君子之教也必由其本順之至也祭其是與故曰祭者教之本也已熊氏曰此又以事君之事明教生之意必由其本者必由於盡道端義以本之坡謂此君子即上之明君也上有天子下有竟内故以事上使下言之夫祭有十倫焉見事鬼神之道焉見君臣之義焉見父子之倫焉見貴賤之等焉見親疏之殺焉見爵賞之施焉見夫婦之别焉見政事之均焉見長幼之序焉見上下之際焉此之謂十倫註曰倫猶義也鋪筵設同几爲依神也詔祝於室而出於祊此交神明之道也集說曰筵席也几所馮以爲安者人生則形體異故夫婦之倫在於有别死則精氣無間共設一几故祝辭云以某妃配也依神使神馮依乎此也詔告也祝祝也謂祝以事告尸於室中也出於祊者謂明日繹祭出在廟門外之旁也不知神之所在於彼乎於此乎故曰此交神明之道也君迎牲而不迎尸别嫌也尸在廟門外則疑於臣在廟中則全於君君在廟門外則疑於君入廟門則全於臣全於子是故不出者明君臣之義也疏曰在廟中則全於君不云全父者下旣云臣子則知此爲君父也自廟中行禮尸皆答拜然父無答子之禮君有答臣之法故據君言之耳集說曰尸本是臣爲尸而象神則尊之如君父矣然在廟外未入則猶疑是臣也及既入廟則全其象君父之尊矣君祭固主於尊君父而盡臣子之道然未入廟則猶疑是君也及既入廟則全爲臣子而事尸無嫌矣若君出門迎尸則疑以君而迎臣故不出者所以别此嫌而明君臣之義也夫祭之道孫爲王父尸所使爲尸者於祭者子行也父北面而事之所以明子事父之道也此父子之倫也註曰子行猶子列也祭祖則用孫列皆取於同姓之適孫也天子諸侯之祭朝事延尸於户外是以有北面事尸之禮疏曰主人欲孝敬己父不計己尊而北面事子行則凡爲子者豈得不尊事其父乎是見子事父之道也尸飲五君洗玉爵獻卿尸飲七以瑤爵獻大夫尸飲九以散爵獻士及羣有司皆以齒明尊卑之等也疏曰自獻卿以下至羣有司其爵雖同皆長者在先故云皆以齒此據備九獻之禮者至主人酳尸故尸飲五也凡祭二獻祼用鬱鬯尸祭奠而不飲朝踐二獻饋食二獻及食畢主人酳尸此皆尸飲之故云尸飲五於此時以獻卿獻卿之後主婦酳尸酳尸畢賓長獻尸是尸飲七也乃以瑤爵獻大夫是正九獻禮畢但初二祼不飲故云飲七自此以後長賓長兄弟更爲加爵尸又飲二是并前尸飲九主人乃以散爵獻士及羣有司也此謂上公九獻故以酳尸之一獻爲尸飲五也若侯伯七獻朝踐饋食時各一獻食訖酳尸但飲三也子男五獻食訖酳尸尸飲一夫祭有昭穆昭穆者所以别父子逺近長幼親疏之序而無亂也是故有事於大廟則羣昭羣穆咸在而不失其倫此之謂親疏之殺也疏曰祭大廟則衆廟尸主皆來及助祭之人同宗父子皆至則羣昭羣穆咸在若餘廟之祭唯有當廟尸主及所出之子孫不得羣昭羣穆咸在也古者明君爵有德而祿有功必賜爵祿於大廟示不敢專也故祭之日一獻君降立於阼階之南南鄉所命北面史由君右執䇿命之再拜稽首受書以歸而舍奠於其廟此爵賞之施也註曰一獻一酳尸也舍當爲釋聲之誤也非時而祭曰奠疏曰酳尸之前皆承奉鬼神未暇䇿命此一獻則上文尸飲五君獻卿之時也若天子命羣臣則不因常祭之日特假於廟釋奠告以受君之命也君卷冕立於阼夫人副褘立於東房夫人薦豆執校執醴授之執鐙尸酢夫人執柄夫人受尸執足夫婦相授受不相襲處酢必易爵明夫婦之别也疏曰校謂豆之中央直者鐙謂豆下跗夫人薦豆之時此執醴之人以豆授夫人則執鐙夫人受之乃執校也柄者爵爲雀形以尾爲柄也夫婦相授受謂交相致爵之時襲因也其執之物不相因故處凡爲俎者以骨爲主骨有貴賤殷人貴髀周人貴肩凡前貴於後俎者所以明祭之必有惠也是故貴者取貴骨賤者取賤骨貴者不重賤者不虛示均也惠均則政行政行則事成事成則功立功之所以立者不可不知也俎者所以明惠之必均也善爲政者如此故曰見政事之均焉註曰凡前貴於後謂脊脅臂臑之屬疏曰殷質貴髀之厚賤肩之薄周文貴肩之顯賤髀之隱前貴於後據周言之凡賜爵昭爲一穆爲一昭與昭齒穆與穆齒凡羣有司皆以齒此之謂長幼有序註曰昭穆猶特牲少牢之禮衆兄弟也羣有司猶衆賓下及執事者君賜之爵謂若酬之疏曰爵酒爵也此旅酬時賜助祭者酒衆兄弟子孫等在昭列者則爲一色在穆列者自爲一色各自相旅尊者在前卑者在後若同班列則長者在前少者在後是昭與昭齒穆與穆齒也夫祭有􅂌煇胞翟閽者惠下之道也唯有德之君爲能行此明足以見之仁足以與之畀之爲言與也能以其餘􅂌其下者也煇者甲吏之賤者也胞者肉吏之賤者也翟者樂吏之賤者也閽者守門之賤者也古者不使刑人守門此四守者吏之至賤者也尸又至尊以至尊旣祭之末而不忘至賤而以其餘畀之是故明君在上則竟内之民無凍餒者矣此之謂上下之際註曰明足以見之見此卑者也仁足以與之與此卑者也煇周禮作韗謂韗磔皮革之官也翟謂教羽舞者也古者不使刑人守門謂夏殷時疏曰周禮墨者使守門故知謂夏殷時際接也至尊與賤者其道接也坡謂十者之序首設几筵然後迎尸故第二第三次之尸入則獻而獻卿大夫士賓兄弟命爵出禄皆九獻中禮故第四第五第六次之既獻而後夫婦致爵故第七次之凡受獻則薦俎設於其位故第八次之祭畢旅酬故第九次之自上及下皆有薦脀肉羞故廣言至賤以見惠之均爲第十此下宜接以夫祭有餕至故曰祭者教之本也已五節疑錯簡凡祭有四時春祭曰礿夏祭曰禘秋祭曰嘗冬祭曰烝註曰謂夏殷時禮也坡謂自此至何以爲民父母矣四節當在夫祭有三重節下礿禘陽義也嘗烝隂義也禘者陽之盛也嘗者隂之盛也故曰莫重於禘嘗註曰夏者尊卑著而秋萬物成疏曰隂功成就故爲隂盛古者於禘也發爵賜服順陽義也於嘗也出田邑發秋政順陰義也故記曰嘗之日發公室示賞也草艾則墨未發秋政則民弗敢草也註曰言爵命屬陽國地屬隂發公室出賞物也草艾謂艾取草也秋草木成可芟艾給爨亨時則始行小刑也疏曰出田邑之時亦有物也故覲禮秋時賜侯氏車馬及篋服方氏曰墨五刑之輕者左氏言賞以春夏刑以秋冬而此言嘗之日發公室者蓋賞雖以春夏爲主而亦未始不用刑月令孟夏㫁薄刑決小罪是也刑雖以秋冬爲主亦未始不行賞此所言是也故曰禘嘗之義大矣治國之本也不可不知也明其義者君也能其事者臣也不明其義君人不全不能其事爲臣不全夫義者所以濟志也諸德之發也是故其德盛者其志厚其志厚者其義章其義章者其祭也敬祭敬則竟内之子孫莫敢不敬矣是故君子之祭也必身親涖之有故則使人可也雖使人也君不失其義者君明其義故也其德薄者其志輕疑於其義而求祭使之必敬也弗可得已祭而不敬何以爲民父母矣註曰濟成也竟内之子孫萬人爲子孫疏曰志厚念親志意深厚也疑於其義謂志意既輕疑惑於祭祀之義不能盡心致敬也集說曰中庸言明乎郊社之禮禘嘗之義治國如視諸掌濟志成其所欲爲也發德顯其所當爲也方氏曰大宗伯若王不與祭祀則攝位先儒謂王有故代之行其祭事正謂是矣熊氏曰諸德仁孝之德也不失其義謂順時以舉祭也夫鼎有銘銘者自名也自名以稱揚其先祖之美而明著之後世者也爲先祖者莫不有美焉莫不有惡焉銘之義稱美而不稱惡此孝子孝孫之心也唯賢者能之註曰銘謂書之刻之以識事者也自名謂稱揚其先祖之德著已名於下方氏曰稱則稱之以言揚則揚其所爲明則使之顯而不晦著則使之見而不隱銘者論譔其先祖之有德善功烈勲勞慶賞聲名列於天下而酌之祭器自成其名焉以祀其先祖者也顯揚先祖所以崇孝也身比焉順也明示後世教也註曰烈業也王功曰勲事功曰勞酌之祭器言斟酌其美傳著於鐘鼎也身比焉謂自著名於下也順也自著名以稱揚先祖之德孝順之行也教也所以教後世疏曰論謂論説譔則譔錄祀其先祖者預君祫祭也禮功臣既得銘鼎則得預君大祫也比次也熊氏曰在心爲德在事爲善自樹爲功烈事上爲勲勞慶賞岀於上聲名出於人夫銘者壹稱而上下皆得焉耳矣是故君子之觀於銘也既美其所稱又美其所爲爲之者眀足以見之仁足以與之知足以利之可謂賢矣賢而勿伐可謂恭矣疏曰上謂光揚先祖下謂成已順行所稱謂先祖也所爲謂己身也坡謂見之者見先祖之善也與之者與先祖以傳名也利之者稱美而不誣則不害先祖之實行矣故衛孔悝之鼎銘曰六月丁亥公假于大廟公曰叔舅乃祖莊叔左右成公成公乃命莊叔隨難于漢陽即宮于宗周奔走無射集說曰孔悝衛大夫周六月夏四月也公衛莊公蒯瞶也假至也至廟禘祭也因祭而賜之銘蓋德悝之立已故褒顯其先世也異姓大夫而年幼故稱叔舅莊叔悝七世祖孔達也成公爲晉所伐而奔楚故云隨難于漢陽漢楚之川也後雖反國又以殺弟叔武晉人執之歸於京師置諸深室故云即宮于宗周也射厭也啓右獻公獻公乃命成叔纂乃祖服疏曰案左傳無孔達之事獻公反國亦非成叔之功集說曰獻公成公之曾孫名衎啟開右助也魯襄十四年衛孫文子甯惠子逐衛侯衛侯奔齊言莊叔餘功流於後世能右助獻公使之亦得反國也成叔莊叔之孫烝鉏也其時成叔事獻公故公命其纂繼爾祖舊所服行之事也乃考文叔興舊耆欲作率慶士躬恤衛國其勤公家夙夜不解民咸曰休哉公曰叔舅予女銘若纂乃考服應氏曰嗜欲者心志之所存言其先世之忠皆以愛君憂國爲嗜欲文叔孔圉慕尚而能興起之也作率奮起而倡率之也慶卿也古卿慶同音字亦同用故慶雲亦言卿雲悝拜稽首曰對揚以辟之勤大命施于烝彛鼎此衞孔悝之鼎銘也集說曰對揚至彜鼎十三字止作一句讀言對答揚舉用吾君殷勤之大命施勒於烝祭之彜尊及鼎也古之君子論譔其先祖之美而明著之後世者也以比其身以重其國家如此註曰如莊公命孔悝之爲也莊公孔悝雖無令德以終其事於禮是行之非子孫之守宗廟社稷者其先祖無美而稱之是誣也有善而弗知不明也知而弗傳不仁也此三者君子之所恥也坡謂無美而稱之知不足以利之也有善不知明不足以見之也知而不傳仁不足以與之也昔者周公旦有勲勞於天下周公旣沒成王康王追念周公之所以勲勞者而欲尊魯故賜之以重祭外祭則郊社是也内祭則大嘗禘是也夫大嘗禘升歌清廟下而管象朱干玉戚以舞大武八佾以舞大夏此天子之樂也康周公故以賜魯也子孫纂之至於令不廢所以明周公之德而又以重其國也註曰言此者王室所銘若周公之功朱干赤盾戚斧也此大武之舞所執也佾猶列也大夏禹樂文舞也執羽籥文武之舞皆八列互言之耳康猶褒大也疏曰此因上説鼎銘明先祖之善故此明周公之勲子孫纂之特重於餘國亦光揚之事註云互文者以大夏言舞數則大武亦當有之大武言舞器則大夏亦有故云互經解第二十六疏曰鄭云名曰經解者以其記六藝政教之得失也孔子曰入其國其教可知也註曰觀其風俗則知其所以教其爲人也温柔敦厚詩教也疏通知遠書教也廣博易良樂教也絜靜精微易教也恭儉莊敬禮教也屬辭比事春秋教也故詩之失愚書之失誣樂之失奢易之失賊禮之失煩春秋之失亂熊氏曰温柔不剛躁也敦厚不浮薄也疏通豁達也知逺明久逺之事也廣博量宏也易良情和也失愚淳厚者未必深察情僞也失誣通達者未必篤確誠實也失奢寛厚者未必嚴立繩簡也失賊索隱害道也失煩循規蹈矩則泛濫於儀文而亡其體也坡謂絜静不專著一事精微不遺一理也朱子言易如鏡相似是也失煩如居敬而不行簡者屬合也合其辭而不異則無别意一有異則意須别比次也次其事而相類則無他義一不類則義有他故程子曰不可事事各求異義但一字有異或上下文異則義須别此屬辭比事之真解而治春秋之要道也亂者其辭其事非必有異而此錯綜其義例則亂也見學春秋者多坐此曰此言人也非言經也曰經如是人學之則立言制行亦如是何以異哉其爲人也温柔敦厚而不愚則深於詩者也疏通知逺而不誣則深於書者也廣博易良而不奢則深於樂者也絜靜精微而不賊則深於易者也恭儉莊敬而不煩則深於禮者也屬辭比事而不亂則深於春秋者也疏曰此一經言以詩化民雖用敦厚能以義節之使民雖敦厚不至於愚則是在上深達於詩之理能以詩教民也以下諸經放此坡謂夫子之言止此蓋記者欲言禮之可以正國而先引夫子枚論六經之教以冠篇首如考工記開章統言六職以起百工之事文法正與此同天子者與天地參故德配天地兼利萬物與日月竝明明照四海而不遺微小其在朝廷則道仁聖禮義之序燕處則聽雅頌之音行步則有環佩之聲升車則有鸞和之音居處有禮進退有度百官得其宜萬事得其序詩云淑人君子其儀不忒其儀不忒正是四國此之謂也註曰道猶言也環佩佩環佩玉也所以爲行節也鸞和皆鈴也所以爲車行節也韓詩内傳曰鸞在衡和在軾前升車則馬動馬動則鸞鳴鸞鳴則和應熊氏曰天子德配天地明並日月所以然者以養之有素耳故在朝廷則講議仁聖禮義之次序燕處則聽雅頌之音心中斯須不和不樂則鄙詐入故行步有環佩以節之升車有鸞和以和之外貌斯須不莊不敬則慢易入故居處有禮進退有度夫自朝廷以至進退則無餘地自仁聖以至禮度則無餘功所養之密如此由是用人行政無不善而百官宜萬事序矣坡謂此節言王者以禮自治自此以至終篇皆記者之言也發號出令而民說謂之和上下相親謂之仁民不求其所欲而得之謂之信除去天地之害謂之義義與信和與仁霸王之器也有治民之意而無其器則不成疏曰若擊壤歌耕田而食鑿井而飲帝有何力是不求其所欲也天不言而四時行是信若四時故云謂之信也天地害者水旱疫癘之等及天地之内有惡事害人皆是坡謂此節言以禮治世古者天子而下則有二伯方牧霸王之器猶言天子諸侯治世之法耳乃以爲王霸竝言非夫子之言宋元末儒不求意義而輕摘妄罵何處來也禮之於正國也猶衡之於輕重也繩墨之於曲直也規矩之於方圜也故衡誠懸不可欺以輕重繩墨誠陳不可欺以曲直規矩誠設不可欺以方圜君子審禮不可誣以姦詐疏曰此贊明禮事之重治國之急坡謂上言禮爲人君所操持以治世之器故遂以器喻之以見其即國之繩墨規矩君子所當審定而布之也是故隆禮由禮謂之有方之士不隆禮不由禮謂之無方之民敬讓之道也故以奉宗廟則敬以入朝廷則貴賤有位以處室家則父子親兄弟和以處鄉里則長幼有序孔子曰安上治民莫善於禮此之謂也呉氏曰上爲下之所敬讓而居上者不危不危則安矣民知君之當敬讓而爲民者不亂不亂則治矣熊氏曰隆禮崇以心也由禮行以身也敬則謹恪以收斂於内讓則退遜以應接於外坡謂隆禮由禮如木從繩而正者故謂之有方之士不隆禮由禮或徑情或狡獪不可以常法律者謂之無方之民即姦詐也蓋禮者敬讓之道非可以僞爲者隆之由之故以奉宗廟以下其效無徃不善而君子所以正國使無姦詐者此也引夫子之言以證霸王有其器則成之意故朝覲之禮所以明君臣之義也聘問之禮所以使諸侯相尊敬也喪祭之禮所以明臣子之恩也鄉飲酒之禮所以明長幼之序也昏姻之禮所以明男女之别也夫禮禁亂之所由生猶坊止水之所自來也故以舊坊爲無所用而壞之者必有水敗以舊禮爲無所用而去之者必有亂患註曰壻曰昏婦曰姻方氏曰君臣之亂生於無義故以朝覲之禮禁之諸侯之亂生於不和故以聘問之禮禁之臣子之亂生於無恩故以喪祭之禮禁之以至鄉飲之施於長幼昏姻之施於男女其義亦若是而已坡謂自此至末承上以奉宗廟以入朝廷以處室家以處鄉里反覆推本見當隆之由之此節禁亂猶通上下言之下節教化則專責君子之當慎禮以爲正國之要也舊之義深矣子孫不念祖宗繼體不念開創否則侮厥父母曰昔之人無聞知此周公之所大患也故昏姻之禮廢則夫婦之道苦而淫辟之罪多矣鄉飲酒之禮廢則長幼之序失而爭鬭之獄繁矣喪祭之禮廢則臣子之恩薄而倍死忘生者衆矣聘覲之禮廢則君臣之位失諸侯之行惡而倍畔侵陵之敗起矣故禮之教化也微其止邪也於未形使人日徙善遠罪而不自知也是以先王隆之也易曰君子慎終差若豪釐繆以千里此之謂也註曰苦謂不至不答之屬疏曰教化也微言禮之教人事微之時豫教化之熊氏曰此之謂也言先王慎人之始即君子慎已之始之謂也禮記述註卷二十一
