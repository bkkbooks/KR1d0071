body:
  text: 禮記述註卷十二安溪李光坡撰内則第十二疏曰以其記男女居室事父母舅姑之法閨門之内軌儀可則故曰内則后王命冡宰降德於衆兆民註曰德猶教也萬億曰兆天子曰兆民諸侯曰萬民疏曰孫炎王肅皆云后王君王謂天子也坡謂此篇所陳與周官冡宰相表裏可見飲食男女之防先王所以議道自已而錫福於民舍是無大者吾人似宜體造端立本之精意以求其有益后王王后文義之末恐是非不在否子事父母雞初鳴咸盥潄櫛縰笄總拂髦冠緌纓端韠紳搢笏集説曰盥洗手也潄滌口也櫛梳也縰黑繒韜髪者以縰韜髪作髻訖即横挿笄以固髻總裂練繒為之以束髪之本而垂餘於髻後以為飾也拂髦振去髦上之塵也髦用髪為之象㓜時剪髪為鬌之形此所陳皆以先後之次櫛訖加縰次加笄加總然後加髦著冠冠之纓結於頷下以為固結之餘者下垂謂之緌端𤣥端服也衣用緇布而裳不同上士𤣥裳中士黃裳下士雜裳也服𤣥端著韠又加紳大帶也搢挿也挿笏於帶中韠以韋為之古者席地而坐以臨爼豆故設蔽膝以備濡漬韠之言蔽也在冕服謂之韍他服則謂之韠左右佩用左佩紛帨刀礪小觽金燧集説曰所佩之物皆是備尊者使令之用紛以拭器帨以拭手皆巾也刀礪小刀與礪石也觽狀如錐象骨為之小觽所以解小結者金燧用以取火於日中者右佩玦捍管遰大鑴木燧集說曰玦射者著於右手大指所以鉤弦而開弓體也捍拾也韜左臂而收拾衣袖以利弦也管註云筆彄其形制未聞遰刀室也大觽所以解大結木燧鑚火之器晴則用金燧以取火陰則用木燧以鑚火也偪集説曰即詩所謂邪幅也偪束其脛自足至膝故謂之偪也屨著綦集說曰綦屨頭之飾即鉤也說見曲禮著猶施也朱子曰綦鞋口帶也古人皆旋繋今人只從簡易綴之於上如假帶然婦事舅姑如事父母雞初鳴咸盥潄櫛縰笄總衣紳集說曰笄今之簮也衣紳𤣥端綃衣之上加紳帶士妻之服也左佩紛帨刀礪小觽金燧右佩箴管線纊施縏袠大觽木燧衿纓綦屨以適父母舅姑之所註曰縏小囊也縏袠言施明為箴管線纊有之衿猶結也婦人有纓示繋屬也疏曰袠刺也以針刺袠而為縏囊集說曰箴管箴在管中也及所下氣怡聲問衣燠寒疾痛苛癢而敬抑搔之出入則或先或後而敬扶持之進盥少者奉槃長者奉水請沃盥盥卒授巾問所欲而敬進之柔色以溫之集說曰苛疥也抑按搔摩也溫承藉之義謂以柔順之色承藉尊者之意若藻藉之承玉然饘酏酒醴芼羮菽麥蕡稻黍梁秫唯所欲集說曰饘厚粥酏薄粥也芼羮以菜雜肉為羮也蕡大麻子棗栗飴蜜以甘之菫荁枌榆免薨滫瀡以滑之脂膏以膏之父母舅姑必甞之而后退集說曰飴餳也菫菜名荁似菫而葉大榆之白者名枌免新鮮者薨乾陳者滫說文久泔也瀡滑也滫瀡滫之滑者也以滑之者謂用菫荁枌榆生者乾者相和滫瀡之令柔滑也凝者為脂釋者為膏甘之滑之膏之皆謂調和飲食之味也此篇所記飲食珍羞諸物古今異制風土異宜不能盡曉然亦可見古人察物之精用物之詳也男女未冠笄者雞初鳴咸盥潄櫛縰拂髦總角衿纓皆佩容臭昧爽而朝問何食飲矣若巳食則退若未食則佐長者視具疏曰上文衿纓乃婦人十五許嫁笄而禮之因著纓明有繫蓋以五采為之其制未聞此衿纓者是未冠笄之纓用之以佩容臭故童子男女皆有之與婦人既笄之纓别也集說曰總角總聚其髮而結束之為角童子之飾也容臭香物也助為形容之飾故言容臭以纓佩之昧晦也爽明也昧爽欲明未明之時凡内外雞初鳴咸盥潄衣服歛枕簟灑埽室堂及庭布席各從其事孺子蚤寢晏起唯所欲食無時疏曰此一經總論子婦之外卑賤之人爰及僕𨽻之等集說曰古人枕席之具夜則設之曉則歛之簟席之親身者不以私䙝之用示人也由命士以上父子皆異宫昧爽而朝慈以㫖甘日出而退各從其事日入而夕慈以㫖甘註曰異宫崇敬也慈愛敬進之日出乃從事食禄不荒農也父母舅姑將坐奉席請何鄉將祍長者奉席請何趾少者執牀與坐御者舉几斂席與簟縣衾篋枕斂簟而襡之集説曰將坐旦起時也奉坐席而鋪者必問何向祍臥席也將衽謂更卧處也長者奉此卧席而鋪必問足向何所牀說文云安身之几坐非今之卧牀也將坐之時少者執此牀以與之坐御侍者舉几進之使之憑以為安卧必簟在席上旦起則斂之而簟又以襡韜之者以親身恐穢汚也衾則束而懸之枕則貯於篋也父母舅姑之衣衾簟席枕几不傳杖屨祗敬之勿敢近敦牟巵匜非餕莫敢用與恒食飲非餕莫之敢飲食集說曰傳移也謂此數者每日置之有常處子與婦不得輙移置他所也近謂挨偪之也敦與牟皆盛黍稷之器牟讀為堥土釜也此器則木為之象土釜之形耳巵酒器匜盛水漿之器此四器皆尊者所用子與婦非餕其餘無敢用此器也與及也及尊者所常食飲之物子與婦非餕餘不敢擅飲食之也父母在朝夕恒食子婦佐餕既食恒餕父没母存冡子御食羣子婦佐餕如初㫖甘柔滑孺子餕集說曰佐餕者勸勉之使食而後餕其餘也既食恒餕者盡食其常食之餘末有原也御食侍母而食也如初如父母在時也在父母舅姑之所有命之應唯敬對進退周旋慎齊升降出入揖遊不敢噦噫嚏咳欠伸跛踦睇視不敢唾洟集説曰應之辭唯為恭齊莊也揖遊從容和適之意噦嘔逆之聲也噫嘆息嚏噴嚏咳𠻳聲也氣乏則欠體疲則伸偏任為跛依物為倚睇視傾視也洟自鼻出者寒不敢襲癢不敢搔不有敬事不敢袒裼不渉不撅䙝衣衾不見裏集説曰襲重衣也袒與裼皆禮之敬故非敬事不袒裼也撅揭衣也不見裹為其可穢父母唾洟不見冠帶垢和灰請潄衣裳垢和灰請澣衣裳綻裂紉箴請補綴集說曰唾洟不見謂即刷除之不使見示於人也手曰潄足曰澣皆洗濯之事和灰如今人用灰湯也綻線斷裂布破以線貫箴為紉五日則燂湯請浴三日具沐其間面垢燂潘請靧足垢燂湯請洗少事長賤事貴共帥時集説曰燂溫也潘淅米汁也靧洗面也共帥時皆循是禮也男不言内女不言外非祭非喪不相授器其相授則女受以篚其無篚則皆坐奠之而后取之集說曰男正位乎外不當於外而言内庭之事女正位乎内不當於内而言梱外之事惟喪祭二事乃得以器相授受者以祭為嚴肅之地喪當急遽之時乃無他嫌也非此二者則女必執篚使授者置之篚中也皆坐男女皆跪也授者跪而置諸地則受者亦跪而就地以取之也外内不共井不共湢浴不通寢席不通乞假男女不通衣裳内言不出外言不入男子入内不嘯不指夜行以燭無燭則止女子出門必擁蔽其靣夜行以燭無燭則止道路男子由右女子由左集說曰湢浴室也不嘯不指謂聲容有異駭人視聼也嘯讀如字蹙口而出聲擁猶障也由右者地道尊右子婦孝者敬者父母舅姑之命勿逆勿怠集説曰子而孝父母必愛之婦而敬舅姑必愛之然猶恐恃其孝敬之愛或時違解故以勿逆勿怠為戒若飲食之雖不耆必甞而待加之衣服雖不欲必服而待集説曰甞而待服而待皆謂俟尊者察其不耆不欲而改命之則或置之或藏去乃敢如已意也加之事人代之已雖弗欲姑與之而姑使之而后復之集說曰尊者任之以事而巳既為之矣或念其勞而使他人代為已意雖不以為勞而不欲其代然必順尊者之意而姑與之若慮其為之不如巳意姑教使之及其果不能而後已後為之也子婦有勤勞之事雖甚愛之姑縱之而寧數休之集說曰謂雖甚愛此子婦而不忍其勞然必且縱使為之而寜數數休息之必使終竟其事而後巳不可以姑息為愛而使之不事事也子婦未孝未敬勿庸疾怨姑教之若不可教而后怒之不可怒子放婦出而不表禮焉集說曰庸用也怒之譴責之也不可怒謂雖譴責之而不改也雖放逐其子出棄其婦而不表明其失禮之罪示不終絶之也父母有過下氣怡色柔聲以諫諫若不入起敬起孝說則復諫不說與其得罪於鄉黨州閭寜熟諫父母怒不說而撻之流血不敢疾怨起敬起孝疏曰熟諫謂純熟殷勤而諫若物之成熟然父母有婢子若庶子庻孫甚愛之雖父母没没身敬之不衰集說曰婢子賤者之所生也若及也或也没身終身也父母之所愛亦愛之至於犬馬盡然而况於人乎子有二妾父母愛一人焉子愛一人焉由衣服飲食由執事毋敢視父母所愛雖父母没不衰集說曰由自也不敢以私愛違父母之情故也子甚宜其妻父母不說出子不宜其妻父母曰是善事我子行夫婦之禮焉没身不衰集説曰宜猶善也大戴禮婦有七出不順父母一無子二淫三妬四惡疾五多言六竊盜七三不去有所受無所歸不去曾經三年喪不去前貧賤後富貴不去何休又云喪婦長女不取無教戒世有惡疾不取棄於天世有刑人不取棄於人亂家女不取類不正逆家女不取廢人倫也父母雖没將為善思貽父母令名必果將為不善思貽父母羞辱必不果舅没則姑老冡婦所祭祀賓客每事必請於姑介婦請於冡婦集説曰老謂傳家事於長婦也然長婦猶不敢專行故祭祀賓客之事必禀問焉介婦衆婦也舅姑使冡婦毋怠不友無禮於介婦劉氏曰使以事使之也毋禁止辭不友者不愛也無禮者不敬也言舅姑以事命冡婦則冡婦當自任其勞不可怠於勞而怨介婦不助已遂不愛敬之也舅姑若使介婦毋敢敵耦於冡婦劉氏曰敵耦者欲求分任均勞之意言舅姑若以事使介婦為之則介婦亦當自任其勞不可謂巳與冡婦為敵耦欲求均配其勞也不敢並行不敢並命不敢並坐集説曰又言介婦之與冡婦分有尊卑非惟任事毋敢敵耦亦且不敢比肩而行不敢並受命於尊者不敢並出命於卑者葢介婦當請命於冡婦也坐次亦必異列凡婦不命適私室不敢退婦將有事大小必請於舅姑子婦無私貨無私畜無私器不敢私假不敢私與註曰家事統於尊也婦或賜之飲食衣服布帛佩帨茝蘭則受而獻諸舅姑舅姑受之則喜如新受賜若反賜之則辭不得命如更受賜藏以待乏集説曰或賜之謂私親兄弟也茝蘭皆香草也受之則如新受賜不受則如更受賜孝愛之至也不得命者不見許也待乏待尊者之乏也婦若有私親兄弟將與之則必復請其故賜而后與之集説曰故即前者所獻之物而舅姑不受者雖藏於私室今必請於尊者既許然後取以與之也適子庻子祗事宗子宗婦雖貴富不敢以貴富入宗子之家雖衆車徒舍於外以寡約入疏曰適子謂父及祖之適子是小宗也庻子謂適子之弟宗子謂大宗子宗婦謂大宗子之婦子弟猶歸器衣服裘衾車馬則必獻其上而后敢服用其次也若非所獻則不敢以入於宗子之門不敢以貴富加於父兄宗族集説曰猶若也謂子弟中若有以功徳顯榮而蒙尊上歸遺之以器用衣服等物則必獻其上等者於宗子而自服用其次者若非宗子之爵所當服用而不可獻者則巳亦不敢服用之以入宗子之門也加高也若富則具二牲獻其賢者於宗子夫婦皆齊而宗敬焉終事而后敢私祭集説曰二牲羊豕賢猶善也齊而宗敬謂齊戒而往助祭事以致宗廟之敬也私祭祖禰則用二牲之下者飯註曰目諸飯也黍稷稻粱白黍黄粱稰穛集説曰飯之品有黄黍稷稻白粱白黍黄粱凡六其糓熟而穫之則曰稰生穫之曰穛穛是歛縮之名以生穫故其物縮歛也此諸侯之飯天子又有麥與苽膳註曰目諸膳也膷臐膮醢牛炙集説曰膷牛􅌜臐羊􅌜膮豕􅌜三者在足脛合處如鶴之膝故􅌜字從寉而音合皆香美之名也醢字衍牛炙炙牛肉也此四物為四豆共為一行醢牛胾醢牛膾集説曰醢肉醬也牛胾切牛肉也并醢與牛膾四物為四豆是第二行羊炙羊胾醢豕炙集説曰此四物為四豆是第三行醢豕胾芥醬魚膾集説曰此四物為四豆是第四行共十六豆下大夫之禮也雉兔鶉鷃集説曰此四物為四豆列為第五行共二十豆則上大夫之禮也飲註曰目諸飲也重醴稻醴清糟黍醴清糟粱醴清糟或以酏為醴黍酏漿水醷濫集説曰醴者稻黍粱三者各為之巳泲者為清未泲者為糟是三醴各有清有糟也以清與糟相配重設故云重醴蓋致飲於賓客則兼設之也以酏為醴釀粥為醴也黍酏以黍為粥也漿醋水也醷梅漿也濫雜糗飯之屬和水也酒註曰目諸酒也清白集説曰清清酒也祭祀之酒事酒昔酒俱白故以白名之有事而飲者謂之事酒無事而飲者名昔酒羞註曰目諸羞也糗餌粉酏集説曰周禮羞籩之實糗餌粉餈此酏字當讀為餈記者誤耳許慎云餈稻餅也炊米擣之粉餈以豆為粉糝餈上也糗炒乾米麥也擣之以為餌蓋先屑為粉然後溲之餌之言堅潔若玉珥也餈之言滋也食蝸醢而苽食雉羮麥食脯羮雞羮折稌犬羮兔羮和糝不蓼疏曰蝸醢苽食雉羮三者味相宜麥食脯羮雞羮及折稌犬羮兎羮皆味相宜集説曰蝸與螺同苽雕胡也脯羮析脯為羮也稌稻折稌謂細折稻米為飯也此五羮者宜以五味調和米屑為糝不須加蓼故云和糝不蓼也濡豚包苦實蓼濡雞醢醬實蓼濡魚卵醬實蓼濡鼈醢醬實蓼集説曰濡讀為胹烹煮之也言胹豚之時包裹之以苦菜而實蓼於腹中此四物皆以蓼實其腹而煮之也醢醬醢及醬也卵醬魚子為醬也三物之用醬葢以調和其汁耳腵脩蚳醢脯羮兔醢麋膚魚醢魚膾芥醬麋腥醢醬桃諸梅諸卵鹽疏曰自蝸醢至濡鼈醢之與醬皆和調濡漬雞豚之屬為他物而設之故不數矣腵脩以下醢及醬各自為物但相配而食故數之凡二十六物既非周禮掌客諸侯相食之正饌又與公食大夫禮異故註云似皆人君燕所食也集説曰腵脩見前蚳醢以蚍蜉子為醢也謂食腵脩者以蚳醢配之食脯羮者以兔醢配之餘倣此麋鹿之大者膚切肉也麋腥生麋肉也諸菹也桃梅皆為菹藏之欲藏必令稍乾故周禮謂之乾䕩食之則和以卵鹽大鹽形似鳥卵故名卵鹽也凡食齊視春時羮齊視夏時醬齊視秋時飲齊視冬時註曰飯宜溫羮宜熱醬宜凉飲宜寒也凡和春多酸夏多苦秋多辛冬多鹹調以滑甘集説曰酸苦辛鹹木火金水之所屬多其時味所以養氣也四時皆調以滑甘象土之寄歟牛宜稌羊宜黍豕宜稷犬宜粱鴈宜麥魚宜苽集説曰上云折稌犬羮此云牛宜稌犬宜粱者上是人君燕食以滋味為羮此據尊者正食而言也春宜羔豚膳膏薌夏宜腒䐹膳膏臊秋宜犢麛膳膏腥冬宜鮮羽膳膏羶集説曰牛膏薌犬膏臊雞膏腥羊膏羶如春時食羔豚則煎之以牛膏故云膳膏薌也餘倣此腒乾雉鱐乾魚麛鹿子鮮生魚羽鴈也牛脩鹿脯田豕脯麋脯麕脯麋鹿田豕麕皆有軒雉兔皆有芼註曰脯皆析乾肉也軒讀為憲憲謂藿葉切也芼謂菜釀也疏曰麋鹿田豕麕皆有軒者言此等非但為餔又可腥食腥食之時皆以藿葉起之而不細切故云皆有軒不云牛者牛惟可細切為膾不宜大切為軒雉兔皆有芼者為雉羮兔羮皆有芼菜以和之爵鷃蜩范芝栭蔆椇棗栗榛柿瓜桃李梅杏楂梨薑桂註曰自牛脩至此三十一物皆人君燕食所加庻羞也周禮天子羞用百有二十品記者不能次録集説曰蜩蟬范蜂芝如今木耳之類栭韻㑹註云江淮呼小栗為栭栗蔆芰也椇形似珊瑚味甜羙一名白石李大夫燕食有膾無脯有脯無膾士不貳羮胾庶人耆老不徒食疏曰若朝夕常食則下云羮食自諸侯以下至於庶人無等集説曰因上文言人君燕食之物而言大夫燕食士不貳羮胾謂士燕食也徒猶空也不徒食言必有饌膾春用蔥秋用芥豚春用韭秋用蓼脂用葱膏用䪥三牲用藙和用醯獸用梅疏曰自此至士於玷一論調和飲食之宜集説曰芥辛菜即上芥醬肥凝者為脂釋者為膏三牲牛羊豕也藙茱萸也和用醯以醯和三牲也獸用梅以梅和獸也鶉羮雞羮鴽釀之蓼魴鱮烝雛燒雉薌無蓼集説曰鴽不為羮惟烝煮而巳故不曰羮此三味皆切蓼以雜和之故曰釀之蓼訪鱮二魚烝而食之故曰魴鱮烝雛鳥之小者燒熟然後調和故云雛燒雉則或燒或烝或以為羮皆可薌謂香草若白蘇紫蘇之屬也言烝魴鱮燒雛及烹雉皆調和之以香草無用蓼也不食雛鼈狼去腸狗去腎狸去正脊去凥狐去首豚去腦魚去乙鼈去醜註曰皆為不利人也雛鼈伏乳者乙今東海鰫魚有骨名乙在目旁狀如篆乙食之鯁人不可出醜鼈竅也肉曰脫之魚曰作之棗曰新之栗曰撰之桃曰膽之柤梨曰攅之集説曰脫者剥除其筋膜作者摇動之以觀其鮮鯘一說作猶斮也謂削其鱗棗則拭治而使之新潔撰猶選也栗多蟲螙宜選擇之桃多毛拭治令青滑如膽攅之者鑚治其螙處也此皆治擇之名牛夜鳴則庮羊泠毛而毳羶狗赤股而躁臊鳥皫色而沙鳴鬱豕望視而交睫腥馬黒脊而般臂漏集説曰牛之夜鳴者其肉庮臭羊之毛本稀泠而毛端毳結者其肉羶氣狗股裏無毛而舉動急躁者其肉臊惡皫色色變而無潤澤也沙嘶也鳴而其聲沙嘶者鬱謂腐臭也望視舉目高也交睫目睫毛交也腥讀為星肉中生小息肉如米者也般臂前脛毛斑也漏讀為螻謂其肉如螻姑臭也牛至馬六物若此者皆不可食雛尾不盈握弗食舒鴈翠鵠鴞胖舒鳬翠雞肝鴈腎鴇奥鹿胃集説曰舒鴈鵞也翠尾肉也胖脅側薄肉也舒鳬鴨也鴇似鴈而大無後指奥脾肶也藏之深奥處也此九物亦不可食肉腥細者為膾大者為軒或曰麋鹿魚為菹麕為辟雞野豕為軒為宛脾切蔥若薤實諸醯以柔之疏曰為記之時無菹軒辟雞宛脾之制作之未審舊有此言記者承而用之故稱或曰其辟雞宛脾及軒之名其義未聞集説曰細縷切者為膾大片切者為軒此軒辟雞宛脾皆菹類也或用蔥或用薤故云切蔥若薤肉與蔥薤皆置之醋中故云實諸醯浸漬而熟則柔軟矣故曰柔之羮食自諸侯以下至於庻人無等大夫無秩膳大夫七十而有閣集説曰羮與飯常日所食故無貴賤之等差秩常也五十始命未為甚老故無常膳七十有閣則有秩膳矣閣以板為之所以庋飲食之物天子之閣左達五右達五公侯伯於房中五大夫於閣三士於坫一疏曰宫室之制中央為正室正室左右為房房外有序序外有夾室天子尊庖厨遠故左夾室五閣右夾室五閣諸侯卑庖厨宜稍近故於房中惟一房之中而五閣也大夫卑而無嫌故亦於夾室而三閣士卑不得為閣但於室中為土坫以庋食五者三牲之肉及魚腊三者豕魚腊也凡養老有虞氏以燕禮夏后氏以饗禮殷人以食禮周人修而兼用之凡五十養於鄉六十養於國七十養於學達於諸侯八十拜君命一坐再至瞽亦如之九十者使人受五十異粻六十宿肉七十貳膳八十常珍九十飲食不違寢膳飲從於遊可也六十歳制七十時制八十月制九十日脩唯絞紟衾冒死而後制五十始衰六十非肉不飽七十非帛不煖八十非人不煖九十雖得人不煖矣五十杖於家六十杖於鄉七十杖於國八十杖於朝九十者天子欲有問焉則就其室以珍從七十不俟朝八十月告存九十日有秩五十不從力政六十不與服戎七十不與賔客之事八十齊喪之事弗及也五十而爵六十不親學七十致政凡自七十以上唯衰麻為喪凡三王養老皆引年八十者一子不從政九十者其家不從政瞽亦如之凡父母在子雖老不坐有虞氏養國老於上庠養庶老於下庠夏后氏養國老於東序養庶老於西序殷人養國老於右學養庶老於左學周人養國老於東膠養庶老於虞庠虞庠在國之西郊有虞氏皇而祭深衣而養老夏后氏收而祭燕衣而養老殷人冔而祭縞衣而養老周人冕而祭𤣥衣而養老集説曰此一節並說見王制曽子曰孝子之養老也樂其心不違其志樂其耳目安其寢處以其飲食忠養之孝子之身終終身也者非終父母之身終其身也是故父母之所愛亦愛之父母之所敬亦敬之至於犬馬盡然而况於人乎疏曰此一節因上陳養老之事遂陳孝子事親之禮陳氏曰樂其心喻父母於道也不違其志能養志也坡謂忠養二字宜玩味夫子戒子游以不敬正欲其盡心也終孝子之身不惟愛所愛敬所敬也祭之日思其居處思其笑語思其志意思其所樂思其所耆則飲食忠養以上亦終吾身而巳凡養老五帝憲三王有乞言五帝憲養氣體而不乞言有善則記之為惇史三王亦憲既養老而後乞言亦微其禮皆有惇史集説曰憲法也養老之禮五帝之世主於法其德行而已至三王之世則又有乞言之禮焉惇史所以記其惇厚之德也三王亦未甞不法其德行其乞言之禮亦依違求之而不偪切故云違其禮然亦皆有惇史焉方氏曰五帝之憲也而老者未甞無言要之以徳為主耳故曰有善則記之蓋可記者言故也三王之乞言而老者未甞無德要之以言為主耳故曰三王亦憲淳熬煎醢加於陸稻上沃之以膏曰淳熬疏曰此一節論養老須飲食如養親之事明八珍之饌併明羞豆糝􅊡之等集説曰淳沃也熬煎也陸稻陸地之稻也以陸稻為飯煎醢加於飯上又恐味薄故更沃之以膏此八珍之一也淳毋煎醢加於黍食上沃之以膏曰淳毋疏曰毋是禁辭非膳羞之體故讀為模象也蓋法象淳熬而為之但用黍飯為異耳此八珍之二也炮取豚若將刲之刳之實棗於其腹中編萑以苴之塗之以謹塗炮之塗皆乾擘之濯手以摩之去其皽為稻粉糔溲之以為酏以付豚煎諸膏膏必滅之鉅鑊湯以小鼎薌脯於其中使其湯毋滅鼎三日三夜毋絶火而後調之以醯醢集説曰此珍主於塗而燒之故以炮名將當為牂牂牡羊也刲之刳之殺而去其五藏也萑蘆葦之類苴裹也謹讀為墐說文黏土也擘之者擘去乾塗也皽謂皮肉之上魄莫也濯手以摩之去其皽謂擘泥手不净又兼肉熱故必濯其手然後摩去其皽膜也糔與前章滫瀡之滫同以稻米為粉滫溲之為粥若豚則以此粥敷其外若羊則解析其肉以此粥和之滅没也小鼎盛膏以膏煎豚牂膏必没此豚牂也鉅鑊湯以大鑊盛湯也脯解析之薄如脯也薌脯香美此脯也脯在小鼎内而小鼎則置在鑊湯内湯不可没鼎没鼎則水入壊脯也毋絶火微熱而已不熾之也至食則又以醯與醢調和之此八珍之三四也擣珍取牛羊糜鹿麕之肉必脄每物與牛若一捶反側之去其餌熟出之去其皽柔其肉集説曰脄夾脊肉也與牛若一謂與牛之肉多寡均也捶擣也反捶之又側捶之然後去其筋餌既熟乃去其皽膜而柔之以醯醢此八珍之五也漬取牛肉必新殺者薄切之必絶其理湛諸美酒期朝而食之以醢若醯醷集説曰絶其理横斷其文理也湛亦漬也期朝今旦至明旦也醷梅漿也此八珍之六也為熬捶之去其皽編萑布牛肉焉屑桂與薑以灑諸上而鹽之乾而食之施羊亦如之施麋施鹿施麕皆如牛羊欲濡肉則釋而煎之以醢欲乾肉則捶而食之集説曰此肉於火上為之故名曰熬生擣而去其皽膜然後布於編萑之上先以桂薑之屑灑之次用鹽釋謂以水潤釋之也此八珍之七也糝取牛羊豕之肉三如一小切之與稻米稻米二肉一合以為餌煎之集説曰三如一謂三者之肉多寡均也稻米二肉一謂二分稻米一分肉也此即周禮糝食肝膋取狗肝一幪之以其膋濡炙之舉燋其膋不蓼集説曰膋腸間脂舉皆也謂炙膋皆熟而焦食之不用蓼也此八珍之八記者文不依次故間雜在糝食酏食之間取稻米舉糔溲之小切狼臅膏以與稻米為酏集説曰狼臅膏狼胸臆中之膏也此葢以滫溲稻米之粉而煎之以膏註讀酏為􅊡者以酏是粥非豆實也此即周禮之酏食禮始於謹夫婦為宫室辨外内男子居外女子居内深宫固門閽寺守之男不入女不出註曰閽掌守中門之禁寺掌内人之禁令集説曰夫婦為人倫之始不謹則亂其倫類故禮始於謹夫婦也男女不同椸枷不敢縣於夫之楎椸不敢藏於夫之篋笥不敢共湢浴夫不在歛枕篋簟席襡器而藏之少事長賤事貴咸如之集説曰椸枷見曲禮植者曰楎横者曰椸楎椸同類之物椸以竿為之故註云竿謂之椸餘見前夫婦之禮唯及七十同藏無間故妾雖老年未滿五十必與五日之御將御者齊潄澣慎衣服櫛縰笄總角拂髦衿纓綦屨雖婢妾衣服飲食必後長者妻不在妾御莫敢當夕集説曰間别也夫婦唯至七十同處居藏無所間别以其衰老無嫌故也櫛縰以下說見篇首角字衍天子之御妻八十一人當九夕世婦二十七人當三夕九嬪九人當一夕三夫人當一夕后當一夕凡十五日而徧五日之御諸侯制也諸侯一娶九女夫人及二媵各有姪娣此六人當三夕次二媵當一夕次夫人專一夕凡五日而徧也當夕當妻之夕也妻將生子及月辰居側室夫使人日再問之作而自問之妻不敢見使姆衣服而對至於子生夫復使人日再問之夫齊則不入側室之門集説曰正寢在前燕寢在後側室又次燕寢在燕寢之旁故謂側室妻既居側室則妾亦當然也作動作之時也姆女師也子生男子設弧於門左女子設帨於門右三日始負子男射女否疏曰自妻將生子至此明大夫以下集説曰弧弓也帨佩巾也以此二物為男女之表負抱也國君世子生告於君接以大牢宰掌具三日卜士負之吉者宿齊朝服寢門外詩負之射人以桑􅋃蓬矢六射天地四方保受乃負之宰醴負子賜之束帛卜士之妻大夫之妾使食子集説曰接以大牢者以大牢之禮接見其子也宰宰夫也掌具掌其設禮之具也卜士負之者卜其吉者而使之抱子也詩承也儀禮言尸酢主人詩懷之亦承義桑􅋃蓬矢本太古也蓬是禦亂之草桑衆木之本射天地四方者期其有事於遠大也保保母也受乃負之受子於士而抱之也蓋士之負子特為斯須之禮而已宰既掌具故以醴禮負子之士仍賜束帛以酬之食子謂乳養之也凡接子擇日註曰雖三日之内尊卑必皆選其吉焉疏曰此一節論國君以下至庶人以上接子牲牢之異并適庶不同冡子則太牢庶人特豚士特豕大夫少牢國君世子大牢集説曰冡子大牢謂天子之元子也其非冡子則皆降一等註曰謂冡子之弟及衆妾之子也天子諸侯少牢大夫特豕士特豚庶人猶特豚也疏曰庶人以禮窮與士同異為孺子室於宮中擇於諸母與可者必求其寛裕慈惠溫良恭敬慎而寡言者使為子師其次為慈母其次為保母皆居子室他人無事不往疏曰此文雖據諸侯其實亦兼大夫士也但士不具三母耳大夫以上則具三母見喪服小功章集説曰諸母衆妾也可者謂雖非衆妾之列或傅御之屬可為子師者也此人君養子之禮師教以善道者慈母審其欲惡者保母安其寢處者他人無事不往恐兒精氣微弱將驚動也三月之末擇日翦髮為鬌男角女羈否則男左女右是日也妻以子見於父貴人則為衣服由命士以下皆潄澣男女夙興沐浴衣服具視朔食夫入門升自阼階立於阼西鄉妻抱子出自房當楣立東面集説曰鬌所存留不翦者也夾囟兩旁當角之處留髪不翦者謂之角留頂上縱横各一相交通逹者謂之羈嚴氏曰夾囟曰角兩髻也午達曰覊三髻也貴人大夫以上也由自也具視朔食者所具之禮如朔食也朔食天子大牢諸侯少牢大夫特豕士特豚也入門入側室之門也側室亦南向故有阼階西階出自房自東房而出也大夫以下見子就側室見妾子於内寢辟人若也姆先相曰母某敢用時日祗見孺子夫對曰欽有帥父執子之右手咳而名之妻對曰記有成遂左還授師子師辯告諸婦諸母名妻遂適寢集説曰某妻姓某氏也時日是日也孺稚也欽敬帥循也言當敬教之使循善道也執右手明將授之事也咳而名之者說文咳小兒笑聲謂父作咳聲笑容以示慈愛而名之也記有成謂當記識夫言教之成德也授師以子授子師也諸婦同族卑者之妻也諸母同族尊者之妻也後告諸母欲名成於尊也妻遂適寢復夫之燕寢也夫告宰名宰辯告諸男名書曰某年某月某日某生而藏之宰告閭史閭史書為二其一藏諸閭府其一獻諸州史州史獻諸州伯州伯命藏諸州府夫入食如養禮疏曰此經所陳謂卿大夫以下故以名徧告同宗諸男諸男卑者尚告則告諸父可知若諸侯絶宗則不告也集説曰宰屬吏也諸男同宗子姓也藏之者以簡䇿書子名而藏於家之書府也二十五家為閭二千五百家為州州伯則州長也閭史州史皆其屬吏也閭府州府皆其府藏也夫入食如養禮謂與其妻禮食如婦始饋舅姑之禮也世子生則君沭浴朝服夫人亦如之皆立於阼階西鄉世婦抱子升自西階君名之乃降集説曰諸侯朝服𤣥端素裳夫人亦如之者亦朝服也合服展衣註云褖衣者以見子畢即侍御於君故服進御之褖衣也人君見世子於路寢此升自西階是自外而入也凡生子無問妻妾皆在側室適子庶子見於外寢撫其首咳而名之禮帥初無辭疏曰庶子見於側室此以撫首咳名無辭之事同故與適子連文云見於外寢耳集説曰此適子蓋世子之弟庶子則妾子也外寢君燕寢也燕寢在内以側室在傍處内故謂此為外也凡名子不以日月不以國不以隱疾大夫士之子不敢與世子同名集説曰說見曲禮妾將生子及月辰夫使人日一問之子生三月之末潄澣夙齊見於内寢禮之如始入室君巳食徹焉使之特餕遂入御集説曰此言大夫士之妾生子之禮宮室之制前有路寢次則君之燕寢次夫人正寢卿大夫以下前有適室次則燕寢次則適妻之寢此言内寢正謂適妻寢耳如始入室者如初來嫁時也凡妾稱夫曰君特餕使此生子者獨餕不如常時衆妾同餕也公庶子生就側室三月之末其母沐浴朝服見於君擯者以其子見君所有賜君名之衆子則使有司名之疏曰前文已云適子庶子見異於世子今更重出者以前庶適連文恐事事同適故此特言庶子之禮前注云凡子生皆就側室則世子亦就側室今特云庶子就側室者舉庶子世子可知集説曰擯者傅姆之屬也君所有賜者此妾君所偏愛而特加恩賜者故其子君自名之若衆妾之子恩寵輕畧者則使有司名之也庶人無側室者及月辰夫出居羣室其問之也與子見父之禮無以異也集説曰問之之禮與執手咳名之事欽帥記成之辭皆與有爵者同故云無以異也凡父在孫見於祖祖亦名之禮如子見父無辭註曰見子於祖家統於尊也父在則無辭有適子者無適孫與見庶子同也父卒而有適孫則有辭與見冡子同父雖卒而庶孫猶無辭也疏曰此論卿大夫以下之事食子者三年而出見於公宮則劬集説曰食子者士之妻大夫之妾也子三年則免懐抱故食者出還其家見於公宫而告辭則君必有賜劬者有賜以勞其劬勞也大夫之子有食母註曰選於傅御之中喪服所謂乳母士之妻自養其子註曰賤不敢使人也由命士以上及大夫之子旬而見集説曰註讀旬為均謂適子妾子有同時生者雖是先生者先見後生者後見然皆在夫未與婦禮食之前故曰均而見也冡子未食而見必執其右手適子庶子巳食而見必循其首疏曰此天子諸侯之禮未與后夫人禮食而先見冡子急於正也禮食之後乃見適子庶子緩於庶耳子能食食教以右手能言男唯女俞男鞶革女鞶絲集説曰食飯也唯俞皆應辭鞶小囊盛帨巾者男用韋女用繒帛六年教之數與方名七年男女不同席不共食八年出入門户及即席飲食必後長者始教之讓集説曰數謂一十百千萬方名東西南北也九年教之數日十年出就外傅居宿於外學書計集説曰數日知朔望與六甲也外傅教學之師也書謂六書計謂九數衣不帛􅃭袴禮帥初朝夕學㓜儀請肄簡諒集説曰曲禮曰童子不衣裘裳不以帛為􅃭袴為大温傷隂氣也禮帥初謂行禮動作皆循習初教之方也肄習也簡書篇數也諒言語信實也皆請於長者而習學之也一說簡者簡要謂使之習事務從其要不為迂曲煩擾也十有三年學樂誦詩舞勺成童舞象學射御集説曰樂八音之器也詩樂歌之篇章也成童十五以上象說見文王世子射謂五射御謂五御也朱子曰酌即勺也内則曰十三舞勺即以此詩為節而舞也二十而冠始學禮可以衣裘帛舞大夏惇行孝弟博學不教内而不出集説曰始學禮以成人之道當兼習吉凶軍賔嘉之五禮也大夏禹樂樂之文武兼備者也孝弟百行之本故先務惇行於孝弟而後博學也不教恐所學未精故不可為師以教人也内而不出言藴蓄其德美於中而不自表見其能也一說謂不出言以為人謀畫三十而有室始理男事博學無方孫友視志集説曰室猶妻也男事受田給政役也方猶常也學無常在志所慕則學之孫友順交朋友也視志視其志意所尚也四十始仕方物出謀發慮道合則服從不可則去五十命為大夫服官政七十致事凡男拜尚左手朱子曰物猶事也方物出謀則謀不過物方物發慮則慮不過物問何謂不過物曰方猶對也比方以窮理女子十年不出姆教婉娩聼從執麻枲治絲繭織紝組紃學女事以共衣服觀於祭祀納酒漿籩豆菹醢禮相助奠疏曰此文偹四德婉為婦言娩為婦容聼從為婦順執麻枲以下為婦功集説曰十年不出謂十歳則恒處於内也姆女師也婉謂言語娩謂容貌司馬公云柔順貌紝繒帛之屬組是綬也薄濶為組似繩者為紃紃之制似絛古人以置諸冠服縫中者十有五年而笄二十而嫁有故二十三年而嫁聘則為妻奔則為妾凡女拜尚右手集説曰十五許嫁則笄未許嫁者二十而笄故謂父母喪妻齊也妾之言接言得接見於君子不得伉儷也左手壓右曰尚左尚右亦然禮記述註卷十二
