body:
  text: 禮記述註卷九安溪李光坡撰禮運第九疏曰鄭云名曰禮運者以其記五帝三王相變易隂陽轉旋之道昔者仲尼與於蜡賓事畢出遊於觀之上喟然而歎仲尼之歎盖歎魯也言偃在側曰君子何歎孔子曰大道之行也與三代之英丘禾之逮也而有志焉集説曰蜡禮詳見郊特牲篇孔子在魯與為魯國蜡祭之賓畢事而遊息於觀上觀門闕也兩觀在門之兩房懸國家典章之言於上以示人也喟然歎聲也所以歎魯者或祭事之失禮或因睹舊章而思古也言偃孔子弟子子游也問所以歎之故夫子言我思古昔大道之行於天下與夫三代英賢所以得時行道之盛我今雖未得及見而有志於其所為也大道之行也天下為公選賢與能講信脩睦故人不獨親其親不獨子其子使老有所終壯有所用㓜有所長矜寡孤獨廢疾者皆有所養男有分女有歸貨惡其棄於地也不必藏於已力惡其不出於身也不必為已是故謀閉而不興盗竊亂賊而不作故外戸而不閉是謂大同集説曰天下為公言不以天下之大私其子孫而與天下之賢聖公共之如堯授舜舜授禹但有賢能可選即授之矣當時之人所講習者誠信所脩為者和睦是以親其親以及人之親子其子以及人之子使老者壮者㓜者各得其所困窮之民無不有以飬之男則各有士農工商之職分女則得歸於良奥之家貨財生民所資若不以時収貯則物壊世窮無所資用故各収寳而藏之是惡棄地耳非是藏為已有乏者便與也為事用力不憚劬勞者正是惡於相欺惜力不出於身耳非是欲自營贍也風俗如此是以姦邪之謀閉塞而不興有乏輙與則盗竊焉施有能必位則亂賊何起外户扉從外閤也但為風塵入寢故設扉耳無所捍拒故從外揜也坡謂勿論堯舜氣象三代視之有大同小康之别即當身目驗所見故老遺俗渾樸摰心即有此等大同意思以視後生流習便别且句句實理休飬漸摩可以馴致非荒忽不可㡬者宋元儒隨聲為老氏意真不解也今大道既隠天下為家各親其親各子其子貨力為已大人世及以為禮城郭溝池以為固集説曰為家以天下傳子也大人天子諸侯也父子曰世兄弟曰及坡謂至此為一段言風俗之不若古也禮義以為紀以正君臣以篤父子以睦兄弟以和夫婦以設制度以立田里以賢勇知以功為已集説曰紀綱紀也制度車旗宫室衣服飲食賢猶崇重也以勇知為賢也坡謂至此為一段惟各親其親子其子故宜正之篤之睦之和之惟貨為已故宜設其制度立其田里惟力為已故宜賢其勇知功其為已為巳能脩其本分者故以為功也疏云縁此諸事有失故並用禮義為此以下諸事之紀是也故謀用是作而兵由此起坡謂此承首段各親其親各子其子貨力為已並有爭心故奸謀作而兵戈起禹湯文武成王周公由此其選也此六君子者未有不謹於禮者也以著其義以考其信著有過刑仁講譲示民有常如有不由此者在埶者去衆以為殃是謂小康疏曰由用也此謂禮義也言禹湯文武成王周公用此禮義教化其為三王中之英選也此聖賢六人皆謹慎於禮以行下五事著其義以下皆謹禮之事也若為君而不謹禮行此五事雖在富貴埶位而衆必以為禍惡共以罪黜退之坡謂此承次段言禮義為紀惟三王能盡其道也著明也考成也刑則也刑仁以仁為則也五者之序畧如敬信節愛義近於敬信即信也著有過節也刑仁講譲愛也示民有常所謂如四時如金石者此三王之所以為三王也後世或名至而實不然或始勤而終怠化安能久道民安能成俗哉言偃復問曰如此乎禮之急也孔子曰夫禮先王以承天之道以治人之情故失之者死得之者生詩曰相䑕有體人而無禮人而無禮胡不遄死是故夫禮必本於天殽於地列於鬼神達於䘮祭射御冠昏朝聘故聖人以禮示之故天下國家可得而正也註曰聖人則天之明因地之利取法度於鬼神以制禮下教令也既又祀之盡其敬也教民嚴上也鬼者精魂所歸神者引物而出謂祖廟山川五祀之屬也熊氏曰言偃因在勢者去而歎言禮之所係甚急如此孔子言禮之重不但係勢之存亡且關人之生死益見禮之急也天道者自然之理聖人奉承之言禮之所本也治人之情言禮之所用也引詩以明失死之意本於天三句正是承天道達於䘮祭句正是治人情以禮示之即承天道以治人也可得而正則有得而無失矣坡謂本於天三句註觧至矣盖殽於地下文曰列地利曰極百貨從無法其髙下之意而列於鬼神下文自天地之後次祖廟山川五祀不别言鬼神則三者即是亦無取屈伸往來之意然而髙下屈伸之義亦未嘗不包舍也言偃復問曰夫子之極言禮也可得而聞與孔子曰我欲觀夏道是故之杞而不足徴也吾得夏時焉我欲觀殷道是故之宋而不足徴也吾得坤乾焉坤乾之義夏時之等吾以是觀之註曰杞夏之後得夏四時之書也其書存者有小正宋殷之後得殷隂陽之書也其書存者有歸藏疏曰之適也夏之四時之書殷之坤乾之説並載前王損益隂陽盛衰故觀此二書以知其上代也坡謂註疏是矣盖曰夏時者以時紀事備載一代損益盛衰如春秋然至秦漢時此書又失故註曰其存者有小正非即以小正盡夏時也坤乾者以隂陽紀事如洪範然亦非盡於歸藏也然夫子既見其一代損益盛衰之故而猶歎不足者亦如今周禮雖存但冡宰治邦國之六典治都鄙之八則先儒云當别有篇卷今僅有其目而無其書如此之類故曰不足耳非全無也夫禮之初始諸飲食其燔黍捭豚汗尊而抔飲蕢桴而土鼓猶若可以致其敬於鬼神註曰言其物雖質畧有齋敬之心則可以薦羞於鬼神鬼神享徳不享味也中古未有釜甑釋米捭肉加於燒石之上而食之耳汙尊鑿地為尊也抔飲手掬之也蕢讀為凷聲之誤也凷堛也謂摶土為桴也土鼓築土為鼓也疏曰從此以下至禮之大成皆是二書所見之事燔黍洮淅黍米加燒石上以燔之捭豚擘析豚肉加燒石上孰之桴鼓槌也土鼓盖築地以當鼓節坡謂疏觧至矣此言禮之初至禮之成或原或委夫子非鑿空構造必有所本而文承夏殷之後我觀周道之前非得之二書而何夫子語取有徴如曾子問必稱聞諸老耼是也不然㡬何不為臆説而無明証乎及其死也升屋而號告曰臯某復然後飯腥而苴孰故天望而地藏也體魄則降知氣在上故死者北首生者南鄉皆從其初集説曰所以升屋者以魂氣之在上也臯者引聲之言某死者之名也欲招此魂令其復合體魄如是而不生乃行死事飯腥者用上古未有火化之法以生稻米為含也苴孰者用中古火化之利包裹孰肉為遣送之奠也天望地藏謂始死望天而招魂體魄則葬藏於地也所以然者以體魄則降而下知氣則升而上也死者之頭向北生者之居向南及以上送死諸事非後世創為之皆是從古初所有之禮也昔者先王未有宫室冬則居營窟夏則居橧巢未有火化食草木之實鳥獸之肉飲其血茹其毛未有麻絲衣其羽皮集説曰營窟者營累其土以為窟穴也地髙則穴於地中地卑則於地上累土為窟也橧巢者橧聚薪柴以為巢居也茹啜也茹其毛者以未有火化故去毛不能盡而並食之也後聖有作然後脩火之利范金合土以為䑓榭宫室牖户以炮以燔以亨以炙以為醴酪治其麻絲以為布帛以養生送死以事鬼神上帝皆從其朔集説曰范字皆從竹韻註云以土曰型以金曰鎔以木曰模以竹曰范皆鑄器之式也范金為形範以鑄金器也合土和合泥土為陶器也裹而燒之曰炮加於火上曰燔煮於鑊曰亨貫串而置之火上曰炙酪醋也治湅染之類也此以上諸事皆火之利坡謂養生承宫室節送死承及其死也節以事鬼神上帝承始諸飲食節朔亦初也言火利既脩則生得其情死盡其常郊格而廟享矣然原其始則此三者古初本有其意後聖從其初意而修之耳夫一則曰從初再則曰從朔皆言禮本於情理之極何嘗以為忠信之薄如老氏乎諸儒過矣故𤣥酒在堂醴醆在户粢醍在堂澄酒在下陳其犧牲備其鼎爼列其琴瑟管磬鐘鼓修其祝嘏以降上神與其先祖以正君臣以篤父子以睦兄弟以齊上下夫婦有所是謂承天之祜集説曰太古無酒用水行禮後王重古故尊之名為𤣥酒祭則設於室内而近北也醴猶體也酒之一宿者謂之醴齊醆即盎齊盎猶翁也成而翁翁然葱白色也此二者以後世所為賤之陳列雖在室内而稍南近户故云醴醆在户也粢醍即醍齊酒成而紅赤色也以卑之列於堂澄即沈齊成而滓沈也酒謂三酒事酒昔酒清酒又卑陳在堂下此五者各以等降設之琴瑟在堂而登歌管磬鐘鼓者堂下之樂祝為主人告神之辭嘏為尸致福於主人之辭上神天神也祭統云君迎牲而不迎尸别嫌也是正君臣之義父北靣而事之所以明子事父之道是篤父子也睦兄弟者主人獻長兄弟及衆兄弟之禮齊上下者獻與餕各有次序無遺缺也夫婦有所者君在阼夫人在房及致爵之類也行禮得所如此神格鬼享豈不承上天之福祜乎坡謂節首故字承事鬼神上帝而言盖禮有五經莫重於祭而養生送死之道該之矣作其祝號𤣥酒以祭薦其毛血腥其爼孰其殽與其越席疏布以冪衣其澣帛醴醆以獻薦其燔炙君與夫人交獻以嘉魂魄是謂合莫然後退而合亨體其犬豕牛羊實其簠簋籩豆鉶羮祝以孝告嘏以慈告是謂大祥此禮之大成也集説曰周禮祝號有六一神號二鬼號三祗號四牲號五齍號六幣號作其祝號者造為鬼神及牲玉美號之辭神號如昊天上帝鬼號如皇祖伯某祗號若后土地祗牲號若一元大武齍號若稷曰明粢幣號若幣曰量幣祝史稱之以告鬼神也𤣥酒以祭謂朝事時設此𤣥酒於五齊之上此重古設之其實不用以祭薦其血毛亦朝踐延尸在堂祝以血毛告於室腥其爼亦朝踐時既殺牲以爼盛肉薦於尸前此三者用上古也殽骨體也孰為以湯烱之不全孰次於腥而薦之堂越席蒲席也疏布麄布也冪覆尊也周禮越席疏布是祭天之物此則宗廟用之疏云雜陳夏殷禮則上所云得之夏時坤乾二書信矣澣帛謂祭服練帛染而為之醴醆以獻者朝踐時獻用醴饋食時獻用醆薦其燔炙者謂燔肉炙肝特牲禮主人獻尸賓長以肝從主婦獻尸賓長以燔從則此君薦之用炙夫人用燔也第一君獻第二夫人獻第三君獻第四夫人獻故云君與夫人交獻也此以上至孰其殽是法中古之禮皆所以嘉善於死者之魂魄而求以契合於冥漠之中也然後退而合亨謂先薦爓未是熟物今乃退取曏爓肉更合而烹煮之使熟而可食也又尸爼惟載右體其餘不載者及左體等亦於鑊中烹煮之故云合亨也體其犬豕牛羊者烹熟乃體别骨之貴賤以為衆爼用供尸及待賓客兄弟等也此是祭末饗燕之衆爼非尸前之正爼也簠内圓而外方盛稻梁之器簋外圓而内方盛黍稷之器籩豆形制同竹曰籩木曰豆鉶如鼎而小盛和羮之器也祝嘏説見前孝事祖宗之道也慈愛子孫之道也合亨以下當世之禮也祥猶善也孔子曰鳴呼哀哉我觀周道幽厲傷之吾舍魯何適矣魯之郊禘非禮也周公其衰矣杞之郊也禹也宋之郊也契也是天子之事守也故天子祭天地諸侯祭社稷集説曰幽厲之前周道巳微其大壊則在幽厲也魯周公之國夫子嘗言其可一變至道則舍魯何往哉然魯之郊禘則非禮矣禹為三代之盛王故杞得以郊契為殷之始祖故宋得以郊惟此二國可世守天子之事以事其祖周公雖聖人臣也成王之賜固非伯禽之受尤非周公制禮作樂為萬世不易之典而子孫若此是周公之教因子孫之僣禮而衰矣天地社稷之祭君臣之分凛不可踰曽謂人臣而可僣天子之禮哉祝嘏莫敢易其常古是謂大假疏曰是謂大假論其善也所以論其善者將欲論其惡故也集説曰祭禮祝於始嘏於終禮之成也常古常事古法也自祝至嘏中間禮節一遵常古内盡於已而外順於道是謂大福嘏矣假亦當作嘏祝嘏辭説藏於宗祝巫史非禮也是非幽國集説曰祝嘏辭説禮之文也無文不行周禮大宗伯掌詔六號重其事耳衰世君臣慢禮惟宗祝巫史習而記之故謂幽昏之國言其昧於禮無以昭明政治也坡謂自此至君臣為謔所謂幽厲傷之也醆斝及尸君非禮也是謂僣君集説曰醆夏爵斝殷爵尸君君之尸也杞宋二王之後得用以獻尸其餘列國惟用時王之器今國君皆用醆斝以及於尸君非禮也是僣上之君耳冕弁兵革藏於私家非禮也是謂脅君集説曰冕祭服之冠弁皮弁也大夫稱家大夫以朝廷之尊服國家之武衛而藏於私家可見其強橫則此國君者乃見脅於強臣之君也大夫具官祭器不假聲樂皆具非禮也是謂亂國集説曰家臣不能具官一人常兼數事具官是僣擬也祭器惟公孤以上得全備周禮四命受器大夫無田禄者不設祭器以其可假也有田禄者祭器亦不得全具須有所假不假亦僣擬也周禮大夫有判縣之樂而不得如三桓舞八佾一曰大夫祭不得用樂故少牢饋食無奏樂之文惟君賜乃有之聲樂皆具亦僣擬也尊卑無等非亂國而何故仕於公曰臣仕於家曰僕三年之䘮與新有昏者期不使以衰裳入朝與家僕雜居齊齒非禮也是謂君與臣同國集説曰臣者對君之稱僕者服役之名仕於大夫者自稱曰僕則益賤矣人臣有三年之䘮或新昏則一期之内君不使之所以體人情也就二者而論䘮又重於昏也今乃不居䘮於家而以衰裳入朝是視君之朝如已之家矣是君與其臣共此國也就卿大夫而言僕又其臣也今卿大夫乃與其家之僕雜居齊列無貴賤之分亦是君與臣共此國也故天子有田以處其子孫諸侯有國以處其子孫大夫有采以處其子孫是謂制度註曰言今不然也集説曰王之子弟有功徳者封為諸侯其餘則分以畿内之田諸侯子孫命為卿大夫其有功徳者亦賜采地所謂官有世功則有官族邑亦如之也大夫位卑不當割采地以與子孫但養之以采地之禄耳此先王之制度在上者不得私與在下者不得越分也故天子適諸侯必舍其祖廟而不以禮籍入是謂天子壊法亂紀集説曰廟尊於朝故天子舍之以禮籍入謂太史典禮執簡記奉諱惡也天子雖尊舍人宗廟猶有敬焉自拱敕也不如此則是壊法度亂紀綱矣諸侯非問疾弔䘮而入諸臣之家是謂君臣為謔集説曰諸侯於其臣有問疾弔䘮之禮非此而往是戲謔也敗禮之禍恒必由之是故禮者君之大柄也所以别嫌明微儐鬼神考制度别仁義所以治政安君也註曰柄所操以治事坡謂自幽國至為謔有涉於嫌疑者以禮别之有微而難辨者以禮章之於以儐禮鬼神則無郊禘非禮祝嘏易常之患以考正制度則無幽國僣君之等以别仁義則愛所當愛㫁所當㫁而有各當其禮之用五者皆政之所在而君所係以安危者禮以别明儐攷則政治而君安矣故政不正則君位危君位危則大臣倍小臣竊刑肅而俗敝則法無常法無常而禮無列禮無列則士不事也刑肅而俗敝則民弗歸也是謂疵國註曰又為言政失君危之禍敗也肅駿也疵病也疏曰臣既倍竊愚君無奈此何惟知暴怒急行刑罰故云刑肅集説曰倍違上行私也或亦倍而去之之謂小臣竊所謂盗臣也俗敝人無亷恥風俗敝敗也治國無禮故至於刑肅而俗敝恣已用刑遂廢常法法廢而禮無上下之列矣宜乎士不修職民心離判也豈非疵病之國乎故政者君之所以藏身也註曰於此又遂為之言政也藏謂輝光於外而形體不見若日月星辰之神是故夫政必本於天殽以降命註曰降下也殽天之氣以下教令天有運移之期隂陽之節也命降於社之謂殽地註曰謂教令由社下者也社土地之主也周禮土㑹之法有五地之物生疏曰地有五土生物不同人君法地亦養物不一也降於祖廟之謂仁義註曰謂教令由祖下者坡謂郊特牲所云春禘秋嘗春享孤子秋享耆老祭統所云於禘發爵賜服於嘗發秋政如此之類凡自祖廟出者皆仁義之政也降於山川之謂興作註曰謂政令由山川下者也山川有草木禽獸可作器物共國事降於五祀之謂祭度註曰謂政令由五祀下者坡謂如月令是也春時祀戸則有春時應行制度故五祀言制度此聖人所以藏身之固也註曰政之行如此何用城郭溝池之為坡謂自殽以降命而下所謂法有常而禮有列者故聖人參於天地並於鬼神以治政也疏曰並謂比方鬼神則祖廟山川五祀也坡謂上節言政之出於天地鬼神其法有常此則正言聖人治政之道也參之並之無他亦曰知其情而已詳見下文處其所存禮之序也玩其所樂民之治也坡謂天序天秩其所存也惇之庸之處其所存也此禮之所以序也所欲與聚所惡勿施此民之所以治也自此以至終篇皆此意也故天生時而地生財人其父生而師教之四者君以正用之故君者立於無過之地也熊氏曰天生四時地生百物父生之師教之此四者各不能相兼惟人君正身修徳則天地父師之事皆為聖人用而禮序民治矣此見君者必正身立於無過之地而與天地合徳鬼神合吉凶以為治政之本也故君者所明也非明人者也君者所養也非養人者也君者所事也非事人者也故君明人則有過養人則不足事人則失位故百姓則君以自治也養君以自安也事君以自顯也故禮達而分定故人皆愛其死而患其生疏曰人皆知禮上下分定君有危難皆欲救之皆貪愛其以義而死患其不義而生坡謂君者所明數句猶孟子所謂勞心者治人勞力者治於人治於人者食人治人者食於人之意正所以鞕廹人君當心於無過之地則足以治政而安身明開明也言所以開明人非開明於人也下則君以自治盖既開明自然取法於君理自相通以一字而易三字無為也故用人之知去其詐用人之勇去其怒用人之仁去其貪集説曰言人君用人當取其所長舍其所短盖中人之才有所長必有所短也去猶棄也有知謀者易流於欺詐故用人之知當棄其詐而不責也有剛勇者易至於猛暴故用人之勇當棄其猛暴之過也朱子曰仁止是愛愛而無義以制之便事事都愛所以貪也故用人之仁當棄其貪之失也坡謂此推言人君立於無過至用人則棄短取長故人得以自治自安自顯也故國有患君死社稷謂之義大夫死宗廟謂之變集説曰大夫死宗廟言衛君之宗廟而致死也然巳之宗廟亦在本國不棄君之宗廟即是不棄巳之宗廟也變讀為辨辨猶正也一説其死有分辨非可以無死而死也坡謂此推言居上者之死義以見人莫不皆愛其死而患其生也自君者所明至此皆安君之事故聖人耐以天下為一家以中國為一人者非意之也疏曰説文云耐者鬚也古者犯罪髠鬚謂之耐罪以不虧其體猶堪其事故謂之耐故古之能字皆作耐字非意之也者言非以意測度謀慮而已坡謂自此以至終篇推本大道之行與三代之英所以可志而逮之理必知其情辟於其義明於其利達於其患然後能為之註曰辟開也坡謂此情自天地鬼神得者辟於其義是處其所存也明於其利達於其患是玩其所樂也下文推詳之何謂人情喜怒哀懼愛惡欲七者弗學而能何謂人義父慈子孝兄良弟弟夫義婦聼長恵幼順君仁臣忠十者謂之人義講信修睦謂之人利争奪相殺謂之人患故聖人之所以治人七情修十義講信修睦尚慈譲去爭奪舍禮何以治之問愛與欲何别朱子曰愛是汎愛那物欲則有意於必得態氏曰此即三千三百因人情而為之節文者以此治人是貫於義之中而興利息患之要也坡謂此推明禮之所以治政而為君之大柄也飲食男女人之大欲存焉死亡貧苦人之大惡存焉故欲惡者心之大端也集説曰人心雖有七情縂而言之止是欲惡二者故曰大端坡謂自始諸飲食以至於修火之利自夫婦有所以至於上神先祖其聞於夏時坤乾二書者括之以飲食男女所謂天道在此人情在此而得失死生之理决矣自此至被色而生皆詳知情之事人藏其心不可測度也美惡皆在其心不見其色也欲一以窮之舍禮何以哉疏曰禮所以知人心者有事於中心貌必見於外若七情美善則舉動無不合禮七情違辟則動作皆失其法故人者其天地之徳隂陽之交鬼神之㑹五行之秀氣也坡謂此推本情之得於天地鬼神也天地之徳以性言隂陽之交以精言鬼神之㑹以神言五行之秀氣以氣言也言神氣在精後者所謂始化曰魄既生魄陽曰魂是也故天秉陽垂日星地秉隂竅於山川播五行於四時和而后月生也是以三五而盈三五而闕家元兄曰日星從天而屬陽四時日星之所經也山川從地而屬隂五行山川之所主也然五行之氣實上播乎四時之間如雷風雲雨霜露之感遇聚散無非山川所欎五行之精地所載之神氣然皆應天之時與之同流故天雖有春夏秋冬之四時而所以生化萬物者亦不離乎風雨霜露而已夫五行播於四時是天地隂陽之和合也和合故月生焉隂精陽氣㑹於太虗而成象生之謂也古今説者皆謂月在天日星之下而居地之上其去地也最近是月在天地之中而所以調和斟酌乎隂陽者故曰月以為量也其盈也三五以受陽之施其闕也三五以毓隂之孕坡謂上言人得四者之全此則貫而一之推明理氣交㑹生人生物之全體大用以見人得秀最靈之實也五行之動迭相竭也五行四時十二月還相為本也集説曰動運也竭盡也終也本者始也五行之運於四時迭相終而還相始終則有始如環無端也冬終竭而春始来則春為夏之本春竭而夏来則夏又為秋之本巳往者為見在者所竭見在者為方来者所本五行四時十二月莫不皆然也坡謂鄭子太叔曰用其五行氣為五味發為五色章為五聲五聲六律十二管還相為宫也集説曰五聲宫啇角徴羽也六律陽聲黄鐘子太簇寅姑洗辰蕤賓午夷則申無射戍也隂聲謂之六吕大吕丑應鐘亥南吕酉林鐘未仲吕已夾鐘卯也律法也又云述也吕助也言助陽宣氣也總而言之皆可稱律故月令十二月皆稱律也長短之數各有損益又有娶妻生子之例長短損益者如黄鐘長九寸下生者三分去一故下生林鐘長六寸也上生者三分益一如林鐘長六寸上生太簇長八寸也上下之生五下六上盖自林鐘未至應鐘亥皆在子午以東故謂之下生自太吕丑至蕤賓午皆在子午以西故謂之上生子午皆屬上生當云七上而云六上者以黄鐘為諸律之首故不數也律娶妻而吕生子者如黄鐘九以林鐘六為妻太簇九以南吕六為妻隔八而生子則林鐘生太簇夷則生夾鐘之類也各依此推之可見還相為宫者宫為君主之義十二管更迭為主自黄鐘始當其為宫五聲皆備黄鐘第一宫下生林鐘為徴上生太簇為啇下生南吕為羽上生姑洗為角餘倣此林鐘第二宫太簇三南吕四姑洗五應鐘六蕤賓七大吕八夷則九夾鐘十無射十一仲吕十二也此非十二月之次序乃律吕相生之次序也五味六和十二食還相為質也集説曰酸苦辛鹹加滑與甘是五味六和也十二月十二月之所食也還相為質者如春三月以酸為質夏三月以苦以質而六和皆相為用也五色六章十二衣還相為質也集説曰五色青赤黄白黒也并天𤣥為六章十二月之衣如月令春衣青夏衣朱之類還相為質謂畫繪之事主其時之一色而餘色間雜也坡謂五行氣之本也聲於氣最精味次之盖聲臭皆有氣無形也色則章矣故先五行次聲次味次色也故人者天地之心也五行之端也食味别聲被色而生者也疏曰王肅云人於天地之間如五藏之有心矣人乃生之最靈其心五藏之最聖也邵子曰夫人也目善萬物之色耳善萬物之聲鼻善萬物之氣口善萬物之味靈於萬物不亦冝乎坡謂言心則萬物不過天地之四支百骸耳言端則萬物不過五行之支流餘裔耳此明人全得天地之理以為性也有味物有聲物有色物且食味而不能兼五味能聲而不能别五聲能色而不能被五色惟人也食五味别五聲被五色與生俱生是全得天地之氣以為形也惟食味别聲被色而生此飲食男女所以為大欲而不可無以正之也故聖人作則必以天地為本以隂陽為端以四時為柄以日星為紀月以為量鬼神以為徒五行以為質禮義以為器人情以為田四靈以為畜以天地為本故物可舉也以隂陽為端故情可睹也以四時為柄故事可勸也以日星為紀故事可列也月以為量故功有藝也鬼神以為徒故事可守也五行以為質故事可復也禮義以為器故事行有考也人情以為田故人以為奥也四靈以為畜故飲食有由也註曰天地以至於五行其制作所取象也禮義人情其政治也四靈者其徴報也此則春秋始於元終於麟包之矣坡謂此推明聖人參於天地並於鬼神以治政之詳也以天地為本者順帝則奉無私舉者不遺一物也以隂陽為端者仁義時措温肅以類聖人之情灼然明信故可睹也此二者聖人内心之事也四時為柄日星為紀月以為量吕氏月令其事類也藝業也功之有就者鬼神以為徒即前章殽地以下諸事降命有常故事可守也五行以為質者即下用水火金木必時今嵗周而来嵗始故可復也考成也凡言事者皆脩十義講信脩睦之事也人以為奥者治人情如治田不使邪僻害性則人皆有宿道向方之所如室之有奥也由用也飲食有由善哉禮始於飲食其效至於飲食有由盖四靈出世則鳥獸魚鱉咸若以養生送死以事鬼神上帝皆可無憾成效之極何以加兹何謂四靈麟鳯龜龍謂之四靈故龍以為畜故魚鮪不淰鳯以為畜故鳥不獝麟以為畜故獸不狘龜以為畜故人情不失集説曰鮪魚之大者故特言之淰羣隊驚散之貌獝驚飛也狘驚走也龜能前知人有所决以知可否故不失其情之正也故先王秉蓍龜列祭祀瘞繒宣祝嘏辭説設制度故國有禮官有御事有職禮有序疏曰上既言龜知人情故此言卜筮所造置之事秉蓍龜者有大事執蓍龜而問吉凶也自列祭祀至禮有序皆秉蓍龜事也列祭祀謂郊廟已下皆用卜筮也宣揚也祝嘏有舊辭更宣揚告神也坡謂此申人情不失之意祭有升禋有瘞埋止言瘞繒疑有脱札設制度謂五禮制度有當設造宜加諸卜者故國有禮如卜立君卜大封之等官有御如卜師開龜菙氏共契之等其方卜也觀事之大小則命龜貞龜各有其職其既卜也則君占體大夫占色之等各有其序也聖語周蜜驟而言四靈為疑其恍象也故舉四物以明之言龜使人情不失為疑其過夸也故舉先王以信之傳所謂辭煩而不殺者正也朱子謂聖言盛水不漏者此也石梁王氏好作狂勃且云何所無龜夫周官爾雅龜有六屬十等彼稱在所皆龜是指何龜乎謾矣故先王患禮之不達於下也坡謂斯言要矣二帝三王之所以異於後世者達與不達而已盖制禮非難達而行之使下信其有常之為難使下信之已難而人君躬行於上使下則以自治事以自顯之尤難此先王之患也故祭帝於郊所以定天位也祀社於國所以列地利也祖廟所以本仁也山川所以儐鬼神也五祀所以本事也故宗祝在廟三公在朝三老在學王前巫而後史卜筮瞽侑皆在左右王中心無為也以守至正註曰此所以達禮於下也宗宗人也瞽樂人也侑四輔也疏曰天子祭帝於郊以行臣禮是欲使嚴上之禮達於下天髙在上故云定天位祀社欲使報本之禮達於下也地出財故云列地利王在宗廟以子禮事尸是欲使仁義之教達於下也坡謂山澤通氣往来屈伸之最著者故以鬼神言之其實郊社諸祀皆是儐鬼神也事及時當行之事也上文因法無常而推其有常故先言殽以降命而後及聖人之治政此則詳聖人本情作則之事而後及其達禮於下以示民有常也宗祝在廟八句則又申明人君立於無過之地以為達禮之本猶大程子所云命老成賢儒不必勞以職事俾日親便座講論道義又擇天下賢俊使得陪侍法從朝夕延見開陳善道講磨治體之意一也心無為以守至正者猶伊川程子云人主日間接賢士大夫之時多親宦官宫妾之時少則心無非僻之干所謂無為也可以涵養氣質而薰陶徳性所謂守至正也非謂㝠目端坐如釋子入定然也故禮行於郊而百神受職焉禮行於社而百貨可極焉禮行於祖廟而孝慈服焉禮行於五祀而正法則焉故自郊社祖廟山川五祀義之修而禮之藏也疏曰前有山川興作此不言者法則之事包之也集説曰承上文而言百神受職謂風雨節寒暑時而無咎徴也百貨可極謂地不愛寳物無遺利也孝慈服謂天下皆知服行孝慈之道也正法則謂當行之禮各有分限無敢愆忘也聖人精意感格其效如此由此觀之則郊社祖廟山川五祀皆義之修飭而禮之府藏也坡謂聖人作則則政治矣此言天人和同則君安矣以盡上文治政安君之義是故夫禮必本於大一分而為天地轉而為隂陽變而為四時列而為鬼神其降曰命其官於天也坡謂太一即太極也無加曰極無對曰一天地者其廣大也隂陽者吉凶異道也四時者變而從宜也鬼神者郊社廟祀也崇卑曰分旋生曰轉因時曰變昭著不揜曰列熊氏云分轉變列皆本於太一可見先王之禮降下於人而謂之命令使人遵守者乃主宰於天也豈私意為之乎此禮之體也夫禮必本於天動而之地列而之事變而從時恊於分藝其居人也曰養其行之以貨力辭譲飲食冠昏䘮祭射御朝聘坡謂此言人之用禮也夫天專言之則道本於天者根於天理也禮卑如地踐履宜謹細故曰動而之地也列而之事者吉則列陽之事凶財列隂之事也變而從時如朝覲因時而舉礿祀蒸嘗隨時而行者分藝分限常業也地利者社之分藝仁義者祖廟之分藝殽以降命即恊於分藝也居人曰養治之使生養遂也冠昏八者禮之宜然而行之必有貨財之資筋力之強辭譲之節飲食之品皆非有養不可所謂物畜然後有禮也上文聖人以天地為本至五行為質此文承之反復申明以起禮義為人之大端以見禮義為器之至急也故禮義也者人之大端也所以講信修睦而固人肌膚之㑹筋骸之束也所以養生送死事鬼神之大端也所以達天道順人情之大竇也故唯聖人為知禮之不可以已也故壊國䘮家亡人必先去其禮集説曰肌膚之總㑹筋骨之聨束非不固也然無禮以維飭之則惰慢傾側之容見矣故必禮以固之也養生送死事鬼神其事多端皆頼禮以行之故亦曰大端竇孔穴之可出入者由於禮義則通達不由禮義則窒塞故以竇譬之惟聖人知禮之闗係於身心幽明天人之切故以身體之為齊家治國之本彼敗國之君䘮家之主亡身之夫皆以先去其禮之故也此所謂失之者死得之者生也故禮之於人也猶酒之有糵也君子以厚小人以薄集説曰人以禮而成徳如酒以麵糵而成味君子厚於禮故為君子小人薄於禮故為小人亦如酒之有醇醨也坡謂此二節明禮義以為器也故聖人修義之柄禮之序以治人情故人情者聖王之田也修禮以耕之陳義以種之講學以耨之本仁以聚之播樂以安之熊氏曰義者宜也人所持以治事故曰柄禮者節也人循之以處事則條理不紊故曰序聖人講明之以治人情期合乎宜中乎節也坡謂其治目之詳則上文之修十義講信修睦尚慈譲去争奪之事也修舉其節文使人習而守之則情不蕩熾猶以耒耜耕田使不蕪穢也開陳其義使人心知正路由天理之當行無人欲之邪曲如降之嘉種而非稂莠也設為庠序學校以教與之講去其非而趨是猶農之耨以去草存苖也人人具此生理漸之摩之使淪肌浹髓各復其性如五榖之生意充足故曰本仁以聚之詠歌舞蹈使食味别聲被色之倫蕩滌其欲惡之邪心而涵泳於太和是播樂以安之也凡此數句文承治人情之後當求其意義之合而陳氏所引劉觧虗張勦説不顧其承似失之也自此至民無凶饑妖孽之疾皆人情以為田故禮也者義之實也恊諸義而恊則禮雖先王未之有可以義起也集説曰實者定制也禮者義之定制義者禮之權度一定不易義隨時制宜故協合於義而合當為者則雖先王未有此禮可酌之於義而創為之禮焉義者藝之分仁之節也恊於義講於仁得之者強熊氏曰處事有輕重以義為分限仁愛有親踈以義為品節苟恊合乎處事之宜講明乎仁愛之等得之於巳而物不能奪故強仁者義之本也順之體也得之者尊坡謂義以節仁耳仁則義之本也生理周流順之體也得之於巳是天爵之貴何尊如之此因上文禮義仁所以為治人情之始中終而推本言之也若講學不過使之知斯而弗去播樂不過使之樂斯而暢茂條達耳非有加也故治國不以禮猶無耜而耕也為禮不本於義猶耕而弗種也為義而不講之以學猶種而弗耨也講之以學而不合之以仁猶耨而弗穫也合之以仁而不安之以樂猶穫而弗食也集説曰此反譬以申明前叚聖人治情之事有始有卒其序不可紊而功不可缺如此安之以樂而不達於順猶食而弗肥也四體既正膚革充盈人之肥也父子篤兄弟睦夫婦和家之肥也大臣法小臣亷官職相序君臣相正國之肥也天子以徳為車以樂為御諸侯以禮相與大夫以法相序士以信相考百姓以睦相守天下之肥也是謂大順大順者所以養生送死事鬼神之常也熊氏曰此言治情之極功也安之以樂是聖人方去安之順則人皆得所安而安之之功成矣故以人身之肥譬之肥者如心廣體胖之謂推而至於天下國家之肥則身修家齊國治天下平之事也故謂之大順治至於大順猶韓子所云生則得其情死則盡其常郊焉而天神格廟焉而人鬼享者故曰所以養生送死事鬼神之常也陳氏曰大臣法不倍也小臣亷不竊也以徳為車由仁義行也以樂為御動無不和也以禮相與朝聘以時也以法相序上不偪下下不僣上也以信相考乆要不忘也以睦相守出入相友守望相助疾病相扶持也肥者充盛而無不足之意坡謂至此父慈子孝兄良弟弟夫義婦聼長恵幼順君仁臣忠十義修矣講信修睦人利普矣争奪相殺人害去矣故聖人耐以天下為一家中國為一人者非意之也嗚呼盛哉故事大積焉而不苑並行而不繆細行而不失深而通茂而有間連而不相及也動而不相害也此順之至也故明於順然後能守危也坡謂大積縂至而積疊也苑屈結不通也細行條分縷析之行也幽深者勢易隔而行之通達茂宻者勢易雜而剖之分明此所以大積而不苑也連而不相及故並行而不繆也動而不相害故細行而不失也此皆大臣不倍小臣不竊法有常而禮有列士事其事之所致也夫政不正則君位危故明於順然後能守危也因於大順之後追結以明之故禮之不同也不豐也不殺也所以持情而合危也註曰豐殺謂天子及士名位不同禮亦異數所以拱持其情合安其危故聖王所以順山者不使居川不使渚者居中原而弗敝也註曰小洲曰渚廣平曰原山者利其禽獸渚者利其魚鹽中原利其五榖使各安其所居不易其利勞敝之也民失其業則窮窮則濫用水火金木飲食必時註曰用水謂漁人以時漁為梁春獻鱉蜃秋獻龜魚也用火謂司爟四時變國火以救時疾及季春出火季秋納火也用金謂卝人以時取金玉錫石也用木謂山虞仲冬斬陽木仲夏斬陰木合男女頒爵位必當年徳註曰謂媒氏令男三十而取女二十而嫁司士稽士任而進退其爵禄也用民必順註曰不奪農時故無水旱昆蟲之災民無凶饑妖孽之疾註曰言大順之時陰陽和也昆蟲之災螟螽之屬坡謂天子祭天地諸侯祭社稷之等禮之不得同也謂之僣謂之脅之等是應少不可求多也天子有田諸侯有國大夫有采之等是應多不可殺少也聖王所以順者廣此順於天下也山者不使居川不使渚者居中原亦不必其同也用水火金木以資人之飲食必時合男女必當年頒爵位必當徳曰時曰當亦不豐也不殺也夫由飲食男女稽之人情本之天道聖人作則以承天之道以治人之情其成效極致不過使飲食男女各當其分各得其欲各去其惡而巳切近精實二帝行此大公無我神而化之是謂大同三王謹此禮義為紀不愆不忘謂之小康皆可志而逮也老氏緯書何嘗有一言近似若漢儒能為此者是亦聖人矣讀者詳之故天不愛其道地不愛其寳人不愛其情故天降膏露地出醴泉山出器車河出馬圖鳯凰麒麟皆左郊棷龜龍在宫沼其餘鳥獸之卵胎皆可俯而闚也則是無故先王能修禮以達義體信以達順故此順之實也註曰膏猶甘也器謂若銀甕丹甑也馬圖龍馬負圖而出也棷聚草也疏曰山車自然之車可俯闚者不獝狘熊氏曰天不愛道百神受職也地不愛寳百貨可極也人不愛情不獨親其親子其子也三才既已恊應又有膏露之類祥瑞之駢臻是豈無故而然修禮者是以禮為人情防範達義者有使民宜之意體信是反身而誠自治其情也達順即達天下之情而家國天下無不肥此順之實迹也坡謂此言四靈以為畜禮記述註卷九
